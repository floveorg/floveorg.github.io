<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>flove · language / idioma</title>
<!-- PWA: install flove as an app (manifest + icons) -->
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#ff8a3a">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="flove">
<style>
  :root{
    --ink:#1a1820; --mut:#6a6478; --line:rgba(20,16,32,.10);
    --paper:#fffdfb; --grad:linear-gradient(90deg,#ff3344,#ff8a3a,#ffd633);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font:16px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    color:var(--ink); background:var(--paper);
    display:grid; place-items:center; padding:24px;
  }
  /* Hidden until JS confirms there is no saved choice — avoids a flash before an
     instant redirect when a language is already remembered. */
  .gate{display:none; text-align:center; max-width:30rem; width:100%}
  .gate.show{display:block; animation:rise .4s ease both}
  @keyframes rise{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}

  .mark{width:64px;height:64px;margin:0 auto 4px;display:block}
  .globe{font-size:1.6rem; line-height:1}
  h1{font-size:1.5rem; margin:.4rem 0 .1rem; font-weight:650}
  .sub{color:var(--mut); margin:0 0 1.6rem; font-size:.95rem}

  .choices{display:grid; gap:.9rem}
  @media(min-width:26rem){ .choices{grid-template-columns:1fr 1fr} }

  .pick{
    appearance:none; cursor:pointer; font:inherit; color:var(--ink);
    border:1px solid var(--line); border-radius:16px; background:#fff;
    padding:1.1rem 1rem; display:grid; gap:.15rem; justify-items:center;
    transition:border-color .15s, transform .12s, box-shadow .15s;
  }
  .pick:hover,.pick:focus-visible{
    outline:none; transform:translateY(-2px);
    border-color:transparent; box-shadow:0 0 0 2px #ff8a3a55, 0 8px 22px rgba(20,16,32,.10);
  }
  .flag{font-size:1.7rem; line-height:1}
  .name{font-weight:600}
  .name-sub{color:var(--mut); font-size:.85rem}

  .foot{margin-top:1.4rem; color:var(--mut); font-size:.8rem}
  .bar{height:4px;border-radius:4px;background:var(--grad);width:56px;margin:1.1rem auto 0}
</style>
</head>
<body>
  <main class="gate" id="gate">
    <img class="mark" src="images/flove-icon.svg" alt="flove">
    <div class="globe" aria-hidden="true">🌐</div>
    <h1>flove</h1>
    <p class="sub">Choose your language · Elige tu idioma</p>

    <div class="choices">
      <button class="pick" data-lang="en" type="button">
        <span class="flag" aria-hidden="true">🇬🇧</span>
        <span class="name">English</span>
        <span class="name-sub">Continue in English</span>
      </button>
      <button class="pick" data-lang="es" type="button">
        <span class="flag" aria-hidden="true">🇪🇸</span>
        <span class="name">Español</span>
        <span class="name-sub">Continuar en español</span>
      </button>
    </div>

    <div class="bar" aria-hidden="true"></div>
    <p class="foot">You can switch anytime with 🌐 · Puedes cambiar cuando quieras con 🌐</p>
  </main>

<script>
  (function(){
    var KEY = 'translate2-lang';
    var ENTRY = 'index.html';   // where the launcher forwards after (or instead of) the choice — the flove home

    function go(){ location.replace(ENTRY); }

    // Already chose before? Skip the gate entirely — this is the "only until chosen" rule.
    var saved = null;
    try { saved = localStorage.getItem(KEY); } catch (_) {}
    if (saved === 'en' || saved === 'es') { go(); return; }

    // No choice yet → reveal the chooser and wire the buttons.
    var gate = document.getElementById('gate');
    gate.classList.add('show');
    gate.querySelectorAll('.pick').forEach(function(btn){
      btn.addEventListener('click', function(){
        var lang = btn.getAttribute('data-lang');
        try { localStorage.setItem(KEY, lang); } catch (_) {}   // persistence is best-effort; redirect regardless
        go();
      });
    });
  })();
</script>
<script>
  // Register the service worker so flove works fully offline once installed.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    });
  }
</script>
</body>
</html>
