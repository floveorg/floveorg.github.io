<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>flove · MiniOffer · KindSwap</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 8 L58 42 L92 50 L58 58 L50 92 L42 58 L8 50 L42 42 Z' fill='%23ef4444'/><circle cx='50' cy='50' r='22' fill='none' stroke='%23ef4444' stroke-width='3'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../flove.css">
<style>
  :root{
    --app-accent:        #059669;
    --app-accent-soft:   #d1fae5;
    --app-ink-on-accent: #022c22;

    --paper:       #f7fdfb;
    --paper-warm:  #ecfdf5;
    --ink:         #052e25;
    --ink-soft:    #234e44;
    --muted:       #6a8d83;
    --line:        rgba(5,80,60,.08);
    --line-strong: rgba(5,80,60,.16);

    --accent:      #059669;
    --accent-deep: #047857;
    --accent-soft: #d1fae5;
    --accent-glow: rgba(5,150,105,.22);
    --gold:        #f59e0b;
    --pink:        #ec4899;
    --blue:        #3b82f6;

    --t-gift: #ec4899;
    --t-lend: #3b82f6;
    --t-exc:  #f59e0b;

    --radius-sm: 12px;
    --radius:    18px;
    --radius-lg: 24px;
    --radius-pill: 999px;
    --shadow-xs: 0 1px 2px rgba(5,80,60,.05);
    --shadow-sm: 0 4px 12px -4px rgba(5,80,60,.10);
    --shadow:    0 18px 40px -16px rgba(5,80,60,.18);
    --fast: .15s cubic-bezier(.2,.8,.2,1);
    --font-ui: 'Inter', system-ui, sans-serif;
    --font-display: 'Fraunces', Georgia, serif;
  }
  *{ box-sizing:border-box }
  body{
    margin:0; font:15px/1.5 var(--font-ui); color:var(--ink);
    background:
      radial-gradient(900px 600px at 90% -10%, var(--accent-soft) 0%, transparent 60%),
      radial-gradient(700px 500px at -10% 110%, var(--paper-warm) 0%, transparent 55%),
      var(--paper);
    min-height:100vh; padding-bottom: 40px;
  }
  .flove-bar{
    position:sticky; top:0; z-index:50;
    background:transparent;
  }
  .flove-bar .flove-mark{ font-size:52px; filter:drop-shadow(0 0 6px var(--accent-glow)) }
  .flove-bar .flove-app-name{ font-family:var(--font-display); font-weight:600; font-size:2em }

  .container{ max-width:980px; margin:0 auto; padding: 24px 18px 0 }

  /* Card */
  .card{
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 22px;
    margin: 0 0 18px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow var(--fast), transform var(--fast);
  }
  .card.pop-in{ animation: pop .35s cubic-bezier(.2,.8,.2,1) }
  @keyframes pop{ from{ opacity:0; transform: translateY(8px) scale(.985) } to{ opacity:1; transform:none } }

  .add-row{ margin-top: 18px }
  .grid{
    display: grid;
    grid-template-columns: repeat(2, minmax(0,1fr));
    gap: 14px;
  }
  @media (max-width: 720px){ .grid{ grid-template-columns: 1fr } }

  .field{
    display:flex; flex-direction:column; gap:6px;
  }
  .field > span{
    display: inline-flex; align-items:center; gap:6px;
    font-size: 11px; font-weight: 700; letter-spacing:.05em;
    color: var(--ink-soft); text-transform: uppercase;
  }
  .field input[type=text], .field input[type=file], .field textarea{
    width:100%; padding: 11px 13px;
    background: transparent; border: 3px solid #000;
    border-radius: var(--radius-sm);
    font: 15px/1.4 var(--font-ui); color: inherit;
    transition: all var(--fast);
  }
  .field textarea{ resize: none; min-height: 64px }
  .field input[type=text]:focus, .field input[type=file]:focus, .field textarea:focus{
    outline: none; border-color: var(--accent); background: transparent;
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .span-2{ grid-column: 1 / -1 }

  /* Description with media + mic tools on its lower border */
  .field-desc{ padding-bottom: 20px }
  .desc-wrap{ position: relative; width: 100% }
  .desc-tools{
    position: absolute; left: 50%; bottom: -16px; transform: translateX(-50%);
    display: flex; gap: 8px;
  }
  .desc-tool{
    width: 32px; height: 32px; padding: 0; border-radius: 50%;
    border: 1px solid var(--line-strong); background: #fff;
    color: var(--ink-soft); cursor: pointer;
    display: grid; place-items: center;
    box-shadow: var(--shadow-xs); transition: all var(--fast);
  }
  .desc-tool:hover{ border-color: var(--accent); color: var(--accent-deep); transform: translateY(-1px) }

  /* Type pills */
  .type-pills{ display:flex; gap: 8px; flex-wrap: wrap; margin-top: 2px }
  .type-pills input{ position: absolute; opacity: 0; pointer-events: none }
  .type-pills .pill{
    display:inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    background: #fff; border: 1px solid var(--line-strong); border-radius: var(--radius-pill);
    cursor: pointer; font: 600 .88rem/1 var(--font-ui);
    transition: all var(--fast);
  }
  .type-pills .pill:hover{ transform: translateY(-1px); border-color: var(--accent) }
  .type-pills input:checked + .pill{
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent-deep);
    box-shadow: 0 4px 12px -4px var(--accent-glow);
  }

  /* Range */
  .range-wrap{ position: relative; padding-top: 2px }
  .range-wrap input[type=range]{
    width:100%; appearance: none; height: 8px; border-radius: var(--radius-pill);
    background: linear-gradient(90deg, var(--line-strong), var(--accent));
    outline: none;
  }
  .range-wrap input[type=range]::-webkit-slider-thumb{
    appearance:none; width:22px; height:22px; border-radius:50%;
    background: #fff; border: 3px solid var(--accent); cursor: pointer;
    box-shadow: 0 4px 12px -2px var(--accent-glow); margin-top:-1px;
  }
  .range-wrap input[type=range]::-moz-range-thumb{
    width:22px; height:22px; border-radius:50%; background:#fff;
    border:3px solid var(--accent); cursor:pointer;
    box-shadow: 0 4px 12px -2px var(--accent-glow);
  }
  .range-hints{
    display:flex; justify-content: space-between; margin-top: 8px;
    color: var(--muted); font-size: .78rem; font-weight: 500;
  }
  .range-hints small{ visibility: hidden }
  .range-hints small.on{ visibility: visible; color: var(--accent-deep); font-weight: 700 }

  /* Reasons */
  .reasons{ margin-top: 18px }
  .reasons > h3{
    font-family: var(--font-display); font-weight: 600; font-size: 1rem;
    margin: 0 0 10px; color: var(--ink); display: flex; align-items: center; gap: 6px;
  }
  .reason-group{
    border: 1px dashed var(--line-strong); border-radius: var(--radius);
    padding: 12px 14px; margin-top: 12px;
    background: var(--paper);
  }
  .reason-group legend{
    padding: 0 10px;
    font: 700 .85rem/1 var(--font-ui); color: var(--type-c, var(--ink-soft));
    background: #fff; border: 1px solid var(--line-strong); border-radius: var(--radius-pill);
    margin-left: -4px;
  }
  .reason-group[data-group="Offering"]   { --type-c: var(--accent) }
  .reason-group[data-group="Gifting"]    { --type-c: var(--t-gift) }
  .reason-group[data-group="Lending"]    { --type-c: var(--t-lend) }
  .reason-group[data-group="Exchanging"] { --type-c: var(--t-exc) }
  .reason-group legend a{ color: var(--accent-deep); text-decoration: underline; text-underline-offset: 2px }

  .chips{ display:flex; flex-wrap: wrap; gap: 6px; margin-top: 8px }
  .chip{
    appearance: none;
    padding: 6px 12px; border-radius: var(--radius-pill);
    background: #fff;
    border: 1px solid var(--line-strong);
    color: var(--ink); cursor: pointer;
    font: 500 .85rem/1.3 var(--font-ui);
    transition: all var(--fast);
  }
  .chip:hover{
    background: color-mix(in srgb, var(--type-c, var(--accent)) 14%, #fff);
    border-color: var(--type-c, var(--accent));
    transform: translateY(-1px);
  }

  /* Actions */
  .actions{ display:flex; gap:8px; flex-wrap:wrap; margin-top: 18px }
  .btn{
    display:inline-flex; align-items:center; gap:6px;
    padding: 11px 18px; border-radius: var(--radius-pill);
    border: 1px solid var(--line-strong); background: #fff; color: var(--ink);
    font: 600 .92rem/1 var(--font-ui); cursor: pointer;
    transition: all var(--fast); text-decoration: none;
    box-shadow: var(--shadow-xs);
  }
  .btn:hover{ border-color: var(--accent); color: var(--accent-deep); transform: translateY(-1px) }
  .btn.primary{
    background: linear-gradient(180deg, var(--accent), var(--accent-deep));
    color: #fff; border-color: transparent;
    box-shadow: 0 8px 20px -6px var(--accent-glow);
  }
  .btn.primary:hover{ color:#fff; filter: brightness(1.06) }
  .btn.ghost{ background: transparent; box-shadow: none }
  .btn.subtle{ background: var(--paper-warm); color: var(--accent-deep) }
  .btn.tiny{ padding: 6px 12px; font-size: .82rem }
  .clone-offer{
    padding: 11px 22px; font-size: .84rem; font-weight: 700;
    background: linear-gradient(180deg, var(--accent), var(--accent-deep));
    color: #fff; border-color: transparent;
    box-shadow: 0 8px 18px -6px var(--accent-glow);
  }
  .clone-offer:hover{ color:#fff; filter: brightness(1.06) }

  /* Tooltips (CSS only) */
  [data-tip]{ position: relative }
  [data-tip]:hover::after{
    content: attr(data-tip);
    position: absolute; left: 50%; bottom: calc(100% + 8px);
    transform: translateX(-50%);
    background: var(--ink); color: #fff;
    padding: 8px 12px; border-radius: var(--radius-sm);
    font: 500 .82rem/1.45 var(--font-ui); white-space: pre-wrap; text-align: left;
    width: max-content; max-width: 40ch;
    box-shadow: 0 10px 28px -6px rgba(0,0,0,.25);
    z-index: 10;
    pointer-events: none;
  }

  /* Buttons: click 3 times, colour deepens each click */
  button[data-clicks="1"]{ background: var(--accent-soft); border-color: var(--accent); color: var(--accent-deep) }
  button[data-clicks="2"]{ background: var(--accent); border-color: var(--accent); color: #fff }
  button[data-clicks="3"]{ background: var(--accent-deep); border-color: var(--accent-deep); color: #fff }

  /* Preference rater (revealed on tapping the condition bar) */
  .pref-rater{ margin-top: 16px; text-align: center }
  .pref-rater[hidden]{ display: none }
  .pref-title{
    font-size: 11px; font-weight: 700; letter-spacing: .05em;
    text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px;
  }
  .pref-scale{ display: inline-flex; gap: 6px }
  .pref-dot{
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid var(--line-strong); background: #fff;
    color: var(--ink-soft); font: 600 .8rem/1 var(--font-ui); cursor: pointer;
    transition: all var(--fast);
  }
  .pref-dot:hover{ border-color: var(--accent); transform: translateY(-1px) }
  .pref-dot.sel{ background: var(--accent); border-color: var(--accent); color: #fff }
  .pref-scale.has-sel .pref-dot:not(.sel){ opacity: .5 }

  @media print{
    .flove-bar, .clone-offer, [data-tip]:hover::after{ display:none !important }
    body{ background:#fff }
    .card{ box-shadow:none; border:1px solid #ccc }
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ animation-duration:.01ms !important; transition-duration:.01ms !important }
  }
</style>
</head>
<body>

<div class="flove-bar">
  <svg class="flove-mark" aria-hidden="true" viewBox="0 0 100 100" width="1em" height="1em" style="vertical-align:-.18em; overflow:visible;">
    <defs>
      <linearGradient id="g-offer" x1="14" y1="14" x2="86" y2="86" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#dc2626"/>
        <stop offset="55%" stop-color="#ef4444"/>
        <stop offset="100%" stop-color="#f59e0b"/>
      </linearGradient>
    </defs>
    <g fill="url(#g-offer)" stroke="none">
      <path d="M50 8 L58 42 L92 50 L58 58 L50 92 L42 58 L8 50 L42 42 Z"/>
    </g>
    <g fill="none" stroke="url(#g-offer)" stroke-width="3" stroke-linecap="round">
      <circle cx="50" cy="50" r="22"/>
    </g>
  </svg>
  <span class="flove-app-name">MiniOffer</span>
  <span class="flove-spacer"></span>
  <a class="flove-home" href="../index.html" aria-label="Back to flove launcher">flove</a>
</div>

<main class="container">

  <section class="card offer-card" data-offer-index="1">
    <form class="offer-form" action="#" method="get">
      <div class="grid">
        <label class="field" data-tip="Give it a cute, clear name">
          <input type="text" name="title-1" placeholder="" required>
        </label>

        <label class="field" data-tip="Pick the main path">
          <div class="type-pills">
            <input type="checkbox" name="type-1" id="t-gift-1" value="Gift" checked>
            <label for="t-gift-1" class="pill">Gift</label>

            <input type="checkbox" name="type-1" id="t-lend-1" value="Lend">
            <label for="t-lend-1" class="pill">Lend</label>

            <input type="checkbox" name="type-1" id="t-exc-1" value="Exchange">
            <label for="t-exc-1" class="pill">Exchange</label>
          </div>
        </label>

        <label class="field field-desc" data-tip="A couple of lines people can skim">
          <div class="desc-wrap">
            <textarea name="desc-1" rows="3" placeholder="

Where:"></textarea>
            <div class="desc-tools">
              <button type="button" class="desc-tool" aria-label="Add media" data-tip="Attach a photo or video">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <circle cx="8.5" cy="8.5" r="1.6"/>
                  <path d="M21 15l-5-5L5 21"/>
                </svg>
              </button>
              <button type="button" class="desc-tool" aria-label="Voice note" data-tip="Record a voice note">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="2" width="6" height="11" rx="3"/>
                  <path d="M5 10v1a7 7 0 0 0 14 0v-1"/>
                  <line x1="12" y1="18" x2="12" y2="22"/>
                </svg>
              </button>
            </div>
          </div>
        </label>

        <label class="field" data-tip="How loved is it?">
          <div class="range-wrap">
            <input type="range" name="cond-1" min="1" max="5" value="4">
            <div class="range-hints">
              <small>Poor</small><small>Fair</small><small>Good</small><small>High quality</small>
            </div>
          </div>
        </label>
      </div>

      <div class="add-row">
        <button class="btn clone-offer" type="button" data-tip="Duplicate this block to add another item">Add more</button>
      </div>

      <div class="pref-rater" hidden>
        <div class="pref-title">Preference</div>
        <div class="pref-scale" role="radiogroup" aria-label="Preference">
          <button type="button" class="pref-dot" value="1">1</button>
          <button type="button" class="pref-dot" value="2">2</button>
          <button type="button" class="pref-dot" value="3">3</button>
          <button type="button" class="pref-dot" value="4">4</button>
          <button type="button" class="pref-dot" value="5">5</button>
        </div>
      </div>
    </form>
  </section>

</main>

<script>
// Condition rater: show only the hint where the slider is placed.
// (A range input's value can't be read in pure CSS, so this needs JS.)
(function(){
  document.querySelectorAll(".range-wrap").forEach(function(wrap){
    var range = wrap.querySelector("input[type=range]");
    var hints = [].slice.call(wrap.querySelectorAll(".range-hints small"));
    if (!range || !hints.length) return;
    function sync(){
      var pct = (range.value - range.min) / (range.max - range.min);
      var i = Math.round(pct * (hints.length - 1));
      hints.forEach(function(h, k){ h.classList.toggle("on", k === i); });
    }
    range.addEventListener("input", sync);
    sync();
  });
})();

// Preference rater: revealed only when the condition bar is tapped.
(function(){
  document.querySelectorAll(".offer-form").forEach(function(form){
    var bar    = form.querySelector(".range-wrap input[type=range]");
    var rater  = form.querySelector(".pref-rater");
    if (bar && rater){
      var reveal = function(){ rater.hidden = false; };
      bar.addEventListener("pointerdown", reveal);
      bar.addEventListener("click", reveal);
    }
    var scale = form.querySelector(".pref-scale");
    if (scale){
      scale.querySelectorAll(".pref-dot").forEach(function(dot){
        dot.addEventListener("click", function(){
          scale.querySelectorAll(".pref-dot").forEach(function(d){
            d.classList.toggle("sel", d === dot);
          });
          scale.classList.add("has-sel");
        });
      });
    }
  });
})();

// Buttons: each click deepens the colour, up to 3 clicks.
(function(){
  document.querySelectorAll("button:not(.pref-dot)").forEach(function(btn){
    btn.addEventListener("click", function(){
      var n = parseInt(btn.dataset.clicks || "0", 10);
      if (n < 3) btn.dataset.clicks = String(n + 1);
    });
  });
})();
</script>

</body>
</html>
