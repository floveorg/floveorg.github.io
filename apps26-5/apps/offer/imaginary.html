<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>✺ flove · Imaginary · Real Realyns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Marcellus&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../flove.css">
<style>
  :root{
    --app-accent:        #6366f1;
    --app-accent-soft:   #e0e7ff;
    --app-ink-on-accent: #1e1b4b;

    --paper:       #fafaff;
    --paper-warm:  #f4f3ff;
    --ink:         #1a1832;
    --ink-soft:    #3f3a6b;
    --muted:       #8b87b3;
    --line:        rgba(60,40,170,.08);
    --line-strong: rgba(60,40,170,.16);

    --accent:      #6366f1;
    --accent-deep: #4338ca;
    --accent-soft: #e0e7ff;
    --accent-glow: rgba(99,102,241,.22);
    --mint:        #14b8a6;
    --rose:        #f43f5e;

    --radius-sm: 12px; --radius: 18px; --radius-lg: 24px; --radius-pill: 999px;
    --shadow-xs: 0 1px 2px rgba(60,40,170,.05);
    --shadow-sm: 0 4px 12px -4px rgba(60,40,170,.10);
    --fast: .15s cubic-bezier(.2,.8,.2,1);
    --font-ui: 'Inter', system-ui, sans-serif;
    --font-display: 'Fraunces', 'Marcellus', Georgia, serif;
  }
  *{ box-sizing:border-box }
  body{
    margin:0; font:15px/1.55 var(--font-ui); color:var(--ink);
    background:
      radial-gradient(900px 600px at 90% -10%, var(--accent-soft) 0%, transparent 60%),
      radial-gradient(700px 500px at -10% 110%, #ccfbf1 0%, transparent 55%),
      var(--paper);
    min-height:100vh; padding-bottom: 60px;
    position: relative;
  }
  /* Subtle starlets */
  body::before{
    content:"";
    position: fixed; inset: 0; pointer-events: none; z-index: -1;
    background-image:
      radial-gradient(2px 2px at 12% 22%, #c7d2fe 60%, transparent 65%),
      radial-gradient(1.5px 1.5px at 78% 14%, #a5f3fc 60%, transparent 65%),
      radial-gradient(2px 2px at 35% 80%, #fbcfe8 60%, transparent 65%),
      radial-gradient(1px 1px at 65% 55%, #c4b5fd 60%, transparent 65%),
      radial-gradient(2px 2px at 90% 75%, #c7d2fe 60%, transparent 65%);
    opacity: .7;
    animation: twinkle 7s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{ opacity:.4 } 50%{ opacity:.8 } }

  .flove-bar{
    position:sticky; top:0; z-index:50;
    background:rgba(250,250,255,.78);
    backdrop-filter:blur(14px) saturate(160%);
    -webkit-backdrop-filter:blur(14px) saturate(160%);
    border-bottom:1px solid var(--line-strong);
  }
  .flove-bar .flove-mark{ font-size:26px; color:var(--accent); filter:drop-shadow(0 0 6px var(--accent-glow)) }
  .flove-bar .flove-app-name{ font-family:var(--font-display); font-weight:600 }
  .flove-bar .flove-tag{ color:var(--muted) }
  .flove-bar .flove-asterism{ animation-play-state:paused }
  body:hover .flove-bar .flove-asterism, body:focus-within .flove-bar .flove-asterism{ animation-play-state:running }

  .container{ max-width:1000px; margin:0 auto; padding: 24px 18px 0 }

  .hero{ text-align:center; padding: 24px 0 18px }
  .hero h1{
    font-family: 'Marcellus', var(--font-display); font-weight:400;
    font-size: clamp(2rem, 4vw, 3rem);
    margin: 0; letter-spacing:.01em;
  }
  .hero h1 .sparkle{
    color: var(--accent); display: inline-block;
    animation: spin 12s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg) } }
  .hero p{ color: var(--muted); margin: 4px 0 0; font-size: 1rem }

  .actions-bar{ display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin: 12px 0 18px }
  .btn{
    display:inline-flex; align-items:center; gap:6px;
    padding: 10px 16px; border-radius: var(--radius-pill);
    border: 1px solid var(--line-strong); background:#fff; color: var(--ink);
    font: 600 .85rem/1 var(--font-ui); cursor: pointer;
    transition: all var(--fast); text-decoration: none; box-shadow: var(--shadow-xs);
  }
  .btn:hover{ border-color: var(--accent); color: var(--accent-deep); transform: translateY(-1px) }
  .btn.primary{
    background: linear-gradient(180deg, var(--accent), var(--accent-deep));
    color: #fff; border-color: transparent;
    box-shadow: 0 8px 18px -6px var(--accent-glow);
  }
  .btn.primary:hover{ color:#fff; filter:brightness(1.06) }
  .btn.ghost{ background: transparent; box-shadow: none }
  .btn.small{ padding: 8px 12px; font-size: .82rem }

  .card{
    background:#fff;
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 22px;
    box-shadow: var(--shadow-sm);
  }

  .grid-realyn{
    display: grid;
    grid-template-columns: 200px 1fr 1fr;
    gap: 0;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .grid-realyn .cell{
    padding: 14px;
    border-right: 1px dashed var(--line-strong);
    border-bottom: 1px dashed var(--line-strong);
    min-height: 110px;
  }
  .grid-realyn .cell:nth-child(3n){ border-right: 0 }
  .grid-realyn .cell:nth-last-child(-n+3){ border-bottom: 0 }

  .corner{
    background: linear-gradient(135deg, var(--accent-soft), #ccfbf1);
    display:flex; align-items:center; justify-content:center;
    min-height: 70px;
    font: italic 600 .9rem/1.3 var(--font-display);
    color: var(--accent-deep);
  }
  .colhead{
    background: var(--paper-warm);
    font-family: var(--font-display); font-weight: 600;
    font-size: .92rem;
    color: var(--accent-deep);
    text-align: center;
    letter-spacing: .04em;
    text-transform: uppercase;
    display:flex; align-items:center; justify-content:center; gap:6px;
    min-height: 70px;
  }
  .colhead.fictional{ color: var(--mint); background: #ecfdf5 }
  .colhead::before{ content:""; width:8px; height:8px; border-radius:50%; background: currentColor }

  .rowhead{
    background: var(--paper);
    display:flex; flex-direction:column; justify-content:center; gap: 2px;
  }
  .rowhead .rowtitle{
    font-family: var(--font-display); font-weight: 600;
    font-size: 1.05rem; color: var(--ink);
  }
  .rowhead small{ color: var(--muted); font-size: .82rem; line-height: 1.4 }

  textarea, input[type=text], input[type=date]{
    width: 100%;
    padding: 10px 12px;
    background: var(--paper);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    font: 14px/1.5 var(--font-ui);
    color: inherit;
    resize: vertical;
    min-height: 80px;
    transition: all var(--fast);
  }
  input[type=text], input[type=date]{ min-height: auto }
  textarea::placeholder, input::placeholder{ color: var(--muted) }
  textarea:focus, input:focus{
    outline: none; border-color: var(--accent); background: #fff;
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  /* Fictional cells get a subtle different bg */
  .cell.fictional textarea{
    background: #f0fdf4;
    border-color: rgba(20,184,166,.16);
  }
  .cell.fictional textarea:focus{
    border-color: var(--mint);
    box-shadow: 0 0 0 3px rgba(20,184,166,.22);
  }

  .meta{
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 14px;
    margin-top: 18px;
  }
  .meta .full{ grid-column: 1 / -1 }
  .meta-field label{
    display:block; font: 700 11px/1 var(--font-ui);
    letter-spacing: .04em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 6px;
  }
  @media (max-width: 720px){ .meta{ grid-template-columns: 1fr } }
  @media (max-width: 720px){
    .grid-realyn{ grid-template-columns: 1fr }
    .corner, .colhead{ display: none }
    .cell{ border-right: 0 }
    .rowhead{ border-top: 1px solid var(--line) }
  }

  .actions-foot{
    display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;
    margin-top: 18px;
  }

  .word-count{ color: var(--muted); font-size:.82rem; margin-right:auto; align-self:center }
  .word-count strong{ color: var(--accent-deep) }

  .toast{
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(12px);
    background: var(--ink); color: #fff;
    padding: 10px 18px; border-radius: var(--radius-pill);
    font: 600 13px/1 var(--font-ui);
    opacity: 0; pointer-events: none; transition: all .25s; z-index: 100;
  }
  .toast.is-visible{ opacity: 1; transform: translateX(-50%) translateY(0) }

  @media print{
    .flove-bar, .actions-bar, .actions-foot, body::before{ display:none !important }
    body{ background:#fff }
    .card{ box-shadow:none; border:1px solid #ccc }
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ animation-duration:.01ms !important; transition-duration:.01ms !important }
  }
</style>
</head>
<body>

<div class="flove-bar">
  <a class="flove-home" href="../index.html" aria-label="Back to flove launcher">←</a>
  <span class="flove-mark flove-asterism" aria-hidden="true">✺</span>
  <span class="flove-app-name">Imaginary</span>
  <span class="flove-tag">real realyns</span>
  <span class="flove-spacer"></span>
</div>

<main class="container">

  <header class="hero">
    <h1>Real <span class="sparkle">✧</span> Realyns</h1>
    <p>Capture ideas across reality and imagination.</p>
  </header>

  <div class="actions-bar">
    <button class="btn small" type="button" id="sparkBtn">✨ Surprise me</button>
    <button class="btn small" type="button" id="exportBtn">⬇ JSON</button>
    <button class="btn small" type="button" id="printBtn">🖨 Print</button>
    <button class="btn small" type="button" id="resetBtn">↺ Reset</button>
  </div>

  <form class="card" id="realynForm" autocomplete="on">

    <div class="grid-realyn">
      <div class="cell corner"><span>Real ↔ Fictional</span></div>
      <div class="cell colhead">Real</div>
      <div class="cell colhead fictional">Fictional</div>

      <div class="cell rowhead">
        <span class="rowtitle">Event</span>
        <small>something that happened / could happen</small>
      </div>
      <div class="cell">
        <textarea id="event-real" name="event_real" placeholder="e.g., community garden opening…"></textarea>
      </div>
      <div class="cell fictional">
        <textarea id="event-fic" name="event_fictional" placeholder="e.g., moonlight festival on a floating island…"></textarea>
      </div>

      <div class="cell rowhead">
        <span class="rowtitle">Simple Fact</span>
        <small>a clear statement</small>
      </div>
      <div class="cell">
        <textarea id="fact-real" name="fact_real" placeholder="e.g., seeds sprout in 3–7 days…"></textarea>
      </div>
      <div class="cell fictional">
        <textarea id="fact-fic" name="fact_fictional" placeholder="e.g., moths deliver tiny letters at dawn…"></textarea>
      </div>

      <div class="cell rowhead">
        <span class="rowtitle">Abstract Idea</span>
        <small>a concept or principle</small>
      </div>
      <div class="cell">
        <textarea id="idea-real" name="idea_real" placeholder="e.g., mutual aid as long-term resilience…"></textarea>
      </div>
      <div class="cell fictional">
        <textarea id="idea-fic" name="idea_fictional" placeholder="e.g., rivers remember names whispered to them…"></textarea>
      </div>

      <div class="cell rowhead">
        <span class="rowtitle">Project</span>
        <small>an organized effort</small>
      </div>
      <div class="cell">
        <textarea id="proj-real" name="project_real" placeholder="e.g., build a seed library and workshop series…"></textarea>
      </div>
      <div class="cell fictional">
        <textarea id="proj-fic" name="project_fictional" placeholder="e.g., cartography of dreams in starlight ink…"></textarea>
      </div>
    </div>

    <section class="meta">
      <div class="meta-field">
        <label for="author">Author</label>
        <input id="author" name="author" type="text" placeholder="Your name or crew">
      </div>
      <div class="meta-field">
        <label for="date">Date</label>
        <input id="date" name="date" type="date">
      </div>
      <div class="meta-field full">
        <label for="notes">Whispers &amp; notes</label>
        <textarea id="notes" name="notes" placeholder="Context, sources, feelings…"></textarea>
      </div>
    </section>

    <footer class="actions-foot">
      <span class="word-count" id="wordCount"><strong>0</strong> words</span>
      <button type="reset" class="btn ghost">Clear</button>
      <button type="button" class="btn" id="saveBtn">Save</button>
      <button type="submit" class="btn primary" id="sendBtn">Send</button>
      <button type="button" class="btn primary" id="publishBtn">Publish</button>
    </footer>
  </form>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  "use strict";
  const $  = (s,r=document) => r.querySelector(s);
  const $$ = (s,r=document) => [...r.querySelectorAll(s)];
  const KEY = "flove:imaginary:v1";

  const SPARKS = [
    "a forgotten lantern relighting itself",
    "what if invoices could blush",
    "a recipe written by the wind",
    "a meeting agenda that thanks every person",
    "a tool that lends itself before being asked",
    "a treaty between hours and minutes",
    "a community shelf with infinite middle",
    "a calendar where Tuesday is optional",
    "an opening hours sign that whispers stories",
    "an app whose only feature is gratitude"
  ];

  let toastT;
  const toast = m => { const el=$("#toast"); el.textContent=m; el.classList.add("is-visible"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("is-visible"),1700); };

  function snapshot(){
    const out = {};
    $$("#realynForm textarea, #realynForm input").forEach(el => { if (el.name) out[el.name] = el.value; });
    return out;
  }
  function restore(){
    let d; try{ d = JSON.parse(localStorage.getItem(KEY) || "null"); }catch(e){ return; }
    if (!d) return;
    Object.entries(d).forEach(([k,v]) => {
      const el = document.querySelector(`#realynForm [name="${k}"]`); if (el) el.value = v;
    });
  }
  let saveT;
  function save(){ clearTimeout(saveT); saveT = setTimeout(()=>{ try{ localStorage.setItem(KEY, JSON.stringify(snapshot())); }catch(e){} }, 250); }

  function wordCount(){
    const text = $$("#realynForm textarea, #realynForm input[type=text]").map(el => el.value).join(" ");
    const n = text.trim() ? text.trim().split(/\s+/).length : 0;
    $("#wordCount").firstElementChild.textContent = n;
  }
  function refresh(){ wordCount(); save(); }

  $("#realynForm").addEventListener("input", refresh);

  $("#sparkBtn").addEventListener("click", () => {
    // Fill a random empty fictional cell with a spark
    const empties = $$('.cell.fictional textarea').filter(t => !t.value.trim());
    const target  = empties[Math.floor(Math.random() * empties.length)] || $$('.cell.fictional textarea')[0];
    target.value = SPARKS[Math.floor(Math.random() * SPARKS.length)];
    refresh();
    target.focus();
    toast("✨ Sparkled");
  });

  $("#exportBtn").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(snapshot(), null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "realyn.json";
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ a.remove(); URL.revokeObjectURL(url); }, 80);
    toast("Exported JSON");
  });
  $("#printBtn").addEventListener("click", () => window.print());
  $("#resetBtn").addEventListener("click", () => {
    if (!confirm("Clear all cells?")) return;
    try{ localStorage.removeItem(KEY); }catch(_){}
    location.reload();
  });
  $("#saveBtn").addEventListener("click", () => { save(); toast("Saved locally"); });
  $("#sendBtn").addEventListener("click", e => { e.preventDefault(); toast("✓ Sent (demo)"); });
  $("#publishBtn").addEventListener("click", () => toast("✓ Published (demo)"));

  restore();
  wordCount();
})();
</script>
</body>
</html>
