<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlovyTier</title>
<meta name="description" content="FlovyTier — the flovy tier switcher: flip between the Mini, Basic and Advanced tiers in place, and step out to the Normal tier. Pure CSS, no JavaScript; each tier stays its own file.">
<!-- Favicon: inline SVG heart in the flovy accent (#d32f2f) — no external file. -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path fill='%23d32f2f' d='M16 27.5C16 27.5 3.5 19.8 3.5 11.2 3.5 7.3 6.6 4.5 10 4.5 12.7 4.5 15 6 16 8.2 17 6 19.3 4.5 22 4.5 25.4 4.5 28.5 7.3 28.5 11.2 28.5 19.8 16 27.5 16 27.5Z'/></svg>">
<style>
/* ============================================================
   flovytier — Pure-CSS tier switcher.

   A thin wrapper with NO JavaScript of its own.
   • Mini, Basic, Advanced — switch in place via radio inputs
     driving which <iframe> shows (sibling combinator ~). An
     embedded tier's own scripts (Advanced loads flove.js) run
     sandboxed inside that iframe document, so this wrapper itself
     still stays JS-free.
   • Normal is intentionally NOT embedded — it is a plain link out
     to flovynormal.html (a click to another file).

   No markup is duplicated — each tier keeps living in its own file
   (flovymini / flovybasic / flovynormal / flovyadvanced .html) as
   the single source of truth; this file only ever points at it.
   ============================================================ */

:root{
  --accent-rgb: 211, 47, 47;
  --accent:     rgb(var(--accent-rgb));
  --accent-deep:#9a0007;
  --ink:        #212121;
  --ink-soft:   #5a5a5a;
  --line:       rgba(0, 0, 0, .10);
  --line-strong:rgba(0, 0, 0, .18);
  --fill-soft:  rgba(var(--accent-rgb), .07);
  --font-ui:    'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --fast:       .18s ease;
}

*{ box-sizing: border-box; }

html, body{ height: 100%; }
body{
  margin: 0;
  display: flex;
  flex-direction: column;
  font-family: var(--font-ui);
  color: var(--ink);
  background:
    radial-gradient(circle at 20% 20%, var(--fill-soft), transparent 45%),
    linear-gradient(180deg, #fafafa, #d9d9d9);
}

/* hidden state inputs — kept focusable for keyboard users */
.tier-ctl{
  position: absolute;
  width: 1px; height: 1px;
  opacity: 0;
  pointer-events: none;
}

/* ── the switching bar ─────────────────────────────────────── */
.tier-bar{
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: .4rem;
  padding: .55rem .9rem;
  background: rgba(255, 255, 255, .82);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid var(--line);
}
.tier-brand{
  display: inline-flex;
  align-items: baseline;
  gap: .4rem;
  margin-right: auto;
  font-weight: 800;
  letter-spacing: .01em;
}
.tier-brand .tier-heart{ color: var(--accent); }
.tier-brand .tier-sub{
  font-weight: 600;
  font-size: .78rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

/* shared tab look — switch tabs and the Normal link tab alike */
.tier-tab{
  padding: .42rem 1.05rem;
  border-radius: 999px;
  border: 1px solid var(--line-strong);
  font: 700 .82rem/1 var(--font-ui);
  letter-spacing: .03em;
  color: var(--ink);
  background: transparent;
  text-decoration: none;
  cursor: pointer;
  transition: opacity var(--fast), background var(--fast),
              color var(--fast), border-color var(--fast),
              transform var(--fast), box-shadow var(--fast);
}
.tier-tab:focus-visible{
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* the two in-place switch tabs use the dim-unselected pattern:
   until a tier wins, both read at half strength. */
.tier-tab--switch{ opacity: .5; }
.tier-tab--switch:hover{ opacity: .8; }
.tier-tab--switch:focus-visible{ opacity: 1; }

/* selected switch tab — full strength, accent fill */
#tier-mini:checked     ~ .tier-bar .tier-tab[for="tier-mini"],
#tier-basic:checked    ~ .tier-bar .tier-tab[for="tier-basic"],
#tier-advanced:checked ~ .tier-bar .tier-tab[for="tier-advanced"]{
  opacity: 1;
  color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  border-color: var(--accent-deep);
  transform: translateY(-1px);
  box-shadow: 0 5px 14px rgba(var(--accent-rgb), .28);
}

/* Normal — a link OUT to flovynormal.html (the JS tier). Styled as a
   ghost tab with a ↗ so it reads as "opens the other file". */
.tier-tab--link{
  color: var(--accent-deep);
  border-style: dashed;
  border-color: var(--accent);
}
.tier-tab--link::after{
  content: " \2197";          /* ↗ */
  font-weight: 800;
}
.tier-tab--link:hover{
  background: var(--fill-soft);
  transform: translateY(-1px);
}

/* ── the tier stage ────────────────────────────────────────── */
.tier-stage{
  flex: 1 1 auto;
  position: relative;
  min-height: 0;            /* let the iframe shrink inside flex */
}
.tier-frame{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  display: none;            /* hidden tier stays mounted, just unshown */
  background: #fff;
}
#tier-mini:checked     ~ .tier-stage .tier-frame--mini,
#tier-basic:checked    ~ .tier-stage .tier-frame--basic,
#tier-advanced:checked ~ .tier-stage .tier-frame--advanced{
  display: block;
}

@media (max-width: 460px){
  .tier-brand .tier-sub{ display: none; }
  .tier-tab{ padding: .42rem .8rem; }
}
</style>
</head>
<body>

<!-- tier state — basic is the default landing tier -->
<input type="radio" name="tier" id="tier-mini"     class="tier-ctl">
<input type="radio" name="tier" id="tier-basic"    class="tier-ctl" checked>
<input type="radio" name="tier" id="tier-advanced" class="tier-ctl">

<!-- Tier switcher bar removed — tier navigation now lives inside each
     tier's own menu (the menu-nav bar in flovymini / flovybasic /
     flovynormal / flovyadvanced). This wrapper just embeds the tiers;
     #tier-basic is checked so Basic shows, and you switch by using
     the tier links in that embedded app's menu. -->

<div class="tier-stage">
  <iframe class="tier-frame tier-frame--mini"     src="flovymini.html"     title="flovy — Mini tier"     loading="lazy"></iframe>
  <iframe class="tier-frame tier-frame--basic"    src="flovybasic.html"    title="flovy — Basic tier"    loading="lazy"></iframe>
  <iframe class="tier-frame tier-frame--advanced" src="flovyadvanced.html" title="flovy — Advanced tier" loading="lazy"></iframe>
</div>

</body>
</html>
