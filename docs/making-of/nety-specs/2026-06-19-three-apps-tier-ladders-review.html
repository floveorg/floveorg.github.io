<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apps × navs — brainstorm review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Sora:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6f2ea; --ink:#241c12; --muted:#766a57; --line:#ddd2bf;
    --mini:#02855c; --basic:#c07a2b; --normal:#6c5ce7; --advanced:#247ba0; --super:#b03a6e;
    --profily:#e8762f; --social:#0e9aa7; --sety:#6c5ce7; --wizy:#247ba0; --vizy:#c0349d;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:
      radial-gradient(1200px 600px at 15% -10%, #fff8ee 0%, transparent 60%),
      radial-gradient(1000px 700px at 110% 10%, #f3ede0 0%, transparent 55%),
      var(--paper);
    color:var(--ink); font-family:'Sora',system-ui,sans-serif; line-height:1.5;
    padding:clamp(1rem,4vw,3rem);
  }
  .wrap{max-width:1280px;margin:0 auto}

  .scroll{overflow-x:auto;border:1px solid var(--line);border-radius:1rem;background:#fff;box-shadow:0 6px 26px rgba(70,50,15,.06)}
  table.matrix{border-collapse:separate;border-spacing:0;width:100%;min-width:1080px;table-layout:fixed}
  table.matrix col.appcol{width:140px}
  table.matrix th,table.matrix td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);vertical-align:top;text-align:left}
  table.matrix tr td:last-child,table.matrix tr th:last-child{border-right:none}
  table.matrix tbody tr:last-child td,table.matrix tbody tr:last-child th{border-bottom:none}

  /* corner + nav headers (top cells) */
  th.corner{padding:.6rem .7rem;font-family:'Space Mono',monospace;font-size:.66rem;color:var(--muted);background:#fbf7ef}
  th.navth{padding:.55rem .75rem;background:#fbf7ef;--tc:var(--ink);cursor:pointer;user-select:none}
  th.navth:hover{background:#f6efe2}
  th.navth .navname{font-family:'Space Mono',monospace;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;color:var(--tc)}
  th.navth .navval{font-family:'Fraunces',serif;font-weight:600;font-size:.82rem;color:var(--ink);margin-top:.2rem}
  th.navth .navkw{font-size:.68rem;color:var(--muted);margin-top:.1rem}

  /* app row labels */
  th.approw{padding:.7rem .75rem;background:#fbf7ef;border-left:5px solid var(--ac)}
  th.approw b{font-family:'Fraunces',serif;font-weight:600;font-size:1.02rem;color:var(--ac);text-transform:capitalize}
  th.approw .approw-sub{display:block;font-weight:400;font-size:.68rem;color:var(--muted);margin-top:.15rem}

  /* feature cells — whole cell clickable */
  td.cell{padding:.55rem .7rem;background:#fff;cursor:pointer;user-select:none}
  td.cell:hover{background:#fffaf2}
  .fsum{display:flex;align-items:baseline;gap:.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.82rem}
  .mk{flex:none;display:inline-block;font-size:.62rem;color:var(--muted);transform:translateY(-1px);transition:transform .15s}
  td.cell.open .mk{transform:rotate(90deg) translateX(-1px)}
  .fn{flex:none;font-family:'Space Mono',monospace;font-size:.66rem;font-weight:700;color:#fff;background:var(--ink);border-radius:.35rem;padding:.05rem .32rem}
  .ftitle{font-weight:600;flex:none}
  .fshort{color:var(--muted);overflow:hidden;text-overflow:ellipsis}
  td.cell.open .fshort{display:none}
  .flist{display:none;margin:.35rem 0 .15rem;padding:0 .4rem 0 1.9rem;font-size:.81rem;color:#3c3327}
  td.cell.open .flist{display:block}
  .flist li{margin:.18rem 0}
  .htag{flex:none;font-family:'Space Mono',monospace;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
    background:var(--ac);color:#fff;border-radius:.3rem;padding:.05rem .3rem}
  .locktag{flex:none;font-size:.72rem;opacity:.7}

  /* HOME = the main feature of each row — strongly highlighted */
  td.cell.home{background:color-mix(in srgb, var(--ac) 9%, #fff);box-shadow:inset 0 0 0 2px var(--ac)}
  td.cell.home:hover{background:color-mix(in srgb, var(--ac) 14%, #fff)}
  td.cell.home .ftitle{color:var(--ac)}
  td.cell.home .fsum{font-weight:600}

  /* teaser = locked rung below an app's home */
  td.cell.teaser{background:repeating-linear-gradient(135deg,#faf6ee,#faf6ee 7px,#f1eadc 7px,#f1eadc 14px)}
  td.cell.teaser .ftitle,td.cell.teaser .fshort{color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">

  <div class="scroll"><div id="tbl"></div></div>

</div>

<script>
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const NAVS = [
    {key:`mini`,     val:`Contribute · appear · free`,    kw:`open resources → Global presence`},
    {key:`basic`,    val:`Play · store · belong`,         kw:`apps + profily + circle`},
    {key:`normal`,   val:`Tune · own · curate`,           kw:`data management`},
    {key:`advanced`, val:`Delegate · automate · finetune`,kw:`MyWizy agents + complex trust`},
    {key:`super`,    val:`Steward · host · govern`,       kw:`everything integrated`},
  ];
  const APPS = [
    {key:`profily`, emoji:`🟠`, sub:`identity`,       home:`mini`},
    {key:`social`,  emoji:`🟢`, sub:`connections`,    home:`basic`},
    {key:`sety`,    emoji:`🟣`, sub:`data/relations`, home:`normal`},
    {key:`wizy`,    emoji:`🔵`, sub:`agents`,         home:`advanced`},
    {key:`vizy`,    emoji:`🔮`, sub:`visualization`,  home:`super`},
  ];
  // feature[app|nav] = {n, title, short, teaser?, list[]}
  const F = {
    'profily|mini':     {n:6,  title:`Your public passport`, short:`your presence the moment nety runs`, list:[`@handle · peerId · presence · Global contribution · stage badge`,`Pure-CSS, read-only`,`mini’s headline: you appear`]},
    'profily|basic':    {n:9,  title:`Profile gets editable`,       short:`identity, personas, apps grid`, list:[`Editable avatar / bio / name`,`Manage-identity card (SuperUser + personas)`,`Wanty goals & wants chips`,`Apps-i-played grid (play & store)`,`View-only Trusts; Offers`,`Personal + Local + simple-Social online`]},
    'profily|normal':   {n:12, title:`Actionable Trusts + circles`, short:`add trusts, surface MyNet circles`, list:[`“Add a trust” → raises tier / earns stars`,`MyNet named circles (rings + tags)`,`Circle-level permissions`,`Deeper Souls reach`]},
    'profily|advanced': {n:15, title:`MyWizy-assisted`,            short:`agent-assisted compose & profile`, list:[`Compose & profile agent-assisted (Lovely/Joy/Wisdom → real agents)`,`Conditional trust rules per circle`]},
    'profily|super':    {n:18, title:`Stewardship surface`,        short:`vouch, host & govern others`, list:[`Vouch / host others`,`Governance badges`,`Donation directing on profile`,`Identity integrated across the stack`]},

    'social|mini':      {n:21, title:`Browse only`,    short:`see public activity, can’t connect`, teaser:true, list:[`Browse public mesh activity`,`Following, circles & chat locked`]},
    'social|basic':     {n:22, title:`MyNet core — heart of basic`, short:`follow, feed, chat, invites`, list:[`Follow / support people & groups`,`Favourites (★)`,`The social feed`,`Join basic circles`,`Text Chat (DMs)`,`Invite friends`,`Simple-Social online — this is “belong”`]},
    'social|normal':    {n:23, title:`Deeper social`,  short:`named circles, moderation, filters`, list:[`Named circles with tags`,`Group roles & light moderation`,`Feed filters`,`Cross-group supports (deeper Social via vouches)`,`Ephemeral chat`]},
    'social|advanced':  {n:24, title:`Agent-augmented social`, short:`matches, curated feed, A/V chat`, list:[`MyWizy suggests people / matches`,`Auto-curated feed`,`Audio / video chat unlocked`,`Complex circle-trust rules`]},
    'social|super':     {n:25, title:`Community stewardship`, short:`host groups, govern, federate`, list:[`Run / host groups`,`Moderation & curator powers`,`Network-wide social governance`,`Federation with other meshes`]},

    'sety|mini':        {n:7,  title:`Sort/style peek`, short:`a glimpse, locked`, teaser:true, list:[`A single “how you’d sort/style content” peek`,`Locked`]},
    'sety|basic':       {n:10, title:`Minimum data control`, short:`what your profile exposes`, list:[`Display prefs: avatar / email / links visibility`,`Visibility Private / Close / Public`]},
    'sety|normal':      {n:13, title:`Full sety`, short:`visualize, relate, explain, curate`, list:[`Visualization (List/Rainbow/Circle/Sphere/Torus + sliders)`,`Relations (Preferred Raters, Perspectives)`,`Explains (medias / labels)`,`Contents (platforms / fields)`,`Wizard = the athen-ia agents seed`,`Deeper Social via raters`]},
    'sety|advanced':    {n:16, title:`Tuning graduates out`, short:`links to wizy; complex rules`, list:[`Agent tuning links out to wizy`,`Complex perspective / rater rules`,`Data export`]},
    'sety|super':       {n:19, title:`Data sovereignty`, short:`own node, govern policy`, list:[`Run your own data node`,`Shared-mesh inference toggles`,`Govern data-sharing policy`]},

    'wizy|mini':        {n:8,  title:`Agents preview`, short:`“agents could do this”, locked`, teaser:true, list:[`Preview card`,`Locked`]},
    'wizy|basic':       {n:11, title:`One passive agent`, short:`Summaries on/off`, list:[`Summaries on/off`,`Feeds the profily compose box`,`A taste of agents`]},
    'wizy|normal':      {n:14, title:`The 6 named agents appear`, short:`on/off roster, seeded from sety`, list:[`Summaries · Suggestions · Offers · Matches · Polarities · Reminders`,`On/off only`,`Seeded from sety’s Wizard`]},
    'wizy|advanced':    {n:17, title:`Full wizy`, short:`tune agents; MyWizy ↔ MyNet`, list:[`Per-agent strength / temperature sliders`,`MyWizy bound to MyNet (tunes connectivity + apps)`,`Complex-trust-aware behavior`,`Navy + gold owl identity`]},
    'wizy|super':       {n:20, title:`Agent orchestration`, short:`run agents for circles; pluggable`, list:[`Run agents for your circles`,`Pluggable inference backend`,`Steward others’ MyWizy`,`Full integrated automation`]},

    'vizy|mini':        {n:26, title:`Plain view`, short:`list/text only, viz locked`, teaser:true, list:[`Plain list / text view only`,`Rich visualization locked`]},
    'vizy|basic':       {n:27, title:`A first look`, short:`List or Rainbow styling`, list:[`Pick a basic style — List or Rainbow`,`For your profile & feed`,`A taste of viz`]},
    'vizy|normal':      {n:28, title:`Shaped views unlock`, short:`Circle / Sphere3D / Torus4D`, list:[`Render data & relations as Circle / Sphere3D / Torus4D`,`The sety Visualization shapes`]},
    'vizy|advanced':    {n:29, title:`Agent-driven viz`, short:`graph layout & animation, XR`, list:[`MyWizy lays out & animates your graph`,`Interactive 3D / 4D`,`XR-ready scenes`]},
    'vizy|super':       {n:30, title:`Full vizy studio`, short:`whole-mesh viz; VR / XR`, list:[`Visualize the whole mesh & all your data`,`Any form: List → Rainbow → Circle → Sphere3D → Torus4D`,`VR / XR worlds`,`Custom visual pipelines`,`The capstone of super`]},
  };

  const cell = (app, nav, ci) => {
    const f = F[app.key + '|' + nav.key];
    const isHome = app.home === nav.key;
    const cls = ['cell']; if (isHome) cls.push('open','home'); if (f.teaser) cls.push('teaser');
    const htag = isHome ? `<span class="htag">🏠 home</span>` : '';
    const lock = f.teaser ? `<span class="locktag" title="locked">🔒</span>` : '';
    const li = f.list.map(x => `<li>${esc(x)}</li>`).join('');
    return `<td class="${cls.join(' ')}" data-col="${ci}" style="--ac:var(--${app.key})">
      <div class="fsum"><span class="mk">▸</span><span class="fn">#${f.n}</span>${lock}${htag}<span class="ftitle">${esc(f.title)}</span><span class="fshort">— ${esc(f.short)}</span></div>
      <ul class="flist">${li}</ul></td>`;
  };

  const head = `<tr>
    <th class="corner">app ＼ nav<br><span style="font-weight:400">click a nav to focus it</span></th>
    ${NAVS.map((nav, ci) => `<th class="navth" data-col="${ci}" style="--tc:var(--${nav.key})">
      <div class="navname">${esc(nav.key)}</div>
      <div class="navval">${esc(nav.val)}</div>
      <div class="navkw">${esc(nav.kw)}</div>
    </th>`).join('')}
  </tr>`;

  const body = APPS.map(app => `<tr>
    <th class="approw" style="--ac:var(--${app.key})">${app.emoji} <b>${esc(app.key)}</b><span class="approw-sub">${esc(app.sub)} · home @${esc(app.home)}</span></th>
    ${NAVS.map((nav, ci) => cell(app, nav, ci)).join('')}
  </tr>`).join('');

  const cols = `<colgroup><col class="appcol">${NAVS.map(()=>'<col>').join('')}</colgroup>`;
  const tbl = document.getElementById('tbl');
  tbl.innerHTML = `<table class="matrix">${cols}<thead>${head}</thead><tbody>${body}</tbody></table>`;

  // click anywhere on a feature cell → toggle it open/closed
  tbl.querySelectorAll('td.cell').forEach(td =>
    td.addEventListener('click', () => td.classList.toggle('open')));

  // click a nav header (top cell of a column) → collapse every cell in the OTHER columns
  tbl.querySelectorAll('th.navth').forEach(th =>
    th.addEventListener('click', () => {
      const c = th.dataset.col;
      tbl.querySelectorAll('td.cell').forEach(td => { if (td.dataset.col !== c) td.classList.remove('open'); });
    }));
</script>
</body>
</html>
