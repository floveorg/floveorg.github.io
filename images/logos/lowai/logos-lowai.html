<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>logos · lowAI</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230d1430'/%3E%3Ccircle cx='37' cy='50' r='13' fill='%23d4af37'/%3E%3Ccircle cx='63' cy='50' r='13' fill='%23d4af37'/%3E%3Ccircle cx='37' cy='50' r='4.5' fill='%230d1430'/%3E%3Ccircle cx='63' cy='50' r='4.5' fill='%230d1430'/%3E%3Cpolygon points='34,26 40,36 28,36' fill='%23d4af37'/%3E%3Cpolygon points='66,26 72,36 60,36' fill='%23d4af37'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{ font-family:"Space Mono",monospace;background:#0a0b0d;color:#cfd2cc;
    padding:clamp(1.2rem,4vw,2.6rem);line-height:1.55;display:flex;flex-direction:column;gap:1.5rem; }
  h1{ font-size:1.15rem;font-weight:700;color:#efe9d8; }
  h1 .sub{ color:#7b80a0;font-weight:400; }
  .sec{ font-size:.62rem;letter-spacing:.34em;text-transform:uppercase;color:#7b80a0;
    display:flex;align-items:center;gap:1rem;margin-bottom:.2rem; }
  .sec::after{ content:"";flex:1;height:1px;background:#23262b; }
  .panel{ border:1px solid #23262b;border-radius:18px;overflow:hidden; }
  .split2{ display:flex;flex-wrap:wrap; }
  .pane{ flex:1 1 320px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:2.4rem 1.4rem;gap:1.4rem; }
  .pane.dark{ background:#0d1430; --ink:#efe9d8; --accent:#d4af37; --pup:#0d1430; --lidc:#efe9d8; --ball:#f7edc9; }
  .pane.light{ background:#f1efe7; --ink:#1d211c; --accent:#4f7a4a; --pup:#1d211c; --lidc:#1d211c; --ball:#fbfaf0; }
  .plabel{ font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);align-self:flex-start; }

  /* ===================== wordmark ===================== */
  .wm{ position:relative;font-family:"Fredoka",sans-serif;font-weight:600;letter-spacing:-.005em;
    display:inline-flex;align-items:baseline;white-space:nowrap;line-height:1;color:var(--ink); }
  .grp{ display:inline-flex;align-items:baseline; }
  .wm .g{ position:relative;display:inline-block; }

  /* --- eyes in o & A --- */
  .eye.eo{ --ey:.40em; --d:.30em; }
  .eye.ea{ --ey:.34em; --d:.30em; --ex:.005em; }
  .eye .eb{ position:absolute; left:calc(50% + var(--ex,0em)); bottom:var(--ey,.30em);
    width:var(--d,.30em); height:var(--d,.30em); border-radius:50%; transform:translate(-50%,50%); }
  .eye .ball{ background:var(--ball); }
  .eye .pupil{ width:calc(var(--d)*.46); height:calc(var(--d)*.46); background:var(--pup); }
  .eye .lid{ background:var(--lidc); transform-origin:50% 0; transform:translate(-50%,50%) scaleY(0);
    animation:blink 4.2s ease-in-out infinite; }
  .eye .lid.b{ animation-delay:.09s; }
  @keyframes blink{ 0%,88%{transform:translate(-50%,50%) scaleY(0);} 92%{transform:translate(-50%,50%) scaleY(1);}
    96%,100%{transform:translate(-50%,50%) scaleY(0);} }

  /* --- triangulitos arriba (orejitas) --- */
  .eye .tuft{ position:absolute; left:calc(50% + var(--ex,0em)); bottom:.66em;
    width:0;height:0;border-left:.1em solid transparent;border-right:.1em solid transparent;
    border-bottom:.26em solid var(--accent); }
  .eye.eo .tuft{ transform:translate(-50%,0) rotate(-9deg); }
  .eye.ea .tuft{ transform:translate(-50%,0) rotate(9deg); }

  /* --- 'l' minúscula vs 'I' mayúscula con serifas --- */
  .iCap{ padding:0 .12em; }
  .iCap .serif{ position:absolute; left:50%; width:.34em; height:.09em; background:currentColor;
    border-radius:.04em; transform:translateX(-50%); }
  .iCap .s-t{ bottom:.74em; }
  .iCap .s-b{ bottom:.15em; }

  /* ===================== animaciones ===================== */
  /* base · reveal dorado l→I */
  .a-reveal .g{ animation:revc 4.2s ease-in-out infinite; }
  .a-reveal .low .g:nth-of-type(1){animation-delay:0s}.a-reveal .low .g:nth-of-type(2){animation-delay:.15s}
  .a-reveal .low .g:nth-of-type(3){animation-delay:.3s}
  .a-reveal .ai  .g:nth-of-type(1){animation-delay:.45s}.a-reveal .ai .g:nth-of-type(2){animation-delay:.6s}
  @keyframes revc{ 0%,8%{color:var(--ink)} 26%,80%{color:#e8bb3a} 96%,100%{color:var(--ink)} }

  /* 1 · split — low en crema, AI en oro con brillo */
  .a-split .low .g{ color:var(--ink); }
  .a-split .ai  .g{ color:#e8bb3a; }
  .a-split .ai{ animation:glowp 2.6s ease-in-out infinite; }
  @keyframes glowp{ 0%,100%{text-shadow:0 0 0 rgba(255,207,63,0)} 50%{text-shadow:0 0 .16em rgba(255,207,63,.9)} }

  /* 2 · alterna — low y AI se encienden por turnos */
  .a-alt .low{ animation:grpPulse 3.6s ease-in-out infinite; }
  .a-alt .ai { animation:grpPulse 3.6s ease-in-out infinite; animation-delay:1.8s; }
  @keyframes grpPulse{ 0%,6%{color:var(--ink)} 18%,38%{color:#e8bb3a} 52%,100%{color:var(--ink)} }

  /* 3 · respira — los dos grupos se separan y juntan; AI en oro */
  .a-sep .low{ animation:sepL 3s ease-in-out infinite; }
  .a-sep .ai { animation:sepR 3s ease-in-out infinite; }
  .a-sep .ai .g{ color:#e8bb3a; }
  .a-sep .low .g{ color:var(--ink); }
  @keyframes sepL{ 0%,100%{transform:translateX(0)} 50%{transform:translateX(-.14em)} }
  @keyframes sepR{ 0%,100%{transform:translateX(0)} 50%{transform:translateX(.14em)} }

  /* estático (para la gama de tamaños) */
  .a-static .g{ color:var(--ink); }

  .ramp{ display:flex;flex-wrap:wrap;align-items:flex-end;gap:1.8rem;justify-content:center; }
  .ritem{ display:flex;flex-direction:column;align-items:center;gap:.55rem; }
  .ritem small{ font-size:.54rem;letter-spacing:.1em;color:#7b80a0; }

  .cards{ display:flex;flex-direction:column;gap:1.1rem; }
  .chead{ padding:.7rem 1rem;border-bottom:1px solid #23262b;display:flex;align-items:baseline;gap:.7rem; }
  .chead b{ font-size:.86rem;color:#efe9d8; }
  .chead span{ font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:#7b80a0; }

  @media (prefers-reduced-motion:reduce){
    .lid{animation:none!important;transform:translate(-50%,50%) scaleY(0)!important;}
    .g,.grp{animation:none!important} }
</style>
</head>
<body>

<h1>logos · lowAI <span class="sub">— el búho vive en la o y la A</span></h1>

<!-- ===================== gama de tamaños ===================== -->
<div>
  <p class="sec">gama de tamaños</p>
  <div class="panel split2">
    <div class="pane dark"><span class="plabel">sobre azul</span><div class="ramp" id="ramp-d"></div></div>
    <div class="pane light"><span class="plabel">sobre crema</span><div class="ramp" id="ramp-l"></div></div>
  </div>
</div>

<!-- ===================== animaciones ===================== -->
<div>
  <p class="sec">animaciones · low ≠ AI</p>
  <div class="cards" id="cards"></div>
</div>

<script>
function eye(letter, cls, lidB){
  return `<span class="g eye ${cls}">${letter}`
    + `<b class="tuft"></b><b class="eb ball"></b><b class="eb pupil"></b><b class="eb lid ${lidB?'b':''}"></b>`
    + `</span>`;
}
function wm(anim, sizePx, sizeClass){
  const st = sizePx ? ` style="font-size:${sizePx}px"` : '';
  return `<div class="wm ${anim} ${sizeClass||''}"${st}>`
    + `<span class="grp low"><span class="g">l</span>${eye('o','eo',false)}<span class="g">w</span></span>`
    + `<span class="grp ai">${eye('A','ea',true)}<span class="g iCap">I<b class="serif s-t"></b><b class="serif s-b"></b></span></span>`
    + `</div>`;
}

// --- size ramp ---
const SIZES = [16,20,24,32,44,60,84,120];
for(const [id,anim] of [['ramp-d','a-static'],['ramp-l','a-static']]){
  const host = document.getElementById(id);
  for(const s of SIZES){
    host.insertAdjacentHTML('beforeend',
      `<div class="ritem">${wm(anim, s)}<small>${s}px</small></div>`);
  }
}

// --- animation cards ---
const ANIMS = [
  {a:'a-reveal', name:'base · reveal',  tag:'el oro rellena l→I en bucle'},
  {a:'a-split',  name:'1 · split',      tag:'low en crema · AI en oro con brillo'},
  {a:'a-alt',    name:'2 · alterna',    tag:'low y AI se encienden por turnos'},
  {a:'a-sep',    name:'3 · respira',    tag:'los dos grupos se separan y juntan · AI en oro'},
];
const cards = document.getElementById('cards');
for(const c of ANIMS){
  cards.insertAdjacentHTML('beforeend', `
    <div class="panel">
      <div class="chead"><b>${c.name}</b><span>${c.tag}</span></div>
      <div class="split2">
        <div class="pane dark">${wm(c.a, null, 'big')}</div>
        <div class="pane light">${wm(c.a, 40)}</div>
      </div>
    </div>`);
}
document.querySelectorAll('.wm.big').forEach(w=>w.style.fontSize='clamp(3rem,11vw,5.5rem)');
</script>
</body>
</html>
