<style>
:root {
  --bg-1:#fff8f1; --bg-2:#f4f1ff; --bg-3:#effdf7;
  --ink:#1a1820;  --mut:#6a6478;  --line:rgba(20,16,32,.10);
  --accent:#ff8a8a; --accent-soft:#ffd9d9;
  --rainbow: linear-gradient(98deg, #ffd633 0%, #6dd933 22%, #2a9aff 44%, #6a3aff 60%, #c133ff 75%, #5b3a7a 88%, var(--ink) 100%);
}
* { box-sizing:border-box; }
html, body { margin:0; padding:0; }
body {
  font-family:'Inter',system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1100px 700px at 110% -10%, var(--bg-3) 0, transparent 55%),
    radial-gradient(900px 600px at -10% 110%, var(--bg-2) 0, transparent 55%),
    var(--bg-1);
  min-height:100svh;
  -webkit-font-smoothing:antialiased;
}

/* ───── header ───── */
.page-head {
  position:sticky; top:0; z-index:5;
  display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
  padding:1rem 1.4rem;
  border-bottom:1px solid var(--line);
  background:rgba(255,248,241,.78);
  backdrop-filter:blur(14px) saturate(150%);
  -webkit-backdrop-filter:blur(14px) saturate(150%);
}
.page-head .back, .page-head .switch {
  display:inline-flex; align-items:center; gap:.4rem;
  text-decoration:none; color:var(--mut);
  font-family:'JetBrains Mono', monospace; font-size:.78rem;
  padding:.4rem .7rem; border:1px solid var(--line); border-radius:999px;
  background:rgba(255,255,255,.6);
  transition: all .25s ease;
}
.page-head .back:hover, .page-head .switch:hover { color:var(--ink); background:rgba(255,255,255,.95); transform:translateY(-1px); }
.page-head h1 {
  margin:0;
  font-family:'Fraunces',serif; font-weight:300;
  font-size:clamp(1.1rem, 2.2vmin, 1.55rem);
  letter-spacing:-.01em;
}
.page-head h1 .accent {
  background: var(--rainbow);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  opacity:.78;
}
.page-head .hint {
  margin:0; margin-left:auto;
  font-family:'JetBrains Mono', monospace; font-size:.72rem; color:var(--mut);
}
.page-head .reset {
  background:transparent; border:1px solid var(--line); border-radius:999px;
  font-family:'JetBrains Mono', monospace; font-size:.7rem; color:var(--mut);
  padding:.4rem .7rem; cursor:pointer;
  transition: all .2s ease;
}
.page-head .reset:hover { color:var(--ink); border-color:var(--ink); }

/* ───── grid ───── */
main {
  max-width: 1180px;
  margin:0 auto;
  padding: clamp(1.4rem, 4vmin, 3rem) clamp(1rem, 4vmin, 2.4rem);
  display:flex; flex-direction:column;
  gap: clamp(1.4rem, 3vmin, 2.2rem);
}
.cat-divider {
  display:flex; align-items:center; gap:.7rem;
  font-family:'JetBrains Mono', monospace;
  font-size:.72rem; letter-spacing:.18em; text-transform:uppercase;
  color:var(--mut);
  margin: clamp(1.6rem, 3vmin, 2.4rem) 0 -.4rem;
}
.cat-divider::after {
  content:""; flex:1; height:1px;
  background: linear-gradient(to right, var(--cat-tint, var(--mut)), transparent);
  opacity:.4;
}

.app-row {
  display:grid;
  grid-template-columns: minmax(160px, 1fr) 1.6fr 1.6fr;
  gap: clamp(1rem, 2.4vmin, 1.6rem);
  align-items:stretch;
  padding:.6rem;
  border-radius:18px;
  background:rgba(255,255,255,.42);
  border:1px solid var(--line);
  box-shadow: 0 1px 0 rgba(255,255,255,.7) inset, 0 18px 40px -28px rgba(60,30,90,.18);
}
.app-meta {
  display:flex; flex-direction:column; justify-content:center;
  padding: .8rem 1rem;
}
.app-meta h2 {
  margin:0;
  font-family:'Fraunces',serif; font-weight:400;
  font-size: clamp(1.15rem, 2.4vmin, 1.55rem);
  letter-spacing:-.01em;
}
.app-meta .app-tag {
  margin:.2rem 0 .55rem;
  font-family:'JetBrains Mono', monospace; font-size:.72rem;
  color:var(--mut); letter-spacing:.02em;
}
.app-meta .app-cat {
  align-self:flex-start;
  display:inline-block;
  font-family:'JetBrains Mono', monospace; font-size:.62rem;
  letter-spacing:.08em; text-transform:uppercase;
  padding:.18rem .5rem; border-radius:999px;
  background:rgba(255,255,255,.7); border:1px solid var(--line); color:var(--mut);
}

.logo-card {
  position:relative;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:.85rem;
  min-height: 200px;
  padding: 1.5rem 1.2rem 1.3rem;
  border:1px solid var(--line);
  border-radius:14px;
  background:
    radial-gradient(420px 240px at 50% 110%, rgba(255,255,255,.75), transparent 60%),
    rgba(255,255,255,.55);
  cursor:pointer;
  transition: transform .25s cubic-bezier(.2,.8,.2,1),
              box-shadow .35s ease,
              border-color .35s ease,
              background .35s ease;
}
.logo-card:hover {
  transform: translateY(-3px);
  border-color: rgba(180,138,255,.45);
  box-shadow: 0 26px 60px -28px rgba(120,60,200,.34);
  background:
    radial-gradient(420px 240px at 50% 110%, rgba(255,255,255,.95), transparent 60%),
    rgba(255,255,255,.78);
}
.logo-card.is-picked {
  border-color: rgba(255,138,138,.6);
  background:
    radial-gradient(520px 260px at 50% 110%, rgba(255,217,217,.55), transparent 60%),
    rgba(255,255,255,.85);
  box-shadow: 0 0 0 3px rgba(255,138,138,.18), 0 22px 50px -22px rgba(180,80,140,.35);
}
.logo-card .pick-tag {
  position:absolute; top:.6rem; right:.7rem;
  font-family:'JetBrains Mono', monospace; font-size:.6rem;
  letter-spacing:.08em; text-transform:uppercase;
  padding:.16rem .5rem; border-radius:999px;
  color:#9a3a55; background:rgba(255,217,217,.85);
  opacity:0; transform: translateY(-4px);
  transition: opacity .25s ease, transform .25s ease;
}
.logo-card.is-picked .pick-tag { opacity:1; transform: translateY(0); }
.logo-card .variant-tag {
  position:absolute; top:.6rem; left:.7rem;
  font-family:'JetBrains Mono', monospace; font-size:.58rem;
  color: var(--mut); letter-spacing:.08em; text-transform:uppercase;
  opacity:.55;
}

/* ───── shared mark style (the corporate signature) ───── */
.mark-svg {
  width: clamp(72px, 14vmin, 110px);
  height: clamp(72px, 14vmin, 110px);
  display:block;
  filter:
    drop-shadow(0 0 14px rgba(255,138,174,.40))
    drop-shadow(0 0 28px rgba(180,138,255,.20));
}
.logo-card:hover .mark-svg {
  filter:
    drop-shadow(0 0 18px rgba(255,138,174,.55))
    drop-shadow(0 0 38px rgba(180,138,255,.30));
}
.mark-name {
  font-family:'Fraunces',serif; font-weight:400;
  font-size: clamp(1.05rem, 2.2vmin, 1.32rem);
  letter-spacing:-.012em;
  color:var(--ink);
}

/* ───── footer summary ───── */
.summary {
  max-width:1180px;
  margin: 1.4rem auto 4rem;
  padding: 1rem clamp(1rem, 4vmin, 2.4rem);
  border-top:1px dashed var(--line);
  font-family:'JetBrains Mono', monospace; font-size:.78rem;
  color:var(--mut);
}
.summary h3 {
  margin:0 0 .8rem; font-family:'Fraunces',serif; font-weight:400;
  font-size:1.1rem; color:var(--ink); letter-spacing:-.01em;
}
.summary ul {
  list-style:none; padding:0; margin:0;
  display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap:.4rem .9rem;
}
.summary li { display:flex; justify-content:space-between; gap:.6rem; padding:.2rem 0; }
.summary li .pick { color:var(--ink); }
.summary li .none { color:rgba(106,100,120,.55); font-style:italic; }
.summary .copy {
  margin-top:1rem;
  background:transparent; border:1px solid var(--line); border-radius:999px;
  font-family:'JetBrains Mono', monospace; font-size:.7rem; color:var(--mut);
  padding:.4rem .9rem; cursor:pointer;
  transition: all .2s ease;
}
.summary .copy:hover { color:var(--ink); border-color:var(--ink); }

@media (max-width: 760px) {
  .app-row { grid-template-columns: 1fr; }
  .logo-card { min-height: 180px; }
}
</style>
</head>

// ─── render ───────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function svgWrap(slug, take, body, stops) {
  const id = `g-${slug}-${take}`;
  const replaced = body.replace(/url\(#g\)/g, `url(#${id})`);
  return `<svg viewBox="0 0 100 100" class="mark-svg" aria-hidden="true">
    <defs>
      <linearGradient id="${id}" x1="14" y1="14" x2="86" y2="86" gradientUnits="userSpaceOnUse">
        <stop offset="0%"   stop-color="${stops[0]}"/>
        <stop offset="50%"  stop-color="${stops[1]}"/>
        <stop offset="100%" stop-color="${stops[2]}"/>
      </linearGradient>
    </defs>
    <g fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      ${replaced}
    </g>
  </svg>`;
}

const STORE_KEY = 'flove-logo-picks-v2';
const picks = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');

function card(app, take) {
  const cat = CATS[app.cat];
  const body = MARKS[app.slug] && MARKS[app.slug][take]
             ? MARKS[app.slug][take]
             : `<circle cx="50" cy="50" r="30" stroke="url(#g)" fill="none"/>`;
  const taggedTake = take === 'a' ? 'A · take 1' : 'B · take 2';
  return `
    <button class="logo-card ${picks[app.slug]===take?'is-picked':''}"
            data-slug="${app.slug}" data-variant="${take}" type="button"
            aria-label="elegir ${taggedTake} para ${escHtml(app.name)}">
      <span class="variant-tag">${taggedTake}</span>
      <span class="pick-tag">elegida</span>
      ${svgWrap(app.slug, take, body, cat.grad)}
      <span class="mark-name">${escHtml(app.name)}</span>
    </button>`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  let lastCat = null;
  const out = [];
  APPS.forEach(app => {
    if (app.cat !== lastCat) {
      out.push(`<div class="cat-divider" style="--cat-tint:${CATS[app.cat].tint}">${CATS[app.cat].label}</div>`);
      lastCat = app.cat;
    }
    out.push(`
      <article class="app-row" data-slug="${app.slug}">
        <div class="app-meta">
          <h2>${escHtml(app.name)}</h2>
          <p class="app-tag">${escHtml(app.tag)}</p>
          <span class="app-cat">${CATS[app.cat].label}</span>
        </div>
        ${card(app, 'a')}
        ${card(app, 'b')}
      </article>
    `);
  });
  grid.innerHTML = out.join('');
}

function renderSummary() {
  const list = document.getElementById('summary-list');
  list.innerHTML = APPS.map(app => {
    const v = picks[app.slug];
    return `<li>
      <span>${escHtml(app.name)}</span>
      <span class="${v ? 'pick' : 'none'}">${v ? 'take ' + v.toUpperCase() : '—'}</span>
    </li>`;
  }).join('');
}

function persist() { localStorage.setItem(STORE_KEY, JSON.stringify(picks)); }

document.addEventListener('click', (e) => {
  const card = e.target.closest('.logo-card');
  if (!card) return;
  const { slug, variant } = card.dataset;
  if (picks[slug] === variant) {
    delete picks[slug];
  } else {
    picks[slug] = variant;
  }
  persist();
  document.querySelectorAll(`.app-row[data-slug="${slug}"] .logo-card`).forEach(el => {
    el.classList.toggle('is-picked', picks[slug] === el.dataset.variant);
  });
  renderSummary();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('¿Borrar todas las elecciones?')) return;
  for (const k of Object.keys(picks)) delete picks[k];
  persist();
  document.querySelectorAll('.logo-card.is-picked').forEach(el => el.classList.remove('is-picked'));
  renderSummary();
});

document.getElementById('copy-btn').addEventListener('click', async () => {
  const json = JSON.stringify(picks, null, 2);
  try { await navigator.clipboard.writeText(json); } catch {}
  const btn = document.getElementById('copy-btn');
  const old = btn.textContent;
  btn.textContent = 'copiado ✓';
  setTimeout(() => { btn.textContent = old; }, 1400);
});

renderGrid();
renderSummary();
</script>
</body>
</html>
