<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="author" content="Marc (marcflove)" />
<title>flove · logos · elige</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg-1:#fff8f1; --bg-2:#f4f1ff; --bg-3:#effdf7;
  --ink:#1a1820;  --mut:#6a6478;  --line:rgba(20,16,32,.10);
  --accent:#ff8a8a; --accent-soft:#ffd9d9;
  --dream-1:#ff8aae; --dream-2:#8ab4ff; --dream-3:#b48aff; --dream-4:#8affd0; --dream-5:#ffd28a;
  --rainbow: linear-gradient(98deg, #ffd633 0%, #6dd933 22%, #2a9aff 44%, #6a3aff 60%, #c133ff 75%, #5b3a7a 88%, var(--ink) 100%);
}
* { box-sizing:border-box; }
html, body { margin:0; padding:0; }
body {
  font-family:'Inter',system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1100px 700px at 110% -10%, var(--bg-3) 0, transparent 55%),
    radial-gradient(900px 600px at -10% 110%, var(--bg-2) 0, transparent 55%),
    var(--bg-1);
  min-height:100svh;
  -webkit-font-smoothing:antialiased;
}

/* ───── header ───── */
.page-head {
  position:sticky; top:0; z-index:5;
  display:flex; align-items:center; gap:1rem;
  padding:1rem 1.4rem;
  border-bottom:1px solid var(--line);
  background:rgba(255,248,241,.78);
  backdrop-filter:blur(14px) saturate(150%);
  -webkit-backdrop-filter:blur(14px) saturate(150%);
}
.page-head .back {
  display:inline-flex; align-items:center; gap:.4rem;
  text-decoration:none; color:var(--mut);
  font-family:'JetBrains Mono', monospace; font-size:.82rem;
  padding:.4rem .7rem; border:1px solid var(--line); border-radius:999px;
  background:rgba(255,255,255,.6);
  transition: color .25s ease, background .25s ease, transform .2s ease;
}
.page-head .back:hover { color:var(--ink); background:rgba(255,255,255,.95); transform:translateY(-1px); }
.page-head h1 {
  margin:0;
  font-family:'Fraunces',serif; font-weight:300;
  font-size:clamp(1.1rem, 2.2vmin, 1.6rem);
  letter-spacing:-.01em;
}
.page-head h1 .accent {
  background: var(--rainbow);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  opacity:.7;
}
.page-head .hint {
  margin:0; margin-left:auto;
  font-family:'JetBrains Mono', monospace; font-size:.75rem; color:var(--mut);
}
.page-head .reset {
  background:transparent; border:1px solid var(--line); border-radius:999px;
  font-family:'JetBrains Mono', monospace; font-size:.72rem; color:var(--mut);
  padding:.4rem .7rem; cursor:pointer;
  transition: all .2s ease;
}
.page-head .reset:hover { color:var(--ink); border-color:var(--ink); }

/* ───── grid ───── */
main {
  max-width: 1180px;
  margin:0 auto;
  padding: clamp(1.4rem, 4vmin, 3rem) clamp(1rem, 4vmin, 2.4rem);
  display:flex; flex-direction:column;
  gap: clamp(1.4rem, 3vmin, 2.2rem);
}
.app-row {
  display:grid;
  grid-template-columns: minmax(160px, 1fr) 1.6fr 1.6fr;
  gap: clamp(1rem, 2.4vmin, 1.6rem);
  align-items:stretch;
  padding:.6rem;
  border-radius:18px;
  background:rgba(255,255,255,.42);
  border:1px solid var(--line);
  box-shadow: 0 1px 0 rgba(255,255,255,.7) inset, 0 18px 40px -28px rgba(60,30,90,.18);
}
.app-meta {
  display:flex; flex-direction:column; justify-content:center;
  padding: .8rem 1rem;
}
.app-meta h2 {
  margin:0;
  font-family:'Fraunces',serif; font-weight:400;
  font-size: clamp(1.15rem, 2.4vmin, 1.55rem);
  letter-spacing:-.01em;
}
.app-meta .app-tag {
  margin:.2rem 0 .55rem;
  font-family:'JetBrains Mono', monospace; font-size:.72rem;
  color:var(--mut); letter-spacing:.02em;
}
.app-meta .app-cat {
  align-self:flex-start;
  display:inline-block;
  font-family:'JetBrains Mono', monospace; font-size:.62rem;
  letter-spacing:.08em; text-transform:uppercase;
  padding:.18rem .5rem; border-radius:999px;
  background:rgba(255,255,255,.7); border:1px solid var(--line); color:var(--mut);
}

.logo-card {
  position:relative;
  display:flex; align-items:center; justify-content:center;
  min-height: 168px;
  padding: 1.4rem 1.2rem;
  border:1px solid var(--line);
  border-radius:14px;
  background:
    radial-gradient(420px 240px at 50% 110%, rgba(255,255,255,.75), transparent 60%),
    rgba(255,255,255,.55);
  cursor:pointer;
  transition: transform .25s cubic-bezier(.2,.8,.2,1),
              box-shadow .35s ease,
              border-color .35s ease,
              background .35s ease;
}
.logo-card:hover {
  transform: translateY(-3px);
  border-color: rgba(180,138,255,.45);
  box-shadow: 0 26px 60px -28px rgba(120,60,200,.34);
  background:
    radial-gradient(420px 240px at 50% 110%, rgba(255,255,255,.95), transparent 60%),
    rgba(255,255,255,.78);
}
.logo-card.is-picked {
  border-color: rgba(255,138,138,.6);
  background:
    radial-gradient(520px 260px at 50% 110%, rgba(255,217,217,.55), transparent 60%),
    rgba(255,255,255,.85);
  box-shadow: 0 0 0 3px rgba(255,138,138,.18), 0 22px 50px -22px rgba(180,80,140,.35);
}
.logo-card .pick-tag {
  position:absolute; top:.6rem; right:.7rem;
  font-family:'JetBrains Mono', monospace; font-size:.62rem;
  letter-spacing:.08em; text-transform:uppercase;
  padding:.16rem .5rem; border-radius:999px;
  color:#9a3a55; background:rgba(255,217,217,.85);
  opacity:0; transform: translateY(-4px);
  transition: opacity .25s ease, transform .25s ease;
}
.logo-card.is-picked .pick-tag { opacity:1; transform: translateY(0); }
.logo-card .variant-tag {
  position:absolute; top:.6rem; left:.7rem;
  font-family:'JetBrains Mono', monospace; font-size:.6rem;
  color: var(--mut); letter-spacing:.08em; text-transform:uppercase;
  opacity:.55;
}

/* shared sprout filter (the home's glow, dialed down) */
.sprout-glow {
  filter:
    drop-shadow(0 0 14px rgba(255,138,174,.45))
    drop-shadow(0 0 28px rgba(180,138,255,.22));
}

/* ───── Variante A · wordmark · [brote] AppName ───── */
.va {
  display:inline-flex; align-items:center;
  gap:.32em;
  font-family:'Fraunces',serif; font-weight:300;
  letter-spacing:-.022em; line-height:.95;
  font-size: clamp(2.1rem, 5.4vmin, 3.4rem);
  color:var(--ink);
}
.va .va-sprout {
  width:.8em; height:.8em;
  display:inline-block;
  flex:0 0 auto;
}
.va .va-sprout svg { width:100%; height:100%; display:block; }
/* first letter — violet kiss, like flove's "l" */
.va .va-first {
  background:
    linear-gradient(108deg, transparent calc(var(--va-stop, 55%) - 2%), var(--ink) calc(var(--va-stop, 55%) + 12%)),
    linear-gradient(72deg,  transparent calc(var(--va-stop, 55%) - 5%), var(--ink) calc(var(--va-stop, 55%) + 15%)),
    linear-gradient(to right, var(--va-kiss, #c133ff) 0%, var(--va-kiss, #c133ff) var(--va-stop, 55%), var(--ink) calc(var(--va-stop, 55%) + 15%), var(--ink) 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}

/* ───── Variante B · sigil · monograma vertical ───── */
.vb {
  display:flex; flex-direction:column; align-items:center;
  gap:.55em;
  font-family:'Fraunces',serif;
  letter-spacing:-.01em; line-height:1;
  color:var(--ink);
}
.vb .vb-stack {
  position:relative;
  display:inline-flex; align-items:flex-end; justify-content:center;
  gap:.06em;
}
.vb .vb-letter {
  font-weight:300;
  font-size: clamp(3rem, 8vmin, 5rem);
  line-height:.85;
  background: var(--rainbow);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  opacity:.92;
}
.vb .vb-sprout {
  width:.45em; height:.45em;
  position:absolute;
  top:-.18em; right:-.32em;
  font-size: clamp(3rem, 8vmin, 5rem);
}
.vb .vb-sprout svg { width:100%; height:100%; display:block; }
.vb .vb-name {
  font-weight:400;
  font-size: clamp(.95rem, 2vmin, 1.18rem);
  letter-spacing:-.005em;
  color:var(--ink); opacity:.85;
}

/* ───── footer summary ───── */
.summary {
  max-width:1180px;
  margin: 1.4rem auto 4rem;
  padding: 1rem clamp(1rem, 4vmin, 2.4rem);
  border-top:1px dashed var(--line);
  font-family:'JetBrains Mono', monospace; font-size:.78rem;
  color:var(--mut);
}
.summary h3 {
  margin:0 0 .8rem; font-family:'Fraunces',serif; font-weight:400;
  font-size:1.1rem; color:var(--ink); letter-spacing:-.01em;
}
.summary ul {
  list-style:none; padding:0; margin:0;
  display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap:.4rem .9rem;
}
.summary li { display:flex; justify-content:space-between; gap:.6rem; padding:.2rem 0; }
.summary li .pick { color:var(--ink); }
.summary li .none { color:rgba(106,100,120,.55); font-style:italic; }
.summary .copy {
  margin-top:1rem;
  background:transparent; border:1px solid var(--line); border-radius:999px;
  font-family:'JetBrains Mono', monospace; font-size:.72rem; color:var(--mut);
  padding:.4rem .9rem; cursor:pointer;
  transition: all .2s ease;
}
.summary .copy:hover { color:var(--ink); border-color:var(--ink); }

@media (max-width: 760px) {
  .app-row { grid-template-columns: 1fr; }
  .logo-card { min-height: 150px; }
}
</style>
</head>
<body>

<header class="page-head">
  <a class="back" href="./" aria-label="volver al índice de demos">← apps</a>
  <a class="back" href="./logos-v2.html" style="background:rgba(255,255,255,.4)">v2 · custom marks ↗</a>
  <h1>logos v1 · <span class="accent">wordmarks</span></h1>
  <span class="hint">click en una variante para fijarla · vuelve a clicar para deshacer</span>
  <button class="reset" id="reset-btn" type="button">reset</button>
</header>

<main id="grid"></main>

<section class="summary">
  <h3>Tu selección</h3>
  <ul id="summary-list"></ul>
  <button class="copy" id="copy-btn" type="button">copiar JSON</button>
</section>

<script>
// ─── data ─────────────────────────────────────────────────────────────
const CATS = {
  metafisica: { kiss:'#c133ff', label:'metafísica', grad:['#c133ff','#6a3aff','#ff8aae'] },
  ciencia:    { kiss:'#2a9aff', label:'ciencia',    grad:['#2a9aff','#6a3aff','#8ac4ff'] },
  biologia:   { kiss:'#33d97a', label:'biología',   grad:['#6dd933','#33d97a','#8affd0'] },
  lenguajes:  { kiss:'#ff8aae', label:'lenguajes',  grad:['#ff8aae','#c133ff','#ffd9d9'] },
  psico:      { kiss:'#ff8a8a', label:'psico',      grad:['#ff8a8a','#ff8a3a','#ffd28a'] },
  social:     { kiss:'#ff3344', label:'social',     grad:['#ff3344','#ff8a3a','#ffd633'] },
  economia:   { kiss:'#ffb84d', label:'economía',   grad:['#ffd28a','#ffd633','#6dd933'] },
};

const APPS = [
  // metafísica
  { slug:'whole',       name:'Whole',       cat:'metafisica', tag:'map of everything' },
  { slug:'goddess',     name:'God(dess)',   cat:'metafisica', tag:'archetype & matrix' },
  { slug:'openastro',   name:'OpenAstro',   cat:'metafisica', tag:'galactic reflection' },
  { slug:'polarities',  name:'Polarities',  cat:'metafisica', tag:'Lao AI · polarities' },
  { slug:'triads',      name:'Triads',      cat:'metafisica', tag:'triads & harmonies' },
  { slug:'confluences', name:'Confluences', cat:'metafisica', tag:'confluences 5/7' },
  { slug:'cyclon',      name:'Cyclon',      cat:'metafisica', tag:'cycles · simplex' },
  { slug:'simplex',     name:'Simplex',     cat:'metafisica', tag:'geometric primitive' },
  // ciencia
  { slug:'wise',        name:'Wise',        cat:'ciencia', tag:'reasoning perspective' },
  { slug:'view',        name:'View',        cat:'ciencia', tag:'canonical view' },
  { slug:'rate',        name:'Rate',        cat:'ciencia', tag:'scales 1–7 + senses' },
  { slug:'combos',      name:'Combos',      cat:'ciencia', tag:'fuzzy combinatorics' },
  { slug:'hackboth',    name:'HackBoth',    cat:'ciencia', tag:'fill in · reveal' },
  // biologia
  { slug:'diesafe',     name:'DieSafe',     cat:'biologia', tag:'voice & legacy' },
  // lenguajes
  { slug:'realy',      name:'Realy',      cat:'lenguajes', tag:'dreamweaver' },
  // psico
  { slug:'avatar',      name:'Avatar',      cat:'psico', tag:'your living profile' },
  { slug:'wanty',       name:'Wanty',       cat:'psico', tag:'wishes & purpose' },
  { slug:'sensy',       name:'Sensy',       cat:'psico', tag:'sensory requests' },
  { slug:'fiveloves',   name:'5Loves',      cat:'psico', tag:'lovely actions' },
  { slug:'crumbler',    name:'Crumbler',    cat:'psico', tag:'trust that breaks' },
  // social
  { slug:'lovely',      name:'Lovely',      cat:'social', tag:'acts of love' },
  { slug:'myfamily',    name:'MyFamily',    cat:'social', tag:'the close bond' },
  { slug:'parenting',   name:'Parenting',   cat:'social', tag:'crowdparenting plan' },
  { slug:'daty',        name:'Daty',        cat:'social', tag:'dating with heart' },
  { slug:'maty',        name:'Maty',        cat:'social', tag:'consent & preferences' },
  { slug:'genderwars',  name:'GenderWars',  cat:'social', tag:'gender dynamics' },
  { slug:'freedoms',    name:'Freedoms',    cat:'social', tag:'living freedoms' },
  // economia
  { slug:'thingy',         name:'Thingy',        cat:'economia', tag:'have · ask · give' },
  { slug:'crowdcrafting',  name:'CrowdCrafting', cat:'economia', tag:'crafted contribution' },
  { slug:'worthing',       name:'Worthing',      cat:'economia', tag:'ecological value' },
  { slug:'deal',           name:'Deal',          cat:'economia', tag:'deal demo' },
  { slug:'reward',         name:'Reward',        cat:'economia', tag:'rewarded task' },
  { slug:'freed',          name:'Freed',         cat:'economia', tag:'gift declaration' },
  { slug:'kindswap',       name:'KindSwap',      cat:'economia', tag:'drawer wants to be free' },
  { slug:'things',         name:'Things',        cat:'economia', tag:'things, simply' },
  { slug:'addoffers',      name:'Add Offers',    cat:'economia', tag:'have · wish · want · need' },
  { slug:'wanty-econ',     name:'Wanty',         cat:'economia', tag:'identity & motivation' },
  { slug:'conditions',     name:'Conditions',    cat:'economia', tag:'lending conditions' },
  { slug:'clauses',        name:'Clauses',       cat:'economia', tag:'shareful clauses' },
  { slug:'instashare',     name:'InstaShare',    cat:'economia', tag:'instant lending' },
];

// ─── sprout SVG (same paths as home, parametrised gradient) ───────────
function sproutSVG(idSuffix, stops) {
  const id = `sprout-grad-${idSuffix}`;
  return `
    <svg viewBox="0 0 100 100" class="sprout-glow" aria-hidden="true">
      <defs>
        <linearGradient id="${id}" x1="12" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="${stops[0]}"/>
          <stop offset="50%"  stop-color="${stops[1]}"/>
          <stop offset="100%" stop-color="${stops[2]}"/>
        </linearGradient>
      </defs>
      <path d="M50 60 C 22 60, 12 38, 16 18 C 38 22, 54 38, 50 60 Z" fill="url(#${id})"/>
      <path d="M50 60 C 78 60, 88 38, 84 18 C 62 22, 46 38, 50 60 Z" fill="url(#${id})"/>
      <path d="M50 58 C 50 72, 50 84, 50 92" stroke="url(#${id})" stroke-width="5" stroke-linecap="round" fill="none"/>
    </svg>`;
}

// ─── render ───────────────────────────────────────────────────────────
const STORE_KEY = 'flove-logo-picks-v1';
const picks = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function variantA(app, idx) {
  const cat = CATS[app.cat];
  const first = app.name.charAt(0);
  const rest = app.name.slice(1);
  return `
    <button class="logo-card variant-a ${picks[app.slug]==='A'?'is-picked':''}"
            data-slug="${app.slug}" data-variant="A" type="button"
            aria-label="elegir variante A para ${escHtml(app.name)}">
      <span class="variant-tag">A · wordmark</span>
      <span class="pick-tag">elegida</span>
      <span class="va" style="--va-kiss:${cat.kiss}; --va-stop:55%;">
        <span class="va-sprout">${sproutSVG(`a-${idx}`, cat.grad)}</span><span class="va-first">${escHtml(first)}</span><span>${escHtml(rest)}</span>
      </span>
    </button>`;
}

function variantB(app, idx) {
  const cat = CATS[app.cat];
  const first = app.name.charAt(0);
  return `
    <button class="logo-card variant-b ${picks[app.slug]==='B'?'is-picked':''}"
            data-slug="${app.slug}" data-variant="B" type="button"
            aria-label="elegir variante B para ${escHtml(app.name)}">
      <span class="variant-tag">B · sigil</span>
      <span class="pick-tag">elegida</span>
      <span class="vb">
        <span class="vb-stack">
          <span class="vb-letter">${escHtml(first)}</span>
          <span class="vb-sprout">${sproutSVG(`b-${idx}`, cat.grad)}</span>
        </span>
        <span class="vb-name">${escHtml(app.name)}</span>
      </span>
    </button>`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = APPS.map((app, idx) => `
    <article class="app-row" data-slug="${app.slug}">
      <div class="app-meta">
        <h2>${escHtml(app.name)}</h2>
        <p class="app-tag">${escHtml(app.tag)}</p>
        <span class="app-cat">${escHtml(CATS[app.cat].label)}</span>
      </div>
      ${variantA(app, idx)}
      ${variantB(app, idx)}
    </article>
  `).join('');
}

function renderSummary() {
  const list = document.getElementById('summary-list');
  list.innerHTML = APPS.map(app => {
    const v = picks[app.slug];
    return `<li>
      <span>${escHtml(app.name)}</span>
      <span class="${v ? 'pick' : 'none'}">${v ? 'variante ' + v : '—'}</span>
    </li>`;
  }).join('');
}

function persist() {
  localStorage.setItem(STORE_KEY, JSON.stringify(picks));
}

document.addEventListener('click', (e) => {
  const card = e.target.closest('.logo-card');
  if (!card) return;
  const { slug, variant } = card.dataset;
  if (picks[slug] === variant) {
    delete picks[slug];
  } else {
    picks[slug] = variant;
  }
  persist();
  // toggle picked classes for both cards in this row
  document.querySelectorAll(`.app-row[data-slug="${slug}"] .logo-card`).forEach(el => {
    el.classList.toggle('is-picked', picks[slug] === el.dataset.variant);
  });
  renderSummary();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('¿Borrar todas las elecciones?')) return;
  for (const k of Object.keys(picks)) delete picks[k];
  persist();
  document.querySelectorAll('.logo-card.is-picked').forEach(el => el.classList.remove('is-picked'));
  renderSummary();
});

document.getElementById('copy-btn').addEventListener('click', async () => {
  const json = JSON.stringify(picks, null, 2);
  try { await navigator.clipboard.writeText(json); } catch {}
  const btn = document.getElementById('copy-btn');
  const old = btn.textContent;
  btn.textContent = 'copiado ✓';
  setTimeout(() => { btn.textContent = old; }, 1400);
});

renderGrid();
renderSummary();
</script>
</body>
</html>
