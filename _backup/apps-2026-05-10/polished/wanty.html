<!DOCTYPE html>
<html lang="es" data-flove-app="wanty">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="flove-categories" content="Ser, Impulso, Matriz">
  <title>✺ flove · Esencia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../flove.css">
  <style id="wanty-polished-overrides">
    /* Free up the wanty card height so the phrase card slot fits and
       the layout grows with content. */
    body { align-items: flex-start; padding: 12px 8px 80px; }
    .app-card {
      height: auto;
      max-height: none;
      overflow: visible;
    }
    .main-content { overflow: visible; }
    /* The shell's phrase card lands inside .app-card; tighten margins so
       it sits cleanly below the section blocks. */
    [data-flove-card-target] .flove-phrase-card {
      margin: 14px 0 0;
    }
  </style>
  <style>
    /* flove identity overrides — dusty blue Esencia */
    :root {
      --app-accent:        #1f6390;
      --app-accent-soft:   #c0d4e8;
      --app-ink-on-accent: #ffffff;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #d9e6f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
    }

    .app-card {
      width: 100%;
      max-width: 600px;
      height: 98vh;
      max-height: 98vh;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2rem;
      box-shadow: 0 20px 40px -10px rgba(16, 52, 90, 0.2);
      border: 1px solid rgba(255,255,255,0.8);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app-header {
      padding: 0.9rem 1.5rem 0.5rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(67, 112, 152, 0.1);
    }

    .logo-area h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0a314b;
    }
    .logo-area p {
      font-size: 0.65rem;
      color: #3b6990;
      font-weight: 500;
    }

    .menu-btn {
      background: white;
      border: 1px solid #c0d4e8;
      width: 38px;
      height: 38px;
      border-radius: 30px;
      font-size: 1.2rem;
      color: #1f5880;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .menu-dropdown {
      position: absolute;
      top: 52px;
      right: 1rem;
      background: white;
      border-radius: 18px;
      box-shadow: 0 12px 20px -8px #123a5a33;
      border: 1px solid #d4e2f0;
      min-width: 170px;
      padding: 0.2rem 0;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-6px);
      transition: 0.15s;
      z-index: 100;
    }

    .menu-dropdown.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .menu-item {
      padding: 0.6rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #1f486b;
      font-weight: 500;
      cursor: pointer;
    }
    .menu-item i { width: 16px; color: #2f76a6; }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 0.5rem 0.8rem;
    }

    .section-block {
      margin-bottom: 0.8rem;
      border-bottom: 1px solid rgba(96, 140, 184, 0.15);
      padding-bottom: 0.5rem;
    }

    .section-toggle-btn {
      width: 100%;
      background: #eef4fa;
      border: 1.5px solid #b8d0e6;
      border-radius: 40px;
      padding: 0.6rem 1.2rem;
      font-weight: 700;
      font-size: 1.2rem;
      color: #0f3e5e;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      margin-bottom: 0.3rem;
      box-shadow: 0 4px 8px -4px rgba(0,0,0,0.05);
      transition: 0.15s;
    }

    .section-toggle-btn i {
      margin-left: auto;
      font-size: 1rem;
      transition: transform 0.2s;
    }

    .section-toggle-btn.collapsed i {
      transform: rotate(-90deg);
    }

    .section-toggle-btn.huella-btn {
      background: #1f6390;
      color: white;
      border-color: #1f6390;
    }

    .subtabs-container {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease-out;
    }

    .subtabs-container.expanded {
      max-height: 300px;
    }

    .subtabs-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 0.3rem 0.5rem;
    }

    .subtab {
      font-size: 0.7rem;
      background: #dee9f3;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      color: #1b4d72;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid #b8d0e6;
      transition: background 0.1s;
    }

    .subtab.intensity-1 { background: #d4e2f0; }
    .subtab.intensity-2 { background: #c0d4e8; }
    .subtab.intensity-3 { background: #aac6df; }
    .subtab.intensity-4 { background: #94b8d6; }
    .subtab.intensity-5 { background: #7eaacd; color: #0a2c44; }

    .subtab.active-subtab {
      background: #1f6390 !important;
      color: white !important;
      border-color: #1f6390;
    }

    .editor-area {
      margin-top: 0.6rem;
      padding: 0 0.2rem;
    }

    .field-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }

    .field-title {
      font-weight: 700;
      font-size: 1rem;
      color: #103a58;
    }

    .nav-arrows {
      display: flex;
      gap: 5px;
    }

    .nav-arrows button {
      background: white;
      border: 1px solid #bed6ec;
      width: 32px;
      height: 32px;
      border-radius: 30px;
      font-size: 0.8rem;
      color: #1f5f8a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .entries-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .entry-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .entry-item textarea {
      width: 100%;
      padding: 0.8rem 0.9rem;
      border: 2px solid #c7ddef;
      border-radius: 20px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      background: white;
      resize: vertical;
      min-height: 90px;
      line-height: 1.4;
    }

    .remove-entry-btn {
      align-self: flex-end;
      background: none;
      border: none;
      color: #8fadc9;
      font-size: 1rem;
      cursor: pointer;
    }

    .action-buttons-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 0.2rem;
    }

    .voice-btn, .add-entry-btn {
      background: transparent;
      border: 1.5px dashed #2f7eb3;
      border-radius: 30px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f6390;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .voice-btn.recording {
      background: #ff6b6b;
      color: white;
      border-color: #ff6b6b;
    }

    .huella-content {
      padding: 0.5rem 0.2rem;
    }

    .readable-phrase {
      background: white;
      padding: 1rem;
      border-radius: 20px;
      font-size: 16px;
      margin: 0.5rem 0;
      line-height: 1.5;
    }

    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .action-btn {
      background: white;
      border: 1.5px solid #bed6ec;
      border-radius: 30px;
      padding: 0.5rem 0.9rem;
      font-weight: 600;
      color: #1e5883;
      cursor: pointer;
      font-size: 0.8rem;
      flex: 1 0 auto;
    }

    .magic-btn {
      background: #1f6390;
      color: white;
      border: none;
    }

    @media (max-width: 480px) {
      .app-card { height: 100vh; max-height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>

<div class="flove-bar">
  <a class="flove-home" href="../index.html">←</a>
  <span class="flove-mark flove-asterism">✺</span>
  <span class="flove-app-name">esencia</span>
  <span class="flove-spacer"></span>
</div>

<!-- Wanty's app menu items move into the shell's right-side ☰ dropdown. -->
<div data-flove-menu="custom" hidden>
  <button class="flove-menu__item" type="button" data-wanty-action="perfil">
    <i class="fas fa-user"></i> Mi perfil
  </button>
  <button class="flove-menu__item" type="button" data-wanty-action="vista">
    <i class="fas fa-sliders-h"></i> Vista rápida
  </button>
  <button class="flove-menu__item" type="button" data-wanty-action="exportar">
    <i class="fas fa-file-export"></i> Exportar
  </button>
  <button class="flove-menu__item" type="button" data-wanty-action="ayuda">
    <i class="fas fa-circle-info"></i> Ayuda
  </button>
  <button class="flove-menu__item" type="button" data-wanty-action="tema">
    <i class="fas fa-palette"></i> Tema
  </button>
</div>

<form id="wanty-form"
      data-flove-app="wanty"
      data-flove-type="essence"
      data-flove-asterism="Esencia/Wanty"
      data-flove-multi="array"
      data-flove-enhance="off">
  <div class="app-card">
    <div class="app-header">
      <div class="logo-area">
        <h2>esencia.</h2>
        <p>define · conecta · proyecta</p>
      </div>
    </div>

    <div class="main-content" id="mainContent"></div>
    <!-- shell renders the phrase card + 6-button bar inside this slot -->
    <div data-flove-card-target></div>
  </div>
</form>

<script>
  (function(){
    // Definición de secciones
    const sections = [
      { id: 'ser', name: 'Ser', fields: [
        { name: 'habilidad', label: 'Habilidad', placeholder: 'Ej: escritura, análisis...' },
        { name: 'habito', label: 'Hábito', placeholder: 'Meditar, leer...' },
        { name: 'hobby', label: 'Hobby', placeholder: 'Pintura, música...' },
        { name: 'rol', label: 'Rol', placeholder: 'Mentor, aprendiz...' },
        { name: 'destacadas', label: 'Destacadas', placeholder: 'Comunicación, resiliencia...' }
      ]},
      { id: 'impulso', name: 'Impulso', fields: [
        { name: 'interes', label: 'Interés', placeholder: 'Tecnología, arte...' },
        { name: 'preferencia', label: 'Preferencia', placeholder: 'Equipo / independiente' },
        { name: 'proyeccion', label: 'Proyección', placeholder: 'En 5 años...' },
        { name: 'idea', label: 'Idea', placeholder: 'Proyecto o concepto' },
        { name: 'dispuesto', label: 'Dispuesto a', placeholder: 'Aprender, viajar...' },
        { name: 'plan', label: 'Plan', placeholder: 'Próximo paso' },
        { name: 'proyecto', label: 'Proyecto', placeholder: 'Nombre' },
        { name: 'mision', label: 'Misión', placeholder: 'Propósito inmediato' },
        { name: 'proposito', label: 'Propósito', placeholder: 'Razón profunda' }
      ]}
    ];

    // Matriz en español
    const matrixTags = ['Quiero', 'Necesito', 'Exijo', 'Solicito', 'Prometo', 'Deseo', 'Me gusta'];

    // Estado
    let activeSection = 'ser';
    let activeFieldIdx = 0;
    let fieldData = {};
    let matrixData = {};

    // Colapso de secciones (por defecto colapsadas)
    let collapsedState = {
      ser: true,
      impulso: true,
      matriz: true,
      huella: true
    };

    // Inicializar datos
    sections[0].fields.forEach(f => { fieldData[f.name] = ['']; });
    sections[1].fields.forEach(f => { fieldData[f.name] = ['']; });
    matrixTags.forEach(tag => { matrixData[tag] = ['']; });

    const mainContent = document.getElementById('mainContent');
    const formEl      = document.getElementById('wanty-form');

    // Wanty's dynamically-rendered <button>s don't carry type="button",
    // so inside a <form> they default to submit and reload the page on
    // click. Swallow the implicit submit so all interactions stay on-page.
    formEl?.addEventListener('submit', e => e.preventDefault());

    // Mirror wanty's state into hidden inputs the shell can snapshot.
    // Called on every keystroke and after every renderAllSections().
    function syncMirror() {
      if (!formEl) return;
      formEl.querySelectorAll('[data-flove-mirror]').forEach(el => el.remove());
      const addMirror = (name, vals) => {
        (vals || []).forEach(v => {
          if (!v || !v.trim()) return;
          const inp = document.createElement('input');
          inp.type = 'hidden';
          inp.name = `${name}[]`;
          inp.value = v;
          inp.dataset.floveMirror = '1';
          formEl.appendChild(inp);
        });
      };
      for (const [name, vals] of Object.entries(fieldData)) addMirror(name, vals);
      for (const [tag,  vals] of Object.entries(matrixData))
        addMirror(tag.toLowerCase(), vals);
      formEl.dispatchEvent(new Event('input', { bubbles: true }));
    }

    // Show/hide sections per shell category-filter event.
    document.addEventListener('flove:filter', ev => {
      const active = new Set((ev.detail.categories || []).map(c => c.toLowerCase()));
      const showAll = active.size === 0;
      document.querySelectorAll('[data-section]').forEach(block => {
        const id = block.dataset.section;
        block.style.display = (showAll || active.has(id)) ? '' : 'none';
      });
    });

    // Custom menu items (moved into the ☰ dropdown by the shell).
    document.addEventListener('click', ev => {
      const act = ev.target.closest('[data-wanty-action]')?.dataset.wantyAction;
      if (!act) return;
      // TODO: real handlers · stub for now
      alert(`wanty · ${act} (próximamente)`);
    });

    // Verificar si un campo tiene contenido (al menos una entrada no vacía)
    function fieldHasContent(fieldName) {
      return fieldData[fieldName]?.some(v => v.trim() !== '') || false;
    }

    function matrixTagHasContent(tag) {
      return matrixData[tag]?.some(v => v.trim() !== '') || false;
    }

    // Intensidad (1-5)
    function getIntensityClass(values) {
      const count = values.filter(v => v.trim() !== '').length;
      if (count === 0) return '';
      if (count >= 5) return 'intensity-5';
      return `intensity-${count}`;
    }

    // Reconocimiento de voz
    let recognition = null;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'es-ES';
    }

    function startVoiceRecognition(callback) {
      if (!recognition) {
        alert('Tu navegador no soporta reconocimiento de voz.');
        return;
      }
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        callback(transcript);
      };
      recognition.onerror = (e) => alert('Error de voz: ' + e.error);
      recognition.start();
    }

    // Cambiar sección activa
    function setActiveSection(secId) {
      activeSection = secId;
      if (secId !== 'huella') {
        // Buscar el primer índice con contenido o 0
        if (secId === 'matriz') {
          const firstIdx = matrixTags.findIndex(tag => matrixTagHasContent(tag));
          activeFieldIdx = firstIdx >= 0 ? firstIdx : 0;
        } else {
          const sec = sections.find(s => s.id === secId);
          const firstIdx = sec.fields.findIndex(f => fieldHasContent(f.name));
          activeFieldIdx = firstIdx >= 0 ? firstIdx : 0;
        }
      }
      // Expandir automáticamente la sección seleccionada
      collapsedState[secId] = false;
      renderAllSections();
    }

    // Renderizar toda la interfaz
    function renderAllSections() {
      let html = '';
      
      function renderSectionBlock(secId, secName, fields, isMatrix = false) {
        const isExpanded = !collapsedState[secId];
        const isActive = (activeSection === secId);
        const chevronClass = isExpanded ? '' : 'collapsed';
        
        let block = `
          <div class="section-block" data-section="${secId}">
            <button class="section-toggle-btn ${secId==='huella'?'huella-btn':''} ${chevronClass}" data-toggle="${secId}">
              ${secId==='huella'?'<i class="fas fa-fingerprint"></i>':''} ${secName} <i class="fas fa-chevron-down"></i>
            </button>
            <div class="subtabs-container ${isExpanded ? 'expanded' : ''}" id="subtabs-${secId}">
        `;

        if (secId !== 'huella') {
          // Generar pestañas solo para campos con contenido
          let subtabsHtml = '';
          if (isMatrix) {
            matrixTags.forEach((tag, i) => {
              if (matrixTagHasContent(tag)) {
                const values = matrixData[tag] || [''];
                const intensity = getIntensityClass(values);
                const activeClass = (isActive && activeFieldIdx === i) ? 'active-subtab' : '';
                subtabsHtml += `<span class="subtab ${intensity} ${activeClass}" data-matrixtag="${tag}" data-idx="${i}">${tag}</span>`;
              }
            });
          } else {
            fields.forEach((f, i) => {
              if (fieldHasContent(f.name)) {
                const values = fieldData[f.name] || [''];
                const intensity = getIntensityClass(values);
                const activeClass = (isActive && activeFieldIdx === i) ? 'active-subtab' : '';
                subtabsHtml += `<span class="subtab ${intensity} ${activeClass}" data-fieldname="${f.name}" data-idx="${i}">${f.label}</span>`;
              }
            });
          }
          
          if (subtabsHtml) {
            block += `<div class="subtabs-row">${subtabsHtml}</div>`;
          } else {
            block += `<div class="subtabs-row" style="padding:0.1rem;"><span style="font-size:0.7rem;color:#7f9ab5;">Añade contenido para ver pestañas</span></div>`;
          }

          // Área de edición (si la sección está activa)
          if (isActive) {
            block += `<div class="editor-area" id="editor-${secId}"></div>`;
          }
        } else {
          // Huella: contenido si está activa (y expandida, que ya lo está porque la activamos)
          if (isActive) {
            block += `<div class="huella-content" id="huellaContent"></div>`;
          }
        }

        block += `</div></div>`;
        return block;
      }

      html += renderSectionBlock('ser', 'Ser', sections[0].fields);
      html += renderSectionBlock('impulso', 'Impulso', sections[1].fields);
      html += renderSectionBlock('matriz', 'Matriz', null, true);
      // Huella section removed: the shell renders the phrase card +
      // 6-button bar (Copy · Share · Magic · Insight · Publish · Format)
      // immediately after this form.

      mainContent.innerHTML = html;

      // Eventos toggle MEJORADOS
      document.querySelectorAll('[data-toggle]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const secId = btn.dataset.toggle;
          const wasCollapsed = collapsedState[secId];
          
          if (wasCollapsed) {
            // Al expandir, activamos la sección (esto hace renderAllSections y expande)
            setActiveSection(secId);
          } else {
            // Al colapsar, solo actualizamos la UI
            collapsedState[secId] = true;
            const container = document.getElementById(`subtabs-${secId}`);
            if (container) container.classList.remove('expanded');
            btn.classList.add('collapsed');
            // Si colapsamos la sección activa, podríamos dejarlo así; el contenido ya no se ve.
          }
        });
      });

      // Eventos pestañas
      document.querySelectorAll('.subtab').forEach(tab => {
        tab.addEventListener('click', (e) => {
          const sectionBlock = tab.closest('.section-block');
          const secId = sectionBlock.dataset.section;
          
          if (tab.dataset.matrixtag) {
            const tag = tab.dataset.matrixtag;
            const idx = matrixTags.indexOf(tag);
            activeSection = 'matriz';
            activeFieldIdx = idx;
          } else if (tab.dataset.fieldname) {
            const fieldName = tab.dataset.fieldname;
            const sec = sections.find(s => s.id === secId);
            const idx = sec.fields.findIndex(f => f.name === fieldName);
            activeSection = secId;
            activeFieldIdx = idx;
          }
          // Expandir la sección
          collapsedState[secId] = false;
          renderAllSections();
        });
      });

      // Renderizar editor correspondiente
      if (activeSection === 'ser' || activeSection === 'impulso') {
        renderFieldEditor(activeSection);
      } else if (activeSection === 'matriz') {
        renderMatrixEditor();
      }

      // Hand state to the shell after each render.
      syncMirror();
    }

    // Actualizar solo las pestañas (intensidades) sin reemplazar el editor
    function updateSubtabsOnly() {
      document.querySelectorAll('.subtab').forEach(tab => {
        let values;
        if (tab.dataset.matrixtag) {
          const tag = tab.dataset.matrixtag;
          values = matrixData[tag] || [''];
        } else if (tab.dataset.fieldname) {
          const fieldName = tab.dataset.fieldname;
          values = fieldData[fieldName] || [''];
        } else return;
        
        const intensity = getIntensityClass(values);
        tab.className = tab.className.replace(/intensity-\d/g, '').trim();
        if (intensity) tab.classList.add(intensity);
      });
    }

    // Editor Ser/Impulso
    function renderFieldEditor(secId) {
      const container = document.getElementById(`editor-${secId}`);
      if (!container) return;
      const sec = sections.find(s => s.id === secId);
      const field = sec.fields[activeFieldIdx];
      const fieldName = field.name;
      const values = fieldData[fieldName] || [''];

      container.innerHTML = `
        <div class="field-header">
          <span class="field-title">${field.label}</span>
          <div class="nav-arrows">
            <button id="prevFieldBtn" ${activeFieldIdx === 0 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>
            <button id="nextFieldBtn" ${activeFieldIdx === sec.fields.length-1 ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>
          </div>
        </div>
        <div class="entries-list" id="entriesList"></div>
        <div class="action-buttons-row">
          <button class="voice-btn" id="voiceAddBtn"><i class="fas fa-microphone"></i></button>
          <button class="add-entry-btn" id="addEntryBtn"><i class="fas fa-plus"></i></button>
        </div>
      `;

      const listDiv = document.getElementById('entriesList');
      function renderEntries() {
        listDiv.innerHTML = '';
        values.forEach((val, idx) => {
          const div = document.createElement('div');
          div.className = 'entry-item';
          div.innerHTML = `
            <textarea data-index="${idx}" placeholder="${field.placeholder}">${val}</textarea>
            ${values.length > 1 ? `<button class="remove-entry-btn" data-index="${idx}"><i class="fas fa-times-circle"></i></button>` : ''}
          `;
          listDiv.appendChild(div);
        });
        document.querySelectorAll('#entriesList textarea').forEach(ta => {
          ta.addEventListener('input', (e) => {
            fieldData[fieldName][e.target.dataset.index] = e.target.value;
            updateSubtabsOnly();
            syncMirror();   // live phrase update
          });
          ta.addEventListener('blur', () => {
            // Re-render para mostrar/ocultar pestañas según contenido
            renderAllSections();
          });
        });
        document.querySelectorAll('.remove-entry-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const i = btn.dataset.index;
            fieldData[fieldName].splice(i, 1);
            renderFieldEditor(secId);
            updateSubtabsOnly();
            renderAllSections();
          });
        });
      }
      renderEntries();

      document.getElementById('addEntryBtn').addEventListener('click', () => {
        fieldData[fieldName].push('');
        renderFieldEditor(secId);
        updateSubtabsOnly();
        renderAllSections();
      });

      document.getElementById('voiceAddBtn').addEventListener('click', function() {
        this.classList.add('recording');
        startVoiceRecognition((text) => {
          this.classList.remove('recording');
          if (text) {
            fieldData[fieldName].push(text);
            renderFieldEditor(secId);
            updateSubtabsOnly();
            renderAllSections();
          }
        });
        setTimeout(() => this.classList.remove('recording'), 5000);
      });

      document.getElementById('prevFieldBtn')?.addEventListener('click', () => {
        if (activeFieldIdx > 0) { activeFieldIdx--; renderAllSections(); }
      });
      document.getElementById('nextFieldBtn')?.addEventListener('click', () => {
        if (activeFieldIdx < sec.fields.length-1) { activeFieldIdx++; renderAllSections(); }
      });
    }

    function renderMatrixEditor() {
      const container = document.getElementById('editor-matriz');
      if (!container) return;
      const tag = matrixTags[activeFieldIdx];
      const values = matrixData[tag] || [''];

      container.innerHTML = `
        <div class="field-header">
          <span class="field-title">${tag}</span>
          <div class="nav-arrows">
            <button id="prevMatrizBtn" ${activeFieldIdx === 0 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>
            <button id="nextMatrizBtn" ${activeFieldIdx === matrixTags.length-1 ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>
          </div>
        </div>
        <div class="entries-list" id="matrixEntriesList"></div>
        <div class="action-buttons-row">
          <button class="voice-btn" id="voiceMatrixBtn"><i class="fas fa-microphone"></i></button>
          <button class="add-entry-btn" id="addMatrixEntryBtn"><i class="fas fa-plus"></i></button>
        </div>
      `;

      const listDiv = document.getElementById('matrixEntriesList');
      function renderMatrixEntries() {
        listDiv.innerHTML = '';
        values.forEach((val, i) => {
          const div = document.createElement('div');
          div.className = 'entry-item';
          div.innerHTML = `
            <textarea data-index="${i}" placeholder="Describe tu ${tag}...">${val}</textarea>
            ${values.length > 1 ? `<button class="remove-entry-btn" data-index="${i}"><i class="fas fa-times-circle"></i></button>` : ''}
          `;
          listDiv.appendChild(div);
        });
        document.querySelectorAll('#matrixEntriesList textarea').forEach(ta => {
          ta.addEventListener('input', (e) => {
            matrixData[tag][e.target.dataset.index] = e.target.value;
            updateSubtabsOnly();
            syncMirror();   // live phrase update
          });
          ta.addEventListener('blur', () => {
            renderAllSections();
          });
        });
        document.querySelectorAll('#matrixEntriesList .remove-entry-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const i = btn.dataset.index;
            matrixData[tag].splice(i, 1);
            renderMatrixEditor();
            updateSubtabsOnly();
            renderAllSections();
          });
        });
      }
      renderMatrixEntries();

      document.getElementById('addMatrixEntryBtn').addEventListener('click', () => {
        matrixData[tag].push('');
        renderMatrixEditor();
        updateSubtabsOnly();
        renderAllSections();
      });

      document.getElementById('voiceMatrixBtn').addEventListener('click', function() {
        this.classList.add('recording');
        startVoiceRecognition((text) => {
          this.classList.remove('recording');
          if (text) {
            matrixData[tag].push(text);
            renderMatrixEditor();
            updateSubtabsOnly();
            renderAllSections();
          }
        });
        setTimeout(() => this.classList.remove('recording'), 5000);
      });

      document.getElementById('prevMatrizBtn')?.addEventListener('click', () => {
        if (activeFieldIdx > 0) { activeFieldIdx--; renderAllSections(); }
      });
      document.getElementById('nextMatrizBtn')?.addEventListener('click', () => {
        if (activeFieldIdx < matrixTags.length-1) { activeFieldIdx++; renderAllSections(); }
      });
    }

    // Iniciar con Ser activo pero colapsado (opcional, podemos expandir Ser por defecto)
    setActiveSection('ser');
  })();
</script>
