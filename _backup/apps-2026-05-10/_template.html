<!doctype html>
<html lang="es" data-flove-app="APP-NAME">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="flove-categories" content="metaphysics, science, biology, linguistics, psicosocial">
  <title>✺ flove · APP-TITLE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="flove.css">

  <style>
    :root {
      --app-accent:        #6ee7b7;
      --app-accent-soft:   #a7f3d0;
      --app-ink-on-accent: #042418;
    }

    body {
      font-family: var(--flove-font-ui);
      background: #f6f7fb;
      color: #1a1a1a;
      min-height: 100vh;
      margin: 0;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 16px 80px;
    }
    h1 { margin: 0 0 14px; font-size: 1.6rem; }
    form .panel {
      background: #fff;
      border: 1px solid rgba(0,0,0,.06);
      border-radius: var(--flove-radius-lg);
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.04);
      display: grid; gap: 14px;
    }
    label { display: grid; gap: 6px; font-size: .9rem; }
    input, select, textarea {
      padding: 10px 14px;
      border: 1px solid rgba(0,0,0,.12);
      border-radius: var(--flove-radius);
      font: inherit;
      background: #fff;
      color: inherit;
    }
    textarea { min-height: 80px; resize: vertical; }
  </style>
</head>

<body>

<!-- Header. Shell enhances: logo→reload, center filter chips, right ☰ menu. -->
<div class="flove-bar">
  <a class="flove-home" href="index.html">←</a>
  <span class="flove-mark flove-asterism">✺</span>
  <span class="flove-app-name">APP-TITLE</span>
  <span class="flove-spacer"></span>
</div>

<!-- App-specific menu items. Shell moves these into the right-side dropdown.
     Use the .flove-menu__item class for matching style. Hide the host. -->
<div data-flove-menu="custom" hidden>
  <button class="flove-menu__item" type="button"
          onclick="alert('app-custom action')">⚙ this app does X</button>
  <a class="flove-menu__item" href="#help">❓ how this app works</a>
</div>

<main>
  <h1>APP-TITLE</h1>

  <form data-flove-app="APP-NAME"
        data-flove-type="element"
        data-flove-subtype=""
        data-flove-asterism="_unfiled/"
        data-flove-multi="numbered">
    <div class="panel">
      <label>
        what
        <textarea name="what" placeholder="describe…"></textarea>
      </label>
      <label>
        photo (auto-spawn after upload)
        <input name="photo" type="file" accept="image/*">
      </label>
      <label>
        username (core field — singleton, no ➕)
        <input name="username" type="text" autocomplete="username">
      </label>
    </div>
  </form>
</main>

<a class="flove-footer-badge" href="index.html">
  <span class="flove-asterism flove-asterism--still">✺</span> all apps
</a>

<script type="module">
  import { floveShell } from './flove-shell.js';
  // Listen to category filter toggles to update the app's view:
  document.addEventListener('flove:filter', ev => {
    console.info('active categories:', ev.detail.categories);
    // app re-renders its list here
  });
  floveShell();
</script>

</body>
</html>
