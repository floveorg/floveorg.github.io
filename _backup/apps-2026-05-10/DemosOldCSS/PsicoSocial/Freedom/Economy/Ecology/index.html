<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>WORTHING</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <h2>WORTHING</h2>
      <label class="title-input">
        <span></span>
        <input type="text" placeholder="Write OBJECT title here">
      </label>
    </header>


    <section class="grid">
    

      <!-- Fila 1: Symbolical / Historical -->
      <div class="rowhead">MEANINGS</div>
      <div class="cell">
        <details class="criterion">
          <summary>
            <span class="crit-name">Symbolical</span>
            <span class="score-badge" aria-hidden="true">—</span>
          </summary>
          <div class="criterion-body">
            <fieldset class="rating" aria-label="Puntuación Symbolical (1-10)">
              <!-- 1..10 -->
              <label><input name="sym" type="radio" value="1"><i>1</i></label>
              <label><input name="sym" type="radio" value="2"><i>2</i></label>
              <label><input name="sym" type="radio" value="3"><i>3</i></label>
              <label><input name="sym" type="radio" value="4"><i>4</i></label>
              <label><input name="sym" type="radio" value="5"><i>5</i></label>
              <label><input name="sym" type="radio" value="6"><i>6</i></label>
              <label><input name="sym" type="radio" value="7"><i>7</i></label>
              <label><input name="sym" type="radio" value="8"><i>8</i></label>
              <label><input name="sym" type="radio" value="9"><i>9</i></label>
              <label><input name="sym" type="radio" value="10"><i>10</i></label>
            </fieldset>
            <label class="note">
              <span>Nota</span>
              <textarea rows="3" placeholder="Añade una nota para Symbolical…"></textarea>
            </label>
          </div>
        </details>
      </div>
      <div class="cell">
        <details class="criterion">
          <summary>
            <span class="crit-name">Historical</span>
            <span class="score-badge" aria-hidden="true">—</span>
          </summary>
          <div class="criterion-body">
            <fieldset class="rating" aria-label="Puntuación Historical (1-10)">
              <label><input name="hist" type="radio" value="1"><i>1</i></label>
              <label><input name="hist" type="radio" value="2"><i>2</i></label>
              <label><input name="hist" type="radio" value="3"><i>3</i></label>
              <label><input name="hist" type="radio" value="4"><i>4</i></label>
              <label><input name="hist" type="radio" value="5"><i>5</i></label>
              <label><input name="hist" type="radio" value="6"><i>6</i></label>
              <label><input name="hist" type="radio" value="7"><i>7</i></label>
              <label><input name="hist" type="radio" value="8"><i>8</i></label>
              <label><input name="hist" type="radio" value="9"><i>9</i></label>
              <label><input name="hist" type="radio" value="10"><i>10</i></label>
            </fieldset>
            <label class="note">
              <span>Nota</span>
              <textarea rows="3" placeholder="Añade una nota para Historical…"></textarea>
            </label>
          </div>
        </details>
      </div>

      <!-- Fila 2: Functional / Ideal -->
      <div class="rowhead">POWERS</div>
      <div class="cell">
        <details class="criterion">
          <summary>
            <span class="crit-name">Functional</span>
            <span class="score-badge" aria-hidden="true">—</span>
          </summary>
          <div class="criterion-body">
            <fieldset class="rating" aria-label="Puntuación Functional (1-10)">
              <label><input name="func" type="radio" value="1"><i>1</i></label>
              <label><input name="func" type="radio" value="2"><i>2</i></label>
              <label><input name="func" type="radio" value="3"><i>3</i></label>
              <label><input name="func" type="radio" value="4"><i>4</i></label>
              <label><input name="func" type="radio" value="5"><i>5</i></label>

            <label class="note">
              <span>Nota</span>
              <textarea rows="3" placeholder="Añade una nota para Functional…"></textarea>
            </label>
          </div>
        </details>
      </div>
      <div class="cell">
        <details class="criterion">
          <summary>
            <span class="crit-name">Ideal</span>
            <span class="score-badge" aria-hidden="true">—</span>
          </summary>

              <label><input name="ideal" type="radio" value="9"><i>9</i></label>
              <label><input name="ideal" type="radio" value="10"><i>10</i></label>
            </fieldset>
            <label class="note">
              <span>Nota</span>
              <textarea rows="3" placeholder="Añade una nota para Ideal…"></textarea>
            </label>
          </div>
        </details>
      </div>

      <!-- Fila 3: Affordable / Potential -->
      <div class="rowhead">USES</div>
      <div class="cell">
        <details class="criterion">
          <summary>
            <span class="crit-name">Affordable</span>
            <span class="score-badge" aria-hidden="true">—</span>
          </summary>
          <div class="criterion-body">
            <fieldset class="rating" aria-label="Puntuación Affordable (1-10)">
              <label><input name="aff" type="radio" value="1"><i>1</i></label>
              <label><input name="aff" type="radio" value="2"><i>2</i></label>

      <div class="cell">

        </details>
      </div>

      <!-- Fila 4: Respectful / Regenerative -->
      <div class="rowhead">FRIENDLY</div>
      <div class="cell">
        <details class="criterion">
          <summary>
            <span class="crit-name">Respectful</span>
            <span class="score-badge" aria-hidden="true">—</span>
          </summary>
          <div class="criterion-body">
            <fieldset class="rating" aria-label="Puntuación Respectful (1-10)">
              <label><input name="resp" type="radio" value="1"><i>1</i></label>
              <label><input name="resp" type="radio" value="2"><i>2</i></label>
              <label><input name="resp" type="radio" value="3"><i>3</i></label>
              <label><input name="resp" type="radio" value="4"><i>4</i></label>
              <label><input name="resp" type="radio" value="5"><i>5</i></label>
              <label><input name="resp" type="radio" value="6"><i>6</i></label>
              <label><input name="resp" type="radio" value="7"><i>7</i></label>
              <label><input name="resp" type="radio" value="8"><i>8</i></label>
              <label><input name="resp" type="radio" value="9"><i>9</i></label>
              <label><input name="resp" type="radio" value="10"><i>10</i></label>

              <span>Nota</span>

      <div class="cell">

          <summary>
