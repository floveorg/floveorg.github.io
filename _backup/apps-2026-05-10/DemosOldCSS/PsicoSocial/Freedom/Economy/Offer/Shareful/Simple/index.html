
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>INSTA•SHARE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="header">
        <div class="brand"><div class="logo"></div><span>INSTASHARE</span></div>
        <div class="badges">
          <div class="badge" data-count="25">🔔</div>
          <div class="badge" data-count="12">💬</div>
          <div class="badge">☰</div>
        </div>
      </div>

      <div class="section">
        <details open>
          <summary>LATEST THINGS</summary>
          <div class="content list">
            <div class="item"><span>Bike (photo)</span> <span class="small">1h ago</span></div>
            <div class="item"><span>Tool set</span> <span class="small">3h ago</span></div>
          </div>
        </details>
      </div>

      <div class="section">
        <details open>
          <summary>ADD NEW THING</summary>
          <div class="content grid">
            <div class="controls">
              <button class="btn">ADD MEDIA</button>
            </div>
            <div class="list">
              <div class="item">
                <span>3 nights of hosting</span>
                <div class="controls">
                  <input type="text" placeholder="Add a wish here" style="width:260px">
                  <button class="btn">OK</button>
                </div>
              </div>
            </div>
          </div>
        </details>
      </div>

      <div class="section">
        <details open>
          <summary>ADD CATEGORIES</summary>
          <div class="content grid two">
            <div class="list">
              <div class="item"><strong>SOULS</strong></div>
              <div class="item">ADJECTIVE 1</div>
              <div class="item accent">BRAVE</div>
              <div class="item">ADJECTIVE 3</div>
              <div class="item">ADJECTIVE 4</div>
              <div class="item">ADJECTIVE 5</div>
            </div>
            <div class="list">
              <div class="item"><strong>OTHER</strong></div>
              <div class="item accent">CATEGORY 1</div>
              <div class="item">CATEGORY 2</div>
              <div class="item">CATEGORY 3</div>
              <div class="item">CATEGORY 4</div>
              <div class="item">CATEGORY 5</div>
            </div>
          </div>
        </details>
      </div>

      <div class="footer-actions">
        <button class="btn accent">PUBLISH</button>
      </div>
    </section>
  </main>
</body>
</html>
