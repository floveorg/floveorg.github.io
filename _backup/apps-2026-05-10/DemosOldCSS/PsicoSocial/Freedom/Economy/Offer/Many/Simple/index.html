
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>THINGS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="header">
        <div class="brand"><div class="logo"></div><span>THINGS</span></div>
        <div class="badges">
          <div class="badge" data-count="25">🔔</div>
          <div class="badge" data-count="12">💬</div>
          <div class="badge">☰</div>
        </div>
      </div>

      <div class="section">
        <details open>
          <summary>LATEST THINGS</summary>
          <div class="content list">
            <div class="item"><span>Backpack</span> <span class="small">new</span></div>
            <div class="item"><span>Compost bin</span> <span class="small">yesterday</span></div>
          </div>
        </details>
      </div>

      <div class="section">
        <details open>
          <summary>ADD NEW THING</summary>
          <div class="content grid">
            <div class="controls">
              <input type="text" placeholder="Add a thing here">
              <button class="btn">OK</button>
            </div>
            <div class="controls">
              <button class="btn">ADD MEDIA</button>
            </div>
          </div>
        </details>
      </div>

      <div class="section">
        <details open>
          <summary>CATEGORIES</summary>
          <div class="content">
            <div class="pills" style="margin-bottom:10px">
              <div class="pill"><input type="radio" id="tab1" name="tab" checked><label for="tab1">ECOLOGICAL</label></div>
              <div class="pill"><input type="radio" id="tab2" name="tab"><label for="tab2">CRAFT</label></div>
            </div>
            <div class="grid two">
              <div class="list">
                <div class="item"><strong>SOULS</strong></div>
                <div class="item">ADJECTIVE 1</div>
                <div class="item accent">BRAVE</div>
                <div class="item">ADJECTIVE 3</div>
                <div class="item">ADJECTIVE 4</div>
                <div class="item">ADJECTIVE 5</div>
              </div>
              <div class="list">
                <div class="item"><strong>OTHER</strong></div>
                <div class="item accent">FAVOURITE</div>
                <div class="item">URGENT</div>
                <div class="item">HIGH QUALITY</div>
                <div class="item">GOOD QUALITY</div>
                <div class="item">HIGHLY LOVED</div>
              </div>
            </div>
          </div>
        </details>
      </div>

      <div class="section">
        <details open>
          <summary>WISHES</summary>
          <div class="content grid two">
            <input type="text" value="WORLD PEACE">
            <input type="text" placeholder="Add a wish here">
          </div>
        </details>
      </div>

      <div class="section">
        <details open>
          <summary>CONDITIONS</summary>
          <div class="content grid">
            <div class="pills">
              <div class="pill"><input type="radio" id="g" name="cond" checked><label for="g">GIFT</label></div>
              <div class="pill"><input type="radio" id="l" name="cond"><label for="l">LEND</label></div>
              <div class="pill"><input type="radio" id="e" name="cond"><label for="e">EXCHANGE</label></div>
            </div>
            <div class="controls" style="max-width:220px">
              <input type="number" placeholder="000€">
            </div>
            <div class="grid three">
              <div class="range">
                <label class="small">Trust needed</label>
                <input type="range" min="0" max="100" value="60">
              </div>
              <div class="range">
                <label class="small">Flexibility</label>
                <input type="range" min="0" max="100" value="50">
              </div>
              <div class="range">
                <label class="small">Potentiality</label>
                <input type="range" min="0" max="100" value="20">
              </div>
            </div>
          </div>
        </details>
      </div>

      <div class="section">
        <details open>
          <summary>ADDITIONAL INFORMATION</summary>
          <div class="content">
            <textarea rows="4" placeholder="Insert text here"></textarea>
          </div>
        </details>
      </div>

      <div class="section">
        <strong>CONTACT</strong>
      </div>

      <div class="footer-actions">
        <button class="btn">SAVE</button>
        <button class="btn accent">PUBLISH</button>
        <button class="btn">SHARE</button>
      </div>
    </section>
  </main>
</body>
</html>
