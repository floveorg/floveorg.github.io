<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Real Realyns</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700&family=Marcellus&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="sky">
    <div class="stars"></div>
    <div class="nebula"></div>
  </div>

  <main class="wrap">
    <header class="heading card">
      <h1>Real <span>✧</span> Realyns</h1>
      <p>Capture ideas across reality and imagination.</p>
    </header>

    <form class="dream-form card" autocomplete="on">
      <div class="grid">
        <!-- Corner -->
        <div class="cell corner" aria-hidden="true"></div>
        <!-- Column headers -->
        <div class="cell colhead">Real</div>
        <div class="cell colhead">Fictional</div>

        <!-- Row: Event -->
        <div class="cell rowhead">
          <span class="rowtitle">Event</span>
          <small>something that happened / could happen</small>
        </div>
        <div class="cell">
          <label class="visually-hidden" for="event-real">Event — Real</label>
          <textarea id="event-real" name="event_real" placeholder="e.g., community garden opening…"></textarea>
        </div>
        <div class="cell">
          <label class="visually-hidden" for="event-fic">Event — Fictional</label>
          <textarea id="event-fic" name="event_fictional" placeholder="e.g., moonlight festival on a floating island…"></textarea>
        </div>

        <!-- Row: Simple Fact -->
        <div class="cell rowhead">
          <span class="rowtitle">Simple Fact</span>
          <small>a clear statement</small>
        </div>
        <div class="cell">
          <label class="visually-hidden" for="fact-real">Simple Fact — Real</label>
          <textarea id="fact-real" name="fact_real" placeholder="e.g., seeds sprout in 3–7 days…"></textarea>
        </div>
        <div class="cell">
          <label class="visually-hidden" for="fact-fic">Simple Fact — Fictional</label>
          <textarea id="fact-fic" name="fact_fictional" placeholder="e.g., moths deliver tiny letters at dawn…"></textarea>
        </div>

        <!-- Row: Abstract Idea -->
        <div class="cell rowhead">
          <span class="rowtitle">Abstract Idea</span>
          <small>a concept or principle</small>
        </div>
        <div class="cell">
          <label class="visually-hidden" for="idea-real">Abstract Idea — Real</label>
          <textarea id="idea-real" name="idea_real" placeholder="e.g., mutual aid as long-term resilience…"></textarea>
        </div>
        <div class="cell">
          <label class="visually-hidden" for="idea-fic">Abstract Idea — Fictional</label>
          <textarea id="idea-fic" name="idea_fictional" placeholder="e.g., rivers remember names whispered to them…"></textarea>
        </div>

        <!-- Row: Project -->
        <div class="cell rowhead">
          <span class="rowtitle">Project</span>
          <small>an organized effort</small>
        </div>
        <div class="cell">
          <label class="visually-hidden" for="proj-real">Project — Real</label>
          <textarea id="proj-real" name="project_real" placeholder="e.g., build a seed library and workshop series…"></textarea>
        </div>
        <div class="cell">
          <label class="visually-hidden" for="proj-fic">Project — Fictional</label>
          <textarea id="proj-fic" name="project_fictional" placeholder="e.g., cartography of dreams in starlight ink…"></textarea>
        </div>
      </div>

      <section class="meta">
        <div class="meta-field">
          <label for="author">Author</label>
          <input id="author" name="author" type="text" placeholder="Your name or crew" />
        </div>
        <div class="meta-field">
          <label for="date">Date</label>
          <input id="date" name="date" type="date" />
        </div>
        <div class="meta-field full">
          <label for="notes">Whispers & notes</label>
          <textarea id="notes" name="notes" placeholder="Context, sources, feelings…"></textarea>
        </div>
      </section>

      <footer class="actions">
        <button type="reset" class="ghost">Save</button>
        <button type="submit" class="primary">Send</button>
        <button type="submit" class="primary">Publish</button>
      </footer>
    </form>
  </main>
</body>
</html>
