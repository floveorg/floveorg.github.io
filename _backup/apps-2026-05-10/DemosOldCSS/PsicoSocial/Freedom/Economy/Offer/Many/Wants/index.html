<link href="styles.css" rel="stylesheet"/>

<section class="pedido">
  <h2>✨ TELL WANTS YOU HAVE✨</h2>

  <!-- Parte 1: Identidad y Capacidades -->
  <div class="form-block">
    <h3>Identidad y Capacidades</h3>
    <label>Tu habilidad principal:
      <input type="text" name="hability" placeholder="Ej: programación, cocina...">
    </label>
    <label>Un hábito que te define:
      <input type="text" name="habit" placeholder="Ej: leer cada noche...">
    </label>
    <label>Hobby favorito:
      <input type="text" name="hobby" placeholder="Ej: escalar, pintar...">
    </label>
    <label>Rol que desempeñas:
      <input type="text" name="role" placeholder="Ej: mentor, aprendiz...">
    </label>
    <label>Habilidades destacadas:
      <textarea name="skills" placeholder="Lista tus skills más útiles..."></textarea>
    </label>
  </div>

  <!-- Parte 2: Motivaciones y Proyecciones -->
  <div class="form-block">
    <h3>Motivaciones y Proyecciones</h3>
    <label>Interés principal:
      <input type="text" name="interest">
    </label>
    <label>Preferencia:
      <input type="text" name="preference">
    </label>
    <label>Proyección futura:
      <input type="text" name="projection">
    </label>
    <label>Idea que tienes en mente:
      <textarea name="idea"></textarea>
    </label>
    <label>¿Estás dispuesto a...?
      <input type="text" name="willing">
    </label>
    <label>Plan concreto:
      <input type="text" name="plan">
    </label>
    <label>Proyecto:
      <input type="text" name="project">
    </label>
    <label>Misión:
      <input type="text" name="mission">
    </label>
    <label>Propósito de vida:
      <textarea name="life-purpose"></textarea>
    </label>
  </div>

  <!-- Parte 3: Tipo de Pedido/Demanda -->
  <div class="form-block">
    <h3></h3>
    <p></p>
    <div class="options-grid">
      <label><input type="checkbox" name="tipo" value="want"> Want</label>
      <label><input type="checkbox" name="tipo" value="need"> Need</label>
      <label><input type="checkbox" name="tipo" value="demand"> Demand</label>
      <label><input type="checkbox" name="tipo" value="request"> Request</label>
      <label><input type="checkbox" name="tipo" value="pledge"> Pledge</label>
      <label><input type="checkbox" name="tipo" value="wish"> Wish</label>
      <label><input type="checkbox" name="tipo" value="like"> Like</label>

      <textarea name="skills" placeholder="Add information here"></textarea>
    </div>
  </div>

  <!-- Botón Final -->
  <div class="form-block">
    <button type="submit" class="submit-btn">📨 Enviar Pedido</button>
  </div>
</section>
