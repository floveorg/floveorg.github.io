<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FREED GIFTING DECLARATION</title>
<style>
:root{
  --bg:#0b0c10; --panel:#11131b; --ink:#eaf1ff; --muted:#a9b1c7;
  --stroke:#23273a; --fx:#161a2a; --ok:#33ffcc; --warn:#ffd166; --err:#ff5a7a;
  --accA:#7cffcb; --accB:#5ad1ff; --accC:#ff7bd5;
}
*{box-sizing:border-box}
body{margin:0;background:
  radial-gradient(70vmax 50vmax at 110% -10%, #14202d 0 40%, transparent 60%) no-repeat,
  radial-gradient(80vmax 60vmax at -10% 0%, #211a34 0 40%, transparent 60%) no-repeat var(--bg);
  color:var(--ink); font:16px/1.6 system-ui,Segoe UI,Inter,Roboto,Arial,sans-serif}
.wrapper{max-width:1000px;margin:48px auto;padding:0 16px 80px}
.header{display:flex;gap:14px;align-items:center;margin-bottom:14px}
.logo{width:40px;height:40px;border-radius:12px;
  background:conic-gradient(from 210deg,var(--accA),var(--accB),var(--accC),var(--accA));
  box-shadow:0 0 0 2px #ffffff12 inset,0 15px 35px #0008}
h1{margin:.2rem 0 0;font-weight:800;letter-spacing:.3px;
  background:linear-gradient(90deg,#fff,#e9f2ff 40%,#ffe6f6 80%);-webkit-background-clip:text;background-clip:text;color:transparent}
.badge{display:inline-flex;gap:.5rem;align-items:center;color:var(--muted);
  background:linear-gradient(135deg,#191c2a,#10121b);border:1px solid #262a3f;border-radius:999px;padding:.35rem .7rem;font-size:.85rem}

.card{background:linear-gradient(180deg,#131625ee,#0f1220ee);border:1px solid var(--stroke);
  border-radius:18px;padding:18px;box-shadow:0 10px 40px #000a,0 0 0 1px #ffffff10 inset;backdrop-filter:blur(8px)}
.card + .card{margin-top:16px}
fieldset{border:1px solid #262a3f;border-radius:14px;padding:12px;background:var(--fx);margin:0}
legend{padding:0 .6rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:.8rem}
.section-title{display:flex;justify-content:space-between;align-items:center;margin:0 0 .6rem}
.section-title h2{font-size:1.08rem;margin:0}
.help{color:var(--muted);font-size:.9rem}
.grid{display:grid;gap:12px}
.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
@media (max-width:820px){.grid.cols-4,.grid.cols-3{grid-template-columns:repeat(2,minmax(0,1fr))}}

.pill{position:relative;display:flex;gap:.65rem;align-items:center;padding:.7rem .9rem;cursor:pointer;
  background:#121526;border:1px solid #2a2f46;border-radius:12px;
  transition:transform .12s ease,border-color .2s,box-shadow .25s,background .25s}
.pill:hover{transform:translateY(-1px);border-color:#3a4060;box-shadow:0 14px 28px #0008}
.pill:active{transform:translateY(0) scale(.99)}
input[type=checkbox],input[type=radio]{position:absolute;inline-size:0;block-size:0;opacity:0;pointer-events:none}
.tick{inline-size:1.1rem;block-size:1.1rem;border:1.6px solid #3c4160;border-radius:7px;display:grid;place-items:center;background:#0f1322;transition:.2s}
.pill.radio .tick{border-radius:999px}
.tick::after{content:"";inline-size:.62rem;block-size:.62rem;border-radius:4px;transform:scale(0);transition:transform .18s ease;
  background:linear-gradient(135deg,var(--ok),var(--accB));box-shadow:0 0 12px #00ffc955}
input:checked + .tick{border-color:transparent;background:linear-gradient(135deg,#0c1f1b,#0f1a24);
  box-shadow:0 0 0 1px #00ffd455 inset,0 0 18px #00ffd430}
input:checked + .tick::after{transform:scale(1)}

.sub{font-size:.9rem;color:#cfe7ff;background:#0f1b27;border:1px dashed #2b4858;padding:.5rem .6rem;border-radius:10px}
.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mt8{margin-top:8px}.mt16{margin-top:16px}

textarea,input[type=text],input[type=datetime-local]{width:100%;padding:.75rem .9rem;border-radius:12px;border:1px solid #2a2f46;background:#0f1322;color:#dfe8ff}
textarea{min-height:92px;resize:vertical}

.curse .pill{border-color:#3b2230;background:#180e15}
.curse input:checked + .tick{box-shadow:0 0 0 1px #ff94c855 inset,0 0 14px #ff6aa360}
.curse input:checked ~ .txt{color:#ffd0dc;filter:drop-shadow(0 0 6px #ff3d6350);animation:wob .8s ease-in-out infinite}
@keyframes wob{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1deg)}}

/* ===== Resumen ===== */
.summary{background:linear-gradient(180deg,#111424,#0e111d);border:1px solid #262a3f;border-radius:18px;padding:18px;box-shadow:0 8px 30px #000a}
.summary h3{margin:.2rem 0 1rem;font-weight:800;letter-spacing:.3px;
  background:linear-gradient(90deg,#eef6ff,#ffe9f6);-webkit-background-clip:text;background-clip:text;color:transparent}
p.pretty{margin:0;padding:14px;border:1px dashed #2c3148;border-radius:14px;background:#0f1424}
.pretty .seg{display:none}
.pretty .comma::after{content:", "}
.pretty .dot::after{content:"."}
.signature{margin-top:14px;padding:12px 14px;border-radius:12px;background:#0f1626;border:1px solid #29344e}
.signature label{display:block;color:var(--muted);font-size:.9rem;margin-bottom:.35rem}
.signature .line{min-height:2rem;border-bottom:1px dashed #3e546e;outline:none;padding:.25rem 0;caret-color:#a8d4ff}

/* ===== Lógica del resumen con :has() ===== */
form#decl{
  /* contextualiza todas las reglas de :has() al formulario */
}
/* Autorización “I / thing.” */
#decl:has(#allow:checked) .s-allow{display:inline}
#decl:has(#thing-name:not(:placeholder-shown)) .s-thing{display:inline}

/* Reglas / Ley */
#decl:has(#no-rules:checked) .s-norules{display:inline}
#decl:has(#no-law:checked) .s-nolaw{display:inline}

/* Propiedad */
#decl:has(#own-none:checked) .s-own-none{display:inline}
#decl:has(#own-noone:checked) .s-own-noone{display:inline}
#decl:has(#own-notme:checked) .s-own-notme{display:inline}
#decl:has(#own-private:checked) .s-own-priv{display:inline}
#decl:has(#own-ours:checked) .s-own-ours{display:inline}
#decl:has(#own-ours-strong:checked) .s-own-ours-strong{display:inline}

/* Ámbito / Dedicación */
#decl:has(#scope-world:checked) .s-world{display:inline}
#decl:has(#scope-universe:checked) .s-universe{display:inline}
#decl:has(#scope-nature:checked) .s-nature{display:inline}
#decl:has(#scope-humanity:checked) .s-humanity{display:inline}

/* Deseo / temporalidad */
#decl:has(#wish-past:checked) .s-past{display:inline}
#decl:has(#wish-concrete:checked) .s-concrete{display:inline}
#decl:has(#wish-abstract:checked) .s-abstract{display:inline}

/* Publicación / Guardado */
#decl:has(#save:checked) .s-save{display:inline}
#decl:has(#publish:checked) .s-publish{display:inline}

/* Programar / destinatario */
#decl:has(#sched:checked) .s-sched{display:inline}
#decl:has(#to-person:checked) .s-to-person{display:inline}
#decl:has(#to-group:checked) .s-to-group{display:inline}

/* Maldición (divertida) */
#decl:has(#curse:checked) .s-curse{display:inline}

/* Bloques opcionales del resumen (textos libres) */
#decl:has(#saying:not(:placeholder-shown)) .s-saying{display:inline}
#decl:has(#how:not(:placeholder-shown)) .s-how{display:inline}
#decl:has(#other:not(:placeholder-shown)) .s-other{display:inline}
</style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="logo" aria-hidden="true"></div>
      <div>
        <span class="badge">FREED GIFTING DECLARATION</span>
        <h1>For waiving property rights</h1>
      </div>
    </div>

    <form id="decl" class="card" autocomplete="off">
      <!-- 1) I / thing. -->
     
      <fieldset class="mb16">
        <div class="grid cols-2">
          <label class="pill">
            <input id="allow" type="checkbox">
            <span class="tick"></span>
            <span class="txt"><strong>I</strong> freed</span>
          </label>
          <div>
            <label class="sub">my</label>
            <input id="thing-name" type="text" placeholder="Write the Thing you want to FREED here">
          </div>
        </div>
      </fieldset>

      <!-- 2) It is / reglas / ley -->
      <div class="section-title">

        <div class="help">It's from now on</div>
      </div>
      <fieldset class="mb16">
        <div class="grid cols-3">
          <label class="pill">
            <input id="no-rules" type="checkbox">
            <span class="tick"></span><span><em>No ruled</em></span>
          </label>
          <label class="pill">
            <input id="no-law" type="checkbox">
            <span class="tick"></span><span><em>Lawless</em></span>
          </label>
         
          <textarea id="how" placeholder="Write your own declaration here"></textarea>
        </div>
   
        <div class="grid cols-3">
          <label class="pill radio"><input type="checkbox" name="own" id="own-none"><span class="tick"></span><span><em>Has no ownership</em></span></label>
          <label class="pill radio"><input type="checkbox" name="own" id="own-noone"><span class="tick"></span><span><em>It's owned by noone</em></span></label>
          <label class="pill radio"><input type="checkbox" name="own" id="own-notme"><span class="tick"></span><span>I am not the propietary anymore</span></label>
          <label class="pill radio"><input type="checkbox" name="own" id="own-private"><span class="tick"></span><span>Noone is the owner</span></label>
          <label class="pill radio"><input type="checkbox" name="own" id="own-ours"><span class="tick"></span><span>It's common, <strong>it's Ours</strong></span></label>
          <label class="pill radio"><input type="checkbox" name="own" id="own-ours-strong"><span class="tick"></span><span>It's globally owned, <strong>it's from everyone!</strong></span></label>
        </div>
      </fieldset>

      <!-- 4) Ámbito / dedicación -->
      <div class="section-title">
        <h2>I wish it for </h2>
      </div>
      <fieldset class="mb16">
        <div class="grid cols-4">
          <label class="pill"><input id="scope-world" type="checkbox"><span class="tick"></span><span>the world</span></label>
          <label class="pill"><input id="scope-universe" type="checkbox"><span class="tick"></span><span>the universe</span></label>
          <label class="pill"><input id="scope-nature" type="checkbox"><span class="tick"></span><span>naturale</span></label>
          <label class="pill"><input id="scope-humanity" type="checkbox"><span class="tick"></span><span>humanity</span></label>
        </div>
      </fieldset>

      <!-- 5) Deseo / temporalidad -->
      <div class="section-title">
        <h2>I also wish it to cause</h2>
      </div>
      <fieldset class="mb16">
        <div class="grid cols-3">
          <label class="pill"><input id="wish-past" type="checkbox"><span class="tick"></span><span>Past</span></label>
          <label class="pill"><input id="wish-concrete" type="checkbox"><span class="tick"></span><span>Present</span></label>
          <label class="pill"><input id="wish-abstract" type="checkbox"><span class="tick"></span><span>Future</span></label>
        </div>
        <div class="mt8">
          <textarea id="saying" placeholder="..."></textarea>
        </div>
      </fieldset>


      <!-- 8) Publicidad divertida: maldición -->
      <fieldset class="curse mb12">
        <label class="pill"><input id="curse" type="checkbox"><span class="tick"></span>
          <span class="txt">I am <strong>cursing</strong> to potential deceivers</span>
        </label>
      </fieldset>
    </form>


      <!-- 6) Información adicional -->
      <div class="section-title">
        <h2>Aditional Information</h2>

      </div>
      <fieldset class="mb16">
        <textarea id="other" placeholder="use instructions / other info..."></textarea>
      </fieldset>

      <!-- 7) Guardar / Publicar / Programar a persona o grupo -->
      <div class="section-title">

      </div>
      <fieldset class="mb16">
        <div class="grid cols-4">
          <label class="pill"><input id="save" type="checkbox"><span class="tick"></span><span>Save</span></label>
          <label class="pill"><input id="publish" type="checkbox"><span class="tick"></span><span>Publish</span></label>
          <label class="pill"><input id="sched" type="checkbox"><span class="tick"></span><span>Schedule sharing</span></label>
        </div>
        <div class="grid cols-3 mt8">
          <div>
            <label class="sub">Date and Time of publishing</label>
            <input type="datetime-local" id="when">
          </div>
          <label class="pill radio"><input type="radio" name="to" id="to-person"><span class="tick"></span><span>to someone</span></label>
          <label class="pill radio"><input type="radio" name="to" id="to-group"><span class="tick"></span><span>to a group</span></label>

  <center><button>DONE</button></div></center>

      </fieldset>
</body>
</html>
