<!DOCTYPE html>
<html lang="gl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flove Deal Demo</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root{
      --ink:#1a1a1a; --red:#e02828; --red2:#c51f1f; --gold:#ffb400;
      --line:#e6e6e6; --chip:#f6f6f6; --font: 'Quicksand', system-ui, sans-serif;
      accent-color: var(--red);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:var(--font);color:var(--ink);background:#fff}
    /* Header */
    header{display:grid;grid-template-columns:1fr auto auto;gap:.75rem;align-items:center;padding:.8rem 1rem;border-bottom:2px solid var(--line)}
    .brand{display:flex;align-items:center;gap:.5rem}
    .menu{width:28px;height:28px;border:1.5px solid var(--ink);border-radius:.5rem;background:transparent;display:grid;place-items:center}
    .menu span{width:14px;height:2px;background:var(--ink);position:relative;display:block}
    .menu span::before,.menu span::after{content:"";position:absolute;left:0;right:0;height:2px;background:var(--ink)}
    .menu span::before{top:-5px}.menu span::after{top:5px}
    .search input{width:100%;min-width:220px;padding:.55rem .65rem;border:1.5px solid var(--ink);border-radius:.6rem}
    .filters{display:flex;gap:.5rem}
    .filters select{border:none;background:var(--red);color:#fff;font-weight:700;border-radius:.6rem;padding:.6rem .85rem}
    .filters select:focus{outline:2px solid var(--red2)}

    /* Layout */
    .wrap{max-width:1100px;margin:1.4rem auto;padding:0 1rem}
    .card{border:1.5px solid var(--ink);border-radius:.9rem;padding:1rem}
    .row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
    .hbar{border:0;border-top:1.5px solid var(--line);margin:1rem 0}
    .legend{font-weight:700;margin:.2rem 0 .5rem}

    /* Chips & fields */
    .chip{background:var(--chip);border:1px solid var(--line);padding:.42rem .6rem;border-radius:.6rem;display:inline-flex;align-items:center;gap:.4rem;font-weight:600}
    .chip circle{display:none}
    .text{padding:.55rem .6rem;border:1.5px solid var(--ink);border-radius:.5rem;min-width:240px}
    .upload{padding:.55rem .85rem;border:1.5px solid var(--ink);border-radius:.6rem;cursor:pointer;user-select:none}

    /* Head radios (Regalar/Prestar/Intercambiar) */
    .modes{gap:1rem;margin-bottom:.6rem}
    .modes label{font-weight:800;letter-spacing:.2px}
    .modes input{margin-right:.35rem}
    /* Star next to selected mode */
    .form:has(#regalar:checked) label[for=regalar]::after{content:"  ★";color:var(--gold)}
    .form:has(#prestar:checked)  label[for=prestar]::after{content:"";}
    .form:has(#intercambiar:checked) label[for=intercambiar]::after{content:"";}

    /* OFREZO */
    .ask{font-weight:800}
    .ask .q{display:inline-grid;place-items:center;width:18px;height:18px;border:1.5px solid var(--ink);border-radius:50%;font-size:.8rem;margin-left:.35rem}

    /* Artesana/Ecolóxica check-stars */
    .stars-opts .chip{position:relative}
    .form:has(#artesana:checked)   label[for=artesana]::after,
    .form:has(#ecoloxico:checked)  label[for=ecoloxico]::after{
      content:" ★"; color:var(--gold); font-weight:800;
    }

    /* Groups */
    fieldset{border:0;padding:0;margin:0}
    .options{display:grid;gap:.5rem .75rem;margin-top:.4rem}
    .three{grid-template-columns:repeat(3,minmax(140px,1fr))}
    .five {grid-template-columns:repeat(5,minmax(120px,1fr))}
    .options label{display:flex;align-items:center;gap:.45rem;white-space:nowrap}

    /* First option → show a star when checked */
    /* tempo1, uso1, dest1 */
    #tempo1:checked + span::before,
    #uso1:checked   + span::before,
    #dest1:checked  + span::before{
      content:"★ "; color:var(--gold); font-weight:800;
    }

    /* Disable first row (TEMPO) when REGALAR is checked */
    .form:has(#regalar:checked) .group-tempo{
      pointer-events:none; opacity:.5; filter:grayscale(.2);
    }
    /* Disable last row (ACHEGA) when INTERCAMBIAR is checked */
    .form:has(#intercambiar:checked) .group-achega{
      pointer-events:none; opacity:.5; filter:grayscale(.2);
    }

    /* Disable last row (ACHEGA) when Gift is checked */
    .form:has(#regalar:checked) .group-achega{
      pointer-events:none; opacity:.5; filter:grayscale(.2);
    }

    /* TOTAL stars area – 5 slots toggled by conditions */
    .total{display:flex;justify-content:space-between;align-items:center;border-top:1.5px solid var(--line);padding-top:.9rem;margin-top:.6rem;font-weight:800}
    .stars{display:inline-flex;gap:.35rem;font-size:1.1rem}
    .stars .on{display:none;color:var(--gold)}
    /* 1) Regalar */
    .form:has(#regalar:checked) .stars .s-reg{display:inline}
    /* 2) Artesana */
    .form:has(#artesana:checked) .stars .s-art{display:inline}
    /* 3) Ecolóxica */
    .form:has(#ecoloxico:checked) .stars .s-eco{display:inline}
    /* 4–5) Primer elemento de cada fila (tempo, uso, destinatarios) */
    .form:has(#uso1:checked)   .stars .s-uso{display:inline}
    .form:has(#dest1:checked)  .stars .s-dest{display:inline}

    

    /* Footer */
    footer{margin-top:1.2rem;background:var(--red);color:#fff;text-align:center;padding:1.1rem 1rem;font-size:1.4rem;font-weight:900}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="brand">
      <button class="menu" aria-label="menu"><span></span></button>
      <strong>Flove.org: Lovely Service: DEAL</strong>
    </div>
    <div class="search"><input type="search" placeholder="buscar"></div>
    <div class="filters">
      <label aria-label="Categorías">
        <select>
          <option>CATEGORIES</option>
          <option>Tools</option>
          <option>Clothes</option>
          <option>Games</option>
          <option>Books</option>
        </select>
      </label>
      <label aria-label="Zonas">
        <select>
          <option>ZONES</option>
          <option>East</option>
          <option>West</option>
          <option>North</option>
          <option>South</option>
        </select>
      </label>
    </div>
  </header>

  <main class="wrap">
    <form class="card form">
      <!-- MODO -->
      </center>
      <div class="row modes">
        <label for="gift"><a href="http://flove.org/demos/offer/gift"><input type="radio" id="regalar" name="modo">GIFT</label><a/>

        <label for="lend"><input type="radio" id="prestar" name="modo">LEND</label>
        <label for="exchange"><input type="radio" id="intercambiar" name="modo">EXCHANGE</label>
      </div>
      </center>


      <!-- OFREZO -->
      <div class="row">
        <input class="text" type="text" aria-label="offer">
      </div>

      <!-- Artesana / Ecolóxica -->
      <div class="row stars-opts" style="margin:.35rem 0 .2rem">
        <label class="chip" for="artesana"><input type="checkbox" id="artesana"> Crafted</label>
        <label class="chip" for="ecoloxico"><input type="checkbox" id="ecoloxico"> Ecological</label>
      <div class="row" style="margin:.2rem 0 .6rem">
        <label class="upload"><input type="file" hidden>Add media</label>
      </div>
      </div>

      <hr class="hbar">

      <!-- TEMPO (1ª fila) -->
      <fieldset class="group-tempo">
        <div class="legend">TIME</div>
        <div class="options three">
          <label><input type="radio" id="tempo1" name="tempo"><span>Back on request</span></label>
          <label><input type="radio" name="tempo"><span>Back after use</span></label>
          <label><input type="radio" name="tempo"><span>Use where it is</span></label>
        </div>
      </fieldset>

      <!-- TIPO DE USO (2ª fila) -->
      <fieldset>
        <div class="legend">USE TYPE</div>
        <div class="options three">
          <label><input type="radio" id="uso1" name="uso"><span>Anything</span></label>
          <label><input type="radio" name="uso"><span>Shared values only</span></label>
          <label><input type="radio" name="uso"><span>Tell intention first</span></label>
        </div>
      </fieldset>

      <!-- DESTINATARIOS (3ª fila) -->
      <fieldset>
        <div class="legend">PEOPLE</div>
        <div class="options three">
          <label><input type="radio" id="dest1" name="dest"><span>All</span></label>
          <label><input type="radio" name="dest"><span>Known</span></label>
          <label><input type="radio" name="dest"><span>Give grant</span></label>
        </div>
      </fieldset>

      <!-- ACHEGA (última fila; se bloquea con INTERCAMBIAR y Regalar) -->
      <fieldset class="group-achega">
        <div class="legend">CONTRIBUTION</div>
        <div class="options three">
          <label><input type="radio" id="achega1" name="achega"><span>No need</span></label>
          <label><input type="radio" name="achega"><span>Volunteer</span></label>
          <label><input type="radio" name="achega"><span>Fixed</span></label>
        </div>
      </fieldset>

      <!-- TOTAL -->
      <div class="total">
        <span>TOTAL</span>
        <span class="stars">
          <span class="on s-reg">★</span><!-- Regalar -->
          <span class="on s-art">★</span><!-- Artesana -->
          <span class="on s-eco">★</span><!-- Ecolóxica -->
          <span class="on s-temp">★</span><!-- 1º de TEMPO -->
          <span class="on s-uso">★</span><!-- 1º de USO -->
          <span class="on s-dest">★</span><!-- 1º de DESTINATARIOS -->
        </span>
      </div>
    </form>
  </main>

  <footer>For more models besides this one about Service-Deal, see Flove.org</footer>
</body>
</html>
