
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FLOVE — Panel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="header">
        <div class="brand"><div class="logo"></div><span>FLOVE</span></div>
        <div class="badges">
          <div class="badge" aria-label="notificaciones" data-count="3">🔔</div>
          <div class="badge" aria-label="mensajes" data-count="5">💬</div>
          <div class="badge" aria-label="menu">☰</div>
        </div>
      </div>

      <div class="section">
        <div class="controls">
          <button class="btn">Souls</button>
          <button class="btn">Trusts</button>
          <button class="btn">Network</button>
          <button class="btn">Ecology</button>
          <button class="btn">Craft</button>
          <button class="btn" checked>OFFERS</button>
        </div>
      </div>

      <div class="section grid">
 <div class="controls">
          <button class="btn good" checked>GIFT</button>
          <button class="btn accent">Lending</button>
          <button class="btn warn">Exchange</button>
        </div>

        <label class="kv" style="flex-direction:column; align-items:stretch;">

          <div class="controls">
            <input type="text" placeholder="p. ej. Bike, course about painting, etc.">
            <button class="btn" title="Subir imagen">📷</button>
          </div>
        </label>
       
      </div>

      <div class="section grid">
        <div class="pills">
          <div class="pill">
            <input type="radio" id="p1" name="perm">
            <label for="p1">TO COMMONS</label>
          </div>
          <div class="pill">
            <input type="radio" id="p2" name="perm">
            <label for="p2">TO ANYONE</label>
          </div>
          <div class="pill">
            <input type="radio" id="p3" name="perm" checked>
            <label for="p3">TO CLOSE ONES</label>
          </div>
        </div>

        <details>
          <summary>+ Les Happy Ones</summary>
          <div class="content grid two">
            <input type="text" placeholder="Add other group or user">
            <button class="btn">OK</button>
          </div>
        </details>
      </div>

      <div class="footer-actions">
        <button class="btn">SAVE</button>
        <button class="btn accent">SEND</button>
        <button class="btn">PUBLISH</button>
      </div>

      <div class="section center small">
        🌐 <span class="note" style="margin-left:8px">MORE INFO</span>
      </div>
    </section>
  </main>
</body>
</html>
