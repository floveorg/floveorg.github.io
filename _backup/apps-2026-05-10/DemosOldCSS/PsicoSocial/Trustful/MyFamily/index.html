<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MyFamily</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="wrap">
    <h1>Think about a friend of you...</h1>

    <form class="friend-form" autocomplete="off">
      <label for="friend"></label>
      <input id="friend" name="friend" type="text" placeholder="Write name here.." />
    </form>

    <p class="hint">
     Describe what you expect from him/her
    </p>
  </header>


  <main class="wrap">


      <!-- === FILAS DE EJEMPLO ===
           Sustituye los textos de .row-label por los de tu .ods (desde la 3ª fila).
           Duplica o elimina bloques .row según tus filas reales. -->

      <div class="row">
        <div class="cell row-label"><h2>Atention</h2></div>
        <label class="cell col1"><input type="radio" data-col="col1" />Friendship and colaborativity</label>
<br />
        <label class="cell col2"><input type="radio" data-col="col2" />Regular cheers and help</label>
<br />
        <label class="cell col3"><input type="radio" data-col="col3" />Strong emotional companionship</label>
<br />
        <label class="cell col4"><input type="radio" data-col="col4" />Intimate friendship and complicity</label>
<br />
        <label class="cell col5"><input type="radio" data-col="col5" />Regular care and affection</label>
      </div>

<br />

      <div class="row">
        <div class="cell row-label"><h2>Contact</h2></div>
        <label class="cell col1"><input type="radio" data-col="col1" />Attends you sometimes</label>
<br />
        <label class="cell col2"><input type="radio" data-col="col2" />Pass free time together</label>
<br />
        <label class="cell col3"><input type="radio" data-col="col3" />See or hear you</label>
<br />
        <label class="cell col4"><input type="radio" data-col="col4" />Calls you anytime</label>
<br />
        <label class="cell col5"><input type="radio" data-col="col5" />Gives attention preference</label>
      </div>

<br />

      <div class="row">
        <div class="cell row-label"><h2>Influence</h2></div>
        <label class="cell col1"><input type="radio" data-col="col1" />Reply all and send you messages</label>
<br />
        <label class="cell col2"><input type="radio" data-col="col2" />Counseling you about anything</label>
<br />
        <label class="cell col3"><input type="radio" data-col="col3" />Tells what purposes to have</label>
<br />
        <label class="cell col4"><input type="radio" data-col="col4" />Prescribe you attitudes</label>
<br />
        <label class="cell col5"><input type="radio" data-col="col5" />Limitates to do things</label>
      </div>

<br />

      <div class="row">
        <div class="cell row-label"><h2>Feedback</h2></div>
        <label class="cell col1"><input type="radio" data-col="col1" />Criticize you constructively</label>
<br />
        <label class="cell col2"><input type="radio" data-col="col2" />Show being upset with you</label>
<br />
        <label class="cell col3"><input type="radio" data-col="col3" />Show disaproval</label>
<br />
        <label class="cell col4"><input type="radio" data-col="col4" />Negative comenting</label>
<br />
        <label class="cell col5"><input type="radio" data-col="col5" />Criticize you hard</label>
      </div>

<br />

      <div class="row">
        <div class="cell row-label"><h2>Gifting</h2></div>
        <label class="cell col1"><input type="radio" data-col="col1" />Invite you sometimes</label>
<br />
        <label class="cell col2"><input type="radio" data-col="col2" />Gives some regular presents</label>
<br />
        <label class="cell col3"><input type="radio" data-col="col3" />Regular surprising gifts</label>
<br />
        <label class="cell col4"><input type="radio" data-col="col4" />Gift much if you behave good</label>
<br />
        <label class="cell col5"><input type="radio" data-col="col5" />Gifts as much as posible</label>
      </div>

<br />

      <div class="row">
        <div class="cell row-label"><h2>Sharing</h2></div>
        <label class="cell col1"><input type="radio" data-col="col1" />Share some things</label>
<br />
        <label class="cell col2"><input type="radio" data-col="col2" />Grant you something</label>
<br />
        <label class="cell col3"><input type="radio" data-col="col3" />Share much</label>
<br />
        <label class="cell col4"><input type="radio" data-col="col4" />Grants much</label>
<br />
        <label class="cell col5"><input type="radio" data-col="col5" />Share all</label>
      </div>

<br />


  <div class="row">
        <div class="cell row-label"><h2>Money</h2></div>
        <label class="cell col1"><input type="radio" data-col="col1" />Lend you if urgent</label>
<br />
        <label class="cell col2"><input type="radio" data-col="col2" />Lend you money sometimes</label>
<br />
        <label class="cell col3"><input type="radio" data-col="col3" />Gives some if need</label>
<br />
        <label class="cell col4"><input type="radio" data-col="col4" />Gives sometimes, always lend</label>
<br />
        <label class="cell col5"><input type="radio" data-col="col5" />All money is shared</label>
      </div>
      <!-- Añade aquí más .row según necesites -->
    </div>
  </main>
  <br />
      <br />


  <!-- Ajusta aquí los nombres de columnas (Roles = 2ª fila del .ods) -->
  <section class="wrap">
    <div class="totals" id="totals" aria-live="polite">
      <h2>YOUR FRIEND IS</h2>
      <div class="totals-row" data-col="col1">
        <div class="bar"><div class="fill" style="width:0%"></div></div>
        <span class="pct">0%</span>
        <span class="label">Cousin</span>
      </div>
      <div class="totals-row" data-col="col2">
        <div class="bar"><div class="fill" style="width:0%"></div></div>
        <span class="pct">0%</span>
        <span class="label">Sibling</span>
      </div>

      <div class="totals-row" data-col="col3">
        <div class="bar"><div class="fill" style="width:0%"></div></div>
        <span class="pct">0%</span>
        <span class="label">Grandparent</span>
      </div>
      <div class="totals-row" data-col="col4">
        <div class="bar"><div class="fill" style="width:0%"></div></div>
        <span class="pct">0%</span>
        <span class="label">Parent</span>
      </div>
 <div class="totals-row" data-col="col5">
        <div class="bar"><div class="fill" style="width:0%"></div></div>
        <span class="pct">0%</span>
        <span class="label">Couple</span>
      </div>
      <br />
      <br />
      <!-- Si tu .ods tiene más/menos columnas, añade/elimina bloques como estos y
           usa data-col="col5", "col6", etc. y copia la estructura. -->
      <div class="totals-footer">
        <span id="grandTotal">Points earnt</span>
      </div>
    </div>
  </section>


  <!-- JS mínimo para calcular porcentajes -->
  <script>
    (function () {
      const checks = Array.from(document.querySelectorAll('input[type="radio"][data-col]'));
      const totalsBox = document.getElementById('totals');
      const rows = Array.from(totalsBox.querySelectorAll('.totals-row'));
      const grand = document.getElementById('grandTotal');

      function recalc() {
        const counts = {};
        let total = 0;
        checks.forEach(ch => {
          if (ch.checked) {
            const key = ch.dataset.col;
            counts[key] = (counts[key] || 0) + 1;
            total += 1;
          }
        });
        grand.textContent = total + ' Points earnt';

        rows.forEach(r => {
          const key = r.dataset.col;
          const n = counts[key] || 0;
          const pct = total ? Math.round((n * 1000) / total) / 10 : 0; // 0.1%
          r.querySelector('.pct').textContent = pct + '%';
          r.querySelector('.fill').style.width = pct + '%';
        });
      }

      checks.forEach(ch => ch.addEventListener('change', recalc));
      recalc();
    })();
  </script>
</body>
</html>
