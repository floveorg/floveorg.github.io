<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRUSTFUL EVIL CODE</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1><a href="http://flove.org/trustful"">TRUSTFUL</a> EVIL CODE</h1>

    </header>

    <!--
      MAPEADO DESDE ODS (edita estos placeholders):
      - A. Identificación: owner/person/email/ref
      - B. Alcance: let_place, for_days, public_scope, expires_days
      - C. Condiciones: compensable, fully, with_what, warnme, warn_days, cast_curse
      - D. Elementos: get_my, [ofertas/servicios del ODS], get_other
      - E. Reciprocidad: reciprocity
    -->

    <form id="odsForm" class="card form" novalidate>
      <!-- =================== A · IDENTIFICACIÓN =================== -->
      <section class="section">
        <h2 class="section__title">A. WHO</h2>
        <div class="grid grid--2">
          <label class="field">

            <input class="field__control" type="text" name="owner" id="owner" placeholder="Write OFFEROR here" required />

          </label>

          <label class="field">

            <input class="field__control" type="text" name="person" id="person" placeholder="Write RECIPIENT here" required />

          </label>

        </div>
      </section>
<br />
<br />
<br />
<br />
      <!-- =================== B · ALCANCE =================== -->
      <section class="section">
        <h2 class="section__title">B. WHAT</h2>
        <div class="grid grid--3">
        <label class="switch">
          <input type="checkbox" name="let_place" id="let_place" checked />
          <span>I allow to «<span data-bind="person">—</span>» to send me to HELL</span>
        </label>

 <label class="checkbox warn-danger">
            <input type="checkbox" name="cast_curse" id="cast_curse" />
                   <a href="http://flove.org/demos/trustful/crumbler"> <span>Curse me too</span></a>

        </div>
        <div class="grid grid--3">
          <label class="field">
            <span class="field__label">During (days)</span>
            <input class="field__control" type="number" name="for_days" id="for_days" min="0" value="100" />
          </label>

          <label class="field">
            <span class="field__label">Visibility</span>
            <select class="field__control" name="public_scope" id="public_scope">
              <option value="none">Private</option>
              <option value="publicly">Mediator</option>
              <option value="publicly">Comunitary</option>
              <option value="publicly">Public</option>

            </select>
          </label>

          <label class="field">
            <span class="field__label">Expiries in (days)</span>
            <input class="field__control" type="number" name="expires_days" id="expires_days" min="0" value="10" />
          </label>

          </label>
        </div>
      </section>
<br />
<br />
<br />
<br />
      <!-- =================== C · CONDICIONES =================== -->
      <section class="section">
        <h2 class="section__title">C. GRANTS</h2>

        <div class="grid grid--3">
          <label class="checkbox">
            <input type="checkbox" name="compensable" id="compensable" checked />
            <span>Compensable</span>
          </label>

          <label class="checkbox">
            <input type="checkbox" name="fully" id="fully" checked />
            <span>Fully</span>
          </label>

          <label class="field">
            <span class="field__label">Compensate with</span>
            <input class="field__control" type="text" name="with_what" id="with_what" placeholder="Specify goods and services here.." />
          </label>
        </div>

        <div class="grid grid--2">
          <div class="inline">
            <label class="checkbox">
              <input type="checkbox" name="warnme" id="warnme" checked />
              <span>Warn me with</span>
            </label>
            <label class="field field--compact">
              <input class="field__control" type="number" min="0" name="warn_days" id="warn_days" value="10" />
              <span class="addon">days in advance</span>
            </label>
          </div>

         
        </div>
      </section>
<br />
<br />
      <!-- =================== D · ELEMENTOS A OBTENER =================== -->
      <section class="section">
        <h2 class="section__title">D. WHAT ELSE</h2>
 <label class="checkbox">
          <input type="checkbox" name="get_my" id="get_my" checked />
          <span>I also allow you to</span>
        </label>

        <!--
          Mapea tus filas/columnas del ODS a chips (duplica/renombra):
          - offer1/offer2/service1/service2/... (o lo que defina el ODS)
        -->
        <div class="chips">
          <label class="chip"><input type="checkbox" name="get_offer1" checked /><span></span>Know me more</label>
          <label class="chip"><input type="checkbox" name="get_offer2" checked /><span>Get more contact information</span></label>
          <label class="chip"><input type="checkbox" name="get_service1" /><span></span>Use my grants</label>
          <label class="chip"><input type="checkbox" name="get_service2" /><span></span>Use any of my things</label>

          <label class="chip chip--input">
            <input type="text" name="get_other" placeholder="+ otro" />
          </label>
        </div>
<br />
<br />
   <br />
<br />    
        <label class="checkbox">
          <input type="checkbox" name="reciprocity" id="reciprocity" checked />
          <span>I want reciprocity</span>
        </label>

      </section>
<br />
<br />
<br />
<br />

      <!-- =================== REVISIÓN =================== -->
      <section class="section">
        <h2 class="section__title">Resume</h2>
        <div class="review card" id="review">
          <div class="review__title">I allow to <span data-bind="person">—</span></div>
          <div class="review__list" id="reviewList">Select options to see the detail</div>
        </div>
      </section>
<br />
<br />
      <!-- =================== ACCIONES =================== -->
      <div class="actions">
        <button type="submit" class="btn btn--primary">Save</button>
        <button type="reset" class="btn">Reset</button>
      </div>
    </form>
  </main>


  <script>
    // Resumen automático (JS mínimo)
    const form = document.getElementById('odsForm');
    const reviewList = document.getElementById('reviewList');
    const bindEls = document.querySelectorAll('[data-bind="person"]');
    const personInput = document.getElementById('person');

    function collect() {
      // Nombre reflejado
      bindEls.forEach(el => el.textContent = personInput.value || '—');

      const items = [];

      if (form.let_place.checked)
        items.push('sending me to hell');
      if (form.cast_curse && form.cast_curse.checked) items.push('and crumble me');

      const d = form.for_days.value?.trim();
      const exp = form.expires_days.value?.trim();
      const scope = form.public_scope.value;
      if (d) items.push(`during ${d} days`);
      if (scope !== 'none')
        items.push(scope === 'publicly' ? 'private' : 'comunitary');
      if (exp) items.push(`This offer expiries in ${exp} days`);

      const cond = [];
      if (form.compensable.checked) cond.push('Compensable');
      if (form.fully.checked) cond.push('fully');
      if (form.with_what.value) cond.push(`with «${form.with_what.value.trim()}»`);
      if (cond.length) items.push('Other conditions:  ' + cond.join(', '));

      if (form.warnme.checked && form.warn_days.value)
        items.push(`Warn me ${form.warn_days.value} days before`);

      if (form.get_my.checked) {
        const gets = [];
        [...form.querySelectorAll('.chips input[type="checkbox"]')].forEach(cb=>{
          if (cb.checked) gets.push(cb.nextElementSibling.textContent.trim());
        });
        if (form.get_other.value) gets.push(form.get_other.value.trim());
        if (gets.length) items.push('Also get my ' + gets.join(', '));
      }

      if (form.reciprocity.checked) items.push('. I ask for reciprocity');


      reviewList.textContent = items.length ? items.join(' · ') : 'Select options for seeing the details...';
    }

    form.addEventListener('input', collect);
    form.addEventListener('change', collect);
    form.addEventListener('reset', () => setTimeout(collect, 0));
    collect();
  </script>
</body>
</html>
