<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GenderWars</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orbit"></div>

  <main class="shell">
    <header class="titlebar">
      <h1>GenderWars</h1>
      <p class="subtitle">Say it clearly. Keep it classy.</p>
    </header>

    <form id="genderwars" class="card" method="post" action="#">
      <!-- ID helps serverside distinguish forms; not used by JS -->
      <input type="hidden" name="form_id" value="genderwars-v1" />

      <fieldset class="who">
        <legend>I am a</legend>

        <label class="radio-chip">
          <input type="radio" name="iam" value="Woman" required />
          <span class="chip">
            <span class="icon" aria-hidden="true">♀</span>
            Woman
          </span>
        </label>

        <label class="radio-chip">
          <input type="radio" name="iam" value="Man" required />
          <span class="chip">
            <span class="icon" aria-hidden="true">♂</span>
            Man
          </span>
        </label>
      </fieldset>

      <section class="qs">
        <div class="q">
          <label for="q1">1. What don’t you like from the other gender?</label>
          <textarea id="q1" name="dislikes" rows="5" placeholder="Be specific, be respectful…"></textarea>
        </div>

        <div class="q">
          <label for="q2">2. What do you like from the other gender?</label>
          <textarea id="q2" name="wish_for_self" rows="5" placeholder="Sure there are many thinhs..."></textarea>
        </div>

        <div class="q">
          <label for="q3">3. What would you like the other gender to develop more?</label>
          <textarea id="q3" name="their_growth" rows="5" placeholder="Growth in them you’d love to see…"></textarea>
        </div>
      </section>

      <footer class="actions">
        <!-- SAVE: posts as plain text (server should return a downloadable file) -->
        <button
          class="btn solid save"
          type="submit"
          name="action"
          value="save"
          formaction="/save"
          formmethod="post"
          formenctype="text/plain"
        >
          <span class="btn-ico" aria-hidden="true">💾</span> Save
        </button>

        <!-- SEND: opens default mail client with text/plain payload -->
        <button
          class="btn outline send"
          type="submit"
          name="action"
          value="send"
          formaction="mailto:you@example.com?subject=GenderWars%20Submission"
          formmethod="post"
          formenctype="text/plain"
        >
          <span class="btn-ico" aria-hidden="true">✉️</span> Send
        </button>

        <!-- PUBLISH: post to your publication endpoint -->
        <button
          class="btn ghost publish"
          type="submit"
          name="action"
          value="publish"
          formaction="/publish"
          formmethod="post"
        >
          <span class="btn-ico" aria-hidden="true">📣</span> Publish
        </button>
      </footer>

     
    </form>

  </main>
</body>
</html>
