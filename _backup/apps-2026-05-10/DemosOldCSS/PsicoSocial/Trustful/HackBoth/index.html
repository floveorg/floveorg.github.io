<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>HackBoth</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="page">
  <form class="hackboth" action="/save" method="post" novalidate>
    <h1 class="title">HackBoth</h1>

    <!-- 1. Do you want to hack? -->
    <section class="field">
      <label class="label">Do you want to Hack?</label>
      <input type="checkbox" id="want-hack" class="toggle-input" />
      <label for="want-hack" class="pill yes-pill" role="button" aria-pressed="false">Yes</label>
      <div class="tooltip">By agreeing you’d be hacked too...</div>
    </section>

    <!-- 2. Who would you like to hack? -->
    <section class="field">
      <label class="label" for="who">Who-What would you like to Hack?</label>
      <textarea id="who" name="who" rows="2" placeholder="Name it here..."></textarea>
    </section>

    <!-- 3 & 4 in a tri-grid: Left (Q3) / Middle (WHY) / Right (Q4) -->
    <section class="tri-grid">
      <!-- Row 1 -->
      <div class="cell left r1">
        <label class="visually-hidden" for="dislike1">Say 3 things you don’t like from him-her-it</label>
        <textarea id="dislike1" name="dislike1" class="editable" rows="2" placeholder="1 thing you DISLIKE from her-him-it"></textarea>
        <span class="end-icon" aria-hidden="true"></span>
      </div>
      <div class="cell mid r1">
        <div class="mid-text">because of too much</div>
      </div>
      <div class="cell right r1">
        <label class="visually-hidden" for="like1">Say 3 things you Like from her-him-it</label>
        <textarea id="like1" name="like1" class="editable" rows="2" placeholder="1 thing you LIKE"></textarea>
        <span class="end-icon" aria-hidden="true"></span>
      </div>

      <!-- Row 2 -->
      <div class="cell left r2">
        <label class="visually-hidden" for="dislike2">3.2 Don’t like</label>
        <textarea id="dislike2" name="dislike2" class="editable" rows="2" placeholder="Another thing you DISLIKE"></textarea>
        <span class="end-icon female" aria-hidden="true">♀</span>
      </div>
      <div class="cell mid r2">
        <div class="mid-text">because of too much</div>
      </div>
      <div class="cell right r2">
        <label class="visually-hidden" for="like2">4.2 Like</label>
        <textarea id="like2" name="like2" class="editable" rows="2" placeholder="Another thing you LIKE"></textarea>
        <span class="end-icon female" aria-hidden="true">♀</span>
      </div>

      <!-- Row 3 -->
      <div class="cell left r3">
        <label class="visually-hidden" for="dislike3">3.3 Don’t like</label>
        <textarea id="dislike3" name="dislike3" class="editable" rows="2" placeholder="Yet another thing you DISLIKE"></textarea>
        <span class="end-icon male" aria-hidden="true">♂</span>
      </div>
      <div class="cell mid r3">
        <div class="mid-text">because of too much</div>
      </div>
      <div class="cell right r3">
        <label class="visually-hidden" for="like3">4.3 Like</label>
        <textarea id="like3" name="like3" class="editable" rows="2" placeholder="Yet another thing you LIKE"></textarea>
        <span class="end-icon male" aria-hidden="true">♂</span>
      </div>
    </section>

    <!-- 5. Do you want to know the hack? -->
    <section class="field">
      <label class="label">Do you want to know the Hack?</label>
      <input type="checkbox" id="know-hack" class="toggle-input" />
      <label for="know-hack" class="pill yes-pill show-results" role="button">Yes</label>
    </section>

    <!-- Buttons (uniform look + icons) -->
    <section class="buttons">
      <button class="btn" type="submit" name="action" value="save">
        <span class="ico" aria-hidden="true">💾</span><span>Save</span>
      </button>

      <a class="btn" href="mailto:?subject=HackBoth%20results&body=Please%20see%20attached%20form" role="button">
        <span class="ico" aria-hidden="true">✉️</span><span>Send</span>
      </a>

      <input type="checkbox" id="publish-toggle" class="toggle-input" />
      <label for="publish-toggle" class="btn" role="button">
        <span class="ico" aria-hidden="true">📢</span><span>Publish</span>
      </label>
    </section>

    <!-- CSS-only modal for Publish confirmation -->
    <div class="modal" aria-hidden="true">
      <div class="modal-box">
        <h2>Published</h2>
        <p>Your form has been visually published (demo). Hook your backend to persist it...</p>
        <label for="publish-toggle" class="btn btn-close">Close</label>
      </div>
    </div>

  </form>
</main>
</body>
</html>
