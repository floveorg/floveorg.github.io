<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SOULS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Top bar -->
  <header class="appbar">
    <div class="brand">
      <span class="yin-yang" aria-hidden="true"></span>
      <form class="search" role="search" aria-label="Search">
        <input type="search" placeholder="Search…" />
        <button type="submit" aria-label="Go">⌕</button>
      </form>
    </div>
    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </header>

  <!-- Section header -->
  <nav class="sectionbar">
    <strong>SOULS</strong>
    <div class="tab-pills"><span class="pill is-on"></span><span class="pill"></span></div>
    <a class="back" id="btn-back" href="#" aria-label="Back">&lt; BACK</a>
  </nav>

  <main class="screen">
    <!-- ============ STEP 1: ANIMAL ============ -->
    <section id="step-animal" class="view is-visible" aria-labelledby="t-animal">
      <h2 id="t-animal">THINK ABOUT AN ANIMAL:</h2>

      <form class="single-field">
        <input id="animalCustom" type="text" autocomplete="off" placeholder="" value="" />
        <a class="btn primary" href="#step-color">ENTER</a>
      </form>

    </section>

    <!-- ============ STEP 2: COLOUR ============ -->
    <section id="step-color" class="view" aria-labelledby="t-color">
      <h2 id="t-color">A COLOUR:</h2>

      <form class="single-field">
        <input id="colorCustom" type="text" autocomplete="off" placeholder="" value="" />
        <a class="btn primary" href="#step-animal-qualities">ENTER</a>
      </form>

      <footer class="statusbar"><span>LEVEL: <b>1</b></span><span>STEP: <b>1</b></span></footer>
    </section>

    <!-- ============ STEP 3: QUALITIES (ANIMAL) ============ -->
    <section id="step-animal-qualities" class="view" aria-labelledby="t-aq">
      <h2 id="t-aq">3 THINGS ABOUT THE ANIMAL:</h2>

      <form class="triple-fields" id="form-aq">
        <input id="aq1" type="text" placeholder="" value="" />
        <input id="aq2" type="text" placeholder="" value="" />
        <input id="aq3" type="text" placeholder="" value="" />
        <a class="btn primary enter" href="#step-color-qualities">ENTER</a>
      </form>


      <footer class="statusbar"><span>LEVEL: <b>1</b></span><span>STEP: <b>2</b></span></footer>
    </section>

    <!-- ============ STEP 4: QUALITIES (COLOUR) ============ -->
    <section id="step-color-qualities" class="view" aria-labelledby="t-cq">
      <h2 id="t-cq">3 QUALITIES FROM THE COLOUR:</h2>

      <form class="triple-fields" id="form-cq">
        <input id="cq1" type="text" placeholder="" value="" />
        <input id="cq2" type="text" placeholder="" value="" />
        <input id="cq3" type="text" placeholder="" value="" />
        <a class="btn primary enter" href="#step-results">ENTER</a>
      </form>


      <footer class="statusbar"><span>LEVEL: <b>1</b></span><span>STEP: <b>3</b></span></footer>
    </section>

    <!-- ============ STEP 5: RESULTS ============ -->
    <section id="step-results" class="view" aria-labelledby="t-results">
      <h2 id="t-results">PROFILE PREVIEW</h2>

      <div class="panel">
        <header class="panel-h" id="r-animal-title"></header>
        <ul class="kv">You OFFER
          <li id="r-aq1"><em></em></li>
          <li id="r-aq2"><em></em></li>
          <li id="r-aq3"><em></em></li>
        </ul>
      </div>

      <div class="panel">
        <header class="panel-h" id="r-color-title"></header>
        <ul class="kv">You WANT people that are
          <li id="r-cq1"><em></em></li>
          <li id="r-cq2"><em></em></li>
          <li id="r-cq3"><em></em></li>
        </ul>
      </div>

      <div class="actions">
        <a class="btn ghost" id="btn-analise">ANALISE MORE</a>
        <button class="btn" type="button" id="btn-save">SAVE</button>
        <button class="btn" type="button" id="btn-share">SHARE</button>
      </div>

      <a class="btn outline full" href="#" id="btn-preview">REGISTER PROFILE</a>

      <div class="row-help">
        <a class="btn big" href="#step-color-qualities">PLAY LEVEL 2</a>
        <button class="btn help" type="button" aria-label="Help">?</button>
      </div>

      <footer class="statusbar bottom">
        <a class="back" href="#step-color-qualities">&lt; BACK</a>
    
      </footer>
    </section>
  </main>

  <!-- Minimal JS (sin dependencias) para reflejar elecciones en la vista final -->
  <script>
    const qs = s => document.querySelector(s);
    const qsa = s => [...document.querySelectorAll(s)];

    // De lista -> input "custom" (permite tocar un item y volcarlo arriba)
    qsa('.picker').forEach(p => {
      p.addEventListener('change', e => {
        const target = p.dataset.target;
        if (!target) return;
        const checked = p.querySelector('input:checked');
        const field = qs('#' + target + 'Custom');
        if (checked && field) field.value = checked.value;
      });
    });

    // Limitar a 3 checks y autollenar 3 campos
    qsa('.three-limit').forEach(p => {
      p.addEventListener('change', e => {
        const limit = +p.dataset.limit || 3;
        const checked = p.querySelectorAll('input:checked');
        if (checked.length > limit) {
          e.target.checked = false;
          return;
        }
        const prefix = p.dataset.fill; // "aq" o "cq"
        checked.forEach((c, i) => {
          const fld = qs('#' + prefix + (i+1));
          if (fld) fld.value = c.value;
        });
      });
    });

    // Back dinámico (a la sección previa del historial hash)
    const back = qs('#btn-back');
    back.addEventListener('click', (e) => {
      e.preventDefault();
      history.back();
    });

    function choiceFrom(group, customId){
      const custom = qs('#' + customId).value.trim();
      if (custom) return custom;
      const r = qs(`input[name="${group}"]:checked`);
      return r ? r.value : '';
    }
    function top3(prefix){
      return [1,2,3].map(i => qs('#' + prefix + i).value.trim()).filter(Boolean);
    }
    function uc(s){ return s.toUpperCase(); }

    function updateResults(){
      // títulos
      qs('#r-animal-title').textContent = uc(choiceFrom('animal', 'animalCustom')) || '—';
      qs('#r-color-title' ).textContent = uc(choiceFrom('color',  'colorCustom'))  || '—';

      // cualidades
      const aq = top3('aq'), cq = top3('cq');
      ['#r-aq1','#r-aq2','#r-aq3'].forEach((id,i) => qs(id).innerHTML = `<em>${(aq[i]||'').toUpperCase()}</em>`);
      ['#r-cq1','#r-cq2','#r-cq3'].forEach((id,i) => qs(id).innerHTML = `<em>${(cq[i]||'').toUpperCase()}</em>`);
    }

    // Recalcular al entrar en resultados (hashchange y al cargar con #step-results)
    const onHash = () => { if (location.hash === '#step-results') updateResults(); };
    window.addEventListener('hashchange', onHash);
    window.addEventListener('load', onHash);

    // “Share/Save/Preview” de ejemplo (copian un resumen al portapapeles)
    function buildSummary(){
      const A = qs('#r-animal-title').textContent;
      const C = qs('#r-color-title').textContent;
      const aq = [qs('#r-aq1'),qs('#r-aq2'),qs('#r-aq3')].map(n=>n.textContent.trim()).filter(Boolean);
      const cq = [qs('#r-cq1'),qs('#r-cq2'),qs('#r-cq3')].map(n=>n.textContent.trim()).filter(Boolean);
      return `YOUR RESULTS\n\n${A}\n  ${aq.join('\n  ')}\n\n${C}\n  ${cq.join('\n  ')}`;
    }
    function copySummary(){
      updateResults();
      navigator.clipboard?.writeText(buildSummary());
    }
    qs('#btn-save').addEventListener('click', copySummary);
    qs('#btn-share').addEventListener('click', copySummary);
    qs('#btn-preview').addEventListener('click', (e)=>{ e.preventDefault(); copySummary(); });
  </script>
</body>
</html>
