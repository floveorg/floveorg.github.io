<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Avatar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="hero">
  <h1>Avatar</h1>
  <p></p>
</header>

<main class="layout">
  <!-- A) Perfil -->
  <section class="card A">
    <input type="radio" name="tabA" id="a1" checked>
    <input type="radio" name="tabA" id="a2">
    <input type="radio" name="tabA" id="a3">
    <nav class="subtabs">
      <label for="a1">Bio</label>
      <label for="a2">Offers</label>
      <label for="a3">Contributions</label>
    </nav>
    <div class="area a1">
      <div class="avatar"></div>
      <div class="stats">
        <div><span>ACTIVE</span><i style="--v:70%"></i></div>
        <div><span>HISTORIC</span><i style="--v:40%"></i></div>
      </div>
      <div class="pills"><b>WISHES</b><b>WANTS</b><b>PROJECTS</b></div>
    </div>
    <div class="area a2">
      <ul class="list">
        <li>Urban bike</li><li>3D Print</li><li>Building</li>
      </ul>
    </div>
    <div class="area a3">
      <div class="grid">
        <figure></figure><figure></figure><figure></figure><figure class="ghost">See more</figure>
      </div>
    </div>
  </section>

  <!-- B) Préstamos -->
  <section class="card B">
    <h3>Interests</h3>
    <textarea placeholder="Context, metas, afinities..."></textarea>
    <h3>Preferences</h3>
    <textarea placeholder="Conditions, wills, care for..."></textarea>
    <details><summary>Notes</summary>
      <div class="chips"><span>Tight</span><span>Collaborative</span><span>Wise</span></div>
    </details>
    <br />
    <br />
    <h3>Trends</h3>
    <div class="toggles">
      <label><input type="checkbox" checked><span>Fun</span></label>
      <label><input type="checkbox"><span>Biology</span></label>
      <label><input type="checkbox"><span>Edgy</span></label>
      <label><input type="checkbox"><span>Comic</span></label>
      <label><input type="checkbox"><span>Image</span></label>
      <label><input type="checkbox"><span>Old</span></label>
    </div>
    <div class="row">
      <input class="tag" placeholder="Add new">
      <button class="btn">Save</button>
    </div>
  </section>

  <!-- C) Wire -->
  <section class="card C">
    <header><h3>Content from</h3><span class="total">100</span></header>
    <ul class="rows">
      <li><label>FAMILY</label><input type="range" min="0" max="25" value="25"></li>
      <li><label>CLOSE</label><input type="range" min="0" max="20" value="20"></li>
      <li><label>CLANS</label><input type="range" min="0" max="15" value="15"></li>
      <li><label>FAVOURITES</label><input type="range" min="0" max="10" value="10"></li>
      <li><label>FOLLOWING</label><input type="range" min="0" max="5"  value="5"></li>
      <li><label>RELATED</label><input type="range" min="0" max="5"  value="5"></li>
      <li><label>UNRELATED</label><input type="range" min="0" max="5"  value="5"></li>
    </ul>
  </section>
</main>

<footer class="foot">UI combinada — sin JS, responsive, animaciones suaves, accesible.</footer>
</body>
</html>
