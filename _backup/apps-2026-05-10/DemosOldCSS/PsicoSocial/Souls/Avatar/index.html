<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>AVATAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">FLOVE</div>
  <div class="filters">
    <label class="select like-btn">TRENDS ▾</label>
    <label class="select like-btn">ZONES ▾</label>
  </div>
</header>

<main class="shell">
  <section class="card tabs">
    <input type="radio" name="tab" id="tab-nome" checked>
    <input type="radio" name="tab" id="tab-sobre">
    <input type="radio" name="tab" id="tab-ofertas">
    <input type="radio" name="tab" id="tab-outros">

    <nav class="tabbar">
      <label for="tab-nome">AVATAR</label>
      <label for="tab-sobre">CONTRIBS</label>
      <label for="tab-ofertas">OFFERS</label>
      <label for="tab-outros">CONTACT</label>
    </nav>

    <div class="tabcontent" id="c-nome">
      <div class="profile">
        <div class="avatar" aria-label="avatar"></div>
        <div class="meta">
          <div class="stat">
            <span class="s-label">ACTIVE</span>
            <span class="s-bar" style="--v:72%"></span>
          </div>
          <div class="stat">
            <span class="s-label">HISTORIC</span>
            <span class="s-bar" style="--v:48%"></span>
          </div>
        </div>
      </div>
      <div class="grid3 microcards">
        <article><h5>INTERESTS</h5><p>Context, metas, afinities...</p></article>
        <article><h5>PREFERENCES</h5><p>Conditions, wills, care for...</p></article>
        <article><h5>TRENDS</h5><p>Biology, Fun, Edgy...</p></article>
      </div>
      <footer class="pillbar">
        <span class="pill">WISHES</span>
        <span class="pill">WANTS</span>
        <span class="pill">PROJECTS</span>
      </footer>
    </div>

    <div class="tabcontent" id="c-sobre">
      <div class="gallery">
        <figure><span>Foto</span></figure>
        <figure><span>Foto</span></figure>
        <figure><span>Foto</span></figure>
        <figure class="more"><span>See more</span></figure>
      </div>
    </div>

    <div class="tabcontent" id="c-ofertas">
      <ul class="offers">
        <li data-tip="Objeto en muy buen estado">Urban Bike</li>
        <li data-tip="Clases intro · 2h">3D Print</li>
        <li data-tip="Herramientas compartidas">Building</li>
      </ul>
    </div>

    <div class="tabcontent" id="c-outros">
      <div class="chips">
        <span class="chip">my email and else...</span>
        <span class="chip">i prefer...</span>
        <span class="chip">you can also meet me in...</span>
      </div>
    </div>
  </section>
</main>
</body>
</html>
