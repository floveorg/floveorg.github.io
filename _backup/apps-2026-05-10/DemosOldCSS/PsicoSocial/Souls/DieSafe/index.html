<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DieSafe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="site-header">
  <h1>DieSafe</h1>
</header>

Prepare a plan for your last momments of life and for what could happen after that, for having less worries about it overall
<br />
<br />

<main class="container">

  <!-- ========= ESCENARIO 1 ========= -->
  <section class="scenario">
    <input id="sc1-open" type="checkbox" class="toggle" checked>
    <label class="scenario-title" for="sc1-open">
      <span>I am just testing</span>
    </label>

    <div class="scenario-body">
      <fieldset class="meta">

        <div class="grid">
          <label>
            <input type="text" name="sc1_title" placeholder="Title for this death date" />
          </label>
          <label>
            
            <select name="sc1_priority">
              <option value="">Favourite</option>
              <option>Liked</option>
              <option>Maybe</option>
              <option>Not too bad</option>
            </select>
          </label>
        </div>
      </fieldset>

      <!-- ENVIRONMENT -->
      <fieldset>
        <legend>Environment</legend>
        <div class="grid grid-2">
          <label>

            <textarea name="sc1_env_location" rows="5" placeholder="Describe the PLACE here (describe many possible ones)"></textarea>
          </label>
          <label>
            
            <textarea name="sc1_env_ritual" rows="5" placeholder="Logistics: Lights, sounds, decorations, ..."></textarea>
          </label>


        <label class="notes">
         <label>

          <textarea name="sc1_env_notes" rows="5" placeholder="Procedure"></textarea>
        </label>
        </div>
      </fieldset>

      <!-- COMPANIONSHIP -->
      <fieldset>
        <legend>Companions</legend>
        <div class="grid grid-2">
          <label>

            <textarea name="sc1_comp_x" rows="5" placeholder="Who and Roles"></textarea>
          </label>
             
         <textarea name="sc1_health_prefs" rows="5" placeholder="Health care"></textarea>
        </div>

        <label class="notes">
          <textarea name="sc1_comp_notes" rows="5" placeholder="More conditions"></textarea>
        </label>
      </fieldset>

      <!-- HERITAGE -->
      <fieldset>
        <legend>Heritage</legend>

          <div class="grid grid-2">
            <label class="notes">

              <textarea name="sc1_herit_things_to" rows="5" placeholder="Donated things & Recipients"></textarea>
            </label>
         
          </div>
          <label class="notes">
            <textarea name="sc1_herit_things_notes" rows="5" placeholder="Additional information"></textarea>
          </label>
        </div>

        <div class="subblock">
          <h4>Farewell Message</h4>
          <div class="grid grid-3">
            <label class="notes">
              
              <textarea name="sc1_herit_msg_to" rows="5" placeholder="Personal To myself"></textarea>
            </label>
            <label class="notes">
              
              <textarea name="sc1_herit_msg_at" rows="5" placeholder="To my Close people"></textarea>
            </label>
            <label class="notes">
              
              <textarea name="sc1_herit_msg_if" rows="5" placeholder="To the World"></textarea>
            </label>
          </div>
          <label class="notes">
            
            <textarea name="sc1_herit_msg_notes" rows="5" placeholder="Add a more free message here..."></textarea>
          </label>
        </div>

        <div class="subblock">
          <h4>Post mortem actions scheduling</h4>
          <div class="grid grid-3">

            <label class="notes">
              <textarea name="sc1_herit_sch_date" rows="5" placeholder="Dates, ranks, seasons..."></textarea>
            </label>
            
           <label class="notes">            
              <textarea name="sc1_herit_sch_action" rows="5" placeholder="Actions wished to happen"></textarea>
            </label>
            
            <label class="notes">  
              <textarea name="sc1_herit_sch_if" rows="5" placeholder="Conditions, triggers, thresholds, ..."></textarea>
            </label>
          </div>

          <label class="notes">
            <textarea name="sc1_herit_sch_notes" rows="5" placeholder="Additional information"></textarea>
          </label>
        </div>
      </fieldset>

      <!-- TIMELINE: BEFORE / DURING / AFTER -->
      <fieldset>
        <legend>Other things to do</legend>
        <div class="grid grid-3">
          <label class="notes">

            <textarea name="sc1_before" rows="5" placeholder="Before..."></textarea>
          </label>
          <label class="notes">

            <textarea name="sc1_during" rows="5" placeholder="During death..."></textarea>
          </label>
          <label class="notes">

            <textarea name="sc1_after" rows="5" placeholder="After death"></textarea>
          </label>
        </div>
      </fieldset>

      <!-- PREFERENCIAS / CONTACTOS -->
      <fieldset>
        <legend>Formal information</legend>
        <div class="grid">
          <label>
             
            <input type="text" name="sc1_health_prefs" placeholder="Disclaimers" />
          </label>
          <label>

            <input type="text" name="sc1_legal_contact" placeholder="Legal contact" />
          </label>
          <label>

            <input type="text" name="sc1_docs_location" placeholder="Other Documents" />
          </label>
        </div>
      </fieldset>
    </div>
  </section>


  <!-- SUBMIT -->
  <footer class="actions">
    <button type="submit" class="primary">Add another Possibility</button>
    <button type="button" class="ghost" onclick="window.print()">Preview and Save</button>
  </footer>

</main>

</body>
</html>
