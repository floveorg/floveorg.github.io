<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Flove Semantics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f14; --panel:#121722; --ink:#eef4ff; --muted:#9fb1cc;
  --grid:#1a2230; --edge:#223047; --accent:#70f0d3; --accent2:#8d89ff;
}
*{box-sizing:border-box} html,body{height:100%}
body{
  margin:0; background:
    radial-gradient(1200px 800px at 90% -10%, rgba(141,137,255,.16), transparent 60%),
    radial-gradient(1000px 900px at -10% 110%, rgba(112,240,211,.14), transparent 55%),
    linear-gradient(180deg,#0b0e13,#0b0e13);
  color:var(--ink); font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}
.app{ display:grid; grid-template-columns: 68px 1fr 360px; gap:18px; min-height:100dvh; padding:18px }

/* LEFT MEDIA BAR */
.media-bar{
  position:sticky; top:18px; height:calc(100dvh - 36px);
  background:linear-gradient(180deg,#0f1421,#0b1018);
  border:1px solid #162033; border-radius:16px; padding:10px 8px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  box-shadow:0 18px 80px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.02);
}
.media-item{
  width:44px; height:44px; border-radius:12px; display:grid; place-items:center; cursor:pointer;
  border:1px solid #1b263a; background:#0d1320; color:#cfe0ff; position:relative;
  transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.media-item:hover{ transform:translateY(-2px); border-color:#2a3a56; box-shadow:0 8px 26px rgba(0,0,0,.35) }
.media-item.active{ outline:2px solid var(--accent); color:#111; background:linear-gradient(180deg,#6ef2d3,#a0f5e4)}
.media-item svg{ width:20px; height:20px }
.tooltip{
  position:absolute; left:52px; top:50%; translate:0 -50%;
  background:#0b1220; color:#d9e8ff; border:1px solid #1a2438; border-radius:10px; padding:6px 8px;
  font-size:12px; white-space:nowrap; opacity:0; pointer-events:none; transform:translateX(-6px);
  transition:all .12s ease;
}
.media-item:hover .tooltip{ opacity:1; transform:translateX(0) }

/* STAGE */
.stage{
  position:relative; border:1px solid #151e2e; border-radius:18px; overflow:hidden;
  background:radial-gradient(90% 65% at 50% 40%, rgba(255,255,255,.02), transparent 70%);
}
.grid{ position:absolute; inset:0; pointer-events:none; opacity:.22;
  background:
    linear-gradient(0deg, rgba(255,255,255,.05) 1px, transparent 1px) 0 0/40px 40px,
    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px) 0 0/40px 40px;
  mask: radial-gradient(120% 85% at 50% 48%, #000 65%, transparent 100%);
}
.rings{ position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 160px, rgba(255,255,255,.06) 160px 164px, transparent 170px 100%),
    radial-gradient(circle at 50% 50%, transparent 0 260px, rgba(255,255,255,.06) 260px 264px, transparent 270px 100%),
    radial-gradient(circle at 50% 50%, transparent 0 360px, rgba(255,255,255,.06) 360px 364px, transparent 370px 100%);
}
.center-label{ position:absolute; left:50%; top:50%; translate:-50% -50%; text-align:center; pointer-events:none; z-index:2 }
.center-label h1{ margin:0; font-size:30px; letter-spacing:.4px;
  background:linear-gradient(180deg,#fff,#d9e7ff); -webkit-background-clip:text; background-clip:text; color:transparent }
.center-label p{ margin:8px 0 0; color:var(--muted); font-size:12px }

/* SVG */
svg#mindmap{ width:100%; height:100%; display:block }
.link{ stroke:url(#grad); stroke-width:2.4; fill:none; opacity:.95 }           /* SOLID line */
.center-dot{ fill:url(#core); stroke:#2c3f62; stroke-width:2 }

/* Inline labels along paths */
.labelText{ font-size:12px; font-weight:600; letter-spacing:.25px; fill:#d6e7ff; paint-order:stroke; stroke:#0b0f16; stroke-width:3px } /* halo */
.labelText tspan{ fill:#a9bbd8; font-weight:500 }

/* Node badges (for hover/summary + add input) */
.nodeBadge{
  position:absolute; transform:translate(-50%,-50%); pointer-events:auto; display:flex; flex-direction:column; align-items:center; gap:6px;
}
.badgeBox{
  background:#0e1524; border:1px solid #1a2540; border-radius:12px; padding:8px 10px; min-width:160px; text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,.45); position:relative;
}
.badgeTitle{ font-size:12px; color:#cfe1ff; font-weight:700; letter-spacing:.2px }
.badgeMedia{ display:flex; gap:6px; justify-content:center; margin-top:6px; flex-wrap:wrap }
.badgeMedia .m{ width:18px; height:18px; display:grid; place-items:center; border:1px solid #22304b; border-radius:6px; background:#0b1322 }
.badgeAdd{ margin-top:6px; display:none; gap:6px; align-items:center; justify-content:center; }
.badgeAdd input{ width:120px; padding:6px 8px; border-radius:8px; border:1px solid #1a2537; background:#0b1220; color:var(--ink) }
.badgeAdd button{ padding:6px 10px; border-radius:8px; border:1px solid #233149; background:#0d1422; color:#eaf2ff; cursor:pointer }

/* Tooltip for table value + summary */
.tip{
  position:absolute; left:50%; bottom:100%; translate:-50% -10px;
  background:#0b1220; color:#d6e7ff; border:1px solid #1a2438; border-radius:12px; padding:10px 12px;
  width:max-content; max-width:260px; text-align:left; font-size:12px; line-height:1.35;
  opacity:0; transform-origin:50% 100%; scale:.96; transition:opacity .12s ease, scale .12s ease, translate .12s ease;
}
.badgeBox:hover .tip{ opacity:1; scale:1; translate:-50% -14px }

/* Optional node stats (hidden by default; toggle in media bar) */
.nodeStats{ position:absolute; transform:translate(-50%,-50%); display:none; pointer-events:none }
.ringWrap{ position:relative; width:74px; height:74px }
.ringWrap svg{ position:absolute; inset:0 }
.ringWrap .pct{ position:absolute; inset:0; display:grid; place-items:center; font-size:12px; color:#d7e8ff; font-weight:700 }

/* CONTENT STREAM (right column) */
.stream{ display:flex; flex-direction:column; gap:12px }
.panel{
  background:linear-gradient(180deg,#0f1422,#0b1018);
  border:1px solid #172238; border-radius:16px; padding:14px;
  box-shadow:0 22px 80px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.02);
}
.panel h3{ margin:0 0 8px; font-size:14px; color:#cfe1ff; letter-spacing:.2px }
.cards{ display:grid; grid-template-columns:1fr; gap:10px; max-height:calc(100dvh - 180px); overflow:auto; padding-right:2px }
.card{ border:1px solid #1b2742; border-radius:12px; background:#0d1422; padding:10px; display:flex; gap:10px; align-items:flex-start }
.thumb{ width:66px; height:54px; border-radius:8px; border:1px solid #243250; background:#0b1220; display:grid; place-items:center; overflow:hidden }
.thumb img{ width:100%; height:100%; object-fit:cover }
.meta{ font-size:12px; color:#cfe0ff }
.meta .k{ color:#9db0cc }

/* BOTTOM-RIGHT SIDEBAR (Home / Wizard / Settings) */
.br-sidebar{
  position:fixed; right:18px; bottom:18px; z-index:6;
  background:#10182a; border:1px solid #1b2640; border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  display:flex; gap:6px; padding:8px;
}
.br-sidebar .btn{
  display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:10px;
  background:#0f1626; border:1px solid #22314c; color:#eaf2ff; cursor:pointer;
}
.br-sidebar .btn svg{ width:18px; height:18px }
.br-sidebar .btn:hover{ border-color:#2a3a58 }

/* responsive */
@media (max-width:1100px){ .app{ grid-template-columns: 68px 1fr } .stream{ display:none } }
</style>
</head>
<body>
<div class="app">
  <!-- MEDIA BAR -->
  <aside class="media-bar" id="mediaBar" aria-label="Media toggles"></aside>

  <!-- STAGE -->
  <section class="stage">
    <div class="grid"></div><div class="rings"></div>
    <div class="center-label">
      <h1 id="mainWord"></h1>
    </div>
    <svg id="mindmap" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#8d89ff"/><stop offset="100%" stop-color="#70f0d3"/>
        </linearGradient>
        <radialGradient id="core" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#bce9ff"/><stop offset="100%" stop-color="#79ffe1"/>
        </radialGradient>
      </defs>
    </svg>
    <div id="nodeBadges"></div>
    <div id="nodeStats"></div>
  </section>

  <!-- CONTENT STREAM -->
  <aside class="stream">
    <div class="panel">
      <h3>Content stream</h3>
      <div class="cards" id="cards"></div>
    </div>
    <div class="panel">
      <h3>Notes</h3>
      <div class="cards" id="notes"></div>
    </div>
  </aside>
</div>

<!-- BOTTOM-RIGHT SIDEBAR -->
<div class="br-sidebar">
  <button class="btn" id="homeBtn" title="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 11l9-8 9 8v9a2 2 0 0 1-2 2h-4v-6H9v6H5a2 2 0 0 1-2-2z"/></svg>
    Home
  </button>
  <button class="btn" id="wizardBtn" title="Wizard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 19l14-14M7 7l10 10"/><circle cx="7" cy="7" r="2"/><circle cx="17" cy="17" r="2"/></svg>
    Wizard
  </button>
  <button class="btn" id="settingsBtn" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6l-.09.11a2 2 0 0 1-3.2 0l-.09-.11a1.65 1.65 0 0 0-1-.6 1.65 1.65 0 0 0-1.82-.33l-.06.03a2 2 0 1 1-2.83-2.83l.06-.06c.3.26.68.4 1.07.4.39 0 .77-.14 1.07-.4l.06-.06a2 2 0 0 1 2.83 0l.06.06c.3.26.68.4 1.07.4.39 0 .77-.14 1.07-.4l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06c-.26.3-.4.68-.4 1.07z"/></svg>
    Settings
  </button>
</div>

<script>
/* ========================= DATA (swap with your table) ========================= */
const DATA = {
  mainWord: "LOVE",
  nodes: [
    {
      title:"COMPLEMENTARY", summary:"Best matches",
      angle:-80, dist:270,
      media:{
        image:["https://picsum.photos/seed/peo/200/120"],
        video:[{title:"Interview clip", url:"#"}],
        doc:[{title:"Persona notes", text:"Key stakeholders and motivations."}],
        link:[{title:"Org chart", url:"#"}]
      },
      stats:{ pct:72, bars:[6,9,5,8,7] },
      children:[
        { title:"Pairs", summary:"Ideal Companions", media:{doc:[{title:"List", text:"Top 5"}]}, stats:{pct:54,bars:[3,5,4,6]} },
        { title:"Custom", summary:"Original and Custom", media:{image:["https://picsum.photos/seed/team/200/120"]}, stats:{pct:38,bars:[2,3,4,3]} }
      ]
    },
    {
      title:"RELATED", summary:"Close, Synonims...",
      angle:-20, dist:300,
      media:{ image:["https://picsum.photos/seed/place/200/120"], link:[{title:"Field log", url:"#"}] },
      stats:{ pct:41, bars:[3,5,2,4,6] }
    },
    {
      title:"___________UNRELATED", summary:"Surprisy and unreal possible mates",
      angle:55, dist:310,
      media:{ video:[{title:"Demo", url:"#"}], doc:[{title:"Checklist", text:"Build, test, deploy"}] },
      stats:{ pct:83, bars:[7,8,6,9,8] },
      children:[
        { title:"ITEM NOT FOUND", summary:"...", media:{link:[{title:"Repo", url:"#"}]}, stats:{pct:66,bars:[4,6,5,6]} }
      ]
    },

    { title:"DIFFERENT", summary:"Antonyms", angle:150, dist:250, media:{ image:["https://picsum.photos/seed/obj/200/120"], doc:[{title:"Specs", text:"Materials & dims"}] }, stats:{ pct:64,bars:[5,7,6,6,5] } }
  ]
};

const MEDIA_TYPES = [
  { key:"image", label:"Images",  icon:imgIcon,  factory:makeImageCard },
  { key:"video", label:"Videos",  icon:videoIcon,factory:makeVideoCard },
  { key:"audio", label:"Audio",   icon:audioIcon,factory:makeAudioCard },
  { key:"doc",   label:"Docs",    icon:docIcon,  factory:makeDocCard   },
  { key:"link",  label:"Links",   icon:linkIcon, factory:makeLinkCard  },
  { key:"stats", label:"Stats",   icon:statsIcon, factory:null } // toggles node stats visibility
];
const activeMedia = new Set();

/* ========================= ENGINE ========================= */
const W=1200, H=800, CX=W/2, CY=H/2, centerR=34;
const svg = document.getElementById('mindmap');
const badgesLayer = document.getElementById('nodeBadges');
const statsLayer  = document.getElementById('nodeStats');
const cards = document.getElementById('cards');
const notes = document.getElementById('notes');
document.getElementById('mainWord').textContent = DATA.mainWord;

const NS = 'http://www.w3.org/2000/svg';
const nodesIndex = new Map();

function deg2rad(d){ return d*Math.PI/180 }
function polar(cx,cy,r,a){ return [cx + r*Math.cos(a), cy + r*Math.sin(a)] }
function setAttrs(n, o){ for(const k in o) n.setAttribute(k, o[k]) }
function el(tag, props={}, children=[]){ const n=document.createElement(tag); Object.assign(n, props); (children||[]).forEach(c=>n.appendChild(c)); return n }
function escapeHTML(s){ return s.replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m])) }

function layoutAngles(nodes){
  const n = nodes.length; const step = 360/n; const offset = -90;
  nodes.forEach((nd,i)=>{ if(nd.angle==null) nd.angle = offset + i*step; if(nd.dist==null) nd.dist = 240 + (i%3)*30; });
}

function pathCurve(ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay;
  const c1x=ax + dx*0.35, c1y=ay + dy*0.35;
  const c2x=ax + dx*0.75, c2y=ay + dy*0.75;
  return `M ${ax} ${ay} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${bx} ${by}`;
}

function render(){
  svg.innerHTML = `
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#8d89ff"/><stop offset="100%" stop-color="#70f0d3"/>
      </linearGradient>
      <radialGradient id="core" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#bce9ff"/><stop offset="100%" stop-color="#79ffe1"/>
      </radialGradient>
    </defs>`;
  badgesLayer.innerHTML = '';
  statsLayer.innerHTML  = '';

  const center = document.createElementNS(NS,'circle');
  setAttrs(center,{cx:CX, cy:CY, r:centerR, class:'center-dot'});
  svg.appendChild(center);

  layoutAngles(DATA.nodes);
  nodesIndex.clear();

  DATA.nodes.forEach((n, i)=> drawNode(n, {x:CX,y:CY,depth:0,idx:i}));
  updateStatsVisibility();
  updateMediaBadges();
}

/* Draw node + inline label; children on demand */
function drawNode(node, ctx){
  const angle = deg2rad(node.angle), r = node.dist;
  const [x,y] = polar(ctx.x, ctx.y, r, angle);

  // Path
  const path = document.createElementNS(NS,'path');
  const id = genId(node, ctx);
  setAttrs(path,{ id:`p-${id}`, d: pathCurve(ctx.x,ctx.y,x,y), class:'link' });
  svg.appendChild(path);

  // Inline label along the path (title + faint summary)
  const text = document.createElementNS(NS,'text');
  setAttrs(text,{ class:'labelText' });
  const textPath = document.createElementNS(NS,'textPath');
  setAttrs(textPath, { href:`#p-${id}`, startOffset:'50%', 'text-anchor':'middle' });
  const name = node.title || 'Untitled';
  const summary = node.summary ? `  —  ${node.summary}` : '';
  textPath.innerHTML = `${escapeHTML(name)}<tspan>${escapeHTML(summary)}</tspan>`;
  text.appendChild(textPath);
  svg.appendChild(text);

  // Badge (hover summary + add input) positioned near line end
  const badge = makeBadge(node, x, y, id);
  badgesLayer.appendChild(badge);

  // Optional stats widget above the end point
  const stats = makeStats(node, x, y, id);
  statsLayer.appendChild(stats);

  nodesIndex.set(id, { node, x, y, ctx, badge, stats, expanded:false, childrenEls:[] });

  // Click on the text label toggles expansion
  text.style.cursor = 'pointer';
  text.addEventListener('click', ()=> toggleExpand(id));
}

function genId(node, ctx){ return `${ctx.depth}-${ctx.idx}-${(node.title||'node').toLowerCase().replace(/\s+/g,'-')}` }

/* Expand/collapse logic */
function toggleExpand(id){
  const rec = nodesIndex.get(id); if(!rec) return;
  rec.expanded = !rec.expanded;

  // toggle input row visibility
  const addRow = rec.badge.querySelector('.badgeAdd');
  addRow.style.display = rec.expanded ? 'flex' : 'none';

  // remove previous children
  rec.childrenEls.forEach(el => el.remove());
  rec.childrenEls = [];

  const node = rec.node;
  if(rec.expanded && Array.isArray(node.children) && node.children.length){
    const parentAngle = node.angle||0;
    const n = node.children.length;
    const span = Math.min(180, 60 + n*18);
    const step = span/ (n-1 || 1);
    const start = parentAngle - span/2;

    node.children.forEach((ch, idx)=>{
      if(ch.angle==null) ch.angle = start + idx*step;
      if(ch.dist==null)  ch.dist  = 140;

      const subctx = { x:rec.x, y:rec.y, depth: rec.ctx.depth+1, idx: idx };

      // draw and collect newly added DOM nodes so we can remove them later
      const beforeSVG = [...svg.childNodes];
      const beforeBadges = [...badgesLayer.childNodes];
      const beforeStats = [...statsLayer.childNodes];

      drawNode(ch, subctx);

      const newSVG     = [...svg.childNodes].filter(n => !beforeSVG.includes(n));
      const newBadges  = [...badgesLayer.childNodes].filter(n => !beforeBadges.includes(n));
      const newStats   = [...statsLayer.childNodes].filter(n => !beforeStats.includes(n));
      rec.childrenEls.push(...newSVG, ...newBadges, ...newStats);
    });

    updateStatsVisibility();
    updateMediaBadges();
  }
  fillStreamFromVisible();
}

/* Badge (hover content + add input) */
function makeBadge(node, x, y, id){
  const wrap = el('div',{ className:'nodeBadge', style:`left:${x}px; top:${y}px` });

  const box = el('div',{ className:'badgeBox' });
  const title = el('div',{ className:'badgeTitle', textContent: node.title || 'Untitled' });
  const tip = el('div',{ className:'tip' });
  tip.innerHTML = `<strong>${escapeHTML(node.title||'')}</strong><br>${escapeHTML(node.summary||'')}`;

  const mediaRow = el('div',{ className:'badgeMedia' });
  const addRow = el('div',{ className:'badgeAdd' });
  const input = el('input',{ placeholder:'…' });
  const btn = el('button',{ textContent:'Add' });
  btn.onclick = ()=> {
    const v = input.value.trim(); if(!v) return;
    node.media = node.media || {}; node.media.doc = node.media.doc || [];
    node.media.doc.unshift({title:'Note', text:v});
    input.value='';
    fillStreamFromVisible();
    updateMediaBadges();
    notes.prepend(makeDocCard('Note', {text:v}));
  };

  addRow.appendChild(input); addRow.appendChild(btn);
  box.appendChild(tip); box.appendChild(title); box.appendChild(mediaRow); box.appendChild(addRow);
  wrap.appendChild(box);
  return wrap;
}

/* Optional stats widget */
function makeStats(node, x, y, id){
  const s = el('div',{ className:'nodeStats', id:`stats-${id}`, style:`left:${x}px; top:${y-86}px` });
  const ringWrap = el('div',{ className:'ringWrap' });
  const size=74, stroke=8, r=(size/2 - stroke);
  const C = 2*Math.PI*r;
  const pct = (node.stats && typeof node.stats.pct==='number') ? Math.max(0,Math.min(100,node.stats.pct)) : 0;

  const svgR = document.createElementNS(NS,'svg'); setAttrs(svgR,{viewBox:`0 0 ${size} ${size}`, width:size, height:size});
  const bg = document.createElementNS(NS,'circle'); setAttrs(bg,{cx:size/2, cy:size/2, r:r, stroke:'#1b2740', 'stroke-width':stroke, fill:'none'});
  const fg = document.createElementNS(NS,'circle'); setAttrs(fg,{cx:size/2, cy:size/2, r:r, stroke:'url(#grad)', 'stroke-width':stroke, fill:'none','stroke-linecap':'round','stroke-dasharray':C,'stroke-dashoffset':C});
  requestAnimationFrame(()=> setAttrs(fg,{'stroke-dashoffset': C*(1-pct/100)}));
  svgR.appendChild(bg); svgR.appendChild(fg);

  ringWrap.appendChild(svgR);
  ringWrap.appendChild(el('div',{className:'pct', textContent: pct+'%'}));
  s.appendChild(ringWrap);

  if(node.stats && Array.isArray(node.stats.bars)){
    const label = el('div',{style:"margin-top:6px; display:flex; gap:4px; align-items:flex-end; justify-content:center"});
    const mx = Math.max(...node.stats.bars,1);
    node.stats.bars.forEach(v=>{
      const h = Math.round((v/mx)*34)+6;
      const bar = el('i',{style:`width:7px;height:${h}px;background:linear-gradient(180deg,#a5b9d8,#7f93b4);border-radius:3px 3px 0 0;display:inline-block`});
      label.appendChild(bar);
    });
    s.appendChild(label);
  }
  return s;
}

/* MEDIA BAR */
const bar = document.getElementById('mediaBar');
MEDIA_TYPES.forEach(t=>{
  const btn = el('button',{className:'media-item','aria-pressed':'false'});
  btn.innerHTML = t.icon();
  const tip = el('span',{className:'tooltip', textContent:t.label});
  btn.appendChild(tip);
  btn.onclick = ()=>{
    const active = btn.classList.toggle('active');
    btn.setAttribute('aria-pressed', active?'true':'false');
    if(active) activeMedia.add(t.key); else activeMedia.delete(t.key);
    if(t.key === 'stats'){ updateStatsVisibility(); }
    else { updateMediaBadges(); fillStreamFromVisible(); }
  };
  bar.appendChild(btn);
});

function updateStatsVisibility(){
  const show = activeMedia.has('stats');
  statsLayer.querySelectorAll('.nodeStats').forEach(n=> n.style.display = show ? 'block' : 'none');
}

function updateMediaBadges(){
  // For each badge, show tiny icons for the active media types the node actually has
  [...badgesLayer.children].forEach((wrap, idx)=>{
    const box = wrap.querySelector('.badgeBox');
    const mediaRow = box.querySelector('.badgeMedia');
    mediaRow.innerHTML = '';
    const id = [...nodesIndex.keys()][idx];
    const rec = nodesIndex.get(id); if(!rec) return;
    const node = rec.node;
    MEDIA_TYPES.forEach(mt=>{
      if(mt.key==='stats') return;
      if(!activeMedia.has(mt.key)) return;
      const items = (node.media && node.media[mt.key]) || [];
      if(items.length){
        const m = el('div',{className:'m', title:`${mt.label}: ${items.length}`});
        m.innerHTML = mt.icon('#9cc7ff',14,14);
        mediaRow.appendChild(m);
      }
    });
  });
}

function visibleNodes(){
  const arr = [];
  nodesIndex.forEach(rec=> arr.push(rec.node));
  return arr;
}
function fillStreamFromVisible(){
  cards.innerHTML = '';
  if(activeMedia.size===0) return;
  const vset = visibleNodes();
  vset.forEach(n=>{
    MEDIA_TYPES.forEach(mt=>{
      if(mt.key==='stats' || !activeMedia.has(mt.key)) return;
      const items = (n.media && n.media[mt.key]) || [];
      items.forEach(item=>{
        cards.prepend( mt.factory(item.title||'Item', item) );
      });
    });
  });
}

/* CONTENT CARD FACTORIES */
function makeImageCard(title, item){
  const c = cardBase('image', title);
  c.querySelector('.thumb').innerHTML = `<img src="${(typeof item==='string'?item:item.url)||'https://picsum.photos/seed/x/200/120'}" alt=""/>`;
  return c;
}
function makeVideoCard(title, item){
  const c = cardBase('video', title);
  c.querySelector('.thumb').innerHTML = videoIcon('#9cc7ff',26,26);
  c.querySelector('.meta').innerHTML += `<div><span class="k">URL:</span> ${(item && item.url) ? escapeHTML(item.url) : '#'}</div>`;
  return c;
}
function makeAudioCard(title, item){
  const c = cardBase('audio', title);
  c.querySelector('.thumb').innerHTML = audioIcon('#9cc7ff',26,26);
  c.querySelector('.meta').innerHTML += `<div><span class="k">Track:</span> ${escapeHTML(title)}</div>`;
  return c;
}
function makeDocCard(title, item){
  const c = cardBase('doc', title);
  c.querySelector('.thumb').innerHTML = docIcon('#9cc7ff',22,22);
  const detail = item && (item.text || item.url || '');
  c.querySelector('.meta').innerHTML += detail ? `<div>${escapeHTML(detail.slice(0,160))}${detail.length>160?'…':''}</div>` : '';
  return c;
}
function makeLinkCard(title, item){
  const c = cardBase('link', title);
  c.querySelector('.thumb').innerHTML = linkIcon('#9cc7ff',22,22);
  c.querySelector('.meta').innerHTML += `<div><span class="k">Link:</span> ${escapeHTML(item && item.url ? item.url : '#')}</div>`;
  return c;
}
function cardBase(type, title){
  const card = el('div',{className:'card'});
  card.dataset.type = type;
  card.appendChild(el('div',{className:'thumb'}));
  const meta = el('div',{className:'meta'});
  meta.innerHTML = `<div><span class="k">${type.toUpperCase()}</span> — ${escapeHTML(title||'Untitled')}</div>`;
  card.appendChild(meta);
  return card;
}

/* ICONS */
function imgIcon(color="#cfe0ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="9" cy="10" r="2"></circle><path d="M21 15l-5-5-4 4-2-2-5 5"></path></svg>`}
function videoIcon(color="#cfe0ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><rect x="3" y="6" width="14" height="12" rx="2"></rect><path d="M17 8l4-2v12l-4-2z"></path></svg>`}
function audioIcon(color="#cfe0ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><path d="M9 17V7l8-2v10"></path><circle cx="7" cy="17" r="2"></circle><circle cx="17" cy="15" r="2"></circle></svg>`}
function docIcon(color="#cfe0ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><path d="M7 3h7l5 5v13H7z"></path><path d="M14 3v6h6"></path><path d="M9 13h8M9 17h8"></path></svg>`}
function linkIcon(color="#cfe0ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><path d="M10 14l-2 2a4 4 0 0 1-6-3 4 4 0 0 1 1.17-2.83l3-3A4 4 0 0 1 12 8"></path><path d="M14 10l2-2a4 4 0 1 1 5.66 5.66l-3 3A4 4 0 0 1 12 16"></path></svg>`}
function statsIcon(color="#cfe0ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><rect x="4" y="10" width="4" height="8" rx="1"></rect><rect x="10" y="6" width="4" height="12" rx="1"></rect><rect x="16" y="12" width="4" height="6" rx="1"></rect></svg>`}
