
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Create Rater</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Create Rater</h1>
          <small></small>
        </div>
      </div>
      <div class="controls">
        <button id="addRandom" class="btn">Add 5 demo items</button>
        <button id="resetAll" class="btn">Reset</button>
        <button id="export" class="btn primary">Export JSON</button>
      </div>
    </header>

    <div class="layout">
      <aside class="left">
        <div class="card">
          <h3>Add element</h3>
          <div class="field">
            <label>Name</label>
            <input id="newName" type="text" placeholder="e.g., Love">
          </div>
          <div class="field">
            <label>Initial points (−5 … +5)</label>
            <input id="newScore" type="number" min="-5" max="5" value="0" step="1">
          </div>
          <div class="field">
            <label>Tag / Group (optional)</label>
            <input id="newTag" type="text" placeholder="e.g., Emotion">
          </div>
          <button id="addItem" class="btn primary">Add</button>
        </div>

        <div class="card">
          <h3>Stats</h3>
          <div class="grid cols-2">
            <div class="kpi"><span>Total</span><strong id="kTotal">0</strong></div>
            <div class="kpi"><span>Average</span><strong id="kAvg">0.0</strong></div>
          </div>
          <div style="margin-top:10px">
            <canvas id="barChart" width="400" height="260" aria-label="Distribution bar"></canvas>
          </div>
          <div style="margin-top:10px">
            <canvas id="donutChart" width="400" height="260" aria-label="Buckets donut"></canvas>
          </div>
        </div>
      </aside>

      <main>
        <div class="grid cols-3">
          <section class="card bucket" data-range="-5:-1" id="negBucket">
            <h4>Negative (−5 … −1)</h4>
            <div class="items"></div>
          </section>
          <section class="card bucket" data-range="0:0" id="zeroBucket">
            <h4>Neutral (0)</h4>
            <div class="items"></div>
          </section>
          <section class="card bucket" data-range="1:5" id="posBucket">
            <h4>Positive (+1 … +5)</h4>
            <div class="items"></div>
          </section>
        </div>

        <div class="card" style="margin-top:14px;">
          <h3>Items (all)</h3>
          <div id="allList" class="grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:12px;"></div>
        </div>
      </main>
    </div>

    <footer class="note">Made with HTML, CSS, and a few lines of vanilla JS (no external chart libs).</footer>
  </div>

<script>
const state = {
  items: []
};

const el = s => document.querySelector(s);
const els = s => Array.from(document.querySelectorAll(s));

function createItemCard(obj){
  const card = document.createElement('div');
  card.className = 'item';
  card.dataset.id = obj.id;

  const left = document.createElement('div');
  left.className = 'title';
  left.textContent = obj.name;

  const right = document.createElement('div');
  right.className = 'score';
  const range = document.createElement('input');
  range.type = 'range'; range.min = -5; range.max = 5; range.step = 1; range.value = obj.score;
  const out = document.createElement('output');
  out.textContent = obj.score;
  const tag = document.createElement('span');
  tag.className = 'tag'; tag.textContent = obj.tag || '—';

  range.addEventListener('input', e => { out.textContent = e.target.value; });
  range.addEventListener('change', e => {
    obj.score = parseInt(e.target.value,10);
    routeItem(card, obj.score);
    update();
  });

  right.appendChild(range); right.appendChild(out); right.appendChild(tag);
  card.appendChild(left); card.appendChild(right);
  return card;
}

function addItem(name, score, tag){
  const obj = { id: crypto.randomUUID(), name, score: parseInt(score,10)||0, tag: (tag||'').trim() };
  state.items.push(obj);
  const card = createItemCard(obj);
  el('#allList').appendChild(card);
  routeItem(card, obj.score);
  update();
}

function bucketFor(score){
  if (score < 0) return el('#negBucket .items');
  if (score > 0) return el('#posBucket .items');
  return el('#zeroBucket .items');
}

function routeItem(card, score){
  const target = bucketFor(score);
  // Smooth re-parenting with animation
  card.style.opacity = '0';
  setTimeout(()=>{
    target.appendChild(card);
    card.style.opacity = '1';
  }, 120);
}

function update(){
  // KPIs
  el('#kTotal').textContent = state.items.length;
  const avg = state.items.length ? (state.items.reduce((a,b)=>a+b.score,0)/state.items.length) : 0;
  el('#kAvg').textContent = avg.toFixed(2);

  drawBar();
  drawDonut();
}

// Simple bar chart (scores distribution -5..+5)
function drawBar(){
  const canvas = el('#barChart'); const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const w = canvas.width, h = canvas.height, pad = 32;
  // axis
  ctx.strokeStyle = 'rgba(255,255,255,.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad, h-pad); ctx.lineTo(w-pad, h-pad); ctx.moveTo(pad, pad); ctx.lineTo(pad, h-pad); ctx.stroke();
  const counts = new Array(11).fill(0);
  state.items.forEach(it=>{ counts[it.score+5]++; });
  const max = Math.max(1, ...counts);
  const bw = (w - pad*2) / counts.length;
  counts.forEach((c,i)=>{
    const bh = (h - pad*2) * (c / max);
    const x = pad + i*bw;
    const y = h - pad - bh;
    ctx.fillStyle = 'rgba(255,94,0,.8)';
    if (i===5) ctx.fillStyle = 'rgba(168,169,181,.9)'; // zero
    if (i>5) ctx.fillStyle = 'rgba(36,180,126,.85)'; // positives
    ctx.fillRect(x+2, y, bw-4, bh);
    // tick
    ctx.fillStyle = 'rgba(255,255,255,.6)';
    ctx.font = '12px Inter, sans-serif';
    const label = (i-5).toString();
    ctx.fillText(label, x+bw/2-4, h-pad+14);
  });
}

// Donut (bucket proportions)
function drawDonut(){
  const canvas = el('#donutChart'); const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2, r = Math.min(w,h)/2 - 12, ir = r*0.6;
  const neg = state.items.filter(i=>i.score<0).length;
  const zer = state.items.filter(i=>i.score===0).length;
  const pos = state.items.filter(i=>i.score>0).length;
  const total = Math.max(1, neg+zer+pos);
  const parts = [
    {v:neg, color:'rgba(244,63,94,.9)'}, // bad
    {v:zer, color:'rgba(168,169,181,.95)'}, // neutral
    {v:pos, color:'rgba(36,180,126,.9)'}, // ok
  ];
  let start = -Math.PI/2;
  parts.forEach(p=>{
    const ang = (p.v/total) * Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,start+ang);
    ctx.closePath();
    ctx.fillStyle = p.color; ctx.fill();
    start += ang;
  });
  // cut inner
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath(); ctx.arc(cx,cy,ir,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  // legend
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  ctx.font = '14px Inter, sans-serif';
  ctx.fillText(`− : ${neg}`, 14, 22);
  ctx.fillText(`0 : ${zer}`, 14, 40);
  ctx.fillText(`+ : ${pos}`, 14, 58);
}

function seed(){
  const demo = [
    ['Love', 2, 'Emotion'],
    ['Care', 1, 'Action'],
    ['Enjoy', 3, 'Emotion'],
    ['Reason', -2, 'Cognition'],
    ['Treasure', 4, 'Value'],
  ];
  demo.forEach(d=> addItem(...d));
}

el('#addItem').addEventListener('click', ()=>{
  const n = el('#newName').value.trim();
  if(!n) return;
  addItem(n, el('#newScore').value, el('#newTag').value);
  el('#newName').value='';
});

el('#addRandom').addEventListener('click', ()=>{
  const names = ['Blue','Yellow','Trust','Risk','Hope','Doubt','Focus','Flow','Skill','Luck'];
  for(let i=0;i<5;i++){
    const name = names[Math.floor(Math.random()*names.length)] + ' ' + Math.floor(Math.random()*100);
    const score = Math.floor(Math.random()*11)-5;
    const tag = ['Group A','Group B','Meta','—'][Math.floor(Math.random()*4)];
    addItem(name, score, tag);
  }
});

el('#resetAll').addEventListener('click', ()=>{
  state.items = [];
  el('#allList').innerHTML='';
  els('.bucket .items').forEach(b => b.innerHTML='');
  update();
});

el('#export').addEventListener('click', ()=>{
  const dataStr = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(state.items,null,2));
  const a = document.createElement('a'); a.href = dataStr; a.download = 'point-router.json'; a.click();
});

// init
seed(); update();
</script>
</body>
</html>
