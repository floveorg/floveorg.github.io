<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FUZZY Settings</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="appbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" class="logo" aria-hidden="true"><path d="M12 2l9 5v10l-9 5-9-5V7l9-5zM5 8.2v7.6L12 20l7-4.2V8.2L12 4 5 8.2zM12 7a5 5 0 015 5h-2a3 3 0 10-3 3v2a5 5 0 010-10z"/></svg>
      <span>FUZZY Settings</span>
    </div>
    <div class="status">
      <span class="chip online">Online</span>
      <span class="chip sync">Synced</span>
    </div>
  </header>

  <!-- Tabs (CSS radios) -->
  <input type="radio" name="tab" id="tab-viz" checked hidden>
  <input type="radio" name="tab" id="tab-rel" hidden>
  <input type="radio" name="tab" id="tab-explain" hidden>
  <input type="radio" name="tab" id="tab-data" hidden>
  <input type="radio" name="tab" id="tab-privacy" hidden>

  <nav class="tabs">
    <label class="tab" for="tab-viz" title="Visualization & Value">VIZUALIZATION</label>
    <label class="tab" for="tab-rel" title="Relations & Ranking">RELATIONS</label>
    <label class="tab" for="tab-explain" title="Modalities & Perspectives">EXPLAINS</label>
    <label class="tab" for="tab-data" title="Sources & Formats">CONTENTS</label>
    <label class="tab" for="tab-privacy" title="Visibility & Identity">DISPLAY</label>
    <span class="tab-underline"></span>
  </nav>

  <main class="panels">

    <!-- VIZ / VALUE -->
    <section class="panel" data-panel="viz">
      <div class="grid two">
        <fieldset class="card">
          <legend>Interaction</legend>
          <div class="chips">
            <label class="chip-toggle"><input type="checkbox" checked> <span>Relates</span></label>
            <label class="chip-toggle"><input type="checkbox" checked> <span>Rates</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Explains</span></label>
            <div class="divider"></div>
            <label class="chip-toggle"><input type="checkbox"> <span>Flove apps</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Related apps</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Other apps</span></label>
           </div>

           <legend>Style</legend>
           <div class="divider">
            <label class="chip-radio"><input type="radio" name="shape" checked> <span>List</span></label>
            <label class="chip-radio"><input type="radio" name="shape"> <span>Rainbow</span></label>
            <label class="chip-radio"><input type="radio" name="shape"> <span>Circle</span></label>
            <label class="chip-radio"><input type="radio" name="shape"> <span>Sphere3D</span></label>
            <label class="chip-radio"><input type="radio" name="shape"> <span>Torus4D</span></label>
          </div>
        </fieldset>

        <fieldset class="card">
          <legend>Navigation</legend>
          <label class="row">
            <span>Recommendations (Wizard)</span>
            <input type="range" min="0" max="10" value="7">
            <output>7</output>
          </label>

          <label class="row">
            <span>Favourites</span>
            <input type="range" min="0" max="10" value="5">
            <output>5</output>
          </label>

          <label class="row">
            <span>Recency</span>
            <input type="range" min="0" max="10" value="4">
            <output>4</output>
          </label>

          <label class="row">
            <span>Simplexity</span>
            <div class="segmented">
              <input type="radio" name="complex" id="cSimple" checked>
              <label for="cSimple">Simple</label>
              <input type="radio" name="complex" id="cNormal">
              <label for="cNormal">Normal</label>
              <input type="radio" name="complex" id="cComplex">
              <label for="cComplex">Complex</label>
            </div>
          </label>
        </fieldset>
      </div>

      <details class="card">
        <summary>Favourites</summary>
          <label class="row">
            <span>Similarity ↔ Diversity</span>
            <input type="range" min="0" max="100" value="60">
            <output>60%</output>
          </label>
          <label class="row">
            <span>Liked</span>
            <input type="range" min="0" max="100" value="75">
            <output>75%</output>
          </label>
          <label class="row">
            <span>Following</span>
            <input type="range" min="0" max="100" value="40">
            <output>40%</output>
          </label>
          <label class="row">
            <span>Matching</span>
            <input type="range" min="0" max="100" value="55">
            <output>55%</output>
          </label>
        </div>
      </details>
    </section>

    <!-- RELATE -->
    <section class="panel" data-panel="rel">
      <div class="grid two">
        <fieldset class="card">
          <legend>Types</legend>
          <div class="chips">
            <label class="chip-toggle"><input type="checkbox" checked> <span>Similar</span></label>
            <label class="chip-toggle"><input type="checkbox" checked> <span>Complementary</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Different</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Ranks</span></label>
          </div>
        </fieldset>

        <fieldset class="card">
          <legend>Prefered Raters</legend>
            <label class="row">
              <span>Evidence → Axiom</span>
              <input type="range" min="0" max="100" value="65">
              <output>65%</output>
            </label>
            <label class="row">
              <span>Proposal → Prediction</span>
              <input type="range" min="0" max="100" value="35">
              <output>35%</output>
            </label>
            <label class="row">
              <span>Fine ↔ Fatal</span>
              <input type="range" min="0" max="100" value="25">
              <output>25%</output>
            </label>
            <label class="row">
              <span>Experimental ↔ Random</span>
              <input type="range" min="0" max="100" value="30">
              <output>30%</output>
            </label>
            <label class="row">
              <span>Rational ↔ Emotional</span>
              <input type="range" min="0" max="100" value="55">
              <output>55%</output>
            </label>
            <label class="row">
              <span>Formal ↔ Trivial</span>
              <input type="range" min="0" max="100" value="45">
              <output>45%</output>
            </label>
          </div>
        </fieldset>
      </div>

      <details class="card">
        <summary>Perspectives</summary>
          <div class="chips wrap">
          <label class="chip-toggle"><input type="checkbox" checked> <span>Confluential</span></label>
        </div>
          <div class="chips wrap">
          <label class="chip-toggle"><input type="checkbox" checked> <span>Formal</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Trivial</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Funny</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Thematic</span></label>
        </div>

        <div class="chips wrap">
          <label class="chip-toggle"><input type="checkbox" checked> <span>Female</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Male</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>5 Senses</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>7 Glands</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>11 Systems</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>13 Joints</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>17 Chains</span></label>
        </div>
          
      </details>
    </section>

    <!-- EXPLAIN -->
    <section class="panel" data-panel="explain">
      <div class="grid two">
        <fieldset class="card">
          <legend>Medias</legend>
          <div class="chips">
            <label class="chip-toggle"><input type="checkbox" checked> <span>Emojis</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Images</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Audios</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Videos</span></label>
          </div>
        </fieldset>

        <fieldset class="card">
          <legend>Labels</legend>
          <div class="chips">
            <label class="chip-toggle"><input type="checkbox" checked> <span>WISE</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Journalist</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Tight</span></label>
          </div>
        </fieldset>
      </div>

      <details class="card">
        <summary>Preferred Explains</summary>
        <p class="hint"></p>
          <label class="row">
            <span>WISE</span>
            <input type="range" min="0" max="10" value="6"><output></output>
          </label>
          <label class="row">
            <span>Threaded</span>
            <input type="range" min="0" max="10" value="5"><output></output>
          </label>
          <label class="row">
            <span>Perspectived</span>
            <input type="range" min="0" max="10" value="5"><output></output>
          </label>         
          <label class="row">
            <span>Similar ↔ Different</span>
            <input type="range" min="0" max="10" value="8"><output></output>
          </label>

          <label class="row">
            <span>Recent</span>
            <input type="range" min="0" max="10" value="4"><output></output>
          </label>
        </div>
      </details>
    </section>

    <!-- DATA -->
    <section class="panel" data-panel="data">
      <div class="grid two">
        <fieldset class="card">
          <legend>Platforms</legend>
          <div class="chips wrap">
            <label class="chip-toggle"><input type="checkbox" checked> <span>Etymonline</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Merriam-Webster</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>WordNet</span></label>
            <label class="chip-toggle"><input type="checkbox" checked> <span>Wiktionary</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Legalese</span></label>
            <label class="chip-toggle"><input type="checkbox" checked> <span>Wikipedia</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Web</span></label>
          </div>
        </fieldset>

        <fieldset class="card">
          <legend>Fields</legend>
          <div class="chips wrap">
            <label class="chip-toggle"><input type="checkbox" checked> <span>Metaphysics</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Science</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Biology</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Linguistics</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Psicology</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Sociology</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Economy</span></label>
          </div>
        </fieldset>
      </div>

      <details class="card">
        <summary>Wizard</summary>
        <div class="chips">
          <label class="chip-toggle"><input type="checkbox"> <span>Summaries</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Suggestions</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Offers</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Matches</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Polarities</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Reminders</span></label>
        </div>
      </details>
    </section>

    <!-- CUSTOMIZATION / PRIVACY -->
    <section class="panel" data-panel="privacy">
      <div class="grid two">
        <fieldset class="card">
          <legend>Dashboard</legend>
          <div class="segmented full">
            <input type="radio" name="visibility" id="visPrivate" checked>
            <label for="visPrivate">Private</label>
            <input type="radio" name="visibility" id="visClose">
            <label for="visClose">Just for close</label>
            <input type="radio" name="visibility" id="visPublic">
            <label for="visPublic">Public</label>
          </div>
        </fieldset>

        <fieldset class="card">
          <legend>Profile</legend>
          <div class="chips wrap">
            <label class="chip-toggle"><input type="checkbox"> <span>Avatar</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>CV</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Email</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Telephone</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Location(s)</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Links</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Social networks</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Meet up</span></label>
            <label class="chip-toggle"><input type="checkbox"> <span>Dashboards</span></label>
          </div>
        </fieldset>
      </div>

      <details class="card">
        <summary>Network</summary>
        <div class="chips">
          <label class="chip-toggle"><input type="checkbox"> <span>Peers</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Groups</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Likes</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Follows</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Friends</span></label>
          <label class="chip-toggle"><input type="checkbox"> <span>Close</span></label>
        </div>
      </details>
    </section>
  </main>

  <footer class="footer">
    <button class="btn">Save dashboard</button>
  </footer>

  <!-- CSS-only: show the correct panel for each tab -->
  <style>
    #tab-viz:checked ~ .tabs .tab:nth-of-type(1),
    #tab-rel:checked ~ .tabs .tab:nth-of-type(2),
    #tab-explain:checked ~ .tabs .tab:nth-of-type(3),
    #tab-data:checked ~ .tabs .tab:nth-of-type(4),
    #tab-privacy:checked ~ .tabs .tab:nth-of-type(5) { color: var(--accent); }
    #tab-viz:checked ~ .tabs .tab-underline { --i: 0; }
    #tab-rel:checked ~ .tabs .tab-underline { --i: 1; }
    #tab-explain:checked ~ .tabs .tab-underline { --i: 2; }
    #tab-data:checked ~ .tabs .tab-underline { --i: 3; }
    #tab-privacy:checked ~ .tabs .tab-underline { --i: 4; }

    #tab-viz:checked ~ .panels .panel[data-panel="viz"]{display:block}
    #tab-rel:checked ~ .panels .panel[data-panel="rel"]{display:block}
    #tab-explain:checked ~ .panels .panel[data-panel="explain"]{display:block}
    #tab-data:checked ~ .panels .panel[data-panel="data"]{display:block}
    #tab-privacy:checked ~ .panels .panel[data-panel="privacy"]{display:block}
  </style>
</body>
</html>
