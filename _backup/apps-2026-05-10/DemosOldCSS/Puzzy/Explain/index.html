<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FLOVE: FUZZY: WISE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top">
    <h1>FUZZY WISE</h1>
    <p class="lede">Define anything deeply 
  </header>

  <main class="shell">
    <!-- PACK 1: ESENCIAL -->
    <section class="pack--1">
      <div class="grid">
        <label class="field">
          <input type="text" placeholder="Name an OBJECT here, i.e. True Love, Bike, Oxymorons, ...">
        </label>
    </section>
        <br />
        <br />


    <section class="pack--2">
      <h2>PERSPECTIVE</h2>
        <fieldset class="field">
          <legend class="lbl">Prism</legend>
          <div class="chips">
            <label><input type="checkbox"> Subjective</label>
            <label><input type="checkbox"> Objective</label>
            <label><input type="checkbox"> Mommentual</label>
            <label><input type="checkbox"> General</label>
          </div>
        </fieldset>

        <fieldset class="field">
          <legend class="lbl">Tone</legend>
          <div class="chips">
            <label><input type="checkbox"> Normal</label>
            <label><input type="checkbox"> Funny</label>
            <label><input type="checkbox"> Formal</label>
            <label><input type="checkbox"> Trivial</label>
          </div>
        </fieldset>
        <br />

        <div class="bar__scale">
          <span>Teleological background</span>
        </div>
        <div class="bar__choices">
          <label><input type="checkbox" name="cont"> Experimental</label>
          <label><input type="checkbox" name="cont"> Random</label>
          <label><input type="checkbox" name="cont"> Fine</label>
          <label><input type="checkbox" name="cont"> Fatal</label>
        </div>
      </fieldset>
        <br />

      <h3>FOCUS</h3>
      <fieldset class="field bar">

      <fieldset class="field">
        <legend class="lbl">Field</legend>
        <div class="chips">
          <label><input type="checkbox"> Metaphysics</label>
          <label><input type="checkbox"> Science</label>
          <label><input type="checkbox"> Biology</label>
          <label><input type="checkbox"> Psicology</label>
          <label><input type="checkbox"> Sociology</label>
        </div>
      </fieldset>



      <fieldset class="field bar">
        <legend class="lbl">Time span</legend>
        <div class="bar__choices">
          <label><input type="checkbox" name="time"> Past</label>
          <label><input type="checkbox" name="time"> Present</label>
          <label><input type="checkbox" name="time"> Future</label>
          <label><input type="checkbox" name="time"> Short</label>
          <label><input type="checkbox" name="time"> Mid</label>
          <label><input type="checkbox" name="time"> Long</label>
        </div>
      </fieldset>
    </section>
      <br />
      <br />


       

    <!-- PACK 2: EXPLICAR (WHY/WHAT/HOW/WHO/WHERE/WHEN) -->
    <section class="pack--3">
      <h2>EXPLAIN</h2>
      <div class="grid grid--two">
        <label class="field">
          <textarea rows="2" placeholder="PHRASE to define it"></textarea>
        </label>

 <label class="field">
          <input type="text" placeholder="RELATE IT to something else">
        </label>


        <label class="field"><textarea rows="2" placeholder="WHY is it important"></textarea></label>
        <label class="field"><textarea rows="2" placeholder="WHAT special properties does it have"></textarea></label>
        <label class="field"><textarea rows="2" placeholder="HOW does it work"></textarea></label>
        <label class="field"><textarea rows="2" placeholder=""></textarea></label>
      </div>
      </section>
     <br />
     <br />
     

    <section class="pack--4">
      <h2>FORMALISE</h2>
      <div class="funnel">
        <div class="funnel__band">
          <span class="tag"></span>
          <textarea rows="2" placeholder="Axiom"></textarea>
        </div>
      <div class="evidence">
          <div class="grid grid--two">
            <label class="field"><span class="lbl"></span>
              <select>
                <option>Actual</option><option>Past</option><option>Case study</option><option>Review</option>
              </select>
            </label>
            <label class="field"><span class="lbl"></span><input type="text" placeholder="Sources"></label>
          </div>
          <label class="field"><span class="lbl"></span><textarea rows="3" placeholder="Write EVIDENCE(s) here"></textarea></label>
        </div>
        <div class="funnel__band">
          <span class="tag"></span>
          <textarea rows="2" placeholder="Prediction"></textarea>
        </div>
        <div class="funnel__band">

          <textarea rows="2" placeholder="Proposal"></textarea>
        </div>
        <div class="funnel__band">
          <span class="tag"></span>
          <textarea rows="2" placeholder="Challenge"></textarea>
        </div>
        
      </div>
    </section>

<br />
        <br />



    
      <details class="output">
        <summary>KNOW MORE</summary>
        <div class="output__box">
         Visit <a href="http://flove.org">flove.org</a>
        </div>
      </details>
    </section>
  </main>

</body>
</html>
