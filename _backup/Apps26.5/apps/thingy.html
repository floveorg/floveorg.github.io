<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes"/>
  <title>✺ flove · Thingy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="flove.css">
  <style>
    :root {
      /* flove identity overrides — navy Thingy */
      --app-accent:        #1e4a6b;
      --app-accent-soft:   #b9d2e5;
      --app-ink-on-accent: #ffffff;
    }
    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      background: #f5f9ff;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0.6rem 0.6rem 1.2rem;
      color: #1a2e3f;
      line-height: 1.4;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── MyFamily-style header: bigger logo + info panel ── */
    .flove-bar { font-size: 22px; padding: 12px 18px; gap: 14px; }
    .flove-bar .flove-mark { width: 2em; height: 2em; }
    .flove-bar .flove-app-name {
      font-size: 1em;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--app-accent);
    }
    .flove-bar .flove-mark-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: inherit;
    }
    .app-name-toggle {
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      letter-spacing: inherit;
      color: var(--app-accent);
      cursor: pointer;
      transition: opacity 0.2s, color 0.2s;
    }
    .app-name-toggle:hover { opacity: 0.78; }
    .app-name-toggle:focus-visible {
      outline: 2px solid var(--app-accent);
      outline-offset: 4px;
      border-radius: 8px;
    }
    .app-name-toggle[aria-expanded="true"] { color: #0a2a44; }

    .info-panel {
      position: relative;
      max-width: 480px;
      margin: 0.8rem auto 1.2rem;
      padding: 1.4rem 1.5rem 1.5rem;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--app-accent-soft);
      border-radius: 22px;
      box-shadow: 0 16px 36px -12px rgba(30, 74, 107, 0.25);
      display: none;
      animation: info-panel-pop 0.28s cubic-bezier(.2,.8,.2,1);
      z-index: 5;
    }
    .info-panel.is-open { display: block; }
    .info-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--app-accent);
      background: #ffffff;
      color: var(--app-accent);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 14px -4px rgba(30, 74, 107, 0.3);
      transition: background 0.2s, color 0.2s, transform 0.2s, box-shadow 0.2s;
      z-index: 2;
    }
    .info-close:hover {
      background: var(--app-accent);
      color: #ffffff;
      transform: scale(1.06);
    }
    .info-close svg { width: 22px; height: 22px; fill: none; }
    .info-content {
      max-width: 760px;
      margin: 0 auto;
      padding-right: 56px;
      color: #1c3a55;
    }
    .info-content h3 {
      font-weight: 600;
      font-size: 1.2rem;
      color: #0f2f44;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }
    .info-content p { margin: 0 0 0.5rem; font-size: 0.92rem; line-height: 1.55; }
    .info-hint { color: #58738c; font-style: italic; font-size: 0.85rem; }
    .info-video-frame {
      margin-top: 0.9rem;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, var(--app-accent-soft), #8aaecb);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
    }
    .info-video-frame::before {
      content: '🎬  Intro video';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(15, 47, 68, 0.6);
      font-style: italic;
      font-size: 0.95rem;
      pointer-events: none;
    }
    .info-video {
      position: relative;
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
      z-index: 1;
    }
    @keyframes info-panel-pop {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .info-panel { animation: none; }
    }

    /* tabs – icons only, two rows: visible + collapsible-extra */
    .tabs-wrapper {
      margin: 0.4rem 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      justify-content: flex-start;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tabs--extra { display: none; }
    .tabs--extra.is-open { display: flex; }

    .tab {
      background: white;
      border: 1px solid #d3e0ea;
      color: #1e405b;
      width: 40px;
      height: 40px;
      border-radius: 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tab.active {
      background: #1e4a6b;
      border-color: #1e4a6b;
      color: white;
    }

    .tab i { font-size: 1.2rem; }

    .tab-plus {
      background: var(--app-accent-soft);
      border-color: var(--app-accent);
      color: var(--app-accent);
      font-weight: 700;
    }
    .tab-plus[aria-expanded="true"] {
      background: var(--app-accent);
      border-color: var(--app-accent);
      color: white;
      transform: rotate(45deg);
    }

    /* table */
    .table-wrapper {
      background: white;
      border-radius: 18px;
      padding: 0.1rem 0 0.2rem;
      box-shadow: 0 6px 14px -6px rgba(0, 20, 40, 0.06);
      border: 1px solid #e0eaf3;
      overflow: hidden;
      margin-bottom: 1.2rem;
    }

    .table {
      display: table;
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
    }

    .thead .tr {
      border-bottom: 2px solid #cbdbe9;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }
    /* full-cell colored header titles aligned with the 4 tabbed cells */
    .thead .th.col-have { background: #c8e6c9; color: #1f4f2c; }
    .thead .th.col-wish { background: #bbdefb; color: #0e3f6f; }
    .thead .th.col-want { background: #ffe0b2; color: #74440a; }
    .thead .th.col-need { background: #ffcdd2; color: #71161e; }
    .thead .th.col-item { background: #f2f7fc; color: #1a405b; }

    .tr {
      display: table-row;
      cursor: pointer;
    }

    .th, .td {
      display: table-cell;
      padding: 8px 4px;
      vertical-align: middle;
      border-bottom: 1px solid #e6ecf3;
      text-align: center;
    }

    .col-item {
      width: 28%;
      text-align: left;
      font-weight: 520;
      font-size: 0.75rem;
      padding-left: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .col-have, .col-wish, .col-want, .col-need {
      width: 18%;
      cursor: pointer;
      user-select: none;
    }

    /* keep header titles strictly aligned with cells below */
    .thead .th { padding: 8px 4px; }
    .tbody .td { padding: 8px 4px; }

    /* cell selected states (no checkbox) */
    .td.selected-have {
      background: #c8e6c9;
      position: relative;
    }
    .td.selected-wish {
      background: #bbdefb;
    }
    .td.selected-want {
      background: #ffe0b2;
    }
    .td.selected-need {
      background: #ffcdd2;
    }

    /* subtle indicator inside cell (optional dot) */
    .td.selected-have::after,
    .td.selected-wish::after,
    .td.selected-want::after,
    .td.selected-need::after {
      content: "•";
      font-size: 16px;
      line-height: 1;
      margin-left: 2px;
      opacity: 0.8;
    }

    /* row priority highlight (overrides cell background) */
    .tbody .tr[data-priority="need"] { background: #ffe9e7; border-left: 4px solid #c7362b; }
    .tbody .tr[data-priority="want"] { background: #fff1dd; border-left: 4px solid #d18e1a; }
    .tbody .tr[data-priority="wish"] { background: #e1ecfc; border-left: 4px solid #2f6eb0; }
    .tbody .tr[data-priority="have"] { background: #e2f3e2; border-left: 4px solid #2b7a4b; }

    .tr.hidden-row {
      display: none;
    }

    /* phrase panel */
    .phrase-panel {
      background: white;
      border-radius: 20px;
      padding: 1.4rem 0.8rem 0.8rem;
      box-shadow: 0 6px 16px rgba(0,0,0,0.02);
      border: 1px solid #dee9f2;
      position: relative;
      margin-top: 1.4rem;
    }
    /* expand pill on the top-middle border of the resume panel */
    .phrase-panel .expand-btn {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      align-self: auto;
      background: white;
      border: 1px solid var(--app-accent);
      color: var(--app-accent);
      padding: 0.4rem 0.95rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 10px rgba(30, 74, 107, 0.12);
      z-index: 3;
      transition: background .15s, color .15s, transform .15s;
    }
    .phrase-panel .expand-btn:hover {
      background: var(--app-accent);
      color: #fff;
      transform: translateX(-50%) translateY(-1px);
    }
    .phrase-panel .expand-btn .chev { font-size: .7rem; }

    .phrase-rows {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .phrase-line {
      border-radius: 14px;
      border: 1px solid;
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .phrase-line .pl-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.45rem 0.8rem;
      cursor: pointer;
      user-select: none;
      position: relative;
      overflow: visible;
    }
    .phrase-line .pl-title { font-weight: 600; }
    /* pill follows the title in flow; chevron is pushed to the right */
    .phrase-line .pl-head .extra-toggle { margin-left: 4px; position: relative; }
    .phrase-line .pl-head .pl-chev {
      margin-left: auto;
      transition: transform 0.18s;
      font-size: 0.75rem;
      opacity: 0.7;
    }
    /* section-level pill toggle (HAVE → shareable, WISH/WANT/NEED → much) */
    .phrase-line .pl-head .extra-toggle {
      background: rgba(255,255,255,0.85);
      border: 1px solid currentColor;
      color: inherit;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: .02em;
      opacity: 0.55;
      transition: opacity .15s, background .15s, color .15s;
    }
    .phrase-line .pl-head .extra-toggle:hover { opacity: 1; }
    .phrase-line .pl-head .extra-toggle[aria-pressed="true"] {
      background: currentColor;
      opacity: 1;
    }
    .phrase-line.phrase-have .pl-head .extra-toggle[aria-pressed="true"] { color: #1e4a2c; background: #1e4a2c; }
    .phrase-line.phrase-have .pl-head .extra-toggle[aria-pressed="true"]::after,
    .phrase-line.phrase-wish .pl-head .extra-toggle[aria-pressed="true"]::after,
    .phrase-line.phrase-want .pl-head .extra-toggle[aria-pressed="true"]::after,
    .phrase-line.phrase-need .pl-head .extra-toggle[aria-pressed="true"]::after { content: ""; }
    .phrase-line .pl-head .extra-toggle[aria-pressed="true"] {
      color: #fff !important;
      background: rgba(0,0,0,0.5);
    }
    .phrase-line.phrase-have .pl-head .extra-toggle[aria-pressed="true"] { background: #2b7a4b; }
    .phrase-line.phrase-wish .pl-head .extra-toggle[aria-pressed="true"] { background: #2f6eb0; }
    .phrase-line.phrase-want .pl-head .extra-toggle[aria-pressed="true"] { background: #d18e1a; }
    .phrase-line.phrase-need .pl-head .extra-toggle[aria-pressed="true"] { background: #c7362b; }

    /* thunder-zap: pill doubles in size on click and a few bolts splash around it */
    .phrase-line .pl-head .extra-toggle.zap {
      animation: thunder-pop .65s cubic-bezier(.2,.7,.2,1.2);
      z-index: 4;
    }
    @keyframes thunder-pop {
      0%   { transform: scale(1);   }
      35%  { transform: scale(2);   }
      60%  { transform: scale(1.3); }
      100% { transform: scale(1);   }
    }
    .thunder-bolt {
      position: absolute;
      pointer-events: none;
      font-size: 1rem;
      line-height: 1;
      opacity: 1;
      filter: drop-shadow(0 0 4px rgba(255, 235, 100, 0.8));
      animation: thunder-fly .7s cubic-bezier(.2,.7,.2,1) forwards;
      z-index: 5;
      user-select: none;
    }
    @keyframes thunder-fly {
      0%   { transform: translate(0, 0) rotate(var(--r, 0deg)) scale(.6); opacity: 1; }
      60%  { transform: translate(var(--dx, 0px), var(--dy, 0px)) rotate(var(--r, 0deg)) scale(1.4); opacity: 1; }
      100% { transform: translate(calc(var(--dx, 0px) * 1.4), calc(var(--dy, 0px) * 1.4)) rotate(var(--r, 0deg)) scale(.4); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .phrase-line .pl-head .extra-toggle.zap { animation: none; }
      .thunder-bolt { animation: none; opacity: 0; }
    }
    .phrase-line.open .pl-head .pl-chev { transform: rotate(180deg); }
    .phrase-line i { width: 18px; }
    .phrase-line.phrase-have { background: #e2f3e2; border-color: #b2d6b8; color: #1e4a2c; }
    .phrase-line.phrase-have i { color: #2b7a4b; }
    .phrase-line.phrase-wish { background: #e1ecfc; border-color: #b3cae8; color: #154170; }
    .phrase-line.phrase-wish i { color: #2f6eb0; }
    .phrase-line.phrase-want { background: #fff1dd; border-color: #ecd1a4; color: #6e4711; }
    .phrase-line.phrase-want i { color: #d18e1a; }
    .phrase-line.phrase-need { background: #ffe9e7; border-color: #efc1bd; color: #71161e; }
    .phrase-line.phrase-need i { color: #c7362b; }
    .phrase-items {
      display: none;
      flex-direction: column;
      gap: 0.45rem;
      padding: 0 0.55rem 0.6rem;
    }
    .phrase-line.open .phrase-items { display: flex; }
    .phrase-items .sel-item { background: rgba(255,255,255,0.78); }

    /* ── action buttons inside resume panel (two rows · diesafe-style) ── */
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 3.2rem;
      margin-top: 14px;
    }
    .action-buttons .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .action-buttons .row > .btn,
    .action-buttons .row > .btn-with-subs { flex: 1 1 0; min-width: 0; }
    .btn-with-subs {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
      flex: 1 1 0;
      min-width: 0;
    }
    .btn-with-subs .btn { width: 100%; }

    .subitems {
      display: flex;
      gap: 4px;
      justify-content: stretch;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-4px);
      transition: max-height 0.25s ease, opacity 0.18s ease, transform 0.2s ease;
      pointer-events: none;
    }
    .btn-with-subs.is-open .subitems {
      max-height: 64px;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .subitems-above {
      position: absolute;
      left: 0; right: 0;
      bottom: calc(100% + 4px);
    }
    .subitem {
      background: #fff;
      border: 1px solid #c2d6e6;
      color: var(--app-accent);
      padding: 6px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      flex: 1 1 0;
      min-width: 0;
      transition: all 0.15s;
    }
    .subitem:hover { background: var(--app-accent-soft); border-color: var(--app-accent); }
    .subitem-radio { position: absolute; opacity: 0; pointer-events: none; width:0; height:0; }
    .subitem.is-radio { display: inline-flex; align-items: center; justify-content: center; }
    .subitems:has(.subitem-radio[data-r="0"]:checked) .subitem.is-radio[data-r="0"],
    .subitems:has(.subitem-radio[data-r="1"]:checked) .subitem.is-radio[data-r="1"],
    .subitems:has(.subitem-radio[data-r="2"]:checked) .subitem.is-radio[data-r="2"] {
      background: var(--app-accent);
      border-color: var(--app-accent);
      color: #fff;
    }

    /* diesafe-style pill buttons */
    .btn {
      background: #fff;
      border: 1px solid var(--app-accent);
      padding: 9px 14px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.82rem;
      color: var(--app-accent);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform .15s, background .15s, color .15s, box-shadow .15s;
    }
    .btn i { font-size: 0.78rem; }
    .btn:hover {
      background: var(--app-accent);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(30, 74, 107, 0.18);
    }
    .btn-with-subs.is-open > .btn { background: var(--app-accent); color: #fff; }

    .hint-area {
      margin-top: 10px;
      text-align: center;
      min-height: 22px;
      font-size: 0.82rem;
      color: var(--app-accent);
      padding: 6px 8px;
    }

    /* ── locked label row inside tbody ── */
    .tbody .tr.label-row { cursor: default; }
    .tbody .tr.label-row .td {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      cursor: default;
      user-select: none;
    }
    .tbody .tr.label-row .td.col-have { background: #c8e6c9; color: #1f4f2c; }
    .tbody .tr.label-row .td.col-wish { background: #bbdefb; color: #0e3f6f; }
    .tbody .tr.label-row .td.col-want { background: #ffe0b2; color: #74440a; }
    .tbody .tr.label-row .td.col-need { background: #ffcdd2; color: #71161e; }
    .tbody .tr.label-row .td::after { content: none !important; }

    .foot {
      margin-top: 1rem;
      text-align: center;
      color: #58738c;
      font-size: 0.65rem;
    }

    /* expand panel: per-item checkbox + notes */
    .expand-section {
      margin-top: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .expand-btn {
      align-self: center;
      background: white;
      border: 1px solid #c2d6e6;
      color: #1e405b;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 550;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .expand-btn .chev { transition: transform 0.2s; }
    .expand-btn[aria-expanded="true"] .chev { transform: rotate(180deg); }
    .expand-empty {
      color: #5e7c95;
      font-size: 0.8rem;
      text-align: center;
      padding: 0.5rem;
    }
    .sel-item {
      background: #f6fafd;
      border: 1px solid #e0eaf3;
      border-radius: 14px;
      padding: 0.55rem 0.7rem;
      margin-bottom: 0.55rem;
    }
    .sel-item:last-child { margin-bottom: 0; }
    .sel-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      margin-bottom: 0.45rem;
    }
    .sel-name {
      font-weight: 600;
      color: #0f2f44;
      font-size: 0.85rem;
      flex: 0 1 auto;
      min-width: 0;
    }
    /* per-item pill toggle (shareable / much) — sits inline next to the title */
    .sel-row .extra-toggle {
      flex: 0 0 auto;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(30, 74, 107, 0.25);
      color: #2c4d68;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: background .15s, border-color .15s, color .15s;
    }
    .sel-row .extra-toggle:hover { border-color: var(--app-accent); }
    .sel-row .extra-toggle[aria-pressed="true"] {
      background: var(--app-accent);
      border-color: var(--app-accent);
      color: #fff;
    }
    .sel-notes {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 0.4rem;
    }
    .note {
      background: #e8f1f9;
      border-radius: 10px;
      padding: 4px 6px 4px 10px;
      font-size: 0.78rem;
      color: #1c3a55;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .note-text { flex: 1; word-break: break-word; }
    .note-del {
      background: transparent;
      border: none;
      color: #b34237;
      cursor: pointer;
      padding: 0 4px;
      font-size: 1.1rem;
      line-height: 1;

<body>

<div class="flove-bar">
  <a href="thingy.html" class="flove-mark-link" aria-label="reload">
    <svg class="flove-mark" aria-hidden="true" viewBox="0 0 100 100" width="1em" height="1em" style="vertical-align:-.15em;overflow:visible;"><defs><linearGradient id="g-thingy" x1="14" y1="14" x2="86" y2="86" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#ffd28a"/><stop offset="50%" stop-color="#ffd633"/><stop offset="100%" stop-color="#6dd933"/></linearGradient></defs><g fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><rect x="18" y="34" width="64" height="48" rx="3" stroke="url(#g-thingy)" fill="none"/><line x1="50" y1="34" x2="50" y2="82" stroke="url(#g-thingy)"/><line x1="18" y1="50" x2="82" y2="50" stroke="url(#g-thingy)"/><path d="M38 28 Q44 14 50 28 Q56 14 62 28 L62 34 L38 34 Z" fill="url(#g-thingy)" stroke="none"/></g></svg>
  </a>
  <button type="button" class="flove-app-name app-name-toggle" id="titleBtn" title="Go to resume">Thingy</button>
  <span class="flove-spacer"></span>
</div>

<div class="app">
  <!-- Tabs: 1 visible row + collapsible extra row, plus button toggles -->
  <div class="tabs-wrapper">
    <div class="tabs" id="categoryTabs"></div>
    <div class="tabs tabs--extra" id="categoryTabsExtra"></div>
  </div>

  <!-- Table with clickable cells (no thead — first body row is a fixed label row) -->
  <div class="table-wrapper">
    <div class="table" role="table">
      <div class="tbody" id="tableBody">
        <div class="tr label-row" data-locked="1">
          <span class="td col-item"></span>
          <span class="td col-have">HAVE</span>
          <span class="td col-wish">WISH</span>
          <span class="td col-want">WANT</span>
          <span class="td col-need">NEED</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Resume / phrase rows · Expand pill on top-middle border, action buttons at the bottom -->
  <div class="phrase-panel" id="phrasePanel">
    <button class="expand-btn" id="expandBtn" type="button" aria-expanded="false">
      <i class="fas fa-chevron-down chev"></i> Expand
    </button>
    <div class="phrase-rows" id="phraseRows">
      <div class="phrase-line phrase-have" data-type="have">
        <div class="pl-head">
          <i class="fas fa-check-circle"></i>
          <span class="pl-title"><span id="haveCount">0</span> HAVE</span>
          <button type="button" class="extra-toggle" data-section="have" data-extra="shareable" aria-pressed="false">Shareable</button>
          <i class="fas fa-chevron-down pl-chev"></i>
        </div>
        <div class="phrase-items" id="phraseItemsHave"></div>
      </div>
      <div class="phrase-line phrase-wish" data-type="wish">
        <div class="pl-head">
          <i class="fas fa-star"></i>
          <span class="pl-title"><span id="wishCount">0</span> WISH</span>
          <button type="button" class="extra-toggle" data-section="wish" data-extra="much" aria-pressed="false">Much</button>
          <i class="fas fa-chevron-down pl-chev"></i>
        </div>
        <div class="phrase-items" id="phraseItemsWish"></div>
      </div>
      <div class="phrase-line phrase-want" data-type="want">
        <div class="pl-head">
          <i class="fas fa-fire"></i>
          <span class="pl-title"><span id="wantCount">0</span> WANT</span>
          <button type="button" class="extra-toggle" data-section="want" data-extra="much" aria-pressed="false">Much</button>
          <i class="fas fa-chevron-down pl-chev"></i>
        </div>
        <div class="phrase-items" id="phraseItemsWant"></div>
      </div>
      <div class="phrase-line phrase-need" data-type="need">
        <div class="pl-head">
          <i class="fas fa-exclamation-triangle"></i>
          <span class="pl-title"><span id="needCount">0</span> NEED</span>
          <button type="button" class="extra-toggle" data-section="need" data-extra="much" aria-pressed="false">Much</button>
          <i class="fas fa-chevron-down pl-chev"></i>
        </div>
        <div class="phrase-items" id="phraseItemsNeed"></div>
      </div>
    </div>

    <!-- Two rows of pill buttons (diesafe-style): Insights/Creative/Copy + Save/Share/Publish -->
    <div class="action-buttons">
      <div class="row">
        <button class="btn" id="insightsBtn" type="button"><i class="fas fa-brain"></i> Insights</button>
        <button class="btn" id="creativeBtn" type="button"><i class="fas fa-wand-magic-sparkles"></i> Creative</button>
        <button class="btn" id="copyBtn" type="button"><i class="far fa-copy"></i> Copy</button>
      </div>
      <div class="row">
        <div class="btn-with-subs" id="saveWrap">
          <button class="btn" id="saveBtn" type="button"><i class="fas fa-download"></i> Save</button>
          <div class="subitems">
            <button class="subitem" data-group="save" data-action="html" type="button">HTML</button>
            <button class="subitem" data-group="save" data-action="text" type="button">Text</button>
            <button class="subitem" data-group="save" data-action="json" type="button">JSON</button>
          </div>
        </div>
        <div class="btn-with-subs" id="shareWrap">
          <button class="btn" id="shareBtn" type="button"><i class="fas fa-share-alt"></i> Share</button>
          <div class="subitems">
            <button class="subitem" data-group="share" data-action="whatsapp" type="button">WhatsApp</button>
            <button class="subitem" data-group="share" data-action="telegram" type="button">Telegram</button>
            <button class="subitem" data-group="share" data-action="mail" type="button">Mail</button>
          </div>
        </div>
        <div class="btn-with-subs" id="publishWrap">
          <div class="subitems subitems-above">
            <input class="subitem-radio" type="radio" name="publishPlatform" id="pubP0" data-r="0" data-platform="Mastodon" aria-hidden="true">
            <label class="subitem is-radio" for="pubP0" data-r="0" data-group="publish">Mastodon</label>
            <input class="subitem-radio" type="radio" name="publishPlatform" id="pubP1" data-r="1" data-platform="Bluesky" aria-hidden="true">
            <label class="subitem is-radio" for="pubP1" data-r="1" data-group="publish">Bluesky</label>
            <input class="subitem-radio" type="radio" name="publishPlatform" id="pubP2" data-r="2" data-platform="X" aria-hidden="true">
            <label class="subitem is-radio" for="pubP2" data-r="2" data-group="publish">X</label>
          </div>
          <button class="btn" id="publishBtn" type="button"><i class="fas fa-cloud-upload-alt"></i> Publish</button>
          <div class="subitems">
            <input class="subitem-radio" type="radio" name="publishVisibility" id="pubV0" data-r="0" data-visibility="Public" aria-hidden="true">
            <label class="subitem is-radio" for="pubV0" data-r="0" data-group="publish">Public</label>
            <input class="subitem-radio" type="radio" name="publishVisibility" id="pubV1" data-r="1" data-visibility="Friends" aria-hidden="true">
            <label class="subitem is-radio" for="pubV1" data-r="1" data-group="publish">Friends</label>
            <input class="subitem-radio" type="radio" name="publishVisibility" id="pubV2" data-r="2" data-visibility="Private" aria-hidden="true">
            <label class="subitem is-radio" for="pubV2" data-r="2" data-group="publish">Private</label>
          </div>
        </div>
      </div>
    </div>
    <div class="hint-area" id="hintMessage" aria-live="polite"></div>
  </div>

  <footer class="foot">
    <i class="far fa-lightbulb"></i> Toca cualquier celda para alternar (HAVE/WISH/WANT/NEED). Prioridad: NEED > WANT > WISH > HAVE.
  </footer>
</div>

<script>
  (function(){
    "use strict";

    // ---------- CATEGORIES (icons only) ----------
    const categories = [
      { id: 'all', label: 'Todos', icon: 'fa-border-all', class: '' },
      { id: 'salud', label: 'Salud', icon: 'fa-heart-pulse', class: 'cat-salud' },
      { id: 'outdoor', label: 'Outdoor', icon: 'fa-tree', class: 'cat-outdoor' },
      { id: 'infra', label: 'Vivienda', icon: 'fa-house-chimney', class: 'cat-infra' },
      { id: 'comms', label: 'Comms', icon: 'fa-wifi', class: 'cat-comms' },
      { id: 'trabajo', label: 'Trabajo', icon: 'fa-briefcase', class: 'cat-trabajo' },
      { id: 'viaje', label: 'Viaje', icon: 'fa-plane', class: 'cat-viaje' },
      { id: 'alimentos', label: 'Food', icon: 'fa-utensils', class: 'cat-alimentos' },
      { id: 'servicios', label: 'Servicios', icon: 'fa-bell-concierge', class: 'cat-servicios' },
      { id: 'm-sica', label: 'Música', icon: 'fa-music', class: 'cat-m-sica' },
      { id: 'eventos', label: 'Eventos', icon: 'fa-calendar-star', class: 'cat-eventos' },
      { id: 'varios', label: 'Otros', icon: 'fa-shapes', class: 'cat-varios' },
      { id: 'hobby', label: 'Hobbies', icon: 'fa-palette', class: 'cat-hobby' },
      { id: 'educa', label: 'Educación', icon: 'fa-graduation-cap', class: 'cat-educa' }
    ];

    // ---------- DEMO ITEMS (popular per category) ----------
    const demoItems = [
      // Salud
      ['First aid kit', 'cat-salud'], ['Thermometer', 'cat-salud'], ['Vitamins', 'cat-salud'],
      ['Pain reliever', 'cat-salud'], ['Bandages', 'cat-salud'], ['Face masks', 'cat-salud'],
      // Outdoor
      ['Tent', 'cat-outdoor'], ['Sleeping bag', 'cat-outdoor'], ['Hiking boots', 'cat-outdoor'],
      ['Camping stove', 'cat-outdoor'], ['Backpack', 'cat-outdoor'], ['Water bottle', 'cat-outdoor'],
      ['Flashlight', 'cat-outdoor'],
      // Vivienda
      ['Room', 'cat-infra'], ['Couch', 'cat-infra'], ['Kitchen', 'cat-infra'],
      ['Bathroom', 'cat-infra'], ['Garden', 'cat-infra'], ['Parking', 'cat-infra'],
      ['Storage', 'cat-infra'],
      // Comms
      ['Smartphone', 'cat-comms'], ['Laptop', 'cat-comms'], ['WiFi router', 'cat-comms'],
      ['Headphones', 'cat-comms'], ['Power bank', 'cat-comms'], ['Tablet', 'cat-comms'],
      // Food
      ['Rice', 'cat-alimentos'], ['Pasta', 'cat-alimentos'], ['Olive oil', 'cat-alimentos'],
      ['Canned tomatoes', 'cat-alimentos'], ['Coffee', 'cat-alimentos'], ['Bread', 'cat-alimentos'],
      ['Eggs', 'cat-alimentos'], ['Milk', 'cat-alimentos'],
      // Servicios
      ['Cleaning', 'cat-servicios'], ['Laundry', 'cat-servicios'], ['Gardening', 'cat-servicios'],
      ['Babysitting', 'cat-servicios'], ['Tutoring', 'cat-servicios'], ['Pet sitting', 'cat-servicios'],
      // Música
      ['Guitar', 'cat-m-sica'], ['Piano', 'cat-m-sica'], ['Ukulele', 'cat-m-sica'],
      ['Microphone', 'cat-m-sica'], ['Music lessons', 'cat-m-sica'], ['Drums', 'cat-m-sica'],
      // Eventos
      ['Concert ticket', 'cat-eventos'], ['Workshop', 'cat-eventos'], ['Conference', 'cat-eventos'],
      ['Party supplies', 'cat-eventos'], ['Exhibition', 'cat-eventos'], ['Retreat', 'cat-eventos'],
      // Otros
      ['Books', 'cat-varios'], ['Board games', 'cat-varios'], ['Art supplies', 'cat-varios'],
      ['Pet food', 'cat-varios'], ['Gift card', 'cat-varios'], ['Batteries', 'cat-varios'],
      ['Notebook', 'cat-varios'],
      // Trabajo
      ['Standing desk', 'cat-trabajo'], ['Office chair', 'cat-trabajo'], ['Mentor', 'cat-trabajo'],
      ['Coworking pass', 'cat-trabajo'], ['New project', 'cat-trabajo'],
      // Viaje
      ['Plane ticket', 'cat-viaje'], ['Suitcase', 'cat-viaje'], ['Travel insurance', 'cat-viaje'],
      ['City guide', 'cat-viaje'], ['Translator app', 'cat-viaje'],
      // Hobbies
      ['Watercolor set', 'cat-hobby'], ['Yoga mat', 'cat-hobby'], ['Camera', 'cat-hobby'],
      ['Knitting needles', 'cat-hobby'], ['Bonsai tree', 'cat-hobby'],
      // Educación
      ['Online course', 'cat-educa'], ['Reading list', 'cat-educa'], ['Language partner', 'cat-educa'],
      ['Library card', 'cat-educa'], ['Workshop', 'cat-educa']
    ];

    // classic extras
    const classics = [
      ['Space', 'cat-varios'], ['Swimming pool', 'cat-infra'], ['Bike', 'cat-outdoor'],
      ['Water', 'cat-alimentos'], ['Internet', 'cat-comms'], ['First aid', 'cat-salud']
    ];

    // ---------- RENDER TABS (one visible row + collapsible extra) ----------
    const tabsDiv = document.getElementById('categoryTabs');
    const tabsExtraDiv = document.getElementById('categoryTabsExtra');
    const ROW1_COUNT = 7; // first 7 tabs in row 1, plus button is the 8th slot; rest go to row 2
    function tabHtml(cat) {
      return `<div class="tab" data-cat="${cat.id}" data-catclass="${cat.class}" title="${cat.label}"><i class="fas ${cat.icon}"></i></div>`;
    }
    function renderTabs() {
      const row1 = categories.slice(0, ROW1_COUNT);
      const row2 = categories.slice(ROW1_COUNT);
      tabsDiv.innerHTML = row1.map(tabHtml).join('') +
        (row2.length ? `<button class="tab tab-plus" id="tabsPlusBtn" type="button" aria-expanded="false" aria-controls="categoryTabsExtra" title="Más categorías"><i class="fas fa-plus"></i></button>` : '');
      tabsExtraDiv.innerHTML = row2.map(tabHtml).join('');
    }
    renderTabs();
    // wire plus button to toggle extra row
    const tabsPlusBtn = document.getElementById('tabsPlusBtn');
    if (tabsPlusBtn) {
      tabsPlusBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const open = tabsExtraDiv.classList.toggle('is-open');
        tabsPlusBtn.setAttribute('aria-expanded', String(open));
      });
    }

    // ---------- BUILD TABLE (cells without checkboxes) ----------
    const tbody = document.getElementById('tableBody');
    function buildRow(itemName, catClass) {
      const div = document.createElement('div');
      div.className = `tr row ${catClass}`;
      div.setAttribute('data-category', catClass.replace('cat-', ''));
      div.innerHTML = `
        <span class="td col-item">${itemName}</span>
        <span class="td col-have" data-type="have"></span>
        <span class="td col-wish" data-type="wish"></span>
        <span class="td col-want" data-type="want"></span>
        <span class="td col-need" data-type="need"></span>
      `;
      return div;
    }

    demoItems.forEach(([name, catClass]) => tbody.appendChild(buildRow(name, catClass)));
    classics.forEach(([name, catClass]) => tbody.appendChild(buildRow(name, catClass)));

    // ---------- HELPERS ----------
    function getRows() {
      // exclude the locked label row at the top of tbody
      return Array.from(document.querySelectorAll('.tbody .tr.row:not(.label-row)'));
    }

    // Determine priority for row highlight
    function updateRowPriority(row) {
      const need = row.querySelector('.col-need')?.classList.contains('selected-need');
      const want = row.querySelector('.col-want')?.classList.contains('selected-want');
      const wish = row.querySelector('.col-wish')?.classList.contains('selected-wish');
      const have = row.querySelector('.col-have')?.classList.contains('selected-have');
      let priority = '';
      if (need) priority = 'need';
      else if (want) priority = 'want';
      else if (wish) priority = 'wish';
      else if (have) priority = 'have';
      row.setAttribute('data-priority', priority);
    }

    function updateAllHighlights() {
      getRows().forEach(r => updateRowPriority(r));
    }

    // Counts for phrase
    const haveSpan = document.getElementById('haveCount');
    const wishSpan = document.getElementById('wishCount');
    const wantSpan = document.getElementById('wantCount');
    const needSpan = document.getElementById('needCount');

    function updateCounts() {
      const visible = getRows().filter(r => !r.classList.contains('hidden-row'));
      let have = 0, wish = 0, want = 0, need = 0;
      visible.forEach(r => {
        if (r.querySelector('.col-have')?.classList.contains('selected-have')) have++;
        if (r.querySelector('.col-wish')?.classList.contains('selected-wish')) wish++;
        if (r.querySelector('.col-want')?.classList.contains('selected-want')) want++;
        if (r.querySelector('.col-need')?.classList.contains('selected-need')) need++;
      });
      haveSpan.textContent = have;
      wishSpan.textContent = wish;
      wantSpan.textContent = want;
      needSpan.textContent = need;
    }

    // Cell click handler (toggle selection) — ignores the locked label row
    function handleCellClick(e) {
      const cell = e.target.closest('.td');
      if (!cell) return;
      const row = cell.closest('.tr');
      if (!row || row.classList.contains('label-row')) return;
      if (!row.classList.contains('row')) return;

      const type = cell.dataset.type; // 'have','wish','want','need'
      if (!type) return;

      // Toggle the selected class on this cell
      cell.classList.toggle(`selected-${type}`);

      // Update row priority and counts
      updateRowPriority(row);
      updateCounts();
    }

    // Tab filtering — selectors include both rows of tabs
    let activeCat = 'all';
    const tabs = document.querySelectorAll('.tabs .tab:not(.tab-plus)');
    function filterByCategory(catId) {
      const catInfo = categories.find(c => c.id === catId);
      const targetClass = catInfo ? catInfo.class : '';
      getRows().forEach(row => {
        if (catId === 'all' || row.classList.contains(targetClass)) {
          row.classList.remove('hidden-row');
        } else {
          row.classList.add('hidden-row');
        }
      });
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.cat === catId));
      activeCat = catId;
      updateCounts();
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => filterByCategory(tab.dataset.cat));
    });

    // Attach cell click listeners (delegation)
    tbody.addEventListener('click', handleCellClick);

    // ---------- TITLE → scroll to resume ----------
    const titleBtn = document.getElementById('titleBtn');
    const phrasePanel = document.getElementById('phrasePanel');
    if (titleBtn && phrasePanel) {
      titleBtn.addEventListener('click', () => {
        phrasePanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    }

    // ---------- INSIGHTS / CREATIVE / COPY ----------
    const insightsBtn = document.getElementById('insightsBtn');
    const creativeBtn = document.getElementById('creativeBtn');
    const copyBtn = document.getElementById('copyBtn');
    let insightStep = 0;
    insightsBtn.addEventListener('click', e => {
      e.stopPropagation();
      const h = +haveSpan.textContent, w = +wishSpan.textContent, wa = +wantSpan.textContent, n = +needSpan.textContent;
      const total = h + w + wa + n;
      let hint;
      if (insightStep === 0) {
        hint = total === 0
          ? '🌱 Empieza tocando una celda — cualquier necesidad o deseo.'
          : `🌱 Llevas ${total} marcas · cada una afina lo que pides al mundo.`;
      } else if (insightStep === 1) {
        hint = n > 0
          ? `⚠️ ${n} NEED · prioriza estos, no esperes a que se conviertan en urgencia.`
          : '🪶 Sin NEED por ahora · tu base está cubierta.';
      } else if (insightStep === 2) {
        hint = wa > w
          ? `🎯 Más WANT (${wa}) que WISH (${w}) · estás en modo acción.`
          : `💭 Más WISH (${w}) que WANT (${wa}) · estás soñando, dale tiempo.`;
      } else if (insightStep === 3) {
        hint = h > 0
          ? `🤝 ${h} HAVE · mira cuáles puedes compartir, alguien las necesita.`
          : '📦 Aún no marcas nada como HAVE — toca lo que ya posees.';
      } else {
        hint = '✺ Lo que tienes, lo que pides y lo que das son la misma rueda · gírala despacio.';
      }
      setHint(hint);
      insightStep = (insightStep + 1) % 5;
    });

    creativeBtn.addEventListener('click', e => {
      e.stopPropagation();
      const grouped = itemsByType();
      const pick = arr => arr.length ? arr[Math.floor(Math.random() * arr.length)] : null;
      const haveOne = pick(grouped.have), wishOne = pick(grouped.wish);
      const wantOne = pick(grouped.want), needOne = pick(grouped.need);
      if (![haveOne, wishOne, wantOne, needOne].some(Boolean)) {
        setHint('✨ Marca algunas casillas y pulsaré una frase con ellas.');
        return;
      }
      const parts = [];
      if (haveOne) parts.push(`tengo <em>${escapeHtml(haveOne)}</em>`);
      if (wishOne) parts.push(`sueño con <em>${escapeHtml(wishOne)}</em>`);
      if (wantOne) parts.push(`busco <em>${escapeHtml(wantOne)}</em>`);
      if (needOne) parts.push(`necesito <em>${escapeHtml(needOne)}</em>`);
      setHint(`✨ Hoy ${parts.join(', ')}.`);
    });

    copyBtn.addEventListener('click', async e => {
      e.stopPropagation();
      try {
        await navigator.clipboard.writeText(plainText());
        setHint('📋 Copiado al portapapeles.');
      } catch {
        prompt('Copia:', plainText());
      }
    });

    // ---------- SAVE / SHARE / PUBLISH (goddess-style reveal) ----------
    const hintMessage = document.getElementById('hintMessage');
    function setHint(html) { hintMessage.innerHTML = html; }
    const saveBtn = document.getElementById('saveBtn');
    const shareBtn = document.getElementById('shareBtn');
    const publishBtn = document.getElementById('publishBtn');
    const wraps = {
      save: document.getElementById('saveWrap'),
      share: document.getElementById('shareWrap'),
      publish: document.getElementById('publishWrap'),
    };
    function closeAllWraps(except) {
      Object.values(wraps).forEach(w => { if (w !== except) w.classList.remove('is-open'); });
    }
    function toggleWrap(wrap) {
      const wasOpen = wrap.classList.contains('is-open');
      closeAllWraps();
      if (!wasOpen) wrap.classList.add('is-open');
    }
    saveBtn.addEventListener('click', e => { e.stopPropagation(); toggleWrap(wraps.save); });
    shareBtn.addEventListener('click', e => { e.stopPropagation(); toggleWrap(wraps.share); });
    publishBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (wraps.publish.classList.contains('is-open')) {
        const plat = document.querySelector('input[name="publishPlatform"]:checked');
        const vis  = document.querySelector('input[name="publishVisibility"]:checked');
        const platName = plat?.dataset.platform   || '—';
        const visName  = vis?.dataset.visibility  || '—';
        const total = +haveSpan.textContent + +wishSpan.textContent + +wantSpan.textContent + +needSpan.textContent;
        setHint(`<i class="fas fa-cloud-upload-alt"></i> Published · ${platName} · ${visName} (${total} items).`);
        wraps.publish.classList.remove('is-open');
      } else {
        closeAllWraps();
        wraps.publish.classList.add('is-open');
      }
    });
    Object.values(wraps).forEach(w => w.addEventListener('click', e => e.stopPropagation()));
    document.addEventListener('click', () => closeAllWraps());

    function selectionsByItem() {
      const out = [];
      getRows().forEach(r => {
        const item = r.querySelector('.col-item')?.textContent.trim() || '';
        const have = r.querySelector('.col-have')?.classList.contains('selected-have');
        const wish = r.querySelector('.col-wish')?.classList.contains('selected-wish');
        const want = r.querySelector('.col-want')?.classList.contains('selected-want');
        const need = r.querySelector('.col-need')?.classList.contains('selected-need');
        if (have || wish || want || need) out.push({ item, have, wish, want, need });
      });
      return out;
    }
    function plainText() {
      const sel = selectionsByItem();
      if (!sel.length) return 'thingy · no selections yet';
      return ['thingy snapshot', ...sel.map(s => {
        const tags = [];
        if (s.have) tags.push('HAVE'); if (s.wish) tags.push('WISH');
        if (s.want) tags.push('WANT'); if (s.need) tags.push('NEED');
        return `· ${s.item} — ${tags.join(' / ')}`;
      })].join('\n');
    }
    function buildFullHTML() {
      const sel = selectionsByItem();
      const rows = sel.map(s => {
        const cell = (on, color) => `<td style="padding:6px 10px;text-align:center;background:${on?color:'transparent'};border:1px solid #d8e0e8;">${on?'●':''}</td>`;
        return `<tr><td style="padding:6px 10px;border:1px solid #d8e0e8;font-weight:500;">${s.item}</td>${cell(s.have,'#c8e6c9')}${cell(s.wish,'#bbdefb')}${cell(s.want,'#ffe0b2')}${cell(s.need,'#ffcdd2')}</tr>`;
      }).join('');
      return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>thingy snapshot</title></head>
<body style="font-family:system-ui;padding:2rem;background:#f5f9ff;color:#1a2e3f;">
<h1>thingy snapshot</h1>
<table style="border-collapse:collapse;width:100%;max-width:720px;">
<thead><tr><th style="padding:6px 10px;border:1px solid #d8e0e8;text-align:left;">item</th><th style="padding:6px 10px;background:#c8e6c9;border:1px solid #d8e0e8;">HAVE</th><th style="padding:6px 10px;background:#bbdefb;border:1px solid #d8e0e8;">WISH</th><th style="padding:6px 10px;background:#ffe0b2;border:1px solid #d8e0e8;">WANT</th><th style="padding:6px 10px;background:#ffcdd2;border:1px solid #d8e0e8;">NEED</th></tr></thead>
<tbody>${rows || '<tr><td colspan="5" style="padding:1rem;text-align:center;color:#5e7c95;">no selections yet</td></tr>'}</tbody>
</table>
<p style="margin-top:2rem;color:#58738c;font-size:.85rem;">generated ${new Date().toLocaleString()}</p>
</body></html>`;
    }
    function jsonData() {
      return { generated: new Date().toISOString(), items: selectionsByItem() };
    }
    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }
    function shareUrl(target) {
      const txt = `thingy · ${plainText().slice(0, 220)}`;
      const enc = encodeURIComponent(txt);
      const page = encodeURIComponent(location.href);
      switch (target) {
        case 'whatsapp': return `https://wa.me/?text=${enc}%20${page}`;
        case 'telegram': return `https://t.me/share/url?url=${page}&text=${enc}`;
        case 'mail':     return `mailto:?subject=${encodeURIComponent('thingy snapshot')}&body=${enc}%0A%0A${page}`;
      }
    }
    const subActions = {
      'save:html': () => { downloadBlob(new Blob([buildFullHTML()], {type:'text/html'}), 'thingy_snapshot.html'); setHint('<i class="fas fa-check-circle"></i> HTML downloaded.'); },
      'save:text': () => { downloadBlob(new Blob([plainText()], {type:'text/plain'}), 'thingy_snapshot.txt'); setHint('<i class="fas fa-check-circle"></i> Text downloaded.'); },
      'save:json': () => { downloadBlob(new Blob([JSON.stringify(jsonData(), null, 2)], {type:'application/json'}), 'thingy_snapshot.json'); setHint('<i class="fas fa-check-circle"></i> JSON downloaded.'); },
      'share:whatsapp': () => { window.open(shareUrl('whatsapp'), '_blank', 'noopener'); setHint('<i class="fab fa-whatsapp"></i> Opening WhatsApp…'); },
      'share:telegram': () => { window.open(shareUrl('telegram'), '_blank', 'noopener'); setHint('<i class="fab fa-telegram"></i> Opening Telegram…'); },
      'share:mail':     () => { location.href = shareUrl('mail'); setHint('<i class="fas fa-envelope"></i> Opening Mail…'); },
    };
    document.querySelectorAll('.subitem').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const fn = subActions[`${btn.dataset.group}:${btn.dataset.action}`];
        if (fn) fn();
        if (btn.dataset.group !== 'publish') closeAllWraps();
      });
    });

    // ---------- EXPAND PANEL (per-category) ----------
    const expandBtn = document.getElementById('expandBtn');
    const phraseLines = {
      have: document.querySelector('.phrase-line.phrase-have'),
      wish: document.querySelector('.phrase-line.phrase-wish'),
      want: document.querySelector('.phrase-line.phrase-want'),
      need: document.querySelector('.phrase-line.phrase-need'),
    };
    const phraseItems = {
      have: document.getElementById('phraseItemsHave'),
      wish: document.getElementById('phraseItemsWish'),
      want: document.getElementById('phraseItemsWant'),
      need: document.getElementById('phraseItemsNeed'),
    };

    // per-(item,type) state. shareable applies to HAVE, much to WISH/WANT/NEED.
    const itemState = {};
    function stateKey(name, type) { return `${type}::${name}`; }
    function ensureItemState(key) {
      if (!itemState[key]) itemState[key] = { shareable: false, much: false, notes: [] };
      return itemState[key];
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function itemsByType() {
      const result = { have: [], wish: [], want: [], need: [] };
      getRows()
        .filter(r => !r.classList.contains('hidden-row'))
        .forEach(row => {
          const name = row.querySelector('.col-item')?.textContent.trim() || '';
          ['have','wish','want','need'].forEach(t => {
            if (row.querySelector(`.col-${t}`)?.classList.contains(`selected-${t}`)) {
              result[t].push(name);
            }
          });
        });
      return result;
    }

    function renderItemCard(name, type) {
      const key = stateKey(name, type);
      const st = ensureItemState(key);
      const keyAttr = escapeHtml(key);
      const notesHtml = st.notes.map((n, idx) =>
        `<div class="note"><span class="note-text">${escapeHtml(n)}</span><button class="note-del" data-key="${keyAttr}" data-idx="${idx}" aria-label="delete note">×</button></div>`
      ).join('');
      return `
        <div class="sel-item">
          <div class="sel-row">
            <span class="sel-name">${escapeHtml(name)}</span>
          </div>
          <div class="sel-notes">${notesHtml}</div>
          <div class="add-note">
            <input type="text" data-key="${keyAttr}" placeholder="add additional info…">
            <button class="note-save" type="button" data-key="${keyAttr}">Save</button>
            <label class="note-file" title="attach file" aria-label="attach file">
              <i class="fas fa-paperclip"></i>
              <input type="file" data-key="${keyAttr}">
            </label>
          </div>
        </div>
      `;
    }

    // section-level state for shareable / much toggles in pl-head
    const sectionFlags = { have: { shareable: false }, wish: { much: false }, want: { much: false }, need: { much: false } };

    function renderAllCategories() {
      const grouped = itemsByType();
      ['have','wish','want','need'].forEach(type => {
        const names = grouped[type];
        phraseItems[type].innerHTML = names.length
          ? names.map(n => renderItemCard(n, type)).join('')
          : '<div class="expand-empty">No items in this category yet.</div>';
      });
    }

    function setAllOpen(open) {
      Object.values(phraseLines).forEach(line => line.classList.toggle('open', open));
      expandBtn.setAttribute('aria-expanded', String(open));
    }

    expandBtn.addEventListener('click', () => {
      const isOpen = expandBtn.getAttribute('aria-expanded') === 'true';
      if (!isOpen) renderAllCategories();
      setAllOpen(!isOpen);
    });

    // toggle a single category by clicking its head — but ignore clicks on the inline pill toggle
    Object.entries(phraseLines).forEach(([type, line]) => {
      line.querySelector('.pl-head').addEventListener('click', (e) => {
        if (e.target.closest('.extra-toggle')) return; // pill handles its own click
        const willOpen = !line.classList.contains('open');
        if (willOpen) renderAllCategories(); // ensure freshness
        line.classList.toggle('open', willOpen);
        // sync aria-expanded if any are open
        const anyOpen = Object.values(phraseLines).some(l => l.classList.contains('open'));
        expandBtn.setAttribute('aria-expanded', String(anyOpen));
      });
    });

    // section-level pill toggle (shareable on HAVE; much on WISH/WANT/NEED)
    function thunderZap(btn) {
      btn.classList.remove('zap');
      // restart animation
      void btn.offsetWidth;
      btn.classList.add('zap');
      btn.addEventListener('animationend', () => btn.classList.remove('zap'), { once: true });

      // splash a few bolts around the pill
      const head = btn.closest('.pl-head');
      if (!head) return;
      const headRect = head.getBoundingClientRect();
      const btnRect = btn.getBoundingClientRect();
      const cx = btnRect.left - headRect.left + btnRect.width / 2;
      const cy = btnRect.top  - headRect.top  + btnRect.height / 2;
      const angles = [-90, -45, 0, 45, 90, 135, 180, 225];
      angles.forEach((deg, i) => {
        const bolt = document.createElement('span');
        bolt.className = 'thunder-bolt';
        bolt.textContent = '⚡';
        bolt.setAttribute('aria-hidden', 'true');
        const rad = (deg * Math.PI) / 180;
        const dist = 30 + Math.random() * 18;
        bolt.style.left = (cx - 8) + 'px';
        bolt.style.top  = (cy - 8) + 'px';
        bolt.style.setProperty('--dx', `${Math.cos(rad) * dist}px`);
        bolt.style.setProperty('--dy', `${Math.sin(rad) * dist}px`);
        bolt.style.setProperty('--r', `${(Math.random() * 60 - 30)}deg`);
        bolt.style.animationDelay = `${i * 18}ms`;
        head.appendChild(bolt);
        bolt.addEventListener('animationend', () => bolt.remove(), { once: true });
      });
    }
    document.querySelectorAll('.pl-head .extra-toggle').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const section = btn.dataset.section;
        const extra = btn.dataset.extra;
        const newVal = btn.getAttribute('aria-pressed') !== 'true';
        btn.setAttribute('aria-pressed', String(newVal));
        if (sectionFlags[section]) sectionFlags[section][extra] = newVal;
        thunderZap(btn);
      });
    });

    // delegated handlers across all four phrase-items containers
    document.getElementById('phraseRows').addEventListener('click', (e) => {
      if (e.target.classList.contains('note-save')) {
        const key = e.target.dataset.key;
        const input = e.target.closest('.add-note').querySelector('input[type="text"]');
        const val = input.value.trim();
        if (!val) return;
        ensureItemState(key).notes.push(val);
        renderAllCategories();
      } else if (e.target.classList.contains('note-del')) {
        const key = e.target.dataset.key;
        const idx = parseInt(e.target.dataset.idx, 10);
        if (itemState[key]) {
          itemState[key].notes.splice(idx, 1);
          renderAllCategories();
        }
      }
    });
    document.getElementById('phraseRows').addEventListener('change', (e) => {
      const t = e.target;
      if (t.matches('input[type="file"][data-key]')) {
        const f = t.files && t.files[0];
        if (f) {
          ensureItemState(t.dataset.key).notes.push(`📎 ${f.name}`);
          t.value = '';
          renderAllCategories();
        }
      }
    });
    document.getElementById('phraseRows').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.matches('.add-note input[type="text"]')) {
        e.preventDefault();
        e.target.closest('.add-note').querySelector('.note-save')?.click();
      }
    });

    // refresh the per-category lists when selections or filters change
    function maybeRefreshExpand() {
      const anyOpen = Object.values(phraseLines).some(l => l.classList.contains('open'));
      if (anyOpen) renderAllCategories();
    }
    tbody.addEventListener('click', () => requestAnimationFrame(maybeRefreshExpand));
    tabs.forEach(tab => tab.addEventListener('click', () => requestAnimationFrame(maybeRefreshExpand)));

    // Initialize · resume sections start collapsed
    filterByCategory('all');
    updateAllHighlights();
    updateCounts();
  })();
</script>

</body>
</html>
