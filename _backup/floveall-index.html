<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0814">
<title>✺ Docs · file explorer</title>
<style>
  :root {
    --bg-0: #07050f;
    --bg-1: #0e0a1f;
    --bg-2: #16112e;
    --ink: #f3eefb;
    --ink-dim: #b9b0d4;
    --ink-faint: #6f6890;
    --line: rgba(255,255,255,.08);
    --line-strong: rgba(255,255,255,.16);
    --card: rgba(255,255,255,.035);
    --card-hover: rgba(255,255,255,.07);
    --pink: #ff5d8f;
    --orange: #ffb15d;
    --cyan: #7df9ff;
    --violet: #b18bff;
    --green: #7dffae;
    --shadow: 0 10px 40px -12px rgba(0,0,0,.6);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(177,139,255,.18), transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 10%, rgba(255,93,143,.12), transparent 60%),
      radial-gradient(ellipse 70% 50% at 10% 80%, rgba(125,249,255,.08), transparent 60%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 30%, var(--bg-1));
    background-attachment: fixed;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  input { font: inherit; color: inherit; }

  /* ------------ Header (sticky, single row) ------------ */
  header.hero {
    position: sticky;
    top: 0;
    z-index: 30;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 8px;
    background: linear-gradient(180deg, rgba(7,5,15,.95), rgba(7,5,15,.85));
    backdrop-filter: saturate(140%) blur(14px);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
    border-bottom: 1px solid var(--line);
  }
  @media (min-width: 480px) {
    header.hero { gap: 8px; padding: 8px 12px; }
  }
  .back {
    flex: 0 0 auto;
    width: 32px; height: 32px;
    display: grid; place-items: center;
    border-radius: 9px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.03);
    color: var(--ink-dim);
    font-size: 16px;
    text-decoration: none;
    transition: background .15s, color .15s, border-color .15s;
  }
  .back:hover {
    color: var(--ink);
    border-color: var(--line-strong);
    background: rgba(255,255,255,.06);
  }
  @media (min-width: 480px) {
    .back { width: 36px; height: 36px; font-size: 18px; border-radius: 10px; }
  }
  .brand {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: .25em;
    font-size: 16px;
    line-height: 1;
    font-weight: 800;
    letter-spacing: -.01em;
  }
  .brand .all { display: none; }
  @media (min-width: 480px) {
    .brand { font-size: 20px; gap: .35em; }
    .brand .all { display: inline; }
  }
  @media (min-width: 720px) {
    .brand { font-size: 22px; }
  }
  .ster {
    display: inline-block;
    color: var(--pink);
    text-shadow: 0 0 18px rgba(255,93,143,.55);
    animation: spin 18s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .brand .all {
    background: linear-gradient(90deg, var(--cyan), var(--violet) 60%, var(--pink));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .menu-btn {
    flex: 0 0 auto;
    width: 32px; height: 32px;
    border-radius: 9px;
    display: grid; place-items: center;
    color: var(--ink-dim);
    border: 1px solid var(--line);
    background: rgba(255,255,255,.03);
    transition: background .15s, color .15s, border-color .15s;
  }
  .menu-btn:hover,
  .menu-btn[aria-expanded="true"] {
    color: var(--ink);
    border-color: var(--line-strong);
    background: rgba(255,255,255,.06);
  }
  @media (min-width: 480px) {
    .menu-btn { width: 36px; height: 36px; border-radius: 10px; }
  }
  .menu-panel {
    position: absolute;
    right: 12px; top: calc(100% + 4px);
    min-width: 280px;
    max-width: calc(100vw - 24px);
    background: rgba(20,16,38,.96);
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    padding: 6px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    z-index: 50;
  }
  .menu-panel.on { display: block; }
  .menu-panel a, .menu-panel > button {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13.5px; color: var(--ink); width: 100%;
    text-align: left;
  }
  .menu-panel a:hover, .menu-panel > button:hover { background: rgba(255,255,255,.06); }
  .menu-panel .stats-line {
    padding: 8px 12px 10px;
    font-size: 12px; color: var(--ink-faint);
    line-height: 1.5;
  }
  .menu-panel .stats-line b { color: var(--ink); font-weight: 700; }
  .menu-panel hr { border: 0; border-top: 1px solid var(--line); margin: 4px 0; }
  .menu-panel .search {
    margin: 4px;
    display: flex; align-items: center;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    padding: 0 10px;
    height: 38px;
    transition: border-color .2s, background .2s;
  }
  .menu-panel .search:focus-within {
    border-color: var(--pink);
    background: rgba(255,93,143,.06);
    box-shadow: 0 0 0 3px rgba(255,93,143,.10);
  }
  .menu-panel .search svg { flex: 0 0 16px; opacity: .6; margin-right: 8px; }
  .menu-panel .search input {
    flex: 1; min-width: 0;
    border: 0; outline: 0; background: transparent;
    height: 100%; font-size: 14px;
    color: var(--ink);
  }
  .menu-panel .search input::placeholder { color: var(--ink-faint); }
  .menu-panel .search .clear {
    flex: 0 0 auto;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    color: var(--ink-faint);
    font-size: 18px;
    margin-right: -4px;
    padding: 0;
    border: 0;
    background: transparent;
  }
  .menu-panel .search .clear:hover { background: rgba(255,255,255,.08); color: var(--ink); }
  .menu-panel .search.has-text .clear { display: inline-flex; }
  .menu-panel .result-line {
    padding: 4px 14px 8px;
    font-size: 11px;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }

  /* ------------ Chips (centered in header, single line) ------------ */
  .chips {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    justify-content: center;
    gap: 3px;
  }
  @media (min-width: 480px) { .chips { gap: 5px; } }
  .chip {
    flex: 1 1 0;
    min-width: 0;
    max-width: 56px;
    display: inline-flex; align-items: center; justify-content: center;
    height: 32px;
    padding: 0 2px;
    border-radius: 9px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.03);
    color: var(--ink-dim);
    font-size: 15px;
    line-height: 1;
    transition: all .15s;
    user-select: none;
  }
  .chip:hover { color: var(--ink); border-color: var(--line-strong); }
  .chip.on {
    color: var(--bg-0);
    background: var(--ink);
    border-color: var(--ink);
  }
  .chip[data-t="audio"].on  { background: var(--cyan);   border-color: var(--cyan);   color: #00131a; }
  .chip[data-t="video"].on  { background: var(--pink);   border-color: var(--pink);   color: #1a000a; }
  .chip[data-t="image"].on  { background: var(--orange); border-color: var(--orange); color: #1a0e00; }
  .chip[data-t="doc"].on    { background: var(--violet); border-color: var(--violet); color: #0e001a; }
  .chip[data-t="archive"].on{ background: var(--green);  border-color: var(--green);  color: #00170a; }
  .chip[data-t="odp"].on    { background: var(--orange); border-color: var(--orange); color: #1a0e00; }
  @media (min-width: 480px) {
    .chip { height: 36px; font-size: 18px; padding: 0 4px; border-radius: 10px; max-width: 64px; }
  }
  @media (min-width: 720px) {
    .chip { height: 38px; font-size: 20px; }
  }

  /* ------------ Tree groups ------------ */
  main { padding: 12px 12px 80px; max-width: 1200px; margin: 0 auto; }
  .group { margin: 6px 0 0; }
  .group.lvl-0 { margin: 16px 0 0; }
  .group .nest {
    margin-left: 12px;
    padding-left: 10px;
    border-left: 1px dashed var(--line);
  }
  @media (min-width: 560px) {
    .group .nest { margin-left: 18px; padding-left: 14px; }
  }
  .group-head {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 4px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 8px;
    cursor: pointer;
    user-select: none;
  }
  .group-head:hover { background: rgba(255,255,255,.025); }
  .group-head .caret {
    flex: 0 0 12px;
    width: 12px;
    transition: transform .18s;
    color: var(--ink-faint);
    font-size: 9px;
    text-align: center;
  }
  .group.collapsed > .group-head .caret { transform: rotate(-90deg); }
  .group.collapsed > .group-body { display: none; }
  .group-head h2 {
    margin: 0;
    font-size: 30px;
    letter-spacing: .03em;
    text-transform: uppercase;
    font-weight: 800;
    color: var(--ink);
    flex: 0 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.1;
  }
  .group.lvl-1 > .group-head h2 { font-size: 22px; letter-spacing: .03em; }
  .group.lvl-2 > .group-head h2 { font-size: 18px; letter-spacing: .04em; }
  .group.lvl-3 > .group-head h2,
  .group.lvl-4 > .group-head h2 { font-size: 15px; letter-spacing: .04em; }
  @media (min-width: 480px) {
    .group-head h2 { font-size: 39px; }
    .group.lvl-1 > .group-head h2 { font-size: 30px; }
    .group.lvl-2 > .group-head h2 { font-size: 24px; }
    .group.lvl-3 > .group-head h2,
    .group.lvl-4 > .group-head h2 { font-size: 19px; }
  }
  .group-head .caret { font-size: 11px; }
  .group.lvl-0 > .group-head .caret { font-size: 14px; flex-basis: 16px; }
  .group-head .num {
    color: var(--violet);
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    margin-right: 4px;
  }
  .group-head .pad { flex: 1; }
  .group-head .gsize {
    color: var(--ink-faint);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    flex: 0 0 auto;
  }
  .group-body > .grid + .nest { margin-top: 10px; }

  .grid {
    display: grid; gap: 6px;
    grid-template-columns: 1fr;
  }
  @media (min-width: 480px) {
    .grid { grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
  }
  @media (min-width: 760px) {
    .grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
  }
  @media (min-width: 1080px) {
    .grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
  }

  /* ------------ File card (compact) ------------ */
  .card {
    position: relative;
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    min-height: 48px;
    transition: background .15s, border-color .15s, transform .12s;
    cursor: pointer;
  }
  .card:hover { background: var(--card-hover); border-color: var(--line-strong); }
  .card:active { transform: scale(.985); }
  .card.open {
    background: rgba(255,255,255,.06);
    border-color: var(--line-strong);
    grid-column: 1 / -1;
    flex-direction: column;
    align-items: stretch;
  }
  .card .icon {
    flex: 0 0 32px;
    height: 32px; width: 32px;
    display: grid; place-items: center;
    border-radius: 8px;
    font-size: 15px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--line);
  }
  .card[data-t="audio"] .icon   { background: rgba(125,249,255,.10); border-color: rgba(125,249,255,.25); color: var(--cyan); }
  .card[data-t="video"] .icon   { background: rgba(255,93,143,.10);  border-color: rgba(255,93,143,.25);  color: var(--pink); }
  .card[data-t="image"] .icon   { background: rgba(255,177,93,.10);  border-color: rgba(255,177,93,.25);  color: var(--orange); }
  .card[data-t="doc"] .icon     { background: rgba(177,139,255,.12); border-color: rgba(177,139,255,.28); color: var(--violet); }
  .card[data-t="archive"] .icon { background: rgba(125,255,174,.10); border-color: rgba(125,255,174,.25); color: var(--green); }

  .card .body {
    min-width: 0; flex: 1;
    display: flex; flex-direction: column; gap: 1px;
  }
  .card .name {
    font-size: 13px; font-weight: 600;
    overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--ink);
  }
  .card .sub {
    display: flex; gap: 6px; align-items: center;
    font-size: 10.5px; color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }
  .card .ext {
    text-transform: uppercase; letter-spacing: .05em;
    font-weight: 700; padding: 0 5px; border-radius: 4px;
    background: rgba(255,255,255,.05); color: var(--ink-dim);
    font-size: 9.5px;
  }
  .card .cat { color: var(--ink-faint); }

  .card .preview {
    width: 100%; padding-top: 10px;
    display: none;
  }
  .card.open .preview { display: block; }
  .card.open { cursor: default; }
  .card .preview audio,
  .card .preview video,
  .card .preview img {
    width: 100%; max-width: 100%;
    display: block;
    border-radius: 10px;
    background: #000;
  }
  .card .preview audio { background: transparent; }
  .card .preview .actions {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 8px;
  }
  .card .preview a.act, .card .preview button.act {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 12px; border-radius: 8px;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--line-strong);
    font-size: 12.5px; font-weight: 600;
    color: var(--ink);
  }
  .card .preview a.act:hover, .card .preview button.act:hover { background: rgba(255,255,255,.10); }
  .card .preview .path { color: var(--ink-faint); font-size: 11.5px; word-break: break-all; margin-top: 6px; }

  /* Larger tap area on touch devices */
  @media (hover: none) {
    .card { min-height: 52px; }
  }

  /* ------------ Empty + footer ------------ */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--ink-faint);
  }
  .empty .big { font-size: 56px; opacity: .35; margin-bottom: 8px; }
  footer {
    text-align: center; color: var(--ink-faint);
    padding: 20px 14px 40px; font-size: 12px;
  }
  footer a { color: var(--violet); }

  /* ------------ Lightbox ------------ */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(7,5,15,.92);
    backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 16px;
  }
  .lightbox.on { display: flex; }
  .lightbox img {
    max-width: 100%; max-height: 100%;
    border-radius: 8px;
    box-shadow: var(--shadow);
  }
  .lightbox .close {
    position: absolute; top: 12px; right: 14px;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,.08);
    color: var(--ink); font-size: 22px;
    display: grid; place-items: center;
  }

  /* ------------ Top button ------------ */
  .totop {
    position: fixed; right: 16px; bottom: 16px;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--pink); color: #1a000a;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(255,93,143,.4);
    font-size: 20px; font-weight: 800;
    z-index: 25;
  }
  .totop.on { display: grid; }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .ster { animation: none; }
    * { transition: none !important; }
  }
</style>
</head>
<body>

<header class="hero">
  <a class="back" href="https://flove.org" aria-label="Back to flove.org" title="flove.org">←</a>
  <div class="brand"><span class="ster">✺</span><span class="all">Docs</span></div>
  <div class="chips" id="typeChips" role="tablist" aria-label="Type filters">
    <button class="chip on" data-t="all" aria-label="All" title="All">✺</button>
    <button class="chip" data-t="audio" aria-label="Audio" title="Audio">🔊</button>
    <button class="chip" data-t="video" aria-label="Video" title="Video">🎬</button>
    <button class="chip" data-t="image" aria-label="Image" title="Image">🖼</button>
    <button class="chip" data-t="doc" aria-label="Document" title="Document">📄</button>
    <button class="chip" data-t="archive" aria-label="Archive" title="Archive">📦</button>
    <button class="chip" data-t="odp" aria-label="Presentation .odp" title=".odp">📽</button>
  </div>
  <button class="menu-btn" id="menuBtn" aria-label="Menu" aria-expanded="false" aria-controls="menuPanel" aria-haspopup="true">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
  </button>
  <div class="menu-panel" id="menuPanel" role="menu">
    <div class="stats-line" id="stats">—</div>
    <hr>
    <button id="expandAll" role="menuitem">⊕ Expand all</button>
    <button id="collapseAll" role="menuitem">⊖ Collapse all</button>
    <hr>
    <a href="README.md" role="menuitem">📘 README</a>
    <a href="https://codeberg.org/Flove/FloveAll" target="_blank" rel="noopener" role="menuitem">↗ Repo on Codeberg</a>
    <hr>
    <label class="search" id="searchBox">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="search by name, category, extension…" autocomplete="off" inputmode="search" enterkeyhint="search" aria-label="Search">
      <button class="clear" id="clear" aria-label="Clear">×</button>
    </label>
    <div class="result-line"><span id="resultCount">— results</span></div>
  </div>
</header>

<main id="main"></main>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="close" id="lbClose" aria-label="Close">×</button>
  <img id="lbImg" alt="">
</div>

<button class="totop" id="totop" aria-label="Top">↑</button>

<footer>
  <span class="ster" style="display:inline-block">✺</span>
  &nbsp;<a href="README.md">README</a> · <a href="https://codeberg.org/Flove/FloveAll" target="_blank" rel="noopener">repo on Codeberg</a>
</footer>

// ============== HELPERS ==============
const TYPE_OF_EXT = {
  mp3:'audio', m4a:'audio', aac:'audio', wav:'audio', ogg:'audio', flac:'audio',
  mp4:'video', webm:'video', mov:'video', mkv:'video', gif:'video',
  jpg:'image', jpeg:'image', png:'image', webp:'image', svg:'image',
  pdf:'doc', md:'doc', odt:'doc', ods:'doc', odp:'doc', docx:'doc', txt:'doc',
  zip:'archive', tar:'archive', gz:'archive', '7z':'archive', rar:'archive',
};
const TYPE_LABEL = { audio:'🔊', video:'🎬', image:'🖼', doc:'📄', archive:'📦' };

function extOf(p) {
  const dot = p.lastIndexOf('.');
  return dot < 0 ? '' : p.slice(dot+1).toLowerCase();
}
function typeOf(p) { return TYPE_OF_EXT[extOf(p)] || 'doc'; }
function categoryOf(p) {
  const parts = p.split('/');
  return parts.length > 1 ? parts[0] : '·root';
}
function basenameOf(p) { return p.split('/').pop(); }
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1).replace('.0','') + ' KB';
  if (b < 1024*1024*1024) return (b/1048576).toFixed(1).replace('.0','') + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}
function urlEnc(p) {
  // encodeURI then escape some chars encodeURI leaves alone
  return p.split('/').map(encodeURIComponent).join('/');
}

// Numeric prefix of a category name (e.g. "211DEATH" -> "211", "Apps" -> "")
function numKeyOf(cat) {
  const m = cat.match(/^(\d+)/);
  return m ? m[1] : '';
}
// Tail (non-numeric remainder) of a category name; capitalized
function prettyTail(cat) {
  const m = cat.match(/^(\d*)(.*)$/);
  const t = m ? m[2] : cat;
  if (!t) return '';
  return t.charAt(0) + t.slice(1).toLowerCase();
}

// ============== STATE ==============
const state = {
  q: '',
  type: 'all',
  collapsed: new Set(), // keys of collapsed group nodes (numeric prefix or '·sin', '·sin/<cat>')
};

// ============== STATS ==============
function setStats() {
  const total = FILES.length;
  const folders = new Set(FILES.map(f => categoryOf(f.p))).size;
  const totalBytes = FILES.reduce((a,f)=>a+f.s, 0);
  document.getElementById('stats').innerHTML =
    `<b>${total}</b> files · <b>${folders}</b> folders<br><b>${fmtSize(totalBytes)}</b> total`;
}

// ============== RENDER ==============
const main = document.getElementById('main');
const resultCount = document.getElementById('resultCount');

function getFiltered() {
  const q = state.q.trim().toLowerCase();
  return FILES.filter(f => {
    if (state.type === 'odp') {
      if (extOf(f.p) !== 'odp') return false;
    } else if (state.type !== 'all') {
      if (typeOf(f.p) !== state.type) return false;
    }
    if (!q) return true;
    return f.p.toLowerCase().includes(q);
  });
}

// Build a tree where each node is keyed by a digit-prefix path (e.g. "0" -> "01" -> "011").
// Categories with the same digit-prefix as a node attach to that node's `categories[]`.
// Categories without a numeric prefix go into a separate `noNum` bucket.
function buildTree(files) {
  const byCat = new Map();
  for (const f of files) {
    const cat = categoryOf(f.p);
    if (!byCat.has(cat)) byCat.set(cat, []);
    byCat.get(cat).push(f);
  }
  const root = { key: '', children: new Map(), categories: [] };
  const noNum = { categories: [] };
  function ensureNode(num) {
    let cur = root;
    for (let i = 0; i < num.length; i++) {
      const k = num.slice(0, i + 1);
      if (!cur.children.has(k)) {
        cur.children.set(k, { key: k, children: new Map(), categories: [] });
      }
      cur = cur.children.get(k);
    }
    return cur;
  }
  for (const [cat, fs] of byCat) {
    const n = numKeyOf(cat);
    if (!n) noNum.categories.push({ cat, files: fs });
    else ensureNode(n).categories.push({ cat, files: fs });
  }
  return { root, noNum };
}

function nodeTotals(node) {
  let count = 0, bytes = 0;
  for (const c of node.categories) {
    count += c.files.length;
    for (const f of c.files) bytes += f.s;
  }
  for (const child of node.children.values()) {
    const r = nodeTotals(child);
    count += r.count; bytes += r.bytes;
  }
  return { count, bytes };
}

function cardEl(f) {
  const t = typeOf(f.p);
  const ext = extOf(f.p);
  const base = basenameOf(f.p);
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.t = t;
  card.dataset.path = f.p;
  card.tabIndex = 0;
  card.setAttribute('role', 'button');
  card.setAttribute('aria-label', `${base}, ${fmtSize(f.s)}`);
  card.innerHTML = `
    <div class="icon" aria-hidden="true">${TYPE_LABEL[t] || '📄'}</div>
    <div class="body">
      <div class="name" title="${escapeHtml(f.p)}">${escapeHtml(base)}</div>
      <div class="sub">
        <span class="ext">${ext || '?'}</span>
        <span>${fmtSize(f.s)}</span>
      </div>
    </div>
    <div class="preview"></div>
  `;
  return card;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function makeGroupSection(key, depth, num, label, totals) {
  const sec = document.createElement('section');
  sec.className = 'group lvl-' + Math.min(depth, 4);
  if (state.collapsed.has(key)) sec.classList.add('collapsed');
  sec.dataset.key = key;
  const head = document.createElement('div');
  head.className = 'group-head';
  head.setAttribute('role', 'button');
  head.setAttribute('aria-expanded', state.collapsed.has(key) ? 'false' : 'true');
  head.innerHTML = `
    <span class="caret" aria-hidden="true">▼</span>
    <h2>${num ? `<span class="num">${escapeHtml(num)}</span>` : ''}${escapeHtml(label)}</h2>
    <span class="pad"></span>
    <span class="gsize">${totals.count} · ${fmtSize(totals.bytes)}</span>
  `;
  sec.appendChild(head);
  const body = document.createElement('div');
  body.className = 'group-body';
  sec.appendChild(body);
  return { sec, body };
}

function renderTreeNode(node, depth) {
  const totals = nodeTotals(node);
  if (totals.count === 0) return null;

  // Choose label: if exactly one category attached at this node, show its tail;
  // otherwise just show the numeric key.
  let label = '';
  if (node.categories.length === 1) {
    label = prettyTail(node.categories[0].cat);
  } else if (node.categories.length > 1) {
    label = '';
  }
  const { sec, body } = makeGroupSection(node.key, depth, node.key, label, totals);

  // Own files: if multiple categories share the same numeric key (rare), label each subgroup.
  for (const c of node.categories) {
    if (c.files.length === 0) continue;
    if (node.categories.length > 1) {
      const sub = document.createElement('div');
      sub.className = 'group-head';
      sub.style.cursor = 'default';
      sub.innerHTML = `<span class="caret" style="visibility:hidden">▼</span><h2>${escapeHtml(c.cat)}</h2>`;
      body.appendChild(sub);
    }
    const grid = document.createElement('div');
    grid.className = 'grid';
    const sorted = [...c.files].sort((a,b)=>basenameOf(a.p).localeCompare(basenameOf(b.p), 'es', {sensitivity:'base'}));
    for (const f of sorted) grid.appendChild(cardEl(f));
    body.appendChild(grid);
  }

  const childKeys = [...node.children.keys()].sort();
  if (childKeys.length > 0) {
    const nest = document.createElement('div');
    nest.className = 'nest';
    for (const ck of childKeys) {
      const childSec = renderTreeNode(node.children.get(ck), depth + 1);
      if (childSec) nest.appendChild(childSec);
    }
    if (nest.children.length > 0) body.appendChild(nest);
  }
  return sec;
}

function render() {
  const list = getFiltered();
  resultCount.textContent = `${list.length} result${list.length===1?'':'s'}`;

  if (list.length === 0) {
    main.innerHTML = `<div class="empty"><div class="big">∅</div>nothing to show — refine search.</div>`;
    return;
  }

  const tree = buildTree(list);
  const frag = document.createDocumentFragment();

  const topKeys = [...tree.root.children.keys()].sort();
  for (const tk of topKeys) {
    const el = renderTreeNode(tree.root.children.get(tk), 0);
    if (el) frag.appendChild(el);
  }

  if (tree.noNum.categories.length > 0) {
    let totalCount = 0, totalBytes = 0;
    for (const c of tree.noNum.categories) {
      totalCount += c.files.length;
      for (const f of c.files) totalBytes += f.s;
    }
    const { sec, body } = makeGroupSection('·sin', 0, '·', 'no number', { count: totalCount, bytes: totalBytes });
    const cats = [...tree.noNum.categories].sort((a,b)=>a.cat.localeCompare(b.cat));
    const nest = document.createElement('div');
    nest.className = 'nest';
    for (const c of cats) {
      const subBytes = c.files.reduce((a,f)=>a+f.s, 0);
      const subKey = '·sin/'+c.cat;
      const { sec: subSec, body: subBody } = makeGroupSection(subKey, 1, '', c.cat, { count: c.files.length, bytes: subBytes });
      const grid = document.createElement('div');
      grid.className = 'grid';
      const sorted = [...c.files].sort((a,b)=>basenameOf(a.p).localeCompare(basenameOf(b.p), 'es', {sensitivity:'base'}));
      for (const f of sorted) grid.appendChild(cardEl(f));
      subBody.appendChild(grid);
      nest.appendChild(subSec);
    }
    body.appendChild(nest);
    frag.appendChild(sec);
  }

  main.replaceChildren(frag);
}

// ============== INTERACTIONS ==============
const q = document.getElementById('q');
const searchBox = document.getElementById('searchBox');
const clearBtn = document.getElementById('clear');
let qTimer = 0;
q.addEventListener('input', () => {
  searchBox.classList.toggle('has-text', q.value.length > 0);
  clearTimeout(qTimer);
  qTimer = setTimeout(() => { state.q = q.value; render(); }, 90);
});
clearBtn.addEventListener('click', () => {
  q.value = ''; state.q = '';
  searchBox.classList.remove('has-text');
  render(); q.focus();
});

document.getElementById('typeChips').addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  document.querySelectorAll('#typeChips .chip').forEach(c=>c.classList.toggle('on', c===btn));
  state.type = btn.dataset.t;
  render();
});

// ============== Group collapse / Card open ==============
main.addEventListener('click', e => {
  // Toggle group collapse (group-head click, but not the inner files)
  const head = e.target.closest('.group-head');
  if (head && head.parentElement && head.parentElement.classList.contains('group')) {
    const sec = head.parentElement;
    if (head.style.cursor === 'default') return; // disabled inner sub-headers
    const key = sec.dataset.key;
    const collapsed = sec.classList.toggle('collapsed');
    head.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    if (collapsed) state.collapsed.add(key);
    else state.collapsed.delete(key);
    return;
  }
  const card = e.target.closest('.card');
  if (!card) return;
  if (e.target.closest('.preview') && card.classList.contains('open')) return;
  toggleCard(card);
});
main.addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const card = e.target.closest('.card');
  if (!card) return;
  e.preventDefault();
  toggleCard(card);
});

function toggleCard(card) {
  const path = card.dataset.path;
  const t = card.dataset.t;

  // For images: open lightbox instead of inline expansion.
  if (t === 'image') { openLightbox(path); return; }

  // For PDFs: open in new tab.
  if (t === 'doc' && extOf(path) === 'pdf') {
    window.open(urlEnc(path), '_blank', 'noopener');
    return;
  }

  // For archives + non-pdf docs: trigger download.
  if (t === 'archive' || (t === 'doc' && extOf(path) !== 'md' && extOf(path) !== 'pdf')) {
    const a = document.createElement('a');
    a.href = urlEnc(path); a.download = basenameOf(path);
    document.body.appendChild(a); a.click(); a.remove();
    return;
  }

  if (card.classList.contains('open')) {
    closeCard(card); return;
  }
  // Close any other open card to preserve focus context (one player at a time).
  document.querySelectorAll('.card.open').forEach(c => { if (c !== card) closeCard(c); });

  card.classList.add('open');
  const prev = card.querySelector('.preview');
  const url = urlEnc(path);

  if (t === 'audio') {
    prev.innerHTML = `<audio controls preload="metadata" src="${url}"></audio>
      <div class="path">${escapeHtml(path)}</div>
      <div class="actions">
        <a class="act" href="${url}" download>⬇ Download</a>
        <button class="act" data-close>close</button>
      </div>`;
  } else if (t === 'video') {
    prev.innerHTML = `<video controls preload="metadata" src="${url}" playsinline></video>
      <div class="path">${escapeHtml(path)}</div>
      <div class="actions">
        <a class="act" href="${url}" download>⬇ Download</a>
        <button class="act" data-close>close</button>
      </div>`;
  } else if (extOf(path) === 'md') {
    prev.innerHTML = `<div class="actions">
        <a class="act" href="${url}" target="_blank" rel="noopener">↗ Open</a>
        <button class="act" data-close>close</button>
      </div>
      <div class="path">${escapeHtml(path)}</div>`;
  }

  prev.querySelectorAll('[data-close]').forEach(b =>
    b.addEventListener('click', e => { e.stopPropagation(); closeCard(card); })
  );

  // Auto-pause other media when one starts
  prev.querySelectorAll('audio, video').forEach(m => {
    m.addEventListener('play', () => {
      document.querySelectorAll('audio, video').forEach(other => {
        if (other !== m) try { other.pause(); } catch(e){}
      });
    });
  });
}

function closeCard(card) {
  const prev = card.querySelector('.preview');
  prev.querySelectorAll('audio, video').forEach(m => { try { m.pause(); } catch(e){} });
  prev.innerHTML = '';
  card.classList.remove('open');
}

// ============== Lightbox ==============
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
function openLightbox(path) {
  lbImg.src = urlEnc(path);
  lbImg.alt = basenameOf(path);
  lb.classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('on');
  lbImg.removeAttribute('src');
  document.body.style.overflow = '';
}
document.getElementById('lbClose').addEventListener('click', closeLightbox);
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
window.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ============== Top button ==============
const totop = document.getElementById('totop');
window.addEventListener('scroll', () => {
  totop.classList.toggle('on', window.scrollY > 600);
}, { passive: true });
totop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ============== Menu ==============
const menuBtn = document.getElementById('menuBtn');
const menuPanel = document.getElementById('menuPanel');
function setMenu(open) {
  menuPanel.classList.toggle('on', open);
  menuBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
}
menuBtn.addEventListener('click', e => {
  e.stopPropagation();
  setMenu(!menuPanel.classList.contains('on'));
});
document.addEventListener('click', e => {
  if (!menuPanel.contains(e.target) && !menuBtn.contains(e.target)) setMenu(false);
});
window.addEventListener('keydown', e => { if (e.key === 'Escape') setMenu(false); });
document.getElementById('expandAll').addEventListener('click', () => {
  state.collapsed.clear();
  render();
  setMenu(false);
});
document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.group').forEach(g => {
    if (g.dataset.key) state.collapsed.add(g.dataset.key);
  });
  render();
  setMenu(false);
});

// ============== Boot ==============
setStats();
render();
</script>
</body>
</html>
