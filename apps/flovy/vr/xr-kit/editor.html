<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>XR-kit · scene editor</title>
  <!--
    SCENE EDITOR v2 — insert kit snippets as interactive elements, then
    select / drag (three.js) / transform / duplicate / export. Autosaves to
    localStorage. Built on A-Frame. Serve over http://localhost.
      Edit mode → mouse selects & drags (look-controls off)
      Play mode → mouse looks & fires each object's action
      Keys      → Del delete · Ctrl+D duplicate · arrows nudge · Ctrl+S export
      Ctrl+Alt+I → full A-Frame Inspector
  -->
  <script src="./lib/aframe.min.js"></script>
  <script src="./lib/troika-text.js"></script>
  <script src="./lib/aframe-layout.min.js"></script>
  <script src="./lib/aframe-environment.min.js"></script>
  <style>
    :root{ --a:#8d89ff; --ink:#eef }
    *{ box-sizing:border-box } body{ margin:0; font-family:system-ui,sans-serif; color:var(--ink); background:#0b0b12 }
    .col{ position:fixed; top:0; bottom:0; z-index:10; width:212px; background:rgba(20,18,28,.93);
      backdrop-filter:blur(8px); padding:9px; overflow:auto; display:flex; flex-direction:column; gap:6px }
    #palette{ left:0; border-right:1px solid #2a2740 }
    #props{ right:0; border-left:1px solid #2a2740 }
    h2{ margin:4px 0 2px; font-size:11px; letter-spacing:.5px; color:#bdb8ff; text-transform:uppercase }
    .b{ cursor:pointer; border:1px solid #322f4a; background:#241f33; color:var(--ink); border-radius:8px;
      padding:6px 8px; font-size:12px; text-align:left; transition:.12s }
    .b:hover{ border-color:var(--a); transform:translateX(2px) }
    .b.prim{ background:var(--a); border-color:var(--a); color:#0b0b14; font-weight:700; text-align:center }
    .b.go{ background:#16323a; border-color:#2fae9a; color:#7ff0d8; text-align:center; font-weight:700 }
    .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:5px }
    .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px }
    .row{ display:flex; gap:5px; align-items:center }
    .row > label{ font-size:11px; color:#9b96c0; width:13px; text-align:right }
    input,select{ width:100%; background:#0f0c18; border:1px solid #322f4a; color:#fff; border-radius:6px; padding:4px 6px; font:inherit; font-size:12px }
    input[type=color]{ padding:1px; height:26px }
    input[type=checkbox]{ width:auto }
    .muted{ font-size:10px; color:#8884a8; line-height:1.4 }
    .sep{ height:1px; background:#2a2740; margin:2px 0 }
    #outliner{ display:flex; flex-direction:column; gap:3px; max-height:30vh; overflow:auto }
    .oitem{ font-size:11px; padding:3px 6px; border-radius:6px; background:#1b1727; cursor:pointer; color:#cfc9ee;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
    .oitem:hover{ background:#2a2440 } .oitem.on{ background:var(--a); color:#0b0b14; font-weight:700 }
    #props .empty{ color:#8884a8; font-size:12px }
    #hint{ position:fixed; left:50%; bottom:10px; transform:translateX(-50%); z-index:9; font-size:11px;
      color:#cfc9ff; background:rgba(20,18,28,.7); border:1px solid #322f4a; border-radius:999px; padding:5px 12px }
  </style>
</head>
<body>
  <!-- ░░ PALETTE ░░ -->
  <aside id="palette" class="col">
    <h2>Insert</h2>
    <div class="grid2">
      <button class="b" data-add="text">＋ Text</button>
      <button class="b" data-add="button">＋ Button</button>
      <button class="b" data-add="panel">＋ Panel</button>
      <button class="b" data-add="box">＋ Box</button>
      <button class="b" data-add="sphere">＋ Sphere</button>
      <button class="b" data-add="ring">＋ Ring</button>
      <button class="b" data-add="light">＋ Light</button>
      <button class="b" data-add="ground">＋ Ground</button>
      <button class="b" data-add="link">＋ Link</button>
      <button class="b" data-add="cylinder">＋ Cylinder</button>
      <button class="b" data-add="cone">＋ Cone</button>
      <button class="b" data-add="torus">＋ Torus</button>
      <button class="b" data-add="image">＋ Image</button>
      <button class="b" data-add="model">＋ Model</button>
      <button class="b" data-add="sky">＋ Sky</button>
      <button class="b" data-add="circle">＋ Circle</button>
      <button class="b" data-add="ringflat">＋ Ring2</button>
      <button class="b" data-add="knot">＋ Knot</button>
      <button class="b" data-add="dodeca">＋ Dodeca</button>
      <button class="b" data-add="octa">＋ Octa</button>
      <button class="b" data-add="icosa">＋ Icosa</button>
      <button class="b" data-add="card">＋ Card</button>
    </div>
    <div class="muted">tip: drag a button onto the scene to drop it there</div>
    <div class="sep"></div>
    <h2>Scenery</h2>
    <select id="preset">
      <option value="">— none —</option>
      <option>dream</option><option>forest</option><option>japan</option>
      <option>tron</option><option>arches</option><option>starry</option>
      <option>egypt</option><option>goldmine</option><option>volcano</option>
    </select>
    <label class="row" style="margin-top:4px"><input type="checkbox" id="snap"> <span class="muted">snap to grid (0.25)</span></label>
    <div class="sep"></div>
    <h2>Scene</h2>
    <div id="outliner"></div>
    <div class="sep"></div>
    <button class="b go" id="mode">Edit ▸ Play</button>
    <div class="grid2">
      <button class="b prim" id="export-html">⬇ HTML</button>
      <button class="b" id="export-json">⬇ JSON</button>
      <button class="b" id="import-json">⤴ Import</button>
      <button class="b" id="clear">✕ Clear</button>
    </div>
    <input type="file" id="file" accept="application/json" style="display:none">
    <div class="muted">Del·Ctrl+D·arrows · Ctrl+Alt+I Inspector</div>
  </aside>

  <!-- ░░ PROPERTIES ░░ -->
  <aside id="props" class="col">
    <h2>Properties</h2>
    <div id="props-body"><div class="empty">Select an element…</div></div>
  </aside>

  <div id="hint">Edit · click to select · drag to move · arrows nudge</div>

  <!-- ░░ SCENE ░░ -->
  <a-scene editor="" inspector="url: ./lib/aframe-inspector.min.js"
           cursor="rayOrigin: mouse" raycaster="objects: .obj; far: 80"
           background="color:#0b0b12">
    <a-entity id="env"></a-entity>
    <a-light type="ambient" color="#888"></a-light>
    <a-light type="point" intensity="0.7" position="2 4 1"></a-light>
    <a-entity id="stage"></a-entity>
    <a-box id="selbox" visible="false" material="wireframe:true; color:#8d89ff; shader:flat"></a-box>
    <a-entity id="rig" position="0 0 0">
      <a-camera look-controls="mouseEnabled: false" wasd-controls="acceleration: 28">
        <a-cursor raycaster="objects: .obj" fuse="false" color="#8d89ff" material="shader: flat"></a-cursor>
      </a-camera>
      <a-entity laser-controls="hand: right" raycaster="objects: .obj; far: 80" line="color:#8d89ff"></a-entity>
    </a-entity>
  </a-scene>

  <script>
  const FONT='./fonts/Inter.ttf', LS='xrkit-editor-scene';
  let N=0; const uid=()=> 'obj-'+(++N);
  const $=id=>document.getElementById(id);
  const T=()=>AFRAME.THREE;

  /* ── snippet factories ── */
  const FACTORY={
    text(){ const e=document.createElement('a-troika-text'); e.setAttribute('value','Text'); e.setAttribute('font',FONT);
      e.setAttribute('font-size','0.16'); e.setAttribute('color','#ffffff'); e.setAttribute('anchor','center'); e.setAttribute('align','center'); return e; },
    button(){ const e=document.createElement('a-entity'); e.dataset.act='action';
      const s=document.createElement('a-sphere'); s.setAttribute('radius','0.16'); s.setAttribute('material','emissive:#8d89ff; emissiveIntensity:.7; color:#8d89ff');
      const t=document.createElement('a-troika-text'); t.setAttribute('value','Button'); t.setAttribute('font',FONT); t.setAttribute('font-size','0.1');
      t.setAttribute('anchor','center'); t.setAttribute('align','center'); t.setAttribute('position','0 -0.3 0'); e.appendChild(s); e.appendChild(t); return e; },
    panel(){ const e=document.createElement('a-plane'); e.setAttribute('width','1.2'); e.setAttribute('height','0.8'); e.setAttribute('material','color:#1c1430; side:double'); return e; },
    box(){ const e=document.createElement('a-box'); e.setAttribute('depth','0.4'); e.setAttribute('height','0.4'); e.setAttribute('width','0.4'); e.setAttribute('material','color:#70f0d3'); return e; },
    sphere(){ const e=document.createElement('a-sphere'); e.setAttribute('radius','0.25'); e.setAttribute('material','color:#ff5d7a'); return e; },
    ring(){ const e=document.createElement('a-entity'); e.setAttribute('layout','type: circle; radius: 1.0');
      ['#8d89ff','#70f0d3','#ff5d7a','#ffd76a','#9fd8ff'].forEach(c=>{ const s=document.createElement('a-sphere'); s.setAttribute('radius','0.12'); s.setAttribute('material','emissive:'+c+'; emissiveIntensity:.7; color:'+c); e.appendChild(s); }); return e; },
    light(){ const e=document.createElement('a-entity'); e.setAttribute('light','type: point; intensity: 0.9; distance: 12');
      const s=document.createElement('a-sphere'); s.setAttribute('radius','0.1'); s.setAttribute('material','emissive:#ffd76a; emissiveIntensity:1; color:#ffd76a'); e.appendChild(s); return e; },
    ground(){ const e=document.createElement('a-plane'); e.setAttribute('rotation','-90 0 0'); e.setAttribute('width','20'); e.setAttribute('height','20');
      e.setAttribute('material','color:#16121f; side:double'); e.setAttribute('position','0 0 0'); return e; },
    link(){ const e=document.createElement('a-troika-text'); e.dataset.act='link'; e.dataset.href='https://flove.org';
      e.setAttribute('value','flove.org ↗'); e.setAttribute('font',FONT); e.setAttribute('font-size','0.14'); e.setAttribute('color','#7ff0d8'); e.setAttribute('anchor','center'); return e; },
    cylinder(){ const e=document.createElement('a-cylinder'); e.setAttribute('radius','0.25'); e.setAttribute('height','0.6'); e.setAttribute('material','color:#8d89ff'); return e; },
    cone(){ const e=document.createElement('a-cone'); e.setAttribute('radius-bottom','0.3'); e.setAttribute('radius-top','0'); e.setAttribute('height','0.6'); e.setAttribute('material','color:#ffd76a'); return e; },
    torus(){ const e=document.createElement('a-torus'); e.setAttribute('radius','0.3'); e.setAttribute('radius-tubular','0.05'); e.setAttribute('material','color:#70f0d3'); return e; },
    image(){ const e=document.createElement('a-image'); e.dataset.src=''; e.setAttribute('width','1.2'); e.setAttribute('height','0.8'); e.setAttribute('material','color:#888; side:double; shader:flat'); return e; },
    model(){ const e=document.createElement('a-entity'); e.dataset.src=''; const ph=document.createElement('a-box'); ph.classList.add('ph');
      ph.setAttribute('depth','0.4'); ph.setAttribute('height','0.4'); ph.setAttribute('width','0.4'); ph.setAttribute('material','color:#555; wireframe:true'); e.appendChild(ph); return e; },
    sky(){ const e=document.createElement('a-sky'); e.setAttribute('color','#1a1026'); return e; },
    circle(){ const e=document.createElement('a-circle'); e.setAttribute('radius','0.4'); e.setAttribute('material','color:#8d89ff; side:double'); return e; },
    ringflat(){ const e=document.createElement('a-ring'); e.setAttribute('radius-inner','0.2'); e.setAttribute('radius-outer','0.4'); e.setAttribute('material','color:#70f0d3; side:double'); return e; },
    knot(){ const e=document.createElement('a-torus-knot'); e.setAttribute('radius','0.25'); e.setAttribute('radius-tubular','0.04'); e.setAttribute('material','color:#ff5d7a'); return e; },
    dodeca(){ const e=document.createElement('a-dodecahedron'); e.setAttribute('radius','0.3'); e.setAttribute('material','color:#ffd76a'); return e; },
    octa(){ const e=document.createElement('a-octahedron'); e.setAttribute('radius','0.3'); e.setAttribute('material','color:#9fd8ff'); return e; },
    icosa(){ const e=document.createElement('a-icosahedron'); e.setAttribute('radius','0.3'); e.setAttribute('material','color:#c9a06b'); return e; },
    card(){ const e=document.createElement('a-entity');
      const p=document.createElement('a-plane'); p.setAttribute('width','1.3'); p.setAttribute('height','0.8'); p.setAttribute('material','color:#14121c; side:double');
      const t=document.createElement('a-troika-text'); t.setAttribute('value','Card'); t.setAttribute('font',FONT); t.setAttribute('font-size','0.1'); t.setAttribute('color','#fff'); t.setAttribute('anchor','center'); t.setAttribute('align','center'); t.setAttribute('max-width','1.1'); t.setAttribute('position','0 0 0.02');
      e.appendChild(p); e.appendChild(t); return e; }
  };

  /* ── editor component ── */
  AFRAME.registerComponent('editor',{
    init(){
      this.sel=null; this.mode='edit'; this.snap=false;
      this.ray=new (T().Raycaster)(); this.plane=new (T().Plane)(); this.hit=new (T().Vector3)(); this.offset=new (T().Vector3)(); this.dragging=false; this.moved=false;
      this.selbox=$('selbox');
      this.el.addEventListener('click', e=>{
        const obj=this.pick(e.target);
        if(this.mode==='play'){ if(obj) this.fire(obj); return; }
        this.select(obj);
      });
      const canvas=this.el.canvas||this.el.renderer.domElement;
      canvas.addEventListener('mousedown', ev=>this.onDown(ev));
      window.addEventListener('mousemove', ev=>this.onMove(ev));
      window.addEventListener('mouseup', ()=>{ if(this.dragging&&this.moved) saveLocal(); this.dragging=false; this.moved=false; });
      loadLocal();                    // restore previous session
      rebuildOutliner();
      setTimeout(()=>snapshot(), 120);   // seed undo with the loaded state
    },
    pick(t){ return (t.closest&&t.closest('.obj')) || (t.classList&&t.classList.contains('obj')?t:null); },
    ndc(ev){ const r=(this.el.canvas||this.el.renderer.domElement).getBoundingClientRect();
      return {x:((ev.clientX-r.left)/r.width)*2-1, y:-((ev.clientY-r.top)/r.height)*2+1}; },
    onDown(ev){ if(this.mode!=='edit'||!this.sel) return;
      const cam=this.el.camera, n=this.ndc(ev); this.ray.setFromCamera(n,cam);
      if(!this.ray.intersectObject(this.sel.object3D,true).length) return; ev.preventDefault();
      const camDir=new (T().Vector3)(); cam.getWorldDirection(camDir);
      const op=new (T().Vector3)(); this.sel.object3D.getWorldPosition(op);
      this.plane.setFromNormalAndCoplanarPoint(camDir,op); this.ray.ray.intersectPlane(this.plane,this.hit);
      this.offset.copy(op).sub(this.hit); this.dragging=true; this.moved=false; },
    onMove(ev){ if(!this.dragging||!this.sel) return;
      this.ray.setFromCamera(this.ndc(ev),this.el.camera);
      if(this.ray.ray.intersectPlane(this.plane,this.hit)){
        const p=this.hit.clone().add(this.offset); this.sel.object3D.parent.worldToLocal(p);
        let x=p.x,y=p.y,z=p.z; if(this.snap){ const q=v=>Math.round(v/0.25)*0.25; x=q(x);y=q(y);z=q(z); }
        this.sel.setAttribute('position',`${x.toFixed(3)} ${y.toFixed(3)} ${z.toFixed(3)}`); this.moved=true; this.syncBox(); refreshProps();
      } },
    select(el){ this.sel=el; if(!el){ this.selbox.setAttribute('visible',false); renderProps(null); markOutliner(); return; } this.syncBox(); renderProps(el); markOutliner(); },
    syncBox(){ if(!this.sel) return; const box=new (T().Box3)().setFromObject(this.sel.object3D);
      if(box.isEmpty()){ this.selbox.setAttribute('visible',false); return; }
      const s=new (T().Vector3)(),c=new (T().Vector3)(); box.getSize(s); box.getCenter(c);
      this.selbox.setAttribute('visible',true); this.selbox.object3D.position.copy(c);
      this.selbox.object3D.scale.set(Math.max(s.x,.12),Math.max(s.y,.12),Math.max(s.z,.12)); },
    fire(obj){ obj.setAttribute('animation__f','property: scale; from: 1.25 1.25 1.25; to: 1 1 1; dur: 350');
      if(obj.dataset.act==='link'&&obj.dataset.href) window.open(obj.dataset.href,'_blank'); },
    setMode(m){ this.mode=m; document.querySelector('a-camera').setAttribute('look-controls','mouseEnabled',m==='play');
      $('hint').textContent = m==='edit'?'Edit · click select · drag move · arrows nudge':'Play · mouse looks · click fires';
      if(m==='play') this.select(null); }
  });

  /* ── insert / duplicate ── */
  const stage=()=>$('stage'); const ed=()=>document.querySelector('a-scene').components.editor;
  function place(e){ const cam=document.querySelector('a-camera').object3D;
    const dir=new (T().Vector3)(); cam.getWorldDirection(dir); const pos=new (T().Vector3)(); cam.getWorldPosition(pos);
    pos.add(dir.multiplyScalar(2.2)); e.setAttribute('position',`${pos.x.toFixed(2)} ${Math.max(pos.y,0.6).toFixed(2)} ${pos.z.toFixed(2)}`); }
  function add(type){ const e=FACTORY[type](); if(!e) return; e.classList.add('obj'); e.id=uid(); e.dataset.type=type;
    if(type!=='ground') place(e); stage().appendChild(e);
    e.addEventListener('loaded',()=>setTimeout(()=>{ed().select(e); rebuildOutliner(); saveLocal();},30),{once:true}); }
  function duplicate(){ const s=ed().sel; if(!s) return; const c=s.cloneNode(true); c.id=uid();
    const p=s.getAttribute('position'); c.setAttribute('position',`${p.x+0.3} ${p.y} ${p.z}`); stage().appendChild(c);
    c.addEventListener('loaded',()=>setTimeout(()=>{ed().select(c); rebuildOutliner(); saveLocal();},30),{once:true}); }
  document.querySelectorAll('#palette [data-add]').forEach(b=>{
    b.addEventListener('click',()=>add(b.dataset.add));      // click = insert in front
    b.setAttribute('draggable','true');                      // drag = drop in place
    b.addEventListener('dragstart', ev=> ev.dataTransfer.setData('text/plain', b.dataset.add));
  });
  // drop a snippet onto the 3D view → place it where you dropped (3 m down the ray)
  function placeAt(type, clientX, clientY){
    const e=FACTORY[type](); if(!e) return; e.classList.add('obj'); e.id=uid(); e.dataset.type=type;
    const sc=document.querySelector('a-scene'), cam=sc.camera;
    const r=(sc.canvas||sc.renderer.domElement).getBoundingClientRect();
    const ndc={x:((clientX-r.left)/r.width)*2-1, y:-((clientY-r.top)/r.height)*2+1};
    const ray=new (T().Raycaster)(); ray.setFromCamera(ndc, cam);
    const pt=new (T().Vector3)(); ray.ray.at(3, pt);
    stage().appendChild(e);
    e.addEventListener('loaded',()=>setTimeout(()=>{ const p=pt.clone(); if(e.object3D.parent) e.object3D.parent.worldToLocal(p);
      e.setAttribute('position',`${p.x.toFixed(2)} ${p.y.toFixed(2)} ${p.z.toFixed(2)}`); ed().select(e); rebuildOutliner(); saveLocal(); },30),{once:true});
  }
  (function wireDrop(){
    const sc=document.querySelector('a-scene');
    const attach=()=>{ const canvas=sc.canvas||sc.renderer.domElement; if(!canvas) return setTimeout(attach,200);
      canvas.addEventListener('dragover', ev=>ev.preventDefault());
      canvas.addEventListener('drop', ev=>{ ev.preventDefault(); const t=ev.dataTransfer.getData('text/plain'); if(FACTORY[t]) placeAt(t, ev.clientX, ev.clientY); }); };
    if(sc.hasLoaded) attach(); else sc.addEventListener('loaded', attach);
  })();

  /* ── properties ── */
  const PB=()=>$('props-body');
  function row(lab,inp){ const d=document.createElement('div'); d.className='row'; const l=document.createElement('label'); l.textContent=lab; d.appendChild(l); d.appendChild(inp); return d; }
  function num(val,on){ const i=document.createElement('input'); i.type='number'; i.step='0.1'; i.value=(+val).toFixed(2); i.addEventListener('input',()=>on(parseFloat(i.value)||0)); return i; }
  function vec3(host,label,getter,setter){ const v=getter(); const wrap=document.createElement('div'); wrap.className='grid3';
    ['x','y','z'].forEach(ax=> wrap.appendChild(num(v[ax],val=>{ const cur=getter(); cur[ax]=val; setter(cur); }))); host.appendChild(document.createElement('div')).textContent='';
    const h=document.createElement('div'); h.className='muted'; h.textContent=label; host.appendChild(h); host.appendChild(wrap); }
  function renderProps(el){ const host=PB(); host.innerHTML=''; if(!el){ host.innerHTML='<div class="empty">Select an element…</div>'; return; }
    const idr=document.createElement('input'); idr.value=el.id; idr.addEventListener('change',()=>{ el.id=idr.value||el.id; rebuildOutliner(); saveLocal(); }); host.appendChild(row('id',idr));
    vec3(host,'position',()=>({...el.getAttribute('position')}),v=>{ el.setAttribute('position',`${v.x} ${v.y} ${v.z}`); ed().syncBox(); saveLocal(); });
    vec3(host,'rotation',()=>({...el.getAttribute('rotation')}),v=>{ el.setAttribute('rotation',`${v.x} ${v.y} ${v.z}`); ed().syncBox(); saveLocal(); });
    const sc=el.getAttribute('scale'); const si=num(sc.x,val=>{ const s=Math.max(val,0.05); el.setAttribute('scale',`${s} ${s} ${s}`); ed().syncBox(); saveLocal(); }); host.appendChild(row('⤢',si));
    if(el.tagName.toLowerCase()==='a-troika-text'){ const t=document.createElement('input'); t.value=el.getAttribute('value')||''; t.addEventListener('input',()=>{ el.setAttribute('troika-text','value',t.value); saveLocal(); }); host.appendChild(row('T',t)); }
    if(el.dataset.act==='link'){ const h=document.createElement('input'); h.value=el.dataset.href||''; h.addEventListener('input',()=>{ el.dataset.href=h.value; saveLocal(); }); host.appendChild(row('↗',h)); }
    const mat=el.getAttribute('material'); if(mat&&mat.color){ const c=document.createElement('input'); c.type='color'; c.value=toHex(mat.color); c.addEventListener('input',()=>{ el.setAttribute('material','color',c.value); saveLocal(); }); host.appendChild(row('●',c)); }
    if(el.dataset.type==='button'){ const a=document.createElement('input'); a.value=el.dataset.act||'action'; a.addEventListener('input',()=>{ el.dataset.act=a.value; saveLocal(); }); host.appendChild(row('▶',a)); }
    if(mat){ const op=document.createElement('input'); op.type='number'; op.step='0.1'; op.min='0'; op.max='1'; op.value=(mat.opacity!=null?mat.opacity:1);
      op.addEventListener('input',()=>{ const v=Math.max(0,Math.min(1,parseFloat(op.value)||1)); el.setAttribute('material','opacity',v); el.setAttribute('material','transparent',v<1); saveLocal(); }); host.appendChild(row('◴',op));
      const wf=document.createElement('input'); wf.type='checkbox'; wf.checked=!!mat.wireframe; wf.addEventListener('change',()=>{ el.setAttribute('material','wireframe',wf.checked); saveLocal(); }); host.appendChild(row('▦',wf)); }
    if(el.dataset.type==='light'){ const lo=el.getAttribute('light');
      const li=document.createElement('input'); li.type='number'; li.step='0.1'; li.value=lo.intensity; li.addEventListener('input',()=>{ el.setAttribute('light','intensity',parseFloat(li.value)||0); saveLocal(); }); host.appendChild(row('☀',li));
      const lc=document.createElement('input'); lc.type='color'; lc.value=toHex(lo.color); lc.addEventListener('input',()=>{ el.setAttribute('light','color',lc.value); saveLocal(); }); host.appendChild(row('●',lc)); }
    if(el.dataset.type==='image'||el.dataset.type==='model'){ const sc=document.createElement('input'); sc.placeholder='URL (.glb / image)'; sc.value=el.dataset.src||'';
      sc.addEventListener('change',()=>{ el.dataset.src=sc.value; if(el.dataset.type==='image') el.setAttribute('src',sc.value); else { const ph=el.querySelector('.ph'); if(ph) ph.remove(); el.setAttribute('gltf-model',sc.value); } saveLocal(); }); host.appendChild(row('⛶',sc)); }
    { const lab=document.createElement('div'); lab.className='muted'; lab.textContent='animation'; host.appendChild(lab);
      const ANIM={
        spin:'property: rotation; to: 0 360 0; dur: 6000; loop: true; easing: linear',
        pulse:'property: scale; to: 1.25 1.25 1.25; dir: alternate; dur: 900; loop: true; easing: easeInOutSine',
        sway:'property: rotation; from: -8 0 0; to: 8 0 0; dir: alternate; dur: 2200; loop: true; easing: easeInOutSine',
        wobble:'property: rotation; to: 0 0 360; dur: 4000; loop: true; easing: linear',
        float:()=>{ const p=el.getAttribute('position'); return `property: position; to: ${p.x} ${(p.y+0.2).toFixed(2)} ${p.z}; dir: alternate; dur: 1600; loop: true; easing: easeInOutSine`; },
        fade:'property: material.opacity; from: 1; to: 0.25; dir: alternate; dur: 1400; loop: true',
        color:'property: material.color; from: #8d89ff; to: #ff5d7a; dir: alternate; dur: 2200; loop: true'
      };
      const ar=document.createElement('div'); ar.className='grid3';
      Object.keys(ANIM).forEach(name=>{ const key='animation__'+name;
        const b=document.createElement('button'); b.className='b'+(el.getAttribute(key)?' prim':''); b.textContent=name;
        b.onclick=()=>{ if(el.getAttribute(key)){ el.removeAttribute(key); b.classList.remove('prim'); }
          else { if(name==='fade') el.setAttribute('material','transparent',true); el.setAttribute(key, typeof ANIM[name]==='function'?ANIM[name]():ANIM[name]); b.classList.add('prim'); } };
        ar.appendChild(b); });
      host.appendChild(ar);
      const lab2=document.createElement('div'); lab2.className='muted'; lab2.textContent='effects'; host.appendChild(lab2);
      const ef=document.createElement('div'); ef.className='grid2';
      const lit=mat&&mat.emissive&&toHex(mat.emissive)!=='#000000'&&mat.emissiveIntensity>0;
      const glow=document.createElement('button'); glow.className='b'+(lit?' prim':''); glow.textContent='✦ Glow';
      glow.onclick=()=>{ const m=el.getAttribute('material'); const on=m&&m.emissive&&toHex(m.emissive)!=='#000000'&&m.emissiveIntensity>0;
        if(on){ el.setAttribute('material','emissiveIntensity',0); } else { el.setAttribute('material','emissive',(m&&m.color)?toHex(m.color):'#8d89ff'); el.setAttribute('material','emissiveIntensity',0.75); } glow.classList.toggle('prim'); saveLocal(); };
      const sh=document.createElement('button'); sh.className='b'+(el.getAttribute('shadow')?' prim':''); sh.textContent='◗ Shadow';
      sh.onclick=()=>{ if(el.getAttribute('shadow')) el.removeAttribute('shadow'); else el.setAttribute('shadow','cast: true; receive: true'); sh.classList.toggle('prim'); saveLocal(); };
      ef.appendChild(glow); ef.appendChild(sh); host.appendChild(ef); }
    host.appendChild(document.createElement('div')).className='sep';
    const g=document.createElement('div'); g.className='grid2';
    const dup=document.createElement('button'); dup.className='b'; dup.textContent='⧉ Dup'; dup.onclick=duplicate;
    const del=document.createElement('button'); del.className='b'; del.style.borderColor='#a33'; del.textContent='✕ Del'; del.onclick=()=>removeSel();
    g.appendChild(dup); g.appendChild(del); host.appendChild(g);
  }
  function refreshProps(){ const e=ed().sel; if(e) renderProps(e); }
  function removeSel(){ const s=ed().sel; if(!s) return; s.remove(); ed().select(null); rebuildOutliner(); saveLocal(); }
  function toHex(c){ if(typeof c==='string') return c; const h=x=>('0'+Math.round((x||0)*255).toString(16)).slice(-2); return '#'+h(c.r)+h(c.g)+h(c.b); }

  /* ── outliner ── */
  function rebuildOutliner(){ const o=$('outliner'); o.innerHTML=''; stage().childNodes.forEach(n=>{ if(n.nodeType!==1) return;
    const d=document.createElement('div'); d.className='oitem'+(ed()&&ed().sel===n?' on':''); d.textContent=(n.dataset.type||n.tagName.toLowerCase())+' · '+n.id;
    d.onclick=()=>ed().select(n); o.appendChild(d); }); }
  function markOutliner(){ const sel=ed().sel; [...$('outliner').children].forEach(d=>d.classList.remove('on'));
    if(sel){ [...$('outliner').children].forEach(d=>{ if(d.textContent.endsWith('· '+sel.id)) d.classList.add('on'); }); } }

  /* ── persistence (localStorage + JSON import/export) ── */
  function serialize(){ const items=[]; stage().childNodes.forEach(n=>{ if(n.nodeType!==1) return; const mat=n.getAttribute('material');
    items.push({ type:n.dataset.type, id:n.id, position:n.getAttribute('position'), rotation:n.getAttribute('rotation'),
      scale:n.getAttribute('scale'), value:n.getAttribute('value')||undefined, act:n.dataset.act||undefined,
      href:n.dataset.href||undefined, color:(mat&&mat.color)?toHex(mat.color):undefined }); });
    return { app:'xr-kit-editor', preset:$('preset').value||undefined, items }; }
  function build(items){ stage().innerHTML='';
    items.forEach(it=>{ const f=FACTORY[it.type]; if(!f) return; const e=f(); e.classList.add('obj'); e.id=it.id||uid(); e.dataset.type=it.type;
      const N0=parseInt((it.id||'').split('-')[1]); if(N0>N) N=N0;
      const ap=(c,v)=>e.setAttribute(c,`${v.x} ${v.y} ${v.z}`); if(it.position) ap('position',it.position); if(it.rotation) ap('rotation',it.rotation); if(it.scale) ap('scale',it.scale);
      if(it.value) e.setAttribute('value',it.value); if(it.act) e.dataset.act=it.act; if(it.href) e.dataset.href=it.href;
      if(it.color){ const m=e.getAttribute('material'); if(m) e.setAttribute('material','color',it.color); }
      stage().appendChild(e); });
    setTimeout(()=>rebuildOutliner(),50); }
  let UNDO=[];
  function snapshot(){ try{ const s=JSON.stringify(serialize()); if(UNDO[UNDO.length-1]!==s){ UNDO.push(s); if(UNDO.length>60) UNDO.shift(); } }catch(_){} }
  function undo(){ if(UNDO.length<2) return; UNDO.pop(); const prev=JSON.parse(UNDO[UNDO.length-1]); build(prev.items||[]);
    if(prev.preset){ $('preset').value=prev.preset; $('env').setAttribute('environment','preset: '+prev.preset); } else { $('preset').value=''; $('env').removeAttribute('environment'); }
    try{ localStorage.setItem(LS, UNDO[UNDO.length-1]); }catch(_){} setTimeout(()=>{ ed().select(null); rebuildOutliner(); },60); }
  function saveLocal(){ try{ localStorage.setItem(LS, JSON.stringify(serialize())); }catch(_){} snapshot(); }
  function loadLocal(){ try{ const d=JSON.parse(localStorage.getItem(LS)||'null'); if(d&&d.items){ build(d.items); if(d.preset){ $('preset').value=d.preset; $('env').setAttribute('environment','preset: '+d.preset); } } }catch(_){} }

  function download(name,text,type){ const b=new Blob([text],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; document.body.appendChild(a); a.click(); a.remove(); }
  function cleanClone(el){ const c=el.cloneNode(true); c.removeAttribute('class'); c.removeAttribute('data-type'); c.querySelectorAll('[class]').forEach(x=>x.removeAttribute('class')); return c; }
  $('export-html').addEventListener('click',()=>{ let body=''; stage().childNodes.forEach(n=>{ if(n.nodeType===1) body+='    '+cleanClone(n).outerHTML+'\n'; });
    const env=$('preset').value?`<a-entity environment="preset: ${$('preset').value}"></a-entity>\n    `:'';
    download('scene.html',
`<!doctype html><html><head><meta charset="utf-8">
<script src="./lib/aframe.min.js"><\/script>
<script src="./lib/troika-text.js"><\/script>
<script src="./lib/aframe-layout.min.js"><\/script>
<script src="./lib/aframe-environment.min.js"><\/script>
</head><body>
  <a-scene background="color:#0b0b12">
    ${env}<a-light type="ambient" color="#888"></a-light>
    <a-entity id="stage">
${body}    </a-entity>
    <a-entity><a-camera><a-cursor raycaster="objects: .obj"></a-cursor></a-camera></a-entity>
  </a-scene>
</body></html>`,'text/html'); });
  $('export-json').addEventListener('click',()=> download('scene.json', JSON.stringify(serialize(),null,2),'application/json'));
  $('import-json').addEventListener('click',()=>$('file').click());
  $('file').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d.items){ build(d.items); if(d.preset){$('preset').value=d.preset; $('env').setAttribute('environment','preset: '+d.preset);} saveLocal(); } }catch(err){ alert('bad JSON'); } }; r.readAsText(f); });

  /* ── scenery / mode / clear / keys ── */
  $('preset').addEventListener('change',e=>{ const v=e.target.value; const env=$('env'); if(v) env.setAttribute('environment','preset: '+v); else env.removeAttribute('environment'); saveLocal(); });
  $('snap').addEventListener('change',e=>ed().snap=e.target.checked);
  $('mode').addEventListener('click',e=>{ const next=ed().mode==='edit'?'play':'edit'; ed().setMode(next); e.target.textContent=next==='edit'?'Edit ▸ Play':'Play ▸ Edit'; });
  $('clear').addEventListener('click',()=>{ stage().innerHTML=''; ed().select(null); rebuildOutliner(); saveLocal(); });
  window.addEventListener('keydown',e=>{ if(/INPUT|SELECT|TEXTAREA/.test(document.activeElement.tagName)) return;
    if(e.ctrlKey&&e.key.toLowerCase()==='z'){ e.preventDefault(); undo(); return; }
    const s=ed()&&ed().sel;
    if(e.key==='Delete'&&s){ removeSel(); }
    else if(e.ctrlKey&&e.key.toLowerCase()==='d'&&s){ e.preventDefault(); duplicate(); }
    else if(e.ctrlKey&&e.key.toLowerCase()==='s'){ e.preventDefault(); $('export-json').click(); }
    else if(s&&['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){ e.preventDefault(); const p=s.getAttribute('position'); const d=e.shiftKey?0.25:0.1;
      if(e.key==='ArrowLeft')p.x-=d; if(e.key==='ArrowRight')p.x+=d; if(e.key==='ArrowUp')p.y+=d; if(e.key==='ArrowDown')p.y-=d;
      s.setAttribute('position',`${p.x.toFixed(3)} ${p.y.toFixed(3)} ${p.z.toFixed(3)}`); ed().syncBox(); refreshProps(); saveLocal(); }
  });
  </script>
</body>
</html>
