<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XR-kit · htmlmesh panel (real HTML → 3D)</title>
  <!--
    Drops a REAL HTML element into the 3D scene as a textured panel, via
    AdaRoseCannon/aframe-htmlmesh (THREE.HTMLMesh). The clearest path to
    "take my existing 2D interface and put it in VR".

    Dependency (now VENDORED, 100% offline): aframe-html.js imports three's
    HTMLMesh addon. three must match A-Frame's version — A-Frame 1.6.0 uses
    super-three r169, so we vendored super-three@0.169.0 three.module.js +
    HTMLMesh.js into ../lib/three and the importmap below points there.
    (If you upgrade aframe.min.js, re-vendor a matching super-three.)
    Caveat: HTMLMesh renders the DOM as a TEXTURE — good for panels/menus;
    interaction is approximated, not pixel-perfect DOM events.
    Repo: https://github.com/AdaRoseCannon/aframe-htmlmesh
  -->
  <script src="../lib/aframe.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "../lib/three/build/three.module.js",
      "three/addons/": "../lib/three/addons/"
    }
  }
  </script>
  <script type="module" src="../lib/aframe-html.js"></script>
  <style>
    /* the HTML we will project into 3D */
    #panel{ width:360px; padding:18px; border-radius:16px; font-family:system-ui,sans-serif;
      background:#14121c; color:#eef; border:1px solid #8d89ff }
    #panel h2{ margin:.1rem 0 .5rem; color:#cfc9ff }
    #panel button{ font:inherit; padding:8px 12px; border-radius:10px; border:1px solid #8d89ff;
      background:#8d89ff; color:#0b0b14; cursor:pointer }
  </style>
</head>
<body>
  <!-- the source HTML (kept offscreen; projected into 3D by <a-entity html>) -->
  <div id="panel">
    <h2>♥ Flovy panel</h2>
    <p>This is a real HTML element rendered as a 3D panel in VR.</p>
    <button onclick="document.querySelector('#panel p').textContent='clicked in 3D!'">Tap me</button>
  </div>

  <a-scene background="color:#0b0b12">
    <a-light type="ambient" color="#666"></a-light>
    <!-- project #panel onto a plane in the scene -->
    <a-entity html="html: #panel; cursor: #cursor" position="0 1.6 -1.4" scale="1.6 1.6 1.6"></a-entity>

    <a-entity position="0 0 0">
      <a-camera>
        <a-cursor id="cursor" raycaster="objects: [html]" fuse="false"></a-cursor>
      </a-camera>
      <a-entity laser-controls="hand: right" raycaster="objects: [html]"></a-entity>
    </a-entity>
  </a-scene>
</body>
</html>
