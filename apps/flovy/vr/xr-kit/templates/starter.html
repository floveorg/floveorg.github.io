<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>XR-kit · starter (A-Frame + troika)</title>
  <!--
    REUSABLE BASE for turning a 2D idea into a 3D/VR scene.
    Offline-first: A-Frame + troika-text are served locally from ../lib.
    Text uses troika (reads .ttf directly — no MSDF pre-gen, crisp, updatable).
    Input is "scaled": mouse (web) → laser-controls (VR pads) → hand-tracking → gaze.
    Serve over http://localhost (not file://) so WebXR + fonts work.
  -->
  <script src="../lib/aframe.min.js"></script>
  <script src="../lib/troika-text.js"></script>
  <script>
    // hover feedback for any .clickable
    AFRAME.registerComponent('hover-glow', {
      init(){ const e=this.el;
        e.addEventListener('mouseenter',()=>e.setAttribute('animation__h','property: scale; to: 1.14 1.14 1.14; dur: 110'));
        e.addEventListener('mouseleave',()=>e.setAttribute('animation__h','property: scale; to: 1 1 1; dur: 110')); }
    });
    // central click router — read data-act on the clicked entity
    AFRAME.registerComponent('app', {
      init(){
        this.el.addEventListener('click', e=>{
          const t=e.target, act=t.getAttribute&&t.getAttribute('data-act');
          if(act==='demo'){ document.getElementById('title').setAttribute('troika-text','value', 'clicked!'); }
        });
      }
    });
  </script>
</head>
<body>
  <a-scene app="" cursor="rayOrigin: mouse" raycaster="objects: .clickable; far: 30"
           background="color: #0b0b12" fog="type: linear; color: #0b0b12; near: 6; far: 26">

    <a-light type="ambient" color="#445"></a-light>
    <a-light type="point" intensity="1" position="2 4 1" color="#cfc9ff"></a-light>
    <a-circle position="0 0 -3" rotation="-90 0 0" radius="10" material="color:#111119"></a-circle>

    <!-- troika text: crisp, reads ../fonts/Inter.ttf directly, updatable at runtime -->
    <a-troika-text id="title" value="XR-kit starter" font="../fonts/Inter.ttf"
                   font-size="0.34" color="#ffffff" anchor="center" align="center"
                   position="0 2.2 -3"></a-troika-text>
    <a-troika-text value="mouse on web · laser in VR · click the orb"
                   font="../fonts/Inter.ttf" font-size="0.12" color="#9fa0c8"
                   anchor="center" align="center" position="0 1.8 -3"></a-troika-text>

    <!-- a reusable clickable button (orb + label) -->
    <a-entity class="clickable" data-act="demo" hover-glow="" position="0 1.3 -2.6">
      <a-sphere radius="0.18" material="emissive:#8d89ff; emissiveIntensity:0.7; color:#8d89ff"></a-sphere>
      <a-troika-text value="click me" font="../fonts/Inter.ttf" font-size="0.1" color="#cfc9ff" anchor="center" align="center" position="0 -0.32 0"></a-troika-text>
    </a-entity>

    <!-- camera rig: mouse + gaze + VR controllers + hand-tracking -->
    <a-entity position="0 0 0">
      <a-camera>
        <a-cursor raycaster="objects: .clickable" fuse="true" fuse-timeout="650" color="#8d89ff" material="shader: flat"></a-cursor>
      </a-camera>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 30" line="color:#8d89ff"></a-entity>
      <a-entity laser-controls="hand: left"  raycaster="objects: .clickable; far: 30" line="color:#70f0d3"></a-entity>
      <a-entity hand-tracking-controls="hand: right"></a-entity>
      <a-entity hand-tracking-controls="hand: left"></a-entity>
    </a-entity>
  </a-scene>
</body>
</html>
