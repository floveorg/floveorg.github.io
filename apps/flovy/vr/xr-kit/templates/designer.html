<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>XR-kit · designer bench</title>
  <!--
    DESIGN BENCH — fastest way to lay out a VR request.
    · environment-component  → an instant scenery (sky/ground/fog/props) by preset
    · layout-component        → auto-place children (circle/grid/line) — no hand coords
    · troika-text             → crisp text from ../fonts/Inter.ttf
    · A-Frame Inspector (LOCAL, offline) → press Ctrl+Alt+I to move/tune visually,
      then copy the position/rotation back into the markup.
    Serve over http://localhost (not file://).
  -->
  <script src="../lib/aframe.min.js"></script>
  <script src="../lib/troika-text.js"></script>
  <script src="../lib/aframe-environment.min.js"></script>
  <script src="../lib/aframe-layout.min.js"></script>
  <script src="../lib/aframe-extras.min.js"></script>
  <script>
    AFRAME.registerComponent('hover-glow', {
      init(){ const e=this.el;
        e.addEventListener('mouseenter',()=>e.setAttribute('animation__h','property: scale; to: 1.16 1.16 1.16; dur: 110'));
        e.addEventListener('mouseleave',()=>e.setAttribute('animation__h','property: scale; to: 1 1 1; dur: 110')); }
    });
  </script>
</head>
<!-- inspector="url: ..." makes Ctrl+Alt+I load the LOCAL inspector (no CDN) -->
<body>
  <a-scene inspector="url: ../lib/aframe-inspector.min.js"
           cursor="rayOrigin: mouse" raycaster="objects: .clickable; far: 30">

    <!-- instant scenery: swap preset → forest|japan|tron|dream|arches|starry|... -->
    <a-entity environment="preset: dream; ground: hills; groundColor: #3a2a4a; skyType: gradient; fog: 0.7; dressing: cubes; dressingAmount: 30"></a-entity>

    <!-- troika title -->
    <a-troika-text value="designer bench" font="../fonts/Inter.ttf" font-size="0.4"
                   color="#ffffff" anchor="center" align="center" position="0 2.6 -3"></a-troika-text>

    <!-- AUTO-LAYOUT: 6 clickable orbs auto-placed in a ring (no manual coords) -->
    <a-entity layout="type: circle; radius: 2.4" position="0 1.6 0">
      <a-entity class="clickable" hover-glow=""><a-sphere radius="0.16" material="emissive:#8d89ff; emissiveIntensity:.7; color:#8d89ff"></a-sphere></a-entity>
      <a-entity class="clickable" hover-glow=""><a-sphere radius="0.16" material="emissive:#70f0d3; emissiveIntensity:.7; color:#70f0d3"></a-sphere></a-entity>
      <a-entity class="clickable" hover-glow=""><a-sphere radius="0.16" material="emissive:#ff5d7a; emissiveIntensity:.7; color:#ff5d7a"></a-sphere></a-entity>
      <a-entity class="clickable" hover-glow=""><a-sphere radius="0.16" material="emissive:#ffd76a; emissiveIntensity:.7; color:#ffd76a"></a-sphere></a-entity>
      <a-entity class="clickable" hover-glow=""><a-sphere radius="0.16" material="emissive:#c9a06b; emissiveIntensity:.7; color:#c9a06b"></a-sphere></a-entity>
      <a-entity class="clickable" hover-glow=""><a-sphere radius="0.16" material="emissive:#9fd8ff; emissiveIntensity:.7; color:#9fd8ff"></a-sphere></a-entity>
    </a-entity>

    <!-- a grid layout of panels, also auto-placed -->
    <a-entity layout="type: grid; columns: 3; margin: 0.9" position="-0.9 1.0 -3">
      <a-plane width="0.7" height="0.5" material="color:#1c1430; side:double"></a-plane>
      <a-plane width="0.7" height="0.5" material="color:#1c1430; side:double"></a-plane>
      <a-plane width="0.7" height="0.5" material="color:#1c1430; side:double"></a-plane>
      <a-plane width="0.7" height="0.5" material="color:#1c1430; side:double"></a-plane>
      <a-plane width="0.7" height="0.5" material="color:#1c1430; side:double"></a-plane>
      <a-plane width="0.7" height="0.5" material="color:#1c1430; side:double"></a-plane>
    </a-entity>

    <!-- rig: mouse + gaze + laser + hands -->
    <a-entity position="0 0 0">
      <a-camera><a-cursor raycaster="objects: .clickable" fuse="true" fuse-timeout="650" color="#8d89ff" material="shader: flat"></a-cursor></a-camera>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 30" line="color:#8d89ff"></a-entity>
      <a-entity laser-controls="hand: left"  raycaster="objects: .clickable; far: 30" line="color:#70f0d3"></a-entity>
      <a-entity hand-tracking-controls="hand: right"></a-entity>
      <a-entity hand-tracking-controls="hand: left"></a-entity>
    </a-entity>
  </a-scene>
</body>
</html>
