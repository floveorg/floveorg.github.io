<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>A-Frame · hola (offline / libre)</title>
  <!-- Sin CDN: A-Frame servido localmente (MIT). Funciona offline y 100% bajo tu control. -->
  <script src="./aframe.min.js"></script>
</head>
<body>
  <!--
    Escena VR mínima, declarativa, single-file.
    · En escritorio: ratón para mirar, WASD para moverte.
    · Con casco: botón de gafas (abajo-derecha) → "Enter VR".
    · Editor 3D integrado: Ctrl + Alt + I
    Paleta = tokens flove (violeta/teal sobre fondo profundo).
  -->
  <a-scene background="color: #0b0b0f"
           fog="type: linear; color: #0b0b0f; near: 4; far: 22">

    <!-- luces -->
    <a-light type="ambient" color="#3a3a55"></a-light>
    <a-light type="point" intensity="0.9" position="3 5 4" color="#c9c6ff"></a-light>

    <!-- suelo -->
    <a-plane position="0 0 -4" rotation="-90 0 0" width="30" height="30"
             color="#11131a" shadow></a-plane>

    <!-- tres primitivas: caja, esfera, cilindro.
         Animaciones con el COMPONENTE `animation` (A-Frame 1.x), no la vieja etiqueta. -->
    <a-box position="-1.4 0.5 -3" rotation="0 45 0" color="#8d89ff" shadow
           animation="property: rotation; to: 0 405 0; dur: 9000; easing: linear; loop: true"></a-box>

    <a-sphere position="0 1.25 -5" radius="1.25" color="#70f0d3" shadow
              animation="property: position; to: 0 1.55 -5; dir: alternate; dur: 2200; easing: easeInOutSine; loop: true"></a-sphere>

    <a-cylinder position="1.4 0.75 -3" radius="0.5" height="1.5"
                color="#c9c6ff" shadow></a-cylinder>

    <!-- Texto OFFLINE con fuente MSDF local (Inter, OFL). Generada con
         `npx msdf-bmfont-xml` → fonts/Inter.json + fonts/Inter-msdf.png.
         Sin una sola petición de red. Cambia `font`/`font-image` por
         Roboto-msdf (u otra de las 20) para probar otras tipografías. -->
    <a-text value="✺ flove · A-Frame (offline)" align="center"
            color="#e9eaf2" width="6.5" position="0 2.6 -5"
            font="./fonts/Inter.json" font-image="./fonts/Inter-msdf.png"></a-text>

    <!-- cielo de color (puedes cambiarlo por una imagen 360 con <a-sky src=...>) -->
    <a-sky color="#0b0b0f"></a-sky>

    <!-- cámara con cursor para clics (mirar un objeto + clic/gaze lo "fusela") -->
    <a-entity camera look-controls wasd-controls position="0 1.6 0">
      <a-cursor color="#70f0d3"></a-cursor>
    </a-entity>

  </a-scene>
</body>
</html>
