<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>✺ flove · Puzzy — Relate</title>
  <link rel="stylesheet" href="../../flove.css">
  <style>
    :root{
      /* flove identity overrides — Puzzy: violet accent, teal flourish, on a deep canvas */
      --app-accent:        #8d89ff;
      --app-accent-soft:   #c9c6ff;
      --app-ink-on-accent: #0b0b14;

      /* Puzzy local palette (dark) */
      --bg:#0b0b0f; --panel:#11131a; --ink:#e9eaf2; --muted:#a3a7b4;
      --line:#1e2133; --field:#13162a; --accent2:#70f0d3;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; color:var(--ink);
      background:
        radial-gradient(1000px 700px at 110% -10%, rgba(141,137,255,.16), transparent 60%),
        radial-gradient(800px 600px at -10% 120%, rgba(112,240,211,.12), transparent 50%),
        var(--bg);
      font-family:var(--flove-font-ui); letter-spacing:.2px;
    }

    /* i18n — pure CSS (§13.2) */
    .t-es{ display:none }
    body:has(#ui-lang-es:checked) .t-en{ display:none }
    body:has(#ui-lang-es:checked) .t-es{ display:inline }

    /* language toggle inside the flove-bar */
    .lang{ display:inline-flex; gap:2px; margin-left:auto }
    .lang input{ position:absolute; opacity:0; pointer-events:none }
    .lang label{
      font-size:11px; font-weight:600; letter-spacing:.4px; padding:3px 9px;
      border-radius:var(--flove-radius-pill); cursor:pointer; color:var(--muted);
      border:1px solid transparent;
    }
    #ui-lang-en:checked ~ label[for=ui-lang-en],
    #ui-lang-es:checked ~ label[for=ui-lang-es]{
      color:var(--app-ink-on-accent); background:var(--app-accent); border-color:var(--app-accent);
    }

    /* ===== Puzzy · Relate — bespoke semantic mind-map (re-tinted) ===== */
    .app{ display:grid; grid-template-columns: 68px 1fr 360px; gap:18px; min-height:calc(100dvh - 52px); padding:18px }

    /* LEFT MEDIA BAR */
    .media-bar{
      position:sticky; top:18px; height:calc(100dvh - 88px);
      background:linear-gradient(180deg,#10131f,#0c0e16);
      border:1px solid var(--line); border-radius:16px; padding:10px 8px;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      box-shadow:0 18px 80px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .media-item{
      width:44px; height:44px; border-radius:12px; display:grid; place-items:center; cursor:pointer;
      border:1px solid var(--line); background:#0d1020; color:var(--app-accent-soft); position:relative;
      transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .media-item:hover{ transform:translateY(-2px); border-color:var(--app-accent); box-shadow:0 8px 26px rgba(141,137,255,.25) }
    .media-item.active{ outline:2px solid var(--accent2); color:var(--app-ink-on-accent); background:linear-gradient(180deg,#70f0d3,#a0f5e4)}
    .media-item svg{ width:20px; height:20px }
    .tooltip{
      position:absolute; left:52px; top:50%; translate:0 -50%;
      background:#0b0f1e; color:var(--app-accent-soft); border:1px solid var(--line); border-radius:10px; padding:6px 8px;
      font-size:12px; white-space:nowrap; opacity:0; pointer-events:none; transform:translateX(-6px);
      transition:all .12s ease; z-index:5;
    }
    .media-item:hover .tooltip{ opacity:1; transform:translateX(0) }

    /* STAGE */
    .stage{
      position:relative; border:1px solid var(--line); border-radius:18px; overflow:hidden;
      background:radial-gradient(90% 65% at 28% 40%, rgba(141,137,255,.05), transparent 70%);
      min-height:calc(100dvh - 88px);
    }
    .grid-overlay{ position:absolute; inset:0; pointer-events:none; opacity:.22;
      background:
        linear-gradient(0deg, rgba(141,137,255,.10) 1px, transparent 1px) 0 0/40px 40px,
        linear-gradient(90deg, rgba(141,137,255,.10) 1px, transparent 1px) 0 0/40px 40px;
      mask: radial-gradient(120% 85% at 28% 48%, #000 65%, transparent 100%);
    }
    .rings{ position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(circle at 28% 50%, transparent 0 160px, rgba(112,240,211,.10) 160px 164px, transparent 170px 100%),
        radial-gradient(circle at 28% 50%, transparent 0 260px, rgba(141,137,255,.10) 260px 264px, transparent 270px 100%),
        radial-gradient(circle at 28% 50%, transparent 0 360px, rgba(112,240,211,.08) 360px 364px, transparent 370px 100%);
    }
    .center-label{ position:absolute; left:28%; top:50%; translate:-50% -50%; text-align:center; pointer-events:none; z-index:2 }
    .center-label h1{ margin:0; font-size:30px; letter-spacing:.4px;
      background:linear-gradient(180deg,#fff,#cfc9ff); -webkit-background-clip:text; background-clip:text; color:transparent }
    .center-label p{ margin:8px 0 0; color:var(--muted); font-size:12px }

    /* SVG */
    svg#mindmap{ width:100%; height:100%; display:block; position:absolute; inset:0 }
    .link{ stroke:url(#grad); stroke-width:2.4; fill:none; opacity:.95 }
    .center-dot{ fill:url(#core); stroke:var(--app-accent); stroke-width:2 }

    /* Inline labels along paths */
    .labelText{ font-size:36px; font-weight:600; letter-spacing:.25px; fill:#e0dcff; paint-order:stroke; stroke:#0b0b14; stroke-width:4px; cursor:pointer }
    .labelText tspan{ fill:#b6b3d8; font-weight:500 }
    /* transparent hit area around each graph label (click toggles collapse) */
    .labelHit{ fill:transparent; cursor:pointer }

    /* Node badges (hover/summary + add input) */
    .nodeBadge{
      position:absolute; transform:translate(-50%,-50%); pointer-events:auto; display:flex; flex-direction:column; align-items:center; gap:6px;
    }
    .badgeBox{
      background:#0e1124; border:1px solid var(--line); border-radius:12px; padding:8px 10px; min-width:160px; text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,.45); position:relative;
    }
    .badgeTitle{ font-size:12px; color:var(--app-accent-soft); font-weight:700; letter-spacing:.2px }
    .badgeMedia{ display:flex; gap:6px; justify-content:center; margin-top:6px; flex-wrap:wrap }
    .badgeMedia .m{ width:18px; height:18px; display:grid; place-items:center; border:1px solid var(--line); border-radius:6px; background:#0b1020 }
    .badgeAdd{ margin-top:6px; display:flex; gap:6px; align-items:center; justify-content:center; }
    .badgeAdd input{ width:120px; padding:6px 8px; border-radius:8px; border:1px solid var(--line); background:var(--field); color:var(--ink) }
    .badgeAdd button{ padding:6px 10px; border-radius:8px; border:1px solid var(--app-accent); background:#0d1022; color:#eaf2ff; cursor:pointer }
    .badgeAdd button:hover{ background:var(--app-accent); color:var(--app-ink-on-accent) }

    /* Tooltip for table value + summary */
    .tip{
      position:absolute; left:50%; bottom:100%; translate:-50% -10px;
      background:#0b0f1e; color:var(--app-accent-soft); border:1px solid var(--line); border-radius:12px; padding:10px 12px;
      width:max-content; max-width:260px; text-align:left; font-size:12px; line-height:1.35;
      opacity:0; transform-origin:50% 100%; scale:.96; transition:opacity .12s ease, scale .12s ease, translate .12s ease;
    }
    .badgeBox:hover .tip{ opacity:1; scale:1; translate:-50% -14px }

    /* In-badge node stats (compact, ~1/3 size) — a row below the category icons.
       Visible only when the Stats media toggle is on and the badge isn't collapsed. */
    .badgeStats{ display:none; gap:8px; align-items:center; justify-content:center; margin-top:6px }
    .badgeBox.show-stats:not(.collapsed) .badgeStats{ display:flex }
    .ringWrapMini{ position:relative; width:24px; height:24px }
    .ringWrapMini svg{ position:absolute; inset:0 }
    .ringWrapMini .pct{ position:absolute; inset:0; display:grid; place-items:center; font-size:8px; color:var(--accent2); font-weight:700 }
    .badgeBars{ display:flex; gap:2px; align-items:flex-end }

    /* Title click collapses/expands the node's icons + infos */
    .badgeTitle{ cursor:pointer }
    .badgeBox.collapsed .badgeMedia,
    .badgeBox.collapsed .badgeAdd{ display:none }

    /* CONTENT STREAM (right column) */
    .stream{ display:flex; flex-direction:column; gap:12px }
    .panel{
      background:linear-gradient(180deg,#10131f,#0c0e16);
      border:1px solid var(--line); border-radius:16px; padding:14px;
      box-shadow:0 22px 80px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .panel h3{ margin:0 0 8px; font-size:14px; color:var(--accent2); letter-spacing:.2px }
    .cards{ display:grid; grid-template-columns:1fr; gap:10px; max-height:calc(100dvh - 240px); overflow:auto; padding-right:2px }
    .card{ border:1px solid var(--line); border-radius:12px; background:#0d1020; padding:10px; display:flex; gap:10px; align-items:flex-start }
    .thumb{ width:66px; height:54px; border-radius:8px; border:1px solid var(--line); background:var(--field); display:grid; place-items:center; overflow:hidden }
    .thumb img{ width:100%; height:100%; object-fit:cover }
    .meta{ font-size:12px; color:var(--app-accent-soft) }
    .meta .k{ color:var(--muted) }

    /* ===== add-branch flow: + FAB (bottom-right) + panel ===== */
    .add-fab{
      position:absolute; right:16px; bottom:16px; z-index:7;
      width:54px; height:54px; border-radius:var(--flove-radius-pill);
      border:none; cursor:pointer; font-size:30px; line-height:0; color:var(--app-ink-on-accent);
      background:linear-gradient(180deg, var(--app-accent), #6f6bff);
      box-shadow:0 12px 30px rgba(141,137,255,.45);
      transition:transform var(--flove-fast), box-shadow var(--flove-fast);
    }
    .add-fab:hover{ transform:translateY(-2px) scale(1.05); box-shadow:0 16px 38px rgba(141,137,255,.55) }
    .add-panel{
      position:absolute; right:16px; bottom:80px; z-index:8; width:min(300px, calc(100% - 32px));
      background:#0e1124; border:1px solid var(--line); border-radius:16px; padding:12px;
      box-shadow:0 22px 70px rgba(0,0,0,.6); display:none;
    }
    .add-panel.open{ display:block; animation:branchPop .18s var(--flove-ease) both }
    @keyframes branchPop{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
    .add-rel{ display:flex; flex-direction:column; gap:6px; margin-bottom:10px }
    .add-rel label{ display:flex; gap:8px; align-items:center; font-size:13px; color:var(--app-accent-soft); cursor:pointer }
    .add-rel input{ accent-color:var(--app-accent) }
    .add-row{ display:flex; gap:6px; align-items:center }
    .add-row input[type=text]{ flex:1; min-width:0; padding:8px 10px; border-radius:10px; border:1px solid var(--line); background:var(--field); color:var(--ink) }
    .add-mic, .add-save{ padding:8px 10px; border-radius:10px; border:1px solid var(--line); background:#0d1022; color:var(--ink); cursor:pointer }
    .add-save{ border-color:var(--app-accent); background:var(--app-accent); color:var(--app-ink-on-accent); font-weight:600 }
    .add-mic.rec{ background:#fb7185; border-color:#fb7185; color:#fff }

    /* branch pills along the relation spokes (replace the old floating boxes) */
    #branchLayer{ position:absolute; inset:0; pointer-events:none; z-index:3 }
    .branch{ position:absolute; transform:translate(-50%,-50%); pointer-events:auto; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; gap:4px }
    .branch-dot{ width:14px; height:14px; border-radius:50%; background:var(--accent2);
      border:2px solid #0b0b14; box-shadow:0 0 0 3px rgba(112,240,211,.18); transition:transform var(--flove-fast) }
    .branch:hover .branch-dot{ transform:scale(1.18) }
    .branch.selected .branch-dot{ background:var(--app-accent); box-shadow:0 0 0 4px rgba(141,137,255,.3) }
    .branch-text{ display:none; max-width:170px; font-size:12px; color:var(--ink); background:#0e1124;
      border:1px solid var(--app-accent); border-radius:10px; padding:6px 9px;
      box-shadow:0 10px 30px rgba(0,0,0,.5); text-align:center; word-break:break-word }
    .branch.selected .branch-text{ display:block }

    /* responsive */
    @media (max-width:1100px){ .app{ grid-template-columns: 68px 1fr } .stream{ display:none } }
  </style>
</head>
<body>
  <!-- language radios (drive the pure-CSS i18n) -->
  <nav class="flove-bar flove-bar--dark">
    <a class="flove-home" href="../../index.html">← <span class="t-en">Apps</span><span class="t-es">Apps</span></a>
    <span class="flove-mark flove-asterism" aria-hidden="true">✺</span>
    <span class="flove-app-name">Puzzy</span>
    <span class="flove-tag">Relate</span>
    <span class="lang">
      <input type="radio" name="ui-lang" id="ui-lang-en" checked>
      <input type="radio" name="ui-lang" id="ui-lang-es">
      <label for="ui-lang-en">EN</label>
      <label for="ui-lang-es">ES</label>
    </span>
  </nav>

  <div class="app">
    <!-- MEDIA BAR -->
    <aside class="media-bar" id="mediaBar" aria-label="Media toggles"></aside>

    <!-- STAGE -->
    <section class="stage">
      <div class="grid-overlay"></div><div class="rings"></div>
      <div class="center-label">
        <h1 id="mainWord"></h1>
      </div>
      <svg id="mindmap" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#8d89ff"/><stop offset="100%" stop-color="#70f0d3"/>
          </linearGradient>
          <radialGradient id="core" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#c9c6ff"/><stop offset="100%" stop-color="#70f0d3"/>
          </radialGradient>
        </defs>
      </svg>
      <div id="nodeBadges"></div>
      <div id="branchLayer"></div>

      <!-- add-branch FAB (bottom-right, distinct from the media bar) -->
      <button id="addFab" class="add-fab" aria-label="Add content as a branch" title="Add a branch">+</button>
      <div id="addPanel" class="add-panel" role="dialog" aria-label="Add content as a branch">
        <div class="add-rel">
          <label><input type="radio" name="rel" value="different" checked> <span class="t-en">Different</span><span class="t-es">Diferente</span></label>
          <label><input type="radio" name="rel" value="complementary"> <span class="t-en">Complementary</span><span class="t-es">Complementario</span></label>
          <label><input type="radio" name="rel" value="unrelated"> <span class="t-en">Unrelated</span><span class="t-es">No relacionado</span></label>
        </div>
        <div class="add-row">
          <input id="addText" type="text" placeholder="Add content…">
          <button id="micBtn" class="add-mic" type="button" title="Dictate" aria-label="Dictate">🎤</button>
          <button id="saveBtn" class="add-save" type="button"><span class="t-en">Save</span><span class="t-es">Guardar</span></button>
        </div>
      </div>
    </section>

    <!-- CONTENT STREAM -->
    <aside class="stream">
      <div class="panel">
        <h3><span class="t-en">Content stream</span><span class="t-es">Flujo de contenido</span></h3>
        <div class="cards" id="cards"></div>
      </div>
      <div class="panel">
        <h3><span class="t-en">Notes</span><span class="t-es">Notas</span></h3>
        <div class="cards" id="notes"></div>
      </div>
    </aside>
  </div>

  <script>
  /* ========================= DATA (swap with your table) ========================= */
  const DATA = {
    mainWord: "LOVE",
    nodes: [
      {
        title:"COMPLEMENTARY", summary:"Best matches",
        angle:-80, dist:270,
        media:{
          image:["https://picsum.photos/seed/peo/200/120"],
          video:[{title:"Interview clip", url:"#"}],
          doc:[{title:"Persona notes", text:"Key stakeholders and motivations."}],
          link:[{title:"Org chart", url:"#"}]
        },
        stats:{ pct:72, bars:[6,9,5,8,7] },
        children:[
          { title:"Pairs", summary:"Ideal Companions", media:{doc:[{title:"List", text:"Top 5"}]}, stats:{pct:54,bars:[3,5,4,6]} },
          { title:"Custom", summary:"Original and Custom", media:{image:["https://picsum.photos/seed/team/200/120"]}, stats:{pct:38,bars:[2,3,4,3]} }
        ]
      },
      {
        title:"RELATED", summary:"Close, Synonyms...",
        angle:-20, dist:300,
        media:{ image:["https://picsum.photos/seed/place/200/120"], link:[{title:"Field log", url:"#"}] },
        stats:{ pct:41, bars:[3,5,2,4,6] }
      },
      {
        title:"UNRELATED", summary:"Surprising and unreal possible mates",
        angle:55, dist:310,
        media:{ video:[{title:"Demo", url:"#"}], doc:[{title:"Checklist", text:"Build, test, deploy"}] },
        stats:{ pct:83, bars:[7,8,6,9,8] },
        children:[
          { title:"ITEM NOT FOUND", summary:"...", media:{link:[{title:"Repo", url:"#"}]}, stats:{pct:66,bars:[4,6,5,6]} }
        ]
      },

      { title:"DIFFERENT", summary:"Antonyms", angle:150, dist:250, media:{ image:["https://picsum.photos/seed/obj/200/120"], doc:[{title:"Specs", text:"Materials & dims"}] }, stats:{ pct:64,bars:[5,7,6,6,5] } }
    ]
  };

  const MEDIA_TYPES = [
    { key:"image", label:"Images",  icon:imgIcon,  factory:makeImageCard },
    { key:"video", label:"Videos",  icon:videoIcon,factory:makeVideoCard },
    { key:"audio", label:"Audio",   icon:audioIcon,factory:makeAudioCard },
    { key:"doc",   label:"Docs",    icon:docIcon,  factory:makeDocCard   },
    { key:"link",  label:"Links",   icon:linkIcon, factory:makeLinkCard  },
    { key:"stats", label:"Stats",   icon:statsIcon, factory:null } // toggles node stats visibility
  ];
  const activeMedia = new Set();

  /* ========================= ENGINE ========================= */
  const W=1200, H=800, CX=340, CY=H/2, centerR=34;   /* CX shifted left → mind-map hugs the media bar */
  const svg = document.getElementById('mindmap');
  const badgesLayer = document.getElementById('nodeBadges');
  const cards = document.getElementById('cards');
  const notes = document.getElementById('notes');
  document.getElementById('mainWord').textContent = DATA.mainWord;

  const NS = 'http://www.w3.org/2000/svg';
  const nodesIndex = new Map();

  function deg2rad(d){ return d*Math.PI/180 }
  function polar(cx,cy,r,a){ return [cx + r*Math.cos(a), cy + r*Math.sin(a)] }
  function setAttrs(n, o){ for(const k in o) n.setAttribute(k, o[k]) }
  function el(tag, props={}, children=[]){ const n=document.createElement(tag); Object.assign(n, props); (children||[]).forEach(c=>n.appendChild(c)); return n }
  function escapeHTML(s){ return s.replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m])) }

  // distance from (cx,cy) along angle a (rad) to the viewBox edge
  function maxRadiusToBox(cx,cy,a){
    const cos=Math.cos(a), sin=Math.sin(a); let r=Infinity;
    if(cos>1e-6) r=Math.min(r,(W-cx)/cos); else if(cos<-1e-6) r=Math.min(r,-cx/cos);
    if(sin>1e-6) r=Math.min(r,(H-cy)/sin); else if(sin<-1e-6) r=Math.min(r,-cy/sin);
    return r;
  }
  function layoutAngles(nodes){
    const n = nodes.length; const step = 360/n; const offset = -90;
    nodes.forEach((nd,i)=>{
      if(nd.angle==null) nd.angle = offset + i*step;
      nd.dist = 0.92 * maxRadiusToBox(CX, CY, deg2rad(nd.angle));   // stretch every line to the outer extreme
    });
  }

  function pathCurve(ax,ay,bx,by){
    const dx=bx-ax, dy=by-ay;
    const c1x=ax + dx*0.35, c1y=ay + dy*0.35;
    const c2x=ax + dx*0.75, c2y=ay + dy*0.75;
    return `M ${ax} ${ay} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${bx} ${by}`;
  }

  function render(){
    svg.innerHTML = `
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#8d89ff"/><stop offset="100%" stop-color="#70f0d3"/>
        </linearGradient>
        <radialGradient id="core" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#c9c6ff"/><stop offset="100%" stop-color="#70f0d3"/>
        </radialGradient>
      </defs>`;
    badgesLayer.innerHTML = '';

    const center = document.createElementNS(NS,'circle');
    setAttrs(center,{cx:CX, cy:CY, r:centerR, class:'center-dot'});
    svg.appendChild(center);

    layoutAngles(DATA.nodes);
    nodesIndex.clear();

    DATA.nodes.forEach((n, i)=> drawNode(n, {x:CX,y:CY,depth:0,idx:i}));
    updateStatsVisibility();
    updateMediaBadges();
    requestAnimationFrame(placeBadges);
    setTimeout(placeBadges, 80);
  }

  /* Draw ONLY the relation line (axis). Inline category labels and floating
     boxes were removed by request — meaning now lives on the added branches. */
  function drawNode(node, ctx){
    const angle = deg2rad(node.angle), r = node.dist;
    const [x,y] = polar(ctx.x, ctx.y, r, angle);          // line endpoint (outer extreme)
    const id = genId(node, ctx);
    const path = document.createElementNS(NS,'path');
    setAttrs(path,{ id:`p-${id}`, d: pathCurve(ctx.x,ctx.y,x,y), class:'link' });
    svg.appendChild(path);
    nodesIndex.set(id, { node, x, y, ctx });
  }

  function genId(node, ctx){ return `${ctx.depth}-${ctx.idx}-${(node.title||'node').toLowerCase().replace(/\s+/g,'-')}` }

  /* Collapse/expand a node's icons + infos (title click) */
  function toggleCollapse(id){
    const rec = nodesIndex.get(id); if(!rec) return;
    const box = rec.badge.querySelector('.badgeBox');
    if(box) box.classList.toggle('collapsed');
  }

  /* Badge (hover content + add input) */
  function makeBadge(node, x, y, id){
    const wrap = el('div',{ className:'nodeBadge', style:`left:${x}px; top:${y}px` });

    const box = el('div',{ className:'badgeBox' });
    const title = el('div',{ className:'badgeTitle', textContent: node.title || 'Untitled' });
    title.addEventListener('click', ()=> box.classList.toggle('collapsed'));
    const tip = el('div',{ className:'tip' });
    tip.innerHTML = `<strong>${escapeHTML(node.title||'')}</strong><br>${escapeHTML(node.summary||'')}`;

    const mediaRow = el('div',{ className:'badgeMedia' });
    const addRow = el('div',{ className:'badgeAdd' });
    const input = el('input',{ placeholder:'…' });
    const btn = el('button',{ textContent:'Add' });
    btn.onclick = ()=> {
      const v = input.value.trim(); if(!v) return;
      node.media = node.media || {}; node.media.doc = node.media.doc || [];
      node.media.doc.unshift({title:'Note', text:v});
      input.value='';
      fillStreamFromVisible();
      updateMediaBadges();
      notes.prepend(makeDocCard('Note', {text:v}));
    };

    addRow.appendChild(input); addRow.appendChild(btn);
    const stats = makeStatsMini(node);
    box.appendChild(tip); box.appendChild(title); box.appendChild(mediaRow); box.appendChild(stats); box.appendChild(addRow);
    wrap.appendChild(box);
    return wrap;
  }

  /* Compact in-badge stats (≈1/3 size): ring% + mini bars, shown as a row */
  function makeStatsMini(node){
    const wrap = el('div',{ className:'badgeStats' });
    if(!node.stats) return wrap;

    const size=24, stroke=3, r=(size/2 - stroke);
    const C = 2*Math.PI*r;
    const pct = (typeof node.stats.pct==='number') ? Math.max(0,Math.min(100,node.stats.pct)) : 0;

    const ringWrap = el('div',{ className:'ringWrapMini' });
    const svgR = document.createElementNS(NS,'svg'); setAttrs(svgR,{viewBox:`0 0 ${size} ${size}`, width:size, height:size});
    const bg = document.createElementNS(NS,'circle'); setAttrs(bg,{cx:size/2, cy:size/2, r:r, stroke:'#1e2133', 'stroke-width':stroke, fill:'none'});
    const fg = document.createElementNS(NS,'circle'); setAttrs(fg,{cx:size/2, cy:size/2, r:r, stroke:'url(#grad)', 'stroke-width':stroke, fill:'none','stroke-linecap':'round','stroke-dasharray':C,'stroke-dashoffset':C});
    requestAnimationFrame(()=> setAttrs(fg,{'stroke-dashoffset': C*(1-pct/100)}));
    svgR.appendChild(bg); svgR.appendChild(fg);
    ringWrap.appendChild(svgR);
    ringWrap.appendChild(el('div',{className:'pct', textContent: pct+'%'}));
    wrap.appendChild(ringWrap);

    if(Array.isArray(node.stats.bars)){
      const bars = el('div',{ className:'badgeBars' });
      const mx = Math.max(...node.stats.bars,1);
      node.stats.bars.forEach(v=>{
        const h = Math.round((v/mx)*11)+3;
        bars.appendChild(el('i',{style:`width:3px;height:${h}px;background:linear-gradient(180deg,#8d89ff,#70f0d3);border-radius:2px 2px 0 0;display:inline-block`}));
      });
      wrap.appendChild(bars);
    }
    return wrap;
  }

  /* MEDIA BAR */
  const bar = document.getElementById('mediaBar');
  MEDIA_TYPES.forEach(t=>{
    const btn = el('button',{className:'media-item','aria-pressed':'false'});
    btn.innerHTML = t.icon();
    const tip = el('span',{className:'tooltip', textContent:t.label});
    btn.appendChild(tip);
    btn.onclick = ()=>{
      const active = btn.classList.toggle('active');
      btn.setAttribute('aria-pressed', active?'true':'false');
      if(active) activeMedia.add(t.key); else activeMedia.delete(t.key);
      if(t.key === 'stats'){ updateStatsVisibility(); }
      else { updateMediaBadges(); fillStreamFromVisible(); }
    };
    bar.appendChild(btn);
  });

  function updateStatsVisibility(){
    const show = activeMedia.has('stats');
    badgesLayer.querySelectorAll('.badgeBox').forEach(b=> b.classList.toggle('show-stats', show));
  }

  function updateMediaBadges(){
    // For each badge, show tiny icons for the active media types the node actually has
    [...badgesLayer.children].forEach((wrap, idx)=>{
      const box = wrap.querySelector('.badgeBox');
      const mediaRow = box.querySelector('.badgeMedia');
      mediaRow.innerHTML = '';
      const id = [...nodesIndex.keys()][idx];
      const rec = nodesIndex.get(id); if(!rec) return;
      const node = rec.node;
      MEDIA_TYPES.forEach(mt=>{
        if(mt.key==='stats') return;
        if(!activeMedia.has(mt.key)) return;
        const items = (node.media && node.media[mt.key]) || [];
        if(items.length){
          const m = el('div',{className:'m', title:`${mt.label}: ${items.length}`});
          m.innerHTML = mt.icon('#c9c6ff',14,14);
          mediaRow.appendChild(m);
        }
      });
    });
  }

  function visibleNodes(){
    const arr = [];
    nodesIndex.forEach(rec=> arr.push(rec.node));
    return arr;
  }
  function fillStreamFromVisible(){
    cards.innerHTML = '';
    if(activeMedia.size===0) return;
    const vset = visibleNodes();
    vset.forEach(n=>{
      MEDIA_TYPES.forEach(mt=>{
        if(mt.key==='stats' || !activeMedia.has(mt.key)) return;
        const items = (n.media && n.media[mt.key]) || [];
        items.forEach(item=>{
          cards.prepend( mt.factory(item.title||'Item', item) );
        });
      });
    });
  }

  /* CONTENT CARD FACTORIES */
  function makeImageCard(title, item){
    const c = cardBase('image', title);
    c.querySelector('.thumb').innerHTML = `<img src="${(typeof item==='string'?item:item.url)||'https://picsum.photos/seed/x/200/120'}" alt=""/>`;
    return c;
  }
  function makeVideoCard(title, item){
    const c = cardBase('video', title);
    c.querySelector('.thumb').innerHTML = videoIcon('#c9c6ff',26,26);
    c.querySelector('.meta').innerHTML += `<div><span class="k">URL:</span> ${(item && item.url) ? escapeHTML(item.url) : '#'}</div>`;
    return c;
  }
  function makeAudioCard(title, item){
    const c = cardBase('audio', title);
    c.querySelector('.thumb').innerHTML = audioIcon('#c9c6ff',26,26);
    c.querySelector('.meta').innerHTML += `<div><span class="k">Track:</span> ${escapeHTML(title)}</div>`;
    return c;
  }
  function makeDocCard(title, item){
    const c = cardBase('doc', title);
    c.querySelector('.thumb').innerHTML = docIcon('#c9c6ff',22,22);
    const detail = item && (item.text || item.url || '');
    c.querySelector('.meta').innerHTML += detail ? `<div>${escapeHTML(detail.slice(0,160))}${detail.length>160?'…':''}</div>` : '';
    return c;
  }
  function makeLinkCard(title, item){
    const c = cardBase('link', title);
    c.querySelector('.thumb').innerHTML = linkIcon('#c9c6ff',22,22);
    c.querySelector('.meta').innerHTML += `<div><span class="k">Link:</span> ${escapeHTML(item && item.url ? item.url : '#')}</div>`;
    return c;
  }
  function cardBase(type, title){
    const card = el('div',{className:'card'});
    card.dataset.type = type;
    card.appendChild(el('div',{className:'thumb'}));
    const meta = el('div',{className:'meta'});
    meta.innerHTML = `<div><span class="k">${type.toUpperCase()}</span> — ${escapeHTML(title||'Untitled')}</div>`;
    card.appendChild(meta);
    return card;
  }

  /* ICONS */
  function imgIcon(color="#c9c6ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="9" cy="10" r="2"></circle><path d="M21 15l-5-5-4 4-2-2-5 5"></path></svg>`}
  function videoIcon(color="#c9c6ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><rect x="3" y="6" width="14" height="12" rx="2"></rect><path d="M17 8l4-2v12l-4-2z"></path></svg>`}
  function audioIcon(color="#c9c6ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><path d="M9 17V7l8-2v10"></path><circle cx="7" cy="17" r="2"></circle><circle cx="17" cy="15" r="2"></circle></svg>`}
  function docIcon(color="#c9c6ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><path d="M7 3h7l5 5v13H7z"></path><path d="M14 3v6h6"></path><path d="M9 13h8M9 17h8"></path></svg>`}
  function linkIcon(color="#c9c6ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><path d="M10 14l-2 2a4 4 0 0 1-6-3 4 4 0 0 1 1.17-2.83l3-3A4 4 0 0 1 12 8"></path><path d="M14 10l2-2a4 4 0 1 1 5.66 5.66l-3 3A4 4 0 0 1 12 16"></path></svg>`}
  function statsIcon(color="#c9c6ff",w=22,h=22){ return `<svg viewBox="0 0 24 24" width="${w}" height="${h}" fill="none" stroke="${color}"><rect x="4" y="10" width="4" height="8" rx="1"></rect><rect x="10" y="6" width="4" height="12" rx="1"></rect><rect x="16" y="12" width="4" height="6" rx="1"></rect></svg>`}

  /* Map SVG coords → stage pixels (shared by every HTML overlay) */
  function svgToPx(X,Y){
    const ctm = svg.getScreenCTM(); if(!ctm) return [0,0];
    const box = svg.getBoundingClientRect();
    const p=svg.createSVGPoint(); p.x=X; p.y=Y; const s=p.matrixTransform(ctm);
    return [s.x-box.left, s.y-box.top];
  }
  function placeBadges(){       // places the center word + the branch pills on their nodes
    const cl = document.querySelector('.center-label');
    if(cl){ const [cx,cy] = svgToPx(CX,CY); cl.style.left = cx+'px'; cl.style.top = cy+'px'; }
    placeBranches();
  }
  window.addEventListener('resize', placeBadges);

  /* ========================= ADD-BRANCH FLOW (+ FAB) ========================= */
  const REL = {
    different:     { label:'Different',     angle:150 },
    complementary: { label:'Complementary', angle:-80 },
    unrelated:     { label:'Unrelated',     angle: 55 }
  };
  const branches = [];          // { id, rel, text }
  let selectedBranch = null;
  const branchLayer = document.getElementById('branchLayer');

  function addBranch(rel, text){
    if(!REL[rel] || !text.trim()) return;
    const b = { id:'b'+branches.length, rel, text:text.trim() };
    branches.push(b);
    selectedBranch = b.id;       // show the freshly-added branch
    renderBranches();
  }

  function renderBranches(){
    branchLayer.innerHTML = '';
    const perRel = {};
    branches.forEach(b=>{
      if(perRel[b.rel]==null) perRel[b.rel]=0;
      const i = perRel[b.rel]++;
      const a = deg2rad((REL[b.rel]||REL.different).angle);
      const D = 0.92 * maxRadiusToBox(CX, CY, a);
      const d = Math.min(D*0.9, D*(0.30 + 0.16*i));   // stack branches outward along the spoke
      const [sx,sy] = polar(CX, CY, d, a);
      const pill = el('div',{ className:'branch'+(selectedBranch===b.id?' selected':'') });
      pill.dataset.sx = sx; pill.dataset.sy = sy;
      pill.appendChild(el('div',{ className:'branch-dot' }));
      pill.appendChild(el('div',{ className:'branch-text', textContent:b.text }));
      pill.addEventListener('click', ()=>{ selectedBranch = (selectedBranch===b.id ? null : b.id); renderBranches(); });
      branchLayer.appendChild(pill);
    });
    placeBranches();
  }

  function placeBranches(){
    [...branchLayer.children].forEach(pill=>{
      const [px,py] = svgToPx(parseFloat(pill.dataset.sx), parseFloat(pill.dataset.sy));
      pill.style.left = px+'px'; pill.style.top = py+'px';
    });
  }

  /* panel wiring */
  const fab = document.getElementById('addFab');
  const panel = document.getElementById('addPanel');
  const addText = document.getElementById('addText');
  const micBtn = document.getElementById('micBtn');
  const saveBtn = document.getElementById('saveBtn');

  fab.addEventListener('click', ()=>{ panel.classList.toggle('open'); if(panel.classList.contains('open')) addText.focus(); });
  saveBtn.addEventListener('click', ()=>{
    const sel = panel.querySelector('input[name="rel"]:checked');
    addBranch(sel ? sel.value : 'different', addText.value);
    addText.value=''; panel.classList.remove('open');
  });
  addText.addEventListener('keydown', e=>{ if(e.key==='Enter') saveBtn.click(); });

  /* mic — Web Speech API when available, graceful no-op otherwise */
  micBtn.addEventListener('click', ()=>{
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ addText.placeholder = 'Mic not supported — type instead'; return; }
    const rec = new SR();
    rec.lang = document.querySelector('#ui-lang-es:checked') ? 'es-ES' : 'en-US';
    rec.interimResults = false;
    micBtn.classList.add('rec');
    rec.onresult = e=>{ addText.value = (addText.value+' '+e.results[0][0].transcript).trim(); };
    rec.onend = ()=> micBtn.classList.remove('rec');
    rec.onerror = ()=> micBtn.classList.remove('rec');
    try{ rec.start(); }catch(_){ micBtn.classList.remove('rec'); }
  });

  /* GO */
  render();
  </script>
</body>
</html>
