<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<link rel="icon" type="image/svg+xml" href="favicon-fivy.svg">
<title>FLOVE · FIVY</title>
<style>
  :root{
    --bg:#252538; --panel:#2f2f44; --ink:#f6f7fb; --muted:#c4c7d2;
    --fx:#3a3a52; --stroke:#4a4a66; --brand:#00f7a7; --accent:#ff5fdc;
    --gold:#fadc92; --silver:#dde2ec; --bronze:#dba066;
    --sky:#a8e4ff; --plum:#c7a4ff;
    --slot-w:120px; --slot-h:160px;
    --card-w:120px; --card-h:126px;

    /* simplex palette */
    --cat-r:#ff8a8a; --cat-r-ink:#3a0e0e;
    --cat-o:#ff9b5e; --cat-o-ink:#3a1a0a;
    --cat-y:#ffd84d; --cat-y-ink:#3d2a0a;
    --cat-g:#6ed089; --cat-g-ink:#0a3a1f;
    --cat-b:#5ea4e6; --cat-b-ink:#ffffff;
    --cat-i:#6b6bd9; --cat-i-ink:#ffffff;
    --fuzzy-red:#ff3344;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 700px at 85% -10%, #3a3a58 0%, transparent 55%),
      radial-gradient(900px 600px at -10% 110%, #3a2548 0%, transparent 60%),
      var(--bg);
    color:var(--ink);
    font:16px/1.55 system-ui,Roboto,Arial,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ============== Topbar ============== */
  .topbar{
    position:sticky;top:0;z-index:60;
    background:rgba(37,37,56,.78);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--stroke);
  }
  .topbar-inner{
    max-width:1100px;margin:0 auto;
    padding:10px 18px;
    display:flex;align-items:center;gap:12px;
    position:relative;
  }
  .brand-link{
    display:inline-flex;align-items:center;gap:9px;
    text-decoration:none;color:var(--ink);
    padding:4px 6px;border-radius:10px;
    transition:transform .15s ease, background .2s ease;
  }
  .brand-link:hover{transform:translateY(-1px);background:rgba(255,255,255,.04)}
  .brand-mark{width:30px;height:30px;display:block;flex:none}
  .brand-text{
    font:600 1.2rem/1 ui-serif,Georgia,serif;letter-spacing:.4px;
    background:linear-gradient(135deg,var(--gold),var(--accent) 60%,var(--sky));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .progress-stack{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:4px;
    pointer-events:none;
  }
  .stage-progress{
    display:flex;gap:5px;padding:5px 9px;border-radius:999px;
    border:1px solid var(--stroke);background:var(--fx);
  }
  .stage-progress .seg{
    width:32px;height:5px;border-radius:999px;
    background:rgba(255,255,255,.1);
    transition:background .35s ease, transform .25s ease, box-shadow .25s ease;
  }
  .stage-progress .seg.done{background:linear-gradient(90deg,var(--gold),var(--brand))}
  .stage-progress .seg.current{
    background:linear-gradient(90deg,var(--brand),var(--accent));
    box-shadow:0 0 12px rgba(255,95,220,.4);
    transform:scaleY(1.5);
  }
  /* sub progress: one segment per deck settled in stage 1 */
  .deck-progress{
    display:flex;gap:4px;padding:3px 8px;border-radius:999px;
    border:1px solid var(--stroke);background:rgba(0,0,0,.18);
  }
  .deck-progress .dseg{
    width:18px;height:4px;border-radius:999px;
    background:rgba(255,255,255,.1);
    transition:background .35s ease, transform .25s ease, box-shadow .25s ease;
  }
  .deck-progress .dseg.done{background:linear-gradient(90deg,var(--gold),var(--brand))}
  .deck-progress .dseg.current{
    background:linear-gradient(90deg,var(--brand),var(--accent));
    box-shadow:0 0 8px rgba(255,95,220,.4);transform:scaleY(1.4);
  }
  @media (max-width:460px){
    .stage-progress{padding:3px 6px;gap:3px}
    .stage-progress .seg{width:16px;height:3px}
    .deck-progress{padding:2px 5px;gap:3px}
    .deck-progress .dseg{width:10px;height:3px}
  }
  .topbar-spacer{flex:1}

  /* brand becomes a menu trigger */
  button.brand-link{appearance:none;background:transparent;border:0;font:inherit}
  .brand-caret{color:var(--muted);font-size:.7rem;margin-left:1px;transition:transform .2s ease}
  .brand-link[aria-expanded="true"] .brand-caret{transform:rotate(180deg);color:var(--accent)}

  .app-menu{
    position:absolute;left:12px;top:calc(100% + 6px);z-index:70;
    min-width:184px;
    background:var(--panel);border:1px solid var(--stroke);border-radius:14px;
    box-shadow:0 18px 40px rgba(0,0,0,.45);
    padding:6px;display:flex;flex-direction:column;gap:2px;
    animation:fadein .15s ease;
  }
  .app-menu[hidden]{display:none}
  .app-menu a,.app-menu button{
    appearance:none;border:0;background:transparent;cursor:pointer;
    text-align:left;text-decoration:none;color:var(--ink);
    font:600 .9rem/1 system-ui,sans-serif;
    padding:.6rem .7rem;border-radius:10px;
    display:flex;align-items:center;gap:.55rem;
  }
  .app-menu a:hover,.app-menu button:hover{background:rgba(255,255,255,.07);color:var(--brand)}
  .app-menu button:disabled{opacity:.38;cursor:not-allowed}
  .app-menu button:disabled:hover{background:transparent;color:var(--ink)}
  .app-menu .sep{height:1px;background:var(--stroke);margin:4px 2px;padding:0}

  /* compact "Go back" pill (matches keys-advanced.html .btn-back) */
  .btn-back{padding:.4rem .8rem;font-size:.84rem;border-radius:999px}

  /* ============== Intro slider (3 slides → Go play) ============== */
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .intro-slider{
    margin:0 auto;max-width:720px;width:100%;
    border:1px solid var(--stroke);border-radius:18px;
    background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.012)),var(--panel);
    overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,.4);
  }
  .intro-slider.hidden{display:none}
  .intro-track{
    display:flex;overflow-x:auto;
    scroll-snap-type:x mandatory;scroll-behavior:smooth;
    scrollbar-width:none;-ms-overflow-style:none;
  }
  .intro-track::-webkit-scrollbar{display:none}
  .intro-slide{
    flex:0 0 100%;scroll-snap-align:center;
    padding:34px 24px 28px;min-height:220px;
    display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:10px;
  }
  @media (max-width:520px){.intro-slide{padding:24px 16px 18px;min-height:180px}}
  .intro-slide .step-num{
    font:700 .78rem/1 system-ui,sans-serif;color:var(--muted);
    letter-spacing:3px;text-transform:uppercase;
  }
  .intro-slide h2{
    font:600 1.5rem/1.15 ui-serif,Georgia,serif;margin:0;
    background:linear-gradient(135deg,var(--gold),var(--accent) 60%,var(--sky));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  @media (max-width:520px){.intro-slide h2{font-size:1.3rem}}
  .intro-slide p{color:var(--ink);margin:0;font-size:.98rem;max-width:50ch;line-height:1.55}
  .intro-slide b{color:var(--gold);font-weight:600}
  .intro-arrows{
    display:flex;gap:24px;justify-content:center;align-items:center;
    padding:14px 16px 6px;border-top:1px dashed var(--stroke);
  }
  .intro-arrows button{
    width:4rem;height:4rem;border-radius:50%;
    background:var(--fx);border:1px solid var(--stroke);color:var(--ink);
    cursor:pointer;display:grid;place-items:center;font:700 2rem/1 system-ui;
    transition:color .2s ease, border-color .2s ease, transform .15s ease, background .2s ease;
  }
  .intro-arrows button:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px);background:rgba(255,95,220,.08)}
  .intro-arrows button:disabled{opacity:.3;cursor:not-allowed;transform:none}
  .intro-dots{display:flex;gap:8px;justify-content:center;padding:8px 16px 4px;flex-wrap:wrap}
  .intro-dots button{
    width:10px;height:10px;border-radius:50%;
    background:#56566e;border:0;cursor:pointer;padding:0;
    transition:background .2s ease, transform .25s ease;
  }
  .intro-dots button.active{background:linear-gradient(135deg,var(--brand),var(--accent));transform:scale(1.4)}
  .intro-cta{
    display:flex;justify-content:center;gap:.6rem;padding:6px 16px 18px;flex-wrap:wrap;
    transition:opacity .25s ease;
  }
  .intro-cta.gated{opacity:0;pointer-events:none;height:0;padding:0;overflow:hidden}
  .intro-cta #intro-start{animation:pulse 2.6s ease-in-out infinite}
  @media (max-width:480px){
    .intro-arrows button{width:3.4rem;height:3.4rem;font-size:1.7rem}
    .intro-arrows{gap:18px}
  }

  /* customize panel on the last intro slide (souls-style toggle) */
  .customize-wrap{margin-top:1rem;display:flex;flex-direction:column;align-items:center;gap:.6rem;width:100%}
  .customize-btn{
    appearance:none;border:0;cursor:pointer;color:#1a1a28;
    background:linear-gradient(135deg,var(--sky),var(--plum));
    border-radius:999px;padding:.55rem 1.1rem;
    font:700 .9rem/1 system-ui,sans-serif;
    animation:pulse 2.6s ease-in-out infinite;
  }
  .customize-btn:hover{filter:brightness(1.06)}
  .customize-btn[aria-expanded="true"]{background:linear-gradient(135deg,var(--brand),var(--accent));animation:none}
  .customize-panel{
    width:100%;max-width:48ch;margin:0 auto;text-align:left;
    border:1px solid var(--stroke);border-radius:14px;background:rgba(255,255,255,.03);
    padding:.85rem;display:flex;flex-direction:column;gap:.9rem;
    animation:fadein .2s ease;
  }
  .customize-panel[hidden]{display:none}
  .cust-group{display:flex;flex-direction:column;gap:.45rem}
  .cust-group.cust-row{flex-direction:row;align-items:center;gap:.7rem}
  .cust-label{font:700 .72rem/1 system-ui,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:var(--sky)}
  .cust-radio{display:flex;gap:.5rem;align-items:flex-start;cursor:pointer;font-size:.86rem;color:var(--ink);line-height:1.4}
  .cust-radio input{margin-top:.25rem;flex:none}
  .cust-radio-label b{color:var(--gold)}
  .cust-radio-label em{color:var(--muted);font-style:italic}
  .cust-download[hidden]{display:none}
  .cust-download-btn{display:inline-block;text-decoration:none}
  /* Listen ON/OFF switch */
  .cust-switch{position:relative;display:inline-flex;cursor:pointer}
  .cust-switch input{position:absolute;opacity:0;width:0;height:0}
  .cust-switch-track{
    position:relative;width:74px;height:30px;border-radius:999px;
    background:var(--fx);border:1px solid var(--stroke);display:flex;align-items:center;
  }
  .cust-switch-thumb{
    position:absolute;left:3px;width:24px;height:24px;border-radius:50%;
    background:var(--muted);transition:left .2s ease, background .2s ease;
  }
  .cust-switch-text{flex:1;text-align:center;font:800 .62rem/1 system-ui,sans-serif;letter-spacing:.08em;transition:opacity .2s ease}
  .cust-switch-on{color:#1a1a28;opacity:0}
  .cust-switch-off{color:var(--muted);opacity:1}
  .cust-switch input:checked + .cust-switch-track{background:linear-gradient(135deg,var(--brand),var(--accent));border-color:transparent}
  .cust-switch input:checked + .cust-switch-track .cust-switch-thumb{left:47px;background:#fff}
  .cust-switch input:checked + .cust-switch-track .cust-switch-on{opacity:1}
  .cust-switch input:checked + .cust-switch-track .cust-switch-off{opacity:0}
  /* progress-bar pickers (Play with · Certify play) */
  .cert-track{position:relative;display:flex;justify-content:space-between;align-items:center;padding:0 .4rem;height:2rem}
  .cert-track[hidden]{display:none}
  .cert-track::before{content:"";position:absolute;left:.7rem;right:.7rem;top:50%;height:3px;transform:translateY(-50%);background:var(--fx);border-radius:999px}
  .cert-fill{position:absolute;left:.7rem;top:50%;width:0;height:3px;transform:translateY(-50%);background:linear-gradient(90deg,var(--brand),var(--accent));border-radius:999px;transition:width .35s cubic-bezier(.2,.8,.2,1)}
  .cert-node{appearance:none;cursor:pointer;position:relative;z-index:1;background:transparent;border:0;padding:0;display:flex;flex-direction:column;align-items:center;gap:.2rem;font:inherit}
  .cert-dot{width:.9rem;height:.9rem;border-radius:50%;background:var(--fx);border:2px solid var(--stroke);transition:background .2s, border-color .2s, transform .15s}
  .cert-node:hover .cert-dot{border-color:var(--sky);transform:scale(1.12)}
  .cert-node.is-on .cert-dot,.cert-node.is-done .cert-dot{background:linear-gradient(135deg,var(--brand),var(--accent));border-color:transparent}
  .cert-name{position:absolute;top:1.1rem;font:700 .58rem/1 system-ui,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
  .cert-node:hover .cert-name,.cert-node.is-on .cert-name{color:var(--ink)}
  /* language list */
  .cust-lang-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.35rem}
  .cust-lang-list label{display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.86rem;color:var(--ink)}
  .cust-lang-list .lang-flag{font-size:1.05rem}
  .lang-add{appearance:none;border:1px dashed var(--stroke);background:transparent;color:var(--sky);cursor:pointer;border-radius:999px;padding:.3rem .7rem;font:600 .82rem/1 system-ui,sans-serif}
  .lang-add:hover{border-color:var(--accent);color:var(--accent)}
  /* collapsibles */
  .cust-collapse-btn{appearance:none;background:transparent;border:0;cursor:pointer;text-align:left;padding:0}
  .cust-collapse-btn[aria-expanded="true"]{color:var(--accent)}
  .moreinfo-wrap{display:flex;flex-direction:column;gap:.5rem}
  .moreinfo-btn{align-self:flex-start;font-size:.8rem}
  .moreinfo-box{font-size:.82rem;color:var(--muted);line-height:1.5;border-left:3px solid var(--accent);padding:.4rem .7rem;background:rgba(255,255,255,.03);border-radius:8px}
  .moreinfo-box[hidden]{display:none}

  /* ============== Layout ============== */
  .wrap{max-width:1100px;margin:auto;padding:28px 18px 80px;display:grid;gap:22px}
  @media (max-width:520px){.wrap{padding:18px 12px 60px;gap:16px}}

  .play-area{
    position:sticky;top:58px;z-index:40;
    display:flex;flex-direction:column;gap:6px;
    padding:6px 0 10px;
    background:
      radial-gradient(1200px 700px at 85% -10%, #3a3a58 0%, transparent 55%),
      radial-gradient(900px 600px at -10% 110%, #3a2548 0%, transparent 60%),
      var(--bg);
  }

  /* ============== Spotlight (reordering) ============== */
  .spotlight{display:none}
  .spotlight.active{
    display:block;
    margin:0 auto;width:calc(100% - 16px);max-width:780px;
    padding:2px 12px 4px;
    animation:pop .25s ease;
  }
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}

  .hand{
    display:flex;gap:0;flex-wrap:wrap;justify-content:center;
    padding:4px 4px 4px;perspective:900px;
  }
  .hand .pcard + .pcard{margin-left:-22px}
  .hand.custom{flex-wrap:wrap;justify-content:center}
  .hand.custom .pcard + .pcard{margin-left:8px}   /* editable cards: spread out, no overlap */
  .hand.custom .pcard{cursor:default}
  @media (max-width:680px){.hand .pcard + .pcard{margin-left:-18px}}
  @media (max-width:460px){.hand .pcard + .pcard{margin-left:-14px}}
  .hand .pcard{z-index:1}
  .hand .pcard:nth-child(1){z-index:6}
  .hand .pcard:nth-child(2){z-index:5}
  .hand .pcard:nth-child(3){z-index:4}
  .hand .pcard:nth-child(4){z-index:3}
  .hand .pcard:nth-child(5){z-index:2}
  .hand .pcard:hover, .hand .pcard:focus-within{z-index:10}

  .pcard{
    position:relative;width:var(--card-w);min-height:var(--card-h);
    display:flex;flex-direction:column;justify-content:space-between;
    padding:14px 10px 8px;
    background:
      radial-gradient(140% 80% at 50% 0%, rgba(255,255,255,.04), transparent 55%),
      linear-gradient(170deg,#3a3a52 0%, #2f2f44 60%, #3a2a48 100%);
    border:1px solid #5a5a76;border-radius:14px;
    box-shadow:0 10px 26px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.04);
    cursor:grab;user-select:none;
    transition:transform .2s ease, box-shadow .25s ease, border-color .25s ease, opacity .2s ease;
  }
  .pcard:hover{transform:translateY(-8px)}
  .pcard.dragging{opacity:.35;cursor:grabbing}
  .pcard.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,95,220,.45), 0 10px 26px rgba(0,0,0,.35)}
  .pcard .name{
    flex:1;display:grid;place-items:center;text-align:center;
    font:600 .94rem/1.15 ui-serif,Georgia,serif;letter-spacing:.2px;
    color:var(--ink);padding:4px 2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    max-width:100%;
  }
  /* editable name input on the blank fifth deck's cards */
  .pcard .pcard-input{
    flex:1;width:100%;min-width:0;text-align:center;
    font:600 .9rem/1.15 ui-serif,Georgia,serif;
    color:var(--ink);background:rgba(0,0,0,.22);
    border:1px solid #6a6a8c;border-radius:8px;padding:6px 4px;
  }
  .pcard .pcard-input:focus{outline:none;border-color:var(--accent)}
  /* title input above the fifth deck's hand */
  .deck-title-input{
    display:block;margin:0 auto 10px;width:min(320px,80%);text-align:center;
    font:700 1rem/1.2 ui-serif,Georgia,serif;color:var(--ink);
    background:rgba(0,0,0,.22);border:1px solid #6a6a8c;border-radius:10px;padding:8px 12px;
  }
  .deck-title-input:focus{outline:none;border-color:var(--accent)}
  .pcard::before{
    content:"✺";position:absolute;top:6px;left:8px;
    font:700 .78rem/1 ui-serif,Georgia,serif;color:rgba(255,255,255,.18);
  }
  .pcard::after{
    content:"✺";position:absolute;bottom:6px;right:8px;
    font:700 .78rem/1 ui-serif,Georgia,serif;color:rgba(255,255,255,.18);
    transform:rotate(180deg);
  }
  .pcard .arrows{display:flex;justify-content:space-between;gap:4px;margin-top:4px}
  .pcard .arrows button{
    flex:1;height:1.7rem;border-radius:8px;
    background:#3a3a52;border:1px solid #5a5a76;color:var(--ink);
    font:700 .85rem/1 system-ui,sans-serif;cursor:pointer;
    transition:transform .12s ease, border-color .18s ease, color .18s ease;
  }
  .pcard .arrows button:hover{transform:translateY(-1px);border-color:var(--accent);color:var(--accent)}
  .hand .pcard:nth-child(1){border-color:rgba(247,209,125,.45);box-shadow:0 10px 26px rgba(247,209,125,.12), 0 0 0 1px rgba(247,209,125,.18) inset}

  .hand.fivy .pcard:nth-child(1){transform:rotate(-10deg);transform-origin:90% 100%}
  .hand.fivy .pcard:nth-child(2){transform:rotate(-5deg); transform-origin:80% 100%}
  .hand.fivy .pcard:nth-child(4){transform:rotate(5deg);  transform-origin:20% 100%}
  .hand.fivy .pcard:nth-child(5){transform:rotate(10deg); transform-origin:10% 100%}
  .hand.fivy .pcard:nth-child(1):hover, .hand.fivy .pcard:nth-child(1):focus-within,
  .hand.fivy .pcard:nth-child(2):hover, .hand.fivy .pcard:nth-child(2):focus-within,
  .hand.fivy .pcard:nth-child(4):hover, .hand.fivy .pcard:nth-child(4):focus-within,
  .hand.fivy .pcard:nth-child(5):hover, .hand.fivy .pcard:nth-child(5):focus-within{
    transform:rotate(0) translateY(-8px);
  }
  .hand .pcard.dragging{transform:rotate(0) !important}

  .spot-actions{
    display:flex;gap:.6rem;justify-content:center;align-items:center;
    margin-top:1rem;flex-wrap:wrap;
  }
  .btn{
    appearance:none;border:0;cursor:pointer;
    padding:.7rem 1.1rem;border-radius:999px;
    font:600 .92rem/1 system-ui,sans-serif;letter-spacing:.4px;
    transition:transform .15s ease, box-shadow .2s ease, background .2s ease, color .2s ease, border-color .2s ease;
  }
  .btn-ghost{background:transparent;border:1px solid var(--stroke);color:var(--muted)}
  .btn-ghost:hover{color:var(--ink);border-color:#3a3a55}
  .btn-primary{
    color:#1a1a28;
    background:linear-gradient(135deg,var(--brand),var(--accent));
    box-shadow:0 8px 24px rgba(255,95,220,.22), 0 0 0 1px rgba(255,255,255,.14) inset;
  }
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 30px rgba(255,95,220,.32)}
  .btn-soft{
    background:rgba(168,228,255,.12);border:1px solid rgba(168,228,255,.35);color:var(--sky);
  }
  .btn-soft:hover{transform:translateY(-1px);background:rgba(168,228,255,.2);color:var(--ink);border-color:var(--sky)}
  .btn-soft.is-open{background:rgba(255,95,220,.16);border-color:var(--accent);color:var(--accent)}

  .pq-panel{
    margin:.9rem auto 0;display:none;
    max-width:380px;width:100%;
    border:1px solid var(--stroke);border-radius:14px;
    background:linear-gradient(180deg,rgba(168,228,255,.06),transparent);
    padding:.7rem;
    animation:fadein .2s ease;
  }
  .pq-panel.active{display:block}
  @keyframes fadein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .pq-panel textarea{
    width:100%;min-height:48px;resize:vertical;
    background:var(--fx);border:1px solid var(--stroke);border-radius:12px;
    color:var(--ink);padding:.5rem .65rem;
    font:400 .92rem/1.4 system-ui,Roboto,Arial,sans-serif;
  }
  .pq-panel textarea:focus{outline:2px solid var(--sky);outline-offset:1px;border-color:var(--sky)}
  .pq-panel .pq-row{
    display:flex;justify-content:space-between;align-items:center;gap:.5rem;margin-top:.5rem;flex-wrap:wrap;
  }

  /* ============== Board ============== */
  .board{
    display:grid;gap:14px;
    grid-template-columns:repeat(5,minmax(0,1fr));
    align-items:start;justify-items:center;
    min-height:calc(var(--slot-h) + 16px);
    padding:14px 6px;
    border:1px dashed var(--stroke);border-radius:18px;
    background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);
  }
  body.embed .board{grid-template-columns:repeat(4,minmax(0,1fr))}   /* embed keeps the 4-deck flow */
  @media (max-width:680px){.board{grid-template-columns:repeat(3,minmax(0,1fr))}}
  @media (max-width:460px){.board{grid-template-columns:repeat(2,minmax(0,1fr))}}
  /* reserved last space for the fifth deck until the first four are settled */
  .slot.locked{
    width:100%;min-height:var(--slot-h);display:flex;align-items:center;justify-content:center;
    border:1px dashed var(--stroke);border-radius:14px;opacity:.4;
    color:var(--muted);font:700 .85rem/1 system-ui,sans-serif;
  }
  .slot{width:100%;display:flex;justify-content:center;align-items:flex-start}
  .slot.placeholder{
    width:var(--slot-w);min-height:var(--slot-h);
    border:1px dashed rgba(255,47,214,.35);border-radius:14px;
    background:radial-gradient(120% 80% at 50% 0%, rgba(255,47,214,.06), transparent 60%);
    display:grid;place-items:center;color:var(--muted);font-size:.78rem;text-align:center;padding:.5rem;
  }

  .deck-closed{
    position:relative;width:var(--slot-w);height:var(--slot-h);
    background:transparent;border:0;padding:0;cursor:pointer;
    transition:transform .18s ease;
  }
  .deck-closed:hover{transform:translateY(-3px)}
  .deck-closed:focus-visible{outline:2px solid var(--sky);outline-offset:6px;border-radius:14px}
  .deck-closed .back{
    position:absolute;left:50%;top:50%;
    width:calc(var(--slot-w) - 22px);height:calc(var(--slot-h) - 30px);
    border-radius:14px;
    background:
      repeating-linear-gradient(45deg,
        rgba(255,255,255,.06) 0 6px, transparent 6px 12px),
      linear-gradient(160deg,#4a3a6e 0%,#3a2a52 55%,#46285c 100%);
    border:1px solid #5a4a7a;
    box-shadow:0 10px 24px rgba(0,0,0,.35), inset 0 0 0 2px rgba(255,255,255,.06);
  }
  .deck-closed .back-1{transform:translate(-50%,-50%) rotate(-2deg) translateY(4px)}
  .deck-closed .back-2{transform:translate(-50%,-50%) rotate(1deg) translateY(2px)}
  .deck-closed .back-3{transform:translate(-50%,-50%) rotate(-.5deg)}
  .deck-closed .mark{
    position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;
    font:700 2.4rem/1 ui-serif,Georgia,serif;
    background:linear-gradient(135deg,var(--gold),var(--accent));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 4px 12px rgba(0,0,0,.4);
    transform:rotate(-1deg);
  }
  /* the fivy pentagon logo on face-down decks (the pencil ✎ stays on the new one) */
  .deck-closed .mark.logo{background:none;-webkit-text-fill-color:initial;text-shadow:none}
  .deck-closed .mark .fivy-logo{
    width:48px;height:48px;display:block;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));
  }
  .deck-closed .hint{
    position:absolute;left:0;right:0;bottom:-22px;text-align:center;
    color:var(--muted);font-size:.78rem;letter-spacing:.5px;
  }

  .deck-done{
    width:var(--slot-w);min-width:var(--slot-w);
    min-height:var(--slot-h);
    background:linear-gradient(180deg,#363650,#2e2e44);
    border:1px solid var(--stroke);border-radius:14px;
    padding:8px 7px;display:flex;flex-direction:column;gap:5px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
    cursor:pointer;
    transition:border-color .18s ease, box-shadow .18s ease, transform .15s ease;
  }
  .deck-done:hover{transform:translateY(-2px);border-color:#6a6a86;box-shadow:0 10px 24px rgba(0,0,0,.3)}
  .deck-done .deck-title{
    font:600 .72rem/1 ui-serif,Georgia,serif;
    color:var(--gold);letter-spacing:.4px;
    text-align:center;margin-bottom:5px;text-transform:uppercase;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .deck-done ol{
    margin:0;padding:0;list-style:none;
    display:flex;flex-direction:column;flex:1;min-height:0;
  }
  .deck-done li{
    flex:1;min-height:0;
    display:flex;align-items:center;justify-content:center;
    padding:.35rem .5rem;border-radius:8px;
    border:1px solid #50506a;
    background:linear-gradient(170deg,#3c3c54 0%,#2f2f44 100%);
    font:600 .82rem/1.15 ui-serif,Georgia,serif;letter-spacing:.25px;
    color:var(--ink);
    margin-top:-4px;position:relative;
    box-shadow:0 2px 5px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.05);
    text-align:center;
  }
  .deck-done li:first-child{margin-top:0}
  .deck-done li:nth-child(1){z-index:10}
  .deck-done li:nth-child(2){z-index:9}
  .deck-done li:nth-child(3){z-index:8}
  .deck-done li:nth-child(4){z-index:7}
  .deck-done li:nth-child(5){z-index:6}
  .deck-done li:nth-child(1){
    background:
      linear-gradient(135deg,rgba(250,220,146,.32),rgba(202,162,86,.18)),
      linear-gradient(170deg,#3c3c54,#2f2f44);
    border-color:rgba(250,220,146,.7);
    box-shadow:0 3px 8px rgba(250,220,146,.22), 0 2px 5px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.1);
    color:#fff5dc;
  }
  .deck-done li:nth-child(2){
    background:
      linear-gradient(135deg,rgba(221,226,236,.28),rgba(154,161,179,.18)),
      linear-gradient(170deg,#3c3c54,#2f2f44);
    border-color:rgba(221,226,236,.55);
    box-shadow:0 3px 8px rgba(221,226,236,.16), 0 2px 5px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.08);
    color:#f1f4fa;
  }
  .deck-done li:nth-child(3){
    background:
      linear-gradient(135deg,rgba(219,160,102,.32),rgba(160,103,52,.2)),
      linear-gradient(170deg,#3c3c54,#2f2f44);
    border-color:rgba(219,160,102,.6);
    box-shadow:0 3px 8px rgba(219,160,102,.18), 0 2px 5px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.08);
    color:#ffe7cf;
  }
  .deck-done .pq-saved{
    margin-top:4px;padding:.4rem .5rem;border-radius:8px;
    background:rgba(168,228,255,.08);border:1px solid rgba(168,228,255,.22);
    color:var(--ink);font-size:.76rem;line-height:1.35;
    white-space:pre-wrap;overflow-wrap:anywhere;cursor:pointer;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    overflow:hidden;
    transition:background .15s ease, border-color .15s ease;
  }
  .deck-done .pq-saved:hover{background:rgba(168,228,255,.14);border-color:rgba(168,228,255,.35)}
  .deck-done .pq-saved.expanded{-webkit-line-clamp:unset;overflow:visible}

  .stage-cta{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap;margin-top:6px}
  .stage-cta:empty{display:none}

  /* ============== Fields stage (simplex) ============== */
  .fields{display:none}
  .fields.active{display:block;animation:fadein .25s ease}

  /* Fields lower area: two columns — buttons | toolbar */
  /* Fields: [left menu (toolbar + buttons) | square]; the square fills the rest */
  .fields-grid{
    display:grid;grid-template-columns:172px 1fr;gap:14px;align-items:start;
    max-width:860px;margin:0 auto;
  }
  @media (max-width:560px){.fields-grid{grid-template-columns:1fr}}
  .fields-main{min-width:0;display:flex;flex-direction:column;align-items:stretch;gap:8px}
  /* one category per row; its sub-buttons drop in below it when checked */
  .cats{display:flex;flex-direction:column;gap:6px;padding:4px;margin:0}
  .cat-group{display:flex;flex-direction:column;gap:4px}
  .cat-children{display:flex;flex-direction:column;gap:4px;padding-left:10px}
  .cat-children:empty{display:none}
  .cat{
    display:flex;align-items:center;justify-content:center;gap:5px;
    width:100%;
    padding:6px 12px;border-radius:999px;
    border:1.5px solid var(--stroke);
    background:rgba(255,255,255,.06);
    color:var(--ink);
    font:700 .85rem/1 system-ui,sans-serif;
    cursor:pointer;white-space:nowrap;user-select:none;
    opacity:.55;
    transition:opacity .18s ease, transform .15s ease, box-shadow .15s ease;
  }
  .cat:hover{transform:translateY(-1px)}
  .cat.cat-rb-r{background:var(--cat-r);color:var(--cat-r-ink);border-color:var(--cat-r)}
  .cat.cat-rb-o{background:var(--cat-o);color:var(--cat-o-ink);border-color:var(--cat-o)}
  .cat.cat-rb-y{background:var(--cat-y);color:var(--cat-y-ink);border-color:var(--cat-y)}
  .cat.cat-rb-g{background:var(--cat-g);color:var(--cat-g-ink);border-color:var(--cat-g)}
  .cat.cat-rb-b{background:var(--cat-b);color:var(--cat-b-ink);border-color:var(--cat-b)}
  .cat.cat-rb-i{background:var(--cat-i);color:var(--cat-i-ink);border-color:var(--cat-i)}
  .cat.is-on{
    opacity:1;
    box-shadow:0 0 0 2px rgba(255,255,255,.22), 0 4px 12px rgba(0,0,0,.25);
  }
  /* the settled fifth deck's own category button, tinted by its colour */
  .cat-group[data-fifth] .cat{border-color:var(--c)}
  .cat-group[data-fifth] .cat.is-on{box-shadow:0 0 0 2px var(--c), 0 4px 12px rgba(0,0,0,.25)}

  /* square sits at the top of Fields (not pinned — pinning hid the button rows
     behind its tall background sheet) */
  .square-dock{
    position:relative;
    display:flex;justify-content:flex-start;   /* hug the left column; grow → right + down */
    margin:0 0 14px;padding:6px 0 10px;
  }

  .toolbar{
    display:flex;flex-direction:column;gap:8px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--stroke);border-radius:12px;
    padding:8px;align-self:start;
  }
  .toolbar .buttons{display:flex;flex-direction:column;gap:6px}
  .tbtn{
    display:grid;grid-template-columns:1fr auto;
    align-items:center;gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--stroke);border-radius:9px;
    padding:5px 8px;cursor:pointer;user-select:none;color:var(--ink);
    transition:transform .12s ease, border-color .2s ease, background .15s ease;
  }
  .tbtn:hover{transform:translateY(-1px);border-color:#6a6a86}
  .tbtn.is-on{background:rgba(168,228,255,.1);border-color:var(--sky)}
  .tbtn .btn-text{font-weight:600;font-size:.82rem}
  .tbtn .state-indicator{
    inline-size:9px;block-size:9px;border-radius:50%;
    border:2px solid #5a5a76;background:#2f2f44;
  }
  .tbtn[data-toggle="list"].is-on .state-indicator{background:radial-gradient(circle at 40% 40%,#c9efff,#6dd0ff);box-shadow:0 0 12px rgba(109,208,255,.7)}
  .tbtn[data-toggle="cycle"].is-on .state-indicator{background:radial-gradient(circle at 40% 40%,#8de0ff,#1170ff);box-shadow:0 0 12px #2f9bff}
  .tbtn[data-toggle="confluence"].is-on .state-indicator{background:radial-gradient(circle at 40% 40%,#c3ffa9,#18ce7a);box-shadow:0 0 12px rgba(36,243,157,.7)}

  .linear-list{
    background:rgba(255,255,255,.05);
    border:1px solid var(--stroke);border-radius:10px;
    padding:7px;max-height:40vh;overflow:auto;
  }
  .linear-list[hidden]{display:none}
  .linear-list .ll-title{
    font:700 .72rem/1.1 ui-serif,Georgia,serif;
    color:var(--gold);letter-spacing:.3px;text-transform:uppercase;
    text-align:center;margin:0 0 6px;min-height:1em;
  }
  .linear-list .ll-title:empty::before{content:"—";opacity:.35}
  .linear-list ol{margin:0;padding-left:1rem;display:grid;gap:.3rem}
  .linear-list li{
    background:rgba(255,255,255,.05);
    border:1px solid var(--stroke);
    border-radius:8px;
    padding:.28rem .42rem;font-size:.72rem;
    transform-origin:left center;
    transition:transform .25s ease;
    color:var(--ink);
  }
  .linear-list li:empty::before{content:" ";color:var(--muted)}

  /* Confluence static pattern */
  .linear-list.confluence li:nth-child(1),
  .linear-list.confluence li:nth-child(5){transform:scale(1)}
  .linear-list.confluence li:nth-child(2),
  .linear-list.confluence li:nth-child(4){transform:scale(1.3)}
  .linear-list.confluence li:nth-child(3){transform:scale(1.6)}

  /* List + Confluence: animate the items like the confluence arrows — a green
     pulse that flows down the list and swells toward the centre (winner). */
  @keyframes listConflow{
    0%,100%{transform:scale(var(--cs,1));box-shadow:0 1px 0 rgba(0,0,0,.2)}
    50%{transform:scale(calc(var(--cs,1) + .18));box-shadow:0 0 12px rgba(36,206,122,.55);border-color:#18ce7a}
  }
  .linear-list.confluence li{animation:listConflow 3.2s ease-in-out infinite}
  .linear-list.confluence li:nth-child(1){--cs:1;   animation-delay:0s}
  .linear-list.confluence li:nth-child(2){--cs:1.3; animation-delay:.32s}
  .linear-list.confluence li:nth-child(3){--cs:1.6; animation-delay:.64s}
  .linear-list.confluence li:nth-child(4){--cs:1.3; animation-delay:.96s}
  .linear-list.confluence li:nth-child(5){--cs:1;   animation-delay:1.28s}

  @keyframes listMorph-r1{0%,41.67%{transform:scale(1)}50%,91.67%{transform:scale(1.6)}100%{transform:scale(1)}}
  @keyframes listMorph-r2{0%,41.67%{transform:scale(1.3)}50%,91.67%{transform:scale(1)}100%{transform:scale(1.3)}}
  @keyframes listMorph-r4{0%,41.67%{transform:scale(1.3)}50%,91.67%{transform:scale(1)}100%{transform:scale(1.3)}}
  @keyframes listMorph-r5{0%,41.67%{transform:scale(1)}50%,91.67%{transform:scale(1.6)}100%{transform:scale(1)}}
  .linear-list.confluence.cycle li:nth-child(1){animation:listMorph-r1 24s ease-in-out infinite}
  .linear-list.confluence.cycle li:nth-child(2){animation:listMorph-r2 24s ease-in-out infinite}
  .linear-list.confluence.cycle li:nth-child(4){animation:listMorph-r4 24s ease-in-out infinite}
  .linear-list.confluence.cycle li:nth-child(5){animation:listMorph-r5 24s ease-in-out infinite}

  .square{
    position:relative;
    /* default placeholder size set by JS via --sq; height always tracks the
       actual (possibly capped) width so it stays a true square as it grows */
    width:var(--sq,320px);max-width:100%;aspect-ratio:1/1;
    background:radial-gradient(100% 100% at 50% 50%, rgba(255,255,255,.08) 0%, rgba(255,255,255,.02) 70%);
    border:1px solid var(--stroke);
    border-radius:22px;
    box-shadow:0 18px 50px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
    overflow:hidden;padding:10px;
  }

  /* ---- Deck sub-buttons (stage-1 fivys), shown below the category rows ---- */
  .deck-btn{
    --c:var(--sky);
    display:inline-flex;align-items:center;gap:7px;
    padding:6px 14px;border-radius:999px;
    border:1.5px solid var(--c);
    background:color-mix(in srgb, var(--c) 16%, transparent);
    color:var(--ink);
    font:700 .82rem/1 system-ui,sans-serif;
    cursor:pointer;user-select:none;white-space:nowrap;
    opacity:.62;
    transition:opacity .18s ease, transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .deck-btn::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--c);flex:none}
  .deck-btn:hover{transform:translateY(-1px)}
  .deck-btn.is-on{
    opacity:1;background:color-mix(in srgb, var(--c) 30%, transparent);
    box-shadow:0 0 0 2px rgba(255,255,255,.2), 0 4px 12px rgba(0,0,0,.25);
  }
  /* child decks read a touch smaller than their parent category pill */
  .deck-btn.is-child{width:100%;justify-content:center;padding:5px 11px;font-size:.76rem}
  .deck-btn.is-child::before{width:7px;height:7px}

  /* ---- Simplex nodes: rank 1 centre, 2–5 corners; each toggled set
          stacks one more placeholder under its rank parent ---- */
  .node{
    position:absolute;width:38%;
    display:flex;flex-direction:column;gap:3px;z-index:2;
  }
  .node .rank-badge{ display:none; }   /* rank numbers removed from the square */
  .node .items{display:flex;flex-direction:column;gap:3px}
  .node .item{
    padding:3px 6px;border-radius:7px;max-width:100%;
    border:1.5px solid var(--c,var(--stroke));
    background:color-mix(in srgb, var(--c,#888) 22%, var(--panel));
    color:var(--ink);
    display:flex;flex-direction:column;gap:3px;
    animation:fadein .18s ease;
  }
  .node .item.empty{
    opacity:.45;border-style:dashed;padding:3px 8px;
    font:600 11px/1.15 system-ui,sans-serif;
  }
  .node .item-row{display:flex;align-items:center;gap:4px;font:600 11px/1.15 system-ui,sans-serif}
  .node .item-word{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .node .item-star{
    flex:none;border:0;background:transparent;color:var(--gold);cursor:pointer;
    font-size:22px;line-height:1;padding:0;
  }
  .node .item-next{
    flex:none;width:32px;height:32px;border-radius:8px;border:0;cursor:pointer;
    background:rgba(255,255,255,.14);color:var(--ink);
    font-size:26px;line-height:1;display:grid;place-items:center;
  }
  .node .item-next:hover{background:var(--c,var(--accent));color:#1a1a28}
  .node .item-next:disabled{opacity:.3;cursor:default}
  .node .item-reason{display:flex;gap:3px;align-items:center}
  .node .item-reason[hidden],.node .item-reason-view[hidden]{display:none}
  .node .rsn-input{
    flex:1;min-width:54px;font-size:10px;padding:2px 5px;border-radius:5px;
    background:rgba(255,255,255,.1);border:1px solid var(--stroke);color:var(--ink);outline:none;
  }
  .node .rsn-mic,.node .rsn-save,.node .rsn-close{
    flex:none;border:0;cursor:pointer;font-size:10px;padding:2px 5px;border-radius:5px;
    background:rgba(255,255,255,.14);color:var(--ink);line-height:1.1;
  }
  .node .rsn-mic.recording{background:var(--fuzzy-red);color:#fff}
  .node .rsn-save{background:var(--brand);color:#1a1a28;font-weight:700}
  .node .item-reason-view{display:flex;gap:4px;align-items:flex-start;font-size:10px;color:var(--muted);line-height:1.25}
  .node .rsn-text{flex:1;white-space:normal;overflow-wrap:anywhere}
  .node .rsn-close{align-self:flex-start}
  .node .item-input{
    width:100%;min-width:0;
    padding:3px 6px;border-radius:7px;
    font:600 11px/1.2 system-ui,sans-serif;
    background:rgba(255,255,255,.06);
    border:1.5px dashed var(--c,var(--accent));
    color:var(--ink);outline:none;text-align:center;
  }
  .node .item-input:focus{
    border-style:solid;
    box-shadow:0 0 0 2px color-mix(in srgb, var(--c,var(--accent)) 30%, transparent);
  }

  .node.n1{left:50%;top:50%;transform:translate(-50%,-50%);align-items:center}
  .node.n1 .rank-badge{align-self:center}
  .node.n1 .items{align-items:center}
  .node.n2{left:8px;top:8px}
  .node.n3{right:8px;top:8px;text-align:right}
  .node.n3 .rank-badge{align-self:flex-end}
  .node.n3 .items{align-items:flex-end}
  /* rank 4 & 5 anchor low (near the bottom) so the default empty square reads as
     a full square; added sub-elements still stack downward (the square grows to
     keep them inside) */
  /* rank 4 & 5 are pinned (in px) near the bottom of the *base* square via JS, so
     their items stack downward and the placeholders don't ride up as it grows */
  .node.n4{left:8px;top:var(--n45-top,72%)}
  .node.n5{right:8px;top:var(--n45-top,72%);text-align:right}
  .node.n5 .rank-badge{align-self:flex-end}
  .node.n5 .items{align-items:flex-end}
  .node.n2 .item,.node.n4 .item{width:fit-content;max-width:100%}

  .edges{position:absolute;inset:0;pointer-events:none;z-index:1}
  .edges .edge{
    stroke:#5da0ff;stroke-width:5;opacity:0;
    marker-end:url(#arrow);
    filter:drop-shadow(0 0 5px rgba(86,179,255,.45));
    stroke-linecap:round;
  }
  .edges #arrow path{fill:#5da0ff}
  .edges #arrow-red path{fill:var(--fuzzy-red)}
  .edges #arrow-green path{fill:#18ce7a}
  .edges .edge.red{
    stroke:var(--fuzzy-red);
    marker-end:url(#arrow-red);
    filter:drop-shadow(0 0 6px rgba(255,51,68,.55));
  }
  .edges .edge.green{
    stroke:#18ce7a;stroke-width:5;
    marker-end:url(#arrow-green);
    filter:drop-shadow(0 0 6px rgba(36,206,122,.65));
    opacity:0;stroke-linecap:round;
  }
  @keyframes dash-flow{
    0%{opacity:0;stroke-dasharray:0 800}
    12%{opacity:1;stroke-dasharray:300 800}
    40%{opacity:1;stroke-dasharray:700 800}
    75%{opacity:1;stroke-dasharray:900 800}
    100%{opacity:0;stroke-dasharray:900 800}
  }
  .square.cycle .edges .cycle{animation:dash-flow 4s ease-in-out infinite}
  .square.cycle .edges #e12{animation-delay:0s}
  .square.cycle .edges #e23{animation-delay:.8s}
  .square.cycle .edges #e34{animation-delay:1.6s}
  .square.cycle .edges #e45{animation-delay:2.4s}
  .square.cycle .edges #e51{animation-delay:3.2s}
  .square.cycle .edges #e52{animation-delay:2.4s}
  .square.confluence .edges .green.confluence{animation:dash-flow 3.2s ease-in-out infinite}
  .square.confluence .edges #g1{animation-delay:0s}
  .square.confluence .edges #g2{animation-delay:1.6s}

  /* Add (+) and Save buttons inside the cats nav */
  .cat-add,.cat-save{
    background:rgba(255,255,255,.06);
    color:var(--ink);
    border:1.5px dashed var(--stroke);
    opacity:.9;
  }
  .cat-add:hover,.cat-save:hover{border-color:var(--accent);color:var(--accent)}
  .cat-save{
    background:linear-gradient(135deg,var(--brand),var(--accent));
    color:#1a1a28;border:1.5px solid transparent;opacity:1;
    box-shadow:0 8px 22px rgba(255,95,220,.25);
  }
  .cat-save:hover{transform:translateY(-1px);color:#1a1a28}
  .cat-add[hidden],.cat-save[hidden]{display:none !important}
  /* while editing a category, the others keep their place + stay active (Social stays shown) */
  .cats .cat.is-editing{
    opacity:1;outline:2px dashed var(--accent);outline-offset:2px;
  }

  /* Title input row (shown only when editing a new custom category) — fits the
     left column's full width */
  .cat-title-row{
    display:none;margin:0 0 10px;width:100%;
    animation:fadein .2s ease;
  }
  .cat-title-row.active{display:flex;gap:8px;align-items:center;justify-content:center}
  .cat-title-row input{
    flex:1;width:100%;min-width:0;padding:.55rem .8rem;border-radius:999px;
    background:var(--fx);border:1.5px dashed var(--accent);
    color:var(--ink);font:600 .95rem/1 system-ui,sans-serif;
    outline:none;
    text-align:center;
  }
  .cat-title-row input:focus{border-style:solid;box-shadow:0 0 0 3px rgba(255,95,220,.18)}

  /* Saved-custom buttons row (below cats) */
  .saved-customs{
    display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
    padding:4px 4px;margin:0 0 12px;
  }
  .saved-customs:empty{display:none}
  .saved-custom{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 8px 6px 12px;border-radius:999px;
    border:1.5px solid var(--plum);
    background:var(--plum);color:#1a1a28;
    font:700 .82rem/1 system-ui,sans-serif;
    cursor:pointer;user-select:none;
    opacity:.55;
    transition:opacity .18s ease, transform .15s ease, box-shadow .15s ease;
  }
  .saved-custom:hover{transform:translateY(-1px)}
  .saved-custom.is-on{
    opacity:1;
    box-shadow:0 0 0 2px rgba(255,255,255,.22), 0 4px 12px rgba(0,0,0,.25);
  }
  .saved-custom .x{
    display:inline-grid;place-items:center;
    width:18px;height:18px;border-radius:50%;
    background:rgba(0,0,0,.18);color:#1a1a28;
    font:700 .82rem/1 system-ui,sans-serif;
    border:0;cursor:pointer;padding:0;
  }
  .saved-custom .x:hover{background:rgba(0,0,0,.35);color:#fff}

  /* ============== Summary (collapsible) ============== */
  .summary-sec{
    margin-top:22px;
    border:1px solid var(--stroke);border-radius:14px;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01)),var(--panel);
    overflow:hidden;
  }
  .summary-sec > summary{
    list-style:none;cursor:pointer;
    padding:.85rem 1rem;
    font:600 1.1rem/1.2 ui-serif,Georgia,serif;
    color:var(--gold);letter-spacing:.4px;
    display:flex;align-items:center;justify-content:center;gap:.5rem;  /* centred title */
    transition:background .15s ease, color .15s ease;
  }
  .summary-sec > summary::-webkit-details-marker{display:none}
  .summary-sec > summary:hover{background:rgba(250,220,146,.06);color:var(--ink)}

  /* go-back + Fields → share one centred row (also Fields/Summary nav rows) */
  .decks-back-row,.fields-nav-row,.summary-nav-row{
    display:flex;justify-content:center;align-items:center;gap:.7rem;margin-top:8px;flex-wrap:wrap;
  }
  .decks-back-row .stage-cta{margin-top:0}

  /* Analyze panel — sits above the decks once all four are settled */
  .analyze-panel{
    max-width:560px;margin:0 auto 6px;padding:10px 14px 4px;
    border:1px solid var(--stroke);border-radius:16px;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01)),var(--panel);
    animation:fadein .25s ease;
  }
  .analyze-panel[hidden]{display:none}
  .summary-body{padding:0 1rem 1rem;color:var(--ink)}
  .summary-body h3{
    margin:.9rem 0 .4rem;text-align:center;
    font:600 .85rem/1 ui-serif,Georgia,serif;
    color:var(--sky);text-transform:uppercase;letter-spacing:.6px;
  }
  .summary-body .empty-line{color:var(--muted);font-style:italic;font-size:.88rem;margin:.3rem 0 .6rem;text-align:center}

  /* Fields-stage time stats */
  .sum-stats{display:flex;gap:1.4rem;justify-content:center;flex-wrap:wrap;margin:.5rem 0 .2rem}
  .ss-item{display:flex;flex-direction:column;align-items:center;gap:2px}
  .ss-item .ss-k{font:600 .66rem/1 system-ui,sans-serif;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .ss-item .ss-v{font:700 1.05rem/1 system-ui,sans-serif;color:var(--ink)}
  .ss-item.ss-hi .ss-v{color:var(--sky)}

  /* last-selected square snapshot (read-only) */
  .sum-snapshot{display:flex;justify-content:center;margin:.3rem 0 .6rem}
  .sum-snapshot .square{pointer-events:none}

  /* related apps sit two rows below the nav buttons */
  #related-wrap .related-apps:not([hidden]){margin-top:2.4rem}

  /* ---- summary tables ---- */
  .sum-table{
    width:100%;border-collapse:collapse;margin:.2rem 0 .4rem;
    font:500 .84rem/1.3 system-ui,sans-serif;
  }
  .sum-table th,.sum-table td{
    border:1px solid var(--stroke);padding:.4rem .55rem;text-align:center;
  }
  .sum-table thead th{
    background:rgba(255,255,255,.06);color:var(--sky);
    font-weight:700;text-transform:uppercase;letter-spacing:.4px;font-size:.74rem;
  }
  .sum-table tbody th{
    background:rgba(250,220,146,.08);color:var(--gold);font-weight:700;
    white-space:nowrap;text-align:left;
  }
  .sum-table td{color:var(--ink)}
  .sum-table td.dim{color:var(--muted)}
  .sum-table td.top{background:rgba(0,247,167,.1);font-weight:600}
  .sum-table-wrap{overflow-x:auto}

  /* ---- analyses (shown directly) ---- */
  .analysis{
    margin:.6rem 0;padding:.7rem .8rem;
    border:1px solid var(--stroke);border-radius:12px;
    background:linear-gradient(180deg,rgba(255,255,255,.03),transparent);
    animation:fadein .25s ease;
  }
  .analysis[hidden]{display:none}
  .analysis h4{
    margin:0 0 .5rem;text-align:center;
    font:700 .82rem/1 ui-serif,Georgia,serif;color:var(--accent);
    text-transform:uppercase;letter-spacing:.5px;
  }
  .analysis .note{color:var(--muted);font-size:.82rem;text-align:center;margin:.4rem 0 0}

  /* ---- related apps ---- */
  .related-apps{
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:.8rem;
    animation:fadein .25s ease;
  }
  .related-apps[hidden]{display:none}
  .related-card{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    min-width:84px;padding:.7rem .8rem;border-radius:14px;
    border:1px solid var(--stroke);background:rgba(255,255,255,.04);
    color:var(--ink);text-decoration:none;
    transition:transform .15s ease, border-color .2s ease, background .2s ease;
  }
  .related-card:hover{transform:translateY(-2px);border-color:var(--accent);background:rgba(255,95,220,.08)}
  .related-card .rc-mark{font:700 1.3rem/1 ui-serif,Georgia,serif;color:var(--gold)}
  .related-card .rc-name{font:600 .82rem/1 system-ui,sans-serif}
  /* related apps: 3 first, then ＋ reveals 6 more (full-width rows force wrap) */
  .ra-more-row{display:flex;justify-content:center;width:100%;margin-top:.2rem}
  .ra-more-btn{
    width:34px;height:34px;border-radius:999px;cursor:pointer;
    font:700 1rem/1 system-ui,sans-serif;
    border:1px solid var(--stroke);background:rgba(255,255,255,.04);color:var(--sky);
    transition:border-color .2s ease, color .2s ease, transform .15s ease;
  }
  .ra-more-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
  .related-more{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%}
  .related-more[hidden]{display:none}

  /* ---- Ordinals: selected decks with order arrows within each ---- */
  .ord-decks{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .ord-deck{
    min-width:118px;padding:.5rem .6rem;border:1px solid var(--stroke);border-radius:12px;
    background:rgba(255,255,255,.03);
  }
  .ord-deck .od-title{
    font:700 .74rem/1 ui-serif,Georgia,serif;color:var(--gold);text-align:center;
    margin:0 0 .4rem;text-transform:uppercase;letter-spacing:.4px;
  }
  .ord-deck ol{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;align-items:center}
  .ord-deck li{font-size:.82rem;color:var(--ink);text-align:center;padding:.14rem .3rem}
  .ord-deck li:not(:first-child)::before{
    content:"↓";display:block;color:var(--accent);font-size:.78rem;opacity:.7;line-height:1.1;
  }

  /* ---- Perspective: bar(s) above the decks (+ add), selection below ---- */
  .persp-above{display:flex;flex-direction:column;gap:7px;align-items:center;margin-bottom:.7rem}
  .persp-bar{
    display:flex;align-items:center;gap:8px;width:100%;max-width:440px;
    padding:.4rem .6rem;border:1px solid var(--stroke);border-radius:10px;
    background:rgba(168,228,255,.06);
  }
  .persp-bar .pb-tag{font:700 .72rem/1 system-ui,sans-serif;color:var(--sky);white-space:nowrap}
  .persp-bar input{
    flex:1;min-width:0;background:transparent;border:0;border-bottom:1px solid var(--stroke);
    color:var(--ink);font:inherit;font-size:.84rem;padding:.2rem 0;
  }
  .persp-bar input:focus{outline:none;border-color:var(--accent)}
  .persp-add{
    align-self:center;cursor:pointer;font:700 .78rem/1 system-ui,sans-serif;
    padding:.4rem .9rem;border-radius:999px;border:1px dashed var(--stroke);
    background:transparent;color:var(--sky);
  }
  .persp-add:hover{border-color:var(--accent);color:var(--accent)}
  .persp-below{margin-top:.7rem;display:flex;flex-direction:column;gap:8px;align-items:center}
  .persp-below .pb-cap{
    font:700 .66rem/1 system-ui,sans-serif;color:var(--muted);
    text-transform:uppercase;letter-spacing:.12em;
  }
  .psel-deck{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
  .psel-chip{
    cursor:pointer;font-size:.78rem;padding:.32rem .65rem;border-radius:999px;
    border:1px solid var(--stroke);background:rgba(255,255,255,.04);color:var(--ink);
    transition:border-color .15s ease, background .15s ease, color .15s ease;
  }
  .psel-chip:hover{border-color:var(--accent)}
  .psel-chip.sel{background:var(--accent);border-color:var(--accent);color:#1a1a28}

  /* ============== Floating arcade counters (bottom-left) ============== */
  .float-counters{
    position:fixed;left:14px;bottom:14px;z-index:80;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    pointer-events:none;
  }
  .pc{pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:3px}
  .pc.is-empty{display:none}
  .pc-badge{
    position:relative;display:grid;place-items:center;
    background:#3a3a52;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,.45));
  }
  .pc-badge::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,var(--c1),var(--c2));
    opacity:1;
  }
  .pc-clicks .pc-badge{
    width:56px;height:56px;
    --c1:#fb923c; --c2:#ea580c;
    clip-path:polygon(100% 50%, 93.3% 75%, 75% 93.3%, 50% 100%, 25% 93.3%, 6.7% 75%, 0% 50%, 6.7% 25%, 25% 6.7%, 50% 0%, 75% 6.7%, 93.3% 25%);
  }
  .pc-sel .pc-badge{
    width:72px;height:64px;
    --c1:#fdba74; --c2:#c2410c;
    clip-path:polygon(50% 0%, 100% 100%, 0% 100%);
  }
  .pc-stars .pc-badge{
    width:66px;height:62px;
    --c1:#f59e0b; --c2:#b45309;
    clip-path:polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  }
  .pc-num{
    position:relative;z-index:1;
    font:900 1.25rem/1 Georgia,'Times New Roman',serif;
    color:#2e1b12;text-shadow:0 1px 1px rgba(255,255,255,.45);
  }
  .pc-sel .pc-num{font-size:1rem;transform:translateY(12px)}
  .pc-stars .pc-num{font-size:1.05rem;transform:translateY(3px)}
  .pc-label{
    font:800 .56rem/1 system-ui,sans-serif;
    text-transform:uppercase;letter-spacing:.12em;
    color:var(--muted);
  }
  .pc.pulse .pc-badge{animation:ptPop .42s cubic-bezier(.2,1.6,.4,1)}
  @keyframes ptPop{0%{transform:scale(1)}45%{transform:scale(1.16)}100%{transform:scale(1)}}

  /* elapsed-time chip (souls/keys-style) */
  .pc-time .pc-time-display{
    display:flex;align-items:center;gap:5px;
    background:#3a3a52;border:1px solid var(--stroke);
    padding:7px 12px;border-radius:999px;cursor:pointer;color:var(--ink);
    filter:drop-shadow(0 2px 6px rgba(0,0,0,.45));
    transition:padding .15s ease;
  }
  .pc-time .pc-time-display:hover{border-color:var(--sky)}
  .pc-time .pc-time-icon{font-size:1rem}
  .pc-time .pc-time-num{font:800 1rem/1 Georgia,serif;color:var(--sky)}
  /* collapsed (default): just the ⏱ icon; click to reveal/hide the time */
  .pc-time.is-collapsed .pc-time-num{display:none}
  .pc-time.is-collapsed .pc-time-display{padding:7px 10px}
  .pc-time.is-collapsed .pc-label{display:none}
  /* Embedded mode (loaded as keys-advanced.html Stage 5 via #embed): hide the menu and
     fivy's own summary; keep the decks selection + ordering. */
  body.embed .topbar,
  body.embed .flove-bar,
  body.embed #summary-sec,
  body.embed .summary-sec,
  body.embed .analyze-panel{ display:none !important; }
  body.embed{ background:transparent; }

  /* ===== ✦ summary actions (ported from blogyadvanced; Views omitted) ===== */
  .summary-actions{ margin-top:1.1rem; }
  .ctl{ position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
  .summary-actions .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:.3rem;
    height:31px; padding:0 .55rem; border-radius:8px;
    border:1px solid var(--stroke); background:transparent; color:var(--muted);
    font:600 .72rem/1 system-ui,sans-serif; cursor:pointer; white-space:nowrap;
    text-decoration:none; transition:background .15s ease,color .15s ease,border-color .15s ease;
  }
  .summary-actions .btn:hover{ color:var(--ink); border-color:var(--accent); }
  .summary-actions .btn.solid{ background:var(--accent); color:#260a1f; border-color:var(--accent); }

  /* generated phrase */
  .summary-actions .clause{
    display:block; margin:.4rem auto .7rem; max-width:560px; padding:.6rem .85rem;
    border:1px solid var(--stroke); border-radius:12px; background:rgba(255,255,255,.03);
    color:var(--ink); font:500 .95rem/1.5 ui-serif,Georgia,serif; text-align:center;
  }
  .summary-actions .clause-magic{ display:none; }
  body:has(#magic-toggle:checked) .summary-actions .clause-default{ display:none; }
  body:has(#magic-toggle:checked) .summary-actions .clause-magic{ display:block; }
  .magic-btn-summary .label-on{ display:none; }
  body:has(#magic-toggle:checked) .magic-btn-summary .label-off{ display:none; }
  body:has(#magic-toggle:checked) .magic-btn-summary .label-on{ display:inline; }
  body:has(#magic-toggle:checked) .summary-actions .magic-btn-summary{ background:var(--accent); color:#260a1f; border-color:var(--accent); }

  /* insight cycle (0 empty + 4 texts) */
  .insight-cycle{ display:inline-flex; position:relative; }
  .insight-step{ display:none !important; }
  body:has(#insight-0:checked) .insight-step:nth-child(1),
  body:has(#insight-1:checked) .insight-step:nth-child(2),
  body:has(#insight-2:checked) .insight-step:nth-child(3),
  body:has(#insight-3:checked) .insight-step:nth-child(4),
  body:has(#insight-4:checked) .insight-step:nth-child(5){ display:inline-flex !important; }
  body:has(#insight-1:checked) .insight-step:nth-child(2),
  body:has(#insight-2:checked) .insight-step:nth-child(3),
  body:has(#insight-3:checked) .insight-step:nth-child(4),
  body:has(#insight-4:checked) .insight-step:nth-child(5){ background:var(--accent); color:#260a1f; border-color:var(--accent); }
  .insight-panel{ display:none; max-width:560px; margin:.2rem auto .6rem; padding:.6rem .85rem; border-radius:10px; border:1px dashed var(--stroke); background:rgba(199,164,255,.08); color:var(--ink); font-size:.86rem; line-height:1.5; text-align:center; }
  .insight-panel .insight-text{ display:none; }
  body:has(#insight-1:checked) .insight-panel,
  body:has(#insight-2:checked) .insight-panel,
  body:has(#insight-3:checked) .insight-panel,
  body:has(#insight-4:checked) .insight-panel{ display:block; }
  body:has(#insight-1:checked) .insight-panel .insight-text:nth-child(1),
  body:has(#insight-2:checked) .insight-panel .insight-text:nth-child(2),
  body:has(#insight-3:checked) .insight-panel .insight-text:nth-child(3),
  body:has(#insight-4:checked) .insight-panel .insight-text:nth-child(4){ display:block; }

  /* copy */
  .copy-hint-panel{ display:none; max-width:560px; margin:.2rem auto .6rem; padding:.6rem .85rem; border-radius:10px; background:rgba(0,0,0,.18); border:1px dashed var(--stroke); color:var(--muted); font-size:.82rem; line-height:1.5; text-align:center; }
  .copy-hint-panel kbd{ display:inline-block; padding:1px 6px; margin:0 1px; font:600 .76rem/1 system-ui,sans-serif; background:var(--panel); border:1px solid var(--stroke); border-bottom-width:2px; border-radius:4px; color:var(--ink); }
  body:has(#copy-hint:checked) .copy-hint-panel{ display:block; }
  body:has(#copy-hint:checked) .summary-actions .copy-btn{ background:var(--accent); color:#260a1f; border-color:var(--accent); }

  /* rows */
  .summary-actions .action-row{ display:flex; flex-wrap:wrap; gap:.5rem; justify-content:center; margin:.3rem 0; }
  .summary-actions .action-row.right{ justify-content:space-between; align-items:flex-start; padding:calc(25px + .35rem) 0; flex-wrap:nowrap; gap:.35rem; }

  /* save / share / publish cycles */
  .save-wrap,.share-wrap,.pub-wrap{ position:relative; display:inline-flex; flex-direction:column; }
  .save-wrap{ align-items:flex-start; }
  .share-wrap{ align-items:center; }
  .pub-wrap{ align-items:flex-end; }
  .cycle-trigger{ position:relative; display:inline-flex; align-items:center; }
  .cycle-step{ display:none !important; }
  .summary-actions .save-btn,.summary-actions .share-btn,.summary-actions .publish-btn{ height:28px; }
  body:not(:has(#cycle-save:checked))  .save-wrap  .cycle-step--open,
  body:not(:has(#cycle-pub:checked))   .pub-wrap   .cycle-step--open,
  body:not(:has(#cycle-share:checked)) .share-wrap .cycle-step--open{ display:inline-flex !important; }
  body:has(#cycle-save:checked)  .save-wrap  .cycle-step--close,
  body:has(#cycle-pub:checked)   .pub-wrap   .cycle-step--close,
  body:has(#cycle-share:checked) .share-wrap .cycle-step--close{ display:inline-flex !important; }
  body:has(#cycle-save:checked)  .summary-actions .save-btn,
  body:has(#cycle-share:checked) .summary-actions .share-btn,
  body:has(#cycle-pub:checked)   .summary-actions .publish-btn{ background:var(--accent); color:#260a1f; border-color:var(--accent); }

  .cycle-row{ position:absolute; display:inline-flex; flex-wrap:nowrap; gap:.25rem; white-space:nowrap; visibility:hidden; }
  .cycle-row.below{ top:calc(100% + .35rem); }
  .save-wrap  .cycle-row{ left:0; justify-content:flex-start; }
  .pub-wrap   .cycle-row{ right:0; justify-content:flex-end; }
  .share-wrap .cycle-row{ left:50%; transform:translateX(-50%); justify-content:center; }
  .cycle-row .btn{ height:22px; padding:0 .5rem; font-size:.72rem; border-radius:6px; }
  body:has(#cycle-save:checked)  .save-wrap  .cycle-row,
  body:has(#cycle-share:checked) .share-wrap .cycle-row,
