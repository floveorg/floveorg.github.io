<script>
(() => {
  // Embedded inside keys-advanced.html Stage 5 (loaded with #embed): hides the menu and
  // fivy's own summary, and turns the post-decks "Fields →" into "Next →" which
  // hands the ordered decks back to the parent (keys) instead of opening fields.
  const EMBED = location.hash.indexOf('embed') !== -1;
  if (EMBED) document.body.classList.add('embed');
  // A reload — or a back/forward bfcache restore — must start clean (no prior
  // selections, orderings or typed inputs). State is in-memory, so a fresh load
  // already resets; this defeats the browser's bfcache restoring the old page.
  window.addEventListener('pageshow', e => { if (e.persisted) location.reload(); });
  // ============== Fivy decks (pathologies excluded) ==============
  const DECKS = [
    { id:'p1', title:'Senses',   items:['Taste','Smell','Hearing','Touch','Sight'] },
    { id:'p2', title:'Flavors',  items:['Acid','Sour','Sweet','Umami','Salty'] },
    { id:'p3', title:'Social',   items:['Economy','Judicial','Media','Military','Political'] },
    { id:'p4', title:'Elements', items:['Water','Air','Fire','Plasma','Earth'] },
    // p5: a blank fifth deck the player fills, titles and orders — revealed after the first four
    { id:'p5', title:'', items:['','','','',''], custom:true },
  ];
  const BASE4 = ['p1','p2','p3','p4'];
  const base4Done = () => BASE4.every(id => state.done[id]);

  const state = {
    openDeckIdx: null,
    orders: {},          // deckId -> [item idx]
    done: {},            // deckId -> bool
    porQues: {},         // deckId -> [{ orderSig, text, ts }]
    porQuePanelOpen: false,
    porQueDraft: '',
    dragSrcPos: null,
  };
  DECKS.forEach(d => { state.orders[d.id] = d.items.map((_,i)=>i); });

  const $board     = document.getElementById('board');
  const $spotlight = document.getElementById('spotlight');
  const $cta       = document.getElementById('stage-cta');
  const $progress  = document.getElementById('stage-progress');
  const $deckProg  = document.getElementById('deck-progress');
  const $stage     = document.getElementById('fivys-stage');
  const $fields    = document.getElementById('fields');

  const escapeHTML = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const orderSig = id => state.orders[id].join(',');
  const matchingWhy = id => (state.porQues[id]||[]).find(p => p.orderSig === orderSig(id));
  const lastWhy = id => { const a = state.porQues[id]||[]; return a.length ? a[a.length-1] : null; };
  // embed (keys Stage 5) keeps the original 4-deck flow; standalone also needs the 5th
  const allDone = () => (EMBED ? BASE4 : DECKS.map(d => d.id)).every(id => state.done[id]);

  // ============== Render ==============
  function render(){
    renderBoard();
    renderSpotlight();
    renderCTA();
    updateDeckProgress();
    updateStep4();
  }

  // Sub progress bar: fills left→right, one more segment per deck settled.
  // (Leaves the appended analyze sub-segments .an alone.)
  function updateDeckProgress(){
    const segs = $deckProg.querySelectorAll('.dseg:not(.an)');
    const doneCount = DECKS.filter(d => state.done[d.id]).length;
    segs.forEach((seg, i) => {
      seg.classList.toggle('done', i < doneCount);
      seg.classList.toggle('current', i === doneCount && state.openDeckIdx !== null);
    });
  }

  // Summary visibility is handled by the view switcher (setView); this hook is
  // kept as a no-op so the render() pipeline stays unchanged.
  function updateStep4(){}

  function renderBoard(){
    $board.innerHTML = '';
    // Embed (keys Stage 5) still collapses to hand the 4 decks back. Standalone keeps the
    // row of decks visible once all are settled and simply shows the Fields button below.
    if (EMBED && allDone() && state.openDeckIdx === null){ $board.style.display = 'none'; return; }
    $board.style.display = '';
    DECKS.forEach((deck, deckIdx) => {
      if (deck.id === 'p5' && EMBED) return;          // no fifth deck in embed
      const slot = document.createElement('div');
      slot.className = 'slot';
      if (deck.id === 'p5' && !base4Done()){
        // the fifth deck holds the last space in the row, locked until the first four settle
        slot.classList.add('locked');
        slot.textContent = '5th';
      } else if (state.openDeckIdx === deckIdx){
        slot.classList.add('placeholder');
        slot.textContent = 'in the center ↑';
      } else if (state.done[deck.id]){
        slot.appendChild(renderDoneDeck(deckIdx));
      } else {
        slot.appendChild(renderClosedDeck(deckIdx));
      }
      $board.appendChild(slot);
    });
  }

  function renderClosedDeck(deckIdx){
    const btn = document.createElement('button');
    btn.className = 'deck-closed';
    btn.setAttribute('aria-label', 'Face-down deck · tap to reveal');
    const d = DECKS[deckIdx];
    btn.innerHTML = `
      <div class="back back-1"></div>
      <div class="back back-2"></div>
      <div class="back back-3"></div>
      <div class="mark${d.custom ? '' : ' logo'}">${d.custom ? '✎' : '<svg class="fivy-logo" viewBox="0 0 100 100" aria-hidden="true"><g fill="url(#brandGrad)" stroke="none"><g transform="rotate(0 50 50)"><ellipse cx="50" cy="26" rx="6.5" ry="17"/></g><g transform="rotate(72 50 50)"><ellipse cx="50" cy="26" rx="6.5" ry="17"/></g><g transform="rotate(288 50 50)"><ellipse cx="50" cy="26" rx="6.5" ry="17"/></g><circle cx="50" cy="50" r="4.5"/></g></svg>'}</div>
      <div class="hint">${escapeHTML(d.title || (d.custom ? 'New fivy' : ''))}</div>
    `;
    btn.addEventListener('click', () => openDeck(deckIdx));
    return btn;
  }

  function makeExpandableWhy(text, stale){
    const pq = document.createElement('div');
    pq.className = 'pq-saved' + (stale ? ' stale' : '');
    pq.textContent = text;
    pq.setAttribute('role','button');
    pq.setAttribute('tabindex','0');
    pq.title = 'tap to expand';
    pq.addEventListener('click', e => { e.stopPropagation(); pq.classList.toggle('expanded'); });
    pq.addEventListener('keydown', e => {
      if (e.key==='Enter'||e.key===' '){ e.preventDefault(); pq.classList.toggle('expanded'); }
    });
    return pq;
  }

  function renderDoneDeck(deckIdx){
    const deck = DECKS[deckIdx];
    const order = state.orders[deck.id];
    const el = document.createElement('div');
    el.className = 'deck-done';
    el.setAttribute('role','button');
    el.setAttribute('tabindex','0');
    el.title = 'tap to reopen';
    el.addEventListener('click', e => {
      if (e.target.closest('.pq-saved')) return;
      openDeck(deckIdx);
    });
    el.addEventListener('keydown', e => {
      if (e.key==='Enter'||e.key===' '){ e.preventDefault(); openDeck(deckIdx); }
    });
    const t = document.createElement('div');
    t.className = 'deck-title';
    t.textContent = deck.title;
    el.appendChild(t);
    const list = document.createElement('ol');
    order.forEach(itemIdx => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="nm">${escapeHTML(deck.items[itemIdx])}</span>`;
      list.appendChild(li);
    });
    el.appendChild(list);
    const match = matchingWhy(deck.id);
    const last  = lastWhy(deck.id);
    if (match) el.appendChild(makeExpandableWhy(match.text, false));
    else if (last) el.appendChild(makeExpandableWhy(last.text, true));
    return el;
  }

  function renderSpotlight(){
    if (state.openDeckIdx === null){
      $spotlight.classList.remove('active');
      $spotlight.innerHTML = '';
      return;
    }
    const deckIdx = state.openDeckIdx;
    const deck    = DECKS[deckIdx];
    const match   = matchingWhy(deck.id);

    $spotlight.classList.add('active');
    $spotlight.innerHTML = `
      ${deck.custom ? `<input id="deck-title" class="deck-title-input" maxlength="32" placeholder="Title your fivy…" value="${escapeHTML(deck.title)}">` : ''}
      <div class="hand fivy${deck.custom ? ' custom' : ''}" id="hand"></div>
      <div class="pq-panel" id="pq-panel">
        <textarea id="pq-text" placeholder="Write why you placed this key in this order…">${escapeHTML(state.porQueDraft || (match ? match.text : ''))}</textarea>
        <div class="pq-row">
          <button class="btn btn-ghost" id="pq-cancel" type="button">Cancel</button>
          <button class="btn btn-primary" id="pq-save" type="button">Save why</button>
        </div>
      </div>
      <div class="spot-actions">
        <button class="btn btn-soft" id="pq-toggle" type="button">${match ? 'Why (edit)' : 'Why'}</button>
        <button class="btn btn-primary" id="done-btn" type="button">Done</button>
      </div>
    `;

    renderHand(deck, state.orders[deck.id]);

    if (deck.custom){
      const $dt = $spotlight.querySelector('#deck-title');
      if ($dt) $dt.addEventListener('input', e => { deck.title = e.target.value; });
    }

    const $panel = $spotlight.querySelector('#pq-panel');
    const $toggle = $spotlight.querySelector('#pq-toggle');
    if (state.porQuePanelOpen){ $panel.classList.add('active'); $toggle.classList.add('is-open'); }

    $spotlight.querySelector('#done-btn').addEventListener('click', () => doneDeck(deckIdx));
    $toggle.addEventListener('click', () => {
      state.porQuePanelOpen = !state.porQuePanelOpen;
      renderSpotlight();
    });
    const $text = $spotlight.querySelector('#pq-text');
    $text.addEventListener('input', () => { state.porQueDraft = $text.value; });
    $spotlight.querySelector('#pq-cancel').addEventListener('click', () => {
      state.porQuePanelOpen = false;
      state.porQueDraft = '';
      renderSpotlight();
    });
    $spotlight.querySelector('#pq-save').addEventListener('click', () => {
      const txt = $text.value.trim();
      if (!txt){ $text.focus(); return; }
      saveWhy(deck.id, txt);
    });
    // (no auto-scroll: the sticky play-area already keeps the spotlight in view,
    //  and scrolling here yanked the page — making the go-back jump.)
  }

  function renderHand(deck, order){
    const $hand = $spotlight.querySelector('#hand');
    $hand.innerHTML = '';
    order.forEach((itemIdx, pos) => {
      const card = document.createElement('div');
      card.className = 'pcard';
      card.setAttribute('draggable', deck.custom ? 'false' : 'true');   // custom: reorder by arrows
      card.setAttribute('data-pos', String(pos));
      card.setAttribute('role','listitem');
      card.setAttribute('aria-label', `${deck.items[itemIdx]} · position ${pos+1}`);
      const isFirst = pos === 0;
      const isLast  = pos === order.length - 1;
      const leftArrow  = `<button data-action="left"  aria-label="Move left"  title="← one position">←</button>`;
      const rightArrow = `<button data-action="right" aria-label="Move right" title="one position →">→</button>`;
      // middle cards (2,3,4) get both arrows; ends get only the valid direction
      const arrowHTML =
        isFirst ? rightArrow :
        isLast  ? leftArrow  :
        (leftArrow + rightArrow);
      const nameHTML = deck.custom
        ? `<input class="pcard-input" maxlength="28" placeholder="rank ${pos+1}" value="${escapeHTML(deck.items[itemIdx])}">`
        : `<div class="name">${escapeHTML(deck.items[itemIdx])}</div>`;
      card.innerHTML = `
        ${nameHTML}
        <div class="arrows">${arrowHTML}</div>
      `;
      if (deck.custom){
        const inp = card.querySelector('.pcard-input');
        inp.addEventListener('input', e => { deck.items[itemIdx] = e.target.value; });
        inp.addEventListener('click', e => e.stopPropagation());
      }
      const leftBtn  = card.querySelector('[data-action="left"]');
      const rightBtn = card.querySelector('[data-action="right"]');
      if (leftBtn)  leftBtn .addEventListener('click', e => { e.stopPropagation(); moveByDelta(deck.id, pos, -1); });
      if (rightBtn) rightBtn.addEventListener('click', e => { e.stopPropagation(); moveByDelta(deck.id, pos, +1); });

      card.addEventListener('dragstart', e => {
        state.dragSrcPos = pos;
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', String(pos)); } catch(_){}
        card.classList.add('dragging');
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        $hand.querySelectorAll('.pcard.drag-over').forEach(el => el.classList.remove('drag-over'));
        state.dragSrcPos = null;
      });
      card.addEventListener('dragover', e => {
        if (state.dragSrcPos === null) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        card.classList.add('drag-over');
      });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', e => {
        e.preventDefault();
        card.classList.remove('drag-over');
        const src = state.dragSrcPos;
        if (src === null || src === pos) return;
        const ord = state.orders[deck.id];
        const [item] = ord.splice(src, 1);
        ord.splice(pos, 0, item);
        state.dragSrcPos = null;
        renderHand(deck, ord);
      });
      $hand.appendChild(card);
    });
  }

  function moveByDelta(deckId, pos, delta){
    const ord = state.orders[deckId];
    const to = pos + delta;
    if (to < 0 || to >= ord.length) return;
    [ord[pos], ord[to]] = [ord[to], ord[pos]];
    if (state.openDeckIdx !== null && DECKS[state.openDeckIdx].id === deckId){
      renderHand(DECKS[state.openDeckIdx], ord);
    }
  }

  function openDeck(deckIdx){
    flushDeckTime();              // bank any currently-open deck's time first
    state.openDeckIdx = deckIdx;
    _openTs = Date.now();         // start timing this deck
    state.porQuePanelOpen = false;
    state.porQueDraft = '';
    render();
  }

  function doneDeck(deckIdx){
    const deck = DECKS[deckIdx];
    const id = deck.id;
    // the custom fifth deck must be titled and have all five cards filled in
    if (deck.custom){
      const emptyIdx = deck.items.findIndex(v => !(v||'').trim());
      if (!(deck.title||'').trim()){
        const dt = $spotlight.querySelector('#deck-title'); if (dt) dt.focus();
        return;
      }
      if (emptyIdx !== -1){
        const inp = $spotlight.querySelectorAll('.pcard-input')[state.orders[id].indexOf(emptyIdx)];
        if (inp) inp.focus();
        return;
      }
    }
    const wasDone = state.done[id];
    flushDeckTime();              // bank the time spent on this deck
    state.done[id] = true;
    if (!wasDone) bumpCounter('selections');
    state.openDeckIdx = null;
    state.porQuePanelOpen = false;
    state.porQueDraft = '';
    render();
  }

  function saveWhy(deckId, text){
    state.porQues[deckId] = state.porQues[deckId] || [];
    const sig = orderSig(deckId);
    const existing = state.porQues[deckId].find(p => p.orderSig === sig);
    if (existing){ existing.text = text; existing.ts = Date.now(); }
    else { state.porQues[deckId].push({ orderSig: sig, text, ts: Date.now() }); bumpCounter('stars'); }
    state.porQuePanelOpen = false;
    state.porQueDraft = '';
    renderSpotlight();
  }

  function renderCTA(){
    $cta.innerHTML = '';
    if (state.openDeckIdx !== null) return;
    if (!allDone()) return;
    const next = document.createElement('button');     // go-back now lives above the summary
    next.className = 'btn btn-primary';
    if (EMBED){
      // Stage 5 inside keys: "Next" hands the ordered decks back to the parent.
      next.textContent = 'Next →';
      next.addEventListener('click', sendDecksToParent);
    } else {
      next.textContent = 'Fields →';
      next.addEventListener('click', enterFields);
    }
    $cta.appendChild(next);
  }
  // Post the settled, ordered decks up to keys-advanced.html (Stage 5).
  function sendDecksToParent(){
    const decks = settledDecks().map(d => ({ title: d.title, items: deckRanked(d) }));
    try { parent.postMessage({ type: 'fivy-next', decks }, '*'); } catch (e) {}
  }

  // ============== Stage views: decks · fields · summary ==============
  // Exactly one view is shown at a time. The summary is its own final stage —
  // it is NOT displayed alongside decks/fields anymore.
  function setView(view){
    $introSlider.classList.add('hidden');
    $stage.style.display = (view === 'decks') ? '' : 'none';
    $fields.classList.toggle('active', view === 'fields');
    if ($decksBackRow)  $decksBackRow.style.display  = (view === 'decks')   ? '' : 'none';
    if ($fieldsNavRow)  $fieldsNavRow.style.display  = (view === 'fields')  ? '' : 'none';
    if ($summarySec){   $summarySec.style.display    = (view === 'summary') ? '' : 'none'; $summarySec.open = true; }
    if ($relatedWrap)   $relatedWrap.style.display   = (view === 'summary') ? '' : 'none';
    // the 4-deck sub-progress belongs to the Decks stage only (Fields/Summary have no substeps)
    if ($deckProg) $deckProg.style.display = (view === 'decks') ? '' : 'none';
    setProgress(view === 'decks' ? 0 : view === 'fields' ? 1 : 2);
    window.scrollTo({ top:0, behavior:'smooth' });
  }
  function showDecks(){
    setView('decks');
    updateDeckProgress();    // sub-bar reflects settled decks
  }
  function enterFields(){
    if (!timer.tFields) timer.tFields = Date.now();   // split decks-time vs fields-time
    renderNested();   // the settled decks become toggle buttons here
    setView('fields');
    applyGrowth();    // toolbar is now visible → size the square to its height
    // Fields is its own stage with no substeps — the deck sub-bar stays hidden here.
  }
  function enterSummary(){
    timer.tSummary = Date.now();   // freeze the fields-stage clock for the summary stats
    paintSummary();
    setView('summary');
  }
  // Light the first N sub-segments (used when a new stage opens: N = 1).
  function setDeckSubProgress(cur){
    $deckProg.querySelectorAll('.dseg:not(.an)').forEach((seg, i) => {
      seg.classList.toggle('done', i < cur - 1);
      seg.classList.toggle('current', i === cur - 1);
    });
  }
  function setProgress(cur){
    // leave the appended analyze segment (.an) untouched
    $progress.querySelectorAll('.seg:not(.an)').forEach((s, i) => {
      s.classList.toggle('done', i < cur);
      s.classList.toggle('current', i === cur);
    });
    $progress.setAttribute('aria-valuenow', String(cur + 1));
  }

  // ============== Elapsed timer ==============
  const timer = { t0:0, tFields:0, tSummary:0, handle:null };
  // per-deck active time: accumulates while a deck is open in the spotlight
  const deckTime = {};   // deckId -> ms
  let _openTs = 0;
  function flushDeckTime(){
    if (state.openDeckIdx !== null && _openTs){
      const id = DECKS[state.openDeckIdx].id;
      deckTime[id] = (deckTime[id] || 0) + (Date.now() - _openTs);
    }
    _openTs = 0;
  }
  const fmtTime = ms => {
    const s = Math.max(0, Math.floor(ms/1000));
    return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
  };
  function paintTime(){
    if (!timer.t0) return;
    const num = document.getElementById('pointsTime');
    if (num) num.textContent = fmtTime(Date.now() - timer.t0);
    const chip = document.getElementById('chipTime');
    if (chip) chip.classList.remove('is-empty');
    paintFivysTable();   // keep the Summary's per-deck Time column live
  }
  function startTimer(){
    if (timer.t0) return;                 // already running
    timer.t0 = Date.now();
    paintTime();
    timer.handle = setInterval(paintTime, 1000);
  }
  // hidden by default; click toggles the time open / closed
  document.getElementById('timeToggle').addEventListener('click', () => {
    document.getElementById('chipTime').classList.toggle('is-collapsed');
  });

  // ============== Intro slider (3 slides → Go play) ==============
  const $introSlider = document.getElementById('intro-slider');
  const $summarySec  = document.getElementById('summary-sec');
  // Per-view footer rows / summary. setView() (above) shows exactly one set of
  // these; hideAllViews() blanks them for the intro.

  }
  const CUSTOMIZE_HTML = `

  const INTRO_SLIDES = [
    { t:"Five isn't too little nor too much", b:'Why do we have 5 senses otherwise?' },
    { t:'Order senses and other popular high 5s', b:'…in more ways than just 5.' },
    { t:'Get yourself a comfy space', b:'Check the options below for more.', extra: CUSTOMIZE_HTML },
  ];
  let introSlide = 0, introObserver = null;

  function renderIntro(){
    const $track = document.getElementById('intro-track');
    const $dots  = document.getElementById('intro-dots');
    $track.innerHTML = ''; $dots.innerHTML = '';
    INTRO_SLIDES.forEach((s, i) => {
      const slide = document.createElement('div');
      slide.className = 'intro-slide';
      slide.dataset.idx = String(i);
      slide.innerHTML = `<div class="step-num">${i+1} / ${INTRO_SLIDES.length}</div><h2>${s.t}</h2><p>${s.b}</p>${s.extra || ''}`;
      $track.appendChild(slide);
      const dot = document.createElement('button');
      dot.type = 'button';

      dot.setAttribute('aria-label', `Slide ${i+1}`);
      dot.addEventListener('click', () => gotoSlide(i));

    introObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting && entry.intersectionRatio > 0.6){
          introSlide = parseInt(entry.target.dataset.idx, 10);
          updateIntroUI();
        }
      });
    }, { root: $track, threshold: 0.6 });
    $track.querySelectorAll('.intro-slide').forEach(s => introObserver.observe(s));
    wireCustomize();
    updateIntroUI();
  }
  // Customize button on the last intro slide — toggles the options panel
  // (same behaviour as souls.html: expand/collapse + Private reveals download).
  function wireCustomize(){
    const btn = document.getElementById('customizeBtn');
    const panel = document.getElementById('customizePanel');
    if (!btn || !panel || btn.dataset.wired) return;
    btn.dataset.wired = '1';
    // expand / collapse the whole panel
    btn.addEventListener('click', () => {
      const open = panel.hidden;
      panel.hidden = !open;
      btn.setAttribute('aria-expanded', String(open));
    });
    // Private mode reveals the download button
    const dl = document.getElementById('custDownload');
    panel.querySelectorAll('input[name="custMode"]').forEach(r => {
      r.addEventListener('change', () => { if (r.checked && dl) dl.hidden = r.value !== 'private'; });
    });
    // progress-bar pickers: click a node → fill up to it, mark the rest done/on
    panel.querySelectorAll('.cert-track').forEach(track => {
      const nodes = [...track.querySelectorAll('.cert-node')];
      const fill  = track.querySelector('.cert-fill');
      const apply = idx => {
        nodes.forEach((nd, i) => { nd.classList.toggle('is-done', i < idx); nd.classList.toggle('is-on', i === idx); });
        if (fill) fill.style.width = nodes.length > 1 ? `calc((100% - 1.4rem) * ${idx / (nodes.length - 1)})` : '0';
        track.setAttribute('aria-valuenow', String(idx));
      };
      nodes.forEach((nd, i) => nd.addEventListener('click', () => apply(i)));
      const on = nodes.findIndex(nd => nd.classList.contains('is-on'));
      if (on >= 0) apply(on);
    });
    // "Certify play" collapse + "More info" collapse
    [['custCertifyToggle','custCertifyRow'], ['custMoreBtn','custMoreBox']].forEach(([bId, boxId]) => {
      const b = document.getElementById(bId), box = document.getElementById(boxId);
      if (!b || !box) return;
      b.addEventListener('click', () => {
        const open = box.hidden;
        box.hidden = !open;
        b.setAttribute('aria-expanded', String(open));
      });
    });
  }
  function gotoSlide(i){
    const $track = document.getElementById('intro-track');
    introSlide = Math.max(0, Math.min(INTRO_SLIDES.length - 1, i));
    const slide = $track.children[introSlide];
    if (slide) $track.scrollTo({ left: slide.offsetLeft, behavior:'smooth' });
    updateIntroUI();
  }
  function updateIntroUI(){
    const $dots = document.getElementById('intro-dots');
    Array.from($dots.children).forEach((d, i) => d.classList.toggle('active', i === introSlide));
    document.getElementById('intro-prev').disabled = introSlide === 0;
    document.getElementById('intro-next').disabled = introSlide === INTRO_SLIDES.length - 1;
    // Go play only appears once the last slide is reached
    document.getElementById('intro-cta').classList.toggle('gated', introSlide < INTRO_SLIDES.length - 1);
  }
  function startApp(){
    startTimer();
    showDecks();          // play opens on the decks view
  }
  function backToIntro(){
    $introSlider.classList.remove('hidden');
    hideAllViews();
    gotoSlide(INTRO_SLIDES.length - 1);
    window.scrollTo({ top:0, behavior:'smooth' });
  }
  document.getElementById('intro-prev').addEventListener('click', () => gotoSlide(introSlide - 1));
  document.getElementById('intro-next').addEventListener('click', () => gotoSlide(introSlide + 1));
  document.getElementById('intro-start').addEventListener('click', startApp);
  document.getElementById('btn-go-back').addEventListener('click', backToIntro);
  // Fields ↔ Summary navigation
  document.getElementById('btn-fields-back').addEventListener('click', showDecks);
  document.getElementById('btn-to-summary').addEventListener('click', enterSummary);
  // Summary's button is a full "Start over": reload the page, which drops every
  // selection from this play and returns to the intro.
  document.getElementById('btn-summary-back').addEventListener('click', () => location.reload());

  // ============== Brand menu ==============
  const $brandMenu = document.getElementById('brand-menu');
  const $appMenu   = document.getElementById('app-menu');
  function setMenu(open){
    $appMenu.hidden = !open;
    $brandMenu.setAttribute('aria-expanded', String(open));
    if (open){
      const f = $appMenu.querySelector('[data-act="fields"]');
      if (f) f.disabled = !allDone();
    }
  }
  $brandMenu.addEventListener('click', e => { e.stopPropagation(); setMenu($appMenu.hidden); });
  document.addEventListener('click', e => {
    if (!$appMenu.hidden && !$appMenu.contains(e.target)) setMenu(false);
  });
  $appMenu.addEventListener('click', e => {
    const btn = e.target.closest('[data-act]');
    if (!btn || btn.disabled) return;
    setMenu(false);
    switch (btn.dataset.act){
      case 'restart': location.reload(); break;
      case 'decks':   startTimer(); showDecks(); break;            // also dismisses the intro
      case 'fields':  if (allDone()){ startTimer(); enterFields(); } break;
      case 'summary': startTimer(); enterSummary(); break;
    }
  });

  // ----- Field data: only Social pre-filled. Others start empty. -----
  const SIMPLEX = {
    'cat-r': { label:'Metas',  items:['','','','',''], saved:false },
    'cat-o': { label:'Sci',    items:['','','','',''], saved:false },
    'cat-y': { label:'Bio',    items:['','','','',''], saved:false },
    'cat-g': { label:'Lang',   items:['','','','',''], saved:false },
    'cat-b': { label:'Psico',  items:['','','','',''], saved:false },
    'cat-i': { label:'Social', items:['Media','Political','Economical','Judiciary','Militar'], saved:true },
  };
  const CAT_COLOR = {
    'cat-r':'var(--cat-r)', 'cat-o':'var(--cat-o)', 'cat-y':'var(--cat-y)',
    'cat-g':'var(--cat-g)', 'cat-b':'var(--cat-b)', 'cat-i':'var(--cat-i)',
  };
  // Fallback deck colour (only used if a deck has no parent category).
  const DECK_COLOR = { p1:'var(--sky)', p2:'var(--brand)', p3:'var(--gold)', p4:'var(--accent)', p5:'var(--plum)' };
  // Each deck nests under a parent category, takes its colour, and renders below it.
  // p3 (Social, ex-Powers) has no parent → not shown as a sub-button.
  const DECK_PARENT = { p1:'cat-y', p2:'cat-y', p4:'cat-o' };  // Senses,Flavors→Bio · Elements→Sci
  const deckColor = did => CAT_COLOR[DECK_PARENT[did]] || DECK_COLOR[did];

  const customCats = [];                          // [{id,label,items:[5],starred}]
  const activeSets = [];                          // toggled sets shown in the square (none by default)
  let lastSet = null;                             // last set toggled on — drives the List view
  const reasons = {};                             // setId -> [reason per rank]  (square-item "Reason")
  const toggles = { list:false, cycle:false, confluence:false };
  let customSeq = 0;
  let creating = false;                           // building a new custom fivy

  const $square    = document.getElementById('square');
  const RANK_EL    = [...document.querySelectorAll('#square .items')];  // 5 rank parents (centre + 4 corners)
  const $ll        = document.getElementById('linear-list');
  const $titleRow  = document.getElementById('cat-title-row');
  const $titleInput= document.getElementById('cat-title-input');
  const $btnAdd    = document.getElementById('btn-add-cat');
  const $btnSave   = document.getElementById('btn-save-cat');
  const $customsRow= document.getElementById('saved-customs');

  // ----- Counters -----
  const counters = { clicks:0, selections:0, stars:0 };
  function paintCounter(key){
    const map = { clicks:['chipClicks','pointsClicks'], selections:['chipSelections','pointsSelections'], stars:['chipStars','pointsStars'] };
    const [chipId, numId] = map[key];
    const chip = document.getElementById(chipId);
    const num  = document.getElementById(numId);
    if (!chip || !num) return;
    num.textContent = String(counters[key]);
    chip.classList.toggle('is-empty', counters[key] === 0);
  }
  function bumpCounter(key){
    counters[key]++;
    paintCounter(key);
    const chip = document.getElementById({clicks:'chipClicks',selections:'chipSelections',stars:'chipStars'}[key]);
    if (chip){ chip.classList.remove('pulse'); void chip.offsetWidth; chip.classList.add('pulse'); }
  }
  document.addEventListener('click', () => bumpCounter('clicks'));

  // ----- Source lookup: a "set" is a category, a custom fivy, or a stage-1 deck -----
  function getSource(id){
    if (SIMPLEX[id]){
      const c = SIMPLEX[id];
      return { kind:'cat', id, label:c.label, items:c.items, color:CAT_COLOR[id], editable:true, saved:c.saved };
    }
    if (id && id.startsWith('custom:')){
      const c = customCats.find(x => x.id === id);
      // saved only once all five are filled → until then its items are editable
      // inputs in the square (so a fresh custom fivy can actually be filled in)
      return c && { kind:'custom', id, label:c.label, items:c.items, color:'var(--plum)', editable:true, saved:c.items.every(v => (v||'').trim()) };
    }
    if (id && id.startsWith('deck:')){
      const did = id.slice(5);
      const d = DECKS.find(x => x.id === did);
      if (!d) return null;
      const order = state.orders[did] || d.items.map((_,i)=>i);
      return { kind:'deck', id, label:d.title, items:order.map(i => d.items[i]), color:deckColor(did), parent:DECK_PARENT[did], editable:false, saved:true };
    }
    return null;
  }

  // Stack order: each active deck-child sits directly under its parent category,
  // so in the square its placeholders land right below the parent's.
  function stackOrder(){
    const out = [], placed = new Set();
    activeSets.forEach(id => {
      if (placed.has(id)) return;
      out.push(id); placed.add(id);
      DECKS.forEach(d => {
        const childId = 'deck:' + d.id;
        if (DECK_PARENT[d.id] === id && activeSets.includes(childId) && !placed.has(childId)){
          out.push(childId); placed.add(childId);
        }
      });
    });
    return out;
  }

  // ----- Accumulation board: render one bordered row of 5 per active set -----
  // Each toggled set drops one placeholder under each of the five rank nodes
  // (its rank-r item under the rank-r parent), coloured by the set.
  function renderNodes(){
    RANK_EL.forEach(el => el.innerHTML = '');
    stackOrder().forEach(id => {
      const s = getSource(id);
      if (!s) return;
      const editing = s.editable && !s.saved;     // unfilled category/custom → fill it inline
      for (let r = 0; r < 5; r++){
        const val = s.items[r] || '';
        let el;
        if (editing){
          el = document.createElement('input');
          el.type = 'text';
          el.className = 'item-input';
          el.maxLength = 28;
          el.placeholder = 'rank ' + (r + 1);
          el.value = val;
          el.addEventListener('input', e => { s.items[r] = e.target.value; storeEdit(s); });
          el.addEventListener('blur', () => { if (s.items.every(v => (v||'').trim())) renderNodes(); });
          el.addEventListener('keydown', e => { if (e.key === 'Enter'){ e.preventDefault(); e.target.blur(); } });
          el.dataset.cat = id; el.title = s.label; el.style.setProperty('--c', s.color);
        } else if (!val){
          el = document.createElement('div');
          el.className = 'item empty';
          el.textContent = '·';
          el.dataset.cat = id; el.title = s.label; el.style.setProperty('--c', s.color);
        } else {
          el = makeSquareItem(id, s, r, val);
        }
        RANK_EL[r].appendChild(el);
      }
    });
    applyGrowth();
    paintShow();
    paintList();
  }

  // ----- A filled square item: word + next-arrow, plus a click-to-add Reason
  //       (with mic dictation) and a star that expands the saved reason. -----
  function makeSquareItem(id, s, r, val){
    const item = document.createElement('div');
    item.className = 'item';
    item.dataset.cat = id; item.dataset.rank = String(r);
    item.title = s.label; item.style.setProperty('--c', s.color);
    const saved = (reasons[id] && reasons[id][r]) || '';

    const row = document.createElement('div');
    row.className = 'item-row';
    const star = document.createElement('button');
    star.type = 'button'; star.className = 'item-star'; star.textContent = '★';
    star.title = 'show reason'; star.hidden = !saved.trim();
    const word = document.createElement('span');
    word.className = 'item-word'; word.textContent = val;
    const next = document.createElement('button');
    next.type = 'button'; next.className = 'item-next'; next.textContent = '›';
    next.title = 'move to next position'; next.disabled = r >= 4;
    row.append(star, word, next);

    const edit = document.createElement('div');
    edit.className = 'item-reason'; edit.hidden = true;
    const input = document.createElement('input');
    input.type = 'text'; input.className = 'rsn-input'; input.placeholder = 'Reason';
    input.value = saved;
    const mic = document.createElement('button');
    mic.type = 'button'; mic.className = 'rsn-mic'; mic.textContent = '🎤'; mic.title = 'record';
    const save = document.createElement('button');
    save.type = 'button'; save.className = 'rsn-save'; save.textContent = 'Save';
    edit.append(input, mic, save);

    const view = document.createElement('div');
    view.className = 'item-reason-view'; view.hidden = true;
    const vtext = document.createElement('span'); vtext.className = 'rsn-text';
    const close = document.createElement('button');
    close.type = 'button'; close.className = 'rsn-close'; close.textContent = '✕'; close.title = 'hide';
    view.append(vtext, close);

    item.append(row, edit, view);

    word.addEventListener('click', () => { edit.hidden = !edit.hidden; if (!edit.hidden) input.focus(); });
    next.addEventListener('click', e => { e.stopPropagation(); moveItemNext(id, r); });
    mic.addEventListener('click', e => { e.stopPropagation(); toggleReasonMic(input, mic); });
    save.addEventListener('click', e => {
      e.stopPropagation();
      const txt = input.value.trim();
      if (!txt) return;                       // only saves if text added
      reasons[id] = reasons[id] || ['','','','',''];
      const had = (reasons[id][r] || '').trim();
      reasons[id][r] = txt;
      edit.hidden = true;
      star.hidden = false;
      if (!had) bumpCounter('stars');
    });
    star.addEventListener('click', e => {
      e.stopPropagation();
      if (view.hidden){ vtext.textContent = (reasons[id] && reasons[id][r]) || ''; view.hidden = false; }
      else view.hidden = true;
    });
    close.addEventListener('click', e => { e.stopPropagation(); view.hidden = true; });
    return item;
  }

  // Move an item to the next rank position (swap with the one below it).
  function moveItemNext(setId, r){
    if (r >= 4) return;
    if (setId.startsWith('deck:')){
      const ord = state.orders[setId.slice(5)];
      if (ord) [ord[r], ord[r+1]] = [ord[r+1], ord[r]];
    } else {
      const s = getSource(setId);
      if (!s) return;
      [s.items[r], s.items[r+1]] = [s.items[r+1], s.items[r]];
    }
    if (reasons[setId]){ const rs = reasons[setId]; [rs[r], rs[r+1]] = [rs[r+1], rs[r]]; }
    renderNodes();
    paintList();
    paintSummary();
  }

  // ----- Voice dictation into a reason field (Web Speech API) -----
  let _rec = null, _recOn = false, _recMic = null;
  function toggleReasonMic(input, mic){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR){ input.placeholder = 'no voice support'; return; }
    if (_recOn){ try { _rec.stop(); } catch(_){} return; }
    _rec = new SR();
    _rec.lang = 'en-US'; _rec.continuous = true; _rec.interimResults = true;
    _recMic = mic;
    const base = input.value ? input.value.replace(/\s+$/,'') + ' ' : '';
    _rec.onresult = ev => {
      let t = '';
      for (let i = 0; i < ev.results.length; i++) t += ev.results[i][0].transcript;
      input.value = base + t;
    };
    _rec.onend   = () => { _recOn = false; if (_recMic) _recMic.classList.remove('recording'); };
    _rec.onerror = () => { _recOn = false; if (_recMic) _recMic.classList.remove('recording'); };
    try { _rec.start(); _recOn = true; mic.classList.add('recording'); } catch(_){}
  }

  // The square defaults to the left column (toolbar) height, then grows 5% per
  // extra active set. It always stays square (width = height = --sq) and grows
  // further if the stacked rank nodes would spill past its bottom edge — so the
  // rank-4/5 stacks read downward instead of being squeezed up.
  function applyGrowth(){
    const ITEM_H = 30;                               // ≈ one stacked item's height
    const n     = activeSets.length;                 // one item per active set
    const grow  = 1 + 0.05 * Math.max(0, n - 1);
    const aside = document.querySelector('.fields-grid .toolbar');
    const base  = (aside && aside.offsetHeight) ? aside.offsetHeight : 320;
    // pin rank-4/5 near the BASE square's bottom; each extra set hangs one more
    // item below, and the square grows downward to hold them (staying square)
    const need  = base + Math.max(0, n - 1) * ITEM_H;
    const size  = Math.max(Math.round(base * grow), need);
    $square.style.setProperty('--sq', size + 'px');
    $square.style.setProperty('--n45-top', Math.max(8, base - ITEM_H - 12) + 'px');
  }
  // re-fit the square if the viewport (and thus the toolbar height) changes
  window.addEventListener('resize', () => { if ($fields.classList.contains('active')) applyGrowth(); });

  // Persist inline edits without re-rendering (keeps input focus). A completed
  // five marks the category saved and surfaces it in the list / summary.
  function storeEdit(s){
    const complete = s.items.every(v => (v||'').trim());
    if (s.kind === 'cat'){
      const c = SIMPLEX[s.id];
      const was = c.saved;
      c.saved = complete;
      if (complete && !was) bumpCounter('stars');
    } else if (s.kind === 'custom'){
      const c = customCats.find(x => x.id === s.id);
      if (c && complete && !c.starred){ c.starred = true; bumpCounter('stars'); }
    }
    paintList();
    paintSummary();
  }

  // ----- Toggle a set in / out of the square (expand / collapse) -----
  function toggleSet(id){
    const i = activeSets.indexOf(id);
    if (i === -1){ activeSets.push(id); lastSet = id; bumpCounter('selections'); }   // last clicked drives the List
    else {
      activeSets.splice(i, 1);
      if (lastSet === id) lastSet = activeSets[activeSets.length - 1] || null;
    }
    renderNodes();
    renderNested();   // reveal/hide each parent's sub-buttons as it's clicked
    paintSummary();
  }

  function paintShow(){
    document.querySelectorAll('#cats .cat:not(.cat-add):not(.cat-save)').forEach(btn => {
      btn.classList.toggle('is-on', activeSets.includes(btn.dataset.cat));
    });
    document.querySelectorAll('.saved-custom').forEach(el => {
      el.classList.toggle('is-on', activeSets.includes(el.dataset.cat));
    });
    document.querySelectorAll('.deck-btn').forEach(el => {
      el.classList.toggle('is-on', activeSets.includes(el.dataset.src));
    });
  }

  function paintList(){
    const lis = $ll.querySelectorAll('#list-items li span');
    const $title = document.getElementById('ll-title');
    let src = ['','','','',''];
    let title = '';
    // show the last button clicked (fall back to the most recent active set)
    const showId = (lastSet && activeSets.includes(lastSet)) ? lastSet : activeSets[activeSets.length - 1];
    if (showId){
      const s = getSource(showId);
      if (s){ src = s.items; title = s.label; }
    }
    lis.forEach((sp, i) => sp.textContent = src[i] || '');
    if ($title) $title.textContent = title;
  }

  // The settled fifth deck shows as its own top-level category button (toggles deck:p5).
  function ensureFifthCat(){
    const cats = document.getElementById('cats');
    const addBtn = document.getElementById('btn-add-cat');
    let group = cats.querySelector('.cat-group[data-fifth]');
    const p5 = DECKS.find(d => d.id === 'p5');
    if (state.done.p5){
      if (!group){
        group = document.createElement('div');
        group.className = 'cat-group';
        group.dataset.fifth = '1';
        const b = document.createElement('button');
        b.className = 'cat'; b.type = 'button'; b.dataset.cat = 'deck:p5';
        b.style.setProperty('--c', deckColor('p5'));
        b.addEventListener('click', () => toggleSet('deck:p5'));
        const ch = document.createElement('div');
        ch.className = 'cat-children'; ch.dataset.for = 'deck:p5';
        group.appendChild(b); group.appendChild(ch);
        cats.insertBefore(group, addBtn);
      }
      group.querySelector('button').textContent = (p5 && p5.title) || 'Fivy 5';
    } else if (group){
      group.remove();
    }
  }

  // ----- Sub-buttons: drop below each parent category, but only while that
  //       parent is checked (active). Each is coloured by its parent. -----
  function renderNested(){
    document.querySelectorAll('#cats .cat-children').forEach(el => el.innerHTML = '');
    // the settled fifth deck becomes its own top-level category button in the left menu
    ensureFifthCat();
    DECKS.forEach(d => {
      if (!state.done[d.id]) return;          // only decks the player actually settled
      const parent = DECK_PARENT[d.id];
      if (!parent) return;                    // Social/Powers has no sub-button here
      if (!activeSets.includes(parent)) return;   // shown only when the parent is checked
      const slot = document.querySelector(`#cats .cat-children[data-for="${parent}"]`);
      if (!slot) return;
      const b = document.createElement('button');
      b.className = 'deck-btn is-child';
      b.type = 'button';
      b.dataset.src = 'deck:' + d.id;
      b.style.setProperty('--c', deckColor(d.id));   // same colour as its parent category
      b.textContent = d.title;
      b.addEventListener('click', () => toggleSet('deck:' + d.id));
      slot.appendChild(b);
    });
    paintShow();
  }

  // ----- Cat clicks: toggle that category's 5 placeholders in the square -----
  document.querySelectorAll('#cats .cat:not(.cat-add):not(.cat-save)').forEach(btn => {
    btn.addEventListener('click', () => toggleSet(btn.dataset.cat));
  });

  // ----- New custom fivy (+ Add → title → Save) -----
  $btnAdd.addEventListener('click', () => {
    if (creating) return;
    creating = true;
    $titleRow.classList.add('active');
    $titleInput.value = '';
    $btnAdd.hidden = true;
    $btnSave.hidden = false;
    setTimeout(() => $titleInput.focus(), 30);
  });
  function cancelCreate(){
    creating = false;
    $titleRow.classList.remove('active');
    $btnAdd.hidden = false;
    $btnSave.hidden = true;
  }
  function commitCustom(){
    const label = ($titleInput.value || '').trim() || `Fivy ${customCats.length + 1}`;
    const id = 'custom:' + (++customSeq);
    customCats.push({ id, label, items:['','','','',''], starred:false });
    activeSets.push(id);
    bumpCounter('selections');
    cancelCreate();
    renderCustomsRow();
    renderNodes();          // its five empty inputs drop under each rank node to fill
    paintSummary();
  }
  $btnSave.addEventListener('click', commitCustom);
  $titleInput.addEventListener('keydown', e => {
    if (e.key === 'Enter'){ e.preventDefault(); commitCustom(); }
    if (e.key === 'Escape'){ e.preventDefault(); cancelCreate(); }
  });

  // ----- Customs row (toggle / delete saved custom fivys) -----
  function renderCustomsRow(){
    $customsRow.innerHTML = '';
    customCats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'saved-custom';
      btn.type = 'button';
      btn.dataset.cat = c.id;
      btn.innerHTML = `<span>${escapeHTML(c.label)}</span><span class="x" role="button" aria-label="delete">✕</span>`;
      btn.addEventListener('click', e => {
        if (e.target.closest('.x')){
          const i = customCats.findIndex(x => x.id === c.id);
          if (i >= 0) customCats.splice(i, 1);
          const oi = activeSets.indexOf(c.id);
          if (oi >= 0) activeSets.splice(oi, 1);
          renderCustomsRow();
          renderNodes();
          paintSummary();
          return;
        }
        toggleSet(c.id);
      });
      $customsRow.appendChild(btn);
    });
    paintShow();
  }

  // ----- Toggles -----
  function applyToggle(key){
    const btn = document.querySelector(`.tbtn[data-toggle="${key}"]`);
    toggles[key] = !toggles[key];
    btn.classList.toggle('is-on', toggles[key]);
    if (key === 'list') $ll.hidden = !toggles.list;
    $square.classList.toggle('cycle', toggles.cycle);
    $square.classList.toggle('confluence', toggles.confluence);
    $ll.classList.toggle('confluence', toggles.confluence);
    $ll.classList.toggle('cycle', toggles.cycle);
  }
  document.querySelectorAll('.tbtn').forEach(btn => {
    btn.addEventListener('click', () => applyToggle(btn.dataset.toggle));
  });

  // ----- Summary content (tables + progressive analyses) -----
  const ORD = ['1st','2nd','3rd','4th','5th'];
  const settledDecks = () => DECKS.filter(d => state.done[d.id]);
  const deckRanked   = d => state.orders[d.id].map(i => d.items[i]);
  function filledFields(){
    const out = [];
    Object.keys(SIMPLEX).forEach(id => { if (SIMPLEX[id].saved) out.push({ label:SIMPLEX[id].label, items:SIMPLEX[id].items }); });
    customCats.forEach(c => out.push({ label:c.label, items:c.items }));
    return out;
  }
  // build a <table> from a left header, column headers, and rows {label, cells:[{v,cls}]}
  function tableHTML(headLeft, cols, rows){
    const thead = `<thead><tr><th>${escapeHTML(headLeft)}</th>${cols.map(c=>`<th>${escapeHTML(c)}</th>`).join('')}</tr></thead>`;
    const tbody = '<tbody>' + rows.map(r =>
      `<tr><th>${escapeHTML(r.label)}</th>${r.cells.map(c=>`<td${c.cls?` class="${c.cls}"`:''}>${escapeHTML(c.v)||'·'}</td>`).join('')}</tr>`
    ).join('') + '</tbody>';
    return `<table class="sum-table">${thead}${tbody}</table>`;
  }

  function paintSummary(){
    paintFivysTable();
    paintSummaryStats();
    paintSummarySnapshot();
    paintSummaryPhrase();
  }
  // Build the headline phrase, its "magic" rephrasing, and four insights from the settled fivys.
  function paintSummaryPhrase(){
    const ph  = document.getElementById('fivy-phrase');
    const mg  = document.getElementById('fivy-phrase-magic');
    const ins = document.getElementById('fivy-insight');
    if (!ph) return;
    const decks = settledDecks();
    if (!decks.length){
      ph.textContent = 'Order your fivys to see a summary phrase here.';
      if (mg)  mg.textContent = '✨ Your woven phrase appears once you have ordered some fivys.';
      if (ins) ins.innerHTML = '';
      return;
    }
    const parts = decks.map(d => `${d.title}: ${deckRanked(d).filter(Boolean).join(' ▸ ')}`);
    ph.textContent = `My fivys — ${parts.join('  ·  ')}.`;

    const woven = decks.map(d => {
      const r = deckRanked(d).filter(Boolean);
      return r.length ? `in ${d.title.toLowerCase()} you lead with ${r[0]}` : '';
    }).filter(Boolean);
    if (mg) mg.textContent = `✨ ${woven.join(', ')}${woven.length ? ' — a small map of how you weigh the world.' : ''}`;

    if (ins){
      const firsts = decks.map(d => deckRanked(d)[0]).filter(Boolean);
      const lasts  = decks.map(d => deckRanked(d)[4]).filter(Boolean);
      const end = timer.tSummary || Date.now();
      const fieldsMs = timer.tFields ? (end - timer.tFields) : 0;
      const texts = [
        `You settled ${decks.length} ${decks.length === 1 ? 'fivy' : 'fivys'}, ranking five cards in each — ${decks.length * 5} small decisions in all.`,
        `Your firsts: ${firsts.join(', ')}.`,
        `Your lasts: ${lasts.join(', ')}.`,
        `You spent ${fmtTime(end - timer.t0)} in all${timer.tFields ? `, ${fmtTime(fieldsMs)} of it in Fields` : ''}.`,
      ];
      ins.innerHTML = '';
      texts.forEach(t => { const s = document.createElement('span'); s.className = 'insight-text'; s.textContent = t; ins.appendChild(s); });
    }
  }
  // Fields-stage time stats: time spent on decks, on fields, and total.
  function paintSummaryStats(){
    const host = document.getElementById('summary-stats');
    if (!host) return;
    const end    = timer.tSummary || Date.now();
    const decks  = timer.tFields ? (timer.tFields - timer.t0) : (end - timer.t0);
    const fields = timer.tFields ? (end - timer.tFields) : 0;
    const total  = end - timer.t0;
    host.innerHTML =
        `<span class="ss-item"><span class="ss-k">Decks</span><span class="ss-v">${fmtTime(decks)}</span></span>`
      + `<span class="ss-item ss-hi"><span class="ss-k">Fields</span><span class="ss-v">${fmtTime(fields)}</span></span>`
      + `<span class="ss-item"><span class="ss-k">Total</span><span class="ss-v">${fmtTime(total)}</span></span>`;
  }
  // Snapshot of the last selected square — keeps cycle/confluence arrows, never the list.
  function paintSummarySnapshot(){
    const host = document.getElementById('summary-snapshot');
    if (!host) return;
    host.innerHTML = '';
    const sq = $square.cloneNode(true);
    sq.removeAttribute('id');
    sq.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
    sq.classList.remove('grow');
    // keep the square at its original (live) size from the Fields interface
    const liveW = $square.offsetWidth
      || parseInt(getComputedStyle($square).getPropertyValue('--sq'), 10) || 320;
    sq.style.setProperty('--sq', liveW + 'px');
    host.appendChild(sq);
  }

  // Fivys recap: a leading Time column (per-deck active time, live for the open
  // one) before the fivy name, then the 1st–5th ordering.
  function fivysTableHTML(){
    const decks = settledDecks();
    if (!decks.length) return '<div class="empty-line">No fivys ordered yet.</div>';
    const now = Date.now();
    const liveId = state.openDeckIdx !== null ? DECKS[state.openDeckIdx].id : null;
    const head = `<thead><tr><th>Time</th><th>Fivy</th>${ORD.map(o => `<th>${o}</th>`).join('')}</tr></thead>`;
    const body = '<tbody>' + decks.map(d => {
      let ms = deckTime[d.id] || 0;
      if (d.id === liveId && _openTs) ms += now - _openTs;
      const cells = deckRanked(d).map(v => `<td>${escapeHTML(v) || '·'}</td>`).join('');
      return `<tr><td class="dim">${fmtTime(ms)}</td><th>${escapeHTML(d.title)}</th>${cells}</tr>`;
    }).join('') + '</tbody>';
    return `<table class="sum-table">${head}${body}</table>`;
  }
  function paintFivysTable(){
    const $sp = document.getElementById('summary-fivys');
    if ($sp) $sp.innerHTML = fivysTableHTML();
  }

  // ----- Related apps: revealed by the Summary stage's "Next →" -----
  const $btnSeeMore = document.getElementById('btn-summary-next');
  const $related    = document.getElementById('related-apps');

  // Related apps: 3 shown first, then ＋ reveals 6 more.
  const RELATED_MAIN = [
    { href:'keys-advanced.html',  mark:'⬠', name:'keys'  },
    { href:'souls.html', mark:'✷', name:'souls' },
    { href:'sensy.html', mark:'✺', name:'sensy' },
  ];
  const RELATED_MORE = [
    { href:'worthing.html', mark:'◍', name:'worthing' },
    { href:'realy.html',    mark:'◉', name:'realy'    },
    { href:'crafty.html',   mark:'✦', name:'crafty'   },
    { href:'lovy.html',     mark:'♥', name:'lovy'     },
    { href:'daty.html',     mark:'◷', name:'daty'     },
    { href:'puzzy/relate/confluences/index.html', mark:'✶', name:'confluences' },
  ];
  const relCardHTML = a =>
    `<a class="related-card" href="${a.href}"><span class="rc-mark">${a.mark}</span><span class="rc-name">${escapeHTML(a.name)}</span></a>`;
  $btnSeeMore.addEventListener('click', () => {
    if (!$related.children.length){
      $related.innerHTML =
          RELATED_MAIN.map(relCardHTML).join('')
        + `<div class="ra-more-row"><button class="ra-more-btn" id="ra-more-btn" type="button" aria-expanded="false" aria-label="Show more apps">＋</button></div>`
        + `<div class="related-more" id="related-more" hidden>${RELATED_MORE.map(relCardHTML).join('')}</div>`;
      const moreBtn = document.getElementById('ra-more-btn');
      const moreBox = document.getElementById('related-more');
      moreBtn.addEventListener('click', () => {
        const show = moreBox.hidden;
        moreBox.hidden = !show;
        moreBtn.setAttribute('aria-expanded', String(show));
        moreBtn.textContent = show ? '×' : '＋';
      });
    }
    $related.hidden = false;
    $btnSeeMore.hidden = true;
    $related.scrollIntoView({ behavior:'smooth', block:'nearest' });
  });

  // ----- Summary actions: Print + Publish "Go" (Save/Share/Copy are wired by flove.js) -----
  document.addEventListener('click', e => {
    if (e.target.closest('[data-flove-print]')) window.print();
  });
  const pubGo = document.getElementById('fivy-pub-go');
  if (pubGo) pubGo.addEventListener('click', () => {
    // hand the summary off via the same Share path flove.js provides
    if (window.flove && window.flove.share) window.flove.share(document.getElementById('summary-body'));
    else window.print();
  });

  // ----- Initial paint -----
  renderNested();
  renderCustomsRow();
  renderNodes();
  paintSummary();
  render();

  // Start on the intro: every view stays hidden until "Go play".
  renderIntro();
  hideAllViews();

  // Re-paint Summary whenever the fivys board changes (Done / reopen).
  new MutationObserver(() => paintSummary())
    .observe(document.getElementById('board'), { childList:true, subtree:true });
})();
</script>
</body>
</html>
