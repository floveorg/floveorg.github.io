<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>✺ flove · Puzzy</title>
  <link rel="stylesheet" href="../flove.css">
  <style>
    :root{
      --app-accent:#8d89ff; --app-accent-soft:#c9c6ff; --app-ink-on-accent:#0b0b14;
      --bg:#0a0a0f; --ink:#e9eaf2; --muted:#a3a7b4;
      --line:#1e2133; --field:#13162a; --accent2:#70f0d3;
      --grad:linear-gradient(135deg, var(--app-accent), var(--accent2));
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; color:var(--ink);
      background:
        radial-gradient(1100px 760px at 110% -10%, rgba(141,137,255,.20), transparent 60%),
        radial-gradient(900px 680px at -10% 120%, rgba(112,240,211,.13), transparent 50%),
        var(--bg);
      background-attachment:fixed; font-family:var(--flove-font-ui); letter-spacing:.2px;
    }

    /* i18n — pure CSS (§13.2) */
    .t-es{ display:none }
    body:has(#ui-lang-es:checked) .t-en{ display:none }
    body:has(#ui-lang-es:checked) .t-es{ display:inline }
    .lang{ display:inline-flex; gap:2px }
    .lang input{ position:absolute; opacity:0; pointer-events:none }
    .lang label{ font-size:11px; font-weight:600; letter-spacing:.4px; padding:3px 9px;
      border-radius:var(--flove-radius-pill); cursor:pointer; color:var(--muted); border:1px solid transparent }
    #ui-lang-en:checked ~ label[for=ui-lang-en],
    #ui-lang-es:checked ~ label[for=ui-lang-es]{
      color:var(--app-ink-on-accent); background:var(--app-accent); border-color:var(--app-accent) }

    /* ───── topbar: brand (own logo · click-menu) + global compass ───── */
    .flove-bar{ position:relative; display:flex; align-items:center; gap:.7rem }
    .ctl{ position:absolute; opacity:0; pointer-events:none }
    .puz-brand{ display:inline-flex; align-items:center; gap:.5rem; cursor:pointer; user-select:none }
    .puz-logo{ display:block; filter:drop-shadow(0 0 8px rgba(141,137,255,.5)); transition:transform var(--flove-fast) }
    .puz-brand:hover .puz-logo{ transform:rotate(18deg) scale(1.05) }
    .puz-brand .flove-app-name{ font-weight:800; letter-spacing:.5px }
    .puz-brand::after{ content:"▾"; font-size:.7rem; color:var(--muted);
      transition:transform var(--flove-fast), color var(--flove-fast) }
    body:has(#puz-menu:checked) .puz-brand::after{ transform:rotate(180deg); color:var(--accent2) }
    .puz-overlay, .cmp-overlay{ display:none; position:fixed; inset:0; z-index:40 }
    body:has(#puz-menu:checked) .puz-overlay{ display:block }
    body:has(#compass-open:checked) .cmp-overlay{ display:block }
    .puz-menu{ position:absolute; top:calc(100% + 6px); left:.7rem; z-index:50; display:none;
      flex-direction:column; gap:.1rem; min-width:200px; padding:.5rem;
      border-radius:var(--flove-radius); background:#13162a; border:1px solid var(--line); box-shadow:0 16px 40px rgba(0,0,0,.5) }
    body:has(#puz-menu:checked) .puz-menu{ display:flex }
    .puz-menu a{ display:block; padding:.5rem .7rem; border-radius:8px; color:var(--ink); text-decoration:none;
      font-size:.9rem; font-weight:600; transition:background var(--flove-fast), color var(--flove-fast) }
    .puz-menu a:hover{ background:rgba(141,137,255,.16); color:var(--accent2) }
    .puz-sep{ height:1px; margin:.35rem .2rem; background:var(--line) }
    .puz-mlabel{ font-size:.66rem; letter-spacing:.6px; text-transform:uppercase; color:var(--muted); padding:.25rem .7rem }
    .puz-menu .lang{ padding:.1rem .5rem .3rem }

    /* global compass — drives the scatter of all app buttons */
    .compass-wrap{ position:relative; display:inline-flex; align-items:center }
    .compass-btn{ display:inline-flex; align-items:center; justify-content:center; padding:0; border:0;
      background:transparent; color:var(--app-accent-soft); cursor:pointer;
      transition:color var(--flove-fast), transform var(--flove-fast) }
    .compass-btn svg{ display:block; transition:transform var(--flove-fast) }
    .compass-btn:hover{ color:var(--accent2); transform:translateY(-1px) }
    body:has(#compass-open:checked) .compass-btn{ color:var(--accent2) }
    body:has(#compass-open:checked) .compass-btn svg{ animation:compass-spin .5s ease }
    @keyframes compass-spin{ from{ transform:rotate(0) } to{ transform:rotate(360deg) } }
    .mode-buttons{ position:absolute; top:calc(100% + 8px); left:0; z-index:50; display:none; align-items:center; gap:.5rem;
      padding:.45rem .6rem; border-radius:var(--flove-radius-pill); background:#13162a; border:1px solid var(--line);
      box-shadow:0 12px 30px rgba(0,0,0,.45); white-space:nowrap }
    body:has(#compass-open:checked) .mode-buttons{ display:inline-flex }
    .mode-btn{ display:inline-flex; align-items:center; justify-content:center; padding:.15rem; border:0;
      background:transparent; color:var(--muted); font-size:1.25rem; line-height:1; cursor:pointer;
      transition:color var(--flove-fast), transform var(--flove-fast), background var(--flove-fast) }
    .mode-btn svg{ display:block; width:23px; height:23px }
    .mode-btn:hover{ color:var(--accent2); transform:translateY(-1px) }
    body:has(#disp-cloud:checked) .mb-cloud, body:has(#disp-bub:checked) .mb-bub,
    body:has(#disp-list:checked) .mb-list, body:has(#disp-sized:checked) .mb-sized,
    body:has(#disp-rand:checked) .mb-rand{ color:var(--app-accent); transform:scale(1.25) }
    body:has(#disp-sized:checked) .mb-sized, body:has(#disp-rand:checked) .mb-rand{ background:rgba(141,137,255,.18); border-radius:8px }
    .mode-sep{ width:1px; align-self:stretch; margin:3px 1px; background:var(--line) }

    /* ───── one free-flowing, scattered field of app buttons (no icons, no sections) ───── */
    main{ max-width:1000px; margin:3rem auto 5rem; padding:0 1.4rem }
    .flow{ display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:1.4rem 2rem }
    .app{ text-decoration:none; color:var(--ink); background:none; border:0; padding:.15rem .25rem; cursor:pointer;
      font-weight:700; letter-spacing:.3px; font-size:1.1rem; display:inline-block;
      transition:color var(--flove-fast), transform var(--flove-fast), filter var(--flove-fast), scale .4s ease, rotate .4s ease }
    .app:hover{ color:var(--accent2); transform:translateY(-3px); filter:drop-shadow(0 0 10px rgba(112,240,211,.5)) }

    /* the default scatter — varied rotation, vertical offset and size (flows randomly) */
    .flow > .app:nth-child(7n+1){ rotate:-6deg;  margin-top:1.7rem;  font-size:1rem }
    .flow > .app:nth-child(7n+2){ rotate:5deg;   margin-top:-1.1rem; font-size:1.35rem }
    .flow > .app:nth-child(7n+3){ rotate:-3deg;  margin-top:2.3rem;  font-size:.95rem }
    .flow > .app:nth-child(7n+4){ rotate:8deg;   margin-top:.3rem;   font-size:1.5rem }
    .flow > .app:nth-child(7n+5){ rotate:-9deg;  margin-top:-1.5rem; font-size:1.1rem }
    .flow > .app:nth-child(7n+6){ rotate:4deg;   margin-top:1.1rem;  font-size:1.25rem }
    .flow > .app:nth-child(7n+7){ rotate:-5deg;  margin-top:-.5rem;  font-size:.9rem }

    /* compass · List — neaten the scatter into an even row */
    body:has(#disp-list:checked) .flow > .app{ rotate:0deg; scale:1; margin-top:0; font-size:1.1rem }
    /* compass · Sized — graded sizes */
    body:has(#disp-sized:checked) .flow > .app:nth-child(3n+1){ scale:.8 }
    body:has(#disp-sized:checked) .flow > .app:nth-child(3n+2){ scale:1.1 }
    body:has(#disp-sized:checked) .flow > .app:nth-child(3n+3){ scale:1.4 }
    /* compass · Cloud — drift */
    body:has(#disp-cloud:checked) .app{ animation:b-drift 6.5s ease-in-out infinite }
    body:has(#disp-cloud:checked) .app:nth-child(3n+2){ animation-duration:7.6s; animation-delay:-1.6s }
    body:has(#disp-cloud:checked) .app:nth-child(3n+3){ animation-duration:5.9s; animation-delay:-3.2s }
    @keyframes b-drift{ 0%,100%{ transform:translate(0,0) } 25%{ transform:translate(10px,-9px) }
      50%{ transform:translate(-8px,7px) } 75%{ transform:translate(8px,6px) } }
    /* compass · Bubbles — glassy floating pill bubbles (like wanty.html) */
    body:has(#disp-bub:checked) .app{
      animation:b-bub 5s ease-in-out infinite; color:var(--ink);
      padding:.5rem 1.15rem; border-radius:var(--flove-radius-pill);
      background:radial-gradient(ellipse at 50% 28%, rgba(141,137,255,.30), rgba(112,240,211,.12) 72%, rgba(255,255,255,.03));
      border:1px solid rgba(201,198,255,.4);
      box-shadow:inset 0 1px 7px rgba(255,255,255,.22), 0 8px 20px rgba(0,0,0,.32);
    }
    body:has(#disp-bub:checked) .app:hover{ filter:brightness(1.08) }
    body:has(#disp-bub:checked) .app:nth-child(3n+2){ animation-duration:5.8s; animation-delay:-1.2s }
    body:has(#disp-bub:checked) .app:nth-child(3n+3){ animation-duration:6.4s; animation-delay:-2.4s }
    @keyframes b-bub{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-11px) } }
    /* compass · Random — re-shuffle order on top of the scatter */
    body:has(#disp-rand:checked) .flow > .app:nth-child(4n+1){ order:3; rotate:-11deg }
    body:has(#disp-rand:checked) .flow > .app:nth-child(4n+2){ order:1; rotate:9deg }
    body:has(#disp-rand:checked) .flow > .app:nth-child(4n+3){ order:4; rotate:-7deg }
    body:has(#disp-rand:checked) .flow > .app:nth-child(4n+4){ order:2; rotate:12deg }
    @media (prefers-reduced-motion:reduce){
      body:has(#disp-cloud:checked) .app, body:has(#disp-bub:checked) .app{ animation:none }
    }

    footer{ max-width:1000px; margin:0 auto 5rem; padding:1.4rem 1.2rem 0; color:var(--muted);
      font-size:.82rem; text-align:center; border-top:1px solid var(--line) }
    footer a{ color:var(--accent2) }
  </style>
</head>
<body>
  <!-- global compass controls (pure CSS; default = free scatter, no radio checked) -->
  <input type="checkbox" id="compass-open" class="ctl">
  <input type="radio" name="disp" id="disp-cloud" class="ctl">
  <input type="radio" name="disp" id="disp-bub"   class="ctl">
  <input type="radio" name="disp" id="disp-list"  class="ctl">
  <input type="checkbox" id="disp-sized" class="ctl">
  <input type="checkbox" id="disp-rand"  class="ctl">
  <label for="compass-open" class="cmp-overlay" aria-hidden="true"></label>

  <nav class="flove-bar flove-bar--dark">
    <input type="checkbox" id="puz-menu" class="ctl">
    <label class="puz-brand" for="puz-menu" title="Menu" aria-label="Open menu" tabindex="0">
      <svg class="puz-logo" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <defs><linearGradient id="puzg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#8d89ff"/><stop offset="1" stop-color="#70f0d3"/></linearGradient></defs>
        <path fill="url(#puzg)" d="M10 3a2 2 0 0 1 4 0c0 .7-.3 1.3-.3 1.7 0 .3.3.3.6.3H17a1 1 0 0 1 1 1v2.4c0 .3 0 .6.3.6.4 0 1-.3 1.7-.3a2 2 0 0 1 0 4c-.7 0-1.3-.3-1.7-.3-.3 0-.3.3-.3.6V18a1 1 0 0 1-1 1h-2.4c-.3 0-.6 0-.6.3 0 .4.3 1 .3 1.7a2 2 0 0 1-4 0c0-.7.3-1.3.3-1.7 0-.3-.3-.3-.6-.3H7a1 1 0 0 1-1-1v-2.4c0-.3 0-.6-.3-.6-.4 0-1 .3-1.7.3a2 2 0 0 1 0-4c.7 0 1.3.3 1.7.3.3 0 .3-.3.3-.6V6a1 1 0 0 1 1-1h2.4c.3 0 .6 0 .6-.3 0-.4-.3-1-.3-1.7z"/>
      </svg>
      <span class="flove-app-name">Puzzy</span>
    </label>
    <label for="puz-menu" class="puz-overlay" aria-hidden="true"></label>
    <div class="puz-menu" role="menu">
      <a href="../index.html" role="menuitem">← <span class="t-en">Apps</span><span class="t-es">Apps</span></a>
      <span class="puz-sep"></span>
      <span class="puz-mlabel"><span class="t-en">Language</span><span class="t-es">Idioma</span></span>
      <span class="lang">
        <input type="radio" name="ui-lang" id="ui-lang-en" checked>
        <input type="radio" name="ui-lang" id="ui-lang-es">
        <label for="ui-lang-en">EN</label>
        <label for="ui-lang-es">ES</label>
      </span>
    </div>

    <span class="compass-wrap">
      <label class="compass-btn" for="compass-open" title="Display modes" aria-label="Display modes" tabindex="0">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.7"/>
          <path d="M12 2.6 L13.7 10.3 L21.4 12 L13.7 13.7 L12 21.4 L10.3 13.7 L2.6 12 L10.3 10.3 Z" fill="currentColor"/>
          <circle cx="12" cy="12" r="1.9" fill="#0a0a0f"/></svg>
      </label>
      <span class="mode-buttons" role="group" aria-label="Display modes">
        <label class="mode-btn mb-cloud" for="disp-cloud" title="Cloud — drift" tabindex="0"><svg viewBox="0 0 24 24" aria-hidden="true"><g fill="currentColor"><circle cx="8.5" cy="13" r="5.2"/><circle cx="15" cy="10" r="6.3"/><circle cx="18" cy="14.5" r="4.6"/><rect x="6.5" y="13" width="12.5" height="6" rx="3"/></g></svg></label>
        <label class="mode-btn mb-bub" for="disp-bub" title="Bubbles — float &amp; bounce" tabindex="0"><svg viewBox="0 0 24 24" aria-hidden="true"><g fill="currentColor"><circle cx="8" cy="9" r="4.2"/><circle cx="16" cy="14" r="5"/><circle cx="17" cy="6" r="2.6"/></g></svg></label>
        <label class="mode-btn mb-list" for="disp-list" title="List — even row" tabindex="0"><svg viewBox="0 0 24 24" aria-hidden="true"><g fill="currentColor"><circle cx="4" cy="6" r="2.3"/><rect x="9" y="4.2" width="13" height="3.6" rx="1.8"/><circle cx="4" cy="12" r="2.3"/><rect x="9" y="10.2" width="13" height="3.6" rx="1.8"/><circle cx="4" cy="18" r="2.3"/><rect x="9" y="16.2" width="13" height="3.6" rx="1.8"/></g></svg></label>
        <span class="mode-sep" aria-hidden="true"></span>
        <label class="mode-btn mb-sized" for="disp-sized" title="Size — small to large" tabindex="0"><svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><g fill="currentColor"><rect x="2" y="15" width="3" height="5"/><rect x="7" y="12" width="3" height="8"/><rect x="12" y="8" width="3" height="12"/><rect x="17" y="3" width="3" height="17"/></g></svg></label>
        <label class="mode-btn mb-rand" for="disp-rand" title="Random — shuffle the order" tabindex="0">🎲</label>
      </span>
    </span>
  </nav>

  <main>
    <div class="flow">
      <a class="app" href="raty.html"       title="Seven colour scales + the five senses as meta-rater; live phrase, axis, ranks.">Raty</a>
      <a class="app" href="wisy.html"       title="Progressive form by depth: prism, tone, focus, then formalise.">Wisy</a>
      <a class="app" href="poly.html"       title="Bipolar pairs as mutual flow, with complementary hints.">Poly</a>
      <a class="app" href="keys.html"       title="The visual alphabet of flove — symbols, glyphs and shortcuts.">Keys</a>
      <a class="app" href="vizy2.html"      title="The semantic mind-map: relations radiating from the core object.">Vizy2</a>
      <a class="app" href="fivy.html"       title="Order the five senses, then map their fields, simplexes and confluences.">Fivy</a>
      <a class="app" href="comby.html"      title="Fuzzy combinations from words and pools — full power-set, JSON export.">Comby</a>
      <a class="app" href="vizy.html"       title="Read the whole definition back as one woven phrase.">Vizy</a>
      <a class="app" href="triady.html"     title="When two aren't enough: the triad as minimal harmony; live ranking.">Triady</a>
      <a class="app" href="sety.html"       title="Language, scales and defaults for the whole tool.">Sety</a>
      <a class="app" href="confluenty.html" title="7-column board where lists meet at a centre.">Confluenty</a>
    </div>
  </main>

  <footer>
    <span class="t-en">11 apps · part of</span><span class="t-es">11 apps · parte de</span> <a href="../index.html">flove</a>
  </footer>
</body>
</html>
