<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>✺ flove · Puzzy</title>
  <link rel="stylesheet" href="../flove.css">
  <style>
    :root{
      --app-accent:#8d89ff; --app-accent-soft:#c9c6ff; --app-ink-on-accent:#0b0b14;
      --bg:#0a0a0f; --ink:#e9eaf2; --muted:#a3a7b4;
      --line:#1e2133; --field:#13162a; --accent2:#70f0d3;
      --grad:linear-gradient(135deg, var(--app-accent), var(--accent2));
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; color:var(--ink);
      background:
        radial-gradient(1100px 760px at 110% -10%, rgba(141,137,255,.20), transparent 60%),
        radial-gradient(900px 680px at -10% 120%, rgba(112,240,211,.13), transparent 50%),
        var(--bg);
      background-attachment:fixed; font-family:var(--flove-font-ui); letter-spacing:.2px;
    }

    /* i18n — pure CSS (§13.2) */
    .t-es{ display:none }
    body:has(#ui-lang-es:checked) .t-en{ display:none }
    body:has(#ui-lang-es:checked) .t-es{ display:inline }
    .lang{ display:inline-flex; gap:2px }
    .lang input{ position:absolute; opacity:0; pointer-events:none }
    .lang label{ font-size:11px; font-weight:600; letter-spacing:.4px; padding:3px 9px;
      border-radius:var(--flove-radius-pill); cursor:pointer; color:var(--muted); border:1px solid transparent }
    #ui-lang-en:checked ~ label[for=ui-lang-en],
    #ui-lang-es:checked ~ label[for=ui-lang-es]{
      color:var(--app-ink-on-accent); background:var(--app-accent); border-color:var(--app-accent) }

    /* ───── topbar: brand (own logo · click-menu) + shuffle ───── */
    .flove-bar{ position:relative; display:flex; align-items:center; gap:.7rem }
    .ctl{ position:absolute; opacity:0; pointer-events:none }
    .puz-brand{ display:inline-flex; align-items:center; gap:.5rem; cursor:pointer; user-select:none }
    .puz-logo{ display:block; filter:drop-shadow(0 0 8px rgba(141,137,255,.5)); transition:transform var(--flove-fast) }
    .puz-brand:hover .puz-logo{ transform:rotate(18deg) scale(1.05) }
    .puz-brand .flove-app-name{ font-weight:800; letter-spacing:.5px }
    .puz-brand::after{ content:"▾"; font-size:.7rem; color:var(--muted);
      transition:transform var(--flove-fast), color var(--flove-fast) }
    body:has(#puz-menu:checked) .puz-brand::after{ transform:rotate(180deg); color:var(--accent2) }
    .puz-overlay{ display:none; position:fixed; inset:0; z-index:40 }
    body:has(#puz-menu:checked) .puz-overlay{ display:block }
    .puz-menu{ position:absolute; top:calc(100% + 6px); left:.7rem; z-index:50; display:none;
      flex-direction:column; gap:.1rem; min-width:200px; padding:.5rem;
      border-radius:var(--flove-radius); background:#13162a; border:1px solid var(--line); box-shadow:0 16px 40px rgba(0,0,0,.5) }
    body:has(#puz-menu:checked) .puz-menu{ display:flex }
    .puz-menu a{ display:block; padding:.5rem .7rem; border-radius:8px; color:var(--ink); text-decoration:none;
      font-size:.9rem; font-weight:600; transition:background var(--flove-fast), color var(--flove-fast) }
    .puz-menu a:hover{ background:rgba(141,137,255,.16); color:var(--accent2) }
    .puz-sep{ height:1px; margin:.35rem .2rem; background:var(--line) }
    .puz-mlabel{ font-size:.66rem; letter-spacing:.6px; text-transform:uppercase; color:var(--muted); padding:.25rem .7rem }
    .puz-menu .lang{ padding:.1rem .5rem .3rem }
    .shuffle-btn{ margin-left:auto; cursor:pointer; background:none; border:0; color:var(--app-accent-soft);
      font-size:1.2rem; line-height:1; padding:.2rem; transition:transform var(--flove-fast), color var(--flove-fast) }
    .shuffle-btn:hover{ color:var(--accent2); transform:rotate(20deg) scale(1.1) }
    .shuffle-btn:active{ transform:rotate(180deg) }

    /* ───── interactive field — category nodes + app bubbles ───── */
    main{ max-width:1100px; margin:.6rem auto 2rem; padding:0 .8rem }
    .hint{ text-align:center; color:var(--muted); font-size:.82rem; margin:.4rem 0 0 }
    .field{ position:relative; height:min(78vh,760px); min-height:540px; margin-top:.4rem; overflow:hidden; touch-action:manipulation }

    /* category NODES — big, prominent, distinct per category */
    .node{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      width:108px; height:108px; border-radius:50%; border:0; cursor:pointer; color:#0a0a0f;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.1rem; text-align:center;
      box-shadow:0 12px 34px rgba(0,0,0,.45);
      transition:left .75s cubic-bezier(.2,.85,.25,1), top .75s cubic-bezier(.2,.85,.25,1),
        transform .35s var(--flove-ease,ease), box-shadow .35s, opacity .35s; z-index:6 }
    .node .ni{ font-size:1.9rem; line-height:1 }
    .node .nl{ font-size:.82rem; font-weight:800; letter-spacing:.5px }
    .node[data-cat="rate"]    { background:radial-gradient(circle at 35% 28%, #d7d4ff, #8d89ff 78%) }
    .node[data-cat="relate"]  { background:radial-gradient(circle at 35% 28%, #b6ffe9, #25c39e 78%) }
    .node[data-cat="redefine"]{ background:radial-gradient(circle at 35% 28%, #ffe6ad, #f5a623 78%) }
    .node:hover{ transform:translate(-50%,-50%) scale(1.07) }
    .node.is-active{ transform:translate(-50%,-50%) scale(1.2);
      box-shadow:0 0 0 4px rgba(255,255,255,.16), 0 16px 46px rgba(141,137,255,.5) }
    .node.is-dim{ opacity:.42; transform:translate(-50%,-50%) scale(.84) }
    .node::after{ content:""; position:absolute; inset:-5px; border-radius:50%;
      border:2px solid rgba(255,255,255,.30); animation:pulse 3.2s ease-out infinite; pointer-events:none }
    @keyframes pulse{ 0%{ transform:scale(.92); opacity:.55 } 100%{ transform:scale(1.5); opacity:0 } }

    /* app BUBBLES — glassy pills with icons (wanty-style) */
    .bub{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      display:inline-flex; align-items:center; gap:.4rem; text-decoration:none; color:var(--ink);
      font-weight:700; letter-spacing:.3px; cursor:pointer; padding:.45rem .9rem; border-radius:var(--flove-radius-pill);
      background:radial-gradient(ellipse at 50% 26%, rgba(141,137,255,.30), rgba(112,240,211,.12) 72%, rgba(255,255,255,.04));
      border:1px solid rgba(201,198,255,.42);
      box-shadow:inset 0 1px 7px rgba(255,255,255,.22), 0 8px 20px rgba(0,0,0,.32);
      transition:left .75s cubic-bezier(.2,.85,.25,1), top .75s cubic-bezier(.2,.85,.25,1),
        opacity .4s, scale .4s, filter .3s; animation:floaty 5s ease-in-out infinite; z-index:3 }
    .bub .bi{ font-size:1.2rem; line-height:1; filter:saturate(1.1) }
    .bub .bn{ font-size:.95rem }
    .bub:hover{ filter:brightness(1.12); z-index:8 }
    .bub.is-on{ scale:1.12; z-index:7;
      box-shadow:inset 0 1px 9px rgba(255,255,255,.32), 0 10px 28px rgba(141,137,255,.5) }
    .bub.is-dim{ opacity:.28; scale:.78; filter:grayscale(.45) }
    @keyframes floaty{ 0%,100%{ translate:0 0 } 50%{ translate:0 -7px } }

    @media (prefers-reduced-motion:reduce){
      .bub{ animation:none } .node::after{ animation:none }
      .node, .bub{ transition:opacity .3s, transform .3s }
    }

    footer{ max-width:1100px; margin:0 auto 3rem; padding:1rem 1.2rem 0; color:var(--muted);
      font-size:.82rem; text-align:center; border-top:1px solid var(--line) }
    footer a{ color:var(--accent2) }
  </style>
</head>
<body>
  <nav class="flove-bar flove-bar--dark">
    <input type="checkbox" id="puz-menu" class="ctl">
    <label class="puz-brand" for="puz-menu" title="Menu" aria-label="Open menu" tabindex="0">
      <svg class="puz-logo" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <defs><linearGradient id="puzg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#8d89ff"/><stop offset="1" stop-color="#70f0d3"/></linearGradient></defs>
        <path fill="url(#puzg)" d="M10 3a2 2 0 0 1 4 0c0 .7-.3 1.3-.3 1.7 0 .3.3.3.6.3H17a1 1 0 0 1 1 1v2.4c0 .3 0 .6.3.6.4 0 1-.3 1.7-.3a2 2 0 0 1 0 4c-.7 0-1.3-.3-1.7-.3-.3 0-.3.3-.3.6V18a1 1 0 0 1-1 1h-2.4c-.3 0-.6 0-.6.3 0 .4.3 1 .3 1.7a2 2 0 0 1-4 0c0-.7.3-1.3.3-1.7 0-.3-.3-.3-.6-.3H7a1 1 0 0 1-1-1v-2.4c0-.3 0-.6-.3-.6-.4 0-1 .3-1.7.3a2 2 0 0 1 0-4c.7 0 1.3.3 1.7.3.3 0 .3-.3.3-.6V6a1 1 0 0 1 1-1h2.4c.3 0 .6 0 .6-.3 0-.4-.3-1-.3-1.7z"/>
      </svg>
      <span class="flove-app-name">Puzzy</span>
    </label>
    <label for="puz-menu" class="puz-overlay" aria-hidden="true"></label>
    <div class="puz-menu" role="menu">
      <a href="../index.html" role="menuitem">← <span class="t-en">Apps</span><span class="t-es">Apps</span></a>
      <span class="puz-sep"></span>
      <span class="puz-mlabel"><span class="t-en">Language</span><span class="t-es">Idioma</span></span>
      <span class="lang">
        <input type="radio" name="ui-lang" id="ui-lang-en" checked>
        <input type="radio" name="ui-lang" id="ui-lang-es">
        <label for="ui-lang-en">EN</label>
        <label for="ui-lang-es">ES</label>
      </span>
    </div>
    <button type="button" class="shuffle-btn" id="shuffle" title="Shuffle" aria-label="Shuffle">🎲</button>
  </nav>

  <main>
    <p class="hint"><span class="t-en">Tap a category to gather its apps · tap an app to open it</span><span class="t-es">Toca una categoría para reunir sus apps · toca una app para abrirla</span></p>
    <div class="field" id="field">
      <!-- category nodes -->
      <button type="button" class="node" data-cat="rate"><span class="ni">🎨</span><span class="nl"><span class="t-en">Rate</span><span class="t-es">Puntúa</span></span></button>
      <button type="button" class="node" data-cat="relate"><span class="ni">🕸️</span><span class="nl"><span class="t-en">Relate</span><span class="t-es">Relaciona</span></span></button>
      <button type="button" class="node" data-cat="redefine"><span class="ni">📖</span><span class="nl"><span class="t-en">Redefine</span><span class="t-es">Redefine</span></span></button>
      <!-- app bubbles (icon + name) -->
      <a class="bub" data-cat="rate"     href="raty.html"      title="Seven colour scales + the five senses as meta-rater; live phrase, axis, ranks."><span class="bi">🌈</span><span class="bn">Raty</span></a>
      <a class="bub" data-cat="rate"     href="poly.html"      title="Bipolar pairs as mutual flow, with complementary hints."><span class="bi">☯️</span><span class="bn">Poly</span></a>
      <a class="bub" data-cat="rate"     href="triady.html"    title="When two aren't enough: the triad as minimal harmony; live ranking."><span class="bi">🔱</span><span class="bn">Triady</span></a>
      <a class="bub" data-cat="rate"     href="fivy.html"      title="Order the five senses, then map their fields, simplexes and confluences."><span class="bi">🖐️</span><span class="bn">Fivy</span></a>
      <a class="bub" data-cat="relate"   href="vizy2.html"     title="The semantic mind-map: relations radiating from the core object."><span class="bi">🕸️</span><span class="bn">Vizy2</span></a>
      <a class="bub" data-cat="relate"   href="comby.html"     title="Fuzzy combinations from words and pools — full power-set, JSON export."><span class="bi">🎲</span><span class="bn">Comby</span></a>
      <a class="bub" data-cat="relate"   href="confluenty.html" title="7-column board where lists meet at a centre."><span class="bi">🌀</span><span class="bn">Confluenty</span></a>
      <a class="bub" data-cat="redefine" href="wisy.html"      title="Progressive form by depth: prism, tone, focus, then formalise."><span class="bi">📝</span><span class="bn">Wisy</span></a>
      <a class="bub" data-cat="redefine" href="vizy.html"      title="Read the whole definition back as one woven phrase."><span class="bi">👁️</span><span class="bn">Vizy</span></a>
      <a class="bub" data-cat="redefine" href="sety.html"      title="Language, scales and defaults for the whole tool."><span class="bi">⚙️</span><span class="bn">Sety</span></a>
      <a class="bub" data-cat="redefine" href="keys.html"      title="The visual alphabet of flove — symbols, glyphs and shortcuts."><span class="bi">🔑</span><span class="bn">Keys</span></a>
    </div>
  </main>

  <footer>
    <span class="t-en">11 apps · part of</span><span class="t-es">11 apps · parte de</span> <a href="../index.html">flove</a>
  </footer>

  <!-- the bubble field is JS-driven (advanced tier) -->
  <script>
  (function(){
    const field = document.getElementById('field');
    if(!field) return;
    const nodes = [...field.querySelectorAll('.node')];
    const bubs  = [...field.querySelectorAll('.bub')];
    // where each category node sits (fractions of the field)
    const anchors = { rate:{x:.24,y:.36}, relate:{x:.76,y:.36}, redefine:{x:.50,y:.78} };
    let active = null;
    const scatter = new Map();

    const rnd = (a,b)=> a + Math.random()*(b-a);
    function genScatter(){ bubs.forEach(b=> scatter.set(b, { x:rnd(.10,.90), y:rnd(.12,.86) })); }
    function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }
    function place(el, fx, fy){
      el.style.left = (clamp(fx,.04,.96)*field.clientWidth) + 'px';
      el.style.top  = (clamp(fy,.05,.95)*field.clientHeight) + 'px';
    }

    function layout(){
      const w = field.clientWidth, h = field.clientHeight;
      nodes.forEach(n=>{
        const a = anchors[n.dataset.cat]; place(n, a.x, a.y);
        n.classList.toggle('is-active', active === n.dataset.cat);
        n.classList.toggle('is-dim', !!active && active !== n.dataset.cat);
      });
      if(!active){
        bubs.forEach(b=>{ const p = scatter.get(b); place(b, p.x, p.y); b.classList.remove('is-on','is-dim'); });
        return;
      }
      const a = anchors[active];
      const mem = bubs.filter(b=> b.dataset.cat === active);
      const oth = bubs.filter(b=> b.dataset.cat !== active);
      const R = Math.min(w,h) * 0.22;                       // orbit radius
      mem.forEach((b,i)=>{
        const ang = (2*Math.PI*i/mem.length) - Math.PI/2;
        place(b, a.x + (R*Math.cos(ang))/w, a.y + (R*Math.sin(ang))/h);
        b.classList.add('is-on'); b.classList.remove('is-dim');
      });
      oth.forEach((b,i)=>{                                   // park the rest along the bottom, dim
        place(b, (i+1)/(oth.length+1), 0.965);
        b.classList.add('is-dim'); b.classList.remove('is-on');
      });
    }

    // vary the idle float so the field feels alive
    bubs.forEach((b,i)=>{ b.style.animationDuration = (4.4 + (i%5)*0.55) + 's';
                          b.style.animationDelay = (-(i%7)*0.6) + 's'; });

    nodes.forEach(n=> n.addEventListener('click', e=>{
      e.stopPropagation();
      active = (active === n.dataset.cat) ? null : n.dataset.cat;
      layout();
    }));
    // click empty field → release the cluster
    field.addEventListener('click', e=>{ if(e.target === field){ active = null; layout(); } });
    document.addEventListener('keydown', e=>{ if(e.key === 'Escape' && active){ active = null; layout(); } });

    const shuffle = document.getElementById('shuffle');
    if(shuffle) shuffle.addEventListener('click', ()=>{ genScatter(); active = null; layout(); });

    let raf = 0;
    window.addEventListener('resize', ()=>{ cancelAnimationFrame(raf); raf = requestAnimationFrame(layout); });
    // language switch can change node widths slightly → re-place
    document.querySelectorAll('input[name="ui-lang"]').forEach(r=> r.addEventListener('change', layout));

    genScatter();
    requestAnimationFrame(layout);   // first paint with real field size
  })();
  </script>
</body>
</html>
