<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DealyTier</title>
<meta name="description" content="DealyTier — the offer category switcher: flip between Minidealy, Inventary, Wanty, Dealy advanced and Rewardy in place. Pure CSS, no JavaScript; each category stays its own file. The category nav lives inside each page's own topbar (.tier-pop).">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path fill='%23d32f2f' d='M16 27.5C16 27.5 3.5 19.8 3.5 11.2 3.5 7.3 6.6 4.5 10 4.5 12.7 4.5 15 6 16 8.2 17 6 19.3 4.5 22 4.5 25.4 4.5 28.5 7.3 28.5 11.2 28.5 19.8 16 27.5 16 27.5Z'/></svg>">
<style>
/* ============================================================
   dealytier — Pure-CSS category switcher.

   Mirrors apps/blogy/index.html: a thin wrapper with NO JavaScript
   of its own. Five radio inputs drive which iframe shows via the
   sibling combinator (~). Each category page is the single source
   of truth for itself; this file only ever embeds it.

   The visible category nav lives INSIDE each page's own topbar
   (.tier-pop), not in this wrapper — switch categories via the
   embedded page's tier-pop popover.
   ============================================================ */

:root{
  --accent-rgb: 211, 47, 47;
  --accent:     rgb(var(--accent-rgb));
  --accent-deep:#9a0007;
  --ink:        #212121;
  --ink-soft:   #5a5a5a;
  --line:       rgba(0, 0, 0, .10);
  --fill-soft:  rgba(var(--accent-rgb), .07);
  --font-ui:    'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}

*{ box-sizing: border-box; }

html, body{ height: 100%; }
body{
  margin: 0;
  display: flex;
  flex-direction: column;
  font-family: var(--font-ui);
  color: var(--ink);
  background:
    radial-gradient(circle at 20% 20%, var(--fill-soft), transparent 45%),
    linear-gradient(180deg, #fafafa, #d9d9d9);
}

/* hidden state inputs — kept focusable for keyboard users */
.tier-ctl{
  position: absolute;
  width: 1px; height: 1px;
  opacity: 0;
  pointer-events: none;
}

/* ── the category stage ────────────────────────────────────── */
.tier-stage{
  flex: 1 1 auto;
  position: relative;
  min-height: 0;
}
.tier-frame{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  display: none;
  background: #fff;
}
#tier-minidealy:checked     ~ .tier-stage .tier-frame--minidealy,
#tier-inventary:checked     ~ .tier-stage .tier-frame--inventary,
#tier-wanty:checked         ~ .tier-stage .tier-frame--wanty,
#tier-dealyadvanced:checked ~ .tier-stage .tier-frame--dealyadvanced,
#tier-rewardy:checked       ~ .tier-stage .tier-frame--rewardy{
  display: block;
}
</style>
</head>
<body>

<!-- category state — Minidealy is the default landing category -->
<input type="radio" name="tier" id="tier-minidealy"     class="tier-ctl" checked>
<input type="radio" name="tier" id="tier-inventary"     class="tier-ctl">
<input type="radio" name="tier" id="tier-wanty"         class="tier-ctl">
<input type="radio" name="tier" id="tier-dealyadvanced" class="tier-ctl">
<input type="radio" name="tier" id="tier-rewardy"       class="tier-ctl">

<!-- Category switcher lives inside each page's own topbar (.tier-pop);
     this wrapper only embeds the five pages side by side. -->

<div class="tier-stage">
  <iframe class="tier-frame tier-frame--minidealy"     src="dealy-mini.html"     title="Dealy — Minidealy"     loading="lazy"></iframe>
  <iframe class="tier-frame tier-frame--inventary"     src="inventary.html"     title="Dealy — Inventary"     loading="lazy"></iframe>
  <iframe class="tier-frame tier-frame--wanty"         src="wanty.html"         title="Dealy — Wanty"         loading="lazy"></iframe>
  <iframe class="tier-frame tier-frame--dealyadvanced" src="dealy-advanced.html" title="Dealy — Dealyadvanced" loading="lazy"></iframe>
  <iframe class="tier-frame tier-frame--rewardy"       src="rewardy.html"       title="Dealy — Rewardy"       loading="lazy"></iframe>
</div>

</body>
</html>
