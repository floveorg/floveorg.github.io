<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dealy · FLOVE</title>
<meta name="description" content="Dealy launcher — a mini→super pyramid: MiniDealy at the apex widening down to Rewardy at the base, each tier entering into place. Help sits apart as its own node. Pure CSS, no JavaScript.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23dc2626' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><path d='M4 9.5h6'/><path d='M8.2 7.4 10.5 9.5 8.2 11.6'/><path d='M20 14.5h-6'/><path d='M15.8 12.4 13.5 14.5 15.8 16.6'/><circle cx='12' cy='12' r='2' fill='%23dc2626' stroke='none'/></svg>">
<style>
/* ============================================================
   dealy/index.html — the Dealy launcher.

   Displays the family as a mini→super PYRAMID: the smallest tier
   (MiniDealy) is the narrow apex, widening down to the biggest
   (Rewardy) at the base. Each rung LAUNCHES its own page (each
   page stays the single source of truth for itself).

   Fully self-contained: no external CSS/JS, no JavaScript at all.
   Entrance is a pure-CSS staggered "rise" — apex first, base last,
   every tier settling into place. Help lives OUTSIDE the pyramid
   as its own detached node.
   ============================================================ */

:root{
  --accent:  #dc2626;              /* dealy red */
  --ink:     #241413;
  --ink-soft:#6b4a47;
  --muted:   #9a7a77;
  --line:    rgba(120, 40, 36, .14);
  --font-ui: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --font-display:'Georgia', 'Times New Roman', serif;
  --ease:    cubic-bezier(.2,.8,.2,1);
}

*{ box-sizing: border-box; }
html,body{ min-height: 100%; }
body{
  margin: 0;
  font-family: var(--font-ui);
  color: var(--ink);
  background:
    radial-gradient(circle at 82% 4%,  rgba(220,38,38,.10), transparent 40%),
    radial-gradient(circle at 6% 98%,  rgba(124,58,237,.08), transparent 46%),
    linear-gradient(180deg, #fdfbfa, #f2ece9);
  background-attachment: fixed;
  display: flex;
  flex-direction: column;
}

/* ── nav tab — the proper Dealy logo lives here ────────────── */
.flove-bar{
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px;
  background: rgba(255,255,255,.6);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  border-bottom: 1px solid var(--line);
}
.dealy-brand{ display: inline-flex; align-items: center; gap: 9px; user-select: none; }
.dealy-logo{ color: var(--accent); display: block; }
.dealy-logo .g{ fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
.dealy-logo .p{ fill: currentColor; stroke: none; }
.dealy-brand:hover .dealy-logo{ animation: seal 1.6s var(--ease); }
@keyframes seal{ 40%{ transform: rotate(-8deg) scale(1.08); } 70%{ transform: rotate(4deg); } }
.dealy-name{ font-family: var(--font-display); font-weight: 600; font-size: 1.2rem; letter-spacing: .4px; }

/* ── the pyramid ───────────────────────────────────────────── */
main{
  flex: 1 1 auto; width: 100%; max-width: 500px; margin: 0 auto;
  padding: 20px 18px 30px;
  display: flex; flex-direction: column; justify-content: center;
}
.pyramid{ list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }

/* cards stripped bare — no background, border, shadow or margin;
   just icon + text. Auto-width rows are centred, so the growing
   titles alone shape the pyramid. */
.rung{
  display: flex; align-items: center; gap: 11px;
  padding: 4px 6px;
  text-decoration: none; color: var(--ink);
  transition: transform .22s var(--ease);
  animation: rise .7s var(--ease) both;
}
.rung:hover, .rung:focus-visible{ transform: translateY(-2px); outline: none; }
.rung:hover .rung-name, .rung:focus-visible .rung-name{ color: var(--a); }
.rung:focus-visible .rung-name{ text-decoration: underline; text-underline-offset: 3px; }

.rung-disc{
  flex: 0 0 auto;
  width: 30px; height: 30px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--a);
  transition: transform .22s var(--ease);
}
.rung:hover .rung-disc{ transform: scale(1.1); }
.rung-disc svg{ width: 26px; height: 26px; }

.rung-body{ display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.rung-tier{ font-size: 9.5px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase; color: var(--a); opacity: .85; }
.rung-name{ font-family: var(--font-display); font-weight: 600; line-height: 1.1; transition: color .22s var(--ease); }
.rung-slogan{ font-size: .78rem; color: var(--ink-soft); }

/* size lives in the TITLES ONLY — small apex (mini) → big base (super) */
.rung--mini     .rung-name{ font-size: 1.05rem; }
.rung--basic    .rung-name{ font-size: 1.35rem; }
.rung--normal   .rung-name{ font-size: 1.7rem;  }
.rung--advanced .rung-name{ font-size: 2.05rem; }
.rung--super    .rung-name{ font-size: 2.45rem; }

/* staggered rise — apex (mini) enters first, base (super) last */
.rung--mini    { animation-delay: .12s; }
.rung--basic   { animation-delay: .26s; }
.rung--normal  { animation-delay: .40s; }
.rung--advanced{ animation-delay: .54s; }
.rung--super   { animation-delay: .68s; }
@keyframes rise{ from{ opacity: 0; transform: translateY(28px) scale(.94); } to{ opacity: 1; transform: none; } }

/* ── Help — a node OUTSIDE the pyramid ─────────────────────── */
.aside-div{ width: 100%; max-width: 100%; height: 1px; margin: 24px 0 20px; background: var(--line); animation: fade-in .5s 1s var(--ease) both; }
.help-wrap{ display: flex; justify-content: center; }
.help-node{
  --a: #0d9488; --as: #ccfbf1;
  display: inline-flex; align-items: center; gap: 12px;
  padding: 12px 22px 12px 14px;
  text-decoration: none; color: var(--ink);
  background: rgba(255,255,255,.66);
  border: 1.5px dashed color-mix(in srgb, var(--a) 45%, transparent);
  border-radius: 999px;
  box-shadow: 0 10px 26px rgba(13,148,136,.12);
  transition: transform .22s var(--ease), box-shadow .22s var(--ease), border-color .22s var(--ease);
  animation: pop-in .55s 1.06s var(--ease) both;
}
.help-node:hover, .help-node:focus-visible{
  transform: translateY(-3px); border-color: var(--a);
  box-shadow: 0 16px 32px rgba(13,148,136,.22); outline: none;
}
.help-node:focus-visible{ box-shadow: 0 0 0 3px rgba(13,148,136,.4), 0 16px 32px rgba(13,148,136,.22); }
.help-disc{
  width: 42px; height: 42px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--as); color: var(--a);
  animation: float 4.5s ease-in-out infinite;
}
.help-disc svg{ width: 23px; height: 23px; }
.help-text{ display: flex; flex-direction: column; gap: 1px; }
.help-text b{ font-family: var(--font-display); font-weight: 600; font-size: 1.08rem; }
.help-text span{ font-size: .76rem; color: var(--ink-soft); }

@keyframes fade-in{ from{ opacity: 0; } to{ opacity: 1; } }
@keyframes pop-in{ from{ opacity: 0; transform: scale(.8); } to{ opacity: 1; transform: none; } }
@keyframes float{ 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-4px); } }

/* ── reduced motion — hold everything still, keep it usable ── */
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{ animation: none !important; }
  .rung, .help-node, .aside-div{ opacity: 1; transform: none; }
  *{ transition-duration: .01ms !important; }
}

@media (max-width: 440px){
  .rung{ gap: 9px; }
  .rung--advanced .rung-name{ font-size: 1.85rem; }
  .rung--super    .rung-name{ font-size: 2.15rem; }
}
</style>
</head>
<body>

<nav class="flove-bar">
  <span class="dealy-brand">
    <svg class="dealy-logo" viewBox="0 0 24 24" width="30" height="30" role="img" aria-label="Dealy">
      <path class="g" d="M4 9.5h6"/><path class="g" d="M8.2 7.4 10.5 9.5 8.2 11.6"/>
      <path class="g" d="M20 14.5h-6"/><path class="g" d="M15.8 12.4 13.5 14.5 15.8 16.6"/>
      <circle class="p" cx="12" cy="12" r="2"/>
    </svg>
    <span class="dealy-name">Dealy</span>
  </span>
</nav>

<main>
  <!-- The pyramid — apex (mini) at top, widening to the base (super).
       Each rung links straight to its own page. -->
  <ol class="pyramid">
    <li>
      <a class="rung rung--mini" href="dealy-mini.html" style="--a:#059669;--as:#d1fae5;" aria-label="MiniDealy — mini tier">
        <span class="rung-disc" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 8h10l-2.4-2.4M17 16H7l2.4 2.4"/><path d="M12 12.4a1.6 1.6 0 0 0 1.6-1.6c0-1.1-1.6-2.4-1.6-2.4s-1.6 1.3-1.6 2.4A1.6 1.6 0 0 0 12 12.4z"/></svg>
        </span>
        <span class="rung-body">
          <span class="rung-tier">Mini</span>
          <span class="rung-name">MiniDealy</span>
          <span class="rung-slogan">A small kind swap.</span>
        </span>
      </a>
    </li>
    <li>
      <a class="rung rung--basic" href="inventary.html" style="--a:#1e4a6b;--as:#b9d2e5;" aria-label="Inventary — basic tier">
        <span class="rung-disc" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 8.5h17v11h-17zM3.5 8.5 6 4.5h12l2.5 4M12 4.5v15"/></svg>
        </span>
        <span class="rung-body">
          <span class="rung-tier">Basic</span>
          <span class="rung-name">Inventary</span>
          <span class="rung-slogan">All of yours.</span>
        </span>
      </a>
    </li>
    <li>
      <a class="rung rung--normal" href="wanty.html" style="--a:#1f6390;--as:#c0d4e8;" aria-label="Wanty — normal tier">
        <span class="rung-disc" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.6l2.6 5.5 6 .9-4.3 4.2 1 6-5.3-2.8L6.7 20.2l1-6L3.4 10l6-.9z"/></svg>
        </span>
        <span class="rung-body">
          <span class="rung-tier">Normal</span>
          <span class="rung-name">Wanty</span>
          <span class="rung-slogan">Start thriving.</span>
        </span>
      </a>
    </li>
    <li>
      <a class="rung rung--advanced" href="dealy-advanced.html" style="--a:#dc2626;--as:#fee2e2;" aria-label="Dealy — advanced tier">
        <span class="rung-disc" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.2 12.6 12.6 20.2a1.9 1.9 0 0 1-2.7 0l-6.1-6.1a1.9 1.9 0 0 1-.6-1.4V5a1.9 1.9 0 0 1 1.9-1.9h7.7c.5 0 1 .2 1.4.6l6 6a1.9 1.9 0 0 1 0 2.9z"/><circle cx="7.6" cy="7.6" r="1.3"/></svg>
        </span>
        <span class="rung-body">
          <span class="rung-tier">Advanced</span>
          <span class="rung-name">Dealy</span>
          <span class="rung-slogan">Gift, lend, swap&hellip;</span>
        </span>
      </a>
    </li>
    <li>
      <a class="rung rung--super" href="rewardy.html" style="--a:#7c3aed;--as:#ede9fe;" aria-label="Rewardy — super tier">
        <span class="rung-disc" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8.8" r="5.3"/><path d="M8.6 13.2 6.6 21l5.4-2.9 5.4 2.9-2-7.8"/></svg>
        </span>
        <span class="rung-body">
          <span class="rung-tier">Super</span>
          <span class="rung-name">Rewardy</span>
          <span class="rung-slogan">Earn direct.</span>
        </span>
      </a>
    </li>
  </ol>

  <!-- Help — a node on its own, deliberately off the pyramid. -->
  <div class="aside-div" aria-hidden="true"></div>
  <div class="help-wrap">
    <a class="help-node" href="help.html" aria-label="Help — chat and guides">
      <span class="help-disc" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-12.4 7.4L3 21l1.6-4.5A8.4 8.4 0 1 1 21 11.5z"/><path d="M9.2 9.4a2.8 2.8 0 0 1 5.5.8c0 1.9-2.8 2.5-2.8 2.5"/><path d="M12 16.2h.01"/></svg>
      </span>
      <span class="help-text">
        <b>Help</b>
        <span>Chat &amp; guides.</span>
      </span>
    </a>
  </div>
</main>

</body>
</html>
