<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Inventary · FLOVE</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='12' y1='12' x2='52' y2='54' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23f6cf3f'/%3E%3Cstop offset='1' stop-color='%235bbf3a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cg fill='none' stroke='url(%23g)' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='13' y='31' width='23' height='20' rx='2.5'/%3E%3Crect x='30' y='16' width='22' height='20' rx='2.5'/%3E%3Cpath d='M35.5 26 l3.5 3.6 L46.5 22' stroke-width='3.8'/%3E%3C/g%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      /* flove identity overrides — navy Inventary */
      --app-accent:        #1e4a6b;
      --app-accent-soft:   #b9d2e5;
      --app-ink-on-accent: #ffffff;
    }
    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      background: #f5f9ff;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0.6rem 0.6rem 1.2rem;
      color: #1a2e3f;
      line-height: 1.4;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── MyFamily-style header: bigger logo + info panel ── */
    .flove-bar {
      font-size: 22px;
      padding: 12px 18px;
      gap: 14px;
      background: transparent;
      border-bottom: 0;
      box-shadow: none;
    }
    .flove-bar .flove-mark { width: 2em; height: 2em; vertical-align: -.15em; overflow: visible; }
    .flove-bar .flove-app-name {
      font-size: 1em;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--app-accent);
    }
    .flove-bar .flove-mark-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: inherit;
    }
    .app-name-toggle {
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      letter-spacing: inherit;
      color: var(--app-accent);
      cursor: pointer;
      transition: opacity 0.2s, color 0.2s;
    }
    .app-name-toggle:hover { opacity: 0.78; }
    .app-name-toggle:focus-visible {
      outline: 2px solid var(--app-accent);
      outline-offset: 4px;
      border-radius: 8px;
    }
    .app-name-toggle[aria-expanded="true"] { color: #0a2a44; }

    .info-panel {
      position: relative;
      max-width: 480px;
      margin: 0.8rem auto 1.2rem;
      padding: 1.4rem 1.5rem 1.5rem;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--app-accent-soft);
      border-radius: 22px;
      box-shadow: 0 16px 36px -12px rgba(30, 74, 107, 0.25);
      display: none;
      animation: info-panel-pop 0.28s cubic-bezier(.2,.8,.2,1);
      z-index: 5;
    }
    .info-panel.is-open { display: block; }
    .info-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--app-accent);
      background: #ffffff;
      color: var(--app-accent);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 14px -4px rgba(30, 74, 107, 0.3);
      transition: background 0.2s, color 0.2s, transform 0.2s, box-shadow 0.2s;
      z-index: 2;
    }
    .info-close:hover {
      background: var(--app-accent);
      color: #ffffff;
      transform: scale(1.06);
    }
    .info-close svg { width: 22px; height: 22px; fill: none; }
    .info-content {
      max-width: 760px;
      margin: 0 auto;
      padding-right: 56px;
      color: #1c3a55;
    }
    .info-content h3 {
      font-weight: 600;
      font-size: 1.2rem;
      color: #0f2f44;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }
    .info-content p { margin: 0 0 0.5rem; font-size: 0.92rem; line-height: 1.55; }
    .info-hint { color: #58738c; font-style: italic; font-size: 0.85rem; }
    .info-video-frame {
      margin-top: 0.9rem;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, var(--app-accent-soft), #8aaecb);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
    }
    .info-video-frame::before {
      content: '🎬  Intro video';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(15, 47, 68, 0.6);
      font-style: italic;
      font-size: 0.95rem;
      pointer-events: none;
    }
    .info-video {
      position: relative;
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
      z-index: 1;
    }
    @keyframes info-panel-pop {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .info-panel { animation: none; }
    }

    /* tabs – icons only, two rows: visible + collapsible-extra */
    .tabs-wrapper {
      margin: 0.4rem 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      justify-content: stretch;
      flex-wrap: nowrap;
      overflow-x: visible;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tabs--extra { display: none; }
    .tabs--extra.is-open { display: flex; }

    .tab {
      background: white;
      border: 1px solid #d3e0ea;
      color: #1e405b;
      flex: 1 1 0;
      min-width: 0;
      height: 40px;
      border-radius: 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: flex .25s, max-width .25s, background .15s, color .15s, border-color .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      padding: 2px 4px;
      overflow: hidden;
    }

    .tab .tab-label {
      display: none;
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
      text-transform: uppercase;
      line-height: 1;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab.active {
      background: #1e4a6b;
      border-color: #1e4a6b;
      color: white;
      flex: 2.5 1 auto;
      max-width: 50%;
      padding: 2px 10px;
    }
    .tab.active .tab-label { display: inline-block; }

    .tab i { font-size: 1.2rem; }

    .tab-plus {
      background: var(--app-accent-soft);
      border-color: var(--app-accent);
      color: var(--app-accent);
      font-weight: 700;
    }
    .tab-plus[aria-expanded="true"] {
      background: var(--app-accent);
      border-color: var(--app-accent);
      color: white;
      transform: rotate(45deg);
    }

    /* magic toggle — sits at the end of the tab row · enables multi-select
       of categories + a bubble view of their items' icons */
    .tab-magic {
      flex: 0 0 auto;
      min-width: 40px;
      background: #efeaff;
      border-color: #7c6bd6;
      color: #5b4bc4;
    }
    .tab-magic[aria-pressed="true"] {
      background: linear-gradient(180deg, #6d5cd6, #5b4bc4);
      border-color: #5b4bc4;
      color: #fff;
      box-shadow: 0 6px 14px -4px rgba(91, 75, 196, 0.45);
    }

    /* ── Bubble view (multi-select magic mode) ────────────────────── */
    #bubbleView { display: none; }
    body.magic-mode .table-wrapper,
    body.magic-mode .paginator { display: none; }
    body.magic-mode #bubbleView {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: white;
      border: 1px solid #e0eaf3;
      border-radius: 18px;
      padding: 1.2rem 1rem 1.4rem;
      box-shadow: 0 6px 14px -6px rgba(0, 20, 40, 0.06);
      margin-bottom: 1.2rem;
    }
    .bubble-legend {
      display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;
      font-size: 0.72rem; font-weight: 600; color: #5a7488;
    }
    .bubble-legend .dot {
      width: 12px; height: 12px; border-radius: 50%;
      display: inline-block; margin-right: 5px; vertical-align: middle;
    }
    .bubble-legend .dot.have { background: #2b7a4b; }
    .bubble-legend .dot.wish { background: #2f6eb0; }
    .bubble-legend .dot.want { background: #d18e1a; }
    .bubble-legend .dot.need { background: #c7362b; }
    .bubble-legend .dot.reset { background: #fff; border: 1px solid #9bb2c4; }
    .bubble-hint {
      width: 100%; text-align: center;
      color: #6a8aa3; font-size: 0.85rem; padding: 1rem 0;
    }
    /* The cloud is a relative box whose height is set by JS from the bubble
       count, so the area expands as more items are revealed (never crammed).
       Bubbles are absolutely positioned and drift / bounce via a JS physics
       loop — exactly like shary's reasons cloud. Each rises up from below
       on first appearance (staggered), then base styles take over so hover
       still works. */
    .bubble-cloud {
      position: relative;
      width: 100%;
      min-height: 200px;
      transition: height 0.35s ease;
    }
    .inv-bubble {
      position: absolute;
      width: 50px; height: 50px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
      border: 1px solid rgba(30, 74, 107, 0.15);
      background: radial-gradient(circle at 32% 28%, #fff 0%, #f0f6fc 70%, #e3eef7 100%);
      color: #1e4a6b; cursor: pointer; overflow: hidden;
      box-shadow: inset 1px 1px 2px rgba(255, 255, 255, 0.9), 0 2px 5px rgba(0, 0, 0, 0.08);
      /* no transition on left/top — those are driven by the physics loop */
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.12s;
      animation: inv-bubble-in 0.6s cubic-bezier(0.22, 0.9, 0.35, 1.05) backwards;
      animation-delay: calc(var(--ri, 0) * 0.045s);
    }
    .inv-bubble > i { font-size: 1rem; line-height: 1; }
    .inv-bubble:hover {
      transform: scale(1.12); border-color: var(--app-accent); z-index: 2;
    }
    @keyframes inv-bubble-in {
      0%   { opacity: 0; transform: translateY(44px) scale(0.5); }
      60%  { opacity: 1; transform: translateY(-5px) scale(1.06); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .inv-bubble[data-state="have"] { background: #2b7a4b; color: #fff; border-color: #2b7a4b; }
    .inv-bubble[data-state="wish"] { background: #2f6eb0; color: #fff; border-color: #2f6eb0; }
    .inv-bubble[data-state="want"] { background: #d18e1a; color: #fff; border-color: #d18e1a; }
    .inv-bubble[data-state="need"] { background: #c7362b; color: #fff; border-color: #c7362b; }
    /* item title — hidden by default; once the bubble is checked the icon
       stays and the (abbreviated) title shows inside, below it, very small
       (3× smaller again). Full name stays in the hover tooltip. */
    .inv-bubble-label {
      display: none;
      max-width: 46px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      /* NOTE: use separate font-size — the `font:` shorthand with
         var(--font-ui, inherit) was invalid here (--font-ui isn't defined),
         so the whole declaration (incl. size) was being dropped. */
      font-weight: 600;
      font-size: 0.55rem;
      line-height: 1;
      color: inherit; pointer-events: none;
    }
    .inv-bubble[data-state] .inv-bubble-label { display: block; }
    @media (prefers-reduced-motion: reduce) {
      .inv-bubble { animation-duration: 0.01s; }
    }

    /* table */
    .table-wrapper {
      background: white;
      border-radius: 18px;
      padding: 0.1rem 0 0.2rem;
      box-shadow: 0 6px 14px -6px rgba(0, 20, 40, 0.06);
      border: 1px solid #e0eaf3;
      overflow: hidden;
      margin-bottom: 1.2rem;
    }

    .table {
      display: table;
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
    }

    .thead .tr {
      border-bottom: 2px solid #cbdbe9;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }
    /* full-cell colored header titles aligned with the 4 tabbed cells */
    .thead .th.col-have { background: #c8e6c9; color: #1f4f2c; }
    .thead .th.col-wish { background: #bbdefb; color: #0e3f6f; }
    .thead .th.col-want { background: #ffe0b2; color: #74440a; }
    .thead .th.col-need { background: #ffcdd2; color: #71161e; }
    .thead .th.col-item { background: #f2f7fc; color: #1a405b; }

    .tr {
      display: table-row;
      cursor: pointer;
    }

    .th, .td {
      display: table-cell;
      padding: 8px 4px;
      vertical-align: middle;
      border-bottom: 1px solid #e6ecf3;
      text-align: center;
    }

    .col-item {
      width: 20%;
      text-align: left;
      font-weight: 520;
      font-size: 0.75rem;
      padding-left: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .col-item .item-cat-icon {
      font-size: 0.85em;
      margin-right: 6px;
      color: var(--app-accent);
      opacity: 0.55;
      width: 1em;
      display: inline-block;
      text-align: center;
    }

    .col-have, .col-wish, .col-want, .col-need {
      width: 20%;
      cursor: pointer;
      user-select: none;
    }

    /* keep header titles strictly aligned with cells below */
    .thead .th { padding: 8px 4px; }
    .tbody .td { padding: 8px 4px; }

    /* cell selected states (no checkbox) */
    .td.selected-have {
      background: #c8e6c9;
      position: relative;
    }
    .td.selected-wish {
      background: #bbdefb;
    }
    .td.selected-want {
      background: #ffe0b2;
    }
    .td.selected-need {
      background: #ffcdd2;
    }

    /* signs inside priority cells · ONLY visible when the cell is selected */
    .tbody .tr.row .td.col-have.selected-have::before {
      content: "+";
      font-weight: 700;
      font-size: 1.05rem;
      color: #2b7a4b;
    }
    .tbody .tr.row .td.col-wish.selected-wish::before {
      content: "•";
      font-weight: 700;
      font-size: 1.4rem;
      line-height: 0.5;
      color: #2f6eb0;
    }
    .tbody .tr.row .td.col-want.selected-want::before {
      content: "−";
      font-weight: 700;
      font-size: 1.05rem;
      color: #d18e1a;
    }
    .tbody .tr.row .td.col-need.selected-need::before {
      content: "/";
      font-weight: 700;
      font-size: 1.05rem;
      color: #c7362b;
    }
    /* suppress the old ::after dot indicator on body rows */
    .tbody .tr.row .td.selected-have::after,
    .tbody .tr.row .td.selected-wish::after,
    .tbody .tr.row .td.selected-want::after,
    .tbody .tr.row .td.selected-need::after {
      content: none;
    }

    /* keep the items column neutral · no priority/new-row color bleed */
    .tbody .tr.row .td.col-item {
      background: #fff;
    }

    /* row priority indicator · colored left border only, no cell-bg bleed */
    .tbody .tr[data-priority="need"] { border-left: 4px solid #c7362b; }
    .tbody .tr[data-priority="want"] { border-left: 4px solid #d18e1a; }
    .tbody .tr[data-priority="wish"] { border-left: 4px solid #2f6eb0; }
    .tbody .tr[data-priority="have"] { border-left: 4px solid #2b7a4b; }

    .tr.hidden-row {
      display: none;
    }

    /* newly-added rows · 60% larger than baseline · no cell-bg color */
    .tbody .tr.is-new .td {
      padding-top: 14px;
      padding-bottom: 14px;
    }
    .tbody .tr.is-new .col-item {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .tbody .tr.is-new .td::after {
      font-size: 25px;
    }

    /* phrase panel */
    .phrase-panel {
      background: white;
      border-radius: 20px;
      padding: 1.4rem 0.8rem 0.8rem;
      box-shadow: 0 6px 16px rgba(0,0,0,0.02);
      border: 1px solid #dee9f2;
      position: relative;
      margin-top: 1.4rem;
    }
    /* expand pill on the top-middle border of the resume panel */
    .phrase-panel .expand-btn {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      align-self: auto;
      background: white;
      border: 1px solid var(--app-accent);
      color: var(--app-accent);
      padding: 0.4rem 0.95rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 10px rgba(30, 74, 107, 0.12);
      z-index: 3;
      transition: background .15s, color .15s, transform .15s;
    }
    .phrase-panel .expand-btn:hover {
      background: var(--app-accent);
      color: #fff;
      transform: translateX(-50%) translateY(-1px);
    }
    .phrase-panel .expand-btn .chev { font-size: .7rem; }

    /* master toggle · 'My selected things' title for the whole resume section */
    .phrase-master-btn {
      width: 100%;
      background: transparent;
      border: 0;
      color: var(--app-accent);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: inherit;
      padding: 6px 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-radius: 14px;
      transition: background .15s, color .15s;
    }
    .phrase-master-btn:hover {
      background: var(--app-accent-soft);
    }
    .phrase-master-btn .phrase-master-label { flex: 1 1 auto; text-align: center; }
    .phrase-master-btn .chev {
      transition: transform .2s;
      font-size: 0.8rem;
      opacity: 0.7;
    }
    .phrase-master-btn[aria-expanded="true"] .chev { transform: rotate(180deg); }
    .phrase-content { display: none; margin-top: 12px; }
    .phrase-panel.is-master-open .phrase-content { display: block; }

    .phrase-rows {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .phrase-line {
      border-radius: 14px;
      border: 1px solid;
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .phrase-line .pl-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.45rem 0.8rem;
      cursor: pointer;
      user-select: none;
      position: relative;
      overflow: visible;
    }
    .phrase-line .pl-title { font-weight: 600; }
    /* swap title text when section is expanded */
    .phrase-line .pl-title-open { display: none; }
    .phrase-line.open .pl-title-closed { display: none; }
    .phrase-line.open .pl-title-open { display: inline; }
    /* pill follows the title in flow; chevron is pushed to the right */
    .phrase-line .pl-head .extra-toggle { margin-left: 4px; position: relative; }
    .phrase-line .pl-head .pl-chev {
      margin-left: auto;
      transition: transform 0.18s;
      font-size: 0.75rem;
      opacity: 0.7;
    }
    /* section-level pill toggle (HAVE → shareable, WISH/WANT/NEED → much) */
    .phrase-line .pl-head .extra-toggle {
      background: rgba(255,255,255,0.85);
      border: 1px solid currentColor;
      color: inherit;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: .02em;
      opacity: 0.55;
      transition: opacity .15s, background .15s, color .15s;
    }
    .phrase-line .pl-head .extra-toggle:hover { opacity: 1; }
    .phrase-line .pl-head .extra-toggle[aria-pressed="true"] {
      background: currentColor;
      opacity: 1;
    }
    .phrase-line.phrase-have .pl-head .extra-toggle[aria-pressed="true"] { color: #1e4a2c; background: #1e4a2c; }
    .phrase-line.phrase-have .pl-head .extra-toggle[aria-pressed="true"]::after,
    .phrase-line.phrase-wish .pl-head .extra-toggle[aria-pressed="true"]::after,
    .phrase-line.phrase-want .pl-head .extra-toggle[aria-pressed="true"]::after,
    .phrase-line.phrase-need .pl-head .extra-toggle[aria-pressed="true"]::after { content: ""; }
    .phrase-line .pl-head .extra-toggle[aria-pressed="true"] {
      color: #fff !important;
      background: rgba(0,0,0,0.5);
    }
    .phrase-line.phrase-have .pl-head .extra-toggle[aria-pressed="true"] { background: #2b7a4b; }
    .phrase-line.phrase-wish .pl-head .extra-toggle[aria-pressed="true"] { background: #2f6eb0; }
    .phrase-line.phrase-want .pl-head .extra-toggle[aria-pressed="true"] { background: #d18e1a; }
    .phrase-line.phrase-need .pl-head .extra-toggle[aria-pressed="true"] { background: #c7362b; }

    /* thunder-zap: pill doubles in size on click and a few bolts splash around it */
    .phrase-line .pl-head .extra-toggle.zap {
      animation: thunder-pop .65s cubic-bezier(.2,.7,.2,1.2);
      z-index: 4;
    }
    @keyframes thunder-pop {
      0%   { transform: scale(1);   }
      35%  { transform: scale(2);   }
      60%  { transform: scale(1.3); }
      100% { transform: scale(1);   }
    }
    .thunder-bolt {
      position: absolute;
      pointer-events: none;
      font-size: 1rem;
      line-height: 1;
      opacity: 1;
      filter: drop-shadow(0 0 4px rgba(255, 235, 100, 0.8));
      animation: thunder-fly .7s cubic-bezier(.2,.7,.2,1) forwards;
      z-index: 5;
      user-select: none;
    }
    @keyframes thunder-fly {
      0%   { transform: translate(0, 0) rotate(var(--r, 0deg)) scale(.6); opacity: 1; }
      60%  { transform: translate(var(--dx, 0px), var(--dy, 0px)) rotate(var(--r, 0deg)) scale(1.4); opacity: 1; }
      100% { transform: translate(calc(var(--dx, 0px) * 1.4), calc(var(--dy, 0px) * 1.4)) rotate(var(--r, 0deg)) scale(.4); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .phrase-line .pl-head .extra-toggle.zap { animation: none; }
      .thunder-bolt { animation: none; opacity: 0; }
    }
    .phrase-line.open .pl-head .pl-chev { transform: rotate(180deg); }
    .phrase-line i { width: 18px; }
    .phrase-line.phrase-have { background: #e2f3e2; border-color: #b2d6b8; color: #1e4a2c; }

    .phrase-line.phrase-wish { background: #e1ecfc; border-color: #b3cae8; color: #154170; }

    .phrase-line.phrase-want { background: #fff1dd; border-color: #ecd1a4; color: #6e4711; }
    .phrase-line.phrase-want i { color: #d18e1a; }
    .phrase-line.phrase-need { background: #ffe9e7; border-color: #efc1bd; color: #71161e; }

    .phrase-line.open .phrase-items { display: flex; }
    .phrase-items .sel-item { background: rgba(255,255,255,0.78); }

    /* ── action buttons inside resume panel (two rows · diesafe-style) ── */
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 3.2rem;
      margin-top: 14px;
    }
    .action-buttons .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .action-buttons .row > .btn,
    .action-buttons .row > .btn-with-subs { flex: 1 1 0; min-width: 0; }
    .btn-with-subs {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
      flex: 1 1 0;
      min-width: 0;
    }
    .btn-with-subs .btn { width: 100%; }

    .subitems {
      display: flex;
      gap: 4px;
      justify-content: stretch;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-4px);

      pointer-events: none;
    }
    .btn-with-subs.is-open .subitems {
      max-height: 64px;
      opacity: 1;
      transform: translateY(0);

    }
    .subitems-above {
      position: absolute;
      left: 0; right: 0;

    }
    .subitem {
      background: #fff;
      border: 1px solid #c2d6e6;
      color: var(--app-accent);
      padding: 6px 8px;
      border-radius: 999px;

      font-weight: 500;

      flex: 1 1 0;
      min-width: 0;
      transition: all 0.15s;
    }
    .subitem:hover { background: var(--app-accent-soft); border-color: var(--app-accent); }
    .subitem-radio { position: absolute; opacity: 0; pointer-events: none; width:0; height:0; }
    .subitem.is-radio { display: inline-flex; align-items: center; justify-content: center; }
    .subitems:has(.subitem-radio[data-r="0"]:checked) .subitem.is-radio[data-r="0"],
    .subitems:has(.subitem-radio[data-r="1"]:checked) .subitem.is-radio[data-r="1"],
    .subitems:has(.subitem-radio[data-r="2"]:checked) .subitem.is-radio[data-r="2"] {
      background: var(--app-accent);
      border-color: var(--app-accent);
      color: #fff;
    }

    /* diesafe-style pill buttons */
    .btn {
      background: #fff;
      border: 1px solid var(--app-accent);
      padding: 9px 14px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.82rem;
      color: var(--app-accent);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;

    }
    .btn i { font-size: 0.78rem; }
    .btn:hover {
      background: var(--app-accent);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(30, 74, 107, 0.18);
    }
    .btn-with-subs.is-open > .btn { background: var(--app-accent); color: #fff; }

    /* ✦ F0 Update / Reset affordances (backend_plan.md §10.3a / §13.9) */
    /* Bilingual spans (flove worldball pattern): show one language at a time,
       driven by <html lang>. App is en today, ready for /translate2 wiring. */
    .t-es { display: none; }
    html[lang="es"] .t-en { display: none; }
    html[lang="es"] .t-es { display: inline; }
    .btn.ghost {
      background: transparent;
      border: 1px solid rgba(47, 127, 214, 0.45);
      color: var(--app-accent);
      font-weight: 600;
    }
    .btn.ghost:hover { background: var(--app-accent); color: #fff; }
    .flove-state-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: -1.6rem;
    }
    .update-btn { position: relative; }
    .stale-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-left: 2px;
      border-radius: 50%;
      background: #e8a23d;
      box-shadow: 0 0 0 2px rgba(232, 162, 61, 0.25);

    .reset-wrap {
      display: inline-flex;
      align-items: center;

    .reset-hint, .update-hint {

    }

    .hint-area {
      margin-top: 10px;
      text-align: center;
      min-height: 22px;
      font-size: 0.82rem;
      color: var(--app-accent);
      padding: 6px 8px;
    }

    /* ── locked label row inside tbody ── */
    .tbody .tr.label-row { cursor: default; }
    .tbody .tr.label-row .td {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      cursor: default;
      user-select: none;
    }
    .tbody .tr.label-row .td.col-have { background: #c8e6c9; color: #1f4f2c; }
    .tbody .tr.label-row .td.col-wish { background: #bbdefb; color: #0e3f6f; }
    .tbody .tr.label-row .td.col-want { background: #ffe0b2; color: #74440a; }
    .tbody .tr.label-row .td.col-need { background: #ffcdd2; color: #71161e; }
    .tbody .tr.label-row .td::after { content: none !important; }

    .foot {
      margin-top: 1rem;
      text-align: center;
      color: #58738c;
      font-size: 0.65rem;
    }

    /* expand panel: per-item checkbox + notes */
    .expand-section {
      margin-top: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .expand-btn {
      align-self: center;
      background: white;
      border: 1px solid #c2d6e6;
      color: #1e405b;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 550;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .expand-btn .chev { transition: transform 0.2s; }
    .expand-btn[aria-expanded="true"] .chev { transform: rotate(180deg); }
    .expand-empty {
      color: #5e7c95;
      font-size: 0.8rem;
      text-align: center;
      padding: 0.5rem;
    }
    .sel-item {
      background: #f6fafd;
      border: 1px solid #e0eaf3;
      border-radius: 14px;
      padding: 0.55rem 0.7rem;
      margin-bottom: 0.55rem;
    }
    .sel-item:last-child { margin-bottom: 0; }
    .sel-row {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 0.45rem;
      overflow: visible;

      font-weight: 600;
      color: #0f2f44;
      font-size: 0.85rem;

    .sel-row .item-cat-icon {
      flex: 0 0 auto;
      font-size: 0.9em;
      color: var(--app-accent);
      opacity: 0.6;
      margin-right: 2px;
      width: 1em;
      text-align: center;
    }
    /* push the chevron / anything after the pills to the far right */
    .sel-row > .sel-spacer { flex: 1 1 auto; }
    /* per-item pill toggle (Shareable on HAVE / Much on WISH/WANT/NEED) */
    .sel-row .extra-toggle {
      flex: 0 0 auto;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(30, 74, 107, 0.25);
      color: #2c4d68;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: background .15s, border-color .15s, color .15s, transform .15s;
    }
    .sel-row .extra-toggle:hover { border-color: var(--app-accent); }
    .sel-row .extra-toggle[aria-pressed="true"] {
      background: var(--app-accent);
      border-color: var(--app-accent);
      color: #fff;
    }
    /* per-item flag toggle — Urgent (Want/Need) · Fully (Wish) */
    .sel-row .flag-toggle {
      flex: 0 0 auto;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(30, 74, 107, 0.25);
      color: #2c4d68;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: background .15s, border-color .15s, color .15s;
    }
    .sel-row .flag-toggle:hover { border-color: var(--app-accent); }
    .sel-row .flag-toggle[aria-pressed="true"] {
      background: var(--app-accent); border-color: var(--app-accent); color: #fff;
    }
    .sel-row .flag-toggle[data-flag="urgent"][aria-pressed="true"] {
      background: #c7362b; border-color: #c7362b;
    }

    /* sub-pills (maybe/unlikely for Shareable · very for Much) — 20% smaller */
    .sel-row .sub-pill {
      flex: 0 0 auto;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(30, 74, 107, 0.22);
      color: #2c4d68;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.59rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: background .15s, border-color .15s, color .15s;
    }
    .sel-row .sub-pill:hover { border-color: var(--app-accent); }
    .sel-row .sub-pill[aria-pressed="true"] {
      background: var(--app-accent);
      border-color: var(--app-accent);
      color: #fff;
    }
    .sel-row .sub-pill[hidden] { display: none; }
    /* + add-sub-pill — more inviting/dashed border */
    .sel-row .sub-pill--add {
      background: transparent;
      border: 1.5px dashed var(--app-accent);
      color: var(--app-accent);
      padding: 1px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      line-height: 1;
    }
    .sel-row .sub-pill--add:hover {
      background: var(--app-accent-soft);
      border-style: solid;
      color: var(--app-accent);
      transform: scale(1.06);
    }
    .sel-row .sub-pill--add[aria-pressed="true"] {
      background: var(--app-accent);
      border-style: solid;
      color: #fff;
    }
    /* dealy-advanced.html intro panel — toggled by the + sub-pill */
    .offer-info {
      display: none;
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(185, 210, 229, 0.4);
      border: 1px dashed var(--app-accent);
      border-radius: 12px;
      font-size: 0.76rem;
      line-height: 1.45;
      color: #1c3a55;
    }
    .offer-info.is-open { display: block; }
    .offer-info a {
      color: var(--app-accent);
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid var(--app-accent);
    }
    .offer-info a:hover {
      color: #0a2a44;
      border-bottom-color: #0a2a44;
    }
    .sel-notes {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 0.4rem;
    }
    .note {
      background: #e8f1f9;
      border-radius: 10px;
      padding: 4px 6px 4px 10px;
      font-size: 0.78rem;
      color: #1c3a55;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .note-text { flex: 1; word-break: break-word; }
    .note-del {
      background: transparent;
      border: none;
      color: #b34237;
      cursor: pointer;
      padding: 0 4px;
      font-size: 1.1rem;
      line-height: 1;
    }
    .add-note {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .add-note-row {
      display: flex;
      gap: 6px;
    }
    .add-note-row input[type="text"] {
      flex: 1;
      border: 1px solid #c8d8e6;
      border-radius: 12px;
      padding: 6px 10px;
      font-size: 0.8rem;
      background: white;
      color: #1c3a55;
      min-width: 0;
    }
    .note-save {
      border: none;
      background: #1e4a6b;
      color: white;
      border-radius: 12px;
      padding: 6px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      flex-shrink: 0;
      opacity: 0.5;
      transition: opacity .15s, transform .1s;
    }
    .note-save:hover,
    .note-save:focus,
    .note-save:active { opacity: 1; }
    .note-save:active { transform: scale(0.97); }
    .add-note-tools {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding-top: 4px;
      border-top: 1px dashed #d4e0ec;
    }
    .add-note-tools .tools-left  { justify-self: start; }
    .add-note-tools .tools-right { justify-self: end; }
    .add-note-tools .tools-center {
      display: inline-flex;
      gap: 14px;
      justify-self: center;
    }
    .note-worthing {
      border: 1.5px solid transparent;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(135deg, var(--app-accent-soft) 0%, var(--app-accent) 100%) border-box;
      border-radius: 999px;
      padding: 5px 14px;
      color: var(--app-accent);
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: inherit;
      box-shadow: 0 2px 6px -2px rgba(30, 74, 107, 0.18);
      transition: background .2s, color .2s, transform .2s, box-shadow .2s;
    }
    .note-worthing:hover {
      background:
        linear-gradient(135deg, var(--app-accent-soft), var(--app-accent)) padding-box,
        linear-gradient(135deg, var(--app-accent-soft), var(--app-accent)) border-box;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 5px 12px -2px rgba(30, 74, 107, 0.32);
    }
    .sel-item.is-worthy-open .note-worthing {
      background:
        linear-gradient(135deg, var(--app-accent-soft), var(--app-accent)) padding-box,
        linear-gradient(135deg, var(--app-accent-soft), var(--app-accent)) border-box;
      color: #fff;
    }
    /* ── 8 ascending Worthy bars ─────────────────────────────────── */
    /* inline preference 1–5 bar — sits right after the Shareable button and
       never compresses when the shareable sub-pills expand */
    .pref-bars {
      display: inline-flex; align-items: flex-end; gap: 3px; margin: 0 4px;
      flex-shrink: 0;
    }
    .pref-bar {
      width: 7px; padding: 0; cursor: pointer;
      border: 1px solid #b2d6b8; border-radius: 2px 2px 0 0;
      background: #e2f3e2; font-family: inherit;
      transition: background .15s, border-color .15s, opacity .15s;
    }
    .pref-bar:hover { border-color: #2b7a4b; }
    .pref-bar.is-selected { background: #2b7a4b; border-color: #2b7a4b; }
    .pref-bars:has(.pref-bar.is-selected) .pref-bar:not(.is-selected) { opacity: 0.45; }
    .pref-bar:nth-child(1) { height: 9px; }
    .pref-bar:nth-child(2) { height: 12px; }
    .pref-bar:nth-child(3) { height: 15px; }
    .pref-bar:nth-child(4) { height: 18px; }
    .pref-bar:nth-child(5) { height: 21px; }

    .worthy-bars {
      display: none;
      align-items: flex-end;
      justify-content: space-between;
      gap: 4px;
      margin-top: 8px;
      padding: 8px 4px 2px;
      border-top: 1px dashed #d4e0ec;
    }
    .sel-item.is-worthy-open .worthy-bars { display: flex; }
    .worthy-bar {
      flex: 1;
      border: 1px solid var(--app-accent-soft);
      background: #fff;
      border-radius: 4px 4px 0 0;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      transition: background .15s, border-color .15s, transform .12s;
    }
    .worthy-bar:hover {
      background: var(--app-accent-soft);
      transform: scaleY(1.08);
      transform-origin: bottom;

      background: var(--app-accent);
      border-color: var(--app-accent);

    .worthy-bars:has(.worthy-bar.is-selected) .worthy-bar:not(.is-selected) {
      opacity: 0.5;
    }
    .worthy-bar:nth-child(1) { height: 10px; }
    .worthy-bar:nth-child(2) { height: 13px; }
    .worthy-bar:nth-child(3) { height: 16px; }
    .worthy-bar:nth-child(4) { height: 19px; }
    .worthy-bar:nth-child(5) { height: 22px; }
    .worthy-bar:nth-child(6) { height: 26px; }
    .worthy-bar:nth-child(7) { height: 30px; }
    .worthy-bar:nth-child(8) { height: 34px; }
    .note-mic,
    .note-file {
      border: 1px solid #c8d8e6;

    .inventary-menu-wrap { position: relative; display: inline-flex; align-items: center; }

      font-family: inherit;
    }
    .inventary-menu-list .menu-item:hover { background: var(--app-accent-soft); color: var(--app-accent); }
    .inventary-menu-list .menu-sep {
      height: 1px;
      background: var(--app-accent-soft);
      margin: 4px 6px;
    }
    .inventary-menu-list .menu-ic { font-size: 1rem; width: 18px; text-align: center; }

    /* ── label-row col-item · magic + bots + input field ─────────── */
    .tbody .tr.label-row .td.col-item {
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
      overflow: visible;
      padding: 4px 4px 4px 6px;
      background: #f2f7fc;
    }
    .col-item-inner {
      position: relative;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .inventary-add-btn {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1.5px dashed var(--app-accent);
      background: #fff;
      color: var(--app-accent);
      border-radius: 50%;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      transition: background .15s, border-style .15s, transform .15s, color .15s;
    }
    .inventary-add-btn:hover {
      background: var(--app-accent-soft);
      border-style: solid;
      transform: scale(1.08);
    }
    .inventary-add-btn:active {
      background: var(--app-accent);
      color: #fff;
    }
    .inventary-add-btn i { font-size: 0.72rem; }
    .inventary-magic-ctl { display: none; }
    .inventary-magic-btn {
      cursor: pointer;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #fff;
      border: 1px solid var(--app-accent-soft);
      box-shadow: 0 1px 3px rgba(30, 74, 107, 0.18);
      font-size: 0.85rem;
      line-height: 1;
      transition: background .15s, transform .15s, box-shadow .15s;
      user-select: none;
    }
    .inventary-magic-btn:hover {
      background: var(--app-accent-soft);
      transform: scale(1.08);
    }
    body:has(.inventary-magic-ctl:checked) .inventary-magic-btn {
      background: var(--app-accent-soft);
      transform: rotate(15deg);
    }
    .inventary-bots {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      display: none;
      gap: 4px;
      z-index: 6;
      background: #fff;
      border: 1px solid var(--app-accent-soft);
      border-radius: 999px;
      padding: 3px 8px;
      box-shadow: 0 6px 14px rgba(30, 74, 107, 0.22);
    }
    body:has(.inventary-magic-ctl:checked) .inventary-bots { display: inline-flex; }
    .inventary-bot {
      background: transparent;
      border: 0;
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background .15s, transform .15s;
    }
    .inventary-bot:hover {
      background: rgba(30, 74, 107, 0.12);
      transform: scale(1.2);
    }
    .inventary-new-input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--app-accent-soft);
      background: #fff;
      border-radius: 8px;
      font-size: 0.74rem;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      color: #1a405b;
      padding: 5px 8px;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    .inventary-new-input:focus {
      outline: none;
      border-color: var(--app-accent);
      box-shadow: 0 0 0 2px rgba(30, 74, 107, 0.12);
    }
    .inventary-new-input::placeholder {
      color: #6b8aa3;
      font-style: italic;
      font-weight: 400;
      text-transform: none;
    }
    /* magic open · input gets a tinted bg; collapsed returns to original */
    body:has(.inventary-magic-ctl:checked) .inventary-new-input {
      background: var(--app-accent-soft);
      border-color: var(--app-accent);
    }
    /* obvious feedback when a bot fills the input */
    .inventary-new-input.is-bot-filled {
      border-color: var(--app-accent);
      box-shadow: 0 0 0 2px rgba(30, 74, 107, 0.18);
      animation: bot-fill-flash 0.55s ease;
    }
    @keyframes bot-fill-flash {
      0%   { background: var(--app-accent); color: #fff; transform: scale(1.04); }
      60%  { background: var(--app-accent-soft); color: #1a405b; }
      100% { background: #fff; color: #1a405b; transform: scale(1); }
    }

    /* X clear button — visible only when bot has filled the input */
    .inventary-clear-btn {
      display: none;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      border: 1px solid var(--app-accent);
      background: #fff;
      color: var(--app-accent);
      border-radius: 50%;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s, transform .15s;
    }
    .inventary-clear-btn:hover {
      background: var(--app-accent);
      color: #fff;
      transform: scale(1.08);
    }
    .col-item-inner:has(.inventary-new-input.is-bot-filled) .inventary-clear-btn {
      display: inline-flex;
    }

    /* ── extra Expand button row at the bottom of action-buttons ─── */
    .action-buttons .row--expand { margin-top: -1.6rem; }
    .action-buttons .row--expand .btn { flex: 1 1 auto; }

    /* ── paginator (30 items per page) ───────────────────────────── */
    .paginator {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 0.2rem 0 1rem;
      padding: 6px 8px;
      flex-wrap: wrap;
    }
    .page-btn {
      background: #fff;
      border: 1px solid var(--app-accent);
      color: var(--app-accent);
      padding: 6px 14px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
      transition: background .15s, color .15s, transform .12s;
    }
    .page-btn:hover:not(:disabled) {
      background: var(--app-accent);
      color: #fff;
      transform: translateY(-1px);
    }
    .page-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .page-info {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--app-accent);
      min-width: 72px;
      text-align: center;
    }
    .tr.hidden-page { display: none; }

    /* ── responsive breakpoints ──────────────────────────────────── */

    /* móvil medio (≤480px) — rango típico de smartphone moderno */
    @media (max-width: 480px) {
      body { padding: 0.5rem 0.45rem 1rem; }
      .flove-bar { padding: 10px 12px; gap: 10px; }
      .info-panel { padding: 1.1rem 1.1rem 1.2rem; border-radius: 18px; }
      .info-content { padding-right: 48px; }
      .action-buttons { gap: 2.4rem; }
      .action-buttons .row { gap: 6px; }
      .hint-area { font-size: 0.78rem; }
      .paginator { gap: 8px; }
    }

    /* móvil estrecho (≤360px) — iPhone SE y similares */
    @media (max-width: 360px) {
      body { padding: 0.4rem 0.35rem 0.9rem; font-size: 0.95rem; }
      .flove-bar { font-size: 18px; padding: 8px 10px; gap: 8px; }
      .flove-bar .flove-mark { width: 1.7em; height: 1.7em; }
      .tab { height: 36px; font-size: 0.9rem; }
      .tab i { font-size: 1.05rem; }
      .tab.active { max-width: 56%; padding: 2px 6px; }
      .th, .td { padding: 6px 2px; }
      .col-item { font-size: 0.7rem; padding-left: 6px; }
      .thead .tr { font-size: 0.7rem; }
      .btn { padding: 8px 10px; font-size: 0.76rem; }
      .page-btn { padding: 5px 10px; font-size: 0.74rem; }
      .page-info { min-width: 56px; font-size: 0.76rem; }
      .action-buttons { gap: 2rem; }
      .sel-row .extra-toggle { padding: 3px 9px; font-size: 0.7rem; }
      .sel-row .sub-pill { padding: 2px 8px; font-size: 0.56rem; }
      .info-close { width: 38px; height: 38px; }
    }

    /* landscape móvil — pantallas anchas y bajas, recuperar vertical */
    @media (orientation: landscape) and (max-height: 500px) {
      body { padding: 0.35rem 0.6rem 0.8rem; }
      .flove-bar { padding: 6px 14px; }
      .info-panel { margin: 0.5rem auto 0.8rem; padding: 0.9rem 1.2rem 1rem; }
      .tab { height: 34px; }
      .action-buttons { gap: 1.6rem; margin-top: 8px; }
    }

    /* tablet / desktop (≥640px) — aprovechar el ancho extra */
    @media (min-width: 640px) {
      body { padding: 1rem 1rem 1.6rem; }
      .app { max-width: 600px; }
      .info-panel { max-width: 600px; }
      .info-content { max-width: 820px; }
      .flove-bar { padding: 14px 22px; }
      .action-buttons { gap: 3.6rem; }
    }
    /* ── Tier pop: 5-category offer switcher ── */
    .tier-pop-ctl{ position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
    .tier-pop{ position:relative; display:inline-flex; align-items:center; flex-shrink:0; margin-left:auto; }
    .tier-pop-btn{
      position:relative; z-index:2;
      display:inline-flex; align-items:center; justify-content:center;
      width:36px; height:36px; border-radius:50%; border:0;
      background:transparent; color:var(--ink-soft);
      cursor:pointer; transition:background .15s, color .15s;
    }
    .tier-pop-btn svg{ display:block; }
    .tier-pop-btn:hover, .tier-pop-btn:focus-visible,
    body:has(#tier-pop-open:checked) .tier-pop-btn{
      color:#fff; background:var(--accent);
    }
    .tier-pop-rays{
      position:absolute; right:calc(100% + 8px); top:50%;
      transform:translateY(-50%);
      display:none; align-items:center; gap:1.1rem;
      margin:0; padding:.3rem .8rem; list-style:none;
      background:rgba(255,255,255,.95);
      border:1px solid var(--line-strong);
      border-radius:999px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      white-space:nowrap; z-index:20;
    }
    body:has(#tier-pop-open:checked) .tier-pop-rays{ display:flex; }
    .tier-pop-step{
      position:relative; z-index:1;
      display:flex; flex-direction:column; align-items:center; gap:.2rem;
      padding:.2rem .4rem; border-radius:8px;
      text-decoration:none; color:inherit;
      transition:background .15s;
    }
    .tier-pop-step:hover{ background:var(--accent-soft, rgba(220,38,38,.08)); }
    .tier-pop-step:not(:last-child)::after{
      content:""; position:absolute; top:9px; left:100%;
      width:1.1rem; height:2px;
      background:var(--line-strong); z-index:0;
    }
    .tier-pop-node{
      width:12px; height:12px; border-radius:50%;
      background:#fff; border:2px solid var(--line-strong);
      transition:background .15s, border-color .15s, transform .15s, box-shadow .15s;
    }
    .tier-pop-step:hover .tier-pop-node{ border-color:var(--accent); }
    .tier-pop-label{
      font:600 .6rem/1 var(--font-ui, system-ui);
      color:var(--ink-soft); white-space:nowrap;
    }
    .tier-pop-step:hover .tier-pop-label{ color:var(--accent-deep); }
    .tier-pop-step--current .tier-pop-node{
      background:var(--accent); border-color:var(--accent-deep);
      transform:scale(1.18);
      box-shadow:0 0 0 3px var(--accent-glow, rgba(220,38,38,.22));
    }
    .tier-pop-step--current .tier-pop-label{ color:var(--accent-deep); font-weight:700; }
  </style>
</head>

<div class="app">
  <!-- Tabs: 1 visible row + 1 collapsible extra row, each row holds 8 buttons -->
  <div class="tabs-wrapper">
    <div class="tabs" id="categoryTabs"></div>
    <div class="tabs tabs--extra" id="categoryTabsExtra"></div>
  </div>

  <!-- Table with clickable cells (no thead — first body row is a fixed label row) -->
  <div class="table-wrapper">
    <div class="table" role="table">
      <div class="tbody" id="tableBody">
        <div class="tr label-row" data-locked="1">
          <span class="td col-item">
            <span class="col-item-inner">
              <input type="text" class="inventary-new-input" id="inventaryNewInput" placeholder="New thing here" aria-label="New thing">
              <button type="button" class="inventary-clear-btn" id="inventaryClearBtn" title="Clear bot suggestion" aria-label="Clear bot suggestion">×</button>
              <input type="checkbox" id="inventaryMagic" class="inventary-magic-ctl" aria-label="Magic">
              <label class="inventary-magic-btn" for="inventaryMagic" title="Magic · suggest a name" tabindex="0">✨</label>
              <button type="button" class="inventary-add-btn" id="inventaryAddBtn" title="Save to top" aria-label="Save to top"><i class="fas fa-floppy-disk"></i></button>
              <span class="inventary-bots" role="group" aria-label="Bots">
                <button type="button" class="inventary-bot" data-bot="lovely" title="Bot · lovely" aria-label="Bot lovely">😍</button>
                <button type="button" class="inventary-bot" data-bot="joy" title="Bot · joy" aria-label="Bot joy">😂</button>
                <button type="button" class="inventary-bot" data-bot="wisdom" title="Bot · wisdom" aria-label="Bot wisdom">🔥</button>
              </span>
            </span>
          </span>
          <span class="td col-have">HAVE</span>
          <span class="td col-wish">WISH</span>
          <span class="td col-want">WANT</span>
          <span class="td col-need">NEED</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Bubble view · shown in magic multi-select mode (icons of items in the picked categories) -->
  <div id="bubbleView" role="group" aria-label="Category items as bubbles"></div>

  <!-- Paginator · 30 items per page -->
  <div class="paginator" id="paginator" role="group" aria-label="Pagination">
    <button class="page-btn" id="prevPageBtn" type="button" aria-label="Previous page">
      <i class="fas fa-chevron-left"></i> Prev
    </button>
    <span class="page-info" id="pageInfo">1 / 1</span>
    <button class="page-btn" id="nextPageBtn" type="button" aria-label="Next page">
      Next <i class="fas fa-chevron-right"></i>
    </button>
  </div>

  <!-- Resume / phrase rows · master 'My selected things' toggle + per-section headers -->
  <div class="phrase-panel" id="phrasePanel">
    <button class="phrase-master-btn" id="phraseMasterBtn" type="button" aria-expanded="false">
      <span class="phrase-master-label">Selected things</span>
      <i class="fas fa-chevron-down chev"></i>
    </button>
    <div class="phrase-content" id="phraseContent">

      <div class="phrase-line phrase-have" data-type="have">

            <span class="pl-title-closed"><span id="haveCount">0</span> HAVE</span>

          <i class="fas fa-chevron-down pl-chev"></i>

    <!-- Two rows of pill buttons (diesafe-style): Insights/Creative/Copy + Save/Share/Publish -->
    <div class="action-buttons">
      <!-- ✦ F0 state row (backend_plan.md §10.3a / §13.9): Update (Reset moved to its own row below) -->
      <div class="flove-state-row">
        <button class="btn ghost update-btn" type="button" data-flove-update>Update <span class="stale-dot" hidden role="img" aria-label="Out of date"></span></button>

        <button class="btn" id="insightsBtn" type="button"><i class="fas fa-brain"></i> Insights</button>
        <button class="btn" id="creativeBtn" type="button"><i class="fas fa-wand-magic-sparkles"></i> Creative</button>
        <button class="btn ghost update-btn" type="button" data-flove-update>Update <span class="stale-dot" hidden role="img" aria-label="Out of date"></span></button>
        <button class="btn" id="copyBtn" type="button"><i class="far fa-copy"></i> Copy</button>
      </div>
      <div class="row">

    // ---------- BUILD TABLE (cells without checkboxes) ----------
    const tbody = document.getElementById('tableBody');
    function iconHtml(itemName) {
      const icon = itemIconMap[itemName];
      return icon ? `<i class="fas ${icon} item-cat-icon" aria-hidden="true"></i>` : '';
    }
    function buildRow(itemName, catClass) {
      const div = document.createElement('div');
      div.className = `tr row ${catClass}`;
      div.setAttribute('data-category', catClass.replace('cat-', ''));
      div.innerHTML = `
        <span class="td col-item">${iconHtml(itemName)}${itemName}</span>
        <span class="td col-have" data-type="have"></span>
        <span class="td col-wish" data-type="wish"></span>
        <span class="td col-want" data-type="want"></span>
        <span class="td col-need" data-type="need"></span>
      `;
      return div;
    }

    demoItems.forEach(([name, catClass]) => tbody.appendChild(buildRow(name, catClass)));

    // ---------- HELPERS ----------
    function getRows() {
      // exclude the locked label row at the top of tbody
      return Array.from(document.querySelectorAll('.tbody .tr.row:not(.label-row)'));
    }

    // Determine priority for row highlight
    function updateRowPriority(row) {
      const need = row.querySelector('.col-need')?.classList.contains('selected-need');
      const want = row.querySelector('.col-want')?.classList.contains('selected-want');
      const wish = row.querySelector('.col-wish')?.classList.contains('selected-wish');
      const have = row.querySelector('.col-have')?.classList.contains('selected-have');
      let priority = '';
      if (need) priority = 'need';
      else if (want) priority = 'want';
      else if (wish) priority = 'wish';
      else if (have) priority = 'have';
      row.setAttribute('data-priority', priority);
    }

    function updateAllHighlights() {
      getRows().forEach(r => updateRowPriority(r));
    }

    // Counts for phrase
    const haveSpan = document.getElementById('haveCount');
    const wishSpan = document.getElementById('wishCount');
    const wantSpan = document.getElementById('wantCount');
    const needSpan = document.getElementById('needCount');

    function updateCounts() {
      // count ALL selections, regardless of active category filter
      const visible = getRows();
      let have = 0, wish = 0, want = 0, need = 0;
      visible.forEach(r => {
        if (r.querySelector('.col-have')?.classList.contains('selected-have')) have++;
        if (r.querySelector('.col-wish')?.classList.contains('selected-wish')) wish++;
        if (r.querySelector('.col-want')?.classList.contains('selected-want')) want++;
        if (r.querySelector('.col-need')?.classList.contains('selected-need')) need++;
      });
      haveSpan.textContent = have;
      wishSpan.textContent = wish;
      wantSpan.textContent = want;
      needSpan.textContent = need;
    }

    // Cell click handler (toggle selection) — ignores the locked label row
    function handleCellClick(e) {
      const cell = e.target.closest('.td');
      if (!cell) return;
      const row = cell.closest('.tr');
      if (!row || row.classList.contains('label-row')) return;
      if (!row.classList.contains('row')) return;

      const type = cell.dataset.type; // 'have','wish','want','need'
      if (!type) return;

      // Toggle the selected class on this cell
      cell.classList.toggle(`selected-${type}`);

      // Update row priority and counts
      updateRowPriority(row);
      updateCounts();
    }

    // Tab filtering — selectors include all rows of tabs + the topbar 'All' button
    let activeCat = null;
    let lastSpecificCat = null; // remembers last selected category (not 'all') for All-deselect restore
    const tabs = document.querySelectorAll('.tabs .tab:not(.tab-plus):not(.tab-magic)');
    const topbarAllBtn = document.getElementById('topbarAllBtn');
    function filterByCategory(catId) {
      // toggle behavior
      if (catId !== null && catId === activeCat) {
        // deselecting 'all' restores the previously selected specific category
        if (catId === 'all' && lastSpecificCat) {
          catId = lastSpecificCat;
        } else {
          catId = null;
        }
      }
      const catInfo = catId ? categories.find(c => c.id === catId) : null;
      const targetClass = catInfo ? catInfo.class : '';
      const showAll = !catId || catId === 'all';
      getRows().forEach(row => {
        if (showAll || row.classList.contains(targetClass)) {
          row.classList.remove('hidden-row');
        } else {
          row.classList.add('hidden-row');
        }
      });
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.cat === catId));
      if (topbarAllBtn) topbarAllBtn.classList.toggle('active', catId === 'all');
      // remember the last specific category for All-deselect restoration
      if (catId && catId !== 'all') lastSpecificCat = catId;
      activeCat = catId;
      currentPage = 0;
      applyPagination();
      updateCounts();
    }
    if (topbarAllBtn) topbarAllBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (multiMode) {
        const allSel = categories.every(c => selectedCats.has(c.id));
        selectedCats.clear();
        catLevel.clear();
        if (!allSel) categories.forEach(c => { selectedCats.add(c.id); catLevel.set(c.id, 1); });
        syncTabActive();
        renderBubbles();
        return;
      }
      filterByCategory('all');
    });

    // ---------- MAGIC MULTI-SELECT · BUBBLE VIEW ----------
    // The wand at the end of the tab row turns categories multi-selectable
    // and swaps the table for a cloud of bubbles — one per item in the
    // picked categories, showing only its icon. Clicking a bubble cycles
    // its state: 1× have · 2× wish · 3× want · 4× need · 5× clear.
    let multiMode = false;
    const selectedCats = new Set();
    const bubbleView = document.getElementById('bubbleView');
    const catMagicBtn = document.getElementById('catMagicBtn');
    const STATE_CYCLE = ['', 'have', 'wish', 'want', 'need'];

    function syncTabActive() {
      tabs.forEach(t => t.classList.toggle('active', selectedCats.has(t.dataset.cat)));
      if (topbarAllBtn) {
        topbarAllBtn.classList.toggle('active',
          categories.length > 0 && categories.every(c => selectedCats.has(c.id)));
      }
    }

    function currentRowState(row) {
      if (row.querySelector('.col-need')?.classList.contains('selected-need')) return 'need';
      if (row.querySelector('.col-want')?.classList.contains('selected-want')) return 'want';
      if (row.querySelector('.col-wish')?.classList.contains('selected-wish')) return 'wish';
      if (row.querySelector('.col-have')?.classList.contains('selected-have')) return 'have';
      return '';
    }
    function setRowState(row, state) {
      ['have', 'wish', 'want', 'need'].forEach(t => {
        row.querySelector('.col-' + t)?.classList.toggle('selected-' + t, t === state);
      });
      updateRowPriority(row);
      updateCounts();
    }
    function rowIconClass(row) {
      const ic = row.querySelector('.item-cat-icon');
      if (ic) return Array.from(ic.classList).filter(c => c === 'fas' || c.startsWith('fa-')).join(' ');
      const catClass = Array.from(row.classList).find(c => c.startsWith('cat-'));
      const cat = categories.find(c => c.class === catClass);
      return 'fas ' + (cat ? cat.icon : 'fa-shapes');
    }

    // Each selected category has a reveal level (1, 2, 3 …): clicking its
    // icon again steps the level up — showing CAT_BATCH more of its items
    // each time, exactly like shary's "+" gradually revealing chips —
    // and once everything's shown, the next click collapses the category.
    const CAT_BATCH = 8;
    const catLevel = new Map();   // catId → reveal level (absent = not selected)

    function catRows(catId) {
      const cat = categories.find(c => c.id === catId);
      if (!cat) return [];
      return getRows().filter(r => r.classList.contains(cat.class));
    }
    // step the reveal for a category icon (shary-"+"-style)
    function stepCategory(catId) {
      const total = catRows(catId).length;
      const cur = catLevel.get(catId) || 0;
      if (cur === 0) { selectedCats.add(catId); catLevel.set(catId, 1); }
      else if (cur * CAT_BATCH < total) { catLevel.set(catId, cur + 1); }
      else { selectedCats.delete(catId); catLevel.delete(catId); }
    }

    function makeBubble(row, riseIndex) {
      const name = row.querySelector('.col-item')?.textContent.trim() || '';
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'inv-bubble';
      b.style.setProperty('--ri', riseIndex);
      b.title = name;
      b.setAttribute('aria-label', name);
      b.innerHTML = `<i class="${rowIconClass(row)}" aria-hidden="true"></i>`;
      const lab = document.createElement('span');
      lab.className = 'inv-bubble-label';
      lab.textContent = name;   // title shown below the icon when checked
      b.appendChild(lab);
      // bubbles start unchecked (icon only) — clicking cycles the state:
      // 1× Have-green · 2× Wish-blue · 3× Want · 4× Need · 5× Reset
      const st = currentRowState(row);
      if (st) b.dataset.state = st;
      b.addEventListener('click', () => {
        const idx = STATE_CYCLE.indexOf(currentRowState(row));
        const next = STATE_CYCLE[(idx + 1) % STATE_CYCLE.length];
        setRowState(row, next);
        if (next) b.dataset.state = next; else b.removeAttribute('data-state');
      });
      return b;
    }

    // rows to show = each selected category's items sliced to its reveal level
    function bubbleVisibleRows() {
      const rows = [];
      categories.forEach(cat => {
        if (!selectedCats.has(cat.id)) return;
        const lvl = catLevel.get(cat.id) || 1;
        rows.push(...catRows(cat.id).slice(0, lvl * CAT_BATCH));
      });
      return rows;
    }

    // ── Physics cloud (ported from shary's reasons section) — bubbles
    //    drift, bounce off the walls and off each other. ──
    const bubblePhysics = new Map(); // el → {x, y, w, h, vx, vy}  (% of cloud)
    let bubbleRaf = null;
    const bRandVel = () => (Math.random() - 0.5) * 0.22;
    function stopBubblePhysics() {
      if (bubbleRaf) { cancelAnimationFrame(bubbleRaf); bubbleRaf = null; }
      bubblePhysics.clear();
    }
    function measureBubble(el, rect) {
      const r = el.getBoundingClientRect();
      return {
        w: r.width && rect.width ? (r.width / rect.width) * 100 : 10,
        h: r.height && rect.height ? (r.height / rect.height) * 100 : 10,
      };
    }
    function stepBubbles() {
      const cloud = bubbleView.querySelector('.bubble-cloud');
      if (!cloud) { bubbleRaf = null; return; }
      const rect = cloud.getBoundingClientRect();
      if (!rect.width || !rect.height) { bubbleRaf = requestAnimationFrame(stepBubbles); return; }
      const items = [];
      Array.from(bubblePhysics.keys()).forEach(el => {
        if (el.parentNode !== cloud) { bubblePhysics.delete(el); return; }
        const it = bubblePhysics.get(el);
        const m = measureBubble(el, rect); it.w = m.w; it.h = m.h;
        items.push({ el, it });
      });
      // Velocities are in % of the cloud, so a taller cloud would make the
      // same % step cover more pixels — i.e. look faster after each expand.
      // Scale the step by a reference size so the on-screen drift speed stays
      // constant no matter how far the area has grown.
      const sx = 440 / rect.width;
      const sy = 300 / rect.height;
      for (const { it } of items) {
        it.x += it.vx * sx; it.y += it.vy * sy;
        if (it.x < 0)          { it.x = 0;          it.vx =  Math.abs(it.vx); }
        if (it.x + it.w > 100) { it.x = 100 - it.w; it.vx = -Math.abs(it.vx); }
        if (it.y < 0)          { it.y = 0;          it.vy =  Math.abs(it.vy); }
        if (it.y + it.h > 100) { it.y = 100 - it.h; it.vy = -Math.abs(it.vy); }
      }
      // pairwise bounce — skip for big clouds to keep it smooth
      if (items.length <= 80) {
        for (let i = 0; i < items.length; i++) {
          const a = items[i].it;
          for (let j = i + 1; j < items.length; j++) {
            const b = items[j].it;
            if (a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y) {
              const dx = Math.min(a.x + a.w - b.x, b.x + b.w - a.x);
              const dy = Math.min(a.y + a.h - b.y, b.y + b.h - a.y);
              if (dx < dy) {
                const p = dx / 2;
                if (a.x < b.x) { a.x -= p; b.x += p; } else { a.x += p; b.x -= p; }
                const t = a.vx; a.vx = b.vx; b.vx = t;
              } else {
                const p = dy / 2;
                if (a.y < b.y) { a.y -= p; b.y += p; } else { a.y += p; b.y -= p; }
                const t = a.vy; a.vy = b.vy; b.vy = t;
              }
            }
          }
        }
      }
      for (const { el, it } of items) {
        el.style.left = it.x.toFixed(2) + '%';
        el.style.top  = it.y.toFixed(2) + '%';
      }
      bubbleRaf = requestAnimationFrame(stepBubbles);
    }
    // newly added bubbles enter from the bottom edge (rising up) with a slight
    // upward velocity; reduced-motion users get a static scatter instead.
    function seedOneBubble(el, rect) {
      const m = measureBubble(el, rect);
      const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
      const x = +(Math.random() * Math.max(1, 100 - m.w)).toFixed(2);
      const y = reduce ? +(Math.random() * Math.max(1, 100 - m.h)).toFixed(2)
                       : +(100 - m.h).toFixed(2);   // start at the bottom, drift up
      el.style.left = x + '%'; el.style.top = y + '%';
      bubblePhysics.set(el, {
        x, y, w: m.w, h: m.h,
        vx: bRandVel(),
        vy: reduce ? 0 : (-Math.abs(bRandVel()) - 0.04),
      });
    }
    function ensureBubbleRaf() {
      if (!bubbleRaf && bubblePhysics.size && !matchMedia('(prefers-reduced-motion: reduce)').matches) {
        bubbleRaf = requestAnimationFrame(stepBubbles);
      }
    }
    function setCloudHeight(cloud, n, big) {
      const cw = cloud.getBoundingClientRect().width || 440;
      const perRow = Math.max(2, Math.floor(cw / 74));
      const gridRows = Math.ceil(n / perRow);
      // First reveal (every selected category still at level 1) stays compact;
      // once any category is clicked again the area expands ~4× per row.
      const rowH = big ? 416 : 110;
      cloud.style.height = Math.max(big ? 320 : 230, gridRows * rowH + (big ? 60 : 36)) + 'px';
    }

    const bubbleByRow = new Map(); // row el → bubble el (so reveals are incremental)

    // Incremental: keep already-drifting bubbles in place, only add the newly
    // revealed ones (rising from below) and drop ones whose category collapsed.
    function renderBubbles() {
      if (!bubbleView) return;
      const desired = bubbleVisibleRows();
      const desiredSet = new Set(desired);
      if (!desired.length) {
        stopBubblePhysics();
        bubbleByRow.clear();
        bubbleView.innerHTML = '<p class="bubble-hint">Pick one or more categories above to see their things as bubbles. Click a category again to reveal more of it. Tap a bubble: 1× Have · 2× Wish · 3× Want · 4× Need · 5× Reset.</p>';
        return;
      }
      let cloud = bubbleView.querySelector('.bubble-cloud');
      if (!cloud) {
        const legend =
          '<div class="bubble-legend">' +
          '<span><i class="dot have"></i>1× Have</span>' +
          '<span><i class="dot wish"></i>2× Wish</span>' +
          '<span><i class="dot want"></i>3× Want</span>' +
          '<span><i class="dot need"></i>4× Need</span>' +
          '<span><i class="dot reset"></i>5× Reset</span>' +
          '</div>';
        bubbleView.innerHTML = legend + '<div class="bubble-cloud"></div>';
        cloud = bubbleView.querySelector('.bubble-cloud');
        bubbleByRow.clear();
        bubblePhysics.clear();
      }
      // drop bubbles whose category was collapsed/deselected
      bubbleByRow.forEach((el, row) => {
        if (!desiredSet.has(row)) { el.remove(); bubblePhysics.delete(el); bubbleByRow.delete(row); }
      });
      // grow the area first so new bubbles seed against the final height.
      // Only expand big once some category has been re-clicked (level ≥ 2);
      // the first reveal stays compact (no empty space up top).
      const big = Array.from(catLevel.values()).some(l => l >= 2);
      setCloudHeight(cloud, desired.length, big);
      const rect = cloud.getBoundingClientRect();
      // add the newly revealed ones, rising from the bottom (staggered)
      let rise = 0;
      desired.forEach(row => {
        if (bubbleByRow.has(row)) return;
        const b = makeBubble(row, rise++);
        cloud.appendChild(b);
        bubbleByRow.set(row, b);
        seedOneBubble(b, rect);
      });
      ensureBubbleRaf();
    }

    function setMultiMode(on) {
      multiMode = on;
      document.body.classList.toggle('magic-mode', on);
      catMagicBtn?.setAttribute('aria-pressed', String(on));
      selectedCats.clear();
      catLevel.clear();
      stopBubblePhysics();
      bubbleByRow.clear();
      if (bubbleView) bubbleView.innerHTML = '';
      if (on) {
        // carry over the current single-select category, if any
        if (activeCat && activeCat !== 'all') { selectedCats.add(activeCat); catLevel.set(activeCat, 1); }
        syncTabActive();
        renderBubbles();
      } else {
        filterByCategory(activeCat);  // restore the normal filtered table
      }
    }
    catMagicBtn?.addEventListener('click', (e) => {
      e.stopPropagation();
      setMultiMode(!multiMode);
    });

    // ---------- PAGINATION (20 items per page) ----------
    const PAGE_SIZE = 20;
    let currentPage = 0;
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const pageInfo    = document.getElementById('pageInfo');

    function applyPagination() {
      const filtered = getRows().filter(r => !r.classList.contains('hidden-row'));
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      if (currentPage >= totalPages) currentPage = totalPages - 1;
      if (currentPage < 0) currentPage = 0;
      const start = currentPage * PAGE_SIZE;
      const end   = start + PAGE_SIZE;
      getRows().forEach(r => r.classList.remove('hidden-page'));
      filtered.forEach((r, i) => {
        if (i < start || i >= end) r.classList.add('hidden-page');
      });
      if (pageInfo) pageInfo.textContent = `${currentPage + 1} / ${totalPages}`;
      if (prevPageBtn) prevPageBtn.disabled = currentPage === 0;
      if (nextPageBtn) nextPageBtn.disabled = currentPage >= totalPages - 1;
    }
    if (prevPageBtn) prevPageBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (currentPage > 0) { currentPage--; applyPagination(); }
    });
    if (nextPageBtn) nextPageBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      currentPage++;
      applyPagination();
    });

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        if (multiMode) {
          stepCategory(tab.dataset.cat);   // 1st click selects · re-clicks reveal more · then collapse
          syncTabActive();
          renderBubbles();
        } else {
          filterByCategory(tab.dataset.cat);
        }
      });
    });

    // Attach cell click listeners (delegation)
    tbody.addEventListener('click', handleCellClick);

    function selectionsByItem() {

    function buildFullHTML() {

<body style="font-family:system-ui;padding:2rem;background:#f5f9ff;color:#1a2e3f;">
<h1>inventary snapshot</h1>
<table style="border-collapse:collapse;width:100%;max-width:720px;">
<thead><tr><th style="padding:6px 10px;border:1px solid #d8e0e8;text-align:left;">item</th><th style="padding:6px 10px;background:#c8e6c9;border:1px solid #d8e0e8;">HAVE</th><th style="padding:6px 10px;background:#bbdefb;border:1px solid #d8e0e8;">WISH</th><th style="padding:6px 10px;background:#ffe0b2;border:1px solid #d8e0e8;">WANT</th><th style="padding:6px 10px;background:#ffcdd2;border:1px solid #d8e0e8;">NEED</th></tr></thead>
<tbody>${rows || '<tr><td colspan="5" style="padding:1rem;text-align:center;color:#5e7c95;">no selections yet</td></tr>'}</tbody>
</table>
<p style="margin-top:2rem;color:#58738c;font-size:.85rem;">generated ${new Date().toLocaleString()}</p>
</body></html>`;
    }
    function downloadBlob(blob, filename) {

    window.floveAgentBlock = function buildAgentBlock(m) {

          + 'need — without judgement, and offer one gentle question about a single item.',
        schema: {
          app: 'app slug (Inventary)',
          phrase: 'one-line human summary the app composed',
          picked: 'array of { item, have, wish, want, need } — booleans per tag',
          sections: 'rendered item lines grouped for display'
        },
        context: {
          source: 'inventary · FLOVE',
          url: 'https://flove.org/apps/economy/dealy/inventary.html',
          axis: 'economy (have · wish · want · need)'
        },
        suggestions: [
          'Summarise the balance between have and want/wish/need in one sentence.',
          'Point out anything tagged need but not have.',

    function toMd(m) {
      let s = `# ${m.app}\n\n${m.phrase}\n\n`;
      m.sections.forEach(sec => { s += `## ${sec.label}\n`; sec.items.forEach(it => s += `- ${it}\n`); s += '\n'; });
      return s;
    }
    function toCsv(m) {
      const q = v => { const s = String(v); return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s; };
      const lines = ['item,have,wish,want,need'];
      m.picked.forEach(it => lines.push([it.item, it.have?'y':'', it.wish?'y':'', it.want?'y':'', it.need?'y':''].map(q).join(',')));
      return lines.join('\n') + '\n';
    }
    function toXml(m) {
      let s = `<?xml version="1.0" encoding="UTF-8"?>\n<inventary version="${m.version}">\n  <phrase>${esc(m.phrase)}</phrase>\n  <items>\n`;
      m.picked.forEach(it => { s += `    <item have="${it.have?1:0}" wish="${it.wish?1:0}" want="${it.want?1:0}" need="${it.need?1:0}">${esc(it.item)}</item>\n`; });
      s += `  </items>\n</inventary>\n`;
      return s;
    }
    function renderJPG(cb) {
      const W = 720, lh = 22, m = buildModel();
      const raw = [m.app, '', ...(m.phrase ? m.phrase.split('\n') : []), '', ...m.sections.flatMap(s => s.items.map(i => '· ' + i))];
      const tmp = document.createElement('canvas').getContext('2d');
      tmp.font = '14px system-ui';
      const maxW = W - 56, lines = [];
      raw.forEach(r => {
        const words = String(r).split(/\s+/); let line = '';
        for (const w of words) { const t = line ? line + ' ' + w : w; if (tmp.measureText(t).width > maxW) { lines.push(line); line = w; } else line = t; }
        lines.push(line);
      });
      const H = Math.max(200, 40 + lines.length * lh + 24);
      const canvas = document.createElement('canvas'); canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#eef4fb'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#16324f'; ctx.font = '14px system-ui';
      lines.forEach((ln, i) => ctx.fillText(ln, 28, 40 + i * lh));
      canvas.toBlob(cb, 'image/jpeg', 0.92);

    const subActions = {

      'save:csv':  () => { downloadBlob(new Blob([toCsv(buildModel())], {type:'text/csv;charset=utf-8'}), 'inventary_snapshot.csv'); setHint('<i class="fas fa-check-circle"></i> CSV downloaded.'); },
      'save:xml':  () => { downloadBlob(new Blob([toXml(buildModel())], {type:'application/xml;charset=utf-8'}), 'inventary_snapshot.xml'); setHint('<i class="fas fa-check-circle"></i> XML downloaded.'); },
      'save:jpg':  () => { renderJPG(blob => { if (!blob) { setHint('<i class="fas fa-info-circle"></i> JPG export not supported.'); return; } downloadBlob(blob, 'inventary_snapshot.jpg'); setHint('<i class="fas fa-check-circle"></i> JPG downloaded.'); }); },
      'save:json': () => { downloadBlob(new Blob([JSON.stringify(buildModel(), null, 2)], {type:'application/json;charset=utf-8'}), 'inventary_snapshot.json'); setHint('<i class="fas fa-check-circle"></i> JSON downloaded.'); },
      'share:mobile': async () => {

    document.querySelectorAll('.subitem').forEach(btn => {

    // ---------- EXPAND PANEL (per-category — each section toggles itself) ----------

    // per-(item,type) state. shareable applies to HAVE, much to WISH/WANT/NEED.
    const itemState = {};

    function ensureItemState(key) {
      if (!itemState[key]) itemState[key] = { shareable: false, much: false, maybe: false, unlikely: false, very: false, notes: [], worthy: null, worthyOpen: false, offerOpen: false, pref: null, urgent: false, fully: false };

    function escapeHtml(s) {

    // section-level pill toggle (shareable on HAVE; much on WISH/WANT/NEED)
    function thunderZap(btn) {
