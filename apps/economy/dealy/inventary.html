      const cx = btnRect.left - headRect.left + btnRect.width / 2;
      const cy = btnRect.top  - headRect.top  + btnRect.height / 2;
      const angles = [-90, -45, 0, 45, 90, 135, 180, 225];
      angles.forEach((deg, i) => {
        const bolt = document.createElement('span');
        bolt.className = 'thunder-bolt';
        bolt.textContent = '⚡';
        bolt.setAttribute('aria-hidden', 'true');
        const rad = (deg * Math.PI) / 180;
        const dist = 30 + Math.random() * 18;
        bolt.style.left = (cx - 8) + 'px';
        bolt.style.top  = (cy - 8) + 'px';
        bolt.style.setProperty('--dx', `${Math.cos(rad) * dist}px`);
        bolt.style.setProperty('--dy', `${Math.sin(rad) * dist}px`);
        bolt.style.setProperty('--r', `${(Math.random() * 60 - 30)}deg`);
        bolt.style.animationDelay = `${i * 18}ms`;
        head.appendChild(bolt);
        bolt.addEventListener('animationend', () => bolt.remove(), { once: true });
      });
    }
    // per-item pill toggles are wired via delegation on #phraseRows below.

    // delegated handlers across all four phrase-items containers
    document.getElementById('phraseRows').addEventListener('click', (e) => {
      // per-item Shareable / Much toggle
      const xt = e.target.closest('.sel-row .extra-toggle');
      if (xt) {
        e.stopPropagation();
        const key = xt.dataset.key;
        const extra = xt.dataset.extra; // 'shareable' or 'much'
        const st = ensureItemState(key);
        st[extra] = !st[extra];
        xt.setAttribute('aria-pressed', String(st[extra]));
        // reveal/hide sibling sub-pills; collapsing also resets their state
        xt.closest('.sel-row').querySelectorAll('.sub-pill').forEach(sp => {
          sp.hidden = !st[extra];
          if (st[extra]) return;
          if (sp.classList.contains('sub-pill--add')) return; // no state
          sp.setAttribute('aria-pressed', 'false');
          if (sp.dataset.value !== undefined) {
            st[sp.dataset.value] = false;
          } else if (sp.dataset.customIdx !== undefined) {
            const idx = parseInt(sp.dataset.customIdx, 10);
            if (st.customSubs && st.customSubs[idx]) {
              st.customSubs[idx].pressed = false;
            }
          }
        });
        thunderZap(xt);
        return;
      }
      // + sub-pill — toggle the dealy-advanced.html intro panel below the card
      const addSub = e.target.closest('.sel-row .sub-pill--add');
      if (addSub) {
        e.stopPropagation();
        const key = addSub.dataset.key;
        const st = ensureItemState(key);
        st.offerOpen = !st.offerOpen;
        addSub.setAttribute('aria-pressed', String(st.offerOpen));
        const card = addSub.closest('.sel-item');
        const info = card?.querySelector('.offer-info');
        if (info) info.classList.toggle('is-open', st.offerOpen);
        return;
      }
      // sub-pill (maybe / unlikely / very / custom) — independent toggle
      const sp = e.target.closest('.sel-row .sub-pill');
      if (sp) {
        e.stopPropagation();
        const key = sp.dataset.key;
        const st = ensureItemState(key);
        if (sp.dataset.customIdx !== undefined) {
          const idx = parseInt(sp.dataset.customIdx, 10);
          if (st.customSubs && st.customSubs[idx]) {
            st.customSubs[idx].pressed = !st.customSubs[idx].pressed;
            sp.setAttribute('aria-pressed', String(st.customSubs[idx].pressed));
          }
        } else {
          const val = sp.dataset.value;
          st[val] = !st[val];
          sp.setAttribute('aria-pressed', String(st[val]));
        }
        return;
      }
      // Flag toggle — Urgent (Want/Need) · Fully (Wish)
      const flag = e.target.closest('.sel-row .flag-toggle');
      if (flag) {
        e.stopPropagation();
        const key = flag.dataset.key;
        const f = flag.dataset.flag; // 'urgent' or 'fully'
        const st = ensureItemState(key);
        st[f] = !st[f];
        flag.setAttribute('aria-pressed', String(st[f]));
        return;
      }
      // Preference bar — set the level (or clear if pressing the same one)
      const pbar = e.target.closest('.pref-bar');
      if (pbar) {
        e.stopPropagation();
        const key = pbar.dataset.key;
        const n = parseInt(pbar.dataset.p, 10);
        const st = ensureItemState(key);
        st.pref = (st.pref === n) ? null : n;
        const bars = pbar.closest('.pref-bars');
        bars.querySelectorAll('.pref-bar').forEach(b => {
          b.classList.toggle('is-selected', parseInt(b.dataset.p, 10) === st.pref);
        });
        return;
      }
      // Worthy button — toggle the 8 worthy bars below
      const worth = e.target.closest('.note-worthing');
      if (worth) {
        e.stopPropagation();
        const key = worth.dataset.key;
        const st = ensureItemState(key);
        st.worthyOpen = !st.worthyOpen;
        const card = worth.closest('.sel-item');
        if (card) card.classList.toggle('is-worthy-open', st.worthyOpen);
        worth.setAttribute('aria-pressed', String(st.worthyOpen));
        return;
      }
      // Worthy bar click — set the level (or clear if pressing the same one)
      const wbar = e.target.closest('.worthy-bar');
      if (wbar) {
        e.stopPropagation();
        const key = wbar.dataset.key;
        const n = parseInt(wbar.dataset.w, 10);
        const st = ensureItemState(key);
        st.worthy = (st.worthy === n) ? null : n;
        const bars = wbar.closest('.worthy-bars');
        bars.querySelectorAll('.worthy-bar').forEach(b => {
          b.classList.toggle('is-selected', parseInt(b.dataset.w, 10) === st.worthy);
        });
        return;
      }
      // mic button — Web Speech API if available, else manual prompt
      const mic = e.target.closest('.note-mic');
      if (mic) {
        e.stopPropagation();
        const key = mic.dataset.key;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SR && !mic.classList.contains('is-recording')) {
          const rec = new SR();
          rec.lang = navigator.language || 'es-ES';
          rec.continuous = false;
          rec.interimResults = false;
          mic.classList.add('is-recording');
          rec.onresult = (ev) => {
            const t = Array.from(ev.results).map(r => r[0].transcript).join(' ').trim();
            if (t) {
              ensureItemState(key).notes.push(`🎤 ${t}`);
              renderAllCategories();
            }
          };
          rec.onend = () => mic.classList.remove('is-recording');
          rec.onerror = () => mic.classList.remove('is-recording');
          try { rec.start(); } catch { mic.classList.remove('is-recording'); }
        } else {
          const txt = prompt('🎤 voice note:');
          if (txt && txt.trim()) {
            ensureItemState(key).notes.push(`🎤 ${txt.trim()}`);
            renderAllCategories();
          }
        }
        return;
      }
      if (e.target.classList.contains('note-save')) {
        const key = e.target.dataset.key;
        const input = e.target.closest('.add-note').querySelector('input[type="text"]');
        const val = input.value.trim();
        if (!val) return;
        ensureItemState(key).notes.push(val);
        renderAllCategories();
      } else if (e.target.classList.contains('note-del')) {
        const key = e.target.dataset.key;
        const idx = parseInt(e.target.dataset.idx, 10);
        if (itemState[key]) {
          itemState[key].notes.splice(idx, 1);
          renderAllCategories();
        }
      }
    });
    document.getElementById('phraseRows').addEventListener('change', (e) => {
      const t = e.target;
      if (t.matches('input[type="file"][data-key]')) {
        const f = t.files && t.files[0];
        if (f) {
          ensureItemState(t.dataset.key).notes.push(`📎 ${f.name}`);
          t.value = '';
          renderAllCategories();
        }
      }
    });
    document.getElementById('phraseRows').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.matches('.add-note input[type="text"]')) {
        e.preventDefault();
        e.target.closest('.add-note').querySelector('.note-save')?.click();
      }
    });

    // refresh the per-category lists when selections or filters change
    function maybeRefreshExpand() {
      const anyOpen = Object.values(phraseLines).some(l => l.classList.contains('open'));
      if (anyOpen) renderAllCategories();
    }
    tbody.addEventListener('click', () => requestAnimationFrame(maybeRefreshExpand));
    tabs.forEach(tab => tab.addEventListener('click', () => requestAnimationFrame(maybeRefreshExpand)));

    // ── topbar menu actions ──────────────────────────────────────
    const menuCtl = document.getElementById('inventaryMenuOpen');
    function closeMenu() { if (menuCtl) menuCtl.checked = false; }
    document.querySelectorAll('.inventary-menu-list .menu-item').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const action = btn.dataset.action;
        if (action === 'expand-all') {
          if (phrasePanel) {
            phrasePanel.classList.add('is-master-open');
            phraseMasterBtn?.setAttribute('aria-expanded', 'true');
          }
          setAllOpen(true);
        } else if (action === 'collapse-all') {
          setAllOpen(false);
        }
        else if (action === 'reset') {
          getRows().forEach(r => {
            ['have','wish','want','need'].forEach(t => {
              r.querySelector(`.col-${t}`)?.classList.remove(`selected-${t}`);
            });
            updateRowPriority(r);
          });
          updateCounts();
          if (Object.values(phraseLines).some(l => l.classList.contains('open'))) renderAllCategories();
          setHint('↺ Selections reset.');
        } else if (action === 'toggle-cats') {
          if (tabsPlusBtn) tabsPlusBtn.click();
        } else if (action === 'help') {
          setHint('💡 Tap any cell to toggle HAVE/WISH/WANT/NEED · priority NEED > WANT > WISH > HAVE.');
        } else if (action === 'about') {
          setHint('✺ Inventary · a sheet of things you have, wish, want and need.');
        }
        closeMenu();
      });
    });
    // close menu on outside click
    document.addEventListener('click', (e) => {
      if (!menuCtl || !menuCtl.checked) return;
      if (e.target.closest('.inventary-menu-wrap')) return;
      closeMenu();
    });

    // ── magic ✨ + lovely / joy / wisdom bots in the label-row ────
    const magicCtl  = document.getElementById('inventaryMagic');
    const newInput  = document.getElementById('inventaryNewInput');
    const botPools = {
      lovely: ['Yoga mat', 'Guitar', 'Watercolor set', 'Bonsai tree', 'Books', 'Pet food', 'Tutoring', 'Knitting needles', 'Coffee', 'Babysitting'],
      joy:    ['Party supplies', 'Board games', 'Concert ticket', 'Ukulele', 'Bike', 'Camping stove', 'Workshop', 'Drums', 'Gift card'],
      wisdom: ['Library card', 'Online course', 'Mentor', 'Reading list', 'Language partner', 'Notebook', 'First aid kit', 'Translator app']
    };
    function botPick(bot) {
      const pool = botPools[bot] || [];
      if (!pool.length) return '';
      return pool[Math.floor(Math.random() * pool.length)];
    }
    document.querySelectorAll('.inventary-bot').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const suggestion = botPick(btn.dataset.bot);
        if (suggestion && newInput) {
          // restart the flash animation reliably
          newInput.classList.remove('is-bot-filled');
          void newInput.offsetWidth;
          newInput.value = suggestion;
          newInput.classList.add('is-bot-filled');
          newInput.focus();
        }
        if (magicCtl) magicCtl.checked = false;
      });
    });

    // X clear button removes the bot suggestion (and the visible marker)
    const clearBtn = document.getElementById('inventaryClearBtn');
    if (clearBtn && newInput) {
      clearBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        newInput.value = '';
        newInput.classList.remove('is-bot-filled');
        newInput.focus();
      });
    }
    // Typing manually clears the bot-fill marker
    if (newInput) {
      newInput.addEventListener('input', () => newInput.classList.remove('is-bot-filled'));
    }

    // Add a new thing at the top of the list, regardless of the active filter
    function addNewThingAtTop() {
      const name = newInput?.value.trim();
      if (!name) { newInput?.focus(); return; }
      const row = buildRow(name, 'cat-varios');
      row.classList.add('is-new');
      const labelRow = tbody.querySelector('.label-row');
      if (labelRow && labelRow.nextSibling) {
        tbody.insertBefore(row, labelRow.nextSibling);
      } else {
        tbody.appendChild(row);
      }
      // reset filter + page so the new row is visible regardless of current state
      currentPage = 0;
      activeCat = null;
      filterByCategory(null);
      newInput.value = '';
      newInput.classList.remove('is-bot-filled');
      setHint(`✚ "${escapeHtml(name)}" added to the top.`);
    }

    if (newInput) {
      newInput.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        addNewThingAtTop();
      });
    }
    const addBtn = document.getElementById('inventaryAddBtn');
    if (addBtn) {
      addBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        addNewThingAtTop();
      });
    }

    /* ✦ F0 local persistence (backend_plan.md §10.3a/b).
       Inventary's state is class-/object-based, not form-field based, so the
       generic input-scanner pattern can't capture it. We snapshot three things:
       (1) the names of dynamically-added rows (.is-new), so they can be
       re-created on load; (2) every row's selected priority cells
       (name → [have|wish|want|need]); and (3) the per-item itemState object
       (pills, notes, pref, worthy, urgent/fully, customSubs…). On load we
       re-create added rows FIRST, then re-apply selections, then merge
       itemState, then re-render — so the structure exists before values land.
       Defensive: missing/corrupt/old storage is ignored, never throws. */
    const LS_BASE = 'flove:' + (location.pathname.split('/').pop().replace(/\.html$/, '') || 'app');
    const LS_KEY = LS_BASE + ':state';
    const LS_SCHEMA_KEY = LS_BASE + ':schema';
    const LS_SCHEMA_VERSION = '1';

    // Request durable storage on first interaction, guarded once (§10.3a).
    let _persistAsked = false;
    function requestPersist() {
      if (_persistAsked) return;
      _persistAsked = true;
      try { if (navigator.storage && navigator.storage.persist) navigator.storage.persist(); } catch (e) {}
    }

    function snapshotState() {
      const added = [];
      const selections = [];
      getRows().forEach(row => {
        const name = row.querySelector('.col-item')?.textContent.trim() || '';
        if (!name) return;
        if (row.classList.contains('is-new')) {
          added.push({ name, catClass: rowCatClass(row) || 'cat-varios' });
        }
        const types = ['have', 'wish', 'want', 'need'].filter(t =>
          row.querySelector('.col-' + t)?.classList.contains('selected-' + t));
        if (types.length) selections.push({ name, types });
      });
      return { added, selections, itemState };
    }

    // ✦ Stale-dot helpers (§10.3a): in-session edits to stored data un-hide the
    //   dot; Update / Reset re-hide every dot. Driven by the edit path, no timer.
    function markStale() {
      document.querySelectorAll('.stale-dot').forEach(d => { d.hidden = false; });
    }
    function clearStale() {
      document.querySelectorAll('.stale-dot').forEach(d => { d.hidden = true; });
    }

    let _saveT;
    function saveState() {
      clearTimeout(_saveT);
      _saveT = setTimeout(() => {
        try {
          localStorage.setItem(LS_KEY, JSON.stringify(snapshotState()));
          localStorage.setItem(LS_SCHEMA_KEY, LS_SCHEMA_VERSION);
        } catch (e) {
          // QuotaExceeded / private mode: never crash (§10.3b). On quota, nudge
          // the user toward export (Save) so their work isn't silently lost.
          if (e && (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014)) {
            try { setHint('<span class="t-en">Storage is full — use <b>Save</b> to export your snapshot.</span><span class="t-es">Almacenamiento lleno — usa <b>Save</b> para exportar tu inventario.</span>'); } catch (_) {}
          }
        }
      }, 250);
    }

    // Wipe live state back to the page's pristine start (used by Reset and as
    // the first step of a re-hydrate so Update never duplicates added rows).
    function clearLiveState() {
      getRows().forEach(row => {
        if (row.classList.contains('is-new')) { row.remove(); return; }
        ['have', 'wish', 'want', 'need'].forEach(t => row.querySelector('.col-' + t)?.classList.remove('selected-' + t));
        updateRowPriority(row);
      });
      Object.keys(itemState).forEach(k => { delete itemState[k]; });
    }

    function restoreState() {
      // re-hydrate is idempotent: wipe live structure first so re-creating the
      // stored .is-new rows / selections / itemState doesn't pile up duplicates.
      clearLiveState();
      let raw = null;
      try { raw = localStorage.getItem(LS_KEY); } catch (_) { return; }
      if (!raw) { renderAllCategories(); return; }
      let data;
      try { data = JSON.parse(raw); } catch (_) { renderAllCategories(); return; }  // corrupt → ignore
      if (!data || typeof data !== 'object') { renderAllCategories(); return; }

      // (1) re-create dynamically-added rows at the top (newest restored first
      //     so the visible order roughly matches insert-at-top behavior).
      if (Array.isArray(data.added)) {
        const labelRow = tbody.querySelector('.label-row');
        data.added.slice().reverse().forEach(a => {
          if (!a || !a.name) return;
          const row = buildRow(a.name, a.catClass || 'cat-varios');
          row.classList.add('is-new');
          if (labelRow && labelRow.nextSibling) tbody.insertBefore(row, labelRow.nextSibling);
          else tbody.appendChild(row);
        });
      }

      // (2) re-apply priority-cell selections by item name.
      if (Array.isArray(data.selections)) {
        const byName = {};
        getRows().forEach(row => {
          const n = row.querySelector('.col-item')?.textContent.trim() || '';
          if (n && !(n in byName)) byName[n] = row;
        });
        data.selections.forEach(sel => {
          const row = sel && byName[sel.name];
          if (!row || !Array.isArray(sel.types)) return;
          sel.types.forEach(t => {
            if (['have', 'wish', 'want', 'need'].indexOf(t) === -1) return;
            row.querySelector('.col-' + t)?.classList.add('selected-' + t);
          });
          updateRowPriority(row);
        });
      }

      // (3) merge the per-item state object (pills, notes, pref, worthy…).
      if (data.itemState && typeof data.itemState === 'object') {
        Object.keys(data.itemState).forEach(k => {
          const s = data.itemState[k];
          if (s && typeof s === 'object') itemState[k] = Object.assign(ensureItemState(k), s);
        });
      }
      renderAllCategories();
    }

    // A fresh OPEN restores saved choices; a RELOAD (F5 / reload logo) starts
    // fresh — clear this app's own keys and skip restore (§5.3 / §10.3a).
    function navIsReload() {
      try {
        const nav = performance.getEntriesByType &&
                    performance.getEntriesByType('navigation')[0];
        if (nav && nav.type) return nav.type === 'reload';
        if (performance.navigation) return performance.navigation.type === 1; // legacy
      } catch (_) {}
      return false;
    }

    // Initialize · no category expanded by default (all items shown, no active tab)
    if (navIsReload()) {
      // Empty ONLY this app's own keys — never localStorage.clear() (§10.3a).
      try { localStorage.removeItem(LS_KEY); } catch (_) {}
      try { localStorage.removeItem(LS_SCHEMA_KEY); } catch (_) {}
    }
    restoreState();  // no key present after a reload → renders empty default
    filterByCategory(null);
    updateAllHighlights();
    updateCounts();
    clearStale();  // a freshly-hydrated page is, by definition, up to date

    // ✦ Update: re-derive from stored state, then clear all stale dots (§10.3a).
    function onUpdate() {
      restoreState();
      filterByCategory(activeCat || null);
      updateAllHighlights();
      updateCounts();
      clearStale();
    }
    document.querySelectorAll('[data-flove-update]').forEach(b => b.addEventListener('click', onUpdate));

    // ✦ Reset: destructive — start a new play. Guard with confirm() (§10.3a).
    function onReset() {
      const ok = confirm(
        document.documentElement.lang === 'es'
          ? '¿Borrar todo y empezar de nuevo? Esto no se puede deshacer.'
          : 'Clear everything and start a new play? This cannot be undone.'
      );
      if (!ok) return;
      // Empty ONLY this app's own keys — never localStorage.clear() (§10.3a).
      try { localStorage.removeItem(LS_KEY); } catch (_) {}
      try { localStorage.removeItem(LS_SCHEMA_KEY); } catch (_) {}
      // Reload for a clean slate — the reload gate above then skips restore and
      // renders the empty default, so Reset and reload land identically.
      location.reload();
    }
    document.querySelectorAll('[data-flove-reset]').forEach(b => b.addEventListener('click', onReset));

    // Persist on any interaction — bubble-phase listeners fire AFTER the app's
    // own click/change handlers mutate the DOM classes and itemState.
    // Same path marks the stored snapshot stale (un-hides .stale-dot) and asks
    // for durable storage once, so it's hooked to the real edit flow, no timer.
    function onEdit(e) {
      const t = e.target && e.target.closest && e.target.closest('[data-flove-update],[data-flove-reset]');
      if (t) return;            // Update/Reset themselves manage the dots
      requestPersist();
      markStale();
      saveState();
    }
    document.addEventListener('click', onEdit, false);
    document.addEventListener('change', onEdit, false);
    document.addEventListener('input', onEdit, false);
  })();
</script>
<!-- §13.15 · Publish to Appy — the app→profile bridge (auto-wires [data-flove-publish]) -->
<script src="../../appy/flove-appy.js"></script>
</body>
