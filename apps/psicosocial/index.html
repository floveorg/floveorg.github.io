<!-- psicosocial/index.html · apps/psicosocial · flove
     A launcher for the five "psicosocial" instruments — astry · freedoms · hacky ·
     lovy · realy. One self-contained file: inline CSS + a little JS, no external
     calls. A formal cabinet of instruments over an "inner night"; each card comes
     alive with its own app's real motif, tied to a hero constellation of the psyche.
     Bilingual EN/ES · night/dawn themes · reduced-motion respected. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="psicosocial — a launcher for five flove instruments of self-knowledge: astry, freedoms, hacky, lovy and realy. A cabinet of inner instruments.">
<meta name="theme-color" content="#0d0a1c">
<title>FLOVE · PSICOSOCIAL</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cg fill='none' stroke='%238f7bff' stroke-width='1.4'%3E%3Cellipse cx='12' cy='12' rx='10' ry='3.6'/%3E%3Cellipse cx='12' cy='12' rx='10' ry='3.6' transform='rotate(60 12 12)'/%3E%3Cellipse cx='12' cy='12' rx='10' ry='3.6' transform='rotate(120 12 12)'/%3E%3C/g%3E%3Ccircle cx='12' cy='12' r='2.2' fill='%23fb7185'/%3E%3C/svg%3E">
<style>
  :root{
    --void:#0d0a1c; --void-2:#151030; --panel:rgba(255,255,255,.028);
    --ink:#efeaff; --ink-soft:#a99fce; --ink-dim:#6f6699;
    --line:rgba(236,231,255,.13); --line-2:rgba(236,231,255,.06);
    --sig:linear-gradient(90deg,#8f7bff,#fb7185,#ffb15c);
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Roboto Mono",Menlo,Consolas,monospace;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --r:20px; --ease:cubic-bezier(.2,.8,.2,1); --maxw:1120px;
    --spark:#8f7bff;
  }
  :root[data-theme="dawn"]{
    --void:#f2ecfb; --void-2:#fbf8ff; --panel:rgba(40,20,70,.02);
    --ink:#231a3a; --ink-soft:#6b5f8a; --ink-dim:#a99fce;
    --line:rgba(40,20,70,.14); --line-2:rgba(40,20,70,.06);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0; min-height:100vh; background:var(--void); color:var(--ink);
    font-family:var(--sans); font-size:17px; line-height:1.55; overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(1200px 700px at 78% -8%, rgba(143,123,255,.16), transparent 60%),
      radial-gradient(900px 620px at 8% 108%, rgba(251,113,133,.12), transparent 60%),
      radial-gradient(700px 500px at 108% 60%, rgba(255,177,92,.08), transparent 60%);
    background-attachment:fixed;}
  :root[data-theme="dawn"] body{
    background-image:
      radial-gradient(1200px 700px at 78% -8%, rgba(143,123,255,.20), transparent 60%),
      radial-gradient(900px 620px at 8% 108%, rgba(251,113,133,.16), transparent 60%);}
  a{color:inherit; text-decoration:none}
  ::selection{background:rgba(143,123,255,.35); color:#fff}

  /* faint star grain over the night */
  .grain{position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.5;
    background-image:radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.35), transparent),
      radial-gradient(1px 1px at 88% 22%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,.3), transparent);
    background-size:auto; animation:twinkle 6s ease-in-out infinite;}
  :root[data-theme="dawn"] .grain{opacity:.25}
  @keyframes twinkle{0%,100%{opacity:.5}50%{opacity:.25}}

  /* ---------- flove-bar (house sticky topbar) ---------- */
  .flove-bar{position:sticky; top:0; z-index:99; display:flex; align-items:center; gap:10px;
    padding:9px 16px; background:transparent;}
  /* brand dropdown (logo + name → simple menu) */
  details.menu{position:relative}
  details.menu>summary{list-style:none; cursor:pointer; display:inline-flex; align-items:center; gap:.45em;
    padding:.26rem .6rem .26rem .4rem; border-radius:999px; border:1px solid transparent; transition:.2s var(--ease)}
  details.menu>summary::-webkit-details-marker{display:none}
  details.menu>summary:hover,details.menu[open]>summary{background:rgba(143,123,255,.14); border-color:var(--line)}
  .brand-caret{font-size:.62rem; color:var(--ink-dim); transition:transform .25s var(--ease)}
  details.menu[open] .brand-caret{transform:rotate(180deg)}
  .brand-menu{position:absolute; left:0; top:calc(100% + .45rem); min-width:11rem; z-index:120;
    background:var(--void-2); border:1px solid var(--line); border-radius:12px; padding:.3rem;
    box-shadow:0 14px 40px rgba(0,0,0,.5); display:flex; flex-direction:column; gap:.15rem}
  :root[data-theme="dawn"] .brand-menu{box-shadow:0 14px 40px rgba(80,50,120,.18)}
  .brand-menu a{display:flex; align-items:center; gap:.5em; font-size:.9rem; color:var(--ink-soft);
    border-radius:8px; padding:.5rem .7rem; transition:.16s var(--ease)}
  .brand-menu a:hover{background:rgba(143,123,255,.16); color:var(--ink)}
  .flove-mark{width:22px; height:22px; flex:0 0 auto}
  .flove-mark g{transform-origin:12px 12px; animation:spin 26s linear infinite}
  .flove-app-name{font-weight:800; letter-spacing:.02em}
  /* items inside the brand menu: theme toggle + language row */
  .brand-menu .menu-sep{height:1px; background:var(--line); margin:.25rem .2rem}
  .brand-menu .menu-item{display:flex; align-items:center; gap:.5em; width:100%; text-align:left;
    font:inherit; font-size:.9rem; color:var(--ink-soft); cursor:pointer; background:none; border:0;
    border-radius:8px; padding:.5rem .7rem; transition:.16s var(--ease)}
  .brand-menu .menu-item:hover{color:var(--ink); background:rgba(143,123,255,.16)}
  .lang-menu{display:flex; gap:.25rem; padding:.05rem .1rem}
  .lang-menu button{flex:1; cursor:pointer; text-align:center; font:inherit; font-size:.82rem;
    color:var(--ink-soft); background:none; border:1px solid var(--line); border-radius:8px;
    padding:.4rem .3rem; transition:.16s var(--ease)}
  .lang-menu button:hover,.lang-menu button[aria-current="true"]{color:var(--ink);
    background:rgba(143,123,255,.16); border-color:transparent}

  /* ---------- shell ---------- */
  .shell{position:relative; z-index:1; max-width:var(--maxw); margin:0 auto; padding:0 22px 1.4rem}

  /* ---------- hero (the constellation itself) ---------- */
  .hero{padding:.2rem 0 .2rem; text-align:center; position:relative}

  /* constellation — now the hero interface, pulled to the top */
  .sky{position:relative; margin:.4rem auto 0; max-width:min(780px,94vw)}
  .sky svg{width:100%; height:auto; display:block; overflow:visible}
  .node{cursor:pointer; transition:opacity .3s var(--ease), filter .3s var(--ease)}
  .node .orbs{transform-box:fill-box; transform-origin:center; transition:transform .5s var(--ease)}
  .node .halo{fill:var(--c); opacity:.16; transform-origin:center; transform-box:fill-box;
    animation:breathe 5s ease-in-out infinite}
  .node .disc{fill:var(--c); fill-opacity:.14; stroke:var(--c); stroke-width:.5;
    filter:drop-shadow(0 0 3px color-mix(in srgb,var(--c) 60%, transparent)); transition:fill-opacity .3s var(--ease)}
  .node .ring{fill:none; stroke:var(--c); stroke-width:.4; opacity:.5; transform-origin:center;
    transform-box:fill-box; animation:spin 30s linear infinite}
  .node .ball-mark{color:var(--c); pointer-events:none}
  .node .ball-name{fill:var(--c); font-family:var(--mono); font-weight:700; font-size:3.2px;
    letter-spacing:.02px; text-anchor:middle; dominant-baseline:central; pointer-events:none;
    paint-order:stroke; stroke:var(--void); stroke-width:.5px}
  .node:hover .disc,.node.lit .disc{fill-opacity:.26; filter:drop-shadow(0 0 6px var(--c))}
  .node:hover .halo,.node.lit .halo{opacity:.42}
  .node:focus-visible{outline:none}
  .node:focus-visible .disc{stroke-width:.9; filter:drop-shadow(0 0 8px var(--c))}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}

  /* collapsed face (logo + name) vs expanded face (name · slogan · go) */
  .node .c-face{transition:opacity .3s var(--ease)}
  .node .x-face{opacity:0; pointer-events:none; transition:opacity .35s var(--ease) .06s}
  .node .x-face text{text-anchor:middle; dominant-baseline:central;
    paint-order:stroke; stroke:var(--void); stroke-width:.55px}
  :root[data-theme="dawn"] .node .x-face text{stroke:var(--void-2)}
  .node .x-name{fill:var(--c); font-family:var(--sans); font-weight:800; font-size:4.3px; letter-spacing:-.05px}
  .node .x-slogan{fill:var(--ink-soft); font-family:var(--serif); font-style:italic; font-size:2.5px; stroke-width:.4px}
  .node .x-go{fill:var(--c); font-family:var(--mono); font-weight:700; font-size:2.9px; letter-spacing:.1px}
  .node .x-hit{fill:none; pointer-events:all; cursor:pointer}

  /* clicking a ball expands the ball itself, in place — no separate panel */
  .node.expanded{cursor:default}
  .node.expanded .orbs{transform:scale(2)}
  .node.expanded .disc{fill-opacity:.36; filter:drop-shadow(0 0 11px var(--c))}
  .node.expanded .c-face{opacity:0; pointer-events:none}
  .node.expanded .x-face{opacity:1; pointer-events:auto}
  .node.launching .orbs{animation:nodeout .46s var(--ease) forwards}
  @keyframes nodeout{0%{transform:scale(2)}45%{transform:scale(2.22)}
    100%{transform:scale(2.5); opacity:0; filter:brightness(2)}}

  /* when a ball is chosen, the rest of the sky recedes */
  .sky.focusing .node:not(.lit){opacity:.28; filter:saturate(.4)}

  /* per-mark idle motion (subtle) — animates the logos on the balls */
  .m-astry .orbits{transform-origin:12px 12px; animation:spin 14s linear infinite}
  .m-free .spokes{transform-origin:12px 12px; animation:spin 22s linear infinite}
  .m-hacky{animation:glitch 5s steps(1) infinite}
  .m-lovy .heart{transform-origin:12px 13px; animation:beat 2.6s ease-in-out infinite}
  .m-realy .wave{animation:wave 4s ease-in-out infinite}
  .m-realy .wave:nth-child(2){animation-delay:.25s}
  .m-realy .wave:nth-child(3){animation-delay:.5s}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes beat{0%,72%,100%{transform:scale(1)}80%{transform:scale(1.16)}88%{transform:scale(1.04)}}
  @keyframes wave{0%,100%{transform:translateX(0)}50%{transform:translateX(2px)}}
  @keyframes glitch{0%,90%,100%{transform:translate(0);opacity:1}
    92%{transform:translate(-1.5px,1px);opacity:.7}94%{transform:translate(1.5px,-1px)}96%{transform:translate(-1px,0)}}

  /* launch flash */
  .flash{position:fixed; inset:0; z-index:200; pointer-events:none; opacity:0; background:var(--c,#8f7bff);
    mix-blend-mode:screen}
  .flash.on{animation:flash .5s ease-out forwards}
  @keyframes flash{0%{opacity:0}20%{opacity:.5}100%{opacity:0}}

  /* click sparks */
  .spark{position:fixed; z-index:210; width:7px; height:7px; border-radius:50%; pointer-events:none;
    background:var(--spark); box-shadow:0 0 8px var(--spark)}

  /* footer */
  .foot{margin-top:1.6rem; padding-top:1.2rem; border-top:1px solid var(--line); text-align:center;
    color:var(--ink-dim); font-size:.84rem}
  .foot .fmark{display:inline-block; font-size:1.1rem; color:var(--ink-soft); animation:spin 30s linear infinite}
  .foot a{color:var(--ink-soft)}
  .foot a:hover{color:var(--ink)}

  /* load presentation (cascade) — set by JS via .ready */
  .lift{opacity:0; transform:translateY(22px)}
  .ready .lift{opacity:1; transform:none; transition:opacity .7s var(--ease), transform .7s var(--ease)}
  .ready .lift{transition-delay:var(--d,0s)}
  .node{opacity:0}
  .ready .node{opacity:1; transition:opacity .6s ease; transition-delay:calc(.5s + var(--nd,0s))}

  /* dawn-theme polish: keep the constellation legible on a pale ground */
  :root[data-theme="dawn"] .node .halo{opacity:.30}
  :root[data-theme="dawn"] .node .ring{opacity:.9; stroke-width:.65}
  :root[data-theme="dawn"] details.menu>summary:hover,
  :root[data-theme="dawn"] details.menu[open]>summary{background:rgba(143,123,255,.14)}
  :root[data-theme="dawn"] .node .disc{fill-opacity:.20}
  :root[data-theme="dawn"] .node .ball-name{stroke:var(--void-2)}

  /* language visibility */
  html:not(.es) .es{display:none}
  html.es .en{display:none}

  @media (max-width:560px){
    .shell{padding:0 16px 1.4rem}
    .hero{padding:.2rem 0 .2rem}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important}
    .lift{opacity:1; transform:none}
    .node{opacity:1}
    .ready .lift{transition:none}
    .node .orbs{transition:none !important}
    .grain{display:none}
  }
</style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<header class="flove-bar">
  <details class="menu" id="barMenu">
    <summary class="brand" aria-label="Menu" title="Menu">
      <svg class="flove-mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <g stroke="#8f7bff" stroke-width="1.4">
          <ellipse cx="12" cy="12" rx="10" ry="3.6"/>
          <ellipse cx="12" cy="12" rx="10" ry="3.6" transform="rotate(60 12 12)"/>
          <ellipse cx="12" cy="12" rx="10" ry="3.6" transform="rotate(120 12 12)"/>
        </g><circle cx="12" cy="12" r="2.2" fill="#fb7185"/>
      </svg>
      <span class="flove-app-name">psicosocial</span>
      <span class="brand-caret" aria-hidden="true">▾</span>
    </summary>
    <div class="brand-menu">
      <a href="../index.html"><span aria-hidden="true">←</span>
        <span class="en">all apps</span><span class="es">todas las apps</span></a>
      <a href="../../index.html"><span aria-hidden="true">✺</span>
        <span class="en">flove home</span><span class="es">inicio flove</span></a>
      <div class="menu-sep" role="separator"></div>
      <button class="menu-item" id="themeBtn" type="button" aria-label="Toggle night / dawn">
        <span aria-hidden="true">◐</span>
        <span class="en">Night / dawn</span><span class="es">Noche / alba</span></button>
      <div class="menu-sep" role="separator"></div>
      <div class="lang-menu" role="group" aria-label="Language / Idioma">
        <button data-lang="en" aria-current="true">English</button>
        <button data-lang="es">Español</button>
      </div>
    </div>
  </details>
</header>

<div class="shell">
  <section class="hero">
    <div class="sky lift" style="--d:.05s">
      <svg viewBox="0 0 100 66" id="sky" role="group"
           aria-label="Constellation of five instruments — choose one to expand it"></svg>
    </div>
  </section>

  <footer class="foot lift" style="--d:.4s">
    <span class="fmark">✺</span>
    <p style="margin:.5rem 0 0">
      <span class="en">psicosocial · part of </span><span class="es">psicosocial · parte de </span>
      <a href="../../index.html">flove</a> · <span class="en">everything stays on your device.</span><span class="es">todo se queda en tu dispositivo.</span>
    </p>
  </footer>
</div>

<div class="flash" id="flash" aria-hidden="true"></div>

<noscript>
  <div style="max-width:640px;margin:2rem auto;padding:0 22px">
    <p>psicosocial — the five apps:
      <a href="astry.html">astry</a>, <a href="freedoms.html">freedoms</a>,
      <a href="hacky.html">hacky</a>, <a href="lovy.html">lovy</a>, <a href="realy.html">realy</a>.</p>
  </div>
</noscript>

<script>
/* ============================================================
   psicosocial launcher — data + behaviour. No fetches, no libs.
   ============================================================ */
const MARKS = {
  astry:`<g class="m-astry"><g class="orbits" fill="none" stroke="currentColor" stroke-width="1.3">
      <ellipse cx="12" cy="12" rx="10" ry="3.6"/><ellipse cx="12" cy="12" rx="10" ry="3.6" transform="rotate(60 12 12)"/>
      <ellipse cx="12" cy="12" rx="10" ry="3.6" transform="rotate(120 12 12)"/></g>
      <circle cx="12" cy="12" r="2.1" fill="currentColor"/></g>`,
  freedoms:(()=>{let s='';for(let i=0;i<8;i++){const a=i*45*Math.PI/180;
      const x=12+9*Math.cos(a),y=12+9*Math.sin(a);
      s+=`<line x1="12" y1="12" x2="${x.toFixed(2)}" y2="${y.toFixed(2)}"/>`;}
      return `<g class="m-free"><g class="spokes" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">${s}</g>
      <circle cx="12" cy="12" r="2.4" fill="currentColor"/></g>`;})(),
  hacky:`<g class="m-hacky" fill="none" stroke="currentColor" stroke-width="1.4">
      <rect x="4" y="4" width="16" height="16" rx="3.2"/>
      <path d="M10 8.6 L16.2 12 L10 15.4 Z" fill="currentColor" stroke="none"/></g>`,
  lovy:`<g class="m-lovy"><path class="heart" fill="currentColor"
      d="M12 20.6 C12 20.6 4 14.6 4 9.4 A4.1 4.1 0 0 1 12 7 A4.1 4.1 0 0 1 20 9.4 C20 14.6 12 20.6 12 20.6 Z"/></g>`,
  realy:`<g class="m-realy" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
      <path class="wave" d="M3 8 q3 -3 6 0 t6 0 t6 0"/>
      <path class="wave" d="M3 12 q3 -3 6 0 t6 0 t6 0"/>
      <path class="wave" d="M3 16 q3 -3 6 0 t6 0 t6 0"/></g>`,
};

const APPS = [
  {id:'astry', name:'astry', href:'astry.html', c:'#8f7bff',
   domain:{en:'Cosmos',es:'Cosmos'},
   tag:{en:'Astrology across five living traditions, side by side.',
        es:'Astrología de cinco tradiciones vivas, lado a lado.'},
   short:{en:'Five living skies.', es:'Cinco cielos vivos.'},
   node:{x:20,y:20}},
  {id:'realy', name:'realy', href:'realy.html', c:'#a78bfa',
   domain:{en:'The real',es:'Lo real'},
   tag:{en:'Weave the real and the fictional across your life.',
        es:'Teje lo real y lo ficticio a lo largo de tu vida.'},
   short:{en:'Real meets fiction.', es:'Real y ficción.'},
   node:{x:80,y:18}},
  {id:'freedoms', name:'freedoms', href:'freedoms.html', c:'#ff8a3a',
   domain:{en:'Society',es:'Sociedad'},
   tag:{en:'Lay out the freedoms a society should defend.',
        es:'Ordena las libertades que una sociedad debe defender.'},
   short:{en:'Freedoms to defend.', es:'Libertades a defender.'},
   node:{x:50,y:34}},
  {id:'lovy', name:'lovy', href:'lovy.html', c:'#fb7185',
   domain:{en:'Affection',es:'Afecto'},
   tag:{en:'Pick, combine and share small acts of love.',
        es:'Elige, combina y comparte pequeños actos de amor.'},
   short:{en:'Small acts of love.', es:'Actos de amor.'},
   node:{x:80,y:48}},
  {id:'hacky', name:'hacky', href:'hacky.html', c:'#00ff88',
   domain:{en:'Shadow',es:'Sombra'},
   tag:{en:'Name a dislike and a like — the hack lives where they meet.',
        es:'Nombra un disgusto y un gusto — el hack vive donde se cruzan.'},
   short:{en:'Dislike, meet like.', es:'Disgusto y gusto.'},
   node:{x:22,y:50}},
];
const byId = Object.fromEntries(APPS.map(a=>[a.id,a]));
const reduced = matchMedia('(prefers-reduced-motion:reduce)').matches;

/* ---- hero constellation ---- */
const sky = document.getElementById('sky');
let svg = '';
APPS.forEach((a,i)=>{
  const x=a.node.x, y=a.node.y;
  const ms=0.32, mx=(x-12*ms).toFixed(2), my=(y-2.4-12*ms).toFixed(2);
  svg += `<g class="node" data-app="${a.id}" style="--c:${a.c}; --nd:${(i*0.12).toFixed(2)}s"
      tabindex="0" role="button" aria-label="${a.name} — ${a.tag.en}">
      <g class="orbs">
        <circle class="halo" cx="${x}" cy="${y}" r="10.5"/>
        <circle class="ring" cx="${x}" cy="${y}" r="9.6"/>
        <circle class="disc" cx="${x}" cy="${y}" r="9"/>
      </g>
      <g class="c-face">
        <g class="ball-mark" transform="translate(${mx} ${my}) scale(${ms})" aria-hidden="true">${MARKS[a.id]}</g>
        <text class="ball-name" x="${x}" y="${(y+5.2).toFixed(2)}">${a.name}</text>
      </g>
      <g class="x-face" aria-hidden="true">
        <text class="x-name" x="${x}" y="${(y-8).toFixed(2)}">${a.name}</text>
        <text class="x-slogan" x="${x}" y="${(y-1).toFixed(2)}"><tspan class="en">${a.short.en}</tspan><tspan class="es">${a.short.es}</tspan></text>
        <g class="x-go-btn">
          <rect class="x-hit" x="${(x-11).toFixed(2)}" y="${(y+4.4).toFixed(2)}" width="22" height="5.6"/>
          <text class="x-go" x="${x}" y="${(y+7.2).toFixed(2)}"><tspan class="en">go play ▸</tspan><tspan class="es">a jugar ▸</tspan></text>
        </g>
      </g></g>`;});
sky.innerHTML = svg;

/* ---- node highlight (hover glow) ---- */
function highlight(id,on){
  document.querySelectorAll(`.node[data-app="${id}"]`).forEach(n=>n.classList.toggle('lit',on));
}
/* ---- ball reveal: the clicked ball expands in place (no floating panel) ---- */
const skyBox=document.querySelector('.sky');
let currentBall=null;

function focusOnly(id){
  document.querySelectorAll('.node').forEach(n=>n.classList.toggle('lit', n.dataset.app===id));
  skyBox.classList.add('focusing');
  document.documentElement.style.setProperty('--spark',byId[id].c);
}
function clearFocus(){
  document.querySelectorAll('.node.lit').forEach(el=>el.classList.remove('lit'));
  skyBox.classList.remove('focusing');
}
function closeBall(){
  if(!currentBall) return;
  const n=sky.querySelector('.node.expanded');
  if(n) n.classList.remove('expanded');
  currentBall=null; clearFocus();
}
function openBall(id,n){
  if(currentBall && currentBall!==id) closeBall();
  n.classList.add('expanded');
  sky.appendChild(n);            // raise the expanded ball above its neighbours
  focusOnly(id);
  currentBall=id;
}
function launchNode(n,a){
  if(reduced){ location.href=a.href; return; }
  const flash=document.getElementById('flash'); flash.style.setProperty('--c',a.c); flash.classList.add('on');
  burst(n,a.c,20);
  n.classList.add('launching');
  setTimeout(()=>{location.href=a.href;},450);
}

document.querySelectorAll('.node').forEach(n=>{
  const id=n.dataset.app;
  n.addEventListener('mouseenter',()=>{ if(!currentBall) highlight(id,true); });
  n.addEventListener('mouseleave',()=>{ if(!currentBall) highlight(id,false); });
  n.addEventListener('click',e=>{
    e.preventDefault();
    if(currentBall!==id){ openBall(id,n); return; }
    if(e.target.closest('.x-go-btn')) launchNode(n, byId[id]); else closeBall();
  });
  n.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key===' '){ e.preventDefault();
      if(currentBall!==id) openBall(id,n); else launchNode(n, byId[id]); }
    else if(e.key==='Escape') closeBall();
  });
});
/* dismiss on outside-click or Esc */
document.addEventListener('click',e=>{
  if(currentBall && !e.target.closest('.node')) closeBall();
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeBall(); });

/* ---- particle sparks ---- */
function spark(x,y,color){
  const s=document.createElement('div'); s.className='spark';
  s.style.left=x+'px'; s.style.top=y+'px'; if(color)s.style.background=s.style.boxShadow='';
  if(color){s.style.background=color; s.style.boxShadow='0 0 8px '+color;}
  document.body.appendChild(s);
  const ang=Math.random()*Math.PI*2, dist=30+Math.random()*46;
  const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist-10;
  s.animate([{transform:'translate(0,0) scale(1)',opacity:1},
    {transform:`translate(${dx}px,${dy}px) scale(0)`,opacity:0}],
    {duration:520+Math.random()*260, easing:'cubic-bezier(.2,.8,.2,1)'}).onfinish=()=>s.remove();
}
function burst(el,color,n){
  const r=el.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
  for(let i=0;i<n;i++) spark(cx,cy,color);
}
/* a small spark on every click, in the current accent */
document.addEventListener('click',e=>{
  if(reduced) return;
  const c=getComputedStyle(document.documentElement).getPropertyValue('--spark').trim()||'#8f7bff';
  for(let i=0;i<5;i++) spark(e.clientX,e.clientY,c);
},{passive:true});

/* ---- theme (night default / dawn) ---- */
const root=document.documentElement;
try{const t=localStorage.getItem('psico.theme'); if(t)root.dataset.theme=t;}catch(e){}
document.getElementById('themeBtn').onclick=()=>{
  const next=root.dataset.theme==='dawn'?'':'dawn';
  if(next)root.dataset.theme=next; else root.removeAttribute('data-theme');
  try{localStorage.setItem('psico.theme',next);}catch(e){}
  document.querySelector('meta[name=theme-color]').setAttribute('content', next?'#f2ecfb':'#0d0a1c');
};

/* ---- language (EN default / ES) ---- */
function setLang(l){
  root.classList.toggle('es', l==='es');
  root.setAttribute('lang', l);
  document.querySelectorAll('.lang-menu button').forEach(b=>b.setAttribute('aria-current', String(b.dataset.lang===l)));
}
try{const l=localStorage.getItem('flove:lang')||localStorage.getItem('psico.lang'); if(l==='es')setLang('es');}catch(e){}
document.querySelectorAll('.lang-menu button').forEach(b=>b.onclick=()=>{
  const l=b.dataset.lang; setLang(l);
  try{localStorage.setItem('flove:lang',l); localStorage.setItem('psico.lang',l);}catch(e){}
  b.closest('details').open=false;
});

/* ---- orchestrated load reveal ---- */
requestAnimationFrame(()=>requestAnimationFrame(()=>root.classList.add('ready')));
</script>
