<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>✺ flove · Offer — Clause-tree editor</title>
<style>
  :root{
    --accent:#dc2626; --accent-deep:#991b1b; --accent-soft:#fee2e2;
    --paper:#fffbfa; --ink:#1a0f0f; --ink-soft:#4a2a28; --muted:#8a6a68;
    --line:rgba(120,30,30,.16); --ok:#15803d;
    --font:'Inter',system-ui,sans-serif;
  }
  *{ box-sizing:border-box }
  html,body{ margin:0 }
  body{
    font:14px/1.5 var(--font); color:var(--ink);
    background:var(--paper); padding:0 0 80px;
  }
  body.dragging{ user-select:none; cursor:grabbing }

  header{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:11px 18px; background:#fff; border-bottom:1px solid var(--line);
  }
  header h1{ font-size:.98rem; margin:0; font-weight:700 }
  header .spacer{ flex:1 }
  .btn{
    border:1px solid var(--line); background:#fff; color:var(--ink-soft);
    padding:7px 13px; border-radius:999px; font:600 .8rem var(--font);
    cursor:pointer; transition:all .15s;
  }
  .btn:hover{ border-color:var(--accent); color:var(--accent-deep); background:var(--accent-soft) }
  .btn.primary{ background:var(--accent); color:#fff; border-color:transparent }
  .btn.primary:hover{ background:var(--accent-deep); color:#fff }
  /* the single, bold "new clause" control */
  .btn.newclause{
    background:var(--accent); color:#fff; border-color:transparent;
    font-weight:800; letter-spacing:.01em;
  }
  .btn.newclause:hover{ background:var(--accent-deep); color:#fff }
  .btn:disabled{ opacity:.45; pointer-events:none }
  /* staging area — new clause fields appear to the right of the button */
  .staging{ display:flex; gap:6px; flex-wrap:wrap; align-items:center }
  .staging:empty{ display:none }
  .staging > *{ width:252px; margin:0 }
  .staging .clause{ border-style:dashed; border-color:var(--accent); background:#fff }
  .staging .cat-head{ border-style:dashed; border-color:var(--accent) }

  main{ width:100%; padding:14px 18px }
  .hint{
    color:var(--muted); font-size:.82rem; margin:0 0 14px;
    background:#fff; border:1px dashed var(--line); border-radius:10px; padding:9px 14px;
  }
  .hint b{ color:var(--ink-soft) }

  /* ── tree as full-width columns ── */
  .kids{ margin-left:13px; border-left:1px dashed var(--line); padding-left:5px }
  #tree > .kids{
    margin:0; border-left:0; padding-left:0;
    display:grid; gap:14px; align-items:start;
    grid-template-columns:repeat(4,minmax(0,1fr));
  }
  @media(max-width:1280px){ #tree > .kids{ grid-template-columns:repeat(3,minmax(0,1fr)) } }
  @media(max-width:960px){  #tree > .kids{ grid-template-columns:repeat(2,minmax(0,1fr)) } }
  @media(max-width:620px){  #tree > .kids{ grid-template-columns:1fr } }

  .cat-head, .clause{
    display:flex; align-items:center; gap:6px;
    padding:5px 7px; margin:3px 0;
    background:#fff; border:1px solid var(--line); border-radius:9px;
    cursor:grab;
  }
  .cat-head{ background:#fef2f0 }
  .cat.depth0{
    background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:8px 10px 10px;
  }
  .cat.depth0 > .cat-head{
    background:var(--accent); border-color:transparent; margin:0 0 4px;
    border-radius:9px; cursor:default;            /* sections stay put */
  }
  .cat.depth0 > .cat-head .lab{ color:#fff; font-weight:800; letter-spacing:.04em }
  .cat.depth0 > .cat-head .mini{ background:rgba(255,255,255,.2); color:#fff; border-color:transparent }
  .cat.depth0 > .cat-head .mini:hover{ background:#fff; color:var(--accent-deep) }
  .cat.depth0 > .cat-head .chev{ color:#fff; border-right-color:rgba(255,255,255,.35) }
  .cat.depth0 > .cat-head .chev:hover{ background:rgba(255,255,255,.25); color:#fff }

  /* expand / collapse toggle — replaces the old drag dots, parents only.
     Full row height, square, divided from the text by a right border. */
  .chev{
    align-self:stretch; width:34px; flex-shrink:0; padding:0;
    margin:-5px 6px -5px -7px;
    display:grid; place-items:center;
    border:0; border-right:1px solid var(--line);
    border-radius:8px 0 0 8px;
    background:transparent; color:var(--muted);
    cursor:pointer; font-size:.95rem; line-height:1;
    transition:background .15s, color .15s;
  }
  .chev:hover{ background:var(--accent-soft); color:var(--accent-deep) }

  .lab{
    flex:1; min-width:0; border:0; background:transparent;
    font:inherit; color:inherit; padding:4px; outline:none; border-radius:5px;
    cursor:text;
  }
  .lab:focus{ background:var(--accent-soft) }
  .lab-cat{ font-weight:700 }
  .mini{
    width:23px; height:23px; flex-shrink:0; padding:0;
    display:inline-grid; place-items:center;
    border:1px solid var(--line); border-radius:50%;
    background:#fff; color:var(--ink-soft); cursor:pointer; font-size:.85rem;
    transition:all .15s;
  }
  .mini:hover{ border-color:var(--accent); color:var(--accent-deep); background:var(--accent-soft) }
  .mini.del:hover{ background:var(--accent); color:#fff; border-color:transparent }

  /* drop zones — invisible at rest, tactile while dragging */
  .dz{ height:4px; border-radius:5px; transition:height .1s, background .1s }
  body.dragging .dz{ height:16px; background:rgba(220,38,38,.07) }
  .dz.over{
    height:34px; margin:3px 0; background:var(--accent-soft);
    border:2px dashed var(--accent); box-shadow:0 0 0 3px rgba(220,38,38,.12);
  }
  .drag-source{ opacity:.35 }
  .cat-head.drop-into{ box-shadow:0 0 0 3px rgba(220,38,38,.45) }
  .clause.drop-into{ box-shadow:0 0 0 3px rgba(220,38,38,.45) }
  .linknode{ background:#fff5f5; border-style:dashed; border-color:rgba(220,38,38,.4) }
  .link-label{
    flex:1; min-width:0; padding:4px; font-style:italic;
    color:var(--accent-deep); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .mini.link{ color:var(--accent) }
  .drag-ghost{
    position:fixed; left:0; top:0; z-index:9999; pointer-events:none;
    padding:8px 13px; max-width:360px;
    background:#fff; border:1.5px solid var(--accent); border-radius:9px;
    box-shadow:0 16px 34px -10px rgba(60,10,10,.4);
    font:600 .85rem var(--font); color:var(--ink);
    transform:rotate(-1.6deg) scale(1.04);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* prompt panel */
  .prompt-panel{ margin-top:26px }
  .prompt-panel h2{ font-size:.95rem; margin:0 0 8px }
  textarea#out{
    width:100%; height:240px; resize:vertical;
    border:1px solid var(--line); border-radius:10px; padding:12px;
    font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;
    color:var(--ink); background:#fff;
  }
  .prompt-actions{ display:flex; gap:8px; margin-top:8px; flex-wrap:wrap }
  .saved-tag{ color:var(--ok); font-size:.78rem; align-self:center }
</style>
</head>
<body>

<header>
  <h1>✺ Offer · Clause-tree editor</h1>
  <button class="btn newclause" id="newClauseBtn">✛ New</button>
  <div class="staging" id="staging"></div>
  <span class="spacer"></span>
  <button class="btn" id="addSection">+ section</button>
  <button class="btn" id="resetBtn">↺ Reset to original</button>
  <button class="btn primary" id="genBtn">Generate prompt ↓</button>
</header>

<main>
  <div id="tree"></div>

  <section class="prompt-panel">
    <h2>Prompt for Claude</h2>
    <textarea id="out" readonly placeholder="Press “Generate prompt” above…"></textarea>
    <div class="prompt-actions">
      <button class="btn primary" id="copyBtn">📋 Copy prompt</button>
      <span class="saved-tag" id="savedTag" hidden>copied ✓</span>
    </div>
  </section>
</main>

<script>
"use strict";

/* ── Seed: the current tidied tree (107 subclauses) ──
   node = [label, [children]]  → category
   node = [label, "id"]        → subclause (id = its value slug in offer.html) */
const SEED=[
 ["TIME",[
  ["Back on request",[
   ["Offeror may decline","req-may-decline"],
   ["Agree a return date together","req-agree-date"]
  ]],
  ["Back after use",[
   ["Return when finished","return-when-done"],
   ["One borrow at a time","one-at-a-time"],
   ["Check condition together on return","check-together"]
  ]],
  ["Use where it is",[
   ["Within a certain place","within-place"],
   ["Use it with the offeror","use-with-offeror"]
  ]],
  ["Availability",[
   ["Open access",[
    ["Anytime","anytime"],
    ["Unlimited time of use per user","unlimited-time"],
    ["Everywhere","everywhere"],
    ["No limit per user","no-limit-per-user"],
    ["Unlimited amount of users","unlimited-users"]
   ]],
   ["Time limits",[
    ["(Not) for certain time","not-certain-time"],
    ["Limiting use time","limiting-use-time"],
    ["For certain time per session","time-per-session"],
    ["For certain total time per user","total-time-per-user"],
    ["A minimum total use time per user","min-total-use-time"],
    ["A maximum total use time per user","max-total-use-time"],
    ["Deadline to start using","deadline-to-start"]
   ]],
   ["Use limits",[
    ["No limit per session","no-limit-per-session"],
    ["A minimum of use","min-use"],
    ["A maximum of use","max-use"]
   ]],
   ["Places it can go",[
    ["To some places","some-places"],
    ["To new places","new-places"],
    ["Keep it moving","keep-moving"]
   ]]
  ]],
  ["Conditions over time",[
   ["First time using the thing","first-time-thing"],
   ["First time using a similar offer","first-time-similar"],
   ["A certain climate or season","certain-climate"],
   ["Used under all climates","all-climates-time"],
   ["Different terms each time","different-terms-each-time"],
   ["Different terms based on the previous ones","different-terms-based-on-previous"],
   ["Terms are shareful","terms-shareful"]
  ]]
 ]],
 ["USE",[
  ["Anything",[
   ["For every purpose","every-purpose"],
   ["Any route is fine","any-route"],
   ["By any means of transport","any-transport"],
   ["Use not conditioned by any fact","use-unconditioned"]
  ]],
  ["Shared values",[
   ["Educational / study","educational"],
   ["Repair / maintenance","repair"],
   ["Creative / artistic","creative"],
   ["Research / experimentation","research"],
   ["Celebration / event","celebration"],
   ["Political / activist","political"],
   ["Community-building","community"],
   ["Care / caregiving","caregiving"],
   ["Spiritual / ritual","spiritual"],
   ["Economic / livelihood","livelihood"],
   ["Ecological / regenerative","ecological"]
  ]],
  ["Tell intention first",[
   ["A log of use is kept","use-log"],
   ["Intention visible to others","intention-visible"]
  ]],
  ["Keeping & care",[
   ["Modification allowed / not allowed","modification-allowed"],
   ["Personal use only (no commercial use)","personal-use-only"],
   ["Leave it as found, or better","leave-as-found"],
   ["Clean before returning","clean-before-return"]
  ]],
  ["Compensation",[
   ["Compensating only by repairing the thing","repair-only"],
   ["Report any damage","report-damage"],
   ["Grant is revocable","grant-revocable"],
   ["Grant is free","grant-is-free"],
   ["Grant is time-limited","grant-time-limited"],
   ["Grant defines who qualifies","grant-qualifies"]
  ]]
 ]],
 ["PEOPLE",[
  ["All",[
   ["For everyone","for-everyone"],
   ["All people is family","all-are-family"],
   ["All people is friend","all-are-friends"],
   ["Affinity with all humans","affinity-all-humans"]
  ]],
  ["Known",[
   ["Prior acquaintance required","prior-acquaintance"],
   ["Vouched for by someone","vouched"],
   ["Based on reputation","reputation"],
   ["Endorsed by someone","endorsed"]
  ]],
  ["How many people",[
   ["Undefined maximum of users","undefined-max-users"],
   ["A maximum of users","max-users"],
   ["A minimum of interested users","min-interested"],
   ["A waiting list when full","waiting-list"]
  ]],
  ["Who",[
   ["Certain people (not) being present","certain-not-present"],
   ["With a minimum of sobriety","min-sobriety"],
   ["An age or maturity requirement","age-maturity"],
   ["A skill or qualification requirement","skill-qualification"],
   ["Priority for neighbors / locals","priority-locals"],
   ["Transferable to another person","transferable"],
   ["Endorsement required","endorsement-required"]
  ]]
 ]],
 ["CONTRIBUTION",[
  ["No need",[]],
  ["Volunteer",[
   ["Pay what you can","pay-what-you-can-vol"],
   ["A tip is optional","tip-optional"],
   ["Contribute in kind","in-kind"],
   ["Contribute time instead","time-instead"]
  ]],
  ["Fixed",[
   ["A deposit upfront","deposit-upfront"],
   ["Paid before use","paid-before-use"],
   ["With default cost for offeror","default-cost-offeror"],
   ["Supplying certain use cost","supplying-use-cost"],
   ["Supplying use cost and deterioration","supplying-use-cost-deterioration"],
   ["Supplying use cost","supplying-cost"],
   ["Giving model",[
    ["In Goods-Services","in-goods-services"],
    ["In Money","in-money"]
   ]]
  ]]
 ]]
];

const KEY="flove:offer:tree-editor:v4";
let _uid=0;
const nid=()=>"n"+(++_uid);

function build(seed,depth){
  depth=depth||0;
  return seed.map(([label,second])=>{
    if(Array.isArray(second))
      return {uid:nid(),label,collapsed:depth>0,kids:build(second,depth+1)};
    return {uid:nid(),label,cid:second,kids:null};
  });
}
/* stable uids: keep saved ones, just bump the counter past the max */
function maxUidNum(nodes){
  let m=0;
  nodes.forEach(n=>{
    const k=parseInt(String(n.uid).slice(1),10)||0;
    if(k>m) m=k;
    if(n.kids) m=Math.max(m,maxUidNum(n.kids));
  });
  return m;
}

let model=build(SEED);
let staging=[];                              // new clauses waiting to be placed
try{
  const s=localStorage.getItem(KEY);
  if(s){
    const o=JSON.parse(s);
    model=o.model||model; staging=o.staging||[];
    _uid=Math.max(maxUidNum(model),maxUidNum(staging),_uid);
  }
}catch(e){}

const save=()=>{ try{ localStorage.setItem(KEY,JSON.stringify({model,staging})); }catch(e){} };

/* ── tree helpers ── */
function findIn(uid,arr){
  for(let i=0;i<arr.length;i++){
    if(arr[i].uid===uid) return {node:arr[i],arr,index:i};
    if(arr[i].kids){ const r=findIn(uid,arr[i].kids); if(r) return r; }
  }
  return null;
}
function find(uid){ return findIn(uid,model)||findIn(uid,staging); }
function contains(node,uid){
  if(node.uid===uid) return true;
  return node.kids ? node.kids.some(k=>contains(k,uid)) : false;
}
function leafCount(node){
  if(!node.kids) return 1;
  return node.kids.reduce((c,k)=>c+leafCount(k),0);
}

function move(uid,parentUid,index){
  const src=find(uid); if(!src) return;
  let dst;
  if(parentUid==="ROOT") dst=model;
  else{
    if(contains(src.node,parentUid)) return;
    const p=find(parentUid); if(!p||!p.node.kids) return;
    dst=p.node.kids;
  }
  src.arr.splice(src.index,1);
  if(src.arr===dst && src.index<index) index--;
  dst.splice(index,0,src.node);
  save(); render();
}

/* ── render ── */
let focusNext=null;

function render(){
  const root=document.getElementById("tree");
  root.innerHTML="";
  root.appendChild(renderList(model,"ROOT",0,false));
  const st=document.getElementById("staging");
  st.innerHTML="";
  staging.forEach(n=>st.appendChild(nodeEl(n,1,"STAGING")));
  document.getElementById("newClauseBtn").disabled=newClauseCount()>=3;
  if(focusNext){
    const el=document.querySelector('.lab[data-uid="'+focusNext+'"]');
    if(el){ el.focus(); el.select(); }
    focusNext=null;
  }
}

function renderList(arr,parentUid,depth,withDz){
  const box=document.createElement("div");
  box.className="kids";
  arr.forEach((node,i)=>{
    if(withDz) box.appendChild(dz(parentUid,i));
    box.appendChild(nodeEl(node,depth,parentUid));
  });
  if(withDz) box.appendChild(dz(parentUid,arr.length));
  return box;
}

function dz(parentUid,index){
  const d=document.createElement("div");
  d.className="dz";
  d.dataset.parent=parentUid;
  d.dataset.index=index;
  return d;
}

function chevron(node){
  const c=document.createElement("button");
  c.type="button"; c.className="chev";
  c.textContent=node.collapsed?"+":"✕";
  c.title=node.collapsed?"Expand":"Collapse";
  c.addEventListener("click",()=>{ node.collapsed=!node.collapsed; save(); render(); });
  return c;
}

function labelInput(node){
  const inp=document.createElement("input");
  inp.className=node.kids?"lab lab-cat":"lab";
  inp.value=node.label;
  inp.dataset.uid=node.uid;
  inp.addEventListener("input",()=>{ node.label=inp.value; save(); });
  if(!node.kids){
    inp.addEventListener("keydown",e=>{
      if(e.key==="Enter"){
        e.preventDefault();
        const r=find(node.uid);
        const fresh={uid:nid(),label:"",cid:"new",kids:null};
        r.arr.splice(r.index+1,0,fresh);
        focusNext=fresh.uid; save(); render();
      }
    });
  }
  return inp;
}

function miniBtn(glyph,cls,title,fn){
  const b=document.createElement("button");
  b.className="mini"+(cls?" "+cls:""); b.type="button";
  b.textContent=glyph; b.title=title;
  b.addEventListener("click",fn);
  return b;
}

function del(uid){
  const r=find(uid); if(!r) return;
  if(r.node.kids && leafCount(r.node)>0){
    if(!confirm('Delete "'+r.node.label+'" and its '+leafCount(r.node)+' subclause(s)?')) return;
  }
  const gone=new Set();
  (function g(n){ gone.add(n.uid); if(n.kids) n.kids.forEach(g); })(r.node);
  r.arr.splice(r.index,1);
  /* drop any links that pointed into the removed subtree */
  (function sweep(arr){
    for(let i=arr.length-1;i>=0;i--){
      if(arr[i].link && gone.has(arr[i].link)) arr.splice(i,1);
      else if(arr[i].kids) sweep(arr[i].kids);
    }
  })(model);
  for(let i=staging.length-1;i>=0;i--)
    if(staging[i].link && gone.has(staging[i].link)) staging.splice(i,1);
  save(); render();
}

/* turn a staged clause into an empty parent-group */
function toGroup(uid){
  const r=find(uid); if(!r||r.node.kids) return;
  delete r.node.cid;
  r.node.kids=[]; r.node.collapsed=true;
  save(); render();
}

/* spawn a linked copy of a clause into the staging tray */
function makeLink(uid){
  if(!find(uid)) return;
  staging.push({uid:nid(),link:uid});
  save(); render();
}

/* count only real new-clause chips (not links, not groups) */
function newClauseCount(){ return staging.filter(n=>!n.kids&&!n.link).length; }

function nodeEl(node,depth,parentUid){
  if(node.link){
    const el=document.createElement("div");
    el.className="clause linknode";
    el.dataset.uid=node.uid;
    const o=find(node.link);
    const t=document.createElement("span");
    t.className="link-label";
    t.textContent="🔗 "+(o?(o.node.label||"(unnamed)"):"(original deleted)");
    el.append(t,miniBtn("✕","del","Remove link",()=>del(node.uid)));
    el.addEventListener("pointerdown",e=>armDrag(e,node.uid,el));
    return el;
  }
  if(node.kids){
    const el=document.createElement("div");
    el.className="cat depth"+depth;
    el.dataset.uid=node.uid;
    const head=document.createElement("div");
    head.className="cat-head";
    head.dataset.dropinto=node.uid;
    head.appendChild(chevron(node));
    head.append(
      labelInput(node),
      miniBtn("✕","del","Delete",()=>del(node.uid))
    );
    if(depth>0) head.addEventListener("pointerdown",e=>armDrag(e,node.uid,el));
    if(node.collapsed) el.append(head);
    else el.append(head,renderList(node.kids,node.uid,depth+1,true));
    return el;
  }
  const el=document.createElement("div");
  el.className="clause";
  el.dataset.uid=node.uid;
  el.dataset.dropinto=node.uid;                    // a clause can also receive links
  el.appendChild(labelInput(node));
  el.appendChild(miniBtn("🔗","link","Link a copy elsewhere",()=>makeLink(node.uid)));
  if(parentUid==="STAGING")
    el.appendChild(miniBtn("❏","","Make it a parent-group",()=>toGroup(node.uid)));
  el.appendChild(miniBtn("✕","del","Delete",()=>del(node.uid)));
  el.addEventListener("pointerdown",e=>armDrag(e,node.uid,el));
  return el;
}

/* ── pointer drag & drop — grab anywhere on the row (trackpad/mouse/touch) ── */
let pending=null, drag=null;

function armDrag(e,uid,sourceEl){
  if(e.pointerType==="mouse" && e.button!==0) return;
  if(e.target.closest(".mini,.chev")) return;       // controls aren't drag handles
  pending={uid,sourceEl,x:e.clientX,y:e.clientY};
}

function beginDrag(){
  const p=pending; pending=null;
  const f=find(p.uid); if(!f) return;
  if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
  const r=p.sourceEl.getBoundingClientRect();
  const ghost=document.createElement("div");
  ghost.className="drag-ghost";
  ghost.textContent=(f.node.kids?"❏ ":"• ")+(f.node.label||"(empty)");
  ghost.style.width=Math.min(r.width,360)+"px";
  document.body.appendChild(ghost);
  drag={uid:p.uid,sourceEl:p.sourceEl,ghost,offX:p.x-r.left,offY:p.y-r.top,target:null};
  p.sourceEl.classList.add("drag-source");
  document.body.classList.add("dragging");
  moveGhost(p.x,p.y);
}

function moveGhost(x,y){
  drag.ghost.style.left=(x-drag.offX)+"px";
  drag.ghost.style.top =(y-drag.offY)+"px";
}

function nearestDz(x,y){
  let best=null,bestCost=Infinity;
  document.querySelectorAll(".dz, [data-dropinto]").forEach(d=>{
    if(drag.sourceEl.contains(d)) return;          // never into its own subtree
    const r=d.getBoundingClientRect();
    if(r.width===0||x<r.left-4||x>r.right+4) return; // only the column under the pointer
    const cost=Math.abs(y-(r.top+r.bottom)/2);
    if(cost<bestCost){ bestCost=cost; best=d; }
  });
  return best;
}

document.addEventListener("pointermove",e=>{
  if(pending && !drag){
    if(Math.abs(e.clientX-pending.x)+Math.abs(e.clientY-pending.y)>6) beginDrag();
  }
  if(!drag) return;
  e.preventDefault();
  moveGhost(e.clientX,e.clientY);
  if(e.clientY<74) window.scrollBy(0,-16);
  else if(e.clientY>innerHeight-74) window.scrollBy(0,16);
  const t=nearestDz(e.clientX,e.clientY);
  if(t!==drag.target){
    if(drag.target) drag.target.classList.remove("over","drop-into");
    drag.target=t;
    if(t) t.classList.add(t.classList.contains("dz")?"over":"drop-into");
  }
},{passive:false});

function endDrag(commit){
  if(!drag) return;
  const d=drag; drag=null;
  d.ghost.remove();
  d.sourceEl.classList.remove("drag-source");
  document.body.classList.remove("dragging");
  if(d.target) d.target.classList.remove("over","drop-into");
  if(commit && d.target){
    if(d.target.classList.contains("dz")){
      move(d.uid,d.target.dataset.parent,+d.target.dataset.index);
    }else{
      const cu=d.target.dataset.dropinto, c=find(cu);
      if(c){
        if(!c.node.kids) c.node.kids=[];           // a clause becomes a parent
        c.node.collapsed=false; move(d.uid,cu,0);
      }
    }
  }
}
document.addEventListener("pointerup",()=>{ pending=null; endDrag(true); });
document.addEventListener("pointercancel",()=>{ pending=null; endDrag(false); });

/* ── prompt ── */
const PROMPT_HEAD=
"Apply this clause tree to offer.html — rebuild the `.clauses-grid` to match it exactly.\n"+
"\n"+
"Conventions:\n"+
"  • Indentation = nesting. Top level = SECTION (fieldset.opt-group), then group,\n"+
"    then sub-group; deeper nesting than today's markup needs new nested blocks.\n"+
"  • A line starting with \"• \" is a subclause (label.clause).\n"+
"  • The [bracket] is the clause id. [id] = an existing clause: KEEP its input\n"+
"    name, value, icon and any clause-plus route. [new] = create a fresh clause\n"+
"    (new value slug + a fitting icon).\n"+
"  • A line starting with \"↳ LINK →\" is the same clause mirrored into a second\n"+
"    place: in offer.html, checking it in either spot must check it in both\n"+
"    (reuse the clause-plus route / selected-clauses mechanism).\n"+
"  • Remove any existing clause not listed here (see the REMOVED list below).\n"+
"\n"+
"TREE:\n";

function collectCids(nodes,set){
  nodes.forEach(n=>{
    if(n.cid && n.cid!=="new") set.add(n.cid);
    if(n.kids) collectCids(n.kids,set);
  });
  return set;
}
function seedClauses(seed,acc){
  seed.forEach(([label,second])=>{
    if(Array.isArray(second)) seedClauses(second,acc);
    else if(second!=="new") acc.push([label,second]);
  });
  return acc;
}
function buildPrompt(){
  let out="";
  (function walk(nodes,depth){
    nodes.forEach(n=>{
      const pad="  ".repeat(depth);
      if(n.link){
        const o=find(n.link);
        out+=pad+"↳ LINK → "+(o?(o.node.label||"(unnamed)"):"(missing)")+
             "  ["+((o&&o.node.cid)||"?")+"]\n";
      }else if(n.kids){
        out+=pad+(n.cid?"• "+(n.label||"(empty)")+"  ["+n.cid+"]":n.label)+"\n";
        walk(n.kids,depth+1);
      }else{
        out+=pad+"• "+(n.label||"(empty)")+"  ["+(n.cid||"new")+"]\n";
      }
    });
  })(model,0);
  let p=PROMPT_HEAD+"\n"+out;
  const present=collectCids(model,collectCids(staging,new Set()));
  const removed=seedClauses(SEED,[]).filter(c=>!present.has(c[1]));
  if(removed.length){
    p+="\nREMOVED — delete these existing clauses from offer.html:\n";
    removed.forEach(c=>{ p+="  ✕ "+c[0]+"  ["+c[1]+"]\n"; });
  }
  if(staging.length) p+="\nNote: "+staging.length+" new clause(s) are still unplaced in the topbar and were left out.\n";
  return p;
}

document.getElementById("newClauseBtn").addEventListener("click",()=>{
  if(newClauseCount()>=3) return;                  // at most three new clauses
  const fresh={uid:nid(),label:"",cid:"new",kids:null};
  staging.push(fresh); focusNext=fresh.uid; save(); render();
});
document.getElementById("genBtn").addEventListener("click",()=>{
  document.getElementById("out").value=buildPrompt();
});
document.getElementById("copyBtn").addEventListener("click",()=>{
  const ta=document.getElementById("out");
  if(!ta.value) ta.value=buildPrompt();
  ta.removeAttribute("readonly"); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  ta.setAttribute("readonly","");
  if(navigator.clipboard) navigator.clipboard.writeText(ta.value).catch(()=>{});
  const tag=document.getElementById("savedTag");
  tag.hidden=false; setTimeout(()=>tag.hidden=true,1600);
});
document.getElementById("addSection").addEventListener("click",()=>{
  model.push({uid:nid(),label:"NEW SECTION",kids:[]}); save(); render();
});
document.getElementById("resetBtn").addEventListener("click",()=>{
  if(!confirm("Discard all edits and reload the original 107-clause tree?")) return;
  _uid=0; model=build(SEED); staging=[]; save(); render();
});

render();
</script>
</body>
</html>
