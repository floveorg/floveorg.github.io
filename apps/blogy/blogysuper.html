<style>
  :root{
    --accent:      #d32f2f;
    --accent-deep: #9a0007;
    --accent-rgb:  211, 47, 47;
    --ink:         #212121;
    --ink-soft:    #5a5a5a;
    --line:        rgba(0, 0, 0, .10);
    --line-strong: rgba(0, 0, 0, .18);
    --fast:        .18s ease;
  }
  *{ box-sizing: border-box; }
  html, body{ height: 100%; margin: 0; }
  body{
    display: flex; flex-direction: column;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 20% 20%, rgba(var(--accent-rgb), .07), transparent 45%),
      linear-gradient(180deg, #fafafa, #ecdcdc);
  }
  .topbar{
    display: flex; align-items: center; gap: .9rem;
    padding: .7rem 1.2rem;
    border-bottom: 1px solid var(--line);
    background: rgba(255, 255, 255, .88);
    backdrop-filter: blur(6px);
  }
  .topbar a{
    color: var(--ink-soft);
    text-decoration: none;
    font: 600 .82rem/1 'Inter', sans-serif;
    padding: .3rem .7rem;
    border-radius: 999px;
    transition: var(--fast);
  }
  .topbar a:hover{ color: var(--accent-deep); background: rgba(var(--accent-rgb), .07); }
  .topbar .brand{
    color: var(--accent);
    font-weight: 800;
    font-size: 1rem;
  }
  .stage{
    flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .wip-box{
    max-width: 60rem;
    padding: 1.4rem 2rem;
    background: rgba(255, 255, 255, .92);
    border: 1px dashed rgba(var(--accent-rgb), .4);
    border-radius: 999px;
    box-shadow: 0 10px 32px rgba(0, 0, 0, .08);
    text-align: center;
  }
  .wip-box p{
    margin: 0;
    font-size: 1rem;
    line-height: 1.5;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wip-box a{
    color: var(--accent-deep);
    font-weight: 700;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .wip-box a:hover{ color: var(--accent); }
</style>
