<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Apps · FLOVE</title>
<meta name="description" content="Mapa 3D de las apps de flove — grafo expansible por categorías.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='12' y1='0' x2='88' y2='0' gradientUnits='userSpaceOnUse'><stop offset='0' stop-color='%23ff3344'/><stop offset='.5' stop-color='%23ff8a3a'/><stop offset='1' stop-color='%23ffd633'/></linearGradient></defs><path d='M50 60 C 22 60, 12 38, 16 18 C 38 22, 54 38, 50 60 Z' fill='url(%23g)'/><path d='M50 60 C 78 60, 88 38, 84 18 C 62 22, 46 38, 50 60 Z' fill='url(%23g)'/><path d='M50 58 C 50 72, 50 84, 50 92' stroke='url(%23g)' stroke-width='5' stroke-linecap='round' fill='none'/></svg>">
<style>
  /* ── raw · self-contained · 0-JS · CSS-3D only ─────────────────────────
     Expanding graph launcher: ✺ flove core + 6 category subgraphs. Click a
     category → it FLIES TO CENTER and its apps fan out (zoom inwards) with a
     colour splash. Nav is pure :target + :has(); ambient drift + infinite-zoom
     tunnel at rest. Positions live in --x/--y/--z so CSS can restate them. */

  :root{
    --bg:#0a0a12; --ink:#eef0ff; --dim:#9aa0c8;
    --node:118px;            /* category node diameter                    */
    --leaf:78px;             /* app node diameter                         */
    --ease:cubic-bezier(.22,.61,.36,1);
    --slow:1.05s;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 120% at 50% 40%,#141430 0%,var(--bg) 70%);
    color:var(--ink); overflow:hidden; min-height:100dvh;
  }
  a{color:inherit;text-decoration:none}

  /* ── invisible reset: click empty space → back to centre ──────────── */
  .reset{position:fixed;inset:0;z-index:1}

  /* ── 3D viewport ──────────────────────────────────────────────────── */
  .viewport{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    perspective:1200px; perspective-origin:50% 47%;
    display:grid; place-items:center;
  }
  .scene{
    position:relative; width:0; height:0;
    transform-style:preserve-3d;
    transform:rotateX(6deg);   /* static tilt only — no rotateY, so ball text never turns */
  }
  /* clicking the core spins the whole scene — speed set by JS via --spin */
  .scene.spun{animation:spin var(--spin,10s) linear infinite}
  .scene.spun .cat:not(:target){transition-duration:calc(var(--slow) * 6)} /* balls drift 6× slower */
  @keyframes spin{
    from{transform:rotateX(6deg) rotateY(0deg)}
    to  {transform:rotateX(6deg) rotateY(360deg)}
  }

  /* ── infinite-zoom tunnel (decorative, at rest) ───────────────────── */
  .tunnel{position:absolute;inset:0;transform-style:preserve-3d;pointer-events:none}
  .tunnel i{
    position:absolute; left:-160px; top:-160px; width:320px; height:320px;
    border-radius:50%; border:1.5px solid #8d89ff33;
    transform:translateZ(-1800px) scale(.1); opacity:0;
    animation:fly 9s linear infinite;
  }
  .tunnel i:nth-child(2){animation-delay:-1.5s;border-color:#33d97a2e}
  .tunnel i:nth-child(3){animation-delay:-3s;border-color:#ff8a3a2e}
  .tunnel i:nth-child(4){animation-delay:-4.5s;border-color:#5ea4e62e}
  .tunnel i:nth-child(5){animation-delay:-6s;border-color:#ffce3a2e}
  .tunnel i:nth-child(6){animation-delay:-7.5s;border-color:#4fd6cc2e}
  @keyframes fly{
    0%{transform:translateZ(-1800px) scale(.1);opacity:0}
    18%{opacity:.55}
    100%{transform:translateZ(560px) scale(2.2);opacity:0}
  }

  /* ── core node (✺ flove) ──────────────────────────────────────────── */
  .core{
    position:absolute; left:calc(var(--node)/-2); top:calc(var(--node)/-2);
    width:var(--node); height:var(--node); border-radius:50%;
    transform-style:preserve-3d; pointer-events:auto; cursor:pointer;
    background:radial-gradient(circle at 35% 30%,#2a2850,#12122b);
    box-shadow:0 0 0 1px #ffffff22,0 20px 60px #0008,0 0 60px #8d89ff55;
    transition:opacity var(--slow) var(--ease),filter var(--slow) var(--ease),box-shadow .3s var(--ease);
  }
  .core:hover,.core:focus-visible{box-shadow:0 0 0 2px #ffffff55,0 20px 60px #0008,0 0 80px #8d89ffaa;outline:none}

  /* ── category clusters ────────────────────────────────────────────── */
  .cat{
    position:absolute; left:0; top:0; width:0; height:0;
    transform-style:preserve-3d;
    transform:translate3d(var(--x),var(--y),var(--z));
    /* transform is driven live by the bounce loop → keep it snappy; drill-down re-adds the slow ease below */
    transition:transform .12s linear,opacity var(--slow) var(--ease),filter var(--slow) var(--ease);
  }
  .cat .node{
    position:absolute; left:calc(var(--node)/-2); top:calc(var(--node)/-2);
    width:var(--node); height:var(--node); border-radius:50%;
    display:grid; place-items:center; text-align:center; line-height:1.1;
    font-weight:700; font-size:1rem; color:#0a0a12; overflow:hidden;
    background:linear-gradient(135deg,var(--c1),var(--c2) 55%,var(--c3));
    box-shadow:0 14px 40px #0007,0 0 0 1px #ffffff2a,0 0 34px var(--c2);
    transition:transform .3s var(--ease),box-shadow .3s var(--ease);
    pointer-events:auto;
  }
  .cat .node:hover,.cat .node:focus-visible{transform:scale(1.06);outline:none}
  .cat .node:focus-visible{box-shadow:0 0 0 3px #fff,0 0 0 6px var(--c2)}
  /* click ripple on the category node itself */
  .cat .node::after{
    content:""; position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle,#fff 0%,#ffffff00 60%); opacity:0;
  }
  .cat .node:active::after{animation:ripple .5s var(--ease)}

  /* colour splash — bursts from the cluster centre when it becomes target */
  .burst{
    position:absolute; left:0; top:0; width:0; height:0; pointer-events:none;
    border-radius:50%; opacity:0;
    background:radial-gradient(circle,var(--c3) 0%,var(--c2) 35%,#ffffff00 70%);
    mix-blend-mode:screen;
  }
  .cat:target .burst{animation:splash .85s var(--ease)}

  /* app leaves — collapsed until the cluster is the :target ─────────── */
  .apps{position:absolute;left:0;top:0;transform-style:preserve-3d;visibility:hidden}
  .apps a{
    position:absolute; left:calc(var(--leaf)/-2); top:calc(var(--leaf)/-2);
    width:var(--leaf); height:var(--leaf); border-radius:50%;
    display:grid; place-items:center; text-align:center; overflow:hidden;
    font-size:.72rem; font-weight:600; color:#0a0a12; padding:4px;
    background:radial-gradient(circle at 38% 32%,#fff,var(--c3));
    box-shadow:0 8px 22px #0007,0 0 0 1px #ffffff40;
    transform:translate3d(0,0,0) scale(.2); opacity:0; pointer-events:none;
    transition:transform var(--slow) var(--ease),opacity var(--slow) var(--ease);
  }
  .apps a>span{position:relative;z-index:1}
  .apps a::after{
    content:""; position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle,var(--c2) 0%,#ffffff00 60%); opacity:0;
  }
  .apps a:active::after{animation:ripple .5s var(--ease)}
  .apps a:hover,.apps a:focus-visible{transform:var(--pos) scale(1.16);outline:none;z-index:2}
  .apps a:focus-visible{box-shadow:0 0 0 3px #fff,0 0 0 6px var(--c2)}

  /* ── ZOOM IN: a category is targeted → fly it to centre ───────────── */
  .viewport:has(.cat:target) .scene{animation:none;transform:rotateX(4deg)}
  .cat:target{transform:translate3d(0,0,240px) scale(1.12);z-index:5;transition:transform var(--slow) var(--ease)}
  .cat:target .node{box-shadow:0 22px 70px #000a,0 0 0 2px #fff,0 0 60px var(--c2)}
  .cat:target .apps{visibility:visible}
  .cat:target .apps a{
    --pos:rotate(calc(var(--i)/var(--n)*360deg)) translateY(calc(-1*var(--r)))
          rotate(calc(-1*var(--i)/var(--n)*360deg)) translateZ(calc(var(--i)*15px));
    transform:var(--pos); opacity:1; pointer-events:auto;
  }
  /* others: keep their place but shrink + dim (no overlap) */
  .viewport:has(.cat:target) .cat:not(:target){
    opacity:.5;
    transform:translate3d(var(--x),var(--y),var(--z)) scale(.9);
  }
  .viewport:has(.cat:target) .core{opacity:.28;filter:blur(1px)}

  /* ── click splash (big white burst from the middle each click) ────── */
  .click-splash{
    position:fixed; left:50%; top:47%; width:14px; height:14px; margin:-7px 0 0 -7px;
    border-radius:50%; pointer-events:none; z-index:8; mix-blend-mode:screen;
    background:radial-gradient(circle,#fff 0%,#ffffffdd 28%,#ffffff00 70%);
    animation:clicksplash .9s cubic-bezier(.22,.61,.36,1) forwards;
  }
  @keyframes clicksplash{0%{opacity:.98;transform:scale(.3)}100%{opacity:0;transform:scale(40)}}

  /* ── central ball fades away when the round ends ──────────────────── */
  .core.gone{opacity:0!important;transform:scale(.15)!important;pointer-events:none;
    transition:opacity 1.3s var(--ease),transform 1.3s var(--ease)}

  /* ── congratulations: 10s confetti + one big rainbow flash ────────── */
  .celebrate{position:fixed;inset:0;z-index:7;pointer-events:none;overflow:hidden}
  .celebrate::before{
    content:""; position:absolute; left:50%; top:47%; width:0; height:0; border-radius:50%;
    transform:translate(-50%,-50%); mix-blend-mode:screen;
    background:radial-gradient(circle,#fff 0%,#ffce3a 18%,#ff5a3a 34%,#c133ff 52%,#5ea4e6 66%,#ffffff00 74%);
    animation:bigburst 1.3s ease-out forwards;
  }
  @keyframes bigburst{0%{opacity:.95;width:0;height:0}100%{opacity:0;width:200vmax;height:200vmax}}
  .celebrate i{
    position:absolute; left:50%; top:47%; width:12px; height:12px; border-radius:2px;
    background:var(--c); opacity:0;
    animation:confetti var(--d,3s) var(--delay,0s) cubic-bezier(.15,.7,.3,1) forwards;
  }
  @keyframes confetti{
    0%{opacity:1;transform:translate(-50%,-50%) scale(.4) rotate(0)}
    12%{opacity:1}
    100%{opacity:0;transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1) rotate(var(--rot))}
  }

  /* ── keyframes ────────────────────────────────────────────────────── */
  @keyframes ripple{from{opacity:.85;transform:scale(.15)}to{opacity:0;transform:scale(1.9)}}
  @keyframes splash{
    0%{opacity:0;width:0;height:0;left:0;top:0}
    20%{opacity:.9}
    100%{opacity:0;width:1600px;height:1600px;left:-800px;top:-800px}
  }

  /* ── reduced motion ───────────────────────────────────────────────── */
  @media (prefers-reduced-motion:reduce){
    .scene,.scene.spun{animation:none;transform:rotateX(5deg)}
    .tunnel i{animation:none;opacity:0}
    .cat,.apps a,.core{transition-duration:.001s}
    .burst,.node::after,.apps a::after{animation:none!important}
  }

  /* ── fit on smaller screens (uniform scale — nothing escapes) ─────── */
  @media (max-width:1024px){.scene{scale:.82}}
  @media (max-width:560px){.viewport{perspective:900px}.scene{scale:.56}}

  /* ── graceful fallback if 3D transforms are unsupported ───────────── */
  @supports not (transform-style:preserve-3d){
    .viewport{position:static;perspective:none;display:block;padding:4rem 1rem 2rem}
    .scene,.cat,.apps{position:static;width:auto;height:auto;transform:none;animation:none;scale:none}
    .tunnel,.burst{display:none}
    .core{position:static;margin:0 auto 1.5rem}
    .cat .node{position:static;margin:1.2rem auto .4rem;transform:none}
    .apps{visibility:visible;display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center}
    .apps a{position:static;transform:none;opacity:1;pointer-events:auto}
  }

  /* ── ball entrance: fade in one at a time, each a different final effect ── */
  @keyframes ballPop{0%{opacity:0;scale:.2}70%{opacity:1;scale:1.14}100%{opacity:1;scale:1}}
  @keyframes ballSpin{0%{opacity:0;scale:.4;rotate:-220deg}100%{opacity:1;scale:1;rotate:0}}
  @keyframes ballDrop{0%{opacity:0;translate:0 -90px}62%{opacity:1}100%{opacity:1;translate:0 0}}
  @keyframes ballRise{0%{opacity:0;translate:0 90px}62%{opacity:1}100%{opacity:1;translate:0 0}}
  @keyframes ballSwipeL{0%{opacity:0;translate:-120px 0;rotate:-14deg}100%{opacity:1;translate:0 0;rotate:0}}
  @keyframes ballSwipeR{0%{opacity:0;translate:120px 0;rotate:14deg}100%{opacity:1;translate:0 0;rotate:0}}

  /* ── leaving to an app — the whole interface fades out over 5s (varied per link) ── */
  body.exit{pointer-events:none;transition:opacity 5s linear, filter 5s linear, transform 5s cubic-bezier(.22,.61,.36,1)}
  body.exit.fx-fade{opacity:0}
  body.exit.fx-blur{opacity:.04;filter:blur(24px) saturate(1.5)}
  body.exit.fx-zoom{opacity:0;transform:scale(.5)}
  body.exit.fx-spin{opacity:0;transform:scale(.5) rotate(16deg)}
  body.exit.fx-rise{opacity:0;transform:translateY(-9vh) scale(.85)}
  .exit-veil{position:fixed;inset:0;z-index:99999;pointer-events:none;opacity:0;background:#fffdf8;transition:opacity 5s linear}
  .exit-veil.on{opacity:1}
</style>
</head>

<script>
/* The ONLY JS: clicking the centre ball shakes the map — each click adds
   intensity (faster spin + wider random 3D scatter of the category balls).
   No external calls; degrades to a static graph if JS is off. */
(function(){
  var scene = document.querySelector('.scene');
  var core  = document.getElementById('core');
  var cats  = Array.prototype.slice.call(document.querySelectorAll('.cat'));
  if(!scene || !core) return;
  // physics: each ball keeps a position (its --x/--y) and a slow velocity; it
  // bounces off the interface edges, off the other balls, and off the core.
  var R = 59;               // category node radius (--node 118 / 2)
  var CORE_R = 59;          // central flove core radius
  var MARGIN = 14;          // clearance kept inside each edge (never leaves screen)
  var BASE = 0.45;          // gentle drift speed (px/frame) — the calm baseline
  var MAXV = 2.8;           // cap so a click-kick never flings a ball away
  var LOOP = 10;            // core clicks per round
  var n = 0;

  var balls = cats.map(function(c){
    var s = getComputedStyle(c);
    var hx = parseFloat(s.getPropertyValue('--x')) || 0;
    var hy = parseFloat(s.getPropertyValue('--y')) || 0;
    var hz = parseFloat(s.getPropertyValue('--z')) || 0;
    var a = Math.random() * Math.PI * 2;
    return { el:c, x:hx, y:hy, z:hz, vx:Math.cos(a)*BASE, vy:Math.sin(a)*BASE };
  });

  var halfW, halfH;
  function bounds(){
    halfW = Math.max(R + 20, window.innerWidth  / 2 - R - MARGIN);
    halfH = Math.max(R + 20, window.innerHeight / 2 - R - MARGIN);
  }
  bounds();
  window.addEventListener('resize', bounds);

  function paint(b){
    b.el.style.setProperty('--x', b.x.toFixed(1) + 'px');
    b.el.style.setProperty('--y', b.y.toFixed(1) + 'px');
  }

  // reflect a ball off the fixed central core when it overlaps it
  function offCore(b){
    var d = Math.hypot(b.x, b.y), min = CORE_R + R;
    if(d > 0 && d < min){
      var nx = b.x/d, ny = b.y/d;
      b.x = nx*min; b.y = ny*min;
      var vn = b.vx*nx + b.vy*ny;
      if(vn < 0){ b.vx -= 2*vn*nx; b.vy -= 2*vn*ny; }
    }
  }

  // equal-mass elastic bounce between two overlapping balls
  function pair(a, b){
    var dx = b.x - a.x, dy = b.y - a.y, d = Math.hypot(dx, dy), min = R * 2;
    if(d > 0 && d < min){
      var nx = dx/d, ny = dy/d, push = (min - d) / 2;
      a.x -= nx*push; a.y -= ny*push;  b.x += nx*push; b.y += ny*push;
      var va = a.vx*nx + a.vy*ny, vb = b.vx*nx + b.vy*ny, diff = vb - va;
      a.vx += diff*nx; a.vy += diff*ny;  b.vx -= diff*nx; b.vy -= diff*ny;
    }
  }

  function step(){
    // freeze the field while a category is zoomed in (:target drill-down)
    if(!document.querySelector('.cat:target')){
      var i, j, b, coreHere = !core.classList.contains('gone');
      for(i=0;i<balls.length;i++){
        b = balls[i];
        b.x += b.vx; b.y += b.vy;
        if(b.x >  halfW){ b.x =  halfW; b.vx = -Math.abs(b.vx); }        // bounce off edges,
        else if(b.x < -halfW){ b.x = -halfW; b.vx =  Math.abs(b.vx); }   // never leaving the interface
        if(b.y >  halfH){ b.y =  halfH; b.vy = -Math.abs(b.vy); }
        else if(b.y < -halfH){ b.y = -halfH; b.vy =  Math.abs(b.vy); }
        if(coreHere) offCore(b);
      }
      for(i=0;i<balls.length;i++) for(j=i+1;j<balls.length;j++) pair(balls[i], balls[j]);  // bounce between them
      for(i=0;i<balls.length;i++){
        b = balls[i];
        var sp = Math.hypot(b.vx, b.vy) || 0.0001;
        if(sp > MAXV){ b.vx *= MAXV/sp; b.vy *= MAXV/sp; }   // clamp after a kick
        else if(sp > BASE){ b.vx *= 0.994; b.vy *= 0.994; }  // ease kicks back down to calm
        else { b.vx *= BASE/sp; b.vy *= BASE/sp; }           // and never stop drifting
        paint(b);
      }
    }
    requestAnimationFrame(step);
  }

  // big white splash from the middle on every click
  function whiteSplash(){
    var s = document.createElement('div');
    s.className = 'click-splash';
    document.body.appendChild(s);
    s.addEventListener('animationend', function(){ s.remove(); });
  }

  // 10s congratulations: one big flash + a shower of confetti
  function celebrate(){
    var wrap = document.createElement('div');
    wrap.className = 'celebrate';
    var cols = ['#c133ff','#6a3aff','#ff8a3a','#33d97a','#5ea4e6','#ffce3a','#4fd6cc','#ff5a5a','#ffffff'];
    for(var i = 0; i < 90; i++){
      var p = document.createElement('i');
      p.style.setProperty('--c', cols[i % cols.length]);
      p.style.setProperty('--tx', Math.round(Math.random()*180 - 90) + 'vw');
      p.style.setProperty('--ty', Math.round(Math.random()*90 + 15) + 'vh');   // gravity-ish downward
      p.style.setProperty('--rot', Math.round(Math.random()*1080 - 540) + 'deg');
      p.style.setProperty('--d', (2 + Math.random()*1.6).toFixed(2) + 's');
      p.style.setProperty('--delay', (Math.random()*7.4).toFixed(2) + 's');    // spread → lasts ~10s
      wrap.appendChild(p);
    }
    document.body.appendChild(wrap);
    setTimeout(function(){ wrap.remove(); }, 10000);
  }

  function shake(){
    if(core.classList.contains('gone')) return;
    whiteSplash();
    n++;
    if(n >= LOOP){                                // round finished
      core.classList.add('gone');                // central ball + clicks go away
      celebrate();                               // (balls keep bouncing under the confetti)
      return;
    }
    // kick every ball outward from the centre — they scatter, then bounce and settle
    balls.forEach(function(b){
      var d = Math.hypot(b.x, b.y) || 1, k = 1.7;
      b.vx += (b.x/d)*k + (Math.random()-.5)*0.7;
      b.vy += (b.y/d)*k + (Math.random()-.5)*0.7;
    });
    core.style.transform = 'scale(' + (1 + Math.min(n * 0.03, 0.45)).toFixed(2) + ')';
  }

  core.addEventListener('click', shake);
  core.addEventListener('keydown', function(e){
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); shake(); }
  });

  // ── leaving to an app: fade the whole interface out over 5s (varied per link) ──
  var EXITS = ['fx-fade','fx-blur','fx-zoom','fx-spin','fx-rise','white'], exiting = false;
  function exitTo(href, variant){
    if(exiting || !href) return; exiting = true;
    var v = EXITS[((variant % EXITS.length) + EXITS.length) % EXITS.length];
    if(v === 'white'){
      var veil = document.createElement('div'); veil.className = 'exit-veil';
      document.body.appendChild(veil); document.body.style.pointerEvents = 'none';
      requestAnimationFrame(function(){ veil.classList.add('on'); });
    } else { document.body.classList.add('exit', v); }
    setTimeout(function(){ window.location.href = href; }, 5000);
  }
  Array.prototype.slice.call(document.querySelectorAll('.apps a')).forEach(function(a, i){
    a.addEventListener('click', function(e){
      if(e.metaKey || e.ctrlKey || e.shiftKey || e.button) return;                 // modified click → normal
      if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;           // reduced-motion → normal nav
      e.preventDefault();
      exitTo(a.getAttribute('href'), i);                                           // each leaf → a different effect
    });
  });

  // honour reduced-motion: no entrance, no bounce — balls rest at home
  if(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches){
    balls.forEach(paint);
  } else {
    // fade the balls in ONE AT A TIME, each with a different entrance effect, then bounce
    var ENTER = ['ballPop','ballSpin','ballDrop','ballRise','ballSwipeL','ballSwipeR'];
    balls.forEach(function(b, i){
      b.el.style.opacity = '0';
      b.el.style.animation = ENTER[i % ENTER.length] + ' .9s cubic-bezier(.22,.61,.36,1) ' + (i * 0.5).toFixed(2) + 's both';
    });
    setTimeout(function(){
      balls.forEach(function(b){ b.el.style.animation = ''; b.el.style.opacity = ''; });   // clear → physics owns transform
      requestAnimationFrame(step);
    }, balls.length * 500 + 900);   // begin bouncing after the last ball has entered
  }
})();
</script>

</body>
</html>
