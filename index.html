<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="author" content="Marc (marcflove)" />
<meta name="copyright" content="© 2026 Marc · CC BY-SA 4.0" />

<title>♥ flove · home (lite)</title>
<!-- font payload trimmed from ~465 KB → ~95 KB by:
     1. Fraunces — sub-setted to the 5 glyphs of "flove" via &text=flove
        (drops unused weights 400, 500; keeps opsz variable axis for crisp rendering at large sizes)
     2. Inter    — only weight 600 (the only weight .btn renders);
        body's default Inter 400 falls back to system-ui safely (no visible body text)
     3. JetBrains Mono — kept (400 used by .btn-hint, 500 by .slogan) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300&text=flove&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── tokens ──────────────────────────────────────────────────────── */
:root {
  --bg-1:#fff8f1; --bg-2:#f4f1ff; --bg-3:#effdf7;
  --ink:#1a1820;  --mut:#6a6478;  --line:rgba(20,16,32,.10);
  --accent:#ff8a8a; --accent-soft:#ffd9d9;
  --dream-1:#ff8aae; --dream-2:#8ab4ff; --dream-3:#b48aff; --dream-4:#8affd0; --dream-5:#ffd28a;
}
/* @property = registered vars that interpolate via transition (Houdini) */
@property --c1 { syntax:'<number>'; initial-value:0; inherits:false; }
@property --c2 { syntax:'<number>'; initial-value:0; inherits:false; }
@property --c3 { syntax:'<number>'; initial-value:0; inherits:false; }
@property --logo-l-violet-stop { syntax:'<percentage>'; initial-value:60%; inherits:true; }

* { box-sizing:border-box; }
html, body { margin:0; padding:0; }
body {
  font-family:'Inter',system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1100px 700px at 110% -10%, var(--bg-3) 0, transparent 55%),
    radial-gradient(900px 600px at -10% 110%, var(--bg-2) 0, transparent 55%),
    var(--bg-1);
  min-height:100svh;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

.stage {
  position:relative; z-index:2;
  min-height:100svh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:6vmin 5vmin;
  gap:clamp(1.4rem, 4vmin, 3rem);
  text-align:center;
}

/* ─── logo ────────────────────────────────────────────────────────── */
.logo {
  position:relative;
  font-family:'Fraunces','Cormorant Garamond',serif;
  font-weight:300;
  font-size:clamp(6.5rem, 26vmin, 17rem);
  line-height:.92;
  letter-spacing:-.025em;
  margin:0;
  color:var(--ink);
  filter:
    drop-shadow(0 0 22px rgba(255,138,174,.55))
    drop-shadow(0 0 50px rgba(180,138,255,.30))
    drop-shadow(0 0 100px rgba(255,138,174,.18));
  opacity:0;
  animation: logoIn 1.95s cubic-bezier(.25,.6,.2,1) .2s forwards;
}
@keyframes logoIn { to { opacity:1; } }

/* "f" — rainbow gradient, click-driven opacity */
.logo-fl {
  background: linear-gradient(98deg, #ffd633 0%, #6dd933 22%, #2a9aff 44%, #6a3aff 60%, #c133ff 75%, #5b3a7a 88%, var(--ink) 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  opacity:var(--logo-color-opacity, .25);
  transition: opacity .5s cubic-bezier(.25,.7,.3,1);
}
/* "l" — small violet kiss with zigzag edge (3 stacked gradients), full opacity */
.logo-l {
  background:
    linear-gradient(108deg, transparent calc(var(--logo-l-violet-stop) - 2%), var(--ink) calc(var(--logo-l-violet-stop) + 12%)),
    linear-gradient(72deg,  transparent calc(var(--logo-l-violet-stop) - 5%), var(--ink) calc(var(--logo-l-violet-stop) + 15%)),
    linear-gradient(to right, #c133ff 0%, #c133ff var(--logo-l-violet-stop), var(--ink) calc(var(--logo-l-violet-stop) + 15%), var(--ink) 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  transition: --logo-l-violet-stop .5s cubic-bezier(.25,.7,.3,1);
}
.logo-ove { color:var(--ink); opacity:.95; }

/* ─── per-state vars (drive opacity, violet stop, click effects) ──── */
:root:has(#s0:checked) { --logo-color-opacity:.35; --logo-l-violet-stop:60%;
  --ring-c:#ff8aae; --ring-w:2px; --ring-s:solid; --ring-end:2.8;
  --sparkle-scale:1.8; --sparkle-rot:110deg;
  --sparkle-bg:
    radial-gradient(circle 2.5px at 50% 8%,  #fff 99%, transparent 100%),
    radial-gradient(circle 2px   at 90% 25%, var(--accent) 99%, transparent 100%),
    radial-gradient(circle 2.5px at 78% 78%, var(--dream-2) 99%, transparent 100%),
    radial-gradient(circle 2px   at 22% 86%, var(--dream-3) 99%, transparent 100%),
    radial-gradient(circle 2.5px at 8% 38%,  var(--dream-5) 99%, transparent 100%),
    radial-gradient(circle 1.5px at 38% 14%, var(--accent-soft) 99%, transparent 100%),
    radial-gradient(circle 1.5px at 62% 92%, var(--dream-4) 99%, transparent 100%),
    radial-gradient(circle 1.5px at 14% 62%, #fff 99%, transparent 100%);
}
:root:has(#s1:checked) { --logo-color-opacity:.50; --logo-l-violet-stop:55%;
  --ring-c:#8ac4ff; --ring-w:2px; --ring-s:solid; --ring-end:3.4;
  --sparkle-scale:2; --sparkle-rot:-130deg;
  --sparkle-bg:
    radial-gradient(circle 3px   at 50% 50%, #ffe58a 99%, transparent 100%),
    radial-gradient(circle 2px   at 20% 30%, #ffd28a 99%, transparent 100%),
    radial-gradient(circle 2px   at 80% 30%, #ffd28a 99%, transparent 100%),
    radial-gradient(circle 2px   at 30% 80%, #ffe58a 99%, transparent 100%),
    radial-gradient(circle 2px   at 70% 80%, #ffe58a 99%, transparent 100%),
    radial-gradient(circle 1.5px at 50% 12%, #fff 99%, transparent 100%),
    radial-gradient(circle 1.5px at 50% 88%, #fff 99%, transparent 100%),
    radial-gradient(circle 1.5px at 12% 50%, #fff 99%, transparent 100%),
    radial-gradient(circle 1.5px at 88% 50%, #fff 99%, transparent 100%);
}
:root:has(#s2:checked) { --logo-color-opacity:.75; --logo-l-violet-stop:50%;
  --ring-c:#ffd28a; --ring-w:3px; --ring-s:solid; --ring-end:2.5;
  --sparkle-scale:1.6; --sparkle-rot:200deg;
  --sparkle-bg:
    radial-gradient(circle 4px at 50% 22%, var(--dream-1) 99%, transparent 100%),
    radial-gradient(circle 4px at 22% 50%, var(--dream-1) 99%, transparent 100%),
    radial-gradient(circle 4px at 78% 50%, var(--dream-1) 99%, transparent 100%),
    radial-gradient(circle 4px at 50% 78%, var(--dream-1) 99%, transparent 100%),
    radial-gradient(circle 2px at 50% 50%, var(--accent) 99%, transparent 100%);
}
:root:has(#s3:checked) { --logo-color-opacity:1; --logo-l-violet-stop:45%;
  --ring-c:#b48aff; --ring-w:2px; --ring-s:dashed; --ring-end:3;
  --sparkle-scale:1.9; --sparkle-rot:80deg;
  --sparkle-bg:
    radial-gradient(circle 2px   at 18% 22%, #8affd0 99%, transparent 100%),
    radial-gradient(circle 2.5px at 36% 14%, #8affd0 99%, transparent 100%),
    radial-gradient(circle 2px   at 60% 18%, #8affd0 99%, transparent 100%),
    radial-gradient(circle 2.5px at 80% 26%, #8affd0 99%, transparent 100%),
    radial-gradient(circle 2px   at 88% 50%, #6dd933 99%, transparent 100%),
    radial-gradient(circle 2px   at 76% 78%, #6dd933 99%, transparent 100%),
    radial-gradient(circle 2.5px at 50% 86%, #6dd933 99%, transparent 100%),
    radial-gradient(circle 2px   at 22% 78%, #8affd0 99%, transparent 100%),
    radial-gradient(circle 2.5px at 10% 50%, #8affd0 99%, transparent 100%);
}
:root:has(#s4:checked) { --logo-color-opacity:1; --logo-l-violet-stop:40%;
  --ring-c:#8affd0; --ring-w:2px; --ring-s:solid; --ring-end:3.2;
  --sparkle-scale:2.1; --sparkle-rot:320deg;
  --sparkle-bg:
    radial-gradient(circle 3px   at 12% 14%, #ff3344 99%, transparent 100%),
    radial-gradient(circle 2.5px at 30% 22%, #ff8a3a 99%, transparent 100%),
    radial-gradient(circle 3px   at 50% 12%, #ffd633 99%, transparent 100%),
    radial-gradient(circle 2.5px at 70% 22%, #6dd933 99%, transparent 100%),
    radial-gradient(circle 3px   at 88% 14%, #2a9aff 99%, transparent 100%),
    radial-gradient(circle 2.5px at 14% 50%, #c133ff 99%, transparent 100%),
    radial-gradient(circle 3px   at 88% 50%, #ff3344 99%, transparent 100%),
    radial-gradient(circle 2.5px at 14% 86%, #ffd633 99%, transparent 100%),
    radial-gradient(circle 3px   at 50% 88%, #2a9aff 99%, transparent 100%),
    radial-gradient(circle 2.5px at 86% 86%, #c133ff 99%, transparent 100%);
}
.logo .sprout-leaf {
  opacity: var(--logo-color-opacity, .25);
  transition: opacity .5s cubic-bezier(.25,.7,.3,1);
}
.state-input { position:absolute; width:0; height:0; margin:0; opacity:0; pointer-events:none; }

/* ─── sprout area + cycle buttons covering the whole logo ─────────── */
.logo .star-area {
  position:relative;
  display:inline-block;
  width:.76em; height:.76em;
  vertical-align:-.04em;
  margin-right:-.04em;
}
.logo .star {
  position:relative; display:block;
  width:100%; height:100%;
  transform-origin:center;
  --c1:0; --c2:0; --c3:0;
  transform: scale(calc(1 + var(--c1) * .22));
  filter:
    drop-shadow(0 0 calc(12px + var(--c1) * 22px) rgba(255,110,138, calc(.55 + var(--c1) * .4)))
    drop-shadow(0 0 calc(26px + var(--c1) * 40px) rgba(150,138,220, calc(.28 + var(--c1) * .4)));
  transition:
    --c1 1.0s cubic-bezier(.2,.7,.3,1),
    --c2 1.6s cubic-bezier(.2,.6,.3,1) .15s,
    --c3 1.9s cubic-bezier(.2,.5,.3,1) .35s;
}
.logo .star svg { display:block; width:100%; height:100%; }
.logo .sprout-tail { stroke-dasharray:1; stroke-dashoffset:1; transition: stroke-dashoffset 1s cubic-bezier(.25,.7,.3,1); }
:root:has(#s4:checked) .logo .sprout-tail { stroke-dashoffset:0; }

.logo .star-cycle-btn {
  position:absolute; inset:0;
  display:none; cursor:pointer; user-select:none;
  background:transparent; z-index:4;
}
:root:has(#s0:checked) .logo .star-cycle-btn[data-st="0"],
:root:has(#s1:checked) .logo .star-cycle-btn[data-st="1"],
:root:has(#s2:checked) .logo .star-cycle-btn[data-st="2"],
:root:has(#s3:checked) .logo .star-cycle-btn[data-st="3"],
:root:has(#s4:checked) .logo .star-cycle-btn[data-st="4"] { display:block; }

/* press: jump c-vars to 1 instantly; release decays smoothly via transition */
.logo:has(.star-cycle-btn:active) .star {
  --c1:1; --c2:1; --c3:1;
  transition: --c1 0s, --c2 0s, --c3 0s;
}

/* ring (::before) and sparkle burst (::after) — driven by per-state vars */
.logo .star::before {
  content:""; position:absolute; inset:-10%;
  border-radius:50%;
  border: var(--ring-w, 2px) var(--ring-s, solid) var(--ring-c, #ff8aae);
  opacity: calc(var(--c2) * .85);
  transform: scale(calc(1 + (1 - var(--c2)) * var(--ring-end, 2.8)));
  pointer-events:none; z-index:1;
}
.logo .star::after {
  content:""; position:absolute; inset:-130%;
  background: var(--sparkle-bg);
  filter: drop-shadow(0 0 5px var(--accent-soft));
  transform: scale(calc(.4 + (1 - var(--c3)) * var(--sparkle-scale, 1.8))) rotate(calc((1 - var(--c3)) * var(--sparkle-rot, 110deg)));
  opacity: calc(var(--c3) * (1 - var(--c3)) * 4);
  pointer-events:none; z-index:2;
}

/* ─── colour splash (rainbow rises from below) ────────────────────── */
.splash {
  position:fixed; inset:0; z-index:0;
  pointer-events:none; opacity:0;
  transform-origin:50% 100%;
  background:
    radial-gradient(circle at 20% 88%, #ff3355 0, transparent 52%),
    radial-gradient(circle at 33% 82%, #ff8a2a 0, transparent 52%),
    radial-gradient(circle at 46% 90%, #ffd633 0, transparent 52%),
    radial-gradient(circle at 56% 80%, #33d97a 0, transparent 52%),
    radial-gradient(circle at 66% 86%, #2a9aff 0, transparent 52%),
    radial-gradient(circle at 78% 82%, #6a3aff 0, transparent 52%),
    radial-gradient(circle at 50% 98%, #c133ff 0, transparent 56%);
  filter: blur(110px) saturate(2.6);
  animation: splashBurst 2s cubic-bezier(.2,.85,.25,1) 1.8s forwards;
}
@keyframes splashBurst {
  0%   { opacity:0;    transform:translateY(55vh)  scale(.45) rotate(-6deg); filter:blur(160px) saturate(2); }
  22%  { opacity:.167; transform:translateY(18vh)  scale(.95) rotate(3deg);  filter:blur(80px)  saturate(3.5); }
  50%  { opacity:.167; transform:translateY(-8vh)  scale(1.25) rotate(-2deg);filter:blur(110px) saturate(3.2); }
  78%  { opacity:.092; transform:translateY(-30vh) scale(1.5) rotate(4deg);  filter:blur(150px) saturate(2.6); }
  100% { opacity:0;    transform:translateY(-55vh) scale(1.75) rotate(-3deg);filter:blur(200px) saturate(2.2); }
}

/* ─── slogan ──────────────────────────────────────────────────────── */
.slogan {
  margin:0;
  font-family:'JetBrains Mono', ui-monospace, monospace;
  font-weight:500;
  font-size:clamp(1rem, 2.6vmin, 1.4rem);
  color:var(--mut);
  letter-spacing:.01em;
  display:flex; justify-content:center;
}
.slogan .typed {
  display:none; white-space:nowrap; overflow:hidden;
  width:0; border-right:2px solid transparent;
  vertical-align:bottom;
}
:root:has(#s0:checked) .slogan .typed[data-st="0"] { display:inline-block; width:9ch;  animation: typeIn 1.6s steps(8, end) 5s both, caretBlink .5s linear 5s 4, caretFade .35s linear 7s forwards; }
:root:has(#s1:checked) .slogan .typed[data-st="1"] { display:inline-block; width:16ch; animation: typeIn 3s   steps(15, end) both, caretBlink .5s linear 6, caretFade .35s linear 3s forwards; }
:root:has(#s2:checked) .slogan .typed[data-st="2"] { display:inline-block; width:17ch; animation: typeIn 3.2s steps(16, end) both, caretBlink .5s linear 7, caretFade .35s linear 3.2s forwards; }
:root:has(#s3:checked) .slogan .typed[data-st="3"] { display:inline-block; width:12ch; animation: typeIn 2.2s steps(11, end) both, caretBlink .5s linear 5, caretFade .35s linear 2.2s forwards; }
:root:has(#s4:checked) .slogan .typed[data-st="4"] { display:inline-block; width:21ch; animation: typeIn 4s   steps(20, end) both, caretBlink .5s linear 8, caretFade .35s linear 4s forwards; }
@keyframes typeIn { from { width:0; } }
@keyframes caretBlink { 0%,50% { border-right-color:var(--accent); } 50.01%,100% { border-right-color:transparent; } }
@keyframes caretFade  { from { border-right-color:var(--accent); } to { border-right-color:transparent; } }

/* ─── CTA buttons ─────────────────────────────────────────────────── */
.cta {
  margin-top:clamp(1.2rem, 3vmin, 2rem);
  display:flex; flex-direction:column; align-items:center;
  gap:clamp(4.4rem, 14vmin, 11rem);
  padding:0 4vmin;
}
.cta-row {
  display:flex; flex-wrap:wrap; justify-content:center; align-items:flex-start;
  gap:clamp(2.2rem, 7vmin, 5.5rem);
}
.btn {
  position:relative;
  display:inline-flex; align-items:center; justify-content:center;
  min-width:clamp(8.5rem, 22vmin, 12rem);
  padding:1.1em 2em;
  font-family:'Inter',sans-serif; font-weight:600;
  font-size:clamp(1.05rem, 2.4vmin, 1.35rem);
  letter-spacing:.01em;
  color:var(--ink); text-decoration:none;
  background:rgba(255,255,255,.62);
  border:1px solid var(--line);
  border-radius:999px;
  backdrop-filter:blur(10px) saturate(140%);
  -webkit-backdrop-filter:blur(10px) saturate(140%);
  box-shadow: 0 1px 0 rgba(255,255,255,.9) inset, 0 10px 30px -16px rgba(60,30,90,.25);
  opacity:0; transform:translateY(28px) scale(.7);
  transition: transform .45s cubic-bezier(.2,.8,.2,1), box-shadow .45s ease, background .45s ease, color .35s ease;
}
.btn-docs { animation: settleIn 1.05s cubic-bezier(.2,.9,.25,1.1) 8.6s forwards, huddleLeft  2.8s ease-in-out 13.7s 3; }
.btn-apps { animation: settleIn 1.05s cubic-bezier(.2,.9,.25,1.1) 9.8s forwards, huddleRight 2.8s ease-in-out 13.7s 3; }
@keyframes huddleLeft  { 0%,100% { translate:0 0; } 50% { translate: 22px 0; } }
@keyframes huddleRight { 0%,100% { translate:0 0; } 50% { translate:-22px 0; } }
@keyframes settleIn {
  0%   { opacity:0; transform:translateY(28px) scale(.7) rotate(-3deg); filter:blur(8px); }
  55%  { opacity:1; transform:translateY(-6px) scale(1.05) rotate(.6deg); filter:blur(0); }
  78%  { transform:translateY(2px) scale(.985) rotate(-.3deg); }
  100% { opacity:1; transform:translateY(0) scale(1) rotate(0); filter:blur(0); }
}

/* "Both" button — oversized bloom + double spark + greyShift */
.btn-both {
  background: linear-gradient(110deg, #f0f0f4 0%, #c8c8d0 22%, #ededf0 44%, #a8a8b2 66%, #e0e0e6 88%, #c8c8d0 100%);
  background-size:250% 100%;
  color:#1a1820;
  animation: bothGrand 2.8s cubic-bezier(.2,.7,.3,1) 13.7s forwards, greyShift 8s linear infinite;
}
.btn-both:hover, .btn-both:focus-visible {
  background-image: linear-gradient(110deg, #fafafd 0%, #d2d2da 22%, #f8f8fa 44%, #b8b8c2 66%, #ededf2 88%, #d2d2da 100%);
}
@keyframes bothGrand {
  0%   { opacity:0; transform:translateY(24px) scale(.85); filter:blur(8px); }
  35%  { opacity:1; transform:translateY(0)    scale(1);    filter:blur(0); }
  60%  { opacity:1; transform:translateY(-8px) scale(1.34); }
  68%  { opacity:1; transform:translateY(-9px) scale(1.42); }
  85%  { opacity:1; transform:translateY(-2px) scale(1.05); }
  100% { opacity:1; transform:translateY(0)    scale(1); }
}
@keyframes greyShift { from { background-position:0% 50%; } to { background-position:250% 50%; } }

/* button sparks (::after) and conic glow (::before) */
.btn::after {
  content:""; position:absolute; inset:-55%;
  pointer-events:none; z-index:2; opacity:0;
  background:
    radial-gradient(circle 2.5px at 50% 6%,  #fff 99%, transparent 100%),
    radial-gradient(circle 2px   at 92% 22%, var(--accent) 99%, transparent 100%),
    radial-gradient(circle 2.5px at 78% 78%, var(--dream-2) 99%, transparent 100%),
    radial-gradient(circle 2px   at 22% 86%, var(--dream-3) 99%, transparent 100%),
    radial-gradient(circle 2.5px at 8% 38%,  var(--dream-5) 99%, transparent 100%),
    radial-gradient(circle 1.5px at 38% 14%, var(--accent-soft) 99%, transparent 100%),
    radial-gradient(circle 1.5px at 62% 92%, var(--dream-4) 99%, transparent 100%),
    radial-gradient(circle 1.5px at 14% 62%, #fff 99%, transparent 100%),
    radial-gradient(circle 1.5px at 86% 50%, var(--dream-1) 99%, transparent 100%);
  filter: drop-shadow(0 0 5px var(--accent-soft));
  transform: scale(.3);
}
.btn-docs::after { animation: sparkBurst 1.2s ease-out 8.8s forwards; }
.btn-apps::after { animation: sparkBurst 1.2s ease-out 10s forwards; }
.btn-both::after { animation: doubleSpark 2.6s cubic-bezier(.4,0,.2,1) 15.34s forwards; }
@keyframes sparkBurst {
  0%   { opacity:0; transform:scale(.3) rotate(-20deg); filter:drop-shadow(0 0 0 var(--accent-soft)); }
  18%  { opacity:1; transform:scale(.95) rotate(0); filter:drop-shadow(0 0 8px var(--accent-soft)); }
  55%  { opacity:1; transform:scale(1.35) rotate(45deg); filter:drop-shadow(0 0 6px var(--accent-soft)); }
  100% { opacity:0; transform:scale(1.95) rotate(110deg); filter:blur(3px); }
}
@keyframes doubleSpark {
  0%   { opacity:0;   transform:scale(.3)   rotate(-20deg);             filter:drop-shadow(0 0 0 var(--accent-soft)); }
  10%  { opacity:1;   transform:scale(1)    rotate(15deg);              filter:drop-shadow(0 0 9px var(--accent-soft)); }
  22%  { opacity:.15; transform:scale(1.55) rotate(40deg);              filter:blur(3px); }
  38%  { opacity:1;   transform:scale(1.05) rotate(70deg) scaleX(-1);   filter:drop-shadow(0 0 9px var(--dream-2)); }
  60%  { opacity:.8;  transform:scale(1.55) rotate(95deg) scaleX(-1);   filter:blur(2px); }
  100% { opacity:0;   transform:scale(2.25) rotate(160deg) scaleX(-1);  filter:blur(5px); }
}
.btn::before {
  content:""; position:absolute; inset:-2px;
  border-radius:inherit;
  background: conic-gradient(from 140deg, transparent 0%, var(--accent-soft) 18%, transparent 36%, transparent 60%, var(--dream-2) 75%, transparent 92%);
  opacity:0; z-index:-1;
  transition: opacity .4s ease;
  filter: blur(14px);
}
.btn:hover, .btn:focus-visible {
  outline:none;
  transform: translateY(-4px) scale(1.04);
  box-shadow: 0 1px 0 rgba(255,255,255,.95) inset, 0 22px 50px -18px rgba(120,60,200,.45), 0 0 0 6px rgba(255,138,138,.10);
  background: rgba(255,255,255,.85);
}
.btn:hover::before, .btn:focus-visible::before { opacity:.9; }
.btn:active {
  transform: translateY(-2px) scale(.97);
  box-shadow: 0 1px 0 rgba(255,255,255,.95) inset, 0 14px 32px -16px rgba(120,60,200,.55), 0 0 0 8px rgba(255,138,138,.14);
  transition: transform .18s ease, box-shadow .25s ease, background .25s ease;
}
.btn:active .btn-hint { opacity:0; transition: opacity .15s ease; }

/* button text cycling — fade-out (transition) + type-in (animation) */
.btn-cycle { display:inline-flex; align-items:baseline; }
.btn-text {
  display:inline-block; white-space:nowrap; overflow:hidden;
  width:0; opacity:0; vertical-align:bottom;
  transition: opacity .35s ease, width .35s ease;
}
:root:has(#s0:checked) .btn-docs .btn-text[data-st~="0"], :root:has(#s1:checked) .btn-docs .btn-text[data-st~="1"], :root:has(#s3:checked) .btn-docs .btn-text[data-st~="3"] { opacity:1; width:5ch;  animation: typeIn 1s   steps(5,  end) forwards; }
:root:has(#s2:checked) .btn-docs .btn-text[data-st~="2"] { opacity:1; width:6ch;  animation: typeIn 1.2s steps(6,  end) forwards; }
:root:has(#s4:checked) .btn-docs .btn-text[data-st~="4"] { opacity:1; width:4ch;  animation: typeIn .8s  steps(4,  end) forwards; }
:root:has(#s0:checked) .btn-apps .btn-text[data-st~="0"], :root:has(#s1:checked) .btn-apps .btn-text[data-st~="1"], :root:has(#s3:checked) .btn-apps .btn-text[data-st~="3"] { opacity:1; width:5ch;  animation: typeIn 1s   steps(5,  end) forwards; }
:root:has(#s2:checked) .btn-apps .btn-text[data-st~="2"] { opacity:1; width:8ch;  animation: typeIn 1.6s steps(8,  end) forwards; }
:root:has(#s4:checked) .btn-apps .btn-text[data-st~="4"] { opacity:1; width:3ch;  animation: typeIn .6s  steps(3,  end) forwards; }
:root:has(#s0:checked) .btn-both .btn-text[data-st~="0"], :root:has(#s1:checked) .btn-both .btn-text[data-st~="1"], :root:has(#s3:checked) .btn-both .btn-text[data-st~="3"] { opacity:1; width:5ch;  animation: typeIn 1s   steps(5,  end) forwards; }
:root:has(#s2:checked) .btn-both .btn-text[data-st~="2"] { opacity:1; width:14ch; animation: typeIn 2.8s steps(14, end) forwards; }
:root:has(#s4:checked) .btn-both .btn-text[data-st~="4"] { opacity:1; width:7ch;  animation: typeIn 1.4s steps(7,  end) forwards; }

/* press bloom: fuzzy rainbow flood while a button is held */
.press-bloom {
  position:fixed; inset:0; z-index:1;
  pointer-events:none;
  opacity:0; transform: scale(.7);
  filter: blur(90px) saturate(1);
  background:
    radial-gradient(circle at 14% 22%, #ff8aa0 0, transparent 40%),
    radial-gradient(circle at 30% 30%, #ffb27a 0, transparent 40%),
    radial-gradient(circle at 46% 44%, #ffe58a 0, transparent 40%),
    radial-gradient(circle at 58% 58%, #95eba8 0, transparent 40%),
    radial-gradient(circle at 72% 70%, #8ac6ff 0, transparent 40%),
    radial-gradient(circle at 86% 80%, #a08aff 0, transparent 40%),
    radial-gradient(circle at 50% 92%, #d68aff 0, transparent 40%);
  transition: opacity .55s ease, transform 1s ease, filter 1s ease;
}
body:has(.btn:active) .press-bloom {
  opacity:1; transform: scale(1.18); filter: blur(46px) saturate(1.6);
  transition: opacity 1.6s cubic-bezier(.2,.8,.3,1), transform 2.6s cubic-bezier(.2,.7,.3,1), filter 2.6s cubic-bezier(.2,.7,.3,1);
}

.btn-hint {
  position:absolute; top:calc(100% + 14px); left:50%;
  font-family:'JetBrains Mono', ui-monospace, monospace;
  font-size:clamp(.7rem, 1.6vmin, .82rem);
  font-weight:400;
  color:var(--mut);
  white-space:nowrap; letter-spacing:.02em;
  opacity:0; transform: translate(-50%, -8px);
  transition: opacity .35s ease .04s, transform .45s cubic-bezier(.2,.7,.3,1.4) .04s;
  pointer-events:none;
}
.btn-hint::before { content:"↑ "; color:var(--accent); opacity:.8; }
.btn:hover .btn-hint, .btn:focus-visible .btn-hint { opacity:1; transform: translate(-50%, 0); }

/* ─── dream veil (idle background ballet) ─────────────────────────── */
.dream-veil {
  position:fixed; inset:0; z-index:1;
  pointer-events:none; opacity:0; overflow:hidden;
  animation: dreamCycle 40s linear infinite;
}
body:has(.btn:hover) .dream-veil, body:has(.btn:hover) .dream-veil *,
body:has(.btn:active) .dream-veil, body:has(.btn:active) .dream-veil * { animation-play-state: paused; }
.dream-blob {
  position:absolute; width:80vmax; height:80vmax;
  border-radius:50%; filter: blur(80px);
  mix-blend-mode: multiply; opacity:.55;
  will-change: transform;
}
.dream-blob.b1 { background: radial-gradient(circle, var(--dream-1) 0, transparent 65%); top:-30%; left:-25%;  animation: drift1 26s ease-in-out infinite; }
.dream-blob.b2 { background: radial-gradient(circle, var(--dream-2) 0, transparent 65%); top: 10%; right:-30%; animation: drift2 32s ease-in-out infinite; }
.dream-blob.b3 { background: radial-gradient(circle, var(--dream-3) 0, transparent 65%); bottom:-30%; left:5%; animation: drift3 28s ease-in-out infinite; }
.dream-blob.b4 { background: radial-gradient(circle, var(--dream-4) 0, transparent 65%); top: 45%; left:35%;   animation: drift4 24s ease-in-out infinite; }
.dream-blob.b5 { background: radial-gradient(circle, var(--dream-5) 0, transparent 65%); bottom:10%; right:10%;animation: drift5 36s ease-in-out infinite; }
@keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)}    50%{transform:translate(18vw,12vh) scale(1.25)} }
@keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1.05)} 50%{transform:translate(-14vw,16vh) scale(.85)} }
@keyframes drift3 { 0%,100%{transform:translate(0,0) scale(1)}    50%{transform:translate(12vw,-14vh) scale(1.18)} }
@keyframes drift4 { 0%,100%{transform:translate(-6vw,6vh) scale(.95)} 50%{transform:translate(10vw,-10vh) scale(1.2)} }
@keyframes drift5 { 0%,100%{transform:translate(0,0) scale(1)}    50%{transform:translate(-16vw,-12vh) scale(1.1)} }
@keyframes dreamCycle {
  0%, 62% { opacity:0;   transform:scale(1)    rotate(0)     skew(0,0);          filter:hue-rotate(0deg)   blur(0); }
  78%     { opacity:1;   transform:scale(1)    rotate(0)     skew(0,0);          filter:hue-rotate(60deg)  blur(0); }
  92%     { opacity:1;   transform:scale(1)    rotate(0)     skew(0,0);          filter:hue-rotate(380deg) blur(0); }
  93.5%   { opacity:1;   transform:scale(1.08) rotate(2deg)  skew(-2deg,1deg);   filter:hue-rotate(400deg) blur(2px); }
  95%     { opacity:1;   transform:scale(.86)  rotate(-4deg) skew(3deg,-2deg);   filter:hue-rotate(420deg) blur(4px); }
  96.5%   { opacity:.85; transform:scale(1.18) rotate(6deg)  skew(-4deg,2deg);   filter:hue-rotate(440deg) blur(8px); }
  100%    { opacity:0;   transform:scale(.04)  rotate(-22deg);                   filter:hue-rotate(460deg) blur(40px); }
}

/* ─── Apps → three doors (pure-CSS reveal) ────────────────────────── */
.reveal-input { position:absolute; width:0; height:0; margin:0; opacity:0; pointer-events:none; }

/* the Apps button is a toggle label now → it vanishes once the trio opens */
body:has(#apps-open:checked) .btn-apps { display:none; }

/* trio: hidden until Apps is opened, then sits in the same row */
.apps-trio { display:none; flex-direction:column; align-items:center; gap:clamp(1rem, 3vmin, 1.8rem); }
body:has(#apps-open:checked) .apps-trio { display:inline-flex; }
.trio-row { display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:clamp(1.4rem, 5vmin, 3rem); }

/* the three doors — each a distinct RGB tonality (stored in --door so it
   survives the generic .btn:hover), gently shifting + floating */
.rbtn { color:#1a1820; background-color:transparent; background-image:var(--door); background-size:220% 100%; border:1px solid rgba(255,255,255,.6); }
.rb-test { --door:linear-gradient(110deg,#5a9aff 0%,#8ab4ff 28%,#6a7aff 52%,#7a5aff 78%,#5a9aff 100%); }   /* violet/blue (swapped with red) */
.rb-know { --door:linear-gradient(110deg,#46d98a 0%,#8affd0 28%,#6dd933 52%,#33d9a6 78%,#46d98a 100%); }   /* G */
.rb-real { --door:linear-gradient(110deg,#ff6a6a 0%,#ff9b6a 28%,#ffc16a 52%,#ff7a8c 78%,#ff6a6a 100%); }   /* red (swapped with violet) */

/* reveal: 1 s delay, fade-in from below over 1 s (was 2 s), then each door keeps
   moving in its OWN way for a longer 6.5 s display cycle (was 4.5 s), over a
   shared hue drift. transform drives the entrance · translate/rotate drive each
   distinct float · scale drives hover, so they never fight each other. */
body:has(#apps-open:checked) .trio-row .rbtn {
  animation:
    doorRise  1s cubic-bezier(.2,.8,.25,1) 1s both,
    doorHue   7s linear 1s infinite,
    doorBob   6.5s ease-in-out 2s infinite;   /* default float; each door swaps the name below */
}
/* per door: same entrance, but a different ongoing motion (bob · tilt · sway) */
body:has(#apps-open:checked) .trio-row .rb-test { animation-name:doorRise, doorHue, doorBob;  animation-delay:1s,    1s,    2s;    }
body:has(#apps-open:checked) .trio-row .rb-know { animation-name:doorRise, doorHue, doorTilt; animation-delay:1.18s, 1.18s, 2.18s; }
body:has(#apps-open:checked) .trio-row .rb-real { animation-name:doorRise, doorHue, doorSway; animation-delay:1.36s, 1.36s, 2.36s; }

@keyframes doorRise {
  0%   { opacity:0; transform:translateY(46px) scale(.86); filter:blur(7px); }
  60%  { opacity:1; transform:translateY(-6px) scale(1.04); filter:blur(0); }
  100% { opacity:1; transform:translateY(0)    scale(1); }
}
@keyframes doorHue  { from { background-position:0% 50%; } to { background-position:220% 50%; } }
/* three distinct floats — vertical bob · gentle tilt · horizontal sway */
@keyframes doorBob  { 0%,100% { translate:0 0; }    50% { translate:0 -8px; } }
@keyframes doorTilt { 0%,100% { rotate:0deg; }      50% { rotate:4deg; } }
@keyframes doorSway { 0%,100% { translate:0 0; }    50% { translate:9px 0; } }

/* hover/onclick: scale (own property) so it composes over entrance+float */
.apps-trio .rbtn:hover, .apps-trio .rbtn:focus-visible {
  background-color:transparent; background-image:var(--door);
  filter:brightness(1.08) saturate(1.15);
  scale:1.06;
  box-shadow:0 1px 0 rgba(255,255,255,.95) inset, 0 22px 50px -18px rgba(120,60,200,.45);
}
/* a different press feel per door: firm squash · playful twist · push-in glow */
.apps-trio .rb-test:active { scale:.9; }
.apps-trio .rb-know:active { scale:.96; rotate:-7deg; }
.apps-trio .rb-real:active { scale:1.03; translate:0 4px; filter:brightness(1.2) saturate(1.25); }

/* Know more → three further doors below the trio */
.know-sub { display:none; flex-wrap:wrap; justify-content:center; gap:clamp(.8rem, 3vmin, 1.6rem); }
body:has(#know-open:checked) .know-sub { display:flex; }
.sbtn {
  color:#28104a; background-color:transparent; background-image:var(--door); background-size:200% 100%;
  font-size:clamp(.95rem, 2vmin, 1.1rem); padding:.85em 1.6em; min-width:clamp(7rem, 18vmin, 10rem);
}
.s-std { --door:linear-gradient(110deg,#c79bff,#b27aff,#9a6aff,#c79bff); }   /* indigo/violet */
.s-bub { --door:linear-gradient(110deg,#8affd0,#6ad9c0,#8ad0ff,#8affd0); }   /* teal/cyan */
.s-set { --door:linear-gradient(110deg,#ffd28a,#ffb27a,#ffc56a,#ffd28a); }   /* amber */
body:has(#know-open:checked) .know-sub .sbtn {
  animation: doorRise 1.5s cubic-bezier(.2,.8,.25,1) both, doorHue 7s linear infinite;
}
body:has(#know-open:checked) .know-sub .s-std { animation-delay:.05s, .05s; }
body:has(#know-open:checked) .know-sub .s-bub { animation-delay:.2s,  .2s; }
body:has(#know-open:checked) .know-sub .s-set { animation-delay:.35s, .35s; }
.know-sub .sbtn:hover, .know-sub .sbtn:focus-visible {
  background-color:transparent; background-image:var(--door);
  filter:brightness(1.08) saturate(1.15); scale:1.05;
}
.know-sub .sbtn:active { scale:.95; }

/* ─── responsive + reduced motion ─────────────────────────────────── */
@media (max-width: 640px) {
  .cta { gap:5.5rem; width:min(22rem, 86vw); }
  .cta-row { flex-direction:column; gap:3.4rem; width:100%; }
  .btn { width:100%; padding:1.15em 1.6em; }
  .btn-hint { font-size:.78rem; }
  .apps-trio { width:100%; }
  .trio-row, .know-sub { flex-direction:column; width:100%; gap:1.2rem; }
}
@media (prefers-reduced-motion: reduce) {
  .logo, .logo .star, .slogan .typed, .btn, .btn-text {
    animation:none !important; opacity:1 !important;
    filter:none !important; transform:none !important; translate:0 0 !important;
  }
  .slogan .typed { display:none !important; }
  :root:has(#s0:checked) .slogan .typed[data-st="0"],
  :root:has(#s1:checked) .slogan .typed[data-st="1"],
  :root:has(#s2:checked) .slogan .typed[data-st="2"],
  :root:has(#s3:checked) .slogan .typed[data-st="3"],
  :root:has(#s4:checked) .slogan .typed[data-st="4"] { display:inline-block !important; width:auto !important; border-right:0 !important; overflow:visible !important; }
  .btn-text { display:none !important; width:auto !important; transition:none !important; }
  :root:has(#s0:checked) .btn-text[data-st~="0"],
  :root:has(#s1:checked) .btn-text[data-st~="1"],
  :root:has(#s2:checked) .btn-text[data-st~="2"],
  :root:has(#s3:checked) .btn-text[data-st~="3"],
  :root:has(#s4:checked) .btn-text[data-st~="4"] { display:inline-block !important; }
  .btn::after, .splash, .dream-veil, .dream-blob { animation:none !important; opacity:0 !important; }
  .press-bloom { transition:none !important; opacity:0 !important; }
  /* doors: no entrance/float/hue — just appear when opened */
  body:has(#apps-open:checked) .trio-row .rbtn,
  body:has(#know-open:checked) .know-sub .sbtn {
    animation:none !important; opacity:1 !important; transform:none !important; translate:0 !important; filter:none !important;
  }
  .logo .star::before, .logo .star::after { display:none !important; }
  .logo .star { transition:none !important; }
}

/* ─── footer (license + author) ───────────────────────────────────── */
.flove-foot {
  position: fixed;
  bottom: 1rem; left: 0; right: 0;
  z-index: 4;
  text-align: center;
  font-family: "JetBrains Mono", ui-monospace, monospace;

.flove-foot a {

}
.flove-foot a:hover, .flove-foot a:focus-visible { color: var(--ink-dim, #b9b0d4); }
@keyframes footFadeIn { to { opacity: .55; } }
@media (prefers-reduced-motion: reduce) {
  .flove-foot { animation: none; opacity: .55; }
}
</style>
</head>
<body>
