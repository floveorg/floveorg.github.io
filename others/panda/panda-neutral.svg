<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda neutral">
  <title>Panda neutral</title>
  <defs>
    <!-- pie redondeado tipo botín; el puño marca el tobillo (lo separa de la pierna) -->
    <g id="foot">
      <path d="M84 170Q80 179 80 187Q80 196 89 196Q98 196 98 187Q98 179 94 170Z" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M80.2 185Q80.5 196 89 196Q97.5 196 97.8 185Q97 193.5 89 194Q81 193.5 80.2 185Z" fill="#000" opacity="0.11"/>
      <path d="M82 190Q83 196 89 196Q95 196 96 190Q95 194 89 194.6Q83 194 82 190Z" fill="#000" opacity="0.1"/>
      <rect x="81" y="168" width="16" height="6.5" rx="3.25" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M84 181H94" fill="none" stroke="#ff9ec2" stroke-width="2" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- fill negro por defecto; el blanco/rosa se declara donde toca -->
  <g class="panda" data-emotion="neutral" fill="#2b2b2b" stroke-linejoin="round">
    <!-- piernas (borde blanco fino tipo pegatina) -->
    <g class="legs" stroke="#fff" stroke-width="0.875">
      <rect x="83.5" y="150" width="11" height="30" rx="5.5"/>
      <rect x="105.5" y="150" width="11" height="30" rx="5.5"/>
    </g>

    <!-- pies (botines redondos), abiertos un poco hacia fuera -->
    <use href="#foot" transform="rotate(-6 89 184)"/>
    <use href="#foot" transform="matrix(-1 0 0 1 200 0) rotate(-6 89 184)"/>

    <!-- brazos: hombro/deltoides redondeado tipo gorila (DETRAS del cuerpo) que afina en antebrazo curvo; mano abierta hacia fuera con pulgar oponible -->
    <g class="arms" stroke="#fff" stroke-width="0.875">
      <path class="arm-l" d="M85 103Q64 99 55 108Q49 114 50 126Q51 145 54 156L54 163A2.8 2.8 0 0 0 59.6 163L59.6 158Q60.7 159.5 61.8 158L61.8 163.5A2.8 2.8 0 0 0 67.4 163.5L67.4 158Q68.5 159.5 69.6 158L69.6 163A2.8 2.8 0 0 0 75.2 163L75.2 159Q75.5 156 76 154Q76.5 150 80 150.5Q83 151 82.5 154Q82 156.5 78.5 156Q76.5 156 76 152Q75 132 85 103Z"/>
      <path class="arm-r" d="M115 103Q136 99 145 108Q151 114 150 126Q149 145 146 156L146 163A2.8 2.8 0 0 1 140.4 163L140.4 158Q139.3 159.5 138.2 158L138.2 163.5A2.8 2.8 0 0 1 132.6 163.5L132.6 158Q131.5 159.5 130.4 158L130.4 163A2.8 2.8 0 0 1 124.8 163L124.8 159Q124.5 156 124 154Q123.5 150 120 150.5Q117 151 117.5 154Q118 156.5 121.5 156Q123.5 156 124 152Q125 132 115 103Z"/>
    </g>

    <!-- torso (tapa los hombros -> brazos integrados) -->
    <ellipse class="body" cx="100" cy="126" rx="27" ry="28" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>

    <!-- cabeza + cara como un solo grupo (se mueven juntas al animar) -->
    <g class="head">
      <g class="ears" stroke="#fff" stroke-width="0.875">
        <circle cx="64" cy="26" r="16"/>
        <circle cx="136" cy="26" r="16"/>
      </g>
      <circle cx="64" cy="26" r="8" fill="#5b4a4a"/>
      <circle cx="136" cy="26" r="8" fill="#5b4a4a"/>
      <circle class="skull" cx="100" cy="56" r="46" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>

      <g class="patches">
        <path id="patch" d="M71 29C63 33 67 55 80 62C90 66 97 56 94 47C93 34 81 26 71 29Z"/>
        <use href="#patch" transform="matrix(-1 0 0 1 200 0)"/>
      </g>

      <g class="eyes">
        <path id="eyew" d="M77 52Q83 47 91 59Q84 60 77 52Z" fill="#fff"/>
        <use href="#eyew" transform="matrix(-1 0 0 1 200 0)"/>
        <circle cx="85" cy="55" r="3.6"/>
        <circle cx="115" cy="55" r="3.6"/>
        <circle cx="84" cy="53" r="1.4" fill="#fff"/>
        <circle cx="116" cy="53" r="1.4" fill="#fff"/>
      </g>

      <ellipse class="nose" cx="100" cy="69" rx="5.8" ry="4"/>
      <path class="mouth" d="M100 73V77M93 80Q100 83 107 80" fill="none" stroke="#2b2b2b" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
