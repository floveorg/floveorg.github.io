<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda guino">
  <title>Panda guiño</title>
  <style><![CDATA[
.head{transform-box:view-box;transform-origin:100px 102px;animation:h 3s ease-in-out infinite}
.body{transform-box:fill-box;transform-origin:center;animation:b 3s ease-in-out infinite}
.arm-l{transform-box:view-box;transform-origin:80px 118px;animation:al .8s ease-in-out infinite}
.arm-r{transform-box:view-box;transform-origin:120px 118px;animation:ar 3s ease-in-out infinite}
.foot-l,.foot-r{animation:f 3s ease-in-out infinite}
.eyes{transform-box:fill-box;transform-origin:center;animation:bl 3.4s ease-in-out infinite}
.mouth{transform-box:fill-box;transform-origin:center;animation:sm 3s ease-in-out infinite}
.blush{animation:fl 2.4s ease-in-out infinite}
.extra{transform-box:view-box;transform-origin:128px 44px;animation:sp 1.6s ease-in-out infinite}
@keyframes h{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(-5deg)}}
@keyframes b{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes al{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(10deg)}}
@keyframes ar{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-3deg)}}
@keyframes f{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
@keyframes bl{0%,88%,100%{transform:scaleY(1)}94%{transform:scaleY(.15)}}
@keyframes sm{0%,100%{transform:rotate(0)}50%{transform:rotate(-2deg) translateY(-.6px)}}
@keyframes fl{0%,100%{opacity:.55}50%{opacity:.95}}
@keyframes sp{0%,100%{opacity:0;transform:scale(.3) rotate(0)}50%{opacity:1;transform:scale(1.1) rotate(45deg)}}
@media(prefers-reduced-motion:reduce){.panda *{animation:none!important}}]]></style>
  <defs>
    <g id="foot">
      <path d="M84 170Q80 179 80 187Q80 196 89 196Q98 196 98 187Q98 179 94 170Z" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M80.2 185Q80.5 196 89 196Q97.5 196 97.8 185Q97 193.5 89 194Q81 193.5 80.2 185Z" fill="#000" opacity="0.11"/>
      <rect x="81" y="168" width="16" height="6.5" rx="3.25" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M84 181H94" fill="none" stroke="#ff9ec2" stroke-width="2" stroke-linecap="round"/>
    </g>
    <path id="patch" d="M71 29C63 33 67 55 80 62C90 66 97 56 94 47C93 34 81 26 71 29Z" fill="#2b2b2b"/>
    <path id="spark" d="M0 -6 L1.4 -1.6 L6 0 L1.4 1.6 L0 6 L-1.4 1.6 L-6 0 L-1.4 -1.6 Z"/>
    <path id="arm" d="M82 116Q68 110 60 121L60 134Q58 138 58 147L58 152A2.75 2.75 0 0 0 63.5 152L63.5 147Q64.4 148.5 65.25 147L65.25 152.5A2.75 2.75 0 0 0 70.75 152.5L70.75 147Q71.6 148.5 72.5 147L72.5 152A2.75 2.75 0 0 0 78 152L78 147Q78 138 76 134L82 116Z"/>
  </defs>
  <g class="panda" data-emotion="guino" fill="#2b2b2b" stroke-linejoin="round">
    <g class="legs" stroke="#fff" stroke-width="0.875"><rect x="83.5" y="150" width="11" height="30" rx="5.5"/><rect x="105.5" y="150" width="11" height="30" rx="5.5"/></g>
    <g class="foot-l"><use href="#foot" transform="rotate(-6 89 184)"/></g>
    <g class="foot-r"><use href="#foot" transform="matrix(-1 0 0 1 200 0) rotate(-6 89 184)"/></g>
    <g class="arms" stroke="#fff" stroke-width="0.875">
      <g class="arm-l"><g transform="rotate(102 80 118)"><use href="#arm"/></g></g>
      <g class="arm-r"><g transform="matrix(-1 0 0 1 200 0) rotate(8 80 118)"><use href="#arm"/></g></g>
    </g>
    <ellipse class="body" cx="100" cy="126" rx="27" ry="28" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="head" transform="rotate(-8 100 102)">
      <g class="ears" stroke="#fff" stroke-width="0.875"><circle cx="64" cy="25" r="16.5"/><circle cx="136" cy="26" r="16"/></g>
      <circle cx="64" cy="25" r="8" fill="#5b4a4a"/><circle cx="136" cy="26" r="8" fill="#5b4a4a"/>
      <circle class="skull" cx="100" cy="56" r="46" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
      <g class="patches">
        <use href="#patch" transform="translate(85 50) rotate(-5) translate(-85 -50)"/>
        <use href="#patch" transform="matrix(-1 0 0 1 200 0) translate(85 50) rotate(-5) translate(-85 -50)"/>
      </g>
      <g class="eyes">
        <path d="M78 53 Q85 48 92 58 Q85 60 78 53 Z" fill="#fff"/>
        <circle cx="85" cy="55" r="3.6" fill="#2b2b2b"/><circle cx="84" cy="53" r="1.4" fill="#fff"/>
        <path d="M109 57 Q115 50 121 57" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/>
      </g>
      <ellipse class="nose" cx="100" cy="69" rx="5.8" ry="4"/>
      <g class="mouth"><path d="M100 73 V76 M91 79 Q100 86 109 79" fill="none" stroke="#2b2b2b" stroke-width="2.5" stroke-linecap="round"/></g>
      <g class="blush" fill="#ffb3c1" opacity="0.85"><ellipse cx="70" cy="66" rx="7" ry="4"/><ellipse cx="130" cy="66" rx="7" ry="4"/></g>
    </g>
    <g class="extra" fill="#ffd23f"><use href="#spark" transform="translate(128 44) scale(0.95)"/></g>
  </g>
</svg>
