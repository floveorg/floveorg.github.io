<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda sorprendido">
  <title>Panda sorprendido</title>
  <style><![CDATA[
.head{transform-box:view-box;transform-origin:100px 102px;animation:h 2.4s ease-in-out infinite}
.body{transform-box:fill-box;transform-origin:center;animation:b 2.4s ease-in-out infinite}
.arm-l{transform-box:view-box;transform-origin:80px 118px;animation:al 2.4s ease-in-out infinite}
.arm-r{transform-box:view-box;transform-origin:120px 118px;animation:ar 2.4s ease-in-out infinite}
.foot-l,.foot-r{animation:f 2.4s ease-in-out infinite}
.eyes{transform-box:fill-box;transform-origin:center;animation:wide 2.4s ease-in-out infinite}
.mouth{transform-box:fill-box;transform-origin:center;animation:gasp 2.4s ease-in-out infinite}
.extra{transform-box:view-box;transform-origin:154px 38px;animation:bang 2.4s ease-in-out infinite}
@keyframes h{0%,12%{transform:translateY(-3px) rotate(-6deg)}24%{transform:translateY(-8px) rotate(-9deg)}48%,100%{transform:translateY(-3px) rotate(-6deg)}}
@keyframes b{0%,12%{transform:scale(1)}24%{transform:scale(1.05)}48%,100%{transform:scale(1)}}
@keyframes al{0%,12%{transform:rotate(0)}26%{transform:rotate(-10deg)}55%,100%{transform:rotate(0)}}
@keyframes ar{0%,12%{transform:rotate(0)}26%{transform:rotate(10deg)}55%,100%{transform:rotate(0)}}
@keyframes f{0%,12%{transform:translateY(0)}24%{transform:translateY(-3px)}48%,100%{transform:translateY(0)}}
@keyframes wide{0%,12%{transform:scale(1)}24%{transform:scale(1.2)}60%,100%{transform:scale(1)}}
@keyframes gasp{0%,12%{transform:scale(1)}24%{transform:scale(1.3)}60%,100%{transform:scale(1)}}
@keyframes bang{0%,12%{opacity:0;transform:scale(.2)}24%{opacity:1;transform:scale(1.15)}55%{opacity:1;transform:scale(1)}80%,100%{opacity:0}}
@media(prefers-reduced-motion:reduce){.panda *{animation:none!important}}]]></style>
  <defs>
    <g id="foot">
      <path d="M84 170Q80 179 80 187Q80 196 89 196Q98 196 98 187Q98 179 94 170Z" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M80.2 185Q80.5 196 89 196Q97.5 196 97.8 185Q97 193.5 89 194Q81 193.5 80.2 185Z" fill="#000" opacity="0.11"/>
      <rect x="81" y="168" width="16" height="6.5" rx="3.25" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M84 181H94" fill="none" stroke="#ff9ec2" stroke-width="2" stroke-linecap="round"/>
    </g>
    <path id="patch" d="M71 29C63 33 67 55 80 62C90 66 97 56 94 47C93 34 81 26 71 29Z" fill="#2b2b2b"/>
    <path id="arm" d="M82 116Q68 110 60 121L60 134Q58 138 58 147L58 152A2.75 2.75 0 0 0 63.5 152L63.5 147Q64.4 148.5 65.25 147L65.25 152.5A2.75 2.75 0 0 0 70.75 152.5L70.75 147Q71.6 148.5 72.5 147L72.5 152A2.75 2.75 0 0 0 78 152L78 147Q78 138 76 134L82 116Z"/>
  </defs>
  <g class="panda" data-emotion="sorprendido" fill="#2b2b2b" stroke-linejoin="round">
    <g class="legs" stroke="#fff" stroke-width="0.875"><rect x="83.5" y="150" width="11" height="30" rx="5.5"/><rect x="105.5" y="150" width="11" height="30" rx="5.5"/></g>
    <g class="foot-l"><use href="#foot" transform="translate(-2 -2) rotate(-15 89 184)"/></g>
    <g class="foot-r"><use href="#foot" transform="matrix(-1 0 0 1 200 0) translate(-2 -2) rotate(-15 89 184)"/></g>
    <g class="arms" stroke="#fff" stroke-width="0.875">
      <g class="arm-l"><g transform="rotate(92 80 118)"><use href="#arm"/></g></g>
      <g class="arm-r"><g transform="matrix(-1 0 0 1 200 0) rotate(92 80 118)"><use href="#arm"/></g></g>
    </g>
    <ellipse class="body" cx="100" cy="126" rx="27" ry="28" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="head" transform="translate(0 -3) rotate(-6 100 102)">
      <g class="ears" stroke="#fff" stroke-width="0.875"><circle cx="61" cy="21" r="19"/><circle cx="139" cy="21" r="19"/></g>
      <circle cx="61" cy="21" r="9.5" fill="#5b4a4a"/><circle cx="139" cy="21" r="9.5" fill="#5b4a4a"/>
      <circle class="skull" cx="100" cy="56" r="46" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
      <g class="patches">
        <use href="#patch" transform="translate(85 50) scale(1.16) translate(-85 -50)"/>
        <use href="#patch" transform="matrix(-1 0 0 1 200 0) translate(85 50) scale(1.16) translate(-85 -50)"/>
      </g>
      <g class="eyes">
        <ellipse cx="85" cy="55" rx="7" ry="7.8" fill="#fff"/><ellipse cx="115" cy="55" rx="7" ry="7.8" fill="#fff"/>
        <circle cx="85" cy="56" r="3" fill="#2b2b2b"/><circle cx="115" cy="56" r="3" fill="#2b2b2b"/>
        <circle cx="83.4" cy="53.4" r="1.4" fill="#fff"/><circle cx="113.4" cy="53.4" r="1.4" fill="#fff"/>
      </g>
      <ellipse class="nose" cx="100" cy="69" rx="5.8" ry="4"/>
      <g class="mouth"><ellipse cx="100" cy="80" rx="4.6" ry="6" fill="#8a4a4a"/></g>
    </g>
    <g class="extra"><g fill="#ffb300"><rect x="152" y="26" width="5.4" height="15" rx="2.7"/><circle cx="154.7" cy="46" r="3"/></g></g>
  </g>
</svg>
