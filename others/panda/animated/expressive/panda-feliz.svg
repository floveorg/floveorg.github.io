<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda feliz">
  <title>Panda feliz</title>
  <style><![CDATA[
.head{transform-box:view-box;transform-origin:100px 102px;animation:h 1s ease-in-out infinite}
.body{transform-box:fill-box;transform-origin:center;animation:b 1s ease-in-out infinite}
.arm-l{transform-box:view-box;transform-origin:80px 118px;animation:al .5s ease-in-out infinite}
.arm-r{transform-box:view-box;transform-origin:120px 118px;animation:ar .5s ease-in-out infinite}
.foot-l{animation:f .5s ease-in-out infinite}.foot-r{animation:f .5s ease-in-out infinite .25s}
.eyes{transform-box:fill-box;transform-origin:center;animation:bl 1.6s ease-in-out infinite}
.mouth{transform-box:fill-box;transform-origin:center;animation:la .5s ease-in-out infinite}
.blush{animation:fl 1.4s ease-in-out infinite}
.extra{transform-box:view-box;transform-origin:center;animation:pop 1.2s ease-in-out infinite}
@keyframes h{0%,100%{transform:rotate(1deg) translateY(0)}50%{transform:rotate(5deg) translateY(-2px)}}
@keyframes b{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.05)}}
@keyframes al{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
@keyframes ar{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-6deg)}}
@keyframes f{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes bl{0%,82%,100%{transform:scaleY(1)}90%{transform:scaleY(.5)}}
@keyframes la{0%,100%{transform:scaleY(.82)}50%{transform:scaleY(1.1)}}
@keyframes fl{0%,100%{opacity:.6}50%{opacity:.95}}
@keyframes pop{0%,100%{transform:scale(.85);opacity:.5}50%{transform:scale(1.1);opacity:1}}
@media(prefers-reduced-motion:reduce){.panda *{animation:none!important}}]]></style>
  <defs>
    <g id="foot">
      <path d="M84 170Q80 179 80 187Q80 196 89 196Q98 196 98 187Q98 179 94 170Z" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M80.2 185Q80.5 196 89 196Q97.5 196 97.8 185Q97 193.5 89 194Q81 193.5 80.2 185Z" fill="#000" opacity="0.11"/>
      <rect x="81" y="168" width="16" height="6.5" rx="3.25" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M84 181H94" fill="none" stroke="#ff9ec2" stroke-width="2" stroke-linecap="round"/>
    </g>
    <path id="patch" d="M71 29C63 33 67 55 80 62C90 66 97 56 94 47C93 34 81 26 71 29Z" fill="#2b2b2b"/>
    <path id="spark" d="M0 -6 L1.4 -1.6 L6 0 L1.4 1.6 L0 6 L-1.4 1.6 L-6 0 L-1.4 -1.6 Z"/>
    <path id="arm" d="M82 116Q68 110 60 121L60 134Q58 138 58 147L58 152A2.75 2.75 0 0 0 63.5 152L63.5 147Q64.4 148.5 65.25 147L65.25 152.5A2.75 2.75 0 0 0 70.75 152.5L70.75 147Q71.6 148.5 72.5 147L72.5 152A2.75 2.75 0 0 0 78 152L78 147Q78 138 76 134L82 116Z"/>
  </defs>
  <g class="panda" data-emotion="feliz" fill="#2b2b2b" stroke-linejoin="round">
    <g class="legs" stroke="#fff" stroke-width="0.875"><rect x="83.5" y="150" width="11" height="30" rx="5.5"/><rect x="105.5" y="150" width="11" height="30" rx="5.5"/></g>
    <g class="foot-l"><use href="#foot" transform="translate(0 -3) rotate(-6 89 184)"/></g>
    <g class="foot-r"><use href="#foot" transform="matrix(-1 0 0 1 200 0) translate(0 -3) rotate(-6 89 184)"/></g>
    <g class="arms" stroke="#fff" stroke-width="0.875">
      <g class="arm-l"><g transform="rotate(82 80 118)"><use href="#arm"/></g></g>
      <g class="arm-r"><g transform="matrix(-1 0 0 1 200 0) rotate(82 80 118)"><use href="#arm"/></g></g>
    </g>
    <ellipse class="body" cx="100" cy="126" rx="27" ry="28" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="head" transform="rotate(3 100 102)">
      <g class="ears" stroke="#fff" stroke-width="0.875"><circle cx="63" cy="24" r="17"/><circle cx="137" cy="24" r="17"/></g>
      <circle cx="63" cy="24" r="8.5" fill="#5b4a4a"/><circle cx="137" cy="24" r="8.5" fill="#5b4a4a"/>
      <circle class="skull" cx="100" cy="56" r="46" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
      <g class="patches">
        <use href="#patch" transform="translate(85 50) scale(1.04) rotate(-8) translate(-85 -50)"/>
        <use href="#patch" transform="matrix(-1 0 0 1 200 0) translate(85 50) scale(1.04) rotate(-8) translate(-85 -50)"/>
      </g>
      <g class="eyes" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round">
        <path d="M79 57 Q85 50 91 57"/><path d="M109 57 Q115 50 121 57"/>
      </g>
      <ellipse class="nose" cx="100" cy="69" rx="5.8" ry="4"/>
      <g class="mouth">
        <path d="M100 73 V75" fill="none" stroke="#2b2b2b" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M88 76 Q100 92 112 76 Q100 84 88 76 Z" fill="#8a4a4a"/>
        <path d="M95 83 Q100 89 105 83 Q100 86 95 83 Z" fill="#ff8fa3"/>
      </g>
      <g class="blush" fill="#ffb3c1" opacity="0.8"><ellipse cx="70" cy="66" rx="7" ry="4"/><ellipse cx="130" cy="66" rx="7" ry="4"/></g>
    </g>
    <g class="extra" fill="#ffd23f">
      <use href="#spark" transform="translate(40 30) scale(1.1)"/>
      <use href="#spark" transform="translate(162 28) scale(1.2)"/>
      <use href="#spark" transform="translate(172 64) scale(0.8)"/>
    </g>
  </g>
</svg>
