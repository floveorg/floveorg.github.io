<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda dormido">
  <title>Panda dormido</title>
  <style><![CDATA[
.head{transform-box:view-box;transform-origin:100px 102px;animation:h 5.5s ease-in-out infinite}
.body{transform-box:fill-box;transform-origin:center;animation:b 5.5s ease-in-out infinite}
.arm-l{transform-box:view-box;transform-origin:80px 118px;animation:b 5.5s ease-in-out infinite}
.arm-r{transform-box:view-box;transform-origin:120px 118px;animation:b 5.5s ease-in-out infinite}
.foot-l,.foot-r{animation:b 5.5s ease-in-out infinite}
.extra{transform-box:view-box;animation:zf 3.4s ease-in infinite}
@keyframes h{0%,100%{transform:translate(3px,3px) rotate(11deg)}50%{transform:translate(3px,4px) rotate(12deg)}}
@keyframes b{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes zf{0%{opacity:0;transform:translate(0,0) scale(.7)}25%{opacity:1}100%{opacity:0;transform:translate(12px,-24px) scale(1.3)}}
@media(prefers-reduced-motion:reduce){.panda *{animation:none!important}}]]></style>
  <defs>
    <g id="foot">
      <path d="M84 170Q80 179 80 187Q80 196 89 196Q98 196 98 187Q98 179 94 170Z" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M80.2 185Q80.5 196 89 196Q97.5 196 97.8 185Q97 193.5 89 194Q81 193.5 80.2 185Z" fill="#000" opacity="0.11"/>
      <rect x="81" y="168" width="16" height="6.5" rx="3.25" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M84 181H94" fill="none" stroke="#ff9ec2" stroke-width="2" stroke-linecap="round"/>
    </g>
    <path id="patch" d="M71 29C63 33 67 55 80 62C90 66 97 56 94 47C93 34 81 26 71 29Z" fill="#2b2b2b"/>
    <path id="arm" d="M82 116Q68 110 60 121L60 134Q58 138 58 147L58 152A2.75 2.75 0 0 0 63.5 152L63.5 147Q64.4 148.5 65.25 147L65.25 152.5A2.75 2.75 0 0 0 70.75 152.5L70.75 147Q71.6 148.5 72.5 147L72.5 152A2.75 2.75 0 0 0 78 152L78 147Q78 138 76 134L82 116Z"/>
  </defs>
  <g class="panda" data-emotion="dormido" fill="#2b2b2b" stroke-linejoin="round">
    <g class="legs" stroke="#fff" stroke-width="0.875"><rect x="83.5" y="150" width="11" height="30" rx="5.5"/><rect x="105.5" y="150" width="11" height="30" rx="5.5"/></g>
    <g class="foot-l"><use href="#foot" transform="rotate(10 89 184)"/></g>
    <g class="foot-r"><use href="#foot" transform="matrix(-1 0 0 1 200 0) rotate(10 89 184)"/></g>
    <g class="arms" stroke="#fff" stroke-width="0.875">
      <g class="arm-l"><g transform="rotate(4 80 118)"><use href="#arm"/></g></g>
      <g class="arm-r"><g transform="matrix(-1 0 0 1 200 0) rotate(4 80 118)"><use href="#arm"/></g></g>
    </g>
    <ellipse class="body" cx="100" cy="126" rx="27" ry="28" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="head" transform="translate(3 3) rotate(11 100 102)">
      <g class="ears" stroke="#fff" stroke-width="0.875"><circle cx="66" cy="31" r="14"/><circle cx="134" cy="31" r="14"/></g>
      <circle cx="66" cy="31" r="7" fill="#5b4a4a"/><circle cx="134" cy="31" r="7" fill="#5b4a4a"/>
      <circle class="skull" cx="100" cy="56" r="46" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
      <g class="patches">
        <use href="#patch" transform="translate(85 52) scale(0.98) rotate(8) translate(-85 -52)"/>
        <use href="#patch" transform="matrix(-1 0 0 1 200 0) translate(85 52) scale(0.98) rotate(8) translate(-85 -52)"/>
      </g>
      <g class="eyes" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
        <path d="M79 55 Q85 60 91 55"/><path d="M109 55 Q115 60 121 55"/>
      </g>
      <ellipse class="nose" cx="100" cy="69" rx="5.8" ry="4"/>
      <g class="mouth"><path d="M96 78 Q100 81 104 78" fill="none" stroke="#2b2b2b" stroke-width="2.5" stroke-linecap="round"/></g>
    </g>
    <g class="extra" fill="#2b2b2b" font-family="sans-serif" font-weight="bold">
      <text x="150" y="40" font-size="13">z</text><text x="159" y="28" font-size="18">Z</text>
    </g>
  </g>
</svg>
