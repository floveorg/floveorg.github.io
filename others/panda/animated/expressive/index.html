<!doctype html>
<html lang="es">
<meta charset="utf-8">
<title>Pandas · emociones expresivas animadas (CSS)</title>
<style>
  body { margin:0; font-family:system-ui,sans-serif; background:#fafafa; color:#2b2b2b;
         display:flex; flex-direction:column; align-items:center; padding:28px 16px; }
  h1 { font-weight:600; margin:0 0 4px; font-size:21px; }
  p.sub { margin:0 0 22px; color:#888; max-width:580px; text-align:center; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
          gap:18px; width:100%; max-width:820px; }
  figure { margin:0; background:#fff; border:1px solid #eee; border-radius:16px;
           padding:12px; text-align:center; }
  figure img { width:130px; height:130px; display:block; margin:0 auto; }
  figcaption { margin-top:6px; font-size:13px; color:#555; text-transform:capitalize; }
</style>
<h1>Pandas · emociones expresivas animadas</h1>
<p class="sub">animación CSS pura, autocontenida · cada gesto (brazos, pies, cabeza, ojos, boca,
cuerpo) cobra vida sobre su pose, con su coloreado e iconos. Respeta prefers-reduced-motion.</p>
<div class="grid" id="grid"></div>
<script>
  const EMO = ["enamorado","feliz","celebrando","guino","sorprendido",
               "pensativo","preocupado","triste","enfadado","dormido"];
  const grid = document.getElementById('grid');
  EMO.forEach(name => {
    const fig = document.createElement('figure');
    fig.innerHTML = `<img src="panda-${name}.svg" alt="panda ${name} animado"><figcaption>${name}</figcaption>`;
    grid.appendChild(fig);
  });
</script>
</html>
