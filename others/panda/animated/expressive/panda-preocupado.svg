<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda preocupado">
  <title>Panda preocupado</title>
  <style><![CDATA[
.head{transform-box:view-box;transform-origin:100px 102px;animation:h 1.6s ease-in-out infinite}
.body{transform-box:fill-box;transform-origin:center;animation:b 2.2s ease-in-out infinite}
.arm-l{transform-box:view-box;transform-origin:80px 118px;animation:al .9s ease-in-out infinite}
.arm-r{transform-box:view-box;transform-origin:120px 118px;animation:ar .9s ease-in-out infinite .15s}
.foot-l,.foot-r{animation:b 2.2s ease-in-out infinite}
.eyes{transform-box:fill-box;transform-origin:center;animation:dart 1.6s ease-in-out infinite}
.mouth{transform-box:fill-box;transform-origin:center;animation:wob 1.6s ease-in-out infinite}
.drip{transform-box:fill-box;animation:sweat 2.4s ease-in infinite}
@keyframes h{0%,100%{transform:rotate(2deg)}50%{transform:rotate(6deg)}}
@keyframes b{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes al{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes ar{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-3deg)}}
@keyframes dart{0%,100%{transform:translateX(0)}25%{transform:translateX(2px)}75%{transform:translateX(-2px)}}
@keyframes wob{0%,100%{transform:translateX(0)}50%{transform:translateX(1.5px)}}
@keyframes sweat{0%{opacity:0;transform:translateY(-6px)}20%{opacity:1;transform:translateY(0)}80%{opacity:1;transform:translateY(14px)}100%{opacity:0;transform:translateY(20px)}}
@media(prefers-reduced-motion:reduce){.panda *{animation:none!important}}]]></style>
  <defs>
    <g id="foot">
      <path d="M84 170Q80 179 80 187Q80 196 89 196Q98 196 98 187Q98 179 94 170Z" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M80.2 185Q80.5 196 89 196Q97.5 196 97.8 185Q97 193.5 89 194Q81 193.5 80.2 185Z" fill="#000" opacity="0.11"/>
      <rect x="81" y="168" width="16" height="6.5" rx="3.25" fill="#fff" stroke="#2b2b2b" stroke-width="1.5"/>
      <path d="M84 181H94" fill="none" stroke="#ff9ec2" stroke-width="2" stroke-linecap="round"/>
    </g>
    <path id="patch" d="M71 29C63 33 67 55 80 62C90 66 97 56 94 47C93 34 81 26 71 29Z" fill="#2b2b2b"/>
    <path id="drop" d="M0 -7 q-5 9 0 13 q5 -4 0 -13 z" fill="#8fd3f4" stroke="#5bb4d6" stroke-width="1"/>
    <path id="arm" d="M82 116Q68 110 60 121L60 134Q58 138 58 147L58 152A2.75 2.75 0 0 0 63.5 152L63.5 147Q64.4 148.5 65.25 147L65.25 152.5A2.75 2.75 0 0 0 70.75 152.5L70.75 147Q71.6 148.5 72.5 147L72.5 152A2.75 2.75 0 0 0 78 152L78 147Q78 138 76 134L82 116Z"/>
  </defs>
  <g class="panda" data-emotion="preocupado" fill="#2b2b2b" stroke-linejoin="round">
    <g class="legs" stroke="#fff" stroke-width="0.875"><rect x="83.5" y="150" width="11" height="30" rx="5.5"/><rect x="105.5" y="150" width="11" height="30" rx="5.5"/></g>
    <g class="foot-l"><use href="#foot" transform="rotate(9 89 184)"/></g>
    <g class="foot-r"><use href="#foot" transform="matrix(-1 0 0 1 200 0) rotate(9 89 184)"/></g>
    <g class="arms" stroke="#fff" stroke-width="0.875">
      <g class="arm-l"><g transform="rotate(113 80 118)"><use href="#arm"/></g></g>
      <g class="arm-r"><g transform="matrix(-1 0 0 1 200 0) rotate(113 80 118)"><use href="#arm"/></g></g>
    </g>
    <ellipse class="body" cx="100" cy="126" rx="27" ry="28" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="head" transform="rotate(4 100 102)">
      <g class="ears" stroke="#fff" stroke-width="0.875"><circle cx="65" cy="28" r="15"/><circle cx="135" cy="28" r="15"/></g>
      <circle cx="65" cy="28" r="7.5" fill="#5b4a4a"/><circle cx="135" cy="28" r="7.5" fill="#5b4a4a"/>
      <circle class="skull" cx="100" cy="56" r="46" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
      <g class="patches">
        <use href="#patch" transform="translate(85 50) scale(0.93) rotate(9) translate(-85 -50)"/>
        <use href="#patch" transform="matrix(-1 0 0 1 200 0) translate(85 50) scale(0.93) rotate(9) translate(-85 -50)"/>
      </g>
      <g class="eyes">
        <ellipse cx="85" cy="55" rx="5.2" ry="4.6" fill="#fff"/><ellipse cx="115" cy="55" rx="5.2" ry="4.6" fill="#fff"/>
        <circle cx="85" cy="53.5" r="3" fill="#2b2b2b"/><circle cx="115" cy="53.5" r="3" fill="#2b2b2b"/>
        <circle cx="83.8" cy="52" r="1.2" fill="#fff"/><circle cx="113.8" cy="52" r="1.2" fill="#fff"/>
      </g>
      <ellipse class="nose" cx="100" cy="69" rx="5.8" ry="4"/>
      <g class="mouth"><path d="M91 80 Q95.5 75 100 80 Q104.5 85 109 80" fill="none" stroke="#2b2b2b" stroke-width="2.5" stroke-linecap="round"/></g>
    </g>
    <g class="extra"><g class="drip"><use href="#drop" transform="translate(134 44)"/></g></g>
  </g>
</svg>
