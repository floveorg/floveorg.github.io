<!doctype html>
<html lang="es">
<meta charset="utf-8">
<title>Pandas · todos los GIFs animados</title>
<style>
  body { margin:0; font-family:system-ui,sans-serif; background:#fafafa; color:#2b2b2b;
         display:flex; flex-direction:column; align-items:center; padding:28px 16px; }
  h1 { font-weight:600; margin:0 0 22px; font-size:21px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
          gap:18px; width:100%; max-width:820px; }
  figure { margin:0; background:#fff; border:1px solid #eee; border-radius:16px;
           padding:12px; text-align:center; }
  figure img { width:130px; height:130px; display:block; margin:0 auto; }
  figcaption { margin-top:6px; font-size:12px; color:#555; }
</style>
<h1>Pandas · todos los GIFs animados</h1>
<div class="grid" id="grid"></div>
<script>
  const GIFS = ["panda-neutral-talk","panda-feliz-celebra","panda-enamorado","panda-feliz",
    "panda-celebrando","panda-guino","panda-sorprendido","panda-pensativo",
    "panda-preocupado","panda-triste","panda-enfadado","panda-dormido"];
  const grid = document.getElementById('grid');
  GIFS.forEach(name => {
    const fig = document.createElement('figure');
    fig.innerHTML = `<img src="${name}.gif" alt="${name}"><figcaption>${name.replace('panda-','')}</figcaption>`;
    grid.appendChild(fig);
  });
</script>
</html>
