    <text x="75" y="166" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="48" font-weight="800" text-anchor="middle">LA</text>
    <text x="178" y="150" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="42" font-weight="700">LowAI<tspan fill="#888888">.org</tspan></text>
    <text x="180" y="226" fill="#111111" font-size="17" font-weight="700">Pietre</text>
    <text x="180" y="250" fill="#666666" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 18 · code brackets ===== -->
  <g transform="translate(570,977.14) scale(1.08571)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <text x="40" y="162" fill="#111111" font-family="'Space Mono','DejaVu Sans Mono',monospace" font-size="40" font-weight="700"><tspan fill="#999999">&lt;</tspan>LowAI.org<tspan fill="#999999"> /&gt;</tspan></text>
    <text x="44" y="244" fill="#111111" font-family="'Space Mono',monospace" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="268" fill="#666666" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 19 · path / comment ===== -->
  <g transform="translate(0,1302.86) scale(1.08571)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <text x="40" y="162" fill="#111111" font-family="'Space Mono','DejaVu Sans Mono',monospace" font-size="40" font-weight="700"><tspan fill="#999999">~/</tspan>LowAI.org</text>
    <text x="44" y="244" fill="#111111" font-family="'Space Mono',monospace" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="268" fill="#666666" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 20 · ultra-minimal centered ===== -->
  <g transform="translate(570,1302.86) scale(1.08571)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <text x="262" y="78" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="26" font-weight="700" letter-spacing="1" text-anchor="middle">LowAI<tspan fill="#999999">.org</tspan></text>
    <text x="262" y="240" fill="#111111" font-size="16" font-weight="700" text-anchor="middle">Pietre</text>
    <text x="262" y="264" fill="#666666" font-size="14" text-anchor="middle">Pietre@lowai.org</text>
  </g>

  <!-- faint cut guides between cells (not margins) -->
  <g stroke="#e0e0e0" stroke-width="1">
    <line x1="570" y1="0" x2="570" y2="1629"/>
    <line x1="0" y1="325.71" x2="1140" y2="325.71"/>
    <line x1="0" y1="651.43" x2="1140" y2="651.43"/>
    <line x1="0" y1="977.14" x2="1140" y2="977.14"/>
    <line x1="0" y1="1302.86" x2="1140" y2="1302.86"/>
  </g>
