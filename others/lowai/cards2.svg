    <rect width="525" height="300" fill="#ffffff"/>
    <text x="40" y="196" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-weight="800"><tspan font-size="150">L</tspan><tspan font-size="58">owAI</tspan><tspan font-size="58" fill="#999999">.org</tspan></text>
    <text x="44" y="250" fill="#111111" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="274" fill="#666666" font-size="14">Pietre@lowai.org</text>
  </g>

