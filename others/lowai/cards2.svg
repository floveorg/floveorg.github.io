    <rect width="525" height="300" fill="#ffffff"/>
    <text transform="translate(72,272) rotate(-90)" fill="#111111" font-family="'Space Mono',monospace" font-size="40" font-weight="700">LowAI<tspan fill="#888888">.org</tspan></text>
    <line x1="104" y1="40" x2="104" y2="260" stroke="#dddddd" stroke-width="1.5"/>
    <text x="140" y="148" fill="#111111" font-family="'Space Mono',monospace" font-size="20" font-weight="700">Pietre</text>
    <text x="140" y="176" fill="#666666" font-family="'Space Mono',monospace" font-size="15">Pietre@lowai.org</text>
  </g>

