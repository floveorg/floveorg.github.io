<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="1629" viewBox="0 0 1140 1629" font-family="sans-serif">
  <defs>
    <clipPath id="card"><rect x="0" y="0" width="525" height="300"/></clipPath>
  </defs>

  <rect width="1140" height="1629" fill="#ffffff"/>

  <!-- ===== 11 · underline bar ===== -->
  <g transform="translate(0,0) scale(1.08571)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <text x="42" y="150" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="50" font-weight="800">LowAI<tspan fill="#999999">.org</tspan></text>
    <rect x="44" y="166" width="232" height="8" fill="#111111"/>
    <text x="44" y="248" fill="#111111" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="272" fill="#666666" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 12 · inner frame ===== -->
  <g transform="translate(570,0) scale(1.08571)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <rect x="24" y="24" width="477" height="252" rx="10" fill="none" stroke="#111111" stroke-width="2"/>
    <text x="52" y="132" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="44" font-weight="700">LowAI<tspan fill="#888888">.org</tspan></text>
    <text x="52" y="218" fill="#111111" font-size="17" font-weight="700">Pietre</text>
    <text x="52" y="242" fill="#666666" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 13 · circle LA monogram ===== -->
  <g transform="translate(0,325.71) scale(1.08571)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <circle cx="412" cy="150" r="56" fill="none" stroke="#111111" stroke-width="3"/>
    <text x="412" y="166" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="40" font-weight="800" text-anchor="middle">LA</text>
    <text x="42" y="150" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="44" font-weight="700">LowAI<tspan fill="#888888">.org</tspan></text>
    <text x="44" y="232" fill="#111111" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="256" fill="#666666" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 14 · receipt / dashed ticket ===== -->
  <g transform="translate(570,325.71) scale(1.08571)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <text x="42" y="98" fill="#111111" font-family="'Space Mono','DejaVu Sans Mono',monospace" font-size="34" font-weight="700">LowAI<tspan fill="#888888">.org</tspan></text>
    <line x1="42" y1="128" x2="483" y2="128" stroke="#111111" stroke-width="1.5" stroke-dasharray="6 5"/>
    <text x="42" y="180" fill="#111111" font-family="'Space Mono',monospace" font-size="16" font-weight="700">Pietre</text>
    <text x="42" y="206" fill="#666666" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
    <line x1="42" y1="236" x2="483" y2="236" stroke="#111111" stroke-width="1.5" stroke-dasharray="6 5"/>
  </g>

  <!-- ===== 15 · vertical sidebar wordmark ===== -->
