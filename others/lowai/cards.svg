<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="1680" viewBox="0 0 1140 1680" font-family="sans-serif">
  <defs>
    <clipPath id="card"><rect x="0" y="0" width="525" height="300" rx="18"/></clipPath>
  </defs>

  <rect width="1140" height="1680" fill="#e8e8e8"/>

  <!-- ===== 1 · terminal prompt ===== -->
  <g transform="translate(30,30)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <g fill="none" stroke="#bbbbbb" stroke-width="1.5"><circle cx="40" cy="40" r="6"/><circle cx="62" cy="40" r="6"/><circle cx="84" cy="40" r="6"/></g>
    <text x="40" y="160" fill="#111111" font-family="'Space Mono','DejaVu Sans Mono',monospace" font-size="38" font-weight="700"><tspan fill="#555555">$</tspan> LowAI<tspan fill="#888888">.org</tspan> ▮</text>
    <text x="42" y="250" fill="#111111" font-family="'Space Mono',monospace" font-size="17" font-weight="700">Pietre</text>
    <text x="42" y="274" fill="#666666" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 2 · LA badge ===== -->
  <g transform="translate(585,30)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <rect x="372" y="92" width="96" height="96" rx="22" fill="#111111"/>
    <text x="420" y="160" fill="#ffffff" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="52" font-weight="800" text-anchor="middle">LA</text>
    <text x="42" y="150" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="46" font-weight="700">LowAI<tspan fill="#888888">.org</tspan></text>
    <text x="44" y="250" fill="#111111" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="274" fill="#666666" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 3 · centered minimal ===== -->
  <g transform="translate(30,360)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <text x="262" y="140" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="50" font-weight="700" text-anchor="middle">LowAI<tspan fill="#888888">.org</tspan></text>
    <line x1="222" y1="168" x2="302" y2="168" stroke="#cccccc" stroke-width="1.5"/>
    <text x="262" y="232" fill="#111111" font-size="16" font-weight="700" text-anchor="middle">Pietre</text>
    <text x="262" y="256" fill="#666666" font-size="14" text-anchor="middle">Pietre@lowai.org</text>
  </g>

  <!-- ===== 4 · node mesh ===== -->
  <g transform="translate(585,360)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <g stroke="#bbbbbb" stroke-width="1.2" fill="none">
      <path d="M350,70 L430,110 L470,180 L400,230 L330,180 L350,70 M430,110 L330,180 M350,70 L400,230"/>
    </g>
    <g fill="#111111">
      <circle cx="350" cy="70" r="5"/><circle cx="430" cy="110" r="6"/><circle cx="470" cy="180" r="4.5"/>
      <circle cx="400" cy="230" r="5.5"/><circle cx="330" cy="180" r="4.5"/>
    </g>
    <text x="42" y="150" fill="#111111" font-family="'Space Mono',monospace" font-size="42" font-weight="700">LowAI<tspan fill="#888888">.org</tspan></text>
    <text x="44" y="250" fill="#111111" font-family="'Space Mono',monospace" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="274" fill="#666666" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 5 · big bold wordmark ===== -->
  <g transform="translate(30,690)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <text x="40" y="160" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="68" font-weight="800">LowAI<tspan fill="#999999">.org</tspan></text>
    <text x="44" y="252" fill="#111111" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="276" fill="#666666" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 6 · dot matrix ===== -->
  <g transform="translate(585,690)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <g fill="#111111">
      <circle cx="360" cy="70" r="5"/><circle cx="384" cy="70" r="5" opacity="0.8"/><circle cx="408" cy="70" r="5" opacity="0.55"/><circle cx="432" cy="70" r="5" opacity="0.3"/>
      <circle cx="360" cy="94" r="5" opacity="0.85"/><circle cx="384" cy="94" r="5" opacity="0.65"/><circle cx="408" cy="94" r="5" opacity="0.5"/><circle cx="432" cy="94" r="5" opacity="0.35"/><circle cx="456" cy="94" r="5" opacity="0.2"/>
      <circle cx="384" cy="118" r="5" opacity="0.55"/><circle cx="408" cy="118" r="5" opacity="0.4"/><circle cx="432" cy="118" r="5" opacity="0.28"/><circle cx="456" cy="118" r="5" opacity="0.18"/>
      <circle cx="408" cy="142" r="5" opacity="0.3"/><circle cx="432" cy="142" r="5" opacity="0.2"/>
    </g>
    <text x="42" y="150" fill="#111111" font-family="'Space Mono',monospace" font-size="42" font-weight="700">LowAI<tspan fill="#888888">.org</tspan></text>
    <text x="44" y="250" fill="#111111" font-family="'Space Mono',monospace" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="274" fill="#666666" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 7 · low-power battery ===== -->
  <g transform="translate(30,1020)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <g transform="translate(360,108)">
      <rect x="0" y="0" width="110" height="56" rx="10" fill="none" stroke="#111111" stroke-width="3"/>
      <rect x="114" y="18" width="8" height="20" rx="3" fill="#111111"/>
      <rect x="8" y="8" width="34" height="40" rx="4" fill="#111111"/>
    </g>
    <text x="42" y="150" fill="#111111" font-family="'Space Mono',monospace" font-size="42" font-weight="700">LowAI<tspan fill="#888888">.org</tspan></text>
    <text x="44" y="250" fill="#111111" font-family="'Space Mono',monospace" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="274" fill="#666666" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 8 · mono spaced + rules ===== -->
  <g transform="translate(585,1020)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <g stroke="#dddddd" stroke-width="1"><line x1="0" y1="78" x2="525" y2="78"/><line x1="0" y1="200" x2="525" y2="200"/></g>
    <text x="262" y="160" fill="#111111" font-family="'Space Mono',monospace" font-size="52" font-weight="700" letter-spacing="8" text-anchor="middle">LowAI</text>
    <text x="262" y="246" fill="#111111" font-family="'Space Mono',monospace" font-size="15" font-weight="700" text-anchor="middle">Pietre<tspan fill="#888888" font-weight="400">  ·  Pietre@lowai.org</tspan></text>
  </g>

  <!-- ===== 9 · hollow stroke wordmark ===== -->
  <g transform="translate(30,1350)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <text x="40" y="170" fill="none" stroke="#111111" stroke-width="1.4" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="76" font-weight="800">LowAI<tspan stroke="#999999">.org</tspan></text>
    <text x="44" y="252" fill="#111111" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="276" fill="#666666" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 10 · right-aligned statement ===== -->
  <g transform="translate(585,1350)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#ffffff"/>
    <line x1="483" y1="60" x2="483" y2="240" stroke="#dddddd" stroke-width="1.5"/>
    <text x="465" y="150" fill="#111111" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="58" font-weight="800" text-anchor="end">LowAI<tspan fill="#999999">.org</tspan></text>
    <text x="465" y="234" fill="#111111" font-size="17" font-weight="700" text-anchor="end">Pietre</text>
    <text x="465" y="258" fill="#666666" font-size="14" text-anchor="end">Pietre@lowai.org</text>
  </g>
</svg>
