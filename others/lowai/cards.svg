<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="1680" viewBox="0 0 1140 1680" font-family="sans-serif">
  <defs>
    <linearGradient id="la" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6c5ce7"/>
      <stop offset="1" stop-color="#00e676"/>
    </linearGradient>
    <linearGradient id="lac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6c5ce7"/>
      <stop offset="0.5" stop-color="#00bcd4"/>
      <stop offset="1" stop-color="#00e676"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6c5ce7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00e676" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#00e676" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="14"/></filter>
    <clipPath id="card"><rect x="0" y="0" width="525" height="300" rx="18"/></clipPath>
  </defs>

  <rect width="1140" height="1680" fill="#141019"/>

  <!-- ===== 1 · terminal prompt ===== -->
  <g transform="translate(30,30)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#0a0a0f"/>
    <g fill="#2a2a3a"><circle cx="40" cy="40" r="6"/><circle cx="62" cy="40" r="6"/><circle cx="84" cy="40" r="6"/></g>
    <text x="40" y="150" fill="#e4e4e7" font-family="'Space Mono','DejaVu Sans Mono',monospace" font-size="40" font-weight="700"><tspan fill="#00e676">$</tspan> lowai<tspan fill="#6c5ce7">.org</tspan><tspan fill="#00e676"> ▮</tspan></text>
    <text x="42" y="186" fill="#888899" font-family="'Space Mono',monospace" font-size="15"># Enough is a feature</text>
    <text x="42" y="250" fill="#e4e4e7" font-family="'Space Mono',monospace" font-size="17" font-weight="700">Pietre</text>
    <text x="42" y="274" fill="#888899" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 2 · LA badge ===== -->
  <g transform="translate(585,30)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#0a0a0f"/>
    <circle cx="420" cy="150" r="120" fill="url(#glow)" filter="url(#soft)"/>
    <rect x="372" y="92" width="96" height="96" rx="22" fill="url(#la)"/>
    <text x="420" y="160" fill="#ffffff" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="52" font-weight="800" text-anchor="middle">LA</text>
    <text x="42" y="120" fill="#e4e4e7" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="46" font-weight="700">lowai<tspan fill="#6c5ce7">.org</tspan></text>
    <text x="44" y="148" fill="#888899" font-size="15" letter-spacing="1">local · free · frugal AI</text>
    <text x="44" y="250" fill="#e4e4e7" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="274" fill="#888899" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 3 · frugal light ===== -->
  <g transform="translate(30,360)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#f4f4f5"/>
    <rect x="42" y="60" width="36" height="6" rx="3" fill="url(#la)"/>
    <text x="42" y="150" fill="#16161d" font-family="'Space Mono',monospace" font-size="34" font-weight="700">Enough is</text>
    <text x="42" y="190" fill="#6c5ce7" font-family="'Space Mono',monospace" font-size="34" font-weight="700">a feature.</text>
    <text x="44" y="250" fill="#16161d" font-family="'Space Mono',monospace" font-size="16" font-weight="700">lowai.org · Pietre</text>
    <text x="44" y="274" fill="#6a6a78" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 4 · node mesh (libp2p) ===== -->
  <g transform="translate(585,360)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#0a0a0f"/>
    <g stroke="#00bcd4" stroke-width="1.2" stroke-opacity="0.55" fill="none">
      <path d="M350,70 L430,110 L470,180 L400,230 L330,180 L350,70 M430,110 L330,180 M350,70 L400,230"/>
    </g>
    <g fill="#00e676">
      <circle cx="350" cy="70" r="5"/><circle cx="430" cy="110" r="6"/><circle cx="470" cy="180" r="4.5"/>
      <circle cx="400" cy="230" r="5.5"/><circle cx="330" cy="180" r="4.5"/>
    </g>
    <circle cx="430" cy="150" r="100" fill="url(#glowg)" filter="url(#soft)"/>
    <text x="42" y="120" fill="#e4e4e7" font-family="'Space Mono',monospace" font-size="42" font-weight="700">lowai<tspan fill="#00bcd4">.org</tspan></text>
    <text x="44" y="148" fill="#888899" font-family="'Space Mono',monospace" font-size="14" letter-spacing="1">on the nety network</text>
    <text x="44" y="250" fill="#e4e4e7" font-family="'Space Mono',monospace" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="274" fill="#888899" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 5 · gradient wordmark ===== -->
  <g transform="translate(30,690)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#0a0a0f"/>
    <text x="40" y="160" fill="url(#lac)" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="78" font-weight="800">lowai</text>
    <text x="44" y="196" fill="#888899" font-size="15" letter-spacing="3">LOCAL, FREE AND FRUGAL AI</text>
    <text x="44" y="252" fill="#e4e4e7" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="276" fill="#888899" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 6 · dot matrix ===== -->
  <g transform="translate(585,690)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#0a0a0f"/>
    <g>
      <circle cx="360" cy="70" r="5" fill="#6c5ce7"/><circle cx="384" cy="70" r="5" fill="#6c5ce7" opacity="0.7"/><circle cx="408" cy="70" r="5" fill="#7a6fe0" opacity="0.5"/><circle cx="432" cy="70" r="5" fill="#00bcd4" opacity="0.4"/>
      <circle cx="360" cy="94" r="5" fill="#6c5ce7" opacity="0.8"/><circle cx="384" cy="94" r="5" fill="#3aa0d8"/><circle cx="408" cy="94" r="5" fill="#00bcd4" opacity="0.7"/><circle cx="432" cy="94" r="5" fill="#00d18a" opacity="0.6"/><circle cx="456" cy="94" r="5" fill="#00e676" opacity="0.4"/>
      <circle cx="384" cy="118" r="5" fill="#00bcd4" opacity="0.7"/><circle cx="408" cy="118" r="5" fill="#00d18a"/><circle cx="432" cy="118" r="5" fill="#00e676" opacity="0.8"/><circle cx="456" cy="118" r="5" fill="#00e676" opacity="0.5"/>
      <circle cx="408" cy="142" r="5" fill="#00e676" opacity="0.7"/><circle cx="432" cy="142" r="5" fill="#00e676" opacity="0.5"/>
    </g>
    <text x="42" y="120" fill="#e4e4e7" font-family="'Space Mono',monospace" font-size="42" font-weight="700">lowai<tspan fill="#00e676">.org</tspan></text>
    <text x="44" y="148" fill="#888899" font-family="'Space Mono',monospace" font-size="14">runs on less</text>
    <text x="44" y="250" fill="#e4e4e7" font-family="'Space Mono',monospace" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="274" fill="#888899" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 7 · low-power battery ===== -->
  <g transform="translate(30,1020)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#0a0a0f"/>
    <g transform="translate(360,108)">
      <rect x="0" y="0" width="110" height="56" rx="10" fill="none" stroke="#888899" stroke-width="3"/>
      <rect x="114" y="18" width="8" height="20" rx="3" fill="#888899"/>
      <rect x="8" y="8" width="30" height="40" rx="4" fill="#00e676"/>
    </g>
    <text x="42" y="120" fill="#e4e4e7" font-family="'Space Mono',monospace" font-size="42" font-weight="700">lowai<tspan fill="#6c5ce7">.org</tspan></text>
    <text x="44" y="148" fill="#888899" font-family="'Space Mono',monospace" font-size="14">enough charge. frugal by design</text>
    <text x="44" y="250" fill="#e4e4e7" font-family="'Space Mono',monospace" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="274" fill="#888899" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 8 · mono blocks ===== -->
  <g transform="translate(585,1020)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#12121a"/>
    <g stroke="#1e1e2e" stroke-width="1">
      <line x1="0" y1="60" x2="525" y2="60"/><line x1="0" y1="240" x2="525" y2="240"/>
    </g>
    <text x="42" y="170" fill="#e4e4e7" font-family="'Space Mono',monospace" font-size="60" font-weight="700" letter-spacing="8">l<tspan fill="#6c5ce7">o</tspan>w<tspan fill="#00e676">a</tspan>i</text>
    <text x="44" y="100" fill="#888899" font-family="'Space Mono',monospace" font-size="13" letter-spacing="3">EPHEMERAL BY DESIGN</text>
    <text x="44" y="272" fill="#e4e4e7" font-family="'Space Mono',monospace" font-size="15" font-weight="700">Pietre<tspan fill="#888899" font-weight="400">  ·  Pietre@lowai.org</tspan></text>
  </g>

  <!-- ===== 9 · hollow stroke wordmark ===== -->
  <g transform="translate(30,1350)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#0a0a0f"/>
    <text x="40" y="165" fill="none" stroke="url(#lac)" stroke-width="1.4" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="80" font-weight="800">lowai</text>
    <text x="44" y="200" fill="#888899" font-size="15" letter-spacing="2">low by design</text>
    <text x="44" y="252" fill="#e4e4e7" font-size="17" font-weight="700">Pietre</text>
    <text x="44" y="276" fill="#888899" font-size="14">Pietre@lowai.org</text>
  </g>

  <!-- ===== 10 · statement (light, max whitespace) ===== -->
  <g transform="translate(585,1350)" clip-path="url(#card)">
    <rect width="525" height="300" fill="#f4f4f5"/>
    <text x="40" y="170" fill="#16161d" font-family="'Fredoka','Trebuchet MS',sans-serif" font-size="92" font-weight="800">enough<tspan fill="#6c5ce7">.</tspan></text>
    <text x="44" y="210" fill="#6a6a78" font-family="'Space Mono',monospace" font-size="14" letter-spacing="2">lowai.org</text>
    <text x="44" y="272" fill="#16161d" font-family="'Space Mono',monospace" font-size="15" font-weight="700">Pietre<tspan fill="#6a6a78" font-weight="400">  ·  Pietre@lowai.org</tspan></text>
  </g>
</svg>
