<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="210mm" height="297mm" viewBox="0 0 210 297" font-family="sans-serif">
  <defs>
    <clipPath id="cardclip"><rect x="0" y="0" width="525" height="300" rx="18"/></clipPath>
    <g id="card">
      <g clip-path="url(#cardclip)">
        <rect width="525" height="300" fill="#ffffff"/>
        <g stroke="#bbbbbb" stroke-width="1.2" fill="none">
          <path d="M350,70 L430,110 L470,180 L400,230 L330,180 L350,70 M430,110 L330,180 M350,70 L400,230"/>
        </g>
        <g fill="#111111">
          <circle cx="350" cy="70" r="5"/><circle cx="430" cy="110" r="6"/><circle cx="470" cy="180" r="4.5"/>
          <circle cx="400" cy="230" r="5.5"/><circle cx="330" cy="180" r="4.5"/>
        </g>
        <text x="42" y="150" fill="#111111" font-family="'Space Mono','DejaVu Sans Mono',monospace" font-size="42" font-weight="700">LowAI<tspan fill="#888888">.org</tspan></text>
        <text x="44" y="250" fill="#111111" font-family="'Space Mono',monospace" font-size="17" font-weight="700">Pietre</text>
        <text x="44" y="274" fill="#666666" font-family="'Space Mono',monospace" font-size="14">Pietre@lowai.org</text>
      </g>
    </g>
  </defs>

  <rect width="210" height="297" fill="#ffffff"/>

  <!-- 3 columns x 7 rows, flush (no margins): card 525u -> 70mm (scale 0.13333 -> 40mm tall) -->
  <use xlink:href="#card" href="#card" transform="translate(0,8.5) scale(0.13333)"/>
  <use xlink:href="#card" href="#card" transform="translate(70,8.5) scale(0.13333)"/>
  <use xlink:href="#card" href="#card" transform="translate(140,8.5) scale(0.13333)"/>
