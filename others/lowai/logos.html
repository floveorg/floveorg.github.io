<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lowai · athenea — logos</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230d1430'/%3E%3Ccircle cx='37' cy='50' r='14' fill='%23efe9d8'/%3E%3Ccircle cx='63' cy='50' r='14' fill='%23efe9d8'/%3E%3Ccircle cx='37' cy='50' r='5' fill='%230d1430'/%3E%3Ccircle cx='63' cy='50' r='5' fill='%230d1430'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Fredoka:wght@500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{ background:#0a0b0d;font-family:"Space Mono",monospace;color:#cfd2cc;
    padding:clamp(1.2rem,4vw,2.6rem);display:flex;flex-direction:column;gap:1.4rem; }
  .brand{ border-radius:24px;padding:clamp(1.8rem,5vw,3.4rem);background:var(--bg);color:var(--ink); }
  .lowai  { --bg:#f1efe7;--ink:#1d211c;--sub:#8d9286;--accent:#4f7a4a;--card:#fbfaf6;--line:#e1ded2; }
  .athenea{ --bg:#0d1430;--ink:#efe9d8;--sub:#7b80a0;--accent:#d4af37;--card:#121a3a;--line:#222a4d; }

  /* ---- main lowai wordmark (above all) ---- */
  .lowai{ text-align:center; }
  .lowai .wm{ font-family:"Space Mono",monospace;font-weight:700;
    font-size:clamp(3rem,12vw,7rem);letter-spacing:-.05em;line-height:1; }
  .lowai .wm i{ color:var(--accent);font-style:normal; }
  .lowai .kicker{ margin-top:1rem;font-size:.62rem;letter-spacing:.4em;text-transform:uppercase;color:var(--sub); }

  /* ---- athenea marks ---- */
  .sec{ font-size:.6rem;letter-spacing:.36em;text-transform:uppercase;color:var(--sub);
    margin:0 0 1.2rem;display:flex;align-items:center;gap:1rem; }
  .sec::after{ content:"";flex:1;height:1px;background:var(--line); }
  .grid{ display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;
    background:var(--line);border:1px solid var(--line);border-radius:16px;overflow:hidden; }
  .card{ background:var(--card);aspect-ratio:1/1;position:relative;display:grid;place-items:center;overflow:hidden; }
  .card svg{ width:54%;height:54%;overflow:visible; }
  .clab{ position:absolute;left:.85rem;bottom:.8rem;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sub); }
  .clab b{ color:var(--accent);font-weight:400; }

  /* shared keyframes */
  @keyframes blink{ 0%,90%{transform:scaleY(0);} 94%{transform:scaleY(1);} 97%{transform:scaleY(0);} 100%{transform:scaleY(0);} }
  @keyframes riseC{ 0%{transform:scaleY(0);} 30%,80%{transform:scaleY(1);} 100%{transform:scaleY(0);} }
  @keyframes fadeP{ 0%,18%{opacity:0;} 40%,80%{opacity:1;} 100%{opacity:0;} }

  /* owl letter-eyes (o + a) */
  .owlt text{ fill:var(--accent); }
  .owlt .pupil{ fill:var(--bg); }
  .owlt .tuft,.owlt .beak{ fill:var(--accent); }
  .owlt .badge{ fill:rgba(255,255,255,.03);stroke:var(--accent);stroke-width:2.6; }
  .owlt .lid{ fill:var(--bg);transform-box:fill-box;transform-origin:50% 0;transform:scaleY(0);animation:blink 4s ease-in-out infinite; }
  .owlt .lid.b{ animation-delay:.06s; }
  .owlt1 text{ font-family:"Fredoka",sans-serif;font-weight:600;font-size:40px; }
  .owlt3 text{ font-family:"Cormorant Garamond",serif;font-weight:600;font-size:32px; }

  /* temple (original) */
  .a-temple .ped{ fill:none;stroke:var(--accent);stroke-width:2.6;stroke-linejoin:round;animation:fadeP 3s ease-in-out infinite; }
  .a-temple .base{ stroke:var(--accent);stroke-width:3;stroke-linecap:round; }
  .a-temple .col{ stroke:var(--accent);stroke-width:4;stroke-linecap:round;transform-box:fill-box;transform-origin:bottom;animation:riseC 3s ease-in-out infinite; }
  .a-temple .col:nth-of-type(2){animation-delay:.1s}.a-temple .col:nth-of-type(3){animation-delay:.2s}.a-temple .col:nth-of-type(4){animation-delay:.3s}

  @media (prefers-reduced-motion:reduce){ *{animation:none !important;} .lid{transform:scaleY(0)!important;} }
</style>
</head>
<body>

<!-- ===== main lowai wordmark ===== -->
<section class="brand lowai">
  <div class="wm">low<i>ai</i></div>
  <div class="kicker">lightweight intelligence</div>
</section>

<!-- ===== athenea marks: 2 owl letter-eyes + temple ===== -->
<section class="brand athenea">
  <p class="sec">marks</p>
  <div class="grid">

    <div class="card"><svg viewBox="0 0 100 100" class="owlt owlt1"><polygon class="tuft" points="28,34 40,44 26,44"/><polygon class="tuft" points="72,34 74,44 60,44"/><text text-anchor="middle" x="34" y="62">o</text><text text-anchor="middle" x="66" y="62">a</text><circle class="pupil" cx="34" cy="51" r="4"/><circle class="pupil" cx="63" cy="53" r="4"/><polygon class="beak" points="50,54 45,61 55,61"/><ellipse class="lid" cx="34" cy="50" rx="14" ry="15"/><ellipse class="lid b" cx="65" cy="50" rx="14" ry="15"/></svg><span class="clab"><b>owl</b> · o·a monogram</span></div>

    <div class="card"><svg viewBox="0 0 100 100" class="owlt owlt3"><circle class="badge" cx="50" cy="52" r="34"/><polygon class="tuft" points="30,26 42,36 28,38"/><polygon class="tuft" points="70,26 72,38 58,36"/><text text-anchor="middle" x="38" y="58">o</text><text text-anchor="middle" x="62" y="58">a</text><circle class="pupil" cx="38" cy="49" r="3.2"/><circle class="pupil" cx="61" cy="51" r="3.2"/><polygon class="beak" points="50,52 46,59 54,59"/><ellipse class="lid" cx="38" cy="48" rx="11" ry="12"/><ellipse class="lid b" cx="62" cy="48" rx="11" ry="12"/></svg><span class="clab"><b>owl</b> · serif badge</span></div>

    <div class="card"><svg viewBox="0 0 100 100" class="a-temple"><polygon class="ped" points="50,22 24,44 76,44"/><line class="col" x1="32" y1="46" x2="32" y2="76"/><line class="col" x1="44" y1="46" x2="44" y2="76"/><line class="col" x1="56" y1="46" x2="56" y2="76"/><line class="col" x1="68" y1="46" x2="68" y2="76"/><line class="base" x1="26" y1="78" x2="74" y2="78"/></svg><span class="clab"><b>temple</b></span></div>

  </div>
</section>

</body>
</html>
