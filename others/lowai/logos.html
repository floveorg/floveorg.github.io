<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lowai · athenea — logos</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230d1430'/%3E%3Ccircle cx='37' cy='50' r='14' fill='%23efe9d8'/%3E%3Ccircle cx='63' cy='50' r='14' fill='%23efe9d8'/%3E%3Ccircle cx='37' cy='50' r='5' fill='%230d1430'/%3E%3Ccircle cx='63' cy='50' r='5' fill='%230d1430'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#0a0b0d;
    font-family:"Space Mono",monospace;
    color:#cfd2cc;
    padding:clamp(1.4rem,5vw,3rem);
    display:flex;flex-direction:column;gap:1.6rem;
  }
  .brand{
    border-radius:24px;
    padding:clamp(1.8rem,5vw,3.4rem);
    background:var(--bg);
    color:var(--ink);
  }

  /* ---- LOWAI palette: light, low-key ---- */
  .lowai{ --bg:#f1efe7; --ink:#1d211c; --sub:#8d9286; --accent:#4f7a4a;
          --card:#fbfaf6; --line:#e1ded2; }
  /* ---- ATHENEA palette: midnight + gold ---- */
  .athenea{ --bg:#0d1430; --ink:#efe9d8; --sub:#7b80a0; --accent:#d4af37;
            --card:#121a3a; --line:#222a4d; }

  .head{ display:flex;align-items:baseline;justify-content:space-between;
    flex-wrap:wrap;gap:.6rem;margin-bottom:2rem; }
  .wm{ line-height:1; }

  /* lowai wordmark */
  .lowai .wm{ font-family:"Space Mono",monospace;font-weight:700;
    font-size:clamp(2.2rem,7vw,3.6rem);letter-spacing:-.04em; }
  .lowai .wm i{ color:var(--accent);font-style:normal; }
  .lowai .wm .dot{ color:var(--accent); }

  /* athenea wordmark */
  .athenea .wm{ font-family:"Cormorant Garamond",serif;font-weight:600;
    font-size:clamp(2.6rem,8vw,4.4rem);letter-spacing:.06em;color:var(--ink); }
  .athenea .wm b{ color:var(--accent);font-weight:600; }

  .kicker{ font-size:.6rem;letter-spacing:.34em;text-transform:uppercase;color:var(--sub); }

  .specimen{ display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1.1rem; }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    aspect-ratio:4/3;position:relative;display:grid;place-items:center;overflow:hidden;
  }
  .card svg{ width:46%;height:46%;overflow:visible; }
  .card.lockup{ grid-column:span 1; }
  .clab{ position:absolute;left:.85rem;bottom:.8rem;
    font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--sub); }
  .clab b{ color:var(--accent);font-weight:400; }

  /* lockup row */
  .lock{ display:flex;align-items:center;gap:.7rem; width:auto;height:auto; }
  .lock svg{ width:46px;height:46px; }
  .lock .lw{ line-height:1; }
  .lowai .lock .lw{ font-family:"Space Mono",monospace;font-weight:700;font-size:1.5rem;letter-spacing:-.04em;color:var(--ink); }
  .lowai .lock .lw i{ color:var(--accent);font-style:normal; }
  .athenea .lock .lw{ font-family:"Cormorant Garamond",serif;font-weight:600;font-size:1.9rem;letter-spacing:.05em;color:var(--ink); }
  .athenea .lock .lw b{ color:var(--accent); }

  /* ===================== LOWAI MARK — low equaliser ===================== */
  .eq rect{ fill:var(--accent); }
  .eq .base{ fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;opacity:.4; }
  .eq.live rect.bar{ transform-box:fill-box;transform-origin:bottom;
    animation:eq 2.6s ease-in-out infinite; }
  .eq.live rect.bar:nth-of-type(1){animation-delay:0s;animation-duration:2.4s;}
  .eq.live rect.bar:nth-of-type(2){animation-delay:.35s;animation-duration:3s;}
  .eq.live rect.bar:nth-of-type(3){animation-delay:.15s;animation-duration:2.7s;}
  .eq.live rect.bar:nth-of-type(4){animation-delay:.5s;animation-duration:3.2s;}
  .eq.live rect.bar:nth-of-type(5){animation-delay:.2s;animation-duration:2.5s;}
  @keyframes eq{ 0%,100%{transform:scaleY(.55);} 50%{transform:scaleY(1.05);} }

  /* ===================== ATHENEA MARK — owl ===================== */
  .owl .ring{ fill:rgba(255,255,255,.02);stroke:var(--accent);stroke-width:2.4; }
  .owl .tuft{ fill:var(--accent); }
  .owl .brow{ fill:none;stroke:var(--accent);stroke-width:2.2;stroke-linecap:round; }
  .owl .eye{ fill:#efe9d8;stroke:var(--accent);stroke-width:2; }
  .owl .pupil{ fill:#0d1430; }
  .owl .beak{ fill:var(--accent); }
  .owl .lid{ fill:#0d1430;transform-box:fill-box;transform-origin:50% 0%;transform:scaleY(0); }

  .owl.live .lid{ animation:blink 4.6s ease-in-out infinite; }
  .owl.live .lid.r{ animation-delay:.04s; }
  @keyframes blink{ 0%,90%{transform:scaleY(0);} 94%{transform:scaleY(1);} 97%{transform:scaleY(0);} 100%{transform:scaleY(0);} }
  .owl.live .gaze{ animation:gaze 6.5s ease-in-out infinite; }
  @keyframes gaze{ 0%,18%{transform:translateX(0);} 34%,52%{transform:translateX(4px);} 68%,86%{transform:translateX(-3px);} 100%{transform:translateX(0);} }
  .owl.live .eye{ animation:owlglow 4.5s ease-in-out infinite; }
  @keyframes owlglow{ 0%,100%{filter:none;} 50%{filter:drop-shadow(0 0 5px rgba(212,175,55,.55));} }

  @media (prefers-reduced-motion:reduce){ *{animation:none !important;} .owl .lid{transform:scaleY(0) !important;} }
</style>
</head>
<body>

<!-- ============================ LOWAI ============================ -->

    </div>

  </div>
</section>
