<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lowai · athenea — logo demos</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230d1430'/%3E%3Ccircle cx='37' cy='50' r='14' fill='%23efe9d8'/%3E%3Ccircle cx='63' cy='50' r='14' fill='%23efe9d8'/%3E%3Ccircle cx='37' cy='50' r='5' fill='%230d1430'/%3E%3Ccircle cx='63' cy='50' r='5' fill='%230d1430'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{ background:#0a0b0d;font-family:"Space Mono",monospace;color:#cfd2cc;
    padding:clamp(1.2rem,4vw,2.6rem);display:flex;flex-direction:column;gap:1.4rem; }
  .brand{ border-radius:24px;padding:clamp(1.6rem,4vw,3rem);background:var(--bg);color:var(--ink); }
  .lowai  { --bg:#f1efe7;--ink:#1d211c;--sub:#8d9286;--accent:#4f7a4a;--card:#fbfaf6;--line:#e1ded2; }
  .athenea{ --bg:#0d1430;--ink:#efe9d8;--sub:#7b80a0;--accent:#d4af37;--card:#121a3a;--line:#222a4d; }

  .sec{ font-size:.62rem;letter-spacing:.34em;text-transform:uppercase;color:var(--sub);
    margin:0 0 1.2rem;display:flex;align-items:center;gap:1rem; }
  .sec b{ color:var(--accent);font-weight:400; }
  .sec::after{ content:"";flex:1;height:1px;background:var(--line); }

  .grid{ display:grid;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:16px;overflow:hidden; }
  .grid.word{ grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); }
  .grid.sq{ grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); }
  .card{ background:var(--card);position:relative;display:grid;place-items:center;overflow:hidden; }
  .grid.word .card{ aspect-ratio:3/2; } .grid.word .logo{ width:84%; }
  .grid.sq .card{ aspect-ratio:1/1; } .grid.sq .logo{ width:58%; }
  .logo{ height:auto;overflow:visible;transform-origin:center; }
  .clab{ position:absolute;left:.8rem;bottom:.7rem;font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sub); }
  .clab b{ color:var(--accent);font-weight:400; }

  /* ---- logo styling ---- */
  .wmA{ font-family:"Space Mono",monospace;font-weight:700;font-size:46px;fill:var(--ink);letter-spacing:-2px; }
  .wmA .ac{ fill:var(--accent); }
  .wmB{ font-family:"Space Mono",monospace;font-weight:700;font-size:46px;fill:var(--ink); }
  .owl .tuft,.owl .beak,.owl .pupil{ fill:var(--accent); }
  .owl .lid{ fill:var(--card);transform-box:fill-box;transform-origin:50% 0;transform:scaleY(0);animation:blink 4.2s ease-in-out infinite; }
  .owl .lid.b{ animation-delay:.06s; }
  .temple .ped{ fill:none;stroke:var(--accent);stroke-width:2.6;stroke-linejoin:round; }
  .temple .col{ stroke:var(--accent);stroke-width:4;stroke-linecap:round; }
  .temple .base{ stroke:var(--accent);stroke-width:3;stroke-linecap:round; }

  /* ---- 10 demo animations (applied to the whole logo) ---- */
  @keyframes blink{ 0%,90%{transform:scaleY(0);} 94%{transform:scaleY(1);} 97%{transform:scaleY(0);} 100%{transform:scaleY(0);} }
  @keyframes d_fade{ 0%{opacity:0} 15%,80%{opacity:1} 100%{opacity:0} }
  @keyframes d_zoom{ 0%{opacity:0;transform:scale(.4)} 20%,75%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(.4)} }
  @keyframes d_rise{ 0%{opacity:0;transform:translateY(26px)} 20%,75%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-26px)} }
  @keyframes d_drop{ 0%{opacity:0;transform:translateY(-42px)} 12%{opacity:1} 32%{transform:translateY(0)} 42%{transform:translateY(-8px)} 52%{transform:translateY(0)} 80%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-42px)} }
  @keyframes d_glow{ 0%,100%{filter:drop-shadow(0 0 0 transparent)} 50%{filter:drop-shadow(0 0 7px var(--accent))} }
  @keyframes d_breathe{ 0%,100%{transform:scale(.92)} 50%{transform:scale(1.05)} }
  @keyframes d_neon{ 0%,30%{opacity:1} 32%{opacity:.22} 34%{opacity:1} 60%{opacity:1} 62%{opacity:.3} 64%{opacity:1} 90%{opacity:1} 92%{opacity:.2} 94%{opacity:1} }
  @keyframes d_swing{ 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
  @keyframes d_blur{ 0%{opacity:0;filter:blur(10px)} 25%,75%{opacity:1;filter:blur(0)} 100%{opacity:0;filter:blur(10px)} }
  @keyframes d_slide{ 0%{opacity:0;transform:translateX(-46px)} 20%,75%{opacity:1;transform:translateX(0)} 100%{opacity:0;transform:translateX(46px)} }
  .d-fade{ animation:d_fade 3.4s ease-in-out infinite; }
  .d-zoom{ animation:d_zoom 3.4s ease-in-out infinite; }
  .d-rise{ animation:d_rise 3.4s ease-in-out infinite; }
  .d-drop{ animation:d_drop 3s ease-in-out infinite; }
  .d-glow{ animation:d_glow 2.6s ease-in-out infinite; }
  .d-breathe{ animation:d_breathe 3s ease-in-out infinite; }
  .d-neon{ animation:d_neon 4s linear infinite; }
  .d-swing{ animation:d_swing 3s ease-in-out infinite; }
  .d-blur{ animation:d_blur 3.4s ease-in-out infinite; }
  .d-slide{ animation:d_slide 3.4s ease-in-out infinite; }

  @media (prefers-reduced-motion:reduce){ *{animation:none !important;} .lid{transform:scaleY(0)!important;} }
</style>
</head>
