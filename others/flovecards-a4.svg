<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 210 297" font-family="sans-serif">
  <defs>
    <linearGradient id="flove" x1="12" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3344"/>
      <stop offset=".5" stop-color="#ff8a3a"/>
      <stop offset="1" stop-color="#ffd633"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd6a8" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffd6a8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="14"/></filter>

    <!-- one flove.org card, reused across the sheet -->
    <symbol id="card" viewBox="0 0 525 300">
      <rect x="0.5" y="0.5" width="524" height="299" rx="22" fill="#fffdfb" stroke="#ece6df" stroke-width="1"/>
      <g clip-path="url(#cardclip)">
        <circle cx="402" cy="150" r="118" fill="url(#halo)" filter="url(#soft)"/>
        <g transform="translate(322,68) scale(1.62)">
          <path d="M50 60 C 22 60, 12 38, 16 18 C 38 22, 54 38, 50 60 Z" fill="url(#flove)"/>
          <path d="M50 60 C 78 60, 88 38, 84 18 C 62 22, 46 38, 50 60 Z" fill="url(#flove)"/>
          <path d="M50 58 C 50 72, 50 84, 50 92" stroke="url(#flove)" stroke-width="5" stroke-linecap="round" fill="none"/>
        </g>
        <text x="42" y="120" fill="#2b2733" font-family="'Trebuchet MS', sans-serif" font-size="50" font-weight="bold" letter-spacing="-0.5">flove<tspan fill="#c08a5a" font-weight="normal" font-size="32">.org</tspan></text>
        <text x="44" y="150" fill="#9a8f86" font-size="15" letter-spacing="3">All near</text>
        <text x="44" y="245" fill="#2b2733" font-size="16.5" font-weight="bold" letter-spacing="2">665 026 106</text>
        <text x="44" y="269" fill="#5a5249" font-size="15" font-weight="bold">marc@flove.org</text>
      </g>
    </symbol>
    <clipPath id="cardclip"><rect x="0" y="0" width="525" height="300" rx="22"/></clipPath>
  </defs>

  <rect width="210" height="297" fill="#ffffff"/>

  <!-- 2 columns x 5 rows of cards (88 x 50.3 mm), centered on A4 -->
  <use href="#card" x="11" y="13.6"  width="88" height="50.3"/>
  <use href="#card" x="111" y="13.6"  width="88" height="50.3"/>
  <use href="#card" x="11" y="68.9"  width="88" height="50.3"/>
  <use href="#card" x="111" y="68.9"  width="88" height="50.3"/>
  <use href="#card" x="11" y="124.2" width="88" height="50.3"/>
  <use href="#card" x="111" y="124.2" width="88" height="50.3"/>
  <use href="#card" x="11" y="179.5" width="88" height="50.3"/>
  <use href="#card" x="111" y="179.5" width="88" height="50.3"/>
  <use href="#card" x="11" y="234.8" width="88" height="50.3"/>
  <use href="#card" x="111" y="234.8" width="88" height="50.3"/>
</svg>
