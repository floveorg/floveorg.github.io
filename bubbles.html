<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="author" content="Marc (marcflove)" />
<title>✺ flove · Bubbles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* tokens — shared with flove/index.html & docs/index.html */
:root {
  --bg-1:#fff8f1; --bg-2:#f4f1ff; --bg-3:#effdf7;
  --ink:#1a1820; --mut:#6a6478;
  --dream-1:#ff8aae; --dream-2:#8ab4ff; --dream-3:#b48aff; --dream-4:#8affd0; --dream-5:#ffd28a;
}
* { box-sizing:border-box; }
html, body { height:100%; margin:0; }
body {
  font-family:'Inter',system-ui,sans-serif; color:var(--ink);
  /* the flove background effect (radial gradients) */
  background:
    radial-gradient(1100px 700px at 110% -10%, var(--bg-3) 0, transparent 55%),
    radial-gradient(900px 600px at -10% 110%, var(--bg-2) 0, transparent 55%),
    var(--bg-1);
  min-height:100svh; overflow:hidden; -webkit-font-smoothing:antialiased;
}

/* ── dreamy drifting blobs (the flove/index.html background ballet) ── */
.dream-veil { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.dream-blob {
  position:absolute; width:80vmax; height:80vmax; border-radius:50%;
  filter:blur(80px); mix-blend-mode:multiply; opacity:.5; will-change:transform;
}
.dream-blob.b1 { background:radial-gradient(circle, var(--dream-1) 0, transparent 65%); top:-30%; left:-25%;  animation:drift1 26s ease-in-out infinite; }
.dream-blob.b2 { background:radial-gradient(circle, var(--dream-2) 0, transparent 65%); top: 10%; right:-30%; animation:drift2 32s ease-in-out infinite; }
.dream-blob.b3 { background:radial-gradient(circle, var(--dream-3) 0, transparent 65%); bottom:-30%; left:5%; animation:drift3 28s ease-in-out infinite; }
.dream-blob.b4 { background:radial-gradient(circle, var(--dream-4) 0, transparent 65%); top: 45%; left:35%;   animation:drift4 24s ease-in-out infinite; }
.dream-blob.b5 { background:radial-gradient(circle, var(--dream-5) 0, transparent 65%); bottom:10%; right:10%;animation:drift5 36s ease-in-out infinite; }
@keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)}    50%{transform:translate(18vw,12vh) scale(1.25)} }
@keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1.05)} 50%{transform:translate(-14vw,16vh) scale(.85)} }
@keyframes drift3 { 0%,100%{transform:translate(0,0) scale(1)}    50%{transform:translate(12vw,-14vh) scale(1.18)} }
@keyframes drift4 { 0%,100%{transform:translate(-6vw,6vh) scale(.95)} 50%{transform:translate(10vw,-10vh) scale(1.2)} }
@keyframes drift5 { 0%,100%{transform:translate(0,0) scale(1)}    50%{transform:translate(-16vw,-12vh) scale(1.1)} }

/* ── floating bubbles (physics cloud, ported from wanty.html) ── */
.bubble-cloud { position:fixed; inset:0; z-index:2; }
.bubble {
  position:absolute; left:0; top:0; will-change:left,top;
  display:flex; align-items:center; justify-content:center; text-align:center;
  border-radius:50%; color:var(--ink); font-weight:700; letter-spacing:.2px;
  background:radial-gradient(circle at 32% 26%,
    rgba(255,255,255,.92), rgba(255,255,255,.28) 40%, var(--bub,#8ab4ff) 80%);
  border:1px solid rgba(255,255,255,.6);
  box-shadow: inset 0 0 18px rgba(255,255,255,.55), 0 8px 22px rgba(80,40,120,.14);
  cursor:pointer; user-select:none;
  animation: bubble-pop .5s cubic-bezier(.22,.9,.35,1.05) backwards;
  transition: transform .15s ease;
}
.bubble:hover { transform: scale(1.07); }
.bubble:active { transform: scale(.92); }
@keyframes bubble-pop { from{opacity:0; transform:scale(.4)} to{opacity:1; transform:scale(1)} }

/* chrome: home link + caption */
.home-link {
  position:fixed; top:1rem; left:1.1rem; z-index:5;
  font-family:'JetBrains Mono', ui-monospace, monospace; font-size:.82rem; font-weight:500;
  color:var(--mut); text-decoration:none; padding:.4rem .7rem; border-radius:999px;
  background:rgba(255,255,255,.6); border:1px solid rgba(20,16,32,.10);
  backdrop-filter:blur(8px) saturate(140%); transition:background .15s, color .15s;
}
.home-link:hover { color:var(--ink); background:rgba(255,255,255,.9); }

/* ── calm infobox shown when a bubble is tapped (floats above the cloud;
      bubbles keep drifting underneath, undisturbed) ── */
.info-box {
  position:fixed; z-index:6; width:min(320px, 82vw); max-width:82vw;
  padding:1rem 1.1rem 1.05rem; border-radius:18px;
  background:rgba(255,255,255,.78); border:1px solid rgba(255,255,255,.7);
  box-shadow:0 18px 44px rgba(80,40,120,.20), inset 0 0 0 1px rgba(255,255,255,.5);
  backdrop-filter:blur(14px) saturate(150%); -webkit-backdrop-filter:blur(14px) saturate(150%);
  color:var(--ink);
  opacity:0; transform:translateY(12px) scale(.95); filter:blur(8px); pointer-events:none;
  transition:opacity .55s ease, transform .55s cubic-bezier(.2,.8,.2,1),
             filter .55s ease, left .55s cubic-bezier(.2,.8,.2,1), top .55s cubic-bezier(.2,.8,.2,1);
}
.info-box.show { opacity:1; transform:translateY(0) scale(1); filter:blur(0); pointer-events:auto; }
.info-box .ib-kind {
  font-family:'JetBrains Mono', ui-monospace, monospace; font-size:.6rem; letter-spacing:1.6px;
  text-transform:uppercase; font-weight:600; color:var(--mut);
}
.info-box .ib-title {
  margin:.15rem 0 .4rem; font-size:1.35rem; font-weight:700; letter-spacing:-.01em;
  background:linear-gradient(100deg, var(--bub,#8ab4ff), #b48aff);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.info-box .ib-text { margin:0; font-size:.9rem; line-height:1.55; color:rgba(26,24,32,.82); }
.info-box .ib-close {
  position:absolute; top:.5rem; right:.55rem; width:1.7rem; height:1.7rem; cursor:pointer;
  border-radius:50%; border:1px solid rgba(20,16,32,.12); background:rgba(255,255,255,.6);
  color:var(--mut); font-size:1rem; line-height:1; display:grid; place-items:center;
}
.info-box .ib-close:hover { color:var(--ink); border-color:rgba(20,16,32,.25); }

@media (prefers-reduced-motion: reduce) {
  .bubble { animation:none; }
  .dream-blob { animation:none; }
  .info-box { transition:opacity .2s ease; transform:none; filter:none; }
}
</style>
</head>
<body>

<a class="home-link" href="./index.html">← flove</a>

<div class="dream-veil" aria-hidden="true">
  <div class="dream-blob b1"></div>
  <div class="dream-blob b2"></div>
  <div class="dream-blob b3"></div>
  <div class="dream-blob b4"></div>
  <div class="dream-blob b5"></div>
</div>

<div class="bubble-cloud" id="cloud" aria-label="floating bubbles"></div>

<div class="info-box" id="infoBox" role="dialog" aria-live="polite" hidden>
  <button type="button" class="ib-close" id="ibClose" aria-label="Close">×</button>
  <div class="ib-kind" id="ibKind"></div>
  <h2 class="ib-title" id="ibTitle"></h2>
  <p class="ib-text" id="ibText"></p>
</div>
<script>
(function(){
  const cloud = document.getElementById('cloud');
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // flove vocabulary — each bubble carries a tint + a small glimpse of flove
  const WORDS = [
    {t:'love', c:'#ff8aae', k:'intro',   d:"flove is love made operational — a slower internet where relating, not extracting, is the point."},
    {t:'true', c:'#b48aff', k:'insight', d:"Nothing here is just true or false. Every rating is fuzzy — a shade along seven canonical axes."},
    {t:'care', c:'#8affd0', k:'general', d:"Apps like Trusty, MyFamily and Parenty turn care into small, concrete gestures you can actually act on."},
    {t:'give', c:'#ffd28a', k:'general', d:"The Offer apps — Inventary, Freed, Shareful — let you give, ask and lend with clear, kind conditions."},
    {t:'share',c:'#8ab4ff', k:'intro',   d:"Sharing in flove is peer-to-peer first: your data, your drawer, your terms."},
    {t:'dream',c:'#ff9bd0', k:'insight', d:"∞ apps yet to come. Anyone can dream one and whisper it into the launcher — the form is short, the love is long."},
    {t:'near', c:'#8ad0ff', k:'general', d:"Closeness is a coordinate here — flove maps relations across four trees: o · t · c · u."},
    {t:'link', c:'#a0e8c4', k:'insight', d:"flovenet is the P2P layer: a resilient mesh that links people directly, with no middle to capture them."},
    {t:'vibe', c:'#ffc16a', k:'general', d:"Senses are meta-raters — colour any scale with hear · touch · view · taste · smell."},
    {t:'joy',  c:'#ff8a8a', k:'intro',   d:"Puzzy is the playful core: rate, relate and combine ideas with joy, not judgement."},
    {t:'hope', c:'#9ad0ff', k:'insight', d:"A slower internet is a hopeful bet — tools that compose, that you own, that never rush you."},
    {t:'trust',c:'#c79bff', k:'general', d:"Trusty builds trust one scope at a time. Good limits are a gift for both sides."},
    {t:'free', c:'#8affc0', k:'intro',   d:"flove is free as in freedom — FOSS first, no lock-in, with libre alternatives always named."},
    {t:'soul', c:'#d6a8ff', k:'insight', d:"Souls and 5Loves explore your inner being — identity as something tended, never sold."},
    {t:'flow', c:'#7ad6ff', k:'general', d:"“ke fluya” — flove grows bottom-up, without skipping stages or rushing the work."},
    {t:'life', c:'#ffb27a', k:'general', d:"From birth charts (Astry) to legacy (DieSafe), flove follows a whole life, gently."},
    {t:'art',  c:'#ff9b6a', k:'insight', d:"Keys and Holóniké treat glyphs and gestures as art — meaning you can see and hold."},
    {t:'we',   c:'#8affd0', k:'intro',   d:"flove is a we: crowdparenting, crowdcrafting, confluences — many hands, one garden."},
  ];
  const KIND = { intro:'Introductory', general:'General', insight:'Insight' };

  const rnd = (a,b) => a + Math.random()*(b-a);
  const vel = () => (Math.random()<.5?-1:1) * rnd(.05,.16);
  const physics = new Map();

  // build the bubbles
  WORDS.forEach((w,i) => {
    const el = document.createElement('div');
    el.className = 'bubble';
    el.textContent = w.t;
    el.style.setProperty('--bub', w.c);
    const size = Math.round(rnd(70, 132));
    el.style.width = size+'px'; el.style.height = size+'px';
    el.style.fontSize = (size*0.22).toFixed(0)+'px';
    el.style.animationDelay = (i*0.07).toFixed(2)+'s';
    // tapping a bubble opens its calm flove infobox (physics keeps running)
    el.addEventListener('click', (e) => { e.stopPropagation(); openInfo(w, el); });
    cloud.appendChild(el);
  });

  // ── calm infobox: floats above the cloud near the tapped bubble ──
  const box = document.getElementById('infoBox');
  const ibKind = document.getElementById('ibKind');
  const ibTitle = document.getElementById('ibTitle');
  const ibText = document.getElementById('ibText');
  function placeBox(el) {
    box.hidden = false;
    const b = el.getBoundingClientRect();
    const bw = box.offsetWidth, bh = box.offsetHeight, gap = 14, m = 12;
    // prefer below-right of the bubble; clamp into the viewport
    let left = b.left + b.width/2 - bw/2;
    let top  = b.bottom + gap;
    if (top + bh > innerHeight - m) top = b.top - gap - bh;       // flip above if no room
    if (top < m) top = Math.max(m, (innerHeight - bh)/2);          // else centre vertically
    left = Math.min(Math.max(m, left), innerWidth - bw - m);
    box.style.left = left + 'px';
    box.style.top  = top + 'px';
  }
  function openInfo(w, el) {
    ibKind.textContent = KIND[w.k] || '';
    ibTitle.textContent = w.t;
    ibTitle.style.setProperty('--bub', w.c);
    ibText.textContent = w.d;
    box.hidden = false;
    const first = !box.classList.contains('show');
    if (first) box.style.transition = 'none';     // first open: appear in place, don't glide from corner
    placeBox(el);
    if (first) { void box.offsetHeight; box.style.transition = ''; }
    requestAnimationFrame(() => box.classList.add('show'));
  }
  function closeInfo() { box.classList.remove('show'); }
  document.getElementById('ibClose').addEventListener('click', (e) => { e.stopPropagation(); closeInfo(); });
  // tap anywhere outside a bubble or the box → close
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.bubble') && !e.target.closest('#infoBox')) closeInfo();
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeInfo(); });

  const cloudRect = () => cloud.getBoundingClientRect();
  function measure(el, r) {
    const b = el.getBoundingClientRect();
    return { w: b.width/r.width*100 || 10, h: b.height/r.height*100 || 10 };
  }
  function seed() {
    const r = cloudRect();
    [...cloud.children].forEach(el => {
      const m = measure(el, r);
      const x = +(Math.random()*Math.max(1,100-m.w)).toFixed(2);
      const y = reduce ? +(Math.random()*Math.max(1,100-m.h)).toFixed(2)
                       : +(100-m.h).toFixed(2);            // rise from the bottom
      el.style.left = x+'%'; el.style.top = y+'%';
      physics.set(el, { x, y, w:m.w, h:m.h, vx: vel(), vy: reduce ? 0 : (-Math.abs(vel())-0.04) });
    });
  }
  let raf = null;
  function step() {
    const r = cloudRect();
    if (!r.width || !r.height) { raf = requestAnimationFrame(step); return; }
    const items = [];
    physics.forEach((it, el) => { const m = measure(el, r); it.w = m.w; it.h = m.h; items.push({el, it}); });
    // scale velocity so on-screen drift stays gentle on any viewport size
    const sx = 440/r.width, sy = 300/r.height;
    for (const {it} of items) {
      it.x += it.vx*sx; it.y += it.vy*sy;
      if (it.x < 0)          { it.x = 0;          it.vx =  Math.abs(it.vx); }
      if (it.x + it.w > 100) { it.x = 100 - it.w; it.vx = -Math.abs(it.vx); }
      if (it.y < 0)          { it.y = 0;          it.vy =  Math.abs(it.vy); }
      if (it.y + it.h > 100) { it.y = 100 - it.h; it.vy = -Math.abs(it.vy); }
    }
    // soft collisions (AABB) — bubbles bump and swap momentum
    for (let i=0; i<items.length; i++) {
      const a = items[i].it;
      for (let j=i+1; j<items.length; j++) {
        const b = items[j].it;
        if (a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y) {
          const dx = Math.min(a.x+a.w-b.x, b.x+b.w-a.x);
          const dy = Math.min(a.y+a.h-b.y, b.y+b.h-a.y);
          if (dx < dy) { const p = dx/2; if (a.x<b.x){a.x-=p;b.x+=p;}else{a.x+=p;b.x-=p;} const t=a.vx; a.vx=b.vx; b.vx=t; }
          else         { const p = dy/2; if (a.y<b.y){a.y-=p;b.y+=p;}else{a.y+=p;b.y-=p;} const t=a.vy; a.vy=b.vy; b.vy=t; }
        }
      }
    }
    for (const {el, it} of items) { el.style.left = it.x.toFixed(2)+'%'; el.style.top = it.y.toFixed(2)+'%'; }
    raf = requestAnimationFrame(step);
  }

  seed();
  if (!reduce) raf = requestAnimationFrame(step);
})();
</script>

</body>
</html>
