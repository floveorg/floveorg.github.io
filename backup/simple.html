<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>✺ flove · Simple · Things</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../flove.css">
<style>
  :root{
    --app-accent:        #0891b2;
    --app-accent-soft:   #cffafe;
    --app-ink-on-accent: #083344;

    --paper:       #f7fdff;
    --paper-warm:  #ecfeff;
    --ink:         #0c1a20;
    --ink-soft:    #235a6e;
    --muted:       #6a8b95;
    --line:        rgba(10,80,100,.08);
    --line-strong: rgba(10,80,100,.16);

    --accent:      #0891b2;
    --accent-deep: #155e75;
    --accent-soft: #cffafe;
    --accent-glow: rgba(8,145,178,.22);
    --good:        #16a34a;
    --warn:        #ea580c;
    --pink:        #ec4899;

    --radius-sm: 12px; --radius: 18px; --radius-lg: 24px; --radius-pill: 999px;
    --shadow-xs: 0 1px 2px rgba(10,80,100,.05);
    --shadow-sm: 0 4px 12px -4px rgba(10,80,100,.10);
    --fast: .15s cubic-bezier(.2,.8,.2,1);
    --font-ui: 'Inter', system-ui, sans-serif;
    --font-display: 'Fraunces', Georgia, serif;
  }
  *{ box-sizing:border-box }
  body{
    margin:0; font:15px/1.5 var(--font-ui); color:var(--ink);
    background:
      radial-gradient(900px 600px at 90% -10%, var(--accent-soft) 0%, transparent 60%),
      radial-gradient(700px 500px at -10% 110%, var(--paper-warm) 0%, transparent 55%),
      var(--paper);
    min-height:100vh; padding-bottom: 40px;
  }
  .flove-bar{
    position:sticky; top:0; z-index:50;
    background:rgba(247,253,255,.78);
    backdrop-filter:blur(14px) saturate(160%);
    -webkit-backdrop-filter:blur(14px) saturate(160%);
    border-bottom:1px solid var(--line-strong);
  }
  .flove-bar .flove-mark{ font-size:26px; color:var(--accent); filter:drop-shadow(0 0 6px var(--accent-glow)) }
  .flove-bar .flove-app-name{ font-family:var(--font-display); font-weight:600 }
  .flove-bar .flove-tag{ color:var(--muted) }
  .flove-bar .flove-asterism{ animation-play-state:paused }
  body:hover .flove-bar .flove-asterism, body:focus-within .flove-bar .flove-asterism{ animation-play-state:running }

  .app{ max-width: 980px; margin: 24px auto; padding: 0 18px }

  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow:hidden;
  }

  .header{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding: 16px 20px;
    background: linear-gradient(180deg, var(--paper-warm), #fff);
    border-bottom: 1px solid var(--line);
  }
  .brand{ display:flex; align-items:center; gap: 12px }
  .brand .logo{
    width: 38px; height: 38px;
    border-radius: 50%;
    background: conic-gradient(from 200deg at 50% 50%, var(--accent), var(--pink), var(--good), var(--accent));
    box-shadow: 0 0 0 4px #fff inset, 0 4px 12px -4px var(--accent-glow);
    animation: spin 28s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg) } }
  .brand span{
    font-family: var(--font-display); font-weight: 600;
    font-size: 1.2rem; letter-spacing: .12em;
  }
  .badges{ display:flex; gap: 6px; align-items: center }
  .badge{
    position: relative;
    display:inline-grid; place-items:center;
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    background: var(--paper);
    border: 1px solid var(--line-strong);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all var(--fast);
  }
  .badge:hover{ border-color: var(--accent); color: var(--accent-deep) }
  .badge[data-count]::after{
    content: attr(data-count);
    position:absolute; top:-4px; right:-4px;
    background: var(--pink); color:#fff;
    border: 2px solid #fff;
    border-radius: var(--radius-pill);
    padding: 1px 6px; font: 700 10px/1.2 var(--font-ui);
  }

  .section{ padding: 16px 20px; border-bottom: 1px dashed var(--line) }
  .section:last-of-type{ border-bottom: 0 }

  details.fold{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px 0;
    transition: box-shadow var(--fast);
  }
  details.fold[open]{ box-shadow: 0 0 0 3px var(--accent-glow); background: #fff }
  details.fold > summary{
    list-style: none; cursor: pointer;
    font: 700 .85rem/1 var(--font-ui);
    letter-spacing: .08em; color: var(--ink); padding: 4px 0;
    display: flex; align-items: center; gap: 8px;
  }
  details.fold > summary::-webkit-details-marker{ display:none }
  details.fold > summary::before{
    content:"▸"; color: var(--accent); transition: transform var(--fast);
  }
  details.fold[open] > summary::before{ transform: rotate(90deg) }
  details.fold .content{ padding: 12px 0 14px }

  input[type=text], input[type=number], textarea{
    width: 100%;
    padding: 11px 13px;
    background:#fff;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    font: 14px/1.45 var(--font-ui); color: inherit;
    transition: all var(--fast);
  }
  input[type=text]:focus, input[type=number]:focus, textarea:focus{
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  textarea{ resize: vertical; min-height: 80px }

  .controls{ display:flex; gap: 8px; flex-wrap: wrap; align-items: center }

  .btn{
    display:inline-flex; align-items:center; gap:6px;
    padding: 10px 16px;
    border: 1px solid var(--line-strong); background: #fff; color: var(--ink);
    border-radius: var(--radius-pill);
    font: 600 .85rem/1 var(--font-ui); cursor: pointer;
    transition: all var(--fast); box-shadow: var(--shadow-xs);
  }
  .btn:hover{ border-color: var(--accent); color: var(--accent-deep); transform: translateY(-1px) }
  .btn.accent{
    background: linear-gradient(180deg, var(--accent), var(--accent-deep));
    color: #fff; border-color: transparent;
    box-shadow: 0 8px 18px -6px var(--accent-glow);
  }
  .btn.accent:hover{ color:#fff; filter:brightness(1.06) }

  .grid{ display: grid; gap: 12px }
  .grid.two{ grid-template-columns: repeat(2, minmax(0,1fr)) }
  .grid.three{ grid-template-columns: repeat(3, minmax(0,1fr)) }
  @media (max-width: 640px){ .grid.two, .grid.three{ grid-template-columns: 1fr } }

  .pills{ display: flex; gap: 8px; flex-wrap: wrap }
  .pill input{ position: absolute; opacity: 0; pointer-events: none }
  .pill label{
    display: inline-block; padding: 8px 14px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--line-strong);
    background: #fff; cursor: pointer;
    font: 600 .85rem/1 var(--font-ui); color: var(--ink-soft);
    transition: all var(--fast);
  }
  .pill label:hover{ border-color: var(--accent) }
  .pill input:checked + label{
    background: var(--accent-soft); color: var(--accent-deep); border-color: var(--accent);
  }

  /* Lists */
  .list{ display: grid; gap: 6px }
  .list .item{
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    padding: 9px 12px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    font-size: .9rem;
    transition: all var(--fast);
  }
  .list .item:hover{ border-color: var(--accent) }
  .list .item.accent{
    background: var(--accent-soft); color: var(--accent-deep);
    border-color: color-mix(in srgb, var(--accent) 30%, transparent);
    font-weight: 600;
  }
  .list .item strong{ color: var(--ink); font-family: var(--font-display); font-weight: 600 }
  .small{ font-size: .8rem; color: var(--muted) }

  /* Range */
  .range{ display: grid; gap: 6px }
  .range label{ font: 700 11px/1.3 var(--font-ui); color: var(--ink-soft); letter-spacing:.04em; text-transform: uppercase }
  .range input[type=range]{
    width: 100%; appearance: none; height: 6px; border-radius: var(--radius-pill);
    background: linear-gradient(90deg, var(--line-strong), var(--accent));
    outline: none;
  }
  .range input[type=range]::-webkit-slider-thumb{
    appearance:none; width:18px; height:18px; border-radius:50%;
    background:#fff; border:3px solid var(--accent); cursor:pointer;
    box-shadow: 0 3px 8px -2px var(--accent-glow);
  }
  .range input[type=range]::-moz-range-thumb{
    width:18px; height:18px; border-radius:50%; background:#fff;
    border:3px solid var(--accent); cursor:pointer;
  }

  .footer-actions{
    display:flex; gap: 10px; justify-content: flex-end;
    padding: 16px 20px; border-top: 1px solid var(--line);
    background: var(--paper-warm);
    flex-wrap: wrap;
  }

  .toast{
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(12px);
    background: var(--ink); color: #fff;
    padding: 10px 18px; border-radius: var(--radius-pill);
    font: 600 13px/1 var(--font-ui);
    opacity: 0; pointer-events: none; transition: all .25s; z-index: 100;
  }
  .toast.is-visible{ opacity: 1; transform: translateX(-50%) translateY(0) }

  @media print{
    .flove-bar, .footer-actions, .badges{ display:none !important }
    body{ background:#fff }
    .card{ box-shadow:none; border:1px solid #ccc }
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ animation-duration:.01ms !important; transition-duration:.01ms !important }
  }
</style>
</head>
<body>

<div class="flove-bar">
  <a class="flove-home" href="../index.html" aria-label="Back to flove launcher">←</a>
  <span class="flove-mark flove-asterism" aria-hidden="true">✺</span>
  <span class="flove-app-name">Simple</span>
  <span class="flove-tag">things</span>
  <span class="flove-spacer"></span>
</div>

<main class="app">
  <section class="card">
    <header class="header">
      <div class="brand"><div class="logo" aria-hidden="true"></div><span>THINGS</span></div>
      <div class="badges">
        <button class="badge" type="button" data-count="25" title="Notifications">🔔</button>
        <button class="badge" type="button" data-count="12" title="Messages">💬</button>
        <button class="badge" type="button" title="Menu">☰</button>
      </div>
    </header>

    <div class="section">
      <details class="fold" open>
        <summary>LATEST THINGS</summary>
        <div class="content list" id="latestList">
          <div class="item"><span>Backpack</span><span class="small">new</span></div>
          <div class="item"><span>Compost bin</span><span class="small">yesterday</span></div>
        </div>
      </details>
    </div>

    <div class="section">
      <details class="fold" open>
        <summary>ADD NEW THING</summary>
        <div class="content grid">
          <div class="controls">
            <input id="newThing" type="text" placeholder="Add a thing here">
            <button class="btn accent" type="button" id="addThing">OK</button>
          </div>
          <div class="controls">
            <label class="btn" style="cursor:pointer"><input type="file" id="mediaFile" multiple hidden>ADD MEDIA</label>
          </div>
        </div>
      </details>
    </div>

    <div class="section">
      <details class="fold" open>
        <summary>CATEGORIES</summary>
        <div class="content">
          <div class="pills" style="margin-bottom:12px">
            <span class="pill"><input type="radio" id="tab1" name="tab" checked><label for="tab1">ECOLOGICAL</label></span>
            <span class="pill"><input type="radio" id="tab2" name="tab"><label for="tab2">CRAFT</label></span>
          </div>
          <div class="grid two">
            <div class="list">
              <div class="item"><strong>SOULS</strong></div>
              <div class="item">Curious</div>
              <div class="item accent">Brave</div>
              <div class="item">Calm</div>
              <div class="item">Generous</div>
              <div class="item">Steady</div>
            </div>
            <div class="list">
              <div class="item"><strong>OTHER</strong></div>
              <div class="item accent">Favourite</div>
              <div class="item">Urgent</div>
              <div class="item">High quality</div>
              <div class="item">Good quality</div>
              <div class="item">Highly loved</div>
            </div>
          </div>
        </div>
      </details>
    </div>

    <div class="section">
      <details class="fold" open>
        <summary>WISHES</summary>
        <div class="content grid two">
          <input type="text" id="wish1" value="WORLD PEACE">
          <input type="text" id="wish2" placeholder="Add a wish here">
        </div>
      </details>
    </div>

    <div class="section">
      <details class="fold" open>
        <summary>CONDITIONS</summary>
        <div class="content grid">
          <div class="pills">
            <span class="pill"><input type="radio" id="cond-g" name="cond" checked><label for="cond-g">GIFT</label></span>
            <span class="pill"><input type="radio" id="cond-l" name="cond"><label for="cond-l">LEND</label></span>
            <span class="pill"><input type="radio" id="cond-e" name="cond"><label for="cond-e">EXCHANGE</label></span>
          </div>
          <div class="controls" style="max-width:240px">
            <input type="number" id="price" placeholder="0,00 €" step="0.01" min="0">
          </div>
          <div class="grid three">
            <div class="range"><label for="trust">Trust needed</label><input id="trust" type="range" min="0" max="100" value="60"></div>
            <div class="range"><label for="flex">Flexibility</label><input id="flex" type="range" min="0" max="100" value="50"></div>
            <div class="range"><label for="pot">Potentiality</label><input id="pot" type="range" min="0" max="100" value="20"></div>
          </div>
        </div>
      </details>
    </div>

    <div class="section">
      <details class="fold" open>
        <summary>ADDITIONAL INFORMATION</summary>
        <div class="content"><textarea id="extra" rows="4" placeholder="Insert text here"></textarea></div>
      </details>
    </div>

    <div class="section">
      <strong style="font-family: var(--font-display); font-weight: 600; letter-spacing:.08em">CONTACT</strong>
      <div class="controls" style="margin-top:8px">
        <input id="contact" type="text" placeholder="email · phone · username">
      </div>
    </div>

    <footer class="footer-actions">
      <button class="btn" type="button" id="saveBtn">💾 Save</button>
      <button class="btn accent" type="button" id="publishBtn">✦ Publish</button>
      <button class="btn" type="button" id="shareBtn">📤 Share</button>
    </footer>
  </section>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  "use strict";
  const $  = (s,r=document) => r.querySelector(s);
  const $$ = (s,r=document) => [...r.querySelectorAll(s)];
  const KEY = "flove:simple:v1";

  let toastT;
  const toast = m => { const el=$("#toast"); el.textContent=m; el.classList.add("is-visible"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("is-visible"),1600); };

  function snapshot(){
    return {
      latest: $$(".item", $("#latestList")).map(i => ({
        name: i.firstElementChild?.textContent || "",
        when: i.lastElementChild?.textContent || ""
      })),
      tab:   (document.querySelector('input[name="tab"]:checked')||{}).id || "tab1",
      wish1: $("#wish1").value,
      wish2: $("#wish2").value,
      cond:  (document.querySelector('input[name="cond"]:checked')||{}).id || "cond-g",
      price: $("#price").value,
      trust: $("#trust").value,
      flex:  $("#flex").value,
      pot:   $("#pot").value,
      extra: $("#extra").value,
      contact: $("#contact").value
    };
  }
  function restore(){
    let d; try{ d = JSON.parse(localStorage.getItem(KEY) || "null"); }catch(e){ return; }
    if (!d) return;
    if (Array.isArray(d.latest) && d.latest.length){
      $("#latestList").innerHTML = d.latest.map(x => `<div class="item"><span>${escapeHtml(x.name)}</span><span class="small">${escapeHtml(x.when)}</span></div>`).join("");
    }
    if (d.tab) document.getElementById(d.tab)?.click();
    if (d.wish1 != null) $("#wish1").value = d.wish1;
    if (d.wish2 != null) $("#wish2").value = d.wish2;
    if (d.cond) document.getElementById(d.cond) && (document.getElementById(d.cond).checked = true);
    ["price","trust","flex","pot","extra","contact"].forEach(k => { if (d[k] != null) $("#"+k).value = d[k]; });
  }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  let saveT;
  function save(){ clearTimeout(saveT); saveT = setTimeout(()=>{ try{ localStorage.setItem(KEY, JSON.stringify(snapshot())); }catch(e){} }, 200); }
  document.addEventListener("input", save);
  document.addEventListener("change", save);

  function addThing(){
    const v = $("#newThing").value.trim();
    if (!v) return;
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<span>${escapeHtml(v)}</span><span class="small">new</span>`;
    $("#latestList").prepend(div);
    $("#newThing").value = "";
    save(); toast("Added");
  }
  $("#addThing").addEventListener("click", addThing);
  $("#newThing").addEventListener("keypress", e => { if (e.key === "Enter"){ e.preventDefault(); addThing(); } });

  $("#saveBtn").addEventListener("click", () => { save(); toast("Saved"); });
  $("#publishBtn").addEventListener("click", () => toast("✦ Published (demo)"));
  $("#shareBtn").addEventListener("click", async () => {
    try{
      if (navigator.share){ await navigator.share({ title: "Things", text: JSON.stringify(snapshot()) }); }
      else { await navigator.clipboard.writeText(JSON.stringify(snapshot(), null, 2)); toast("Copied JSON"); }
    }catch(e){}
  });

  restore();
})();
</script>
</body>
</html>
