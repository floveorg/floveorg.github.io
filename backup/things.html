<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover"/>
<title>✺ flove · Things · Have / Wish / Want / Need</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../flove.css">
<style>
  :root{
    --app-accent:        #0ea5e9;
    --app-accent-soft:   #e0f2fe;
    --app-ink-on-accent: #0c2738;

    --paper:       #f7fbff;
    --paper-warm:  #eff6ff;
    --ink:         #0b1c2c;
    --ink-soft:    #1f3a52;
    --muted:       #6a8b9a;
    --line:        rgba(20,80,140,.08);
    --line-strong: rgba(20,80,140,.16);

    --have: #16a34a;
    --wish: #3b82f6;
    --want: #f59e0b;
    --need: #ef4444;

    --accent:      #0ea5e9;
    --accent-deep: #0369a1;
    --accent-soft: #e0f2fe;
    --accent-glow: rgba(14,165,233,.22);

    --radius-sm: 12px; --radius: 18px; --radius-lg: 24px; --radius-pill: 999px;
    --shadow-xs: 0 1px 2px rgba(20,80,140,.05);
    --shadow-sm: 0 4px 12px -4px rgba(20,80,140,.10);
    --shadow:    0 18px 40px -16px rgba(20,80,140,.18);
    --fast: .15s cubic-bezier(.2,.8,.2,1);
    --font-ui: 'Inter', system-ui, sans-serif;
    --font-display: 'Fraunces', Georgia, serif;
  }
  *{ box-sizing:border-box }
  body{
    margin:0; font:14px/1.5 var(--font-ui); color:var(--ink);
    background:
      radial-gradient(900px 600px at 90% -10%, var(--accent-soft) 0%, transparent 60%),
      radial-gradient(700px 500px at -10% 110%, var(--paper-warm) 0%, transparent 55%),
      var(--paper);
    min-height:100vh;
  }
  .flove-bar{
    position:sticky; top:0; z-index:50;
    background:rgba(247,251,255,.78);
    backdrop-filter:blur(14px) saturate(160%);
    -webkit-backdrop-filter:blur(14px) saturate(160%);
    border-bottom:1px solid var(--line-strong);
  }
  .flove-bar .flove-mark{ font-size:26px; color:var(--accent); filter:drop-shadow(0 0 6px var(--accent-glow)) }
  .flove-bar .flove-app-name{ font-family:var(--font-display); font-weight:600 }
  .flove-bar .flove-tag{ color:var(--muted) }
  .flove-bar .flove-asterism{ animation-play-state:paused }
  body:hover .flove-bar .flove-asterism, body:focus-within .flove-bar .flove-asterism{ animation-play-state:running }

  .top{ max-width: 1200px; margin: 0 auto; padding: 22px 18px 0 }
  .top h1{
    font-family: var(--font-display); font-weight: 600;
    font-size: clamp(1.6rem, 3vw, 2.1rem);
    margin: 0; letter-spacing: -.01em;
  }
  .hint{ color: var(--muted); margin: 6px 0 14px; font-size: .95rem }

  .toolbar{
    position: sticky; top: 56px; z-index: 30;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(14px);
    border: 1px solid var(--line);
    border-radius: var(--radius-pill);
    padding: 8px 10px;
    margin-bottom: 14px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    box-shadow: var(--shadow-xs);
  }
  .toolbar .search{ display:flex; align-items:center; gap:8px; padding: 4px 12px; flex: 1 1 200px }
  .toolbar .search input{
    border:0; background:transparent; padding: 6px 0; font: 14px var(--font-ui);
    color: inherit; outline:none; width: 100%;
  }
  .toolbar .actions{ display:flex; gap:6px; flex-wrap: wrap }
  .toolbar .btn{
    padding: 7px 12px; border-radius: var(--radius-pill);
    border: 1px solid var(--line-strong); background:#fff; color: var(--ink);
    font: 600 .8rem/1 var(--font-ui); cursor: pointer; transition: all var(--fast);
  }
  .toolbar .btn:hover{ border-color: var(--accent); color: var(--accent-deep) }
  .toolbar .stat{ font-size: .78rem; color: var(--muted); padding: 4px 10px }
  .toolbar .stat strong{ color: var(--ink) }

  .filters{
    display: flex; flex-wrap: wrap; gap: 6px;
    margin: 0 0 12px;
  }
  .filters label{
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: #fff;
    border: 1px solid var(--line-strong); border-radius: var(--radius-pill);
    font: 600 .82rem/1 var(--font-ui); color: var(--ink-soft);
    cursor: pointer;
    transition: all var(--fast);
  }
  .filters label:hover{ border-color: var(--accent) }
  .filters input[type=checkbox]{
    appearance: none; width: 14px; height: 14px;
    border: 2px solid var(--line-strong); border-radius: 4px; background:#fff;
    position: relative; cursor: pointer; transition: all var(--fast);
  }
  .filters input:checked{ background: var(--accent); border-color: var(--accent) }
  .filters input:checked::after{
    content:"✓"; position:absolute; inset:0; color:#fff; font: 700 9px/1 var(--font-ui);
    display:grid; place-items:center;
  }
  .filters label:has(input:checked){
    background: var(--accent-soft); color: var(--accent-deep); border-color: var(--accent);
  }
  .filters .all-toggle{
    background: var(--paper-warm); border-style: dashed;
  }

  .sheet{ max-width: 1200px; margin: 0 auto; padding: 0 18px 80px }

  .table{
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    background: #fff;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .thead .tr, .tbody .tr{
    display: grid;
    grid-template-columns: 1.6fr .5fr .5fr .5fr .5fr;
    align-items: center;
  }
  .head{
    background: var(--paper-warm);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 102px; z-index: 20;
  }
  .th, .td{ padding: 10px 14px }
  .th{
    font: 700 11px/1 var(--font-ui);
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    display: flex; align-items: center; gap: 6px;
  }
  .th.col-have::before{ content:""; width:8px; height:8px; border-radius:50%; background: var(--have) }
  .th.col-wish::before{ content:""; width:8px; height:8px; border-radius:50%; background: var(--wish) }
  .th.col-want::before{ content:""; width:8px; height:8px; border-radius:50%; background: var(--want) }
  .th.col-need::before{ content:""; width:8px; height:8px; border-radius:50%; background: var(--need) }
  .th.col-have, .th.col-wish, .th.col-want, .th.col-need{ justify-content: center }

  .tbody{ display: block }
  .tr.row{
    --accent-row: transparent;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, transparent, transparent);
    box-shadow: inset 4px 0 0 var(--accent-row);
    transition: background var(--fast);
    margin: 0;
  }
  .tr.row:last-child{ border-bottom: 0 }
  .tr.row:hover{ background: var(--paper-warm) }
  .col-item{ font-weight: 600; color: var(--ink) }
  .td.col-have, .td.col-wish, .td.col-want, .td.col-need{ display:flex; justify-content:center }

  .tbody input[type=checkbox]{
    appearance: none;
    width: 22px; height: 22px;
    border: 2px solid var(--line-strong); border-radius: 6px; background:#fff;
    position: relative; cursor: pointer;
    transition: all var(--fast);
  }
  .col-have input{ --col: var(--have) }
  .col-wish input{ --col: var(--wish) }
  .col-want input{ --col: var(--want) }
  .col-need input{ --col: var(--need) }
  .tbody input:hover{ border-color: var(--col) }
  .tbody input:checked{
    background: var(--col); border-color: var(--col);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--col) 22%, transparent);
  }
  .tbody input:checked::after{
    content: "✓"; position: absolute; inset: 0;
    display: grid; place-items: center;
    color: #fff; font: 700 13px/1 var(--font-ui);
  }

  /* Row accent based on highest selection */
  .row:has(.col-need input:checked){ --accent-row: var(--need); background: linear-gradient(180deg, color-mix(in srgb, var(--need) 6%, transparent), transparent) }
  .row:has(.col-want input:checked):not(:has(.col-need input:checked)){ --accent-row: var(--want); background: linear-gradient(180deg, color-mix(in srgb, var(--want) 6%, transparent), transparent) }
  .row:has(.col-wish input:checked):not(:has(.col-need input:checked)):not(:has(.col-want input:checked)){ --accent-row: var(--wish); background: linear-gradient(180deg, color-mix(in srgb, var(--wish) 5%, transparent), transparent) }
  .row:has(.col-have input:checked):not(:has(.col-need input:checked)):not(:has(.col-want input:checked)):not(:has(.col-wish input:checked)){ --accent-row: var(--have); background: linear-gradient(180deg, color-mix(in srgb, var(--have) 5%, transparent), transparent) }

  /* Filters -> hide categories via CSS */
  #f-salud:not(:checked) ~ .sheet .row.cat-salud{ display: none }
  #f-outdoor:not(:checked) ~ .sheet .row.cat-outdoor{ display: none }
  #f-infra:not(:checked) ~ .sheet .row.cat-infra{ display: none }
  #f-comms:not(:checked) ~ .sheet .row.cat-comms{ display: none }
  #f-alimentos:not(:checked) ~ .sheet .row.cat-alimentos{ display: none }
  #f-servicios:not(:checked) ~ .sheet .row.cat-servicios{ display: none }
  #f-m-sica:not(:checked) ~ .sheet .row.cat-m-sica{ display: none }
  #f-eventos:not(:checked) ~ .sheet .row.cat-eventos{ display: none }
  #f-varios:not(:checked) ~ .sheet .row.cat-varios{ display: none }

  /* Show-only-selected toggle */
  body[data-only="1"] .row:not(:has(input:checked)){ display: none }

  /* Responsive */
  @media (max-width: 760px){
    .thead{ display:none }
    .tr.row{
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "item item"
        "have wish"
        "want need";
      padding: 8px;
    }
    .col-item{ grid-area: item; padding-bottom: 4px }
    .col-have{ grid-area: have }
    .col-wish{ grid-area: wish }
    .col-want{ grid-area: want }
    .col-need{ grid-area: need }
    .td.col-have::before, .td.col-wish::before, .td.col-want::before, .td.col-need::before{
      content: attr(data-l); font: 700 10px/1 var(--font-ui); color: var(--muted);
      letter-spacing: .04em; text-transform: uppercase; margin-right: 6px;
    }
    .toolbar{ top: 50px }
    .head{ display: none }
  }

  /* Print */
  @media print{
    .flove-bar, .filters, .toolbar{ display: none !important }
    body{ background: #fff }
    .table{ box-shadow: none; border: 1px solid #ccc }
  }

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ animation-duration:.01ms !important; transition-duration:.01ms !important }
  }

  .toast{
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(12px);
    background: var(--ink); color: #fff;
    padding: 10px 18px; border-radius: var(--radius-pill);
    font: 600 13px/1 var(--font-ui);
    opacity: 0; pointer-events: none; transition: all .25s; z-index: 100;
  }
  .toast.is-visible{ opacity: 1; transform: translateX(-50%) translateY(0) }
</style>
</head>
<body>

<div class="flove-bar">
  <a class="flove-home" href="../index.html" aria-label="Back to flove launcher">←</a>
  <span class="flove-mark flove-asterism" aria-hidden="true">✺</span>
  <span class="flove-app-name">Things</span>
  <span class="flove-tag">have · wish · want · need</span>
  <span class="flove-spacer"></span>
</div>

<form class="category-filters" aria-label="Filtros por categoría" id="catFilters">
  <input type="checkbox" id="f-salud" checked hidden>
  <input type="checkbox" id="f-outdoor" checked hidden>
  <input type="checkbox" id="f-infra" checked hidden>
  <input type="checkbox" id="f-comms" checked hidden>
  <input type="checkbox" id="f-alimentos" checked hidden>
  <input type="checkbox" id="f-servicios" checked hidden>
  <input type="checkbox" id="f-m-sica" checked hidden>
  <input type="checkbox" id="f-eventos" checked hidden>
  <input type="checkbox" id="f-varios" checked hidden>

<header class="top">
  <h1>OFFERS · what's in your life</h1>
  <p class="hint">Tick what you <strong style="color:var(--have)">have</strong>, what you <strong style="color:var(--wish)">wish</strong>, what you <strong style="color:var(--want)">want</strong>, and what you <strong style="color:var(--need)">need</strong>. Filter, search, export — your choices stay in your browser.</p>

  <div class="toolbar">
    <div class="search">
      <span aria-hidden="true">🔎</span>
      <input id="searchBox" type="search" placeholder="Search items (e.g., bike, tools, garden)…" autocomplete="off">
    </div>
    <div class="actions">
      <button class="btn" type="button" id="onlyBtn" aria-pressed="false">Only selected</button>
      <button class="btn" type="button" id="exportJsonBtn">⬇ JSON</button>
      <button class="btn" type="button" id="exportCsvBtn">⬇ CSV</button>
      <button class="btn" type="button" id="printBtn">🖨 Print</button>
      <button class="btn" type="button" id="clearBtn">↺ Clear</button>
    </div>
    <span class="stat" id="counter"><strong>0</strong> / 594 marked</span>

  <div class="filters" aria-label="Category filters" role="group">
    <label for="f-salud">Health</label>
    <label for="f-outdoor">Outdoor</label>
    <label for="f-infra">Housing</label>
    <label for="f-comms">Comms</label>
    <label for="f-alimentos">Food</label>
    <label for="f-servicios">Services</label>
    <label for="f-m-sica">Music</label>
    <label for="f-eventos">Events</label>
    <label for="f-varios">Other</label>
    <button class="btn" type="button" id="allOn" style="margin-left:auto">All on</button>
    <button class="btn" type="button" id="allOff">All off</button>
  </div>
</header>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  "use strict";
  const $  = (s,r=document) => r.querySelector(s);
  const $$ = (s,r=document) => [...r.querySelectorAll(s)];
  const KEY = "flove:things:v1";
  const KEY_F = "flove:things:filters";

  let toastT;
  const toast = m => { const el=$("#toast"); el.textContent=m; el.classList.add("is-visible"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("is-visible"),1700); };

  // Add data-l attributes for mobile labels
  $$(".td.col-have").forEach(el => el.dataset.l = "Have");
  $$(".td.col-wish").forEach(el => el.dataset.l = "Wish");
  $$(".td.col-want").forEach(el => el.dataset.l = "Want");
  $$(".td.col-need").forEach(el => el.dataset.l = "Need");

  // Snapshot only the checked items
  function snapshot(){
    const data = {};
    ["have","wish","want","need"].forEach(name => {
      data[name] = $$(`input[name="${name}"]:checked`).map(i => i.value);
    });
    return data;
  }
  function restore(){
    let d; try{ d = JSON.parse(localStorage.getItem(KEY) || "null"); }catch(e){ return; }
    if (!d) return;
    ["have","wish","want","need"].forEach(name => {
      (d[name] || []).forEach(val => {
        const i = document.querySelector(`input[name="${name}"][value="${CSS.escape(val)}"]`);
        if (i) i.checked = true;
      });
    });
  }
  function restoreFilters(){
    let d; try{ d = JSON.parse(localStorage.getItem(KEY_F) || "null"); }catch(e){ return; }
    if (!d || !Array.isArray(d)) return;
    $$('#catFilters input[type=checkbox]').forEach(i => { i.checked = d.includes(i.id); });
  }
  function saveFilters(){
    const ids = $$('#catFilters input[type=checkbox]:checked').map(i => i.id);
    try{ localStorage.setItem(KEY_F, JSON.stringify(ids)); }catch(e){}
  }

  let saveT;
  function save(){ clearTimeout(saveT); saveT = setTimeout(()=>{ try{ localStorage.setItem(KEY, JSON.stringify(snapshot())); }catch(e){} }, 250); }

  function updateCounter(){
    const marked = $$("#itemBody .row:has(input:checked)").length;
    const total = $$("#itemBody .row").length;
    $("#counter").innerHTML = `<strong>${marked}</strong> / ${total} marked`;
  }

  // Search filter (in addition to category)
  $("#searchBox").addEventListener("input", e => {
    const q = e.target.value.trim().toLowerCase();
    $$("#itemBody .row").forEach(r => {
      const name = (r.querySelector(".col-item")?.textContent || "").toLowerCase();
      r.dataset.searchHit = (!q || name.includes(q)) ? "1" : "0";
      // We set visibility via inline display, but respect CSS category filter
      r.style.display = (!q || name.includes(q)) ? "" : "none";
    });
  });

  // Only-selected toggle
  let onlyOn = false;
  $("#onlyBtn").addEventListener("click", () => {
    onlyOn = !onlyOn;
    document.body.dataset.only = onlyOn ? "1" : "";
    $("#onlyBtn").setAttribute("aria-pressed", onlyOn ? "true" : "false");
    $("#onlyBtn").style.background = onlyOn ? "var(--accent-soft)" : "";
  });

  // Export JSON
  $("#exportJsonBtn").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(snapshot(), null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "things.json";
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ a.remove(); URL.revokeObjectURL(url); }, 80);
    toast("Exported JSON");
  });

  // Export CSV
  $("#exportCsvBtn").addEventListener("click", () => {
    const rows = [["item","have","wish","want","need","category"]];
    $$("#itemBody .row").forEach(r => {
      const cat = (r.className.match(/cat-[a-z-]+/) || [""])[0].replace("cat-","");
      rows.push([
        r.querySelector(".col-item")?.textContent || "",
        r.querySelector(".col-have input")?.checked ? "1" : "",
        r.querySelector(".col-wish input")?.checked ? "1" : "",
        r.querySelector(".col-want input")?.checked ? "1" : "",
        r.querySelector(".col-need input")?.checked ? "1" : "",
        cat
      ]);
    });
    const csv = rows.map(r => r.map(c => {
      const s = String(c == null ? "" : c);
      return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "things.csv";
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ a.remove(); URL.revokeObjectURL(url); }, 80);
    toast("Exported CSV");
  });

  $("#printBtn").addEventListener("click", () => window.print());
  $("#clearBtn").addEventListener("click", () => {
    if (!confirm("Uncheck everything? (your filters are kept)")) return;
    $$('#itemBody input[type=checkbox]').forEach(i => i.checked = false);
    save(); updateCounter();
    toast("Cleared marks");
  });
  $("#allOn").addEventListener("click", () => {
    $$('#catFilters input[type=checkbox]').forEach(i => i.checked = true);
    saveFilters(); toast("All categories");
  });
  $("#allOff").addEventListener("click", () => {
    $$('#catFilters input[type=checkbox]').forEach(i => i.checked = false);
    saveFilters(); toast("Hidden all categories");
  });

  document.addEventListener("change", e => {
    if (e.target.matches('#catFilters input[type=checkbox]')){ saveFilters(); return; }
    if (e.target.matches('#itemBody input[type=checkbox]')){ save(); updateCounter(); }
  });

  restoreFilters();
  restore();
  updateCounter();
})();
</script>
