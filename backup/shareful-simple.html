<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>✺ flove · InstaShare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../flove.css">
<style>
  :root{
    --app-accent:        #a855f7;
    --app-accent-soft:   #f3e8ff;
    --app-ink-on-accent: #3b0764;

    --paper:       #fbf8ff;
    --paper-warm:  #f5edff;
    --ink:         #1a0f2e;
    --ink-soft:    #443566;
    --muted:       #8e7eb0;
    --line:        rgba(90,40,160,.08);
    --line-strong: rgba(90,40,160,.16);
    --pink:        #ec4899;

    --accent:      #a855f7;
    --accent-deep: #7e22ce;
    --accent-soft: #f3e8ff;
    --accent-glow: rgba(168,85,247,.22);

    --radius-sm: 12px; --radius: 18px; --radius-lg: 24px; --radius-pill: 999px;
    --shadow-xs: 0 1px 2px rgba(90,40,160,.05);
    --shadow-sm: 0 4px 12px -4px rgba(90,40,160,.10);
    --fast: .15s cubic-bezier(.2,.8,.2,1);
    --font-ui: 'Inter', system-ui, sans-serif;
    --font-display: 'Fraunces', Georgia, serif;
  }
  *{ box-sizing:border-box }
  body{
    margin:0; font:15px/1.5 var(--font-ui); color:var(--ink);
    background:
      radial-gradient(900px 600px at 90% -10%, var(--accent-soft) 0%, transparent 60%),
      radial-gradient(700px 500px at -10% 110%, var(--paper-warm) 0%, transparent 55%),
      var(--paper);
    min-height:100vh; padding-bottom: 40px;
  }
  .flove-bar{
    position:sticky; top:0; z-index:50;
    background:rgba(251,248,255,.78);
    backdrop-filter:blur(14px) saturate(160%);
    -webkit-backdrop-filter:blur(14px) saturate(160%);
    border-bottom:1px solid var(--line-strong);
  }
  .flove-bar .flove-mark{ font-size:26px; color:var(--accent); filter:drop-shadow(0 0 6px var(--accent-glow)) }
  .flove-bar .flove-app-name{ font-family:var(--font-display); font-weight:600 }
  .flove-bar .flove-tag{ color:var(--muted) }
  .flove-bar .flove-asterism{ animation-play-state:paused }
  body:hover .flove-bar .flove-asterism, body:focus-within .flove-bar .flove-asterism{ animation-play-state:running }

  .app{ max-width: 820px; margin: 24px auto; padding: 0 18px }

  .card{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius-lg);
    box-shadow: var(--shadow-sm); overflow:hidden;
  }

  .header{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding: 16px 20px;
    background: linear-gradient(180deg, var(--paper-warm), #fff);
    border-bottom: 1px solid var(--line);
  }
  .brand{ display:flex; align-items:center; gap: 12px }
  .brand .logo{
    width: 38px; height: 38px;
    border-radius: 50%;
    background: conic-gradient(from 200deg, var(--accent), var(--pink), #facc15, var(--accent));
    box-shadow: 0 0 0 4px #fff inset, 0 4px 12px -4px var(--accent-glow);
    animation: spin 24s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg) } }
  .brand span{
    font-family: var(--font-display); font-weight: 600;
    font-size: 1.2rem; letter-spacing: .14em;
  }
  .badges{ display:flex; gap: 6px }
  .badge{
    position:relative; display:inline-grid; place-items:center;
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    background: var(--paper); border: 1px solid var(--line-strong);
    color: var(--ink-soft); cursor:pointer; transition: all var(--fast);
  }
  .badge:hover{ border-color: var(--accent); color: var(--accent-deep) }
  .badge[data-count]::after{
    content: attr(data-count);
    position:absolute; top:-4px; right:-4px;
    background: var(--pink); color:#fff;
    border: 2px solid #fff; border-radius: var(--radius-pill);
    padding: 1px 6px; font: 700 10px/1.2 var(--font-ui);
  }

  .section{ padding: 16px 20px; border-bottom: 1px dashed var(--line) }
  .section:last-of-type{ border-bottom: 0 }

  details.fold{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px 0;
    transition: box-shadow var(--fast);
  }
  details.fold[open]{ box-shadow: 0 0 0 3px var(--accent-glow); background: #fff }
  details.fold > summary{
    list-style: none; cursor: pointer;
    font: 700 .85rem/1 var(--font-ui);
    letter-spacing: .08em;
    padding: 4px 0;
    display:flex; align-items:center; gap:8px;
  }
  details.fold > summary::-webkit-details-marker{ display:none }
  details.fold > summary::before{ content:"▸"; color: var(--accent); transition: transform var(--fast) }
  details.fold[open] > summary::before{ transform: rotate(90deg) }
  details.fold .content{ padding: 12px 0 14px }

  input[type=text]{
    width: 100%;
    padding: 11px 13px;
    background:#fff; border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    font: 14px/1.45 var(--font-ui); color: inherit;
    transition: all var(--fast);
  }
  input[type=text]:focus{
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .controls{ display:flex; gap: 8px; flex-wrap: wrap; align-items:center }
  .btn{
    display:inline-flex; align-items:center; gap:6px;
    padding: 10px 16px;
    border: 1px solid var(--line-strong); background:#fff; color: var(--ink);
    border-radius: var(--radius-pill);
    font: 600 .85rem/1 var(--font-ui); cursor: pointer;
    transition: all var(--fast); box-shadow: var(--shadow-xs);
  }
  .btn:hover{ border-color: var(--accent); color: var(--accent-deep); transform: translateY(-1px) }
  .btn.accent{
    background: linear-gradient(180deg, var(--accent), var(--accent-deep));
    color:#fff; border-color: transparent;
    box-shadow: 0 8px 18px -6px var(--accent-glow);
  }
  .btn.accent:hover{ color:#fff; filter:brightness(1.06) }

  .grid{ display: grid; gap: 12px }
  .grid.two{ grid-template-columns: repeat(2, minmax(0,1fr)) }
  @media (max-width: 540px){ .grid.two{ grid-template-columns: 1fr } }

  .list{ display: grid; gap: 6px }
  .list .item{
    display:flex; align-items:center; justify-content:space-between; gap: 8px;
    padding: 10px 14px;
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius-sm);
    font-size: .9rem;
    transition: all var(--fast);
  }
  .list .item:hover{ border-color: var(--accent) }
  .list .item.accent{
    background: var(--accent-soft); color: var(--accent-deep);
    border-color: color-mix(in srgb, var(--accent) 30%, transparent);
    font-weight: 600;
  }
  .list .item strong{ color: var(--ink); font-family: var(--font-display); font-weight: 600 }
  .small{ font-size: .8rem; color: var(--muted) }

  .footer-actions{
    display:flex; gap: 10px; justify-content: flex-end;
    padding: 16px 20px; border-top: 1px solid var(--line);
    background: var(--paper-warm);
  }

  .toast{
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(12px);
    background: var(--ink); color: #fff;
    padding: 10px 18px; border-radius: var(--radius-pill);
    font: 600 13px/1 var(--font-ui);
    opacity: 0; pointer-events: none; transition: all .25s; z-index: 100;
  }
  .toast.is-visible{ opacity: 1; transform: translateX(-50%) translateY(0) }

  @media print{
    .flove-bar, .footer-actions, .badges{ display:none !important }
    body{ background:#fff }
    .card{ box-shadow:none; border:1px solid #ccc }
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ animation-duration:.01ms !important; transition-duration:.01ms !important }
  }
</style>
</head>
<body>

<div class="flove-bar">
  <a class="flove-home" href="../index.html" aria-label="Back to flove launcher">←</a>
  <span class="flove-mark flove-asterism" aria-hidden="true">✺</span>
  <span class="flove-app-name">InstaShare</span>
  <span class="flove-tag">shareful · simple</span>
  <span class="flove-spacer"></span>
</div>

<main class="app">
  <section class="card">
    <header class="header">
      <div class="brand"><div class="logo" aria-hidden="true"></div><span>INSTASHARE</span></div>
      <div class="badges">
        <button class="badge" type="button" data-count="25" title="Notifications">🔔</button>
        <button class="badge" type="button" data-count="12" title="Messages">💬</button>
        <button class="badge" type="button" title="Menu">☰</button>
      </div>
    </header>

    <div class="section">
      <details class="fold" open>
        <summary>LATEST THINGS</summary>
        <div class="content list" id="latestList">
          <div class="item"><span>Bike (photo)</span><span class="small">1h ago</span></div>
          <div class="item"><span>Tool set</span><span class="small">3h ago</span></div>
        </div>
      </details>
    </div>

    <div class="section">
      <details class="fold" open>
        <summary>ADD NEW THING</summary>
        <div class="content grid">
          <div class="controls">
            <label class="btn" style="cursor:pointer"><input type="file" id="mediaFile" multiple hidden>📷 Add media</label>
            <span class="small" id="mediaInfo">No file selected</span>
          </div>
          <div class="list">
            <div class="item">
              <span>3 nights of hosting</span>
              <div class="controls">
                <input type="text" id="newWish" placeholder="Add a wish here" style="width:240px">
                <button class="btn accent" type="button" id="addWish">OK</button>
              </div>
            </div>
          </div>
        </div>
      </details>
    </div>

    <div class="section">
      <details class="fold" open>
        <summary>ADD CATEGORIES</summary>
        <div class="content grid two">
          <div class="list">
            <div class="item"><strong>SOULS</strong></div>
            <div class="item">Curious</div>
            <div class="item accent">Brave</div>
            <div class="item">Calm</div>
            <div class="item">Generous</div>
            <div class="item">Steady</div>
          </div>
          <div class="list">
            <div class="item"><strong>OTHER</strong></div>
            <div class="item accent">Favourite</div>
            <div class="item">Urgent</div>
            <div class="item">High quality</div>
            <div class="item">Good quality</div>
            <div class="item">Highly loved</div>
          </div>
        </div>
      </details>
    </div>

    <footer class="footer-actions">
      <button class="btn" type="button" id="saveBtn">💾 Save</button>
      <button class="btn accent" type="button" id="publishBtn">✦ Publish</button>
    </footer>
  </section>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  "use strict";
  const $  = (s,r=document) => r.querySelector(s);
  const $$ = (s,r=document) => [...r.querySelectorAll(s)];
  const KEY = "flove:shareful-simple:v1";

  let toastT;
  const toast = m => { const el=$("#toast"); el.textContent=m; el.classList.add("is-visible"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("is-visible"),1600); };
  const escapeHtml = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  function snapshot(){
    return { latest: $$(".item", $("#latestList")).map(i => i.firstElementChild?.textContent || "") };
  }
  function restore(){
    let d; try{ d = JSON.parse(localStorage.getItem(KEY) || "null"); }catch(e){ return; }
    if (!d || !d.latest) return;
    $("#latestList").innerHTML = d.latest.map((name, i) =>
      `<div class="item"><span>${escapeHtml(name)}</span><span class="small">${i === 0 ? "just now" : "earlier"}</span></div>`
    ).join("");
  }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(snapshot())); }catch(e){} }

  function addWish(){
    const v = $("#newWish").value.trim();
    if (!v) return;
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<span>${escapeHtml(v)}</span><span class="small">just now</span>`;
    $("#latestList").prepend(div);
    $("#newWish").value = "";
    save(); toast("Added");
  }
  $("#addWish").addEventListener("click", addWish);
  $("#newWish").addEventListener("keypress", e => { if (e.key === "Enter"){ e.preventDefault(); addWish(); } });

  $("#mediaFile").addEventListener("change", e => {
    const files = [...e.target.files || []];
    $("#mediaInfo").textContent = files.length ? `${files.length} file${files.length>1?"s":""} selected` : "No file selected";
  });

  $("#saveBtn").addEventListener("click", () => { save(); toast("Saved"); });
  $("#publishBtn").addEventListener("click", () => toast("✦ Published (demo)"));

  restore();
})();
</script>
</body>
</html>
