/* ============ original toggle/layout CSS (kept verbatim) ============ */
/* styles.css — lighter, pure CSS */
:root{
  --bg:#0e0f13; --card:#151823; --ink:#e8ecf1; --muted:#9aa4b2;
  --accent:#7c5cff; --accent-2:#00d4ff; --chip:#202637;
  --ring: 0 0 0 2px rgba(124,92,255,.35), 0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box} html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;line-height:1.35}
.app-header{padding:24px 16px 8px;text-align:center}
.app-header h1{margin:0;font-weight:800}
.app-header h1 span{display:block;font-size:.8rem;color:var(--muted);margin-top:4px}
.subtitle{color:var(--muted);max-width:880px;margin:6px auto 0}

.container{max-width:1100px;margin:20px auto 80px;padding:0 16px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.02),transparent 40%),var(--card);
  border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:16px;margin:14px 0;box-shadow:var(--ring)}
.card-title{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.card-title h2{margin:0;font-size:1.02rem;font-weight:800}

/* Parties */
.parties-line{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.party{display:flex;gap:8px;align-items:center;background:#101423;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.06)}
.party label{color:var(--muted);font-weight:700}
.party input,.party select{background:#0f121b;color:var(--ink);border:1px solid rgba(255,255,255,.08);padding:8px 10px;border-radius:10px}

/* Tabs with icon + title + tooltip */
.tabs{display:flex;gap:10px;justify-content:center;position:sticky;top:0;z-index:10;background:rgba(14,15,19,.9);backdrop-filter:blur(6px);padding:8px;border-bottom:1px solid rgba(255,255,255,.06)}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(180deg,rgba(124,92,255,.12),transparent)}
.tab-ico{font-size:1.1rem}
.tab-title{font-size:.78rem;color:var(--ink);opacity:.9}
.tab:hover{box-shadow:var(--ring);position:relative}
.tab:hover::after{content:attr(data-tip);position:absolute;top:-8px;transform:translateY(-100%);background:#101522;color:var(--ink);padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.08);white-space:nowrap}
.panel{display:none}
#tab-giving:checked ~ .tabs label[for="tab-giving"]{ box-shadow: var(--ring); }
#tab-giving:checked ~ .container .panel[data-for="tab-giving"]{ display:block; }
#tab-time:checked ~ .tabs label[for="tab-time"]{ box-shadow: var(--ring); }
#tab-time:checked ~ .container .panel[data-for="tab-time"]{ display:block; }
#tab-place:checked ~ .tabs label[for="tab-place"]{ box-shadow: var(--ring); }
#tab-place:checked ~ .container .panel[data-for="tab-place"]{ display:block; }
#tab-care:checked ~ .tabs label[for="tab-care"]{ box-shadow: var(--ring); }
#tab-care:checked ~ .container .panel[data-for="tab-care"]{ display:block; }
#tab-limits:checked ~ .tabs label[for="tab-limits"]{ box-shadow: var(--ring); }
#tab-limits:checked ~ .container .panel[data-for="tab-limits"]{ display:block; }
#tab-costs:checked ~ .tabs label[for="tab-costs"]{ box-shadow: var(--ring); }
#tab-costs:checked ~ .container .panel[data-for="tab-costs"]{ display:block; }
#tab-media:checked ~ .tabs label[for="tab-media"]{ box-shadow: var(--ring); }
#tab-media:checked ~ .container .panel[data-for="tab-media"]{ display:block; }
#tab-context:checked ~ .tabs label[for="tab-context"]{ box-shadow: var(--ring); }
#tab-context:checked ~ .container .panel[data-for="tab-context"]{ display:block; }
#tab-other:checked ~ .tabs label[for="tab-other"]{ box-shadow: var(--ring); }
#tab-other:checked ~ .container .panel[data-for="tab-other"]{ display:block; }

/* Clause list */
.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.cl{background:#101423;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px}
.clause{display:flex;align-items:center;gap:8px;user-select:none}
.ico{width:24px;height:24px;border-radius:8px;border:1px solid rgba(255,255,255,.1);display:inline-flex;align-items:center;justify-content:center;background:#0f121b;opacity:0;transition:opacity .15s}
.ico::before{content:attr(data-ico)}

/* ============ flove paper overrides ============ */
:root{
  --app-accent:        #7c3aed;
  --app-accent-soft:   #ede9fe;
  --app-ink-on-accent: #2e1065;

  /* repaint the original variables to light palette */
  --bg:    #fbfaff;
  --card:  #ffffff;
  --ink:   #1c1235;
  --muted: #6a5b8f;
  --accent:#7c3aed;
  --accent-2:#0ea5e9;
  --chip:  #ede9fe;
  --ring:  0 0 0 1px rgba(124,58,237,.18), 0 4px 16px -6px rgba(124,58,237,.18);

  --paper:       #fbfaff;
  --paper-warm:  #f3f0ff;
  --line:        rgba(80,50,170,.08);
  --line-strong: rgba(80,50,170,.16);
  --fast: .15s cubic-bezier(.2,.8,.2,1);
  --font-display: 'Fraunces', Georgia, serif;
}
html, body{ height: auto }
body{
  background:
    radial-gradient(900px 600px at 90% -10%, var(--app-accent-soft) 0%, transparent 60%),
    radial-gradient(700px 500px at -10% 110%, var(--paper-warm) 0%, transparent 55%),
    var(--paper) !important;
  color: var(--ink) !important;
  font-family: 'Inter', system-ui, sans-serif !important;
  padding-bottom: 60px;
}

.flove-bar{
  position: sticky; top: 0; z-index: 100;
  background: rgba(251,250,255,.78);
  backdrop-filter: blur(14px) saturate(160%);
  -webkit-backdrop-filter: blur(14px) saturate(160%);
  border-bottom: 1px solid var(--line-strong);
  color: var(--ink);
}
.flove-bar .flove-asterism{ animation-play-state: paused }
body:hover .flove-bar .flove-asterism, body:focus-within .flove-bar .flove-asterism{ animation-play-state: running }
.flove-bar .flove-mark{ font-size: 26px; color: var(--accent); filter: drop-shadow(0 0 6px rgba(124,58,237,.3)) }
.flove-bar .flove-app-name{ font-family: var(--font-display); font-weight: 600 }
.flove-bar .flove-tag{ color: var(--muted) }

.app-header{
  text-align: center; padding: 22px 16px 4px !important;
}
.app-header h1{
  font-family: var(--font-display) !important;
  font-weight: 600 !important;
  font-size: clamp(1.6rem, 3vw, 2.2rem) !important;
  letter-spacing: -.01em;
  color: var(--ink) !important;
}
.subtitle{ color: var(--muted) !important }

/* repaint cards */
.card{
  background: #fff !important;
  border: 1px solid var(--line) !important;
  border-radius: 22px !important;
  box-shadow: 0 4px 14px -6px rgba(80,50,170,.10) !important;
}
.card-title h2{
  font-family: var(--font-display) !important;
  font-weight: 600 !important;
  color: var(--accent-deep, #5b21b6);
  font-size: 1.1rem !important;
}

/* Parties */
.party{
  background: var(--paper) !important;
  border: 1px solid var(--line-strong) !important;
  border-radius: 14px !important;
}
.party label{ color: var(--muted) !important }
.party input, .party select{
  background: #fff !important;
  border: 1px solid var(--line-strong) !important;
  color: var(--ink) !important;
  border-radius: 10px !important;
}
.party input:focus, .party select:focus{
  outline: none; border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px rgba(124,58,237,.22);
}

/* Tabs */
.tabs{
  position: sticky; top: 48px !important; z-index: 30;
  background: rgba(255,255,255,.85) !important;
  backdrop-filter: blur(14px) saturate(160%) !important;
  border-bottom: 1px solid var(--line-strong) !important;
  padding: 10px !important;
  gap: 6px !important;
  flex-wrap: wrap;
}
.tab{
  background: #fff !important;
  border: 1px solid var(--line-strong) !important;
  border-radius: 14px !important;
  padding: 6px 12px !important;
  color: var(--ink) !important;
  transition: all var(--fast);
  cursor: pointer;
}
.tab:hover{ border-color: var(--accent) !important; color: var(--accent-deep, #5b21b6) !important }
.tab-title{ color: var(--ink) !important; opacity: 1 !important; font-weight: 600 !important }
.tab-ico{ font-size: 1.05rem !important }

/* active tab — original CSS uses ~ selectors; we ensure visible styling matches */
#tab-giving:checked ~ .tabs label[for="tab-giving"],
#tab-time:checked   ~ .tabs label[for="tab-time"],
#tab-place:checked  ~ .tabs label[for="tab-place"],
#tab-care:checked   ~ .tabs label[for="tab-care"],
#tab-limits:checked ~ .tabs label[for="tab-limits"],
#tab-costs:checked  ~ .tabs label[for="tab-costs"],
#tab-media:checked  ~ .tabs label[for="tab-media"],
#tab-context:checked ~ .tabs label[for="tab-context"],
#tab-other:checked  ~ .tabs label[for="tab-other"]{
  background: linear-gradient(180deg, var(--accent), #5b21b6) !important;
  color: #fff !important;
  border-color: transparent !important;
  box-shadow: 0 6px 14px -4px rgba(124,58,237,.3);
}
#tab-giving:checked ~ .tabs label[for="tab-giving"] .tab-title,
#tab-time:checked   ~ .tabs label[for="tab-time"] .tab-title,
#tab-place:checked  ~ .tabs label[for="tab-place"] .tab-title,
#tab-care:checked   ~ .tabs label[for="tab-care"] .tab-title,
#tab-limits:checked ~ .tabs label[for="tab-limits"] .tab-title,
#tab-costs:checked  ~ .tabs label[for="tab-costs"] .tab-title,
#tab-media:checked  ~ .tabs label[for="tab-media"] .tab-title,
#tab-context:checked ~ .tabs label[for="tab-context"] .tab-title,
#tab-other:checked  ~ .tabs label[for="tab-other"] .tab-title{
  color: #fff !important;
}

/* Clauses */
.cl .clause, label.clause{
  background: var(--paper) !important;
  border: 1px solid var(--line-strong) !important;
  color: var(--ink) !important;
  border-radius: 999px !important;
  transition: all var(--fast);
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  margin: 3px;
  font-size: .88rem;
  cursor: pointer;
}
label.clause:hover{
  background: #fff !important;
  border-color: var(--accent) !important;
  transform: translateY(-1px);
}
/* Checked state — match by checkbox id targeting following label class */
/* Since each checkbox's id corresponds to label class .label-<id>, use :has() if present, else input[id]:checked + ... — fall back to general scheme: */
input[type=checkbox]:checked + .container .clause /* placeholder, real selectors below override */{ }

/* Generic: when a clause checkbox is checked, paint the linked label.
   The original markup uses id="<slug>" on hidden inputs and class="label-<slug>" on <label for="<slug>">.
   We use the :has(): the body (or html) has #<id>:checked and the label has matching class. */
body:has(input:checked) label.clause{}
/* True per-clause check styling using attribute selectors */
label.clause{ position: relative }
input[type=checkbox]:checked + * label.clause{}
/* We achieve checked styling via :has() on the label's `for` chain via a small JS toggle of an .is-on class for compatibility, but the original CSS already has selectors using :has() — keep them and just style. */
label.clause.is-on,
body:has(input[type=checkbox]:checked) ~ * label.clause /* unreachable */{ }

/* When a clause input is checked, its label (referenced via for=) gets visually marked via the original CSS.
   We can paint it through a generic rule using :has() on body checking any input with same id as the for=. That's not feasible without JS. So the redesign uses a tiny JS to add .is-on. */
label.clause.is-on{
  background: var(--accent) !important;
  color: #fff !important;
  border-color: transparent !important;
  box-shadow: 0 4px 12px -4px rgba(124,58,237,.35);
}

/* The list of clauses inside .panel */
.panel .list{ display: flex; flex-wrap: wrap; gap: 4px; padding: 4px }

/* Final phrase */
.phrase{
  background: linear-gradient(135deg, #fff, var(--paper-warm)) !important;
  border: 2px dashed var(--accent) !important;
}
.phrase .card-title h2{ color: var(--accent) !important }
.sentence{
  font-family: var(--font-display);
  font-size: 1.05rem;
  line-height: 1.7;
  color: var(--ink) !important;
  background: #fff !important;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px 16px;
}
.sentence .prefix{ font-weight: 600; color: var(--accent-deep, #5b21b6) }
.sentence .chip-text{ display: none }
.sentence .chip-text.is-on{
  display: inline-block;
  margin: 2px 4px;
  padding: 1px 8px;
  background: var(--app-accent-soft);
  color: var(--accent-deep, #5b21b6);
  border-radius: 8px;
  font-size: .92rem;
}
.sentence .chip-icon{ display: none }
.sentence .chip-icon.is-on{
  display: inline-block;
  margin: 2px 4px;
  padding: 1px 8px;
  background: #fef3c7;
  color: #b45309;
  border-radius: 8px;
  font-size: .82rem;
  font-weight: 600;
}
.sentence .chip-icon.is-on::after{ content: " (" attr(data-adj) ")"; font-style: italic; opacity: .8 }

/* Hide all panels by default; show via checked radio */
.panel{ display: none }
#tab-giving:checked  ~ .container .panel[data-for="tab-giving"],
#tab-time:checked    ~ .container .panel[data-for="tab-time"],
#tab-place:checked   ~ .container .panel[data-for="tab-place"],
#tab-care:checked    ~ .container .panel[data-for="tab-care"],
#tab-limits:checked  ~ .container .panel[data-for="tab-limits"],
#tab-costs:checked   ~ .container .panel[data-for="tab-costs"],
#tab-media:checked   ~ .container .panel[data-for="tab-media"],
#tab-context:checked ~ .container .panel[data-for="tab-context"],
#tab-other:checked   ~ .container .panel[data-for="tab-other"]{ display: block }

/* The Parties and Final phrase cards (no data-for) are always visible */
.card.parties, .card.phrase{ display: block }

/* Action bar */
.action-bar{
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; align-items: center;
  padding: 0 16px 14px;
  max-width: 1100px; margin: 0 auto;
}
.action-bar .btn{
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid var(--line-strong);
  background: #fff; color: var(--ink);
  font: 600 .85rem/1 'Inter', sans-serif; cursor: pointer;
  transition: all var(--fast);
  box-shadow: 0 1px 2px rgba(80,50,170,.05);
}
.action-bar .btn:hover{ border-color: var(--accent); color: var(--accent-deep, #5b21b6); transform: translateY(-1px) }
.action-bar .btn.primary{
  background: linear-gradient(180deg, var(--accent), #5b21b6);
  color:#fff; border-color: transparent;
  box-shadow: 0 8px 18px -6px rgba(124,58,237,.3);
}
.action-bar .btn.primary:hover{ color:#fff; filter:brightness(1.06) }
.action-bar .counter{ color: var(--muted); font-size: .82rem; padding: 4px 10px }
.action-bar .counter strong{ color: var(--accent-deep, #5b21b6) }

.foot{ text-align: center; padding: 24px; color: var(--muted); font-size: .85rem }
.foot small{ color: var(--muted) }

.toast{
  position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(12px);
  background: var(--ink); color: #fff;
  padding: 10px 18px; border-radius: 999px;
  font: 600 13px/1 'Inter', sans-serif;
  opacity: 0; pointer-events: none; transition: all .25s; z-index: 200;
}
.toast.is-visible{ opacity: 1; transform: translateX(-50%) translateY(0) }

@media print{
  .flove-bar, .tabs, .action-bar{ display:none !important }
  body{ background:#fff }
  .card{ box-shadow:none !important; border:1px solid #ccc !important }
  .panel{ display: block !important; page-break-inside: avoid }
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{ animation-duration:.01ms !important; transition-duration:.01ms !important }
}

<script>
(function(){
  "use strict";
  const $  = (s,r=document) => r.querySelector(s);
  const $$ = (s,r=document) => [...r.querySelectorAll(s)];
  const KEY = "flove:clauses:v1";

  let toastT;
  const toast = m => { const el=$("#toast"); el.textContent=m; el.classList.add("is-visible"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("is-visible"),1700); };

  // Build a map: clause input id <-> {label element, chip-text, chip-icon}
  const clauseInputs = $$('input[type=checkbox][hidden]');
  const refs = clauseInputs.map(input => {
    const id = input.id;
    const label = document.querySelector(`label.clause[for="${id}"]`);
    const chipT = document.querySelector(`.chip-text.c-${id}`);
    const chipI = document.querySelector(`.chip-icon.c-${id}`);
    return { id, input, label, chipT, chipI };
  });

  function applyOn(){
    let n = 0;
    refs.forEach(r => {
      const on = !!r.input.checked;
      if (on) n++;
      r.label  && r.label.classList.toggle("is-on", on);
      r.chipT  && r.chipT.classList.toggle("is-on", on);
      r.chipI  && r.chipI.classList.toggle("is-on", on);
    });
    $("#countActive").textContent = n;
  }

  function snapshot(){
    const data = {
      parties: $$('.party').map(p => ({
        name: p.querySelector('input[type=text]')?.value || "",
        type: p.querySelector('select')?.value || ""
      })),
      active: refs.filter(r => r.input.checked).map(r => r.id)
    };
    return data;
  }
  function restore(){
    let d; try{ d = JSON.parse(localStorage.getItem(KEY) || "null"); }catch(e){ return; }
    if (!d) return;
    if (Array.isArray(d.parties)){
      $$('.party').forEach((p, i) => {
        const txt = p.querySelector('input[type=text]');
        const sel = p.querySelector('select');
        if (d.parties[i] && txt) txt.value = d.parties[i].name || "";
        if (d.parties[i] && sel && d.parties[i].type) sel.value = d.parties[i].type;
      });
    }
    if (Array.isArray(d.active)){
      d.active.forEach(id => { const el = document.getElementById(id); if (el) el.checked = true; });
    }
  }
  let saveT;
  function save(){ clearTimeout(saveT); saveT = setTimeout(()=>{ try{ localStorage.setItem(KEY, JSON.stringify(snapshot())); }catch(e){} }, 250); }

  // Wire clause labels to their inputs (clicking the label naturally toggles the input; we just refresh visuals)
  document.addEventListener("change", e => {
    if (e.target.matches('input[type=checkbox][hidden]')){
      applyOn(); save();
    }
  });
  // Also catch parties change
  document.addEventListener("input", e => {
    if (e.target.matches('.party input, .party select')) save();
  });

  function phraseText(){
    const prefix = $(".sentence .prefix")?.textContent || "";
    const chipsText = $$(".chip-text.is-on").map(c => c.dataset.txt).join(", ");
    const chipsIcon = $$(".chip-icon.is-on").map(c => `${c.dataset.adj}`).join(", ");
    let txt = prefix + " " + chipsText + ".";
    if (chipsIcon) txt += "\nAttributes: " + chipsIcon + ".";
    return txt.trim();
  }

  $("#copyBtn").addEventListener("click", async () => {
    try{ await navigator.clipboard.writeText(phraseText()); toast("Phrase copied"); }
    catch(e){ toast("Couldn't copy"); }
  });
  $("#exportBtn").addEventListener("click", () => {
    const data = { ...snapshot(), phrase: phraseText() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "shareful-clauses.json";
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ a.remove(); URL.revokeObjectURL(url); }, 80);
    toast("Exported JSON");
  });
  $("#printBtn").addEventListener("click", () => window.print());
  $("#resetBtn").addEventListener("click", () => {
    if (!confirm("Clear all clauses?")) return;
    refs.forEach(r => { r.input.checked = false; });
    try{ localStorage.removeItem(KEY); }catch(_){}
    applyOn();
    toast("Reset done");
  });

  restore();
  applyOn();
})();
</script>
</body>
</html>
