<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Goddy Navigation Proof</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0c12; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  .phone {
    width: 375px; height: 667px; border-radius: 36px; overflow: hidden;
    border: 3px solid #222; position: relative; background: #111;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .screen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    opacity: 0; animation: fade 6s ease-in-out infinite;
    padding: 40px 24px;
  }
  .screen:nth-child(1) { animation-delay: 0s; }
  .screen:nth-child(2) { animation-delay: 2s; }
  .screen:nth-child(3) { animation-delay: 4s; }
  .screen img { width: 100%; border-radius: 12px; }
  .screen h2 { font-family: Georgia, serif; font-size: 1.3rem; color: #fff; text-align: center; }
  .screen p { font-family: system-ui, sans-serif; font-size: .85rem; color: #aaa; text-align: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; position: absolute; bottom: 20px; }
  .dot:nth-child(1) { left: calc(50% - 16px); }
  .dot:nth-child(2) { left: 50%; transform: translateX(-50%); }
  .dot:nth-child(3) { left: calc(50% + 8px); }
  @keyframes fade {
    0%, 30% { opacity: 1; }
    33%, 97% { opacity: 0; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <img src="../captions/goddy.png" alt="Goddy landing">
    <h2>Welcome to Goddy</h2>
    <p>Tap to enter</p>
  </div>
  <div class="screen">
    <img src="../captions/goddy.png" alt="Goddy main">
    <h2>Main View</h2>
    <p>Navigate through sections</p>
  </div>
  <div class="screen">
    <img src="../captions/goddy.png" alt="Goddy detail">
    <h2>Deep Dive</h2>
    <p>Explore the details</p>
  </div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>
</body>
</html>
