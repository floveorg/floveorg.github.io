    <path class="tld" d="M113,52 Q122,61 131,52" fill="none" stroke="#f4501e" stroke-width="7" stroke-linecap="round"/>
    <text x="150" y="148" font-family="Arial, 'DejaVu Sans', sans-serif" font-weight="bold" font-size="17" letter-spacing="7" fill="#141414" text-anchor="middle">LIBERADA</text>
