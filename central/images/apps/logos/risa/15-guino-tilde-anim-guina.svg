<svg xmlns="http://www.w3.org/2000/svg" width="940" height="400" viewBox="0 0 470 200">
<style>
@media (prefers-reduced-motion: reduce){*{animation:none !important}}
  .eyeR{transform-box:fill-box;transform-origin:center;animation:wink 2.4s ease-in-out infinite}
  @keyframes wink{0%,34%,46%,100%{transform:scaleY(1)}40%{transform:scaleY(.15)}}
  .face{transform-box:fill-box;transform-origin:center;animation:nod 2.4s ease-in-out infinite}
  @keyframes nod{0%,34%,46%,100%{transform:rotate(0)}40%{transform:rotate(-3deg)}}
  .tld{transform-box:fill-box;transform-origin:center;animation:twk 2.4s ease-in-out infinite}
  @keyframes twk{0%,34%,46%,100%{transform:scaleY(1) translateY(0)}40%{transform:scaleY(.35) translateY(3px)}}
</style>
