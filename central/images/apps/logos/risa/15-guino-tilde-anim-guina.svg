    <path class="eyeL" d="M64,88 C70,80 80,80 86,88"/>
    <path class="eyeR" d="M114,84 C122,92 130,92 138,84" stroke="#f4501e"/>
    <path class="smile" d="M62,116 C82,150 120,150 140,116"/>
    </g>
    </g>
  </g>
