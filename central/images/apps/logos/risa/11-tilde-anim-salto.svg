<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="600" height="400" viewBox="0 0 300 200"><style>@media (prefers-reduced-motion: reduce){*{animation:none !important}}
  .til{transform-box:fill-box;transform-origin:center;animation:jump 2.8s ease infinite}
  @keyframes jump{0%,46%,100%{transform:translateY(0) scale(1)}
    10%{transform:translateY(-15px) scale(1)}
    18%{transform:translateY(0) scale(1.3,.7)}
    26%{transform:scale(.92,1.08)}34%{transform:scale(1)}}
  .word{transform-box:fill-box;transform-origin:center;animation:thud 2.8s ease infinite}
  @keyframes thud{0%,16%,30%,100%{transform:translateY(0)}21%{transform:translateY(2px)}}
</style>
  <g class="word"><text x="150" y="112" font-family="Arial, 'DejaVu Sans', sans-serif" font-weight="bold" font-size="72"
        letter-spacing="1" fill="#141414" text-anchor="middle">rısa</text></g>
  <path class="til" d="M113,52 Q122,61 131,52" fill="none" stroke="#f4501e" stroke-width="7" stroke-linecap="round"/>
  <g class="sub"><text x="150" y="148" font-family="Arial, 'DejaVu Sans', sans-serif" font-weight="bold" font-size="17"
        letter-spacing="7" fill="#141414" text-anchor="middle">LIBERADA</text></g>
</svg>