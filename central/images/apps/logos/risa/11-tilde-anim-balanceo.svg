<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="600" height="400" viewBox="0 0 300 200"><style>@media (prefers-reduced-motion: reduce){*{animation:none !important}}
  .til{transform-box:fill-box;transform-origin:center;animation:pend 1.7s ease-in-out infinite alternate}
