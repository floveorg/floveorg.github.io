<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="400" height="400" viewBox="0 0 200 200"><style>@media (prefers-reduced-motion: reduce){*{animation:none !important}}
  .sm{transform-box:fill-box;transform-origin:center;animation:son 2s ease-in-out infinite}
  @keyframes son{0%,100%{transform:scaleX(1)}30%{transform:scaleX(1.22)}}
  .pl{animation:bl 2s infinite}
  .pr{animation:bl 2s infinite 1s}
  @keyframes bl{0%,88%,100%{opacity:1}93%{opacity:0}}
  .o{transform-box:fill-box;transform-origin:center;animation:pu 2s ease-in-out infinite}
  @keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.015)}}
</style>
  <defs>
    <path id="arcotop" d="M32,100 A68,68 0 0 1 168,100"/>
    <path id="arcobot" d="M32,100 A68,68 0 1 0 168,100"/>
  </defs>
  <circle class="o" cx="100" cy="100" r="92" fill="none" stroke="#141414" stroke-width="4"/>
  <g class="ring">
    <text font-family="Arial, 'DejaVu Sans', sans-serif" font-weight="bold" font-size="20" letter-spacing="4" fill="#141414">
      <textPath xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#arcotop" startOffset="50%" text-anchor="middle">RISA</textPath>
    </text>
    <text font-family="Arial, 'DejaVu Sans', sans-serif" font-weight="bold" font-size="20" letter-spacing="4" fill="#141414">
      <textPath xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="#arcobot" startOffset="50%" text-anchor="middle">LIBERADA</textPath>
    </text>
    <circle class="pl" cx="34" cy="100" r="4" fill="#f4501e"/>
    <circle class="pr" cx="166" cy="100" r="4" fill="#f4501e"/>
  </g>
  <path class="sm" d="M78,104 Q100,124 122,104" fill="none" stroke="#f4501e" stroke-width="9" stroke-linecap="round"/>
</svg>