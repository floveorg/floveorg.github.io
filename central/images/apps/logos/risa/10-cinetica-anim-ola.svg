  <path class="w w2" pathLength="100" d="M56,96 Q102,138 150,96" fill="none" stroke="#f4501e" stroke-width="11" stroke-linecap="round"/>
  <path class="w w3" pathLength="100" d="M60,122 Q104,164 152,122" fill="none" stroke="#141414" stroke-width="11" stroke-linecap="round"/>
