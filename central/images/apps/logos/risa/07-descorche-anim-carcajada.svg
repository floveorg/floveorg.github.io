<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="400" height="400" viewBox="0 0 200 200"><style>@media (prefers-reduced-motion: reduce){*{animation:none !important}}
  .bowl{transform-box:fill-box;transform-origin:center;animation:rock 1.1s ease-in-out infinite alternate}
  @keyframes rock{from{transform:rotate(-5deg)}to{transform:rotate(5deg)}}
  .ball{transform-box:fill-box;transform-origin:center;animation:flo 2.2s ease-in-out infinite}
  @keyframes flo{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(14deg)}}
  .d{animation:tw2 1.1s ease-in-out infinite}
  .d1{animation-delay:0s}.d2{animation-delay:.18s}.d3{animation-delay:.36s}
  @keyframes tw2{0%,100%{opacity:.4}50%{opacity:1}}
</style>
  <g class="bowl"><path d="M56,110 A48,48 0 0 0 152,110" fill="none" stroke="#141414" stroke-width="13" stroke-linecap="round"/></g>
  <circle class="d d1" cx="112" cy="88" r="3.5" fill="#141414"/>
  <circle class="d d2" cx="124" cy="70" r="3.5" fill="#141414"/>
  <circle class="d d3" cx="138" cy="54" r="3.5" fill="#141414"/>
  <circle class="ball" cx="156" cy="38" r="12" fill="#f4501e"/>
</svg>