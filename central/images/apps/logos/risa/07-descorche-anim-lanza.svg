<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="400" height="400" viewBox="0 0 200 200"><style>@media (prefers-reduced-motion: reduce){*{animation:none !important}}
  .ball{transform-box:fill-box;transform-origin:center;animation:fly 2.6s ease-out infinite}
  @keyframes fly{0%{transform:translate(-56px,70px) scale(.5);opacity:0}8%{opacity:1}
    55%{transform:translate(0,0) scale(1)}65%{transform:translate(3px,-4px)}
    75%,100%{transform:translate(0,0);opacity:1}}
  .d{opacity:0;animation:dot 2.6s infinite}
  .d1{animation-delay:.15s}.d2{animation-delay:.3s}.d3{animation-delay:.45s}
  @keyframes dot{0%{opacity:0}20%,80%{opacity:1}100%{opacity:0}}
  .bowl{transform-box:fill-box;transform-origin:center;animation:sq 2.6s ease infinite}
  @keyframes sq{0%{transform:scaleY(.88)}12%{transform:scaleY(1.05)}22%,100%{transform:scaleY(1)}}
</style>
  <g class="bowl"><path d="M56,110 A48,48 0 0 0 152,110" fill="none" stroke="#141414" stroke-width="13" stroke-linecap="round"/></g>
  <circle class="d d1" cx="112" cy="88" r="3.5" fill="#141414"/>
  <circle class="d d2" cx="124" cy="70" r="3.5" fill="#141414"/>
  <circle class="d d3" cx="138" cy="54" r="3.5" fill="#141414"/>
  <circle class="ball" cx="156" cy="38" r="12" fill="#f4501e"/>
</svg>