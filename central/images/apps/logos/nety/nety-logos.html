<!doctype html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

<meta name="description" content="Brand marks across their full size gamut — bee for nety, Eye Fan for Wizy, One Swoop for MyWizy." />
<title>✺ nety · Wizy · MyWizy</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='32' cy='39' rx='8' ry='12' fill='none' stroke='%238d89ff' stroke-width='3'/%3E%3Cpath d='M24.5 35h15 M24.5 43h15' fill='none' stroke='%238d89ff' stroke-width='3'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  :root{
    --bg:#0b0b0f; --ink:#e9eaf2; --accent:#8d89ff; --accent-soft:#c9c6ff; --signal:#00f7a7;
  }
  html,body{ min-height:100%; }
  body{ background:var(--bg); color:var(--ink); display:grid; place-items:center;
    -webkit-font-smoothing:antialiased; }

  .stack{ display:flex; flex-direction:column; gap:clamp(2.6rem,8vw,4.4rem); padding:clamp(2.2rem,8vw,4.5rem); }
  .brand{ display:flex; flex-direction:column; gap:clamp(1rem,3.4vw,1.7rem); }

  /* lockup: living mark + wordmark */
  .lockup{ display:flex; align-items:center; gap:clamp(.8rem,3vw,1.5rem); }
  .hero-mk{ width:clamp(64px,13vw,92px); height:clamp(64px,13vw,92px); overflow:visible; }
  .wm{ font-family:"Fredoka",sans-serif; font-weight:700; letter-spacing:-.02em; line-height:1;
    font-size:clamp(2.4rem,9vw,4.2rem); color:var(--ink); }
  .wm em{ font-style:normal; color:var(--signal); }

  /* gama: the same mark, favicon → large + a living take */
  .gama{ display:flex; align-items:flex-end; gap:clamp(.9rem,3.4vw,1.8rem); padding-left:.15rem; }
  .mk{ overflow:visible; display:block; }
  .s16{ width:16px; height:16px; }
  .s24{ width:24px; height:24px; }
  .s44{ width:44px; height:44px; }
  .s80{ width:80px; height:80px; }

  /* mark palette */
  .none{ fill:none; }
  svg [stroke]{ stroke-linecap:round; stroke-linejoin:round; }
  .f-acc{ fill:var(--accent); } .f-sig{ fill:var(--signal); } .f-soft{ fill:var(--accent-soft); }
  .s-acc{ stroke:var(--accent); } .s-sig{ stroke:var(--signal); } .s-soft{ stroke:var(--accent-soft); }

  /* living marks — only inside .live (hero + the animated gama cell) */
  @keyframes flutL{ 0%,100%{ transform:rotate(0); } 50%{ transform:rotate(-13deg); } }
  @keyframes flutR{ 0%,100%{ transform:rotate(0); } 50%{ transform:rotate(13deg); } }
  @keyframes pulse{ 0%,100%{ transform:scale(1); opacity:.8; } 50%{ transform:scale(1.5); opacity:1; } }
  @keyframes glide{ 0%,100%{ transform:translateY(1.5px) rotate(0); } 50%{ transform:translateY(-2.5px) rotate(-2deg); } }
  .live .wl{ transform-box:view-box; transform-origin:30px 27px; animation:flutL 1.1s ease-in-out infinite; }
  .live .wr{ transform-box:view-box; transform-origin:34px 27px; animation:flutR 1.1s ease-in-out infinite; }
  .live .eye{ transform-box:fill-box; transform-origin:center; animation:pulse 1.7s ease-in-out infinite; }
  .live .eye:nth-of-type(2){ animation-delay:.13s; } .live .eye:nth-of-type(3){ animation-delay:.26s; }
  .live .eye:nth-of-type(4){ animation-delay:.39s; } .live .eye:nth-of-type(5){ animation-delay:.52s; }
  .live .glide{ transform-box:view-box; transform-origin:32px 32px; animation:glide 2.4s ease-in-out infinite; }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; } }
</style>
</head>
<body>

      <line x1="32" y1="44" x2="32" y2="7"/><line x1="32" y1="44" x2="44" y2="11"/><line x1="32" y1="44" x2="54" y2="20"/>
    </g>
    <circle class="f-sig" cx="10" cy="20" r="3.1"/><circle class="f-sig" cx="20" cy="11" r="3.1"/>
    <circle class="f-sig" cx="32" cy="7" r="3.1"/><circle class="f-sig" cx="44" cy="11" r="3.1"/><circle class="f-sig" cx="54" cy="20" r="3.1"/>
    <path class="f-acc" d="M32 43 C 26 46, 26 55, 32 59 C 38 55, 38 46, 32 43 Z"/>
    <circle class="f-acc" cx="32" cy="42" r="4"/>
    <path class="none s-acc" stroke-width="1.6" d="M32 38 v-4 M30 38 l-2 -3 M34 38 l2 -3"/>
  </symbol>

    <path class="none s-sig" stroke-width="3.2" d="M34 46 l-4.5 9 M34 46 l4.5 9"/>

  </symbol>
</defs></svg>

        <path class="none s-sig" stroke-width="2.2" d="M29 28 q-3 -4 -6 -4 M35 28 q3 -4 6 -4"/>

    </div>
    <div class="gama">

        <ellipse class="none s-acc" stroke-width="2.8" cx="32" cy="39" rx="8" ry="12"/>
        <path class="none s-acc" stroke-width="2.6" d="M24.5 35h15 M24.5 43h15"/>
        <path class="none s-sig" stroke-width="2.2" d="M29 28 q-3 -4 -6 -4 M35 28 q3 -4 6 -4"/>
        <circle class="f-sig" cx="23" cy="24" r="1.9"/><circle class="f-sig" cx="41" cy="24" r="1.9"/>
      </svg>
    </div>
  </div>

  <div class="brand">

        <g class="none s-acc" stroke-width="2.2">
          <line x1="32" y1="44" x2="10" y2="20"/><line x1="32" y1="44" x2="20" y2="11"/>
          <line x1="32" y1="44" x2="32" y2="7"/><line x1="32" y1="44" x2="44" y2="11"/><line x1="32" y1="44" x2="54" y2="20"/>
        </g>
        <circle class="f-sig eye" cx="10" cy="20" r="3.1"/><circle class="f-sig eye" cx="20" cy="11" r="3.1"/>
        <circle class="f-sig eye" cx="32" cy="7" r="3.1"/><circle class="f-sig eye" cx="44" cy="11" r="3.1"/><circle class="f-sig eye" cx="54" cy="20" r="3.1"/>
        <path class="f-acc" d="M32 43 C 26 46, 26 55, 32 59 C 38 55, 38 46, 32 43 Z"/>

        <g class="none s-acc" stroke-width="2.2">

          <line x1="32" y1="44" x2="32" y2="7"/><line x1="32" y1="44" x2="44" y2="11"/><line x1="32" y1="44" x2="54" y2="20"/>
        </g>

        <circle class="f-sig eye" cx="32" cy="7" r="3.1"/><circle class="f-sig eye" cx="44" cy="11" r="3.1"/><circle class="f-sig eye" cx="54" cy="20" r="3.1"/>
        <path class="f-acc" d="M32 43 C 26 46, 26 55, 32 59 C 38 55, 38 46, 32 43 Z"/>
