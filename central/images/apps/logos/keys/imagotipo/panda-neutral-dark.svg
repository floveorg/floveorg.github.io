<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda neutral (fondo negro)">
  <title>Panda neutral (fondo negro)</title>
  <rect class="bg" x="0" y="0" width="200" height="200" rx="20" fill="#000000"/>
  <g class="panda" data-emotion="neutral">
  <!-- cuerpo (≈ mitad de la cabeza) -->
  <g class="body">
    <ellipse cx="100" cy="174" rx="40" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <ellipse cx="66" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(22 66 166)"/>
    <ellipse cx="134" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(-22 134 166)"/>
    <ellipse cx="84" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
    <ellipse cx="116" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
  </g>
  <!-- cabeza (doble que el cuerpo) -->
  <g class="head">
    <circle cx="60" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="140" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="60" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="140" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  </g>
  <!-- parches en pétalo: suben desde el ojo hacia arriba y afuera, casi nada por debajo -->
  <g class="patches" fill="#2b2b2b">
    <path d="M52 52 C46 66 56 94 74 100 C86 104 94 96 92 84 C86 66 70 54 52 52 Z"/>
    <path d="M148 52 C154 66 144 94 126 100 C114 104 106 96 108 84 C114 66 130 54 148 52 Z"/>
  </g>
  <g class="eyes">
    <path d="M68 86 Q76 79 88 96 Q78 98 68 86 Z" fill="#ffffff"/>
    <path d="M132 86 Q124 79 112 96 Q122 98 132 86 Z" fill="#ffffff"/>
    <circle cx="79" cy="91" r="5" fill="#2b2b2b"/>
    <circle cx="121" cy="91" r="5" fill="#2b2b2b"/>
    <circle cx="77" cy="88" r="2" fill="#ffffff"/>
    <circle cx="119" cy="88" r="2" fill="#ffffff"/>
  </g>
  <g class="brows" fill="none" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round">
    <path d="M62 52 Q76 53 90 60"/>
    <path d="M138 52 Q124 53 110 60"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#2b2b2b"/></g>
  <g class="mouth">
    <path d="M100 116 V121 M90 125 Q100 130 110 125" fill="none" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
  </g>
  </g>
</svg>
