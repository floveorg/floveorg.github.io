# Hugo config for the flove blog. Built by ../build-blog.sh into /blog,
# served static at https://flove.org/blog/ (no CI — commit the output).
baseURL = "https://flove.org/blog/"
defaultContentLanguage = "en"
title = "flove · blog"
theme = "flovelite"
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "Notes from flove — a slower internet where relating, not extracting, is the point."
  tagline = "slow it · flow it · love it"

[taxonomies]
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true   # allow raw HTML in posts (flove writes hand-tuned markup)

[markup.highlight]
  noClasses = false
  lineNos = false
