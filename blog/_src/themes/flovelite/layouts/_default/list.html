{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    <li>
      <a class="post-link" href="{{ .RelPermalink }}">
        <span class="post-title">{{ .Title }}</span>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 Jan 2006" }}</time>
      </a>
    </li>
    {{ end }}
  </ul>
  <p class="back"><a href="{{ site.Home.RelPermalink }}">← blog home</a></p>
{{ end }}
